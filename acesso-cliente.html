<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Acesso ao Buscador</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #000000; color: #ffffff; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .apple-card { background: #1c1c1e; border: 1px solid #38383a; border-radius: 24px; padding: 2.5rem; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        input { background: #2c2c2e; border: 1px solid #38383a; border-radius: 12px; padding: 15px; color: white; width: 100%; margin-bottom: 12px; outline: none; font-size: 14px; transition: 0.3s; }
        input:focus { border-color: #0071e3; background: #3a3a3c; }
        button { background: #ffffff; color: #000000; font-weight: 800; padding: 15px; border-radius: 50px; width: 100%; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; border: none; }
        button:hover { background: #0071e3; color: white; transform: scale(1.02); }
        .hidden { display: none; }
        label { display: block; text-transform: uppercase; font-size: 10px; color: #86868b; margin-bottom: 6px; font-weight: 900; text-align: left; margin-left: 5px; }
    </style>
</head>
<body>

    <div class="apple-card">
        <h1 class="text-4xl font-black italic mb-2 tracking-tighter">iFipe</h1>
        
        <div id="loginForm">
            <p class="text-[10px] font-bold uppercase text-gray-500 mb-8 tracking-[0.3em]">Acesso do Buscador</p>
            
            <label>Seu E-mail</label>
            <input type="email" id="email" placeholder="nome@exemplo.com">
            
            <label>Senha</label>
            <input type="password" id="senha" placeholder="••••••••">
            
            <button onclick="fazerLogin()">Entrar no Ranking</button>
            <p class="mt-6 text-xs text-gray-500">Não tem acesso? <a href="#" onclick="toggleForms()" class="text-blue-500 font-bold">Cadastre-se grátis</a></p>
        </div>

        <div id="cadastroForm" class="hidden">
            <p class="text-[10px] font-bold uppercase text-gray-500 mb-8 tracking-[0.3em]">Criar nova conta</p>
            
            <input type="text" id="cadNome" placeholder="Nome Completo">
            <input type="text" id="cadCPF" placeholder="CPF (Apenas números)">
            <input type="email" id="cadEmail" placeholder="Melhor E-mail">
            <input type="password" id="cadSenha" placeholder="Crie uma Senha">
            
            <button onclick="fazerCadastro()">Finalizar Cadastro</button>
            <p class="mt-6 text-xs text-gray-500">Já tem conta? <a href="#" onclick="toggleForms()" class="text-blue-500 font-bold">Fazer Login</a></p>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');

        function toggleForms() {
            document.getElementById('loginForm').classList.toggle('hidden');
            document.getElementById('cadastroForm').classList.toggle('hidden');
        }

        async function fazerLogin() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;

            // Busca o cliente no banco
            const { data, error } = await _supabase
                .from('clientes_buscador')
                .select('*')
                .eq('email', email)
                .eq('senha', senha)
                .maybeSingle();

            if (data) {
                // Gera um ID de sessão único para esta entrada
                const novoToken = Math.random().toString(36).substring(2, 15);
                
                // Atualiza o banco com a nova sessão (derrubando a anterior)
                await _supabase
                    .from('clientes_buscador')
                    .update({ last_session_id: novoToken })
                    .eq('id', data.id);

                // Salva no navegador do cliente
                localStorage.setItem('iFipe_Token', novoToken);
                localStorage.setItem('iFipe_User', data.email);

                // Redireciona para a vitrine
                window.location.href = 'melhor-preco.html';
            } else {
                alert("E-mail ou senha incorretos.");
            }
        }

        async function fazerCadastro() {
            const nome = document.getElementById('cadNome').value;
            const cpf = document.getElementById('cadCPF').value;
            const email = document.getElementById('cadEmail').value;
            const senha = document.getElementById('cadSenha').value;

            if(!nome || !cpf || !email || !senha) {
                alert("Preencha todos os campos!");
                return;
            }

            const { error } = await _supabase
                .from('clientes_buscador')
                .insert([{ nome, cpf, email, senha }]);

            if (error) {
                alert("Erro ao cadastrar: " + error.message);
            } else {
                alert("Cadastro realizado com sucesso! Agora faça seu login.");
                toggleForms();
            }
        }
    </script>
</body>
</html>
