<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - O Oráculo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #38383a; --input: #2c2c2e; }
        body { background: var(--bg); color: var(--text); font-family:-apple-system, sans-serif; margin:0; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .apple-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 2.5rem; width: 100%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .apple-input { background: var(--input); border: 1px solid var(--border); border-radius: 12px; padding: 16px; width: 100%; color: var(--text); outline: none; margin-bottom: 1rem; transition: 0.3s; }
        .apple-input:focus { border-color: #0071e3; }
        .apple-button { background: #fff; color: #000; font-weight: 900; border-radius: 50px; padding: 18px; width: 100%; cursor: pointer; text-transform: uppercase; border: none; transition: 0.3s; letter-spacing: 1px; }
        .apple-button:hover { background: #0071e3; color: #fff; transform: scale(1.02); }
        .brand { text-align: center; margin-bottom: 2rem; }
        .brand h1 { font-size: 3rem; font-weight: 900; italic: true; letter-spacing: -2px; line-height: 1; margin-bottom: 5px; font-style: italic; }
        .brand p { color: #0071e3; font-weight: 900; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div class="apple-card">
        <div class="brand">
            <h1>iFipe</h1>
            <p>The Apple Oracle</p>
        </div>

        <form onsubmit="realizarLogin(event)">
            <label class="text-[10px] font-black uppercase text-gray-500 ml-2 mb-1 block">Identificação</label>
            <input type="text" id="logUser" class="apple-input" placeholder="E-mail ou WhatsApp" required>
            
            <label class="text-[10px] font-black uppercase text-gray-500 ml-2 mb-1 block">Senha</label>
            <input type="password" id="logPass" class="apple-input" placeholder="••••••••" required>
            
            <button type="submit" id="btnEntrar" class="apple-button">Acessar Sistema</button>
        </form>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');

        async function realizarLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('btnEntrar');
            btn.innerText = "VERIFICANDO...";
            btn.disabled = true;

            const user = document.getElementById('logUser').value;
            const pass = document.getElementById('logPass').value;

            try {
                // 1. TENTA MASTER (Bryan) na tabela admin_users
                const { data: admin } = await _s.from('admin_users').select('*').eq('email', user).eq('senha', pass).maybeSingle();
                if(admin) {
                    localStorage.setItem('iFipe_Role', 'master');
                    window.location.href = 'master.html';
                    return;
                }

                // 2. TENTA ATACADISTA (Lojista) pelo WhatsApp ou Nome
                const { data: forn } = await _s.from('fornecedores').select('*').or(`whatsapp.eq.${user},nome.eq.${user}`).eq('senha', pass).maybeSingle();
                if(forn) {
                    if(!forn.ativo) throw new Error("LOJA BLOQUEADA. FALE COM O MASTER.");
                    localStorage.setItem('iFipe_Atacadista_ID', forn.id);
                    localStorage.setItem('iFipe_Role', 'atacadista');
                    window.location.href = 'atacadista.html';
                    return;
                }

                // 3. TENTA CLIENTE pelo E-mail
                const { data: cli } = await _s.from('clientes_buscador').select('*').eq('email', user).eq('senha', pass).maybeSingle();
                if(cli) {
                    if(!cli.aprovado) throw new Error("ACESSO PENDENTE DE APROVAÇÃO.");
                    localStorage.setItem('iFipe_Token', cli.id);
                    localStorage.setItem('iFipe_Role', 'cliente');
                    window.location.href = 'buscar.html';
                    return;
                }

                alert("DADOS INCORRETOS.");
            } catch (err) {
                alert(err.message);
            } finally {
                btn.innerText = "ACESSAR SISTEMA";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
