<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - A Fipe do iPhone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg: #f5f5f7; --card: #ffffff; --text: #1d1d1f; --border: #d2d2d7;
            --input: #f5f5f7; --blue: #0071e3; --gray-light: #e5e5e5; --gray-dark: #86868b;
        }
        body.dark-mode {
            --bg: #000; --card: #1c1c1e; --text: #fff; --border: #38383a;
            --input: #2c2c2e; --gray-light: #2c2c2e; --gray-dark: #6e6e73;
        }
        body {
            background: var(--bg); color: var(--text);
            font-family: 'Inter', sans-serif; margin: 0;
            -webkit-font-smoothing: antialiased; transition: background 0.3s, color 0.3s;
        }
        .glass-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 24px; padding: 1.5rem; box-shadow: 0 4px 30px rgba(0,0,0,0.05);
        }
        .btn-profile {
            background: var(--gray-light); color: var(--text); font-weight: 600;
            padding: 0.75rem; border-radius: 14px; cursor: pointer; flex: 1;
            font-size: 0.85rem; display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        }
        .btn-profile.active { background: var(--blue); color: white; }
        .btn-primary {
            background: var(--blue); color: white; font-weight: 600; padding: 0.75rem;
            border-radius: 14px; width: 100%; font-size: 0.85rem; transition: transform 0.2s;
        }
        .btn-primary:hover { background: #005bb5; transform: scale(1.02); }
        .btn-secondary {
            background: transparent; color: var(--blue); font-weight: 600; padding: 0.75rem;
            border-radius: 14px; border: 1px solid var(--border); width: 100%; font-size: 0.85rem;
        }
        .apple-input {
            background: var(--input); border: 1px solid var(--border); border-radius: 12px;
            padding: 10px 14px; font-size: 0.85rem; color: var(--text); width: 100%; outline: none;
        }
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            display: flex; align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content {
            background: var(--card); border-radius: 24px; padding: 2rem;
            max-width: 500px; width: 90%; max-height: 90vh; overflow-y: auto; position: relative;
        }
    </style>
</head>
<body class="dark-mode">

    <div id="telaManutencao" class="hidden fixed inset-0 z-[999999] bg-black flex flex-col items-center justify-center text-center p-4">
        <h1 class="text-4xl font-black text-red-600 mb-2">🚧 SISTEMA EM MANUTENÇÃO 🚧</h1>
        <p class="text-zinc-400 text-sm font-bold tracking-widest">O iFipe está recebendo melhorias. Retornamos em breve.</p>
    </div>

    <div class="absolute top-4 left-4 text-xs lg:text-sm font-mono text-yellow-500 flex items-center gap-1 z-10">
        <span class="w-1.5 h-1.5 rounded-full bg-yellow-500 animate-pulse"></span>
        <span class="font-bold">Binance USDT/BRL:</span> $<span id="topRateTicker">5,2907</span>
    </div>

    <main class="min-h-screen flex items-center justify-center px-4 py-8 lg:py-0">
        <div class="max-w-7xl w-full">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 items-center">
                
                <div class="glass-card h-full flex flex-col">
                    <h2 class="text-xl font-black text-center mb-2">Calculadora de iPhone Importado</h2>
                    <input type="number" id="calcUsd" class="apple-input font-mono text-base font-black mb-4" placeholder="PREÇO EM USD" oninput="calcularImportacao()">
                    <div class="bg-[#2c2c2e] p-3 rounded-xl mb-4 text-right border border-[#38383a]">
                        <span class="text-[8px] text-gray-400">Custo Base</span>
                        <div id="calcResult" class="font-mono text-xl font-black text-blue-500">R$ 0,00</div>
                    </div>
                    <div class="text-[9px] font-medium space-y-1 text-gray-300">
                        <div class="flex justify-between border-b border-[#38383a] pb-1"><span>ATACADO</span><span id="res_ata">R$ 0,00</span></div>
                        <div class="flex justify-between border-b border-[#38383a] pb-1"><span>ATACAREJO</span><span id="res_atcrj">R$ 0,00</span></div>
                        <div class="flex justify-between"><span>VAREJO</span><span id="res_var">R$ 0,00</span></div>
                    </div>
                </div>

                <div class="glass-card">
                    <div class="flex gap-2 mb-6">
                        <button id="profileBuscador" class="btn-profile active" onclick="setProfile('buscador')">BUSCADOR</button>
                        <button id="profileAnunciante" class="btn-profile" onclick="setProfile('anunciante')">ANUNCIANTE</button>
                    </div>
                    <div class="space-y-3">
                        <input type="text" id="loginUser" class="apple-input" placeholder="WHATSAPP OU E-MAIL">
                        <input type="password" id="loginPass" class="apple-input" placeholder="SENHA" onkeypress="if(event.key==='Enter') handleLogin()">
                        <button onclick="handleLogin()" class="btn-primary">ENTRAR</button>
                        <p id="loginMsg" class="text-xs text-red-500 text-center h-4"></p>
                    </div>
                    <div class="mt-6 flex flex-col gap-2 border-t border-[#38383a] pt-4">
                        <button onclick="abrirModalCadastroBuscador()" class="btn-secondary text-xs">CRIAR CONTA BUSCADOR</button>
                        <button onclick="abrirModalCadastroAnunciante()" class="btn-secondary text-xs text-gray-400 border-dashed">CRIAR CONTA ANUNCIANTE</button>
                    </div>
                </div>

                <div class="glass-card p-0 overflow-hidden flex items-stretch bg-[#1c1c1e] min-h-[280px]">
                    <a href="https://fabricademarcas.mercos.com/" target="_blank" class="block w-full h-full relative">
                        <img src="https://raw.githubusercontent.com/Isis-AI/iFipe/main/IMG_2549.PNG" 
                             class="w-full h-full object-cover rounded-2xl"
                             onerror="this.style.display='none'; this.nextElementSibling.classList.remove('hidden');">
                        <div class="hidden flex flex-col items-center justify-center h-full p-6 text-center">
                            <i class="fas fa-image text-3xl text-gray-600 mb-2"></i>
                            <span class="text-xs font-bold text-gray-500 uppercase">Banner Fábrica de Marcas</span>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </main>

    <div id="modalCadastroBuscador" class="modal-overlay hidden">
        <div class="modal-content">
            <h2 class="text-xl font-bold mb-4">Criar Conta - Buscador</h2>
            <form onsubmit="cadastrarBuscador(event)" class="space-y-3">
                <input type="text" id="buscadorNome" class="apple-input" placeholder="NOME COMPLETO" required>
                <input type="text" id="buscadorWhatsapp" class="apple-input" placeholder="WHATSAPP" required>
                <input type="password" id="buscadorSenha" class="apple-input" placeholder="SENHA" required>
                <div class="flex gap-2">
                    <button type="submit" class="btn-primary flex-1">CADASTRAR</button>
                    <button type="button" onclick="fecharModais()" class="btn-secondary flex-1">CANCELAR</button>
                </div>
            </form>
        </div>
    </div>

    <div id="modalCadastroAnunciante" class="modal-overlay hidden">
        <div class="modal-content">
            <h2 class="text-xl font-bold mb-4">Criar Conta - Anunciante</h2>
            <form onsubmit="cadastrarAnunciante(event)" class="space-y-3">
                <input type="text" id="anuncianteLoja" class="apple-input" placeholder="NOME DA LOJA" required>
                <input type="text" id="anuncianteDono" class="apple-input" placeholder="NOME DO DONO" required>
                <input type="text" id="anuncianteNumeroDono" class="apple-input" placeholder="WHATSAPP DO DONO" required>
                <input type="text" id="anuncianteAtendimento" class="apple-input" placeholder="WHATSAPP DE ATENDIMENTO" required>
                <input type="password" id="anuncianteSenha" class="apple-input" placeholder="SENHA" required>
                <div class="flex gap-2">
                    <button type="submit" class="btn-primary flex-1">SOLICITAR ACESSO</button>
                    <button type="button" onclick="fecharModais()" class="btn-secondary flex-1">CANCELAR</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let currentProfile = 'buscador', rateOraculo = 5.3507;

        window.onload = async () => {
            const { data: config } = await _s.from('sistema_config').select('status_geral').eq('id', 1).maybeSingle();
            if (config?.status_geral === 'off') document.getElementById('telaManutencao').classList.remove('hidden');
            
            const ws = new WebSocket('wss://stream.binance.com:9443/ws/usdtbrl@ticker');
            ws.onmessage = e => {
                const r = parseFloat(JSON.parse(e.data).c);
                rateOraculo = r + 0.06;
                document.getElementById('topRateTicker').innerText = r.toFixed(4);
                calcularImportacao();
            };
        };

        function setProfile(p) {
            currentProfile = p;
            document.getElementById('profileBuscador').classList.toggle('active', p === 'buscador');
            document.getElementById('profileAnunciante').classList.toggle('active', p === 'anunciante');
        }

        function calcularImportacao() {
            const usd = parseFloat(document.getElementById('calcUsd').value) || 0;
            const custo = (usd * rateOraculo) * 1.06;
            document.getElementById('calcResult').innerText = custo.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
            const ata = usd <= 750 ? custo * 1.20 : custo + 350;
            const atc = usd <= 750 ? custo * 1.40 : custo + 550;
            const varj = usd <= 750 ? custo * 1.55 : custo + 1000;
            document.getElementById('res_ata').innerText = ata.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
            document.getElementById('res_atcrj').innerText = atc.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
            document.getElementById('res_var').innerText = varj.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
        }

        async function handleLogin() {
            const user = document.getElementById('loginUser').value.trim();
            const pass = document.getElementById('loginPass').value;
            if (user.toLowerCase() === 'bryan' && pass === '96197577@') {
                localStorage.setItem('iFipe_Master_Auth', 'gov_absoluto');
                return window.location.replace('master.html');
            }
            const tabela = currentProfile === 'buscador' ? 'clientes_buscador' : 'fornecedores';
            const { data } = await _s.from(tabela).select('*').eq('senha', pass).eq('ativo', true);
            const enc = data?.find(r => r.whatsapp?.replace(/\D/g,'') === user.replace(/\D/g,'') || r.email === user.toLowerCase());
            if (!enc) return document.getElementById('loginMsg').innerText = 'Dados incorretos.';
            
            if (currentProfile === 'anunciante') {
                localStorage.setItem('iFipe_Anunciante', enc.id);
                window.location.replace('atacadista.html');
            } else {
                localStorage.setItem('iFipe_Token', enc.id);
                window.location.replace('buscar.html');
            }
        }

        function abrirModalCadastroBuscador() { document.getElementById('modalCadastroBuscador').classList.remove('hidden'); }
        function abrirModalCadastroAnunciante() { document.getElementById('modalCadastroAnunciante').classList.remove('hidden'); }
        function fecharModais() { document.querySelectorAll('.modal-overlay').forEach(m => m.classList.add('hidden')); }

        async function cadastrarBuscador(e) {
            e.preventDefault();
            const { error } = await _s.from('clientes_buscador').insert([{
                nome: document.getElementById('buscadorNome').value.toUpperCase(),
                whatsapp: document.getElementById('buscadorWhatsapp').value.replace(/\D/g,''),
                senha: document.getElementById('buscadorSenha').value,
                ativo: true
            }]);
            if (error) alert(error.message); else { alert('Sucesso! Logue agora.'); fecharModais(); }
        }

        async function cadastrarAnunciante(e) {
            e.preventDefault();
            const { error } = await _s.from('fornecedores').insert([{
                nome: document.getElementById('anuncianteLoja').value.toUpperCase(),
                nome_dono: document.getElementById('anuncianteDono').value.toUpperCase(),
                numero_dono: document.getElementById('anuncianteNumeroDono').value.replace(/\D/g,''),
                whatsapp: document.getElementById('anuncianteAtendimento').value.replace(/\D/g,''),
                senha: document.getElementById('anuncianteSenha').value,
                ativo: false
            }]);
            if (error) alert(error.message); else { alert('Solicitação enviada!'); fecharModais(); }
        }
    </script>
</body>
</html>
