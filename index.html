<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Encontre o melhor preço</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background:#000; color:#fff; font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin:0; overflow-x: hidden; }
        
        /* TICKER BINANCE RESPONSIVO */
        .ticker-bar { background:rgba(28, 28, 30, 0.9); backdrop-filter:blur(15px); border-bottom:1px solid #38383a; padding:12px 20px; position:sticky; top:0; z-index:100; display:flex; flex-wrap: wrap; justify-content:center; align-items:center; gap:15px; }
        @media (min-width: 1024px) { .ticker-bar { justify-content: flex-start; padding: 12px 40px; } }
        
        .ticker-val { color:#32d74b; font-family:monospace; font-size: 16px; font-weight:900; }
        .ticker-link { color:#ffcc00; font-size:10px; font-weight:900; text-transform:uppercase; text-decoration:none; letter-spacing:0.1em; transition:0.3s; }

        /* CONTAINER CENTRALIZADO */
        .main-wrapper { width: 100%; max-width: 1400px; margin: 0 auto; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        @media (min-width: 1024px) { .main-wrapper { padding: 40px; } }

        /* LOGO iFipe RESPONSIVO */
        .apple-logo { font-size: 4rem; font-weight: 900; font-style: italic; letter-spacing: -0.05em; line-height: 1; margin-bottom: 30px; text-align: center; }
        @media (min-width: 1024px) { .apple-logo { font-size: 8rem; margin-bottom: 40px; } }

        /* LINHA HORIZONTAL (DESKTOP) / COLUNA (MOBILE) */
        .responsive-row { display: flex; flex-direction: column; align-items: center; gap: 20px; width: 100%; }
        @media (min-width: 1024px) { .responsive-row { flex-direction: row; justify-content: center; gap: 30px; align-items: stretch; } }

        /* BANNERS LATERAIS AJUSTADOS */
        .banner-link { display: block; width: 100%; max-width: 350px; transition: 0.3s; border-radius: 24px; border: 1px solid #38383a; overflow: hidden; height: 200px; }
        @media (min-width: 1024px) { .banner-link { width: 300px; height: auto; } }
        .banner-link:hover { transform: translateY(-5px); border-color: #0071e3; }
        .banner-img { width: 100%; height: 100%; object-fit: cover; }

        /* LOGIN BOX CENTRAL RESPONSIVA */
        .login-box { width: 100%; max-width: 450px; background: #1c1c1e; border: 1px solid #38383a; border-radius: 28px; padding: 2rem; box-shadow: 0 20px 40px rgba(0,0,0,0.4); order: -1; }
        @media (min-width: 1024px) { .login-box { padding: 3rem; order: 0; } }
        
        .apple-input { background: #2c2c2e; border: 1px solid #38383a; border-radius: 14px; padding: 16px; width: 100%; color: white; outline: none; margin-bottom: 1rem; font-size: 15px; }
        .apple-button { background: #fff; color: #000; font-weight: 900; border-radius: 50px; padding: 18px; width: 100%; cursor: pointer; text-transform: uppercase; border: none; font-size: 14px; transition: 0.3s; }
        
        .link-nav { color: #0071e3; cursor: pointer; font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; text-decoration: none; display: block; margin-top: 15px; }
        label { display: block; text-transform: uppercase; font-size: 9px; color: #86868b; margin-bottom: 5px; font-weight: 900; letter-spacing: 0.1em; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="ticker-bar">
        <a href="https://wa.me/+15616760652" target="_blank" class="ticker-link">COMPRAR USDT COM ORÁCULO</a>
        <div class="flex items-center gap-2">
            <span class="text-[9px] text-gray-500 font-black uppercase">USDT/BRL BINANCE:</span>
            <span class="ticker-val" id="usdt_val">$ --</span>
        </div>
    </div>

    <div class="main-wrapper">
        <h1 class="apple-logo">iFipe</h1>

        <div class="responsive-row">
            
            <a href="https://fabricademarcas.mercos.com/" target="_blank" class="banner-link">
                <img src="https://zmgosywpwidypxyhxkry.supabase.co/storage/v1/object/public/assets/IMG_2549.PNG" class="banner-img" alt="Fábrica de Marcas">
            </a>

            <div class="login-box">
                <div class="text-center mb-6">
                    <h2 class="text-xl md:text-2xl font-black italic">Encontre o melhor preço</h2>
                    <p class="text-[9px] text-blue-500 font-black uppercase tracking-[0.3em] mt-2">BUSCADOR APPLE ONLINE</p>
                </div>

                <div id="loginForm">
                    <label>E-mail de Acesso</label>
                    <input type="email" id="logEmail" class="apple-input" placeholder="seu@email.com">
                    <label>Senha</label>
                    <input type="password" id="logPass" class="apple-input" placeholder="••••••••">
                    <button onclick="realizarLogin()" class="apple-button">Entrar no iFipe</button>
                    
                    <div class="text-center mt-6">
                        <span class="link-nav" onclick="toggleForm()">FAZER MEU CADASTRO</span>
                        <span class="link-nav" onclick="alert('Contate o administrador para redefinir sua senha.')">ESQUECI MINHA SENHA</span>
                    </div>
                </div>

                <div id="registerForm" class="hidden">
                    <label>Nome Completo</label><input type="text" id="regNome" class="apple-input">
                    <label>CPF</label><input type="text" id="regCpf" class="apple-input">
                    <label>E-mail Oficial</label><input type="email" id="regEmail" class="apple-input">
                    <label>WhatsApp</label><input type="text" id="regWhats" class="apple-input">
                    <label>Criar Senha</label><input type="password" id="regPass" class="apple-input">
                    <button onclick="solicitarCadastro()" class="apple-button">Enviar Solicitação</button>
                    <span class="link-nav text-center" onclick="toggleForm()">Voltar ao Login</span>
                </div>
                <p id="msg" class="mt-4 text-center text-[10px] font-black uppercase tracking-widest"></p>
            </div>

            <a href="https://linktr.ee/vipbrecossistema" target="_blank" class="banner-link">
                <img src="https://zmgosywpwidypxyhxkry.supabase.co/storage/v1/object/public/assets/eco.png" class="banner-img" alt="Ecossistema Apple">
            </a>

        </div>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');

        function iniciarCambio() {
            const socket = new WebSocket('wss://stream.binance.com:9443/ws/usdtbrl@ticker');
            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                document.getElementById('usdt_val').innerText = `$ ${parseFloat(data.c).toFixed(4).replace('.',',')}`;
            };
        }
        iniciarCambio();

        window.onload = () => { if(localStorage.getItem('iFipe_Token')) window.location.replace('buscar.html'); };
        function toggleForm() { document.getElementById('loginForm').classList.toggle('hidden'); document.getElementById('registerForm').classList.toggle('hidden'); }

        async function realizarLogin() {
            const e = document.getElementById('logEmail').value, p = document.getElementById('logPass').value, m = document.getElementById('msg');
            const { data } = await _s.from('clientes_buscador').select('*').eq('email', e).eq('senha', p).maybeSingle();
            if(data) {
                if(!data.aprovado) { m.innerText = "ACESSO PENDENTE."; m.style.color = "#ffcc00"; return; }
                localStorage.setItem('iFipe_Token', data.id);
                window.location.replace('buscar.html');
            } else { m.innerText = "DADOS INCORRETOS."; m.style.color = "#ff3b30"; }
        }

        async function solicitarCadastro() {
            const n = document.getElementById('regNome').value, c = document.getElementById('regCpf').value.replace(/\D/g, ''), e = document.getElementById('regEmail').value, w = document.getElementById('regWhats').value, p = document.getElementById('regPass').value, m = document.getElementById('msg');
            const { error } = await _s.from('clientes_buscador').insert([{ nome: n, cpf: c, email: e, whatsapp: w, senha: p, aprovado: false }]);
            if(!error) { m.innerText = "🚀 ENVIADO! AGUARDE APROVAÇÃO."; m.style.color = "#32d74b"; setTimeout(toggleForm, 3000); }
        }
    </script>
</body>
</html>
