<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Buscador VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #38383a; --input: #2c2c2e; --blue-apple: #0071e3; }
        body.light-mode { --bg: #f5f5f7; --card: #fff; --text: #1d1d1f; --border: #d2d2d7; --input: #e8e8ed; }
        body { background: var(--bg); color: var(--text); font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin:0; transition: 0.3s; }
        .nav-bar { background:rgba(28, 28, 30, 0.8); backdrop-filter:blur(15px); border-bottom:1px solid var(--border); padding:15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:100; flex-wrap: wrap; gap: 10px;}
        .filter-bar { background: var(--card); padding:15px; border-radius:16px; margin-top:20px; border:1px solid var(--border); }
        .apple-input { background: var(--input); border: 1px solid var(--border); border-radius: 10px; padding: 10px; width: 100%; color: var(--text); outline: none; font-size: 12px; text-align: center; }
        .product-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 12px; transition: 0.3s; position: relative; }
        .product-card:hover { border-color: #0071e3; transform: translateY(-4px); }
        .price-text { font-size: 22px; font-weight: 900; color: var(--text); letter-spacing: -0.05em; text-align: right; }
        .buy-button { background: #0071e3; color: #fff; font-weight: 900; border-radius: 50px; padding: 12px; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 11px; text-align: center; display: block; text-decoration: none; margin-top: 16px; transition: 0.3s; letter-spacing: 0.05em; }
        .hidden { display: none !important; }
        #loginOverlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .auth-box { border: 1px solid var(--border); padding: 40px; border-radius: 24px; background: #0a0a0a; text-align: center; width: 380px; }
        .btn-apple { background: var(--blue-apple); color: #fff; font-weight: 900; border-radius: 12px; padding: 14px; cursor: pointer; border: none; font-size: 11px; transition: 0.3s; width: 100%; text-transform: uppercase; }
        .link-nav { color: #0071e3; cursor: pointer; font-size: 10px; font-weight: 900; text-transform: uppercase; display: block; margin-top: 15px; text-align: center;}
    </style>
</head>
<body id="appBody">

    <div id="loginOverlay">
        <div class="auth-box">
            <h1 class="text-4xl font-black italic mb-2">iFipe</h1>
            <p class="text-[10px] text-zinc-500 mb-8 tracking-widest font-bold">O BUSCADOR DO ATACADO</p>
            <div id="loginForm">
                <input type="text" id="user" class="apple-input mb-3" placeholder="WHATSAPP OU EMAIL">
                <input type="password" id="pass" class="apple-input mb-4" placeholder="SUA SENHA" onkeypress="if(event.key==='Enter') handleUniversalLogin()">
                <button onclick="handleUniversalLogin()" class="btn-apple">ENTRAR NO iFIPE</button>
                <p id="msg" class="text-[10px] font-black text-zinc-500 mt-4 h-4"></p>
                <span class="link-nav" onclick="toggleForm()">FAZER MEU CADASTRO</span>
            </div>
            <div id="registerForm" class="hidden">
                <form onsubmit="solicitarCadastro(event)">
                    <input type="text" id="regNome" class="apple-input mb-3" placeholder="NOME COMPLETO" required>
                    <input type="text" id="regWhats" class="apple-input mb-3" placeholder="WHATSAPP" required>
                    <input type="password" id="regPass" class="apple-input mb-4" placeholder="CRIAR SENHA" required>
                    <button type="submit" class="btn-apple">ENVIAR SOLICITAÇÃO</button>
                    <span class="link-nav" onclick="toggleForm()">VOLTAR AO LOGIN</span>
                </form>
            </div>
        </div>
    </div>

    <div id="mainContent" class="hidden">
        <nav class="nav-bar">
            <h1 class="text-2xl font-black italic">iFipe</h1>
            <button onclick="logout()" class="text-red-500 font-black text-[10px] uppercase">Sair</button>
        </nav>
        <main class="max-w-7xl mx-auto p-4">
             <div id="gridGeral" class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-8"></div>
        </main>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');

        async function handleUniversalLogin() {
            const u = document.getElementById('user').value.trim().toLowerCase();
            const p = document.getElementById('pass').value;
            const msg = document.getElementById('msg');
            if(!u || !p) { msg.innerText = "PREENCHA TUDO."; return; }
            msg.innerText = "VERIFICANDO...";

            // 1. Tenta Login como Atacadista
            const { data: ata } = await _s.from('fornecedores').select('id, ativo').or(`email.eq.${u},whatsapp.eq.${u}`).eq('senha', p).maybeSingle();
            if (ata) {
                if (!ata.ativo) { msg.innerText = "ACESSO BLOQUEADO."; return; }
                localStorage.setItem('iFipe_Anunciante', ata.id);
                window.location.replace('atacadista.html');
                return;
            }

            // 2. Tenta Login como Cliente
            const { data: cli } = await _s.from('clientes_buscador').select('id, ativo').or(`email.eq.${u},whatsapp.eq.${u}`).eq('senha', p).maybeSingle();
            if (cli) {
                if (!cli.ativo) { msg.innerText = "CONTA BLOQUEADA."; return; }
                localStorage.setItem('iFipe_Token', cli.id);
                window.location.reload();
                return;
            }
            msg.innerText = "ACESSO NEGADO.";
        }

        function toggleForm() { document.getElementById('loginForm').classList.toggle('hidden'); document.getElementById('registerForm').classList.toggle('hidden'); }
        function logout() { localStorage.clear(); window.location.reload(); }

        window.onload = async () => {
            const token = localStorage.getItem('iFipe_Token');
            if(token) {
                const { data } = await _s.from('clientes_buscador').select('*').eq('id', token).single();
                if(data) {
                    document.getElementById('loginOverlay').classList.add('hidden');
                    document.getElementById('mainContent').classList.remove('hidden');
                }
            }
        };
    </script>
</body>
</html>
