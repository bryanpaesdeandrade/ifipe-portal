<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - A Fipe do iPhone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #38383a; --input: #2c2c2e; }
        body.light-mode { --bg: #f5f5f7; --card: #fff; --text: #1d1d1f; --border: #d2d2d7; --input: #e8e8ed; }

        body { background: var(--bg); color: var(--text); font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin:0; overflow-x: hidden; transition: 0.3s; }
        
        /* Ticker Bar: Proteção contra sobreposição no Mobile */
        .ticker-bar { background:rgba(28, 28, 30, 0.9); backdrop-filter:blur(15px); border-bottom:1px solid var(--border); padding:10px 20px; position:sticky; top:0; z-index:100; display:flex; justify-content: space-between; align-items:center; }
        body.light-mode .ticker-bar { background: rgba(255,255,255,0.8); }
        .ticker-val { color:#32d74b; font-family:monospace; font-size: 18px; font-weight:900; }
        .ticker-label { color:#86868b; font-size:10px; font-weight:900; text-transform:uppercase; letter-spacing:0.1em; }

        .main-wrapper { width: 100%; max-width: 1400px; margin: 0 auto; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: calc(100vh - 60px); }
        
        /* Header Dinâmico */
        .brand-header { display: flex; flex-direction: column; align-items: center; text-align: center; margin: 30px 0; gap: 5px; }
        .apple-logo { font-size: 3.5rem; font-weight: 900; font-style: italic; letter-spacing: -0.05em; line-height: 1; margin: 0; }
        .slogan-sep { display: none; font-size: 3.5rem; color: var(--border); font-weight: 100; }
        .slogan-text { font-size: 1.2rem; font-weight: 900; font-style: italic; color: #0071e3; text-transform: uppercase; letter-spacing: 0.05em; margin: 0; }

        @media (min-width: 1024px) { 
            .brand-header { flex-direction: row; gap: 25px; margin: 50px 0; }
            .apple-logo { font-size: 8rem; }
            .slogan-sep { display: block; }
            .slogan-text { font-size: 3rem; }
            .ticker-val { font-size: 22px; }
        }
        
        /* Ajuste de Ordem no Mobile */
        .responsive-grid { display: flex; flex-direction: column; align-items: center; gap: 30px; width: 100%; }
        .order-1 { order: 1; } /* Fábrica de Marcas */
        .order-2 { order: 2; } /* Login */
        .order-3 { order: 3; } /* Ecossistema */

        @media (min-width: 1024px) { 
            .responsive-grid { flex-direction: row; justify-content: center; align-items: center; gap: 40px; } 
            .order-2 { order: 2; } 
        }

        .banner-link { display: block; width: 100%; max-width: 320px; transition: 0.3s; border-radius: 24px; border: 1px solid var(--border); overflow: hidden; height: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        
        .login-box { width: 100%; max-width: 400px; background: var(--card); border: 1px solid var(--border); border-radius: 28px; padding: 2rem; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .apple-input { background: var(--input); border: 1px solid var(--border); border-radius: 14px; padding: 16px; width: 100%; color: var(--text); outline: none; margin-bottom: 1rem; font-size: 14px; }
        .apple-button { background: var(--text); color: var(--bg); font-weight: 900; border-radius: 50px; padding: 18px; width: 100%; cursor: pointer; text-transform: uppercase; border: none; font-size: 13px; transition: 0.3s; }
        .apple-button:hover { background: #0071e3; color: #fff; }
        
        .link-nav { color: #0071e3; cursor: pointer; font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; display: block; margin-top: 18px; }
        
        label { display: block; text-transform: uppercase; font-size: 9px; color: #86868b; margin-bottom: 6px; font-weight: 900; letter-spacing: 0.1em; }
        .hidden { display: none !important; }

        /* Rodapé Jurídico */
        .footer-juridico { width: 100%; padding: 30px 0; display: flex; justify-content: center; align-items: center; gap: 10px; margin-top: auto; }
        .footer-juridico span { font-size: 9px; color: #48484a; font-weight: 900; text-transform: uppercase; cursor: pointer; }
        .footer-sep-bar { color: #2c2c2e; font-size: 12px; }

        /* Modais de Scroll */
        .modal-juridico { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-body { background: var(--card); border: 1px solid var(--border); border-radius: 24px; max-width: 850px; width: 100%; max-height: 80vh; display: flex; flex-direction: column; position: relative; }
        .modal-header { padding: 25px 30px 15px 30px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); flex-shrink: 0; }
        .modal-scroll-area { padding: 20px 30px 30px 30px; overflow-y: auto; flex-grow: 1; }
        .modal-text { font-size: 13px; line-height: 1.8; color: #d1d1d6; white-space: pre-line; text-align: justify; }

        .theme-toggle { background: var(--input); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; border-radius: 50px; cursor: pointer; font-size: 12px; font-weight: 700; transition: 0.3s; flex-shrink: 0; }
    </style>
</head>
<body>

    <div class="ticker-bar">
        <div class="flex items-center gap-2">
            <span class="ticker-label">USDT/BRL:</span>
            <span class="ticker-val" id="usdt_val">$ --</span>
        </div>
        <button onclick="toggleTheme()" id="themeBtn" class="theme-toggle">🌙 Modo</button>
    </div>

    <div class="main-wrapper">
        <header class="brand-header">
            <h1 class="apple-logo">iFipe</h1>
            <div class="slogan-sep">|</div>
            <p class="slogan-text">A Fipe do iPhone</p>
        </header>

        <div class="responsive-grid">
            <a href="https://fabricademarcas.mercos.com/" target="_blank" class="banner-link order-1">
                <img src="https://zmgosywpwidypxyhxkry.supabase.co/storage/v1/object/public/assets/IMG_2549.PNG" class="w-full h-auto block" alt="Fábrica de Marcas">
            </a>

            <div class="login-box order-2">
                <div class="text-center mb-8">
                    <h2 class="text-xl font-black italic">Encontre o melhor preço</h2>
                    <p class="text-[9px] text-blue-500 font-black uppercase tracking-[0.3em] mt-3">BUSCADOR APPLE ONLINE</p>
                </div>

                <form id="loginForm" onsubmit="realizarLogin(event)">
                    <label>E-mail de Acesso</label>
                    <input type="email" id="logEmail" class="apple-input" placeholder="seu@email.com" required>
                    <label>Senha</label>
                    <input type="password" id="logPass" class="apple-input" placeholder="••••••••" required>
                    <button type="submit" class="apple-button w-full">ENTRAR NO iFIPE</button>
                    <div class="text-center mt-6">
                        <span class="link-nav" onclick="toggleForm()">FAZER MEU CADASTRO</span>
                    </div>
                </form>

                <form id="registerForm" class="hidden" onsubmit="solicitarCadastro(event)">
                    <label>Nome Completo</label><input type="text" id="regNome" class="apple-input" required>
                    <label>CPF</label><input type="text" id="regCpf" class="apple-input" required>
                    <label>E-mail Oficial</label><input type="email" id="regEmail" class="apple-input" required>
                    <label>WhatsApp</label><input type="text" id="regWhats" class="apple-input" required>
                    <label>Criar Senha</label><input type="password" id="regPass" class="apple-input" required>
                    <button type="submit" class="apple-button w-full">ENVIAR SOLICITAÇÃO</button>
                    <span class="link-nav text-center mt-4" onclick="toggleForm()">VOLTAR AO LOGIN</span>
                </form>
            </div>

            <a href="https://linktr.ee/vipbrecossistema" target="_blank" class="banner-link order-3">
                <img src="https://zmgosywpwidypxyhxkry.supabase.co/storage/v1/object/public/assets/eco.png" class="w-full h-auto block" alt="Ecossistema Apple">
            </a>
        </div>

        <div class="footer-juridico">
            <span onclick="abrirJuridico('termos')">Termos de Uso</span>
            <div class="footer-sep-bar">|</div>
            <span onclick="abrirJuridico('privacidade')">Privacidade</span>
            <div class="footer-sep-bar">|</div>
            <span onclick="abrirJuridico('lgpd')">LGPD</span>
        </div>
    </div>

    <div id="modalJuridico" class="modal-juridico" onclick="fecharJuridico()">
        <div class="modal-body" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 id="modalTitulo" class="text-[14px] font-black uppercase text-blue-500"></h2>
                <span class="btn-fechar-modal" onclick="fecharJuridico()">Fechar [x]</span>
            </div>
            <div class="modal-scroll-area">
                <div id="modalConteudo" class="modal-text"></div>
            </div>
        </div>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');

        const textosJuridicos = {
            termos: { titulo: "Termos de Uso", texto: `1. Natureza Jurídica: O iFipe.com.br é uma plataforma informativa de dados fornecidos por terceiros. Não participamos de negociações ou transações financeiras.\n2. Responsabilidade: Não assumimos responsabilidade por atos, pagamentos ou defeitos de produtos de lojistas listados.\n3. Obrigações: O usuário deve realizar sua própria verificação antes de qualquer negociação.` },
            privacidade: { titulo: "Privacidade", texto: `1. Coleta de Dados: Tratamos nome, e-mail e WhatsApp para fins de autenticação.\n2. Finalidade: Manutenção da conta e comunicação operacional. Não vendemos informações para terceiros.\n3. Segurança: Utilizamos criptografia e HTTPS.` },
            lgpd: { titulo: "LGPD", texto: `1. Controlador: O iFipe.com.br observa rigorosamente a Lei nº 13.709/2018.\n2. Direitos: O titular pode solicitar acesso, correção ou eliminação de dados a qualquer momento.\n3. Contato (DPO): bryan.paes@icloud.com` }
        };

        function toggleTheme() {
            const b = document.body; b.classList.toggle('light-mode');
            const isLight = b.classList.contains('light-mode');
            document.getElementById('themeBtn').innerText = isLight ? "☀️ Modo" : "🌙 Modo";
            localStorage.setItem('iFipe_Theme', isLight ? 'light' : 'dark');
        }

        function abrirJuridico(tipo) {
            document.getElementById('modalTitulo').innerText = textosJuridicos[tipo].titulo;
            document.getElementById('modalConteudo').innerText = textosJuridicos[tipo].texto;
            document.getElementById('modalJuridico').style.display = 'flex';
            document.body.style.overflow = 'hidden';
        }

        function fecharJuridico() {
            document.getElementById('modalJuridico').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function iniciarCambio() {
            const socket = new WebSocket('wss://stream.binance.com:9443/ws/usdtbrl@ticker');
            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                const el = document.getElementById('usdt_val');
                if(el) el.innerText = `$ ${parseFloat(data.c).toFixed(4).replace('.',',')}`;
            };
        }

        window.onload = () => {
            if(localStorage.getItem('iFipe_Theme') === 'light') toggleTheme();
            iniciarCambio();
        };

        function toggleForm() { 
            document.getElementById('loginForm').classList.toggle('hidden'); 
            document.getElementById('registerForm').classList.toggle('hidden'); 
        }

        async function realizarLogin(event) {
            event.preventDefault();
            const e = document.getElementById('logEmail').value;
            const p = document.getElementById('logPass').value;
            const { data } = await _s.from('clientes_buscador').select('*').eq('email', e).eq('senha', p).maybeSingle();
            if(data && data.aprovado) {
                localStorage.setItem('iFipe_Token', data.id);
                window.location.href = 'buscar.html';
            } else if(data) { alert("ACESSO PENDENTE DE LIBERAÇÃO."); } 
            else { alert("E-MAIL OU SENHA INCORRETOS."); }
        }

        async function solicitarCadastro(event) {
            event.preventDefault();
            const { error } = await _s.from('clientes_buscador').insert([{ 
                nome: document.getElementById('regNome').value, 
                cpf: document.getElementById('regCpf').value.replace(/\D/g,''),
                email: document.getElementById('regEmail').value,
                whatsapp: document.getElementById('regWhats').value,
                senha: document.getElementById('regPass').value,
                aprovado: false
            }]);
            if(!error) { alert("SOLICITAÇÃO ENVIADA COM SUCESSO!"); toggleForm(); }
            else { alert("ERRO AO CADASTRAR."); }
        }
    </script>
</body>
</html>
