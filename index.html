<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Painel Lojista</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #000000; color: #ffffff; font-family: -apple-system, sans-serif; }
        .apple-card { background: #1c1c1e; border: 1px solid #38383a; border-radius: 18px; }
        .apple-input { background: #2c2c2e; border: 1px solid #38383a; border-radius: 10px; padding: 12px; width: 100%; color: white; outline: none; }
        .apple-button { background: #ffffff; color: #000000; font-weight: 600; border-radius: 20px; padding: 14px; transition: all 0.3s; cursor: pointer; width: 100%; }
        .apple-button:hover { background: #f5f5f7; transform: scale(1.01); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 text-sm">
    <h1 class="text-3xl font-bold mb-8 tracking-tight italic">iFipe</h1>
    <div class="apple-card p-8 w-full max-w-md shadow-2xl">
        <h2 class="text-xl font-semibold mb-6 text-center text-gray-200 uppercase tracking-widest text-[10px]">Publicar Oferta Real-Time</h2>
        <form id="priceForm" class="space-y-4">
            <div>
                <label class="block text-[10px] font-medium text-gray-400 mb-1 uppercase tracking-wider">Seu Estabelecimento</label>
                <select id="fornecedor_id" class="apple-input" required><option value="">Carregando...</option></select>
            </div>
            <div>
                <label class="block text-[10px] font-medium text-gray-400 mb-1 uppercase tracking-wider">Modelo do Aparelho</label>
                <select id="produto_mestre" class="apple-input" required><option value="">Selecione o iPhone</option></select>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-[10px] font-medium text-gray-400 mb-1 uppercase tracking-wider">Memória</label>
                    <select id="memoria" class="apple-input" required disabled><option value="">-</option></select>
                </div>
                <div>
                    <label class="block text-[10px] font-medium text-gray-400 mb-1 uppercase tracking-wider">Cor</label>
                    <select id="cor" class="apple-input" required disabled><option value="">-</option></select>
                </div>
            </div>
            <div>
                <label class="block text-[10px] font-medium text-gray-400 mb-1 uppercase tracking-wider">Região de Origem</label>
                <select id="regiao_id" class="apple-input" required><option value="">Carregando...</option></select>
            </div>
            <div>
                <label class="block text-[10px] font-medium text-gray-400 mb-1 uppercase tracking-wider">Preço de Venda (R$)</label>
                <input type="number" step="0.01" id="preco" class="apple-input" placeholder="Ex: 7699.77" required>
            </div>
            <button type="submit" class="apple-button mt-4">Publicar no iFipe</button>
        </form>
        <p id="status" class="mt-4 text-center text-[11px] font-medium"></p>
    </div>

    <script>
        const SUPABASE_URL = 'https://zmgosywpwidypxyhxkry.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function carregarDados() {
            const { data: f } = await _supabase.from('fornecedores').select('id, nome').order('nome');
            if (f) document.getElementById('fornecedor_id').innerHTML = f.map(i => `<option value="${i.id}">${i.nome}</option>`).join('');

            const { data: m } = await _supabase.from('produtos_mestre').select('id, nome').order('nome');
            if (m) document.getElementById('produto_mestre').innerHTML = '<option value="">Selecione o Modelo</option>' + m.map(i => `<option value="${i.id}">${i.nome}</option>`).join('');

            const { data: r } = await _supabase.from('regioes').select('id, nome, bandeira');
            if (r) document.getElementById('regiao_id').innerHTML = r.map(i => `<option value="${i.id}">${i.bandeira || ''} ${i.nome}</option>`).join('');
        }

        document.getElementById('produto_mestre').addEventListener('change', async (e) => {
            const { data: v } = await _supabase.from('variacoes').select('capacidade, cor').eq('produto_id', e.target.value);
            if (v) {
                const mems = [...new Set(v.map(x => x.capacidade))];
                const cors = [...new Set(v.map(x => x.cor))];
                document.getElementById('memoria').innerHTML = mems.map(m => `<option value="${m}">${m}</option>`).join('');
                document.getElementById('cor').innerHTML = cors.map(c => `<option value="${c}">${c}</option>`).join('');
                document.getElementById('memoria').disabled = false;
                document.getElementById('cor').disabled = false;
            }
        });

        document.getElementById('priceForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const status = document.getElementById('status');
            status.innerText = "Publicando...";
            const { data: varId } = await _supabase.from('variacoes').select('id').eq('produto_id', document.getElementById('produto_mestre').value).eq('capacidade', document.getElementById('memoria').value).eq('cor', document.getElementById('cor').value).single();
            const { error } = await _supabase.from('ofertas').insert([{
                fornecedor_id: parseInt(document.getElementById('fornecedor_id').value),
                variacao_id: varId.id,
                regiao_id: parseInt(document.getElementById('regiao_id').value),
                preco: parseFloat(document.getElementById('preco').value),
                condicao: 'Novo'
            }]);
            if (error) { status.innerText = "Erro ao publicar."; status.style.color = "#ff453a"; }
            else { status.innerText = "Sucesso! 🚀"; status.style.color = "#32d74b"; e.target.reset(); }
        });

        carregarDados();
    </script>
</body>
</html>
