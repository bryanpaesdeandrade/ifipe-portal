<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Portal Unificado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #38383a; --input: #2c2c2e; --blue: #0071e3; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin: 0; transition: 0.3s; }
        .apple-input { background: var(--input); border: 1px solid var(--border); border-radius: 12px; padding: 12px; width: 100%; color: var(--text); outline: none; font-size: 14px; text-align: center; }
        .btn-main { background: var(--blue); color: #fff; font-weight: 900; border-radius: 12px; padding: 14px; width: 100%; cursor: pointer; border: none; text-transform: uppercase; transition: 0.2s; }
        .btn-main:hover { opacity: 0.9; transform: scale(1.01); }
        .product-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; transition: 0.3s; }
        .hidden { display: none !important; }
        #loginOverlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .auth-box { border: 1px solid var(--border); padding: 40px; border-radius: 24px; background: #0a0a0a; text-align: center; width: 380px; }
        .price-text { font-size: 22px; font-weight: 900; color: #fff; letter-spacing: -0.05em; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="auth-box">
            <h1 class="text-4xl font-black italic mb-2">iFipe</h1>
            <p class="text-[10px] text-zinc-500 mb-8 tracking-widest font-bold uppercase">Sistema de Inteligência</p>
            
            <div id="loginForm" class="space-y-3">
                <input type="text" id="user" class="apple-input" placeholder="LOGIN OU WHATSAPP">
                <input type="password" id="pass" class="apple-input" placeholder="SENHA">
                <button onclick="handleUniversalLogin()" class="btn-main">Acessar iFipe</button>
                <p id="msg" class="text-[10px] font-black text-red-500 mt-4 h-4"></p>
                
                <div class="pt-6 border-t border-zinc-800 mt-6">
                    <button onclick="emergencyReset()" class="text-[9px] text-zinc-600 font-bold hover:text-red-500 uppercase">⚠️ Limpar Sessão / Reset</button>
                </div>
            </div>
        </div>
    </div>

    <div id="mainContent" class="hidden">
        <nav class="p-6 border-b border-zinc-800 flex justify-between items-center sticky top-0 bg-black/80 backdrop-blur-md z-50">
            <h1 class="text-2xl font-black italic">iFipe <span class="text-blue-500 text-sm not-italic font-medium">Buscador VIP</span></h1>
            <div class="flex items-center gap-4">
                <span id="userName" class="text-[10px] font-black text-zinc-500 uppercase"></span>
                <button onclick="logout()" class="text-red-500 font-black text-[10px] uppercase border border-red-500/30 px-3 py-1.5 rounded-lg hover:bg-red-500 hover:text-white transition">Sair</button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 pb-20 pt-8">
            <div class="mb-10 text-center">
                <input type="text" id="mainSearch" class="apple-input !text-left !text-xl px-8 py-5 max-w-2xl border-2 border-blue-500/50 focus:border-blue-500" placeholder="O que você está procurando hoje?" oninput="renderRanking()">
            </div>

            <div id="gridGeral" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                </div>
        </main>
    </div>

<script>
    const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
    let dbOfertas = [];

    async function handleUniversalLogin() {
        const u = document.getElementById('user').value.trim();
        const p = document.getElementById('pass').value;
        const msg = document.getElementById('msg');
        msg.innerText = "VALIDANDO...";

        // 1. CHECAGEM MASTER (A CHAVE MESTRA)
        if(u.toLowerCase() === 'bryan' && p === '96197577') {
            localStorage.setItem('iFipe_Master_Auth', 'gov_absoluto');
            localStorage.setItem('iFipe_Status_Override', 'true');
            localStorage.setItem('iFipe_Token', 'admin_bypass');
            window.location.replace('master.html');
            return;
        }

        // 2. TENTA LOGIN ATACADISTA (ANUNCIANTE)
        const { data: ata } = await _s.from('fornecedores').select('*').or(`email.eq.${u},whatsapp.eq.${u}`).eq('senha', p).maybeSingle();
        if (ata) {
            if(ata.id == 9999) { // Se for o Lojista 9999, ele é Master tbm
                localStorage.setItem('iFipe_Master_Auth', 'gov_absoluto');
                localStorage.setItem('iFipe_Status_Override', 'true');
            }
            localStorage.setItem('iFipe_Anunciante', ata.id);
            window.location.replace('atacadista.html');
            return;
        }

        // 3. TENTA LOGIN CLIENTE
        const { data: cli } = await _s.from('clientes_buscador').select('*').or(`email.eq.${u},whatsapp.eq.${u}`).eq('senha', p).maybeSingle();
        if (cli) {
            localStorage.setItem('iFipe_Token', cli.id);
            localStorage.setItem('iFipe_User_Name', cli.nome);
            startBuscador();
            return;
        }

        msg.innerText = "ACESSO NEGADO.";
    }

    async function startBuscador() {
        document.getElementById('loginOverlay').classList.add('hidden');
        document.getElementById('mainContent').classList.remove('hidden');
        document.getElementById('userName').innerText = localStorage.getItem('iFipe_User_Name') || 'Usuário';
        
        const { data } = await _s.from('ofertas').select('*, fornecedores(nome, whatsapp), variacoes(capacidade, cor, produtos_mestre(nome))').gt('quantidade', 0);
        dbOfertas = data || [];
        renderRanking();
    }

    function renderRanking() {
        const search = document.getElementById('mainSearch').value.toLowerCase();
        const filtered = dbOfertas.filter(o => 
            o.variacoes.produtos_mestre.nome.toLowerCase().includes(search) ||
            o.fornecedores.nome.toLowerCase().includes(search)
        );

        document.getElementById('gridGeral').innerHTML = filtered.map(o => `
            <div class="product-card">
                <div class="flex justify-between items-start mb-2">
                    <span class="text-[8px] bg-blue-500/20 text-blue-400 px-2 py-1 rounded font-black uppercase">${o.condicao}</span>
                    <span class="text-[9px] text-zinc-500 font-bold">${o.quantidade} UN EM ESTOQUE</span>
                </div>
                <h2 class="text-lg font-black">${o.variacoes.produtos_mestre.nome}</h2>
                <p class="text-[10px] text-zinc-400 uppercase font-bold mb-4">${o.variacoes.capacidade} | ${o.variacoes.cor}</p>
                <div class="border-t border-zinc-800 pt-4 flex justify-between items-center">
                    <div class="flex flex-col">
                        <span class="text-[8px] text-zinc-600 font-black uppercase">Vendido por</span>
                        <span class="text-[11px] text-green-500 font-black uppercase">${o.fornecedores.nome}</span>
                    </div>
                    <div class="price-text text-right">R$ ${o.preco.toLocaleString('pt-BR')}</div>
                </div>
                <a href="https://wa.me/${o.fornecedores.whatsapp}" target="_blank" class="btn-main block text-center mt-4 !py-3 !text-[10px]">Chamar no WhatsApp</a>
            </div>
        `).join('');
    }

    function emergencyReset() { localStorage.clear(); location.reload(); }
    function logout() { localStorage.clear(); location.reload(); }

    window.onload = () => {
        if(localStorage.getItem('iFipe_Token')) {
            startBuscador();
        }
    };
</script>
</body>
</html>
