        .modal-text { font-size: 14px; line-height: 1.8; color: #d1d1d6; white-space: pre-line; text-align: justify; }

to, quando aplicável.\n- Portabilidade dos dados, observados requisitos legais.\n- Informação sobre compartilhamento e finalidade do tratamento.\nSolicitações devem ser encaminhadas ao canal oficial indicado ao final deste documento.\n\n8. Retenção e Eliminação dos Dados\nOs dados pessoais serão mantidos:\n- Pelo período necessário ao cumprimento das finalidades descritas nesta Política.\n- Enquanto a conta do usuário permanecer ativa.\n- Pelo prazo exigido por obrigações legais ou regulatórias.\nApós a solicitação de exclusão, os dados serão eliminados em até 30 dias, salvo quando houver necessidade de retenção por determinação legal.\n\n9. Alterações da Política de Privacidade\nO iFipe.com.br poderá modificar esta Política de Privacidade a qualquer tempo, visando adequação normativa, aprimoramento das práticas de segurança ou atualização das funcionalidades da plataforma.\nAlterações relevantes poderão ser comunicadas por e-mail ou aviso na própria plataforma.\nA versão atualizada substitui integralmente as anteriores.\n\n10. Encarregado pelo Tratamento de Dados (DPO)\nPara assuntos relacionados à privacidade, proteção de dados ou exercício de direitos previstos na LGPD, o usuário poderá contatar o responsável pelo tratamento através do e-mail: bryan.paes@icloud.com`

                texto: `POLÍTICA DE TRATAMENTO DE DADOS PESSOAIS – IFIPE.COM.BR (LGPD)\n\n1. Premissas e Enquadramento Legal\nO tratamento de dados pessoais realizado pelo iFipe.com.br observa rigorosamente as disposições da Lei nº 13.709/2018 – Lei Geral de Proteção de Dados Pessoais (LGPD), do Marco Civil da Internet, do Código Civil e demais normas aplicáveis ao ambiente digital.\nA plataforma atua como indexador e organizador de informações públicas, não exercendo atividade de intermediação comercial, representação de fornecedores ou participação em transações entre usuários e terceiros.\nO iFipe.com.br é considerado Controlador dos dados pessoais fornecidos voluntariamente pelos usuários, sendo responsável pelas decisões referentes ao tratamento.\n\n2. Fundamentos Jurídicos para o Tratamento\nO tratamento de dados pessoais no âmbito do iFipe.com.br está amparado nas seguintes bases legais previstas no art. 7º da LGPD:\n- Consentimento do titular (art. 7º, I) — fornecido no momento do cadastro e aceite dos Termos de Uso e desta Política.\n- Execução de contrato ou procedimentos preliminares (art. 7º, V) — necessários para disponibilizar acesso à plataforma e suas funcionalidades.\n- Legítimo interesse do controlador (art. 7º, IX) — voltado à segurança da plataforma, prevenção a fraudes, controle de acesso e aprimoramento da experiência do usuário.\n- Cumprimento de obrigação legal ou regulatória (art. 7º, II) — quando exigido por autoridades administrativas, judiciais ou regulatórias.\n\n3. Dados Tratados e Finalidades Específicas\nO iFipe.com.br poderá tratar as seguintes categorias de dados pessoais:\n- Nome — identificação e personalização da experiência do usuário.\n- E-mail — autenticação, comunicação operacional e recuperação de credenciais.\n- WhatsApp — envio de notificações relacionadas ao funcionamento da plataforma.\n- Endereço IP e dados de dispositivo — segurança, prevenção a acessos indevidos e controle de integridade.\n- Dados de navegação — análi stas no art. 48 da LGPD, incluindo:\n- Comunicação à Autoridade Nacional de Proteção de Dados (ANPD).\n- Notificação aos titulares afetados, quando aplicável.\n- Adoção imediata de medidas para mitigação dos impactos.\n\n8. Transferência Internacional de Dados\nOs dados pessoais poderão ser armazenados em servidores localizados fora do território nacional, desde que o provedor de infraestrutura garanta nível adequado de proteção, conforme requisitos do art. 33 da LGPD.\n\n9. Retenção e Eliminação dos Dados\nOs dados pessoais serão mantidos:\n- Pelo período necessário ao cumprimento das finalidades descritas.\n- Enquanto a conta do usuário permanecer ativa.\n- Pelo prazo exigido por obrigações legais ou regulatórias.\nApós solicitação de exclusão, os dados serão eliminados em até 30 dias, salvo hipóteses legais de retenção.\n\n10. Autoridade Nacional de Proteção de Dados\nO titular poderá apresentar reclamação diretamente à ANPD, caso entenda que o tratamento realizado viola a LGPD: https://www.gov.br/anpd`

        function toggleTheme() {
            const b = document.body;
            b.classList.toggle('light-mode');
            const isLight = b.classList.contains('light-mode');
            document.getElementById('themeBtn').innerText = isLight ? "☀️ Modo" : "🌙 Modo";
            localStorage.setItem('iFipe_Theme', isLight ? 'light' : 'dark');
        }

        function abrirJuridico(tipo) {
            const modal = document.getElementById('modalJuridico');
            document.getElementById('modalTitulo').innerText = textosJuridicos[tipo].titulo;
            document.getElementById('modalConteudo').innerText = textosJuridicos[tipo].texto;
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Trava o scroll do fundo
        }

        function fecharJuridico() {
            document.getElementById('modalJuridico').style.display = 'none';
            document.body.style.overflow = 'auto'; // Libera o scroll do fundo
        }

        function iniciarCambio() {
            const socket = new WebSocket('wss://stream.binance.com:9443/ws/usdtbrl@ticker');
            socket.onmessage = (e) => {
                const val = JSON.parse(e.data).c;
                document.getElementById('usdt_val').innerText = `$ ${parseFloat(val).toFixed(4).replace('.',',')}`;
            };
        }

        window.onload = () => {
            if(localStorage.getItem('iFipe_Theme') === 'light') toggleTheme();
            iniciarCambio();
        };

        function toggleForm() { 
            document.getElementById('loginForm').classList.toggle('hidden'); 
            document.getElementById('registerForm').classList.toggle('hidden'); 
        }

        async function realizarLogin(event) {
            event.preventDefault();
            const { data } = await _s.from('clientes_buscador').select('*').eq('email', document.getElementById('logEmail').value).eq('senha', document.getElementById('logPass').value).maybeSingle();
            if(data && data.aprovado) {
                localStorage.setItem('iFipe_Token', data.id);
                window.location.href = 'buscar.html';
            } else if(data) { alert("ACESSO PENDENTE DE LIBERAÇÃO."); } else { alert("E-MAIL OU SENHA INCORRETOS."); }
        }

        async function solicitarCadastro(event) {
            event.preventDefault();
            const { error } = await _s.from('clientes_buscador').insert([{ 
                nome: document.getElementById('regNome').value, 
                cpf: document.getElementById('regCpf').value.replace(/\D/g,''),
                email: document.getElementById('regEmail').value,
                whatsapp: document.getElementById('regWhats').value,
                senha: document.getElementById('regPass').value,
                aprovado: false
            }]);
            if(!error) { alert("SOLICITAÇÃO ENVIADA COM SUCESSO!"); toggleForm(); } else { alert("ERRO AO SOLICITAR."); }
        }
    </script>
