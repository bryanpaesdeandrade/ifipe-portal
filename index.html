<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>iFipe - Diagnóstico</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="background:#000; color:#fff; padding:20px; font-family: monospace;">
    <h1>Diagnóstico iFipe</h1>
    <div id="status">Carregando...</div>
    <div id="loginTest" style="margin-top:20px;">
        <input id="user" placeholder="WhatsApp ou Email" style="padding:5px; width:200px;"><br>
        <input id="pass" type="password" placeholder="Senha" style="padding:5px; width:200px; margin-top:5px;"><br>
        <select id="tipo" style="margin-top:5px; padding:5px;">
            <option value="anunciante">Anunciante</option>
            <option value="buscador">Buscador</option>
        </select><br>
        <button onclick="testarLogin()" style="margin-top:10px; padding:5px 10px;">Testar Login</button>
    </div>
    <div id="resultado" style="margin-top:20px; white-space: pre;"></div>

    <script>
        const _s = supabase.createClient(
            'https://zmgosywpwidypxyhxkry.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M'
        );

        // Mostra status atual
        const status = localStorage.getItem('iFipe_Status') || 'on';
        document.getElementById('status').innerText = 'Status do sistema: ' + status;

        window.testarLogin = async function() {
            const tipo = document.getElementById('tipo').value;
            const userInput = document.getElementById('user').value.trim();
            const senhaInput = document.getElementById('pass').value.trim();
            const resultado = document.getElementById('resultado');

            if (!userInput || !senhaInput) {
                resultado.innerText = 'Preencha usuário e senha.';
                return;
            }

            const tabela = tipo === 'anunciante' ? 'fornecedores' : 'clientes_buscador';
            const { data, error } = await _s.from(tabela).select('*');

            if (error) {
                resultado.innerText = 'Erro de conexão: ' + error.message;
                return;
            }

            // Mostra todos os registros para debug (apenas os campos importantes)
            resultado.innerText = 'Registros encontrados:\n' + 
                data.map(r => `ID: ${r.id}, WhatsApp: "${r.whatsapp}", Senha: "${r.senha}", Ativo: ${r.ativo}, Email: "${r.email}"`).join('\n');

            // Tenta encontrar o usuário
            const user = data.find(r => {
                const emailMatch = (r.email || '').toLowerCase() === userInput.toLowerCase();
                const whatsMatch = (r.whatsapp || '').replace(/\D/g, '') === userInput.replace(/\D/g, '');
                return (emailMatch || whatsMatch) && r.senha.trim() === senhaInput && r.ativo === true;
            });

            if (user) {
                resultado.innerText += '\n\n✅ USUÁRIO ENCONTRADO! Redirecionando...';
                if (tipo === 'anunciante') {
                    localStorage.setItem('iFipe_Anunciante', user.id);
                    setTimeout(() => { window.location = 'atacadista.html'; }, 2000);
                } else {
                    localStorage.setItem('iFipe_Token', user.id);
                    setTimeout(() => { window.location = 'buscar.html'; }, 2000);
                }
            } else {
                resultado.innerText += '\n\n❌ NENHUM USUÁRIO CORRESPONDEU.';
            }
        };
    </script>
</body>
</html>
