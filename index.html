<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Painel Lojista Profissional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #000000; color: #ffffff; font-family: -apple-system, sans-serif; }
        .apple-card { background: #1c1c1e; border: 1px solid #38383a; border-radius: 18px; padding: 2rem; width: 100%; max-width: 400px; }
        .apple-input { background: #2c2c2e; border: 1px solid #38383a; border-radius: 10px; padding: 12px; width: 100%; color: white; outline: none; margin-bottom: 1rem; cursor: pointer; }
        .apple-button { background: #ffffff; color: #000000; font-weight: 600; border-radius: 20px; padding: 14px; width: 100%; cursor: pointer; transition: 0.3s; }
        .apple-button:hover { background: #f5f5f7; transform: scale(1.01); }
        label { display: block; text-transform: uppercase; font-size: 10px; color: #9ca3af; margin-bottom: 4px; letter-spacing: 0.05em; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 text-sm">
    <h1 class="text-3xl font-bold mb-8 italic tracking-tighter">iFipe</h1>
    <div class="apple-card shadow-2xl">
        <form id="priceForm">
            <label>Seu Estabelecimento</label>
            <select id="fornecedor_id" class="apple-input" required><option value="">Buscando lojistas...</option></select>

            <label>Modelo do Aparelho</label>
            <select id="produto_id" class="apple-input" required><option value="">Selecione o iPhone</option></select>

            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label>Memória</label>
                    <select id="memoria" class="apple-input" required disabled><option value="">-</option></select>
                </div>
                <div>
                    <label>Cor</label>
                    <select id="cor" class="apple-input" required disabled><option value="">-</option></select>
                </div>
            </div>

            <label>Região de Origem</label>
            <select id="regiao_id" class="apple-input" required><option value="">Buscando regiões...</option></select>

            <label>Preço de Venda (R$)</label>
            <input type="number" step="0.01" id="preco" class="apple-input" placeholder="Ex: 7699.77" required>

            <button type="submit" class="apple-button">Publicar no iFipe</button>
        </form>
        <p id="status" class="mt-4 text-center text-[11px] font-medium"></p>
    </div>

    <script>
        const SUPABASE_URL = 'https://zmgosywpwidypxyhxkry.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function carregarDados() {
            const { data: f } = await _supabase.from('fornecedores').select('id, nome').order('nome');
            if (f) document.getElementById('fornecedor_id').innerHTML = f.map(i => `<option value="${i.id}">${i.nome}</option>`).join('');

            const { data: m } = await _supabase.from('produtos_mestre').select('id, nome').order('nome');
            if (m) document.getElementById('produto_id').innerHTML = '<option value="">Escolha o Modelo</option>' + m.map(i => `<option value="${i.id}">${i.nome}</option>`).join('');

            const { data: r } = await _supabase.from('regioes').select('id, nome, bandeira');
            if (r) document.getElementById('regiao_id').innerHTML = r.map(i => `<option value="${i.id}">${i.bandeira || ''} ${i.nome}</option>`).join('');
        }

        // ELIMINATÓRIA AUTOMÁTICA: Busca variações reais cadastradas no seu banco
        document.getElementById('produto_id').addEventListener('change', async (e) => {
            const status = document.getElementById('status');
            const { data: v } = await _supabase.from('variacoes').select('capacidade, cor').eq('produto_id', e.target.value);
            
            if (v && v.length > 0) {
                const mems = [...new Set(v.map(x => x.capacidade))];
                const cors = [...new Set(v.map(x => x.cor))];
                
                document.getElementById('memoria').innerHTML = mems.map(m => `<option value="${m}">${m}</option>`).join('');
                document.getElementById('cor').innerHTML = cors.map(c => `<option value="${c}">${c}</option>`).join('');
                document.getElementById('memoria').disabled = false;
                document.getElementById('cor').disabled = false;
            } else {
                document.getElementById('memoria').innerHTML = '<option>Sem estoque</option>';
                document.getElementById('cor').innerHTML = '<option>-</option>';
            }
        });

        document.getElementById('priceForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const status = document.getElementById('status');
            status.innerText = "Sincronizando com iFipe...";
            
            // Busca o ID da variação exata para não dar erro de banco
            const { data: varId } = await _supabase.from('variacoes')
                .select('id')
                .eq('produto_id', document.getElementById('produto_id').value)
                .eq('capacidade', document.getElementById('memoria').value)
                .eq('cor', document.getElementById('cor').value)
                .limit(1).single();

            const { error } = await _supabase.from('ofertas').insert([{
                fornecedor_id: parseInt(document.getElementById('fornecedor_id').value),
                variacao_id: varId.id,
                regiao_id: parseInt(document.getElementById('regiao_id').value),
                preco: parseFloat(document.getElementById('preco').value),
                condicao: 'Novo'
            }]);

            if (error) { status.innerText = "Erro ao publicar no banco."; status.style.color = "#ff453a"; }
            else { status.innerText = "Publicado com sucesso! 🚀"; status.style.color = "#32d74b"; e.target.reset(); }
        });

        carregarDados();
    </script>
</body>
</html>
