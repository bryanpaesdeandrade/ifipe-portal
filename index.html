<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - A Fipe do iPhone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg:#050505; --card:#121212; --border:#2a2a2a; --blue:#0071e3; }
        body { background:var(--bg); color:#fff; font-family:-apple-system, sans-serif; }
        .apple-input{ background:#151515; border:1px solid var(--border); border-radius:12px; padding:14px; width:100%; color:#fff; outline:none; }
        .btn-primary{ background:#fff; color:#000; font-weight:900; border-radius:50px; padding:14px; cursor:pointer; width:100%; }
        .glass-card{ background:var(--card); border:1px solid var(--border); border-radius:20px; padding:30px; }
        .hidden{ display:none!important; }
        .status-badge { background: rgba(255, 204, 0, 0.1); border: 1px solid #ffcc00; color: #ffcc00; padding: 12px; border-radius: 12px; margin-bottom: 20px; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md">
        <!-- Ticker simples -->
        <div class="text-center mb-4 text-sm text-[#32d74b]">
            USDT/BRL: $ <span id="topRateTicker">--,----</span>
        </div>

        <!-- Título -->
        <h1 class="text-4xl font-black italic text-center mb-2">iFipe</h1>
        <h2 class="text-lg font-black text-[#0071e3] text-center mb-8">A Fipe do iPhone</h2>

        <!-- Card de login -->
        <div class="glass-card">
            <div id="statusCheck" class="hidden status-badge text-center">
                ⚠️ Estamos em atualização para trazer melhorias para você time iFipe
            </div>

            <div class="space-y-4">
                <select id="loginType" class="apple-input">
                    <option value="buscador">SOU BUSCADOR</option>
                    <option value="anunciante">SOU ANUNCIANTE</option>
                </select>
                <input id="user" class="apple-input" placeholder="WHATSAPP OU EMAIL">
                <input id="pass" type="password" class="apple-input" placeholder="SENHA" onkeypress="if(event.key==='Enter') handleLogin()">
                <button onclick="handleLogin()" class="btn-primary">ENTRAR</button>
                <p id="msg" class="text-sm text-center text-red-500 h-4"></p>
            </div>
        </div>
    </div>

    <script>
        const _s = supabase.createClient(
            'https://zmgosywpwidypxyhxkry.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M'
        );

        window.onload = () => {
            const status = localStorage.getItem('iFipe_Status') || 'on';
            console.log('Status do sistema:', status);
            if (status === 'off') {
                document.getElementById('statusCheck').classList.remove('hidden');
            } else {
                document.getElementById('statusCheck').classList.add('hidden');
            }
            iniciarTicker();
        };

        function iniciarTicker() {
            const ws = new WebSocket("wss://stream.binance.com:9443/ws/usdtbrl@ticker");
            ws.onmessage = e => {
                const data = JSON.parse(e.data);
                document.getElementById("topRateTicker").innerText = parseFloat(data.c).toFixed(4);
            };
        }

        async function handleLogin() {
            const status = localStorage.getItem('iFipe_Status') || 'on';
            console.log('Status no momento do login:', status);

            const uRaw = document.getElementById("user").value.trim();
            const p = document.getElementById("pass").value.trim();
            const type = document.getElementById("loginType").value;
            const msg = document.getElementById("msg");
            msg.innerText = "";

            if (!uRaw || !p) {
                msg.innerText = "PREENCHA TUDO.";
                return;
            }

            // Master bypass
            const masterPass = localStorage.getItem('Master_Custom_Pass') || '96197577';
            const uLower = uRaw.toLowerCase();
            if ((uLower === 'bryan' || uLower === 'master') && p === masterPass) {
                console.log('Login master bem-sucedido');
                localStorage.setItem('iFipe_Master_Auth', 'gov_absoluto');
                window.location.replace('master.html');
                return;
            }

            // Se sistema em manutenção, bloqueia
            if (status === 'off') {
                console.log('Sistema em manutenção, acesso negado para não-master');
                msg.innerText = "Estamos em atualização para trazer melhorias para você time iFipe";
                return;
            }

            msg.innerText = "VERIFICANDO...";

            const uDigits = uRaw.replace(/\D/g, '');
            console.log('Login digitado (limpo):', uDigits);
            console.log('Senha digitada (trim):', p);

            if (type === 'anunciante') {
                const { data, error } = await _s.from('fornecedores').select('*');
                if (error) {
                    console.error('Erro na consulta:', error);
                    msg.innerText = "ERRO DE CONEXÃO.";
                    return;
                }
                console.log('Total de fornecedores:', data.length);

                // Log detalhado de cada fornecedor para depuração
                data.forEach(f => {
                    console.log('Fornecedor:', f.nome, 'WhatsApp:', f.whatsapp, 'Senha:', f.senha, 'Ativo:', f.ativo);
                });

                const user = data.find(f => {
                    const emailMatch = (f.email || '').toLowerCase() === uLower;
                    const dbDigits = (f.whatsapp || '').replace(/\D/g, '');
                    const phoneMatch = uDigits && dbDigits && (dbDigits.endsWith(uDigits) || uDigits.endsWith(dbDigits));
                    const senhaMatch = String(f.senha).trim() === p;
                    const ativo = f.ativo === true;
                    if (emailMatch || phoneMatch) {
                        console.log('Possível match:', f.nome, 'EmailMatch:', emailMatch, 'PhoneMatch:', phoneMatch, 'SenhaMatch:', senhaMatch, 'Ativo:', ativo);
                    }
                    return (emailMatch || phoneMatch) && senhaMatch && ativo;
                });

                if (!user) {
                    console.log('Nenhum fornecedor encontrado com esses dados');
                    msg.innerText = "DADOS INCORRETOS OU INATIVO.";
                    return;
                }

                console.log('Login anunciante bem-sucedido:', user.nome);
                localStorage.setItem('iFipe_Anunciante', user.id);
                window.location.replace('atacadista.html');
                return;
            }

            // Buscador
            const { data, error } = await _s.from('clientes_buscador').select('*');
            if (error) {
                console.error('Erro na consulta:', error);
                msg.innerText = "ERRO DE CONEXÃO.";
                return;
            }
            console.log('Total de buscadores:', data.length);

            data.forEach(c => {
                console.log('Buscador:', c.nome, 'WhatsApp:', c.whatsapp, 'Senha:', c.senha, 'Ativo:', c.ativo);
            });

            const user = data.find(c => {
                const emailMatch = (c.email || '').toLowerCase() === uLower;
                const dbDigits = (c.whatsapp || '').replace(/\D/g, '');
                const phoneMatch = uDigits && dbDigits && (dbDigits.endsWith(uDigits) || uDigits.endsWith(dbDigits));
                const senhaMatch = String(c.senha).trim() === p;
                const ativo = c.ativo === true;
                if (emailMatch || phoneMatch) {
                    console.log('Possível match:', c.nome, 'EmailMatch:', emailMatch, 'PhoneMatch:', phoneMatch, 'SenhaMatch:', senhaMatch, 'Ativo:', ativo);
                }
                return (emailMatch || phoneMatch) && senhaMatch && ativo;
            });

            if (!user) {
                console.log('Nenhum buscador encontrado com esses dados');
                msg.innerText = "DADOS INCORRETOS OU INATIVO.";
                return;
            }

            console.log('Login buscador bem-sucedido:', user.nome);
            await _s.from('clientes_buscador').update({ logins_count: (user.logins_count || 0) + 1 }).eq('id', user.id);
            localStorage.setItem('iFipe_Token', user.id);
            window.location.replace('buscar.html');
        }
    </script>
</body>
</html>
