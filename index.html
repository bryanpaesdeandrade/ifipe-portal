<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Buscador VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #38383a; --input: #2c2c2e; --blue-apple: #0071e3; }
        body.light-mode { --bg: #f5f5f7; --card: #fff; --text: #1d1d1f; --border: #d2d2d7; --input: #e8e8ed; }
        body { background: var(--bg); color: var(--text); font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin:0; transition: 0.3s; }
        
        .nav-bar { background:rgba(28, 28, 30, 0.8); backdrop-filter:blur(15px); border-bottom:1px solid var(--border); padding:15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:100; flex-wrap: wrap; gap: 10px;}
        .filter-bar { background: var(--card); padding:15px; border-radius:16px; margin-top:20px; border:1px solid var(--border); }
        .apple-input { background: var(--input); border: 1px solid var(--border); border-radius: 10px; padding: 10px; width: 100%; color: var(--text); outline: none; font-size: 12px; text-align: center; }

        .product-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 12px; transition: 0.3s; position: relative; }
        .product-card:hover { border-color: #0071e3; transform: translateY(-4px); }
        .tag-status { font-size: 8px; font-weight: 900; text-transform: uppercase; padding: 4px 8px; border-radius: 50px; letter-spacing: 0.05em; display: inline-block; margin-bottom: 3px; }
        .tag-menor { background: #ff3b30; color: #fff; }
        .tag-poucas { background: #ffcc00; color: #000; }
        .tag-muitas { background: #0071e3; color: #fff; }
        .tag-estoque-alto { background: #32d74b; color: #000; }
        
        .mini-tag { font-size: 8px; font-weight: 900; text-transform: uppercase; padding: 4px 6px; border-radius: 6px; background: var(--input); color: #86868b; border: 1px solid var(--border); display: inline-flex; align-items: center; justify-content: center; }
        .mini-tag.active { color: #fff; border-color: #0071e3; background: rgba(0, 113, 227, 0.2); }
        .mini-tag.usdt { color: #32d74b; border-color: #32d74b; background: rgba(50, 215, 75, 0.1); }
        .mini-tag.lote { color: #5e5ce6; border-color: #5e5ce6; background: rgba(94, 92, 230, 0.1); }
        .mini-tag.bat { color: #32d74b; border-color: #32d74b; background: rgba(50, 215, 75, 0.1); }
        .mini-tag.gar { color: #ffcc00; border-color: #ffcc00; background: rgba(255, 204, 0, 0.1); }
        .mini-tag.fab { color: #d2d2d7; border-color: #86868b; background: rgba(134, 134, 139, 0.1); }
        .mini-tag.pix { color: #32bcad; border-color: #32bcad; background: rgba(50, 188, 173, 0.1); }

        .price-text { font-size: 22px; font-weight: 900; color: var(--text); letter-spacing: -0.05em; text-align: right; }

        .buy-button { background: #0071e3; color: #fff; font-weight: 900; border-radius: 50px; padding: 12px; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 11px; text-align: center; display: block; text-decoration: none; margin-top: 16px; transition: 0.3s; letter-spacing: 0.05em; }
        .buy-button:hover { background: #005bb5; }
        .hidden { display: none !important; }

        .btn-header { display: flex; align-items: center; justify-content: center; border-radius: 12px; height: 38px; padding: 0 12px; transition: 0.3s; border: 1px solid var(--border); text-decoration: none; gap: 6px; }
        .btn-calc-top { background: rgba(0, 113, 227, 0.1); color: #0071e3; }
        .btn-calc-top:hover { background: #0071e3; color: #fff; }
        .btn-wpp-top { background: rgba(37, 211, 102, 0.1); color: #25d366; }
        .btn-wpp-top:hover { background: #25d366; color: #fff; }
        .btn-header span { font-size: 10px; font-weight: 900; text-transform: uppercase; }
        
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: var(--input); border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #0071e3; border-radius: 10px; }
        
        @keyframes likePulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .like-anim { animation: likePulse 0.3s ease-in-out; }
        
        .btn-scroll-top { position: fixed; bottom: 80px; right: 20px; background-color: var(--card); border: 1px solid var(--border); color: var(--text); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 999; transition: 0.3s; opacity: 0; pointer-events: none; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .btn-scroll-top.show { opacity: 1; pointer-events: auto; }
        .btn-scroll-top:hover { background-color: #0071e3; border-color: #0071e3; color: #fff; }

        .btn-alerta-card { position: absolute; top: 12px; right: 12px; background: rgba(255, 204, 0, 0.1); border: 1px solid rgba(255, 204, 0, 0.3); border-radius: 50px; padding: 4px 8px; display: flex; align-items: center; gap: 4px; cursor: pointer; transition: 0.3s; }
        .btn-alerta-card:hover { background: rgba(255, 204, 0, 0.2); border-color: #ffcc00; }
        .btn-alerta-card svg { width: 12px; height: 12px; fill: #ffcc00; }
        
        .search-suggestion-item { padding: 12px 20px; border-bottom: 1px solid #f0f0f0; cursor: pointer; font-weight: 900; font-size: 13px; text-transform: uppercase; transition: 0.2s; color: #1d1d1f; }
        .search-suggestion-item:hover { background-color: #f5f5f7; color: #0071e3; }
        .search-suggestion-item:last-child { border-bottom: none; }
        .color-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; vertical-align: middle; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 0 5px rgba(0,0,0,0.5); }
        
        .badge-insignia { display: inline-flex; align-items: center; background: rgba(147, 51, 234, 0.15); color: #d8b4fe; border: 1px solid #9333ea; font-size: 8px; font-weight: 900; padding: 3px 6px; border-radius: 6px; margin-right: 4px; margin-bottom: 4px; letter-spacing: 0.5px; text-transform: uppercase; }

        #loginOverlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .auth-box { border: 1px solid var(--border); padding: 40px; border-radius: 24px; background: #0a0a0a; text-align: center; width: 380px; }
        .btn-apple { background: var(--blue-apple); color: #fff; font-weight: 900; border-radius: 12px; padding: 14px; cursor: pointer; border: none; font-size: 11px; transition: 0.3s; width: 100%; text-transform: uppercase; display: block; margin: 10px auto; }
        .link-nav { color: #0071e3; cursor: pointer; font-size: 10px; font-weight: 900; text-transform: uppercase; display: block; margin-top: 15px; text-align: center;}
    </style>
</head>
<body id="appBody">

    <div id="loginOverlay">
        <div class="auth-box">
            <h1 class="text-4xl font-black italic mb-2">iFipe</h1>
            <p class="text-[10px] text-zinc-500 mb-8 tracking-widest font-bold">O BUSCADOR DO ATACADO</p>
            
            <div id="loginForm">
                <input type="text" id="user" class="apple-input mb-3" placeholder="WHATSAPP OU EMAIL">
                <input type="password" id="pass" class="apple-input mb-4" placeholder="SUA SENHA" onkeypress="if(event.key==='Enter') handleUniversalLogin()">
                <button onclick="handleUniversalLogin()" class="btn-apple">ENTRAR NO iFIPE</button>
                <p id="msg" class="text-[10px] font-black text-red-500 mt-4 h-4"></p>
                <span class="link-nav" onclick="toggleForm()">FAZER MEU CADASTRO</span>
            </div>

            <div id="registerForm" class="hidden">
                <form onsubmit="solicitarCadastro(event)">
                    <input type="text" id="regNome" class="apple-input mb-3" placeholder="NOME COMPLETO" required>
                    <input type="text" id="regWhats" class="apple-input mb-3" placeholder="WHATSAPP" required>
                    <input type="password" id="regPass" class="apple-input mb-4" placeholder="CRIAR SENHA" required>
                    <button type="submit" class="btn-apple">ENVIAR SOLICITAÇÃO</button>
                    <span class="link-nav" onclick="toggleForm()">VOLTAR AO LOGIN</span>
                </form>
            </div>
        </div>
    </div>

    <div id="mainContent" class="hidden">
        <nav class="nav-bar">
            <div class="flex items-center gap-2 sm:gap-3">
                <h1 class="text-2xl font-black italic m-0 mr-2">iFipe</h1>
                <button onclick="abrirCalc()" class="btn-header btn-calc-top"><span>Calculadora VIP</span></button>
            </div>
            <div class="flex gap-4 items-center">
                <button onclick="logout()" class="text-red-500 font-black text-[10px] uppercase">Sair</button>
            </div>
        </nav>
        <main class="max-w-7xl mx-auto px-4 pb-20 pt-8">
            <div id="gridGeral" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4"></div>
        </main>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let clienteLogado = null;

        async function handleUniversalLogin() {
            const u = document.getElementById('user').value.trim().toLowerCase();
            const p = document.getElementById('pass').value;
            const msg = document.getElementById('msg');
            msg.innerText = "VERIFICANDO...";

            // 1. TENTA LOGIN COMO ATACADISTA (ANUNCIANTE)
            const { data: atacadista } = await _s.from('fornecedores')
                .select('id, ativo')
                .or(`email.eq.${u},whatsapp.eq.${u}`)
                .eq('senha', p)
                .maybeSingle();

            if (atacadista) {
                if (!atacadista.ativo) { msg.innerText = "ACESSO BLOQUEADO."; return; }
                localStorage.setItem('iFipe_Anunciante', atacadista.id);
                window.location.replace('atacadista.html');
                return;
            }

            // 2. TENTA COMO CLIENTE
            const { data: cliente } = await _s.from('clientes_buscador')
                .select('id, ativo')
                .or(`email.eq.${u},whatsapp.eq.${u}`)
                .eq('senha', p)
                .maybeSingle();

            if (cliente) {
                if (!cliente.ativo) { msg.innerText = "CONTA BLOQUEADA."; return; }
                localStorage.setItem('iFipe_Token', cliente.id);
                window.location.reload();
                return;
            }

            msg.innerText = "CREDENCIAIS INVÁLIDAS.";
        }

        function toggleForm() { document.getElementById('loginForm').classList.toggle('hidden'); document.getElementById('registerForm').classList.toggle('hidden'); }
        function logout() { localStorage.clear(); window.location.reload(); }

        window.onload = async () => {
            const token = localStorage.getItem('iFipe_Token');
            if(token) {
                const { data } = await _s.from('clientes_buscador').select('*').eq('id', token).single();
                if(data) {
                    clienteLogado = data;
                    document.getElementById('loginOverlay').classList.add('hidden');
                    document.getElementById('mainContent').classList.remove('hidden');
                }
            }
        };
    </script>
</body>
</html>
