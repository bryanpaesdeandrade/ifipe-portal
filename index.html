<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Painel do Lojista</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000000; color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .apple-card { background: #1c1c1e; border: 1px solid #38383a; border-radius: 18px; }
        .apple-input { background: #2c2c2e; border: 1px solid #38383a; border-radius: 10px; padding: 12px; width: 100%; color: white; }
        .apple-button { background: #ffffff; color: #000000; font-weight: 600; border-radius: 20px; padding: 12px 24px; transition: all 0.3s; }
        .apple-button:hover { background: #e5e5e5; transform: scale(1.02); }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-6">
    
    <h1 class="text-4xl font-bold mb-8 tracking-tight">iFipe</h1>

    <div class="apple-card p-8 w-full max-w-md shadow-2xl">
        <h2 class="text-xl font-semibold mb-6 text-center">Atualizar Preço</h2>
        
        <form class="space-y-4">
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1 uppercase">Modelo do iPhone</label>
                <select class="apple-input">
                    <option>iPhone 17 Pro Max</option>
                    <option>iPhone 16 Pro Max</option>
                    <option>iPhone 15 Pro Max</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1 uppercase">Memória</label>
                    <select class="apple-input">
                        <option>256GB</option>
                        <option>512GB</option>
                        <option>1TB</option>
                        <option>2TB</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-medium text-gray-400 mb-1 uppercase">Região</label>
                    <select class="apple-input">
                        <option>🇺🇸 EUA</option>
                        <option>🇧🇷 Brasil</option>
                        <option>🇨🇳 China</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1 uppercase">Preço de Venda (R$)</label>
                <input type="text" class="apple-input" placeholder="Ex: 7.699,77">
            </div>

            <button type="button" class="apple-button w-full mt-4">
                Publicar Oferta
            </button>
        </form>
    </div>

    <p class="mt-8 text-gray-500 text-sm">Acesso exclusivo para lojistas parceiros.</p>

</body>
</html>
