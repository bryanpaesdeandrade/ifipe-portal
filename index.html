<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - O Padrão Ouro do Mercado Apple</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background:#000; color:#fff; font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin:0; }
        
        /* TICKER BINANCE REALTIME */
        .ticker-bar { background:rgba(28, 28, 30, 0.9); backdrop-filter:blur(15px); border-bottom:1px solid #38383a; padding:12px; position:sticky; top:0; z-index:100; display:flex; justify-content:center; align-items:center; gap:12px; }
        .ticker-val { color:#32d74b; font-family:monospace; font-size:18px; font-weight:900; }

        /* SESSÃO DE PATROCINADORES (PUBLICIDADE) */
        .sponsors-section { background:linear-gradient(180deg, #1c1c1e 0%, #000 100%); padding: 60px 20px 40px; border-bottom: 1px solid #1c1c1e; text-align: center; }
        .sponsor-grid { display: flex; justify-content: center; flex-wrap: wrap; gap: 15px; margin-top: 20px; }
        .sponsor-card { background:#2c2c2e; border:1px solid #38383a; border-radius:16px; padding:20px 40px; font-size:12px; font-weight:900; text-transform:uppercase; color:#fff; transition:0.3s; cursor:pointer; letter-spacing: 0.1em; }
        .sponsor-card:hover { border-color:#0071e3; transform:translateY(-3px); background:#1c1c1e; }

        /* CARDS DE LOGIN / CADASTRO */
        .login-container { max-width: 450px; margin: 40px auto 80px; padding: 0 20px; }
        .apple-card { background: #1c1c1e; border: 1px solid #38383a; border-radius: 28px; padding: 3rem; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .apple-input { background: #2c2c2e; border: 1px solid #38383a; border-radius: 14px; padding: 18px; width: 100%; color: white; outline: none; margin-bottom: 1rem; font-size: 15px; }
        .apple-input:focus { border-color: #0071e3; }
        .apple-button { background: #fff; color: #000; font-weight: 900; border-radius: 50px; padding: 20px; width: 100%; cursor: pointer; text-transform: uppercase; border: none; font-size: 14px; transition: 0.3s; margin-top: 10px; }
        .apple-button:hover { background: #0071e3; color: #fff; }
        .link-toggle { color: #0071e3; cursor: pointer; font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; }
        label { display: block; text-transform: uppercase; font-size: 10px; color: #86868b; margin-bottom: 6px; font-weight: 900; letter-spacing: 0.1em; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="ticker-bar">
        <span class="text-[10px] text-gray-500 font-black uppercase tracking-widest">USDT/BRL BINANCE:</span>
        <span class="ticker-val" id="usdt_val">CONECTANDO...</span>
    </div>

    <div class="sponsors-section">
        <h1 class="text-7xl font-black italic tracking-tighter leading-none mb-2">iFipe</h1>
        <p class="text-blue-500 text-[10px] font-bold uppercase tracking-[0.5em] mb-10">O Padrão Ouro do Mercado Apple</p>
        
        <p class="text-[9px] text-gray-600 uppercase font-black tracking-widest">Patrocinadores Oficiais</p>
        <div class="sponsor-grid">
            <div class="sponsor-card">Fábrica de Marcas</div>
            <div class="sponsor-card">Espaço Publicitário</div>
            <div class="sponsor-card">Seja um Parceiro</div>
        </div>
    </div>

    <div class="login-container">
        <div class="apple-card">
            
            <div class="text-center mb-8">
                <h2 class="text-2xl font-black italic">Encontre o melhor preço</h2>
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-2">Buscador Realtime</p>
            </div>

            <div id="loginForm">
                <label>E-mail de Acesso</label>
                <input type="email" id="logEmail" class="apple-input" placeholder="seu@email.com">
                <label>Senha</label>
                <input type="password" id="logPass" class="apple-input" placeholder="••••••••">
                <button onclick="realizarLogin()" class="apple-button">Entrar no iFipe</button>
                <p class="mt-8 text-center text-gray-500 text-[11px] font-bold">Ainda não tem acesso? <span class="link-toggle block mt-2" onclick="toggleForm()">Solicitar Cadastro</span></p>
            </div>

            <div id="registerForm" class="hidden">
                <label>Nome Completo</label>
                <input type="text" id="regNome" class="apple-input" placeholder="Seu Nome">
                <label>CPF (Apenas Números)</label>
                <input type="text" id="regCpf" class="apple-input" placeholder="12345678900">
                <label>E-mail Oficial</label>
                <input type="email" id="regEmail" class="apple-input" placeholder="seu@email.com">
                <label>WhatsApp</label>
                <input type="text" id="regWhats" class="apple-input" placeholder="DDD + Número">
                <label>Crie sua Senha</label>
                <input type="password" id="regPass" class="apple-input" placeholder="••••••••">
                <button onclick="solicitarCadastro()" class="apple-button">Enviar Solicitação</button>
                <p class="mt-8 text-center text-gray-500 text-[11px] font-bold">Já tem cadastro? <span class="link-toggle block mt-2" onclick="toggleForm()">Voltar ao Login</span></p>
            </div>

            <p id="msg" class="mt-6 text-center text-[10px] font-black uppercase tracking-widest"></p>
        </div>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');

        // CÂMBIO BINANCE EM TEMPO REAL
        function iniciarCambio() {
            const socket = new WebSocket('wss://stream.binance.com:9443/ws/usdtbrl@ticker');
            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                document.getElementById('usdt_val').innerText = `R$ ${parseFloat(data.c).toFixed(4).replace('.',',')}`;
            };
        }
        iniciarCambio();

        // REDIRECIONAMENTO SE JÁ ESTIVER LOGADO
        window.onload = () => {
            if(localStorage.getItem('iFipe_Token')) {
                window.location.replace('4-layout-do-site.html');
            }
        };

        function toggleForm() {
            document.getElementById('loginForm').classList.toggle('hidden');
            document.getElementById('registerForm').classList.toggle('hidden');
            document.getElementById('msg').innerText = "";
        }

        async function solicitarCadastro() {
            const nome = document.getElementById('regNome').value;
            const cpf = document.getElementById('regCpf').value.replace(/\D/g, '');
            const email = document.getElementById('regEmail').value;
            const whats = document.getElementById('regWhats').value.replace(/\D/g, '');
            const pass = document.getElementById('regPass').value;
            const msg = document.getElementById('msg');

            if(!nome || !cpf || !email || !pass) {
                msg.innerText = "PREENCHA TODOS OS CAMPOS OBRIGATÓRIOS."; msg.style.color = "#ff3b30"; return;
            }

            const { error } = await _s.from('clientes_buscador').insert([
                { nome, cpf, email, whatsapp: whats, senha: pass, aprovado: false }
            ]);

            if(!error) {
                msg.innerText = "🚀 CADASTRO ENVIADO! AGUARDE APROVAÇÃO."; msg.style.color = "#32d74b";
                setTimeout(toggleForm, 3000);
            } else {
                msg.innerText = "ERRO: CPF INVÁLIDO OU E-MAIL JÁ CADASTRADO."; msg.style.color = "#ff3b30";
            }
        }

        async function realizarLogin() {
            const email = document.getElementById('logEmail').value;
            const pass = document.getElementById('logPass').value;
            const msg = document.getElementById('msg');

            const { data } = await _s.from('clientes_buscador').select('*').eq('email', email).eq('senha', pass).maybeSingle();

            if(data) {
                if(!data.aprovado) {
                    msg.innerText = "SEU ACESSO ESTÁ PENDENTE DE APROVAÇÃO."; msg.style.color = "#ffcc00"; return;
                }
                localStorage.setItem('iFipe_Token', data.id);
                msg.innerText = "AUTENTICANDO..."; msg.style.color = "#32d74b";
                
                setTimeout(() => {
                    window.location.replace('4-layout-do-site.html');
                }, 800);
            } else {
                msg.innerText = "E-MAIL OU SENHA INCORRETOS."; msg.style.color = "#ff3b30";
            }
        }
    </script>
</body>
</html>
