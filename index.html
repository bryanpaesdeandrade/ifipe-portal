<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - A Fipe do iPhone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg:#050505; --card:#121212; --border:#2a2a2a; --blue:#0071e3; }
        body { background:var(--bg); color:#fff; font-family:-apple-system, sans-serif; }
        .apple-input{ background:#151515; border:1px solid var(--border); border-radius:12px; padding:14px; width:100%; color:#fff; outline:none; }
        .apple-input:focus{ border-color:var(--blue); }
        .btn-primary{ background:#fff; color:#000; font-weight:900; border-radius:50px; padding:14px; cursor:pointer; border:none; width:100%; }
        .btn-primary:hover{ background:var(--blue); color:#fff; }
        .glass-card{ background:var(--card); border:1px solid var(--border); border-radius:20px; padding:30px; }
        .hidden{ display:none!important; }
        .status-badge { background: rgba(255, 204, 0, 0.1); border: 1px solid #ffcc00; color: #ffcc00; padding: 12px; border-radius: 12px; margin-bottom: 20px; }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-4 min-h-screen">
    <div class="mb-10 text-center">
        <h1 class="text-4xl font-black italic text-white">iFipe</h1>
        <h2 class="text-lg font-black text-[#0071e3] uppercase">A Fipe do iPhone</h2>
    </div>
    <div class="w-full max-w-md glass-card">
        <div id="statusCheck" class="hidden status-badge text-center">
            Estamos em atualização para trazer melhorias para você time iFipe
        </div>
        <div id="loginForm">
            <h3 class="text-lg font-black text-center mb-4">Acesso ao Sistema</h3>
            <select id="loginType" class="apple-input mb-4">
                <option value="buscador">SOU BUSCADOR</option>
                <option value="anunciante">SOU ANUNCIANTE</option>
            </select>
            <input id="user" class="apple-input mb-4" placeholder="WHATSAPP OU EMAIL">
            <input id="pass" type="password" class="apple-input mb-4" placeholder="SENHA">
            <button onclick="handleLogin()" class="btn-primary">ENTRAR</button>
            <p id="msg" class="text-red-500 text-sm mt-3 text-center"></p>
        </div>
    </div>

    <script>
        const _s = supabase.createClient(
            'https://zmgosywpwidypxyhxkry.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M'
        );

        window.onload = () => {
            const status = localStorage.getItem('iFipe_Status') || 'on';
            console.log('Status do sistema:', status);
            if (status === 'off') {
                document.getElementById('statusCheck').classList.remove('hidden');
            }
        };

        async function handleLogin() {
            const status = localStorage.getItem('iFipe_Status') || 'on';
            const uRaw = document.getElementById('user').value.trim();
            const p = document.getElementById('pass').value.trim();
            const type = document.getElementById('loginType').value;
            const msg = document.getElementById('msg');
            msg.innerText = '';

            if (!uRaw || !p) {
                msg.innerText = 'PREENCHA TUDO.';
                return;
            }

            // Master
            const masterPass = localStorage.getItem('Master_Custom_Pass') || '96197577';
            if ((uRaw.toLowerCase() === 'bryan' || uRaw.toLowerCase() === 'master') && p === masterPass) {
                localStorage.setItem('iFipe_Master_Auth', 'gov_absoluto');
                window.location.replace('master.html');
                return;
            }

            if (status === 'off') {
                msg.innerText = 'Estamos em atualização para trazer melhorias para você time iFipe';
                return;
            }

            msg.innerText = 'VERIFICANDO...';
            const uLower = uRaw.toLowerCase();
            const uDigits = uRaw.replace(/\D/g, '');

            const table = type === 'anunciante' ? 'fornecedores' : 'clientes_buscador';
            const { data, error } = await _s.from(table).select('*');
            if (error) {
                console.error(error);
                msg.innerText = 'ERRO DE CONEXÃO.';
                return;
            }

            console.log('Dados carregados:', data);

            const user = data.find(row => {
                const emailMatch = (row.email || '').toLowerCase() === uLower;
                const dbDigits = (row.whatsapp || '').replace(/\D/g, '');
                const phoneMatch = uDigits && dbDigits && (dbDigits.endsWith(uDigits) || uDigits.endsWith(dbDigits));
                const senhaMatch = String(row.senha).trim() === p;
                const ativo = row.ativo === true;
                console.log('ID:', row.id, 'EmailMatch:', emailMatch, 'PhoneMatch:', phoneMatch, 'SenhaMatch:', senhaMatch, 'Ativo:', ativo);
                return (emailMatch || phoneMatch) && senhaMatch && ativo;
            });

            if (!user) {
                msg.innerText = 'DADOS INCORRETOS OU INATIVO.';
                return;
            }

            if (type === 'anunciante') {
                localStorage.setItem('iFipe_Anunciante', user.id);
                window.location.replace('atacadista.html');
            } else {
                await _s.from('clientes_buscador').update({ logins_count: (user.logins_count || 0) + 1 }).eq('id', user.id);
                localStorage.setItem('iFipe_Token', user.id);
                window.location.replace('buscar.html');
            }
        }
    </script>
</body>
</html>
