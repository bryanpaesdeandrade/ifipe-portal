<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - A Fipe do iPhone</title>
    <style>
        body {
            margin: 0;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: #050816;
            color: #f5f5f5;
        }
        #app {
            max-width: 900px;
            margin: 0 auto;
            padding: 16px;
        }
        .topo {
            text-align: center;
            margin-top: 24px;
            margin-bottom: 24px;
        }
        .logo {
            margin: 0;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 1px;
        }
        .sub {
            margin: 4px 0 0 0;
            font-size: 14px;
            color: #c0c0c0;
        }
        .busca {
            margin-bottom: 16px;
        }
        #buscador {
            width: 100%;
            padding: 12px 14px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #0b1020;
            color: #f5f5f5;
            font-size: 14px;
            outline: none;
        }
        #buscador::placeholder {
            color: #777;
        }
        .lista {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .itemModelo {
            padding: 10px 12px;
            border-radius: 8px;
            background: #111827;
            border: 1px solid #1f2937;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.15s, transform 0.1s, border-color 0.15s;
        }
        .itemModelo:hover {
            background: #1f2937;
            border-color: #3b82f6;
            transform: translateY(-1px);
        }
        .rodape {
            margin-top: 32px;
            text-align: center;
            font-size: 12px;
            color: #6b7280;
        }
    </style>
</head>
<body>

<div id="app">
    <header class="topo">
        <h1 class="logo">iFipe</h1>
        <p class="sub">A Fipe do iPhone 📱</p>
    </header>

    <section class="busca">
        <input
            type="text"
            id="buscador"
            placeholder="Digite o modelo do iPhone..."
            oninput="filtrar()"
        >
    </section>

    <section id="listaModelos" class="lista"></section>

    <footer class="rodape">
        <p>iFipe © 2025 - Consulta de preços de iPhone</p>
    </footer>
</div>

<script>
    const modelos = [
        "iPhone 11",
        "iPhone 11 Pro",
        "iPhone 11 Pro Max",
        "iPhone 12",
        "iPhone 12 Mini",
        "iPhone 12 Pro",
        "iPhone 12 Pro Max",
        "iPhone 13",
        "iPhone 13 Mini",
        "iPhone 13 Pro",
        "iPhone 13 Pro Max",
        "iPhone 14",
        "iPhone 14 Plus",
        "iPhone 14 Pro",
        "iPhone 14 Pro Max",
        "iPhone 15",
        "iPhone 15 Plus",
        "iPhone 15 Pro",
        "iPhone 15 Pro Max"
    ];

    function filtrar() {
        const termo = document.getElementById("buscador").value.toLowerCase();
        const lista = document.getElementById("listaModelos");

        const filtrados = modelos.filter(m => m.toLowerCase().includes(termo));

        lista.innerHTML = filtrados.map(m => `
            <div class="itemModelo" onclick="abrirModelo('${m}')">
                ${m}
            </div>
        `).join("");
    }

    function abrirModelo(nome) {
        alert("Abrir página do modelo: " + nome);
    }

    // inicia com todos listados
    filtrar();
</script>

</body>
</html>
