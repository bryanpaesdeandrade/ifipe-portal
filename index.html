<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Encontre o melhor preço</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #38383a; --input: #2c2c2e; }
        body.light-mode { --bg: #f5f5f7; --card: #fff; --text: #1d1d1f; --border: #d2d2d7; --input: #e8e8ed; }

        body { background: var(--bg); color: var(--text); font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin:0; overflow-x: hidden; transition: 0.3s; }
        
        /* Ticker Bar Limpa e com Destaque */
        .ticker-bar { background:rgba(28, 28, 30, 0.9); backdrop-filter:blur(15px); border-bottom:1px solid var(--border); padding:12px 20px; position:sticky; top:0; z-index:100; display:flex; justify-content:center; align-items:center; }
        body.light-mode .ticker-bar { background: rgba(255,255,255,0.8); }
        .ticker-val { color:#32d74b; font-family:monospace; font-size: 22px; font-weight:900; }
        .ticker-label { color:#86868b; font-size:11px; font-weight:900; text-transform:uppercase; letter-spacing:0.1em; margin-right: 12px; }

        .main-wrapper { width: 100%; max-width: 1400px; margin: 0 auto; padding: 30px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .apple-logo { font-size: 5rem; font-weight: 900; font-style: italic; letter-spacing: -0.05em; line-height: 1; margin-bottom: 40px; text-align: center; }
        
        .responsive-row { display: flex; flex-direction: column; align-items: center; gap: 35px; width: 100%; flex-grow: 1; justify-content: center; }
        @media (min-width: 1024px) { 
            .responsive-row { flex-direction: row; justify-content: center; align-items: center; gap: 40px; } 
            .apple-logo { font-size: 9rem; margin-bottom: 60px; } 
        }

        .banner-link { display: block; width: 100%; max-width: 320px; transition: 0.3s; border-radius: 24px; border: 1px solid var(--border); overflow: hidden; height: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .banner-link:hover { transform: translateY(-5px); border-color: #0071e3; }
        
        .login-box { width: 100%; max-width: 400px; background: var(--card); border: 1px solid var(--border); border-radius: 28px; padding: 2.5rem; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .apple-input { background: var(--input); border: 1px solid var(--border); border-radius: 14px; padding: 16px; width: 100%; color: var(--text); outline: none; margin-bottom: 1rem; font-size: 14px; }
        .apple-button { background: var(--text); color: var(--bg); font-weight: 900; border-radius: 50px; padding: 18px; width: 100%; cursor: pointer; text-transform: uppercase; border: none; font-size: 13px; transition: 0.3s; letter-spacing: 0.05em; }
        .apple-button:hover { background: #0071e3; color: #fff; }
        
        .link-nav { color: #0071e3; cursor: pointer; font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; text-decoration: none; display: block; margin-top: 18px; transition: 0.3s; }
        .link-nav:hover { color: var(--text); }
        
        label { display: block; text-transform: uppercase; font-size: 9px; color: #86868b; margin-bottom: 6px; font-weight: 900; letter-spacing: 0.1em; }
        .hidden { display: none !important; }

        /* Rodapé Jurídico com Barras Separadoras */
        .footer-juridico { width: 100%; padding: 40px 0; display: flex; justify-content: center; align-items: center; gap: 15px; margin-top: 40px; }
        .footer-juridico span { font-size: 10px; color: #48484a; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; transition: 0.3s; }
        .footer-juridico span:hover { color: var(--text); }
        .footer-sep { color: #2c2c2e; font-size: 12px; font-weight: 100; }

        /* Modal Jurídico com Scroll Independente e Fixo */
        .modal-juridico { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-body { background: var(--card); border: 1px solid var(--border); border-radius: 24px; max-width: 850px; width: 100%; max-height: 80vh; display: flex; flex-direction: column; position: relative; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }
        .modal-header { padding: 30px 40px 15px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .modal-header h2 { font-size: 18px; font-weight: 900; text-transform: uppercase; color: #0071e3; margin: 0; }
        .btn-fechar-modal { color: #86868b; font-weight: 900; cursor: pointer; font-size: 12px; text-transform: uppercase; }
        .btn-fechar-modal:hover { color: #fff; }
        
        /* Área que permite a rolagem infinita do texto */
        .modal-scroll-area { padding: 30px 40px 40px 40px; overflow-y: auto; flex-grow: 1; scrollbar-width: thin; scrollbar-color: #38383a transparent; }
        .modal-text { font-size: 14px; line-height: 1.8; color: #d1d1d6; white-space: pre-line; text-align: justify; }
        body.light-mode .modal-text { color: #1d1d1f; }
        
        /* Scrollbar Style para Chrome/Safari */
        .modal-scroll-area::-webkit-scrollbar { width: 6px; }
        .modal-scroll-area::-webkit-scrollbar-thumb { background: #38383a; border-radius: 10px; }

        .theme-toggle { background: var(--input); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 50px; cursor: pointer; font-size: 14px; position: fixed; top: 15px; right: 20px; z-index: 200; font-weight: 700; transition: 0.3s; }
    </style>
</head>
<body>

    <div class="ticker-bar">
        <span class="ticker-label">USDT/BRL BINANCE:</span>
        <span class="ticker-val" id="usdt_val">$ --</span>
    </div>

    <button onclick="toggleTheme()" id="themeBtn" class="theme-toggle">🌙 Modo</button>

    <div class="main-wrapper">
        <h1 class="apple-logo">iFipe</h1>

        <div class="responsive-row">
            <a href="https://fabricademarcas.mercos.com/" target="_blank" class="banner-link">
                <img src="https://zmgosywpwidypxyhxkry.supabase.co/storage/v1/object/public/assets/IMG_2549.PNG" class="w-full h-auto block" alt="Fábrica de Marcas">
            </a>

            <div class="login-box">
                <div class="text-center mb-8">
                    <h2 class="text-xl md:text-2xl font-black italic">Encontre o melhor preço</h2>
                    <p class="text-[9px] text-blue-500 font-black uppercase tracking-[0.3em] mt-3">BUSCADOR APPLE ONLINE</p>
                </div>

                <form id="loginForm" onsubmit="realizarLogin(event)">
                    <label>E-mail de Acesso</label>
                    <input type="email" id="logEmail" class="apple-input" placeholder="seu@email.com" required>
                    <label>Senha</label>
                    <input type="password" id="logPass" class="apple-input" placeholder="••••••••" required>
                    <button type="submit" class="apple-button w-full">ENTRAR NO iFIPE</button>
                    <div class="text-center mt-6">
                        <span class="link-nav" onclick="toggleForm()">FAZER MEU CADASTRO</span>
                    </div>
                </form>

                <form id="registerForm" class="hidden" onsubmit="solicitarCadastro(event)">
                    <label>Nome Completo</label><input type="text" id="regNome" class="apple-input" required>
                    <label>CPF</label><input type="text" id="regCpf" class="apple-input" required>
                    <label>E-mail Oficial</label><input type="email" id="regEmail" class="apple-input" required>
                    <label>WhatsApp</label><input type="text" id="regWhats" class="apple-input" required>
                    <label>Criar Senha</label><input type="password" id="regPass" class="apple-input" required>
                    <button type="submit" class="apple-button w-full">ENVIAR SOLICITAÇÃO</button>
                    <span class="link-nav text-center mt-4" onclick="toggleForm()">VOLTAR AO LOGIN</span>
                </form>
            </div>

            <a href="https://linktr.ee/vipbrecossistema" target="_blank" class="banner-link">
                <img src="https://zmgosywpwidypxyhxkry.supabase.co/storage/v1/object/public/assets/eco.png" class="w-full h-auto block" alt="Ecossistema Apple">
            </a>
        </div>

        <div class="footer-juridico">
            <span onclick="abrirJuridico('termos')">Termos de Uso</span>
            <div class="footer-sep">|</div>
            <span onclick="abrirJuridico('privacidade')">Privacidade</span>
            <div class="footer-sep">|</div>
            <span onclick="abrirJuridico('lgpd')">LGPD</span>
        </div>
    </div>

    <div id="modalJuridico" class="modal-juridico" onclick="fecharJuridico()">
        <div class="modal-body" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 id="modalTitulo"></h2>
                <span class="btn-fechar-modal" onclick="fecharJuridico()">Fechar [x]</span>
            </div>
            <div class="modal-scroll-area">
                <div id="modalConteudo" class="modal-text"></div>
            </div>
        </div>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');

        const textosJuridicos = {
            termos: {
                titulo: "Termos e Condições de Uso",
                texto: `TERMOS E CONDIÇÕES DE USO – IFIPE.COM.BR\n\n1. Natureza Jurídica e Finalidade\nO iFipe.com.br atua como plataforma informativa para divulgação de dados fornecidos por terceiros. Não exercemos atividade comercial nem intermediamos negociações.\n\nA plataforma atua como mero repositório e indexador de informações, sem ingerência sobre a origem, veracidade, atualização ou precisão dos dados disponibilizados por terceiros.\n\n2. Ausência de Responsabilidade\nO usuário declara ciência de que o iFipe.com.br não assume qualquer responsabilidade por atos, omissões, condutas, negociações ou transações realizadas entre usuários e fornecedores.\n\nNão nos responsabilizamos por pagamentos, transferências bancárias, golpes, extravios, defeitos ou vícios dos produtos adquiridos.\n\n3. Obrigações do Usuário\nAo acessar a plataforma, o usuário compromete-se a utilizar o serviço conforme a lei e realizar suas próprias verificações antes de qualquer compra.\n\n4. Foro Competente\nFica eleito o Foro da Comarca de São Paulo – SP.\n\nContato: bryan.paes@icloud.com`
            },
            privacidade: {
                titulo: "Política de Privacidade",
                texto: `POLÍTICA DE PRIVACIDADE – IFIPE.COM.BR\n\n1. Coleta de Dados\nTratamos dados de identificação básica (nome), contato (e-mail e WhatsApp) e registros eletrônicos (IP e horário de acesso) para fins de segurança e autenticação segura.\n\n2. Finalidade\nOs dados são usados exclusivamente para manutenção da conta, prevenção de acessos indevidos e comunicação operacional. Não vendemos informações para terceiros.\n\n3. Segurança\nAdotamos medidas técnicas como criptografia em trânsito e armazenamento seguro de credenciais.\n\n4. Seus Direitos\nNos termos da LGPD, você pode solicitar acesso, correção ou exclusão de seus dados a qualquer momento.`
            },
            lgpd: {
                titulo: "Tratamento de Dados (LGPD)",
                texto: `CONFORMIDADE LGPD – IFIPE.COM.BR\n\n1. Controlador\nO iFipe.com.br observa rigorosamente a Lei nº 13.709/2018. Atuamos como controladores dos dados fornecidos voluntariamente pelos usuários.\n\n2. Bases Legais\nO tratamento está amparado no consentimento do titular, execução de contrato (acesso à plataforma) e legítimo interesse para segurança do sistema.\n\n3. Medidas de Segurança\nUtilizamos controle de acesso baseado em permissões e monitoramento de atividades suspeitas.\n\n4. Contato Encarregado (DPO)\nPara exercer seus direitos garantidos pela LGPD, contate: bryan.paes@icloud.com`
            }
        };

        function toggleTheme() {
            const b = document.body;
            b.classList.toggle('light-mode');
            const isLight = b.classList.contains('light-mode');
            document.getElementById('themeBtn').innerText = isLight ? "☀️ Modo" : "🌙 Modo";
            localStorage.setItem('iFipe_Theme', isLight ? 'light' : 'dark');
        }

        function abrirJuridico(tipo) {
            document.getElementById('modalTitulo').innerText = textosJuridicos[tipo].titulo;
            document.getElementById('modalConteudo').innerText = textosJuridicos[tipo].texto;
            document.getElementById('modalJuridico').style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Trava o scroll da página principal
        }

        function fecharJuridico() {
            document.getElementById('modalJuridico').style.display = 'none';
            document.body.style.overflow = 'auto'; // Libera o scroll da página principal
        }

        function iniciarCambio() {
            const socket = new WebSocket('wss://stream.binance.com:9443/ws/usdtbrl@ticker');
            socket.onmessage = (e) => {
                const val = JSON.parse(e.data).c;
                document.getElementById('usdt_val').innerText = `$ ${parseFloat(val).toFixed(4).replace('.',',')}`;
            };
        }

        window.onload = () => {
            if(localStorage.getItem('iFipe_Theme') === 'light') toggleTheme();
            iniciarCambio();
        };

        function toggleForm() { 
            document.getElementById('loginForm').classList.toggle('hidden'); 
            document.getElementById('registerForm').classList.toggle('hidden'); 
        }

        async function realizarLogin(event) {
            event.preventDefault();
            const { data } = await _s.from('clientes_buscador').select('*').eq('email', document.getElementById('logEmail').value).eq('senha', document.getElementById('logPass').value).maybeSingle();
            if(data && data.aprovado) {
                localStorage.setItem('iFipe_Token', data.id);
                window.location.href = 'buscar.html';
            } else if(data) { alert("ACESSO PENDENTE DE LIBERAÇÃO."); } else { alert("E-MAIL OU SENHA INCORRETOS."); }
        }

        async function solicitarCadastro(event) {
            event.preventDefault();
            const { error } = await _s.from('clientes_buscador').insert([{ 
                nome: document.getElementById('regNome').value, 
                cpf: document.getElementById('regCpf').value.replace(/\D/g,''),
                email: document.getElementById('regEmail').value,
                whatsapp: document.getElementById('regWhats').value,
                senha: document.getElementById('regPass').value,
                aprovado: false
            }]);
            if(!error) { alert("SOLICITAÇÃO ENVIADA COM SUCESSO!"); toggleForm(); } else { alert("ERRO AO SOLICITAR."); }
        }
    </script>
</body>
</html>
