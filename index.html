<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Painel Lojista</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #000000; color: #ffffff; font-family: -apple-system, sans-serif; }
        .apple-card { background: #1c1c1e; border: 1px solid #38383a; border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 420px; box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        .apple-input { background: #2c2c2e; border: 1px solid #38383a; border-radius: 12px; padding: 14px; width: 100%; color: white; outline: none; margin-bottom: 1rem; transition: 0.2s; }
        .apple-input:focus { border-color: #0071e3; }
        .apple-button { background: #ffffff; color: #000000; font-weight: 600; border-radius: 24px; padding: 16px; width: 100%; cursor: pointer; transition: 0.3s; margin-top: 1rem; }
        .apple-button:hover { background: #f5f5f7; transform: scale(1.02); }
        label { display: block; text-transform: uppercase; font-size: 10px; color: #86868b; margin-bottom: 6px; font-weight: 600; letter-spacing: 0.05em; margin-top: 1rem; }
        .hidden { display: none; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 text-sm">
    <h1 class="text-3xl font-bold mb-10 italic tracking-tighter">iFipe</h1>

    <div id="loginSection" class="apple-card">
        <h2 class="text-center mb-6 font-semibold uppercase text-xs tracking-widest">Acesso Lojista</h2>
        <label>ID Fornecedor</label>
        <input type="number" id="loginId" class="apple-input w-full" placeholder="Seu ID">
        <label>Senha</label>
        <input type="password" id="loginPass" class="apple-input w-full" placeholder="Sua senha">
        <button onclick="fazerLogin()" class="apple-button w-full">Entrar</button>
        <p id="loginError" class="text-red-500 text-[10px] mt-4 text-center font-bold"></p>
    </div>

    <div id="formSection" class="apple-card hidden">
        <div class="flex justify-between items-center mb-8">
            <span id="welcomeMsg" class="font-bold text-blue-500 uppercase"></span>
            <button onclick="location.reload()" class="text-[10px] text-gray-500 underline font-bold uppercase">Sair</button>
        </div>
        <form id="priceForm">
            <label>Modelo do iPhone</label>
            <select id="produto_id" class="apple-input w-full" required>
                <option value="">Selecione o modelo</option>
            </select>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label>Memória</label>
                    <select id="memoria" class="apple-input w-full" required disabled><option value="">-</option></select>
                </div>
                <div>
                    <label>Cor Original</label>
                    <select id="cor" class="apple-input w-full" required disabled><option value="">-</option></select>
                </div>
            </div>

            <label>Região de Origem</label>
            <select id="regiao_id" class="apple-input w-full" required></select>

            <label>Preço de Venda (R$)</label>
            <input type="text" id="preco" class="apple-input w-full" placeholder="Ex: 7.499,00" required>

            <button type="submit" class="apple-button w-full">Publicar Oferta</button>
        </form>
        <p id="status" class="mt-6 text-center text-[11px] font-bold"></p>
    </div>

    <script>
        const _supabase = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let fornecedorLogado = null;

        // Login por ENTER
        document.getElementById('loginPass').addEventListener('keypress', (e) => { if (e.key === 'Enter') fazerLogin(); });

        async function fazerLogin() {
            const id = document.getElementById('loginId').value;
            if (document.getElementById('loginPass').value === '123mudar') {
                const { data } = await _supabase.from('fornecedores').select('nome').eq('id', parseInt(id)).single();
                if (data) {
                    fornecedorLogado = id;
                    document.getElementById('loginSection').classList.add('hidden');
                    document.getElementById('formSection').classList.remove('hidden');
                    document.getElementById('welcomeMsg').innerText = "Loja: " + data.nome;
                    carregarBases();
                } else { document.getElementById('loginError').innerText = "ID não encontrado."; }
            } else { document.getElementById('loginError').innerText = "Senha incorreta."; }
        }

        async function carregarBases() {
            const { data: m } = await _supabase.from('produtos_mestre').select('id, nome').order('id');
            document.getElementById('produto_id').innerHTML = '<option value="">Escolha o modelo</option>' + m.map(i => `<option value="${i.id}">${i.nome}</option>`).join('');
            const { data: r } = await _supabase.from('regioes').select('id, nome, bandeira').order('id');
            document.getElementById('regiao_id').innerHTML = r.map(i => `<option value="${i.id}">${i.bandeira} ${i.nome}</option>`).join('');
        }

        // Motor Dinâmico de Busca de Grade
        document.getElementById('produto_id').addEventListener('change', async (e) => {
            const mem = document.getElementById('memoria');
            const cor = document.getElementById('cor');
            mem.innerHTML = '<option value="">...</option>';
            cor.innerHTML = '<option value="">...</option>';
            mem.disabled = true; cor.disabled = true;

            const { data: v } = await _supabase.from('variacoes').select('capacidade, cor').eq('produto_id', e.target.value);
            
            if (v && v.length > 0) {
                const mems = [...new Set(v.map(x => x.capacidade))];
                const cors = [...new Set(v.map(x => x.cor))];
                mem.innerHTML = mems.map(m => `<option value="${m}">${m}</option>`).join('');
                cor.innerHTML = cors.map(c => `<option value="${c}">${c}</option>`).join('');
                mem.disabled = false; cor.disabled = false;
            } else {
                mem.innerHTML = '<option value="">Sem estoque</option>';
            }
        });

        // Envio da Oferta
        document.getElementById('priceForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const status = document.getElementById('status');
            status.innerText = "Publicando...";
            status.style.color = "white";

            // Busca o ID da variação selecionada
            const { data: vId } = await _supabase.from('variacoes').select('id')
                .eq('produto_id', document.getElementById('produto_id').value)
                .eq('capacidade', document.getElementById('memoria').value)
                .eq('cor', document.getElementById('cor').value)
                .single();

            // Formata o preço (ex: 7.499,00 -> 7499.00)
            const valorFinal = document.getElementById('preco').value.replace(/\./g, '').replace(',', '.');

            const { error } = await _supabase.from('ofertas').insert([{
                fornecedor_id: parseInt(fornecedorLogado),
                variacao_id: vId.id,
                regiao_id: parseInt(document.getElementById('regiao_id').value),
                preco: parseFloat(valorFinal),
                condicao: 'Novo'
            }]);

            if (error) { 
                status.innerText = "Erro ao publicar: " + error.message; 
                status.style.color = "red"; 
            } else { 
                status.innerText = "PUBLICADO COM SUCESSO! 🚀"; 
                status.style.color = "#32d74b"; 
                e.target.reset(); 
            }
        });
    </script>
</body>
</html>
