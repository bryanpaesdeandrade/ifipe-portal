<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Painel de Controle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #000000; color: #ffffff; font-family: -apple-system, sans-serif; }
        .apple-card { background: #1c1c1e; border: 1px solid #38383a; border-radius: 18px; }
        .apple-input { background: #2c2c2e; border: 1px solid #38383a; border-radius: 10px; padding: 12px; width: 100%; color: white; outline: none; }
        .apple-button { background: #ffffff; color: #000000; font-weight: 600; border-radius: 20px; padding: 14px; transition: all 0.3s; cursor: pointer; width: 100%; }
        .apple-button:hover { background: #f5f5f7; transform: scale(1.01); }
        select option { background: #1c1c1e; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4">
    <h1 class="text-3xl font-bold mb-8 tracking-tight italic">iFipe</h1>
    <div class="apple-card p-8 w-full max-w-md shadow-2xl">
        <h2 class="text-xl font-semibold mb-6 text-center text-gray-200 text-sm uppercase tracking-widest">Publicar Oferta Real-Time</h2>
        <form id="priceForm" class="space-y-5">
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1 uppercase">Seu Estabelecimento</label>
                <select id="fornecedor_id" class="apple-input" required><option value="">Carregando...</option></select>
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1 uppercase">Modelo e Cor</label>
                <select id="variacao_id" class="apple-input" required><option value="">Carregando...</option></select>
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1 uppercase">Região</label>
                <select id="regiao_id" class="apple-input" required><option value="">Carregando...</option></select>
            </div>
            <div>
                <label class="block text-xs font-medium text-gray-400 mb-1 uppercase">Preço de Venda (R$)</label>
                <input type="number" step="0.01" id="preco" class="apple-input" placeholder="Ex: 7699.77" required>
            </div>
            <button type="submit" class="apple-button mt-2">Publicar no iFipe</button>
        </form>
        <p id="status" class="mt-4 text-center text-sm font-medium"></p>
    </div>
