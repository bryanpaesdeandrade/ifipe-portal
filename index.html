<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - A Fipe do iPhone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --card: #121212; --border: #2a2a2a; --blue-brand: #0071e3; }
        body { background-color: var(--bg); color: #ffffff; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin: 0; min-height: 100vh; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }

        .apple-input { background: #151515; border: 1px solid var(--border); border-radius: 12px; padding: 14px; width: 100%; color: #fff; outline: none; font-size: 11px; text-align: center; transition: 0.3s; }
        .apple-input:focus { border-color: var(--blue-brand); }
        
        .btn-primary { background: #ffffff; color: #000000; font-weight: 900; border-radius: 50px; padding: 14px; cursor: pointer; border: none; font-size: 11px; width: 100%; transition: 0.3s; text-transform: uppercase; letter-spacing: 0.05em; }
        .btn-primary:hover { background: var(--blue-brand); color: #fff; }

        .glass-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 30px; position: relative; overflow: hidden; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-4">

    <div class="absolute top-4 left-6 text-[10px] font-black text-[#32d74b] tracking-widest flex items-center gap-2">
        <span class="w-1.5 h-1.5 rounded-full bg-[#32d74b] animate-pulse"></span>
        USDT/BRL: $ <span id="topRateTicker">--,----</span>
    </div>

    <div class="mb-10 text-center flex items-center justify-center gap-3 w-full">
        <h1 class="text-4xl md:text-5xl font-black italic text-white tracking-tighter">iFipe</h1>
        <div class="h-8 w-[2px] bg-[#2a2a2a]"></div>
        <h2 class="text-lg md:text-xl font-black text-[#0071e3] uppercase tracking-widest italic">CONTENÇÃO ATIVA</h2>
    </div>

    <main class="w-full max-w-md">
        <div class="glass-card flex flex-col justify-center shadow-[0_0_40px_rgba(0,113,227,0.05)] border-[#0071e3]/20">
            
            <div id="statusCheck" class="mb-6">
                <span class="text-yellow-500 text-[10px] font-black bg-yellow-500/10 p-4 rounded-xl block border border-yellow-500/20 text-center leading-relaxed tracking-wider uppercase">
                    Estamos em atualização para trazer melhorias para você.<br><br>Até logo, time iFipe.
                </span>
            </div>

            <div id="loginForm" class="flex flex-col">
                <div class="space-y-4">
                    <div>
                        <select id="loginType" class="apple-input !font-black !tracking-widest !text-center text-white bg-[#1c1c1e] border-[#0071e3]/50">
                            <option value="buscador">SOU BUSCADOR (VIP)</option>
                            <option value="anunciante">SOU ANUNCIANTE (LOJISTA)</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-[8px] font-black text-gray-500 uppercase ml-2 mb-1.5 block tracking-widest">End. de Acesso</label>
                        <input type="text" id="user" class="apple-input !text-left font-mono">
                    </div>
                    <div>
                        <label class="text-[8px] font-black text-gray-500 uppercase ml-2 mb-1.5 block tracking-widest">Senha</label>
                        <input type="password" id="pass" class="apple-input !text-left font-mono tracking-[0.2em]" onkeypress="if(event.key==='Enter') handleLogin()">
                    </div>
                </div>

                <button onclick="handleLogin()" class="btn-primary mt-6">ACESSAR SISTEMA</button>
                <p id="msg" class="text-[9px] font-black text-center text-red-500 h-4 mt-3 uppercase tracking-widest"></p>
            </div>
        </div>
    </main>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');

        // FORÇA CONTENÇÃO NO STORAGE
        localStorage.setItem('iFipe_Status', 'off');

        window.onload = () => {
            new WebSocket('wss://stream.binance.com:9443/ws/usdtbrl@ticker').onmessage = (e) => {
                const rate = parseFloat(JSON.parse(e.data).c);
                document.getElementById('topRateTicker').innerText = rate.toFixed(4).replace('.',',');
            };
        };

        async function handleLogin() {
            const u = document.getElementById('user').value.toLowerCase().trim();
            const p = document.getElementById('pass').value;
            const type = document.getElementById('loginType').value;
            const msg = document.getElementById('msg');

            // REGRA MASTER: BYPASS TOTAL
            if (u === 'bryan' && p === '96197577') {
                localStorage.setItem('iFipe_Token', 'admin_bypass');
                localStorage.setItem('iFipe_Anunciante', 'admin_bypass');
                localStorage.setItem('iFipe_Master_Auth', 'gov_absoluto');
                msg.className = "text-[9px] font-black text-center text-green-500 h-4 mt-3 uppercase tracking-widest";
                msg.innerText = "ACESSO MASTER LIBERADO.";
                setTimeout(() => window.location.replace(type === 'anunciante' ? 'atacadista.html' : 'buscar.html'), 500);
                return;
            }

            // BLOQUEIO PARA QUALQUER OUTRO USUÁRIO
            msg.innerText = "ACESSO NEGADO: SISTEMA EM MANUTENÇÃO.";
        }
    </script>
</body>
</html>
