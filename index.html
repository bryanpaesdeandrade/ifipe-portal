<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iFipe - Login</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
  background:#050505;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
}
input,select {
  background:#151515;
  border:1px solid #2a2a2a;
  border-radius:12px;
  padding:14px;
  width:100%;
  color:#fff;
  font-size:12px;
}
button {
  background:#fff;
  color:#000;
  font-weight:900;
  border-radius:50px;
  padding:14px;
  width:100%;
  margin-top:16px;
}
</style>
</head>

<body class="flex items-center justify-center min-h-screen p-4">

<div id="manutencao" class="hidden text-center max-w-sm">
  <h1 class="text-4xl font-black italic mb-4">iFipe</h1>
  <p class="text-yellow-400 font-black text-sm uppercase tracking-widest">
    Sistema em atualização<br>Voltamos em breve
  </p>
</div>

<div id="loginBox" class="w-full max-w-sm space-y-4">

<h1 class="text-4xl font-black italic text-center">iFipe</h1>

<select id="tipo">
  <option value="buscador">Sou Buscador</option>
  <option value="anunciante">Sou Anunciante</option>
</select>

<input id="login" placeholder="WhatsApp ou Email">
<input id="senha" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

<p id="msg" class="text-red-500 text-xs text-center font-black"></p>

</div>

<script>
const supabase = supabaseJs.createClient(
  'https://zmgosywpwidypxyhxkry.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M'
);

function norm(v){
  return v.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().trim();
}

// STATUS GLOBAL
const status = localStorage.getItem('IFIPE_STATUS');
if(status === 'off'){
  document.getElementById('loginBox').classList.add('hidden');
  document.getElementById('manutencao').classList.remove('hidden');
}

async function login(){
  const tipo = document.getElementById('tipo').value;
  const u = norm(document.getElementById('login').value);
  const p = document.getElementById('senha').value;
  const msg = document.getElementById('msg');
  msg.innerText = '';

  if(!u || !p){ msg.innerText='Preencha tudo'; return; }

  // MASTER
  const masterPass = localStorage.getItem('Master_Custom_Pass') || '96197577';
  if(u === 'bryan' && p === masterPass){
    localStorage.clear();
    localStorage.setItem('iFipe_Master_Auth','gov_absoluto');
    window.location.replace('master.html');
    return;
  }

  if(tipo === 'anunciante'){
    const { data } = await supabase.from('fornecedores').select('*');
    const user = data?.find(x =>
      (norm(x.whatsapp) === u || norm(x.email||'') === u) && x.senha === p
    );
    if(!user){ msg.innerText='Erro'; return; }
    if(user.ativo === false){ msg.innerText='Bloqueado'; return; }

    localStorage.clear();
    localStorage.setItem('iFipe_Anunciante', user.id);
    window.location.replace('atacadista.html');
    return;
  }

  const { data } = await supabase.from('clientes_buscador').select('*');
  const user = data?.find(x =>
    (norm(x.whatsapp) === u || norm(x.email||'') === u) && x.senha === p
  );
  if(!user){ msg.innerText='Erro'; return; }
  if(user.ativo === false){ msg.innerText='Bloqueado'; return; }

  localStorage.clear();
  localStorage.setItem('iFipe_Token', user.id);
  window.location.replace('buscar.html');
}
</script>

</body>
</html>
