<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Painel Lojista</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #000000; color: #ffffff; font-family: -apple-system, sans-serif; }
        .apple-card { background: #1c1c1e; border: 1px solid #38383a; border-radius: 20px; padding: 2.5rem; width: 100%; max-width: 420px; }
        .apple-input { background: #2c2c2e; border: 1px solid #38383a; border-radius: 12px; padding: 14px; width: 100%; color: white; outline: none; margin-bottom: 1rem; }
        .apple-button { background: #ffffff; color: #000000; font-weight: 600; border-radius: 24px; padding: 16px; width: 100%; cursor: pointer; transition: 0.2s; }
        label { display: block; text-transform: uppercase; font-size: 10px; color: #86868b; margin-bottom: 6px; letter-spacing: 0.05em; margin-top: 1rem; }
        .hidden { display: none; }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen p-4 text-sm">
    <h1 class="text-3xl font-bold mb-10 italic">iFipe</h1>

    <div id="loginSection" class="apple-card">
        <h2 class="text-center mb-6 font-semibold">Identificação</h2>
        <label>ID Fornecedor</label>
        <input type="number" id="loginId" class="apple-input" placeholder="Seu ID">
        <label>Senha</label>
        <input type="password" id="loginPass" class="apple-input" placeholder="123mudar">
        <button onclick="fazerLogin()" class="apple-button">Entrar no Painel</button>
        <p id="loginError" class="text-red-500 text-xs mt-4 text-center"></p>
    </div>

    <div id="formSection" class="apple-card hidden">
        <div class="flex justify-between mb-8">
            <h2 id="welcomeMsg" class="font-bold text-blue-500 uppercase tracking-tighter"></h2>
            <button onclick="location.reload()" class="text-[10px] text-gray-500 underline">SAIR</button>
        </div>
        <form id="priceForm">
            <label>Modelo do iPhone</label>
            <select id="produto_id" class="apple-input" required><option value="">Selecione</option></select>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label>Memória</label>
                    <select id="memoria" class="apple-input" required disabled><option value="">-</option></select>
                </div>
                <div>
                    <label>Cor Original</label>
                    <select id="cor" class="apple-input" required disabled><option value="">-</option></select>
                </div>
            </div>

            <label>Região de Origem</label>
            <select id="regiao_id" class="apple-input" required></select>

            <label>Preço de Venda (R$)</label>
            <input type="text" id="preco" class="apple-input" placeholder="Ex: 7.699,77" required>

            <button type="submit" class="apple-button mt-4">Publicar Oferta</button>
        </form>
        <p id="status" class="mt-4 text-center text-xs font-bold"></p>
    </div>

    <script>
        const _supabase = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let fornecedorLogado = null;

        async function fazerLogin() {
            const id = document.getElementById('loginId').value;
            if (document.getElementById('loginPass').value === '123mudar') {
                const { data } = await _supabase.from('fornecedores').select('nome').eq('id', id).single();
                if (data) {
                    fornecedorLogado = id;
                    document.getElementById('loginSection').classList.add('hidden');
                    document.getElementById('formSection').classList.remove('hidden');
                    document.getElementById('welcomeMsg').innerText = "Loja: " + data.nome;
                    carregarModelos();
                } else { document.getElementById('loginError').innerText = "Fornecedor não cadastrado."; }
            } else { document.getElementById('loginError').innerText = "Senha inválida."; }
        }

        async function carregarModelos() {
            const { data: m } = await _supabase.from('produtos_mestre').select('id, nome').order('nome');
            document.getElementById('produto_id').innerHTML = '<option value="">Selecione o modelo</option>' + m.map(i => `<option value="${i.id}">${i.nome}</option>`).join('');
            const { data: r } = await _supabase.from('regioes').select('id, nome, bandeira');
            document.getElementById('regiao_id').innerHTML = r.map(i => `<option value="${i.id}">${i.bandeira} ${i.nome}</option>`).join('');
        }

        document.getElementById('produto_id').addEventListener('change', async (e) => {
            const { data: v } = await _supabase.from('variacoes').select('capacidade, cor').eq('produto_id', e.target.value);
            if (v && v.length > 0) {
                let mems = [...new Set(v.map(x => x.capacidade))];
                let cors = [...new Set(v.map(x => x.cor))];
                document.getElementById('memoria').innerHTML = mems.map(m => `<option value="${m}">${m}</option>`).join('');
                document.getElementById('cor').innerHTML = cors.map(c => `<option value="${c}">${c}</option>`).join('');
                document.getElementById('memoria').disabled = false; document.getElementById('cor').disabled = false;
            }
        });

        document.getElementById('priceForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const status = document.getElementById('status');
            const { data: vId } = await _supabase.from('variacoes').select('id').eq('produto_id', document.getElementById('produto_id').value).eq('capacidade', document.getElementById('memoria').value).eq('cor', document.getElementById('cor').value).single();
            const valorLimpo = document.getElementById('preco').value.replace(/\./g, '').replace(',', '.');
            const { error } = await _supabase.from('ofertas').insert([{
                fornecedor_id: fornecedorLogado,
                variacao_id: vId.id,
                regiao_id: document.getElementById('regiao_id').value,
                preco: parseFloat(valorLimpo),
                condicao: 'Novo'
            }]);
            if (error) { status.innerText = "Erro ao publicar. Verifique o banco."; status.style.color = "red"; }
            else { status.innerText = "Publicado com sucesso! 🚀"; status.style.color = "#32d74b"; e.target.reset(); }
        });
    </script>
</body>
</html>
