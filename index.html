<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - O Buscador do Atacado</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #38383a; --input: #2c2c2e; --blue-apple: #0071e3; }
        body.light-mode { --bg: #f5f5f7; --card: #fff; --text: #1d1d1f; --border: #d2d2d7; --input: #e8e8ed; }
        body { background: var(--bg); color: var(--text); font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin:0; transition: 0.3s; }
        
        .apple-input { background: var(--input); border: 1px solid var(--border); border-radius: 10px; padding: 10px; width: 100%; color: var(--text); outline: none; font-size: 12px; text-align: center; }
        .hidden { display: none !important; }

        /* Login UI adaptado */
        #loginOverlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .auth-box { border: 1px solid var(--border); padding: 40px; border-radius: 24px; background: #0a0a0a; text-align: center; width: 380px; }
        .btn-apple { background: var(--blue-apple); color: #fff; font-weight: 900; border-radius: 12px; padding: 14px; cursor: pointer; border: none; font-size: 11px; transition: 0.3s; width: 100%; text-transform: uppercase; }
        .btn-apple:hover { opacity: 0.9; transform: scale(1.02); }
        .link-nav { color: #0071e3; cursor: pointer; font-size: 10px; font-weight: 900; text-transform: uppercase; display: block; margin-top: 15px; text-align: center;}
    </style>
</head>
<body id="appBody">

    <div id="loginOverlay">
        <div class="auth-box">
            <h1 class="text-4xl font-black italic mb-2">iFipe</h1>
            <p class="text-[10px] text-zinc-500 mb-8 tracking-widest font-bold">O BUSCADOR DO ATACADO</p>
            
            <div id="statusCheck" class="mb-6 hidden">
                <span class="text-red-500 text-[10px] font-black bg-red-500/10 p-4 rounded-lg block border border-red-500/20">
                    SISTEMA EM ATUALIZAÇÃO PELA GOVERNANÇA.<br>POR FAVOR, AGUARDE.
                </span>
            </div>

            <div id="loginForm">
                <input type="text" id="user" class="apple-input text-center mb-3" placeholder="WHATSAPP OU EMAIL">
                <input type="password" id="pass" class="apple-input text-center mb-4" placeholder="SUA SENHA" onkeypress="if(event.key==='Enter') handleLogin()">
                <button onclick="handleLogin()" class="btn-apple">ENTRAR NO iFIPE</button>
                <p id="msg" class="text-[10px] font-black text-zinc-500 mt-4 h-4"></p>
                <span class="link-nav" onclick="toggleForm()">FAZER MEU CADASTRO</span>
            </div>

            <div id="registerForm" class="hidden">
                <form onsubmit="solicitarCadastro(event)">
                    <input type="text" id="regNome" class="apple-input mb-3" placeholder="NOME COMPLETO" onkeyup="this.value = this.value.toUpperCase()" required>
                    <input type="text" id="regWhats" class="apple-input mb-3" placeholder="WHATSAPP" required>
                    <input type="email" id="regEmail" class="apple-input mb-3" placeholder="E-MAIL (OPCIONAL)">
                    <select id="regPais" class="apple-input mb-3" required onchange="mudarPais()">
                        <option value="" disabled selected>SELECIONE O PAÍS...</option>
                        <option value="Brasil">BRASIL</option>
                        <option value="EUA">ESTADOS UNIDOS</option>
                        <option value="Paraguai">PARAGUAI</option>
                    </select>
                    <div class="grid grid-cols-2 gap-2 mb-3">
                        <div>
                            <select id="regEstado" class="apple-input mb-0" onchange="loadCidadesIBGE()" required disabled>
                                <option value="">ESTADO...</option>
                                </select>
                        </div>
                        <div>
                            <select id="regCidade" class="apple-input mb-0" required disabled>
                                <option value="">CIDADE...</option>
                            </select>
                        </div>
                    </div>
                    <input type="password" id="regPass" class="apple-input mb-4" placeholder="CRIAR SENHA" required>
                    <button type="submit" class="btn-apple">ENVIAR SOLICITAÇÃO</button>
                    <span class="link-nav" onclick="toggleForm()">VOLTAR AO LOGIN</span>
                </form>
            </div>
        </div>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');

        function normalizeString(str) { return str ? str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim() : ''; }

        function toggleTheme() {
            const b = document.body; b.classList.toggle('light-mode');
            const isLight = b.classList.contains('light-mode');
            localStorage.setItem('iFipe_Theme', isLight ? 'light' : 'dark');
        }

        async function checkSystemStatus() {
            const status = localStorage.getItem('iFipe_Status');
            if(status === 'off') {
                document.getElementById('registerForm').classList.add('hidden');
                document.getElementById('statusCheck').classList.remove('hidden');
                return false;
            }
            document.getElementById('statusCheck').classList.add('hidden');
            return true;
        }

        window.onload = async () => {
            if(localStorage.getItem('iFipe_Theme') === 'light') toggleTheme();
            
            const isSystemActive = await checkSystemStatus();
            const token = localStorage.getItem('iFipe_Token');
            
            if(token) {
                if(token === 'admin_bypass' || localStorage.getItem('iFipe_Master_Auth') === 'gov_absoluto') {
                    window.location.replace('buscar.html');
                    return;
                }
                if(!isSystemActive) {
                    localStorage.removeItem('iFipe_Token');
                    return;
                }
                const { data } = await _s.from('clientes_buscador').select('*').eq('id', token).single();
                if(data && data.ativo !== false) {
                    window.location.replace('buscar.html');
                } else {
                    localStorage.removeItem('iFipe_Token');
                }
            }
        };

        function toggleForm() {
            document.getElementById('loginForm').classList.toggle('hidden');
            document.getElementById('registerForm').classList.toggle('hidden');
        }

        // MOTOR IBGE PARA CADASTRO
        async function loadEstadosIBGE() {
            const sel = document.getElementById('regEstado');
            sel.innerHTML = '<option value="">Aguarde...</option>';
            try {
                const res = await fetch('https://servicodados.ibge.gov.br/api/v1/localidades/estados?orderBy=nome');
                const estados = await res.json();
                sel.innerHTML = '<option value="" disabled selected>ESTADO...</option>';
                estados.forEach(e => { sel.innerHTML += `<option value="${e.sigla}">${e.nome}</option>`; });
                sel.disabled = false;
            } catch(e) { sel.innerHTML = '<option value="Padrão">Erro</option>'; }
        }

        async function loadCidadesIBGE() {
            const uf = document.getElementById('regEstado').value;
            const sel = document.getElementById('regCidade');
            sel.innerHTML = '<option value="">Carregando IBGE...</option>';
            if(!uf) return;
            try {
                const res = await fetch(`https://servicodados.ibge.gov.br/api/v1/localidades/estados/${uf}/municipios`);
                const cidades = await res.json();
                sel.innerHTML = '<option value="" disabled selected>CIDADE...</option>';
                cidades.forEach(c => sel.innerHTML += `<option value="${c.nome}">${c.nome}</option>`);
                sel.disabled = false;
            } catch(e) { sel.innerHTML = '<option value="Padrão">Erro ao carregar cidades</option>'; }
        }

        function mudarPais() {
            const pais = document.getElementById('regPais').value;
            const elEst = document.getElementById('regEstado');
            const elCid = document.getElementById('regCidade');
            if (pais === 'Brasil') {
                loadEstadosIBGE();
                elCid.disabled = true; elCid.innerHTML = '<option value="">CIDADE...</option>';
            } else {
                elEst.parentElement.innerHTML = `<input type="text" id="regEstado" class="apple-input mb-0" placeholder="ESTADO" required>`;
                elCid.parentElement.innerHTML = `<input type="text" id="regCidade" class="apple-input mb-0" placeholder="CIDADE" required>`;
            }
        }

        async function solicitarCadastro(e) {
            e.preventDefault();
            const { error } = await _s.from('clientes_buscador').insert([{
                nome: document.getElementById('regNome').value.toUpperCase(),
                email: document.getElementById('regEmail').value,
                whatsapp: document.getElementById('regWhats').value,
                senha: document.getElementById('regPass').value,
                pais: document.getElementById('regPais').value,
                estado: document.getElementById('regEstado').value,
                cidade: document.getElementById('regCidade').value,
                ativo: true, logins_count: 0
            }]);
            if(!error) { alert("CADASTRO REALIZADO COM SUCESSO! Você já pode entrar."); toggleForm(); } 
            else { alert("ERRO AO CADASTRAR: " + error.message); }
        }

        async function handleLogin() {
            const uRaw = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const msg = document.getElementById('msg');
            if(!uRaw || !p) { msg.innerText = "PREENCHA TODOS OS CAMPOS."; return; }

            // -- CHAVE MESTRA: IGNORA MANUTENÇÃO E REDIRECIONA --
            if (uRaw.toLowerCase() === 'bryan' && p === '96197577') {
                localStorage.setItem('iFipe_Master_Auth', 'gov_absoluto');
                localStorage.setItem('iFipe_Status_Override', 'true');
                localStorage.setItem('iFipe_Token', 'admin_bypass');
                msg.innerText = "ACESSO MASTER LIBERADO. REDIRECIONANDO...";
                window.location.replace('buscar.html');
                return;
            }

            // -- SE NÃO É MASTER, VERIFICA SE O SISTEMA ESTÁ OFF --
            if(!await checkSystemStatus()) {
                msg.innerText = "ACESSO NEGADO. SISTEMA EM ATUALIZAÇÃO.";
                return;
            }

            const u = normalizeString(uRaw);
            msg.innerText = "VERIFICANDO...";

            const { data } = await _s.from('clientes_buscador').select('*');
            if (data) {
                const userMatch = data.find(c => (normalizeString(c.email) === u || normalizeString(c.whatsapp) === u) && c.senha === p);
                if (userMatch) {
                    if (userMatch.ativo === false) { msg.innerText = "CONTA BLOQUEADA PELA GOVERNANÇA."; return; }
                    await _s.from('clientes_buscador').update({ logins_count: (userMatch.logins_count || 0) + 1 }).eq('id', userMatch.id);
                    localStorage.setItem('iFipe_Token', userMatch.id);
                    localStorage.setItem('iFipe_User_Name', userMatch.nome || userMatch.email || userMatch.whatsapp);
                    window.location.replace('buscar.html');
                } else { msg.innerText = "CREDENCIAIS INVÁLIDAS."; }
            } else { msg.innerText = "ERRO DE CONEXÃO."; }
        }
    </script>
</body>
</html>
