<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>iFipe - Teste</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-black text-white p-8">
    <h1 class="text-3xl font-bold">iFipe - Diagnóstico</h1>
    <div id="status" class="mt-4 p-4 bg-yellow-900 rounded"></div>
    <div class="mt-4">
        <select id="tipo" class="bg-gray-800 p-2 rounded">
            <option value="anunciante">Anunciante</option>
            <option value="buscador">Buscador</option>
        </select>
        <input id="user" placeholder="WhatsApp ou Email" class="bg-gray-800 p-2 rounded block mt-2 w-64">
        <input id="pass" type="password" placeholder="Senha" class="bg-gray-800 p-2 rounded block mt-2 w-64">
        <button onclick="logar()" class="bg-blue-600 px-4 py-2 rounded mt-2">Logar</button>
        <p id="msg" class="mt-2 text-red-400"></p>
    </div>

    <script>
        const _s = supabase.createClient(
            'https://zmgosywpwidypxyhxkry.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M'
        );

        // Mostra status atual
        const status = localStorage.getItem('iFipe_Status') || 'on';
        document.getElementById('status').innerText = 'Status do sistema: ' + status;

        window.logar = async function() {
            const tipo = document.getElementById('tipo').value;
            const userInput = document.getElementById('user').value.trim();
            const senhaInput = document.getElementById('pass').value.trim();
            const msg = document.getElementById('msg');
            msg.innerText = '';

            if (!userInput || !senhaInput) {
                msg.innerText = 'Preencha tudo';
                return;
            }

            // Master bypass
            if ((userInput.toLowerCase() === 'bryan' || userInput.toLowerCase() === 'master') && senhaInput === (localStorage.getItem('Master_Custom_Pass') || '96197577')) {
                localStorage.setItem('iFipe_Master_Auth', 'gov_absoluto');
                window.location = 'master.html';
                return;
            }

            // Se sistema off, bloqueia
            if (status === 'off') {
                msg.innerText = 'Sistema em atualização';
                return;
            }

            const tabela = tipo === 'anunciante' ? 'fornecedores' : 'clientes_buscador';
            const { data, error } = await _s.from(tabela).select('*');

            if (error) {
                msg.innerText = 'Erro de conexão';
                console.error(error);
                return;
            }

            // Procura por email ou whatsapp
            const encontrado = data.find(reg => {
                const emailMatch = (reg.email || '').toLowerCase() === userInput.toLowerCase();
                const whatsMatch = (reg.whatsapp || '').replace(/\D/g, '') === userInput.replace(/\D/g, '');
                return (emailMatch || whatsMatch) && reg.senha.trim() === senhaInput && reg.ativo === true;
            });

            if (!encontrado) {
                msg.innerText = 'Dados incorretos ou inativo';
                console.log('Busca falhou. Verifique no banco:', data.map(r => ({ w: r.whatsapp, s: r.senha, a: r.ativo })));
                return;
            }

            // Redireciona
            if (tipo === 'anunciante') {
                localStorage.setItem('iFipe_Anunciante', encontrado.id);
                window.location = 'atacadista.html';
            } else {
                await _s.from('clientes_buscador').update({ logins_count: (encontrado.logins_count || 0) + 1 }).eq('id', encontrado.id);
                localStorage.setItem('iFipe_Token', encontrado.id);
                window.location = 'buscar.html';
            }
        };
    </script>
</body>
</html>
