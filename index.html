<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Encontre o melhor preço</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background:#000; color:#fff; font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin:0; overflow-x: hidden; }
        
        /* Ticker Bar Limpa */
        .ticker-bar { background:rgba(28, 28, 30, 0.9); backdrop-filter:blur(15px); border-bottom:1px solid #38383a; padding:12px 20px; position:sticky; top:0; z-index:100; display:flex; justify-content:center; align-items:center; }
        .ticker-val { color:#32d74b; font-family:monospace; font-size: 16px; font-weight:900; }
        .ticker-label { color:#86868b; font-size:10px; font-weight:900; text-transform:uppercase; letter-spacing:0.1em; margin-right: 10px; }

        .main-wrapper { width: 100%; max-width: 1400px; margin: 0 auto; padding: 30px 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .apple-logo { font-size: 5rem; font-weight: 900; font-style: italic; letter-spacing: -0.05em; line-height: 1; margin-bottom: 40px; text-align: center; }
        
        .responsive-row { display: flex; flex-direction: column; align-items: center; gap: 35px; width: 100%; flex-grow: 1; justify-content: center; }
        @media (min-width: 1024px) { 
            .responsive-row { flex-direction: row; justify-content: center; align-items: center; gap: 40px; } 
            .apple-logo { font-size: 9rem; margin-bottom: 60px; } 
        }

        .banner-link { display: block; width: 100%; max-width: 320px; transition: 0.3s; border-radius: 24px; border: 1px solid #38383a; overflow: hidden; height: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .banner-link:hover { transform: translateY(-5px); border-color: #0071e3; }
        
        .login-box { width: 100%; max-width: 400px; background: #1c1c1e; border: 1px solid #38383a; border-radius: 28px; padding: 2.5rem; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .apple-input { background: #2c2c2e; border: 1px solid #38383a; border-radius: 14px; padding: 16px; width: 100%; color: white; outline: none; margin-bottom: 1rem; font-size: 14px; }
        .apple-button { background: #fff; color: #000; font-weight: 900; border-radius: 50px; padding: 18px; width: 100%; cursor: pointer; text-transform: uppercase; border: none; font-size: 13px; transition: 0.3s; letter-spacing: 0.05em; }
        .apple-button:hover { background: #0071e3; color: #fff; }
        
        .link-nav { color: #0071e3; cursor: pointer; font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; text-decoration: none; display: block; margin-top: 18px; transition: 0.3s; }
        .link-nav:hover { color: #fff; }
        
        label { display: block; text-transform: uppercase; font-size: 9px; color: #86868b; margin-bottom: 6px; font-weight: 900; letter-spacing: 0.1em; }
        .hidden { display: none !important; }

        /* Rodapé Jurídico com Separadores */
        .footer-juridico { width: 100%; padding: 40px 0; display: flex; justify-content: center; align-items: center; gap: 15px; border-top: 1px solid #1c1c1e; margin-top: 40px; }
        .footer-juridico span { font-size: 10px; color: #48484a; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; cursor: pointer; transition: 0.3s; }
        .footer-juridico span:hover { color: #fff; }
        .footer-sep { color: #2c2c2e; font-size: 12px; }

        /* Modal Jurídico com Scroll Corrigido */
        .modal-juridico { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-body { background: #1c1c1e; border: 1px solid #38383a; border-radius: 24px; max-width: 800px; width: 100%; max-height: 85vh; display: flex; flex-direction: column; position: relative; }
        .modal-header { padding: 30px 40px 10px 40px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1c1c1e; }
        .modal-header h2 { font-size: 18px; font-weight: 900; text-transform: uppercase; color: #0071e3; margin: 0; }
        .btn-fechar-topo { color: #86868b; font-weight: 900; cursor: pointer; font-size: 12px; text-transform: uppercase; }
        .btn-fechar-topo:hover { color: #fff; }
        
        .modal-scroll-area { padding: 20px 40px 40px 40px; overflow-y: auto; flex-grow: 1; scrollbar-width: thin; scrollbar-color: #38383a transparent; }
        .modal-text { font-size: 13px; line-height: 1.8; color: #d1d1d6; white-space: pre-line; text-align: justify; }
        
        /* Estilização da barra de rolagem */
        .modal-scroll-area::-webkit-scrollbar { width: 6px; }
        .modal-scroll-area::-webkit-scrollbar-thumb { background: #38383a; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="ticker-bar">
        <span class="ticker-label">USDT/BRL BINANCE:</span>
        <span class="ticker-val" id="usdt_val">$ --</span>
    </div>

    <div class="main-wrapper">
        <h1 class="apple-logo">iFipe</h1>

        <div class="responsive-row">
            <a href="https://fabricademarcas.mercos.com/" target="_blank" class="banner-link">
                <img src="https://zmgosywpwidypxyhxkry.supabase.co/storage/v1/object/public/assets/IMG_2549.PNG" class="w-full h-auto block" alt="Fábrica de Marcas">
            </a>

            <div class="login-box">
                <div class="text-center mb-8">
                    <h2 class="text-xl md:text-2xl font-black italic">Encontre o melhor preço</h2>
                    <p class="text-[9px] text-blue-500 font-black uppercase tracking-[0.3em] mt-3">BUSCADOR APPLE ONLINE</p>
                </div>

                <form id="loginForm" onsubmit="realizarLogin(event)">
                    <label>E-mail de Acesso</label>
                    <input type="email" id="logEmail" class="apple-input" placeholder="seu@email.com" required>
                    <label>Senha</label>
                    <input type="password" id="logPass" class="apple-input" placeholder="••••••••" required>
                    <button type="submit" class="apple-button w-full">ENTRAR NO iFIPE</button>
                    <div class="text-center mt-6 space-y-2">
                        <span class="link-nav" onclick="toggleForm()">FAZER MEU CADASTRO</span>
                        <span class="link-nav text-gray-500" onclick="alert('Contate o suporte.')">ESQUECI MINHA SENHA</span>
                    </div>
                </form>

                <form id="registerForm" class="hidden" onsubmit="solicitarCadastro(event)">
                    <label>Nome Completo</label><input type="text" id="regNome" class="apple-input" required>
                    <label>CPF</label><input type="text" id="regCpf" class="apple-input" required>
                    <label>E-mail Oficial</label><input type="email" id="regEmail" class="apple-input" required>
                    <label>WhatsApp</label><input type="text" id="regWhats" class="apple-input" required>
                    <label>Criar Senha</label><input type="password" id="regPass" class="apple-input" required>
                    <button type="submit" class="apple-button w-full">ENVIAR SOLICITAÇÃO</button>
                    <span class="link-nav text-center mt-4" onclick="toggleForm()">VOLTAR AO LOGIN</span>
                </form>
                <p id="msg" class="mt-4 text-center text-[9px] font-black uppercase tracking-widest"></p>
            </div>

            <a href="https://linktr.ee/vipbrecossistema" target="_blank" class="banner-link">
                <img src="https://zmgosywpwidypxyhxkry.supabase.co/storage/v1/object/public/assets/eco.png" class="w-full h-auto block" alt="Ecossistema Apple">
            </a>
        </div>

        <div class="footer-juridico">
            <span onclick="abrirJuridico('termos')">Termos de Uso</span>
            <div class="footer-sep">|</div>
            <span onclick="abrirJuridico('privacidade')">Privacidade</span>
            <div class="footer-sep">|</div>
            <span onclick="abrirJuridico('lgpd')">LGPD</span>
        </div>
    </div>

    <div id="modalJuridico" class="modal-juridico" onclick="fecharJuridico(event)">
        <div class="modal-body" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 id="modalTitulo"></h2>
                <span class="btn-fechar-topo" onclick="fecharJuridico()">Fechar [x]</span>
            </div>
            <div class="modal-scroll-area">
                <div id="modalConteudo" class="modal-text"></div>
            </div>
        </div>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');

        const textosJuridicos = {
            termos: {
                titulo: "Termos e Condições de Uso",
                texto: `TERMOS E CONDIÇÕES DE USO – IFIPE.COM.BR
                
                1. Natureza Jurídica e Finalidade da Plataforma
                O iFipe.com.br constitui-se como plataforma informativa, destinada exclusivamente à divulgação, organização e disponibilização pública de dados fornecidos por terceiros, referentes a preços, modelos e demais informações relacionadas a dispositivos Apple comercializados por lojistas independentes.
                A plataforma não exerce atividade comercial, não intermedeia negociações, não representa fornecedores, não valida informações e não participa de qualquer relação contratual estabelecida entre usuários e anunciantes.
                O iFipe.com.br atua como mero repositório e indexador de informações, sem ingerência sobre a origem, veracidade, atualização ou precisão dos dados disponibilizados por terceiros.

                2. Ausência de Responsabilidade e Limitação de Garantias
                O usuário declara ciência de que o iFipe.com.br não assume qualquer responsabilidade, direta ou indireta, solidária ou subsidiária, por:
                - Atos, omissões, condutas, negociações ou transações realizadas entre usuários e fornecedores.
                - Pagamentos, transferências bancárias, comprovantes, fraudes, golpes ou quaisquer operações financeiras.
                - Entregas, prazos, logística, extravios, defeitos, vícios, garantias ou funcionamento dos produtos adquiridos.
                - Divergências de preço, estoque, disponibilidade, autenticidade ou procedência dos itens anunciados.
                - Informações incorretas, incompletas, desatualizadas ou imprecisas fornecidas por terceiros.
                - Danos materiais, morais, lucros cessantes, perdas financeiras ou qualquer prejuízo decorrente de transações comerciais.
                O iFipe.com.br não garante a continuidade, precisão, integridade ou atualização das informações exibidas, que possuem caráter meramente indicativo e não vinculante.

                3. Obrigações e Condutas do Usuário
                Ao acessar a plataforma, o usuário compromete-se a:
                - Utilizar o serviço em conformidade com a legislação brasileira.
                - Abster-se de empregar robôs, scripts ou automações de extração de dados.
                - Realizar toda verificação necessária antes de qualquer negociação.

                4. Direitos Autorais
                Todo o conteúdo constitui propriedade exclusiva da plataforma, protegido pela legislação brasileira.

                5. Foro Competente
                Fica eleito o Foro da Comarca de São Paulo – SP.

                Canal de Comunicação: bryan.paes@icloud.com`
            },
            privacidade: {
                titulo: "Política de Privacidade",
                texto: `POLÍTICA DE PRIVACIDADE – IFIPE.COM.BR

                1. Disposições Gerais
                Esta Política estabelece as diretrizes quanto ao tratamento de dados pessoais, em conformidade com a LGPD. O uso da plataforma implica ciência e concordância integral.

                2. Categorias de Dados Tratados
                - Identificação básica: nome completo (fornecido voluntariamente).
                - Credenciais de contato: e-mail e WhatsApp (comunicação operacional e autenticação).
                - Registros eletrônicos: IP, data/hora de acesso, tipo de dispositivo e navegador.
                Nenhum dado sensível é coletado ou tratado.

                3. Finalidades do Tratamento
                Os dados são usados para administração de conta, autenticação segura, prevenção de acessos indevidos e cumprimento de obrigações legais. Não utilizamos dados para fins publicitários ou venda.

                4. Segurança da Informação
                Adotamos medidas técnicas como criptografia, armazenamento de senhas com hash seguro e comunicação HTTPS para proteção dos dados pessoais.`
            },
            lgpd: {
                titulo: "Tratamento de Dados (LGPD)",
                texto: `POLÍTICA DE TRATAMENTO DE DADOS PESSOAIS – IFIPE.COM.BR (LGPD)

                1. Premissas e Enquadramento Legal
                O tratamento observa rigorosamente a Lei nº 13.709/2018. A plataforma atua como indexador de informações públicas. O iFipe.com.br é o Controlador dos dados pessoais fornecidos pelos usuários.

                2. Fundamentos Jurídicos
                O tratamento está amparado no consentimento do titular, execução de procedimentos necessários ao acesso e legítimo interesse para segurança da plataforma.

                3. Direitos do Titular
                Nos termos dos arts. 17 a 22 da LGPD, o usuário possui direitos de confirmação de tratamento, acesso, correção, eliminação de dados ou revogação do consentimento.

                4. Medidas de Segurança e Governança
                Adotamos criptografia de dados em trânsito e repouso, controle de acesso por permissão e monitoramento de sessões suspeitas conforme o art. 46 da LGPD.

                Encarregado pelo Tratamento (DPO): bryan.paes@icloud.com`
            }
        };

        function abrirJuridico(tipo) {
            const modal = document.getElementById('modalJuridico');
            document.getElementById('modalTitulo').innerText = textosJuridicos[tipo].titulo;
            document.getElementById('modalConteudo').innerText = textosJuridicos[tipo].texto;
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Trava o scroll do fundo
        }

        function fecharJuridico() {
            document.getElementById('modalJuridico').style.display = 'none';
            document.body.style.overflow = 'auto'; // Libera o scroll do fundo
        }

        function iniciarCambio() {
            const socket = new WebSocket('wss://stream.binance.com:9443/ws/usdtbrl@ticker');
            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                const el = document.getElementById('usdt_val');
                if(el) el.innerText = `$ ${parseFloat(data.c).toFixed(4).replace('.',',')}`;
            };
        }

        window.onload = iniciarCambio;

        function toggleForm() { 
            document.getElementById('loginForm').classList.toggle('hidden'); 
            document.getElementById('registerForm').classList.toggle('hidden'); 
            document.getElementById('msg').innerText = ""; 
        }

        async function realizarLogin(event) {
            event.preventDefault();
            const e = document.getElementById('logEmail').value;
            const p = document.getElementById('logPass').value;
            const { data } = await _s.from('clientes_buscador').select('*').eq('email', e).eq('senha', p).maybeSingle();
            
            if(data) {
                if(!data.aprovado) { alert("ACESSO PENDENTE DE LIBERAÇÃO."); return; }
                localStorage.setItem('iFipe_Token', data.id);
                window.location.href = 'buscar.html';
            } else { alert("E-MAIL OU SENHA INCORRETOS."); }
        }

        async function solicitarCadastro(event) {
            event.preventDefault();
            const n = document.getElementById('regNome').value;
            const c = document.getElementById('regCpf').value.replace(/\D/g,'');
            const em = document.getElementById('regEmail').value;
            const w = document.getElementById('regWhats').value;
            const p = document.getElementById('regPass').value;
            const { error } = await _s.from('clientes_buscador').insert([{ nome: n, cpf: c, email: em, whatsapp: w, senha: p, aprovado: false }]);
            if(!error) { alert("SOLICITAÇÃO ENVIADA COM SUCESSO!"); toggleForm(); }
            else { alert("ERRO AO CADASTRAR. VERIFIQUE OS DADOS."); }
        }
    </script>
</body>
</html>
