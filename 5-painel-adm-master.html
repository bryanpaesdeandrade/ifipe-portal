<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>iFipe - Master Control (Edição Ativada)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background:#0b0b0c; color:#fff; font-family:sans-serif; padding:2rem; }
        .admin-card { background:#1c1c1e; border:1px solid #38383a; border-radius:24px; padding:2rem; }
        .tab-btn { padding:12px 24px; border-radius:12px; font-size:11px; font-weight:900; text-transform:uppercase; cursor:pointer; border:none; transition:0.3s; }
        .tab-active { background:#0071e3; color:#fff; }
        .tab-inactive { background:#2c2c2e; color:#86868b; }
        th { text-align:left; font-size:10px; color:#86868b; text-transform:uppercase; padding:12px; border-bottom:1px solid #38383a; }
        td { padding:12px; font-size:13px; border-bottom:1px solid #1c1c1e; }
        .btn-green { background:#32d74b; color:#000; padding:6px 12px; border-radius:8px; font-size:10px; font-weight:bold; }
        .btn-red { background:#ff3b30; color:#fff; padding:6px 12px; border-radius:8px; font-size:10px; font-weight:bold; }
        .btn-edit { background:#5e5ce6; color:#fff; padding:6px 12px; border-radius:8px; font-size:10px; font-weight:bold; }
        input { background:#2c2c2e; border:1px solid #38383a; color:#fff; padding:4px 8px; border-radius:4px; width:100%; }
    </style>
</head>
<body>
    <header class="max-w-7xl mx-auto flex justify-between items-center mb-10">
        <h1 class="text-4xl font-black italic tracking-tighter">iFipe <span class="text-blue-500">MASTER</span></h1>
        <div class="flex gap-4">
            <button id="tab1" onclick="switchTab('clientes')" class="tab-btn tab-active">Clientes</button>
            <button id="tab2" onclick="switchTab('lojistas')" class="tab-btn tab-inactive">Anunciantes</button>
        </div>
    </header>

    <div class="max-w-7xl mx-auto admin-card overflow-x-auto">
        <table id="secClientes" class="w-full">
            <thead>
                <tr><th>Nome</th><th>E-mail / CPF</th><th>Senha</th><th>Status</th><th>Ações</th></tr>
            </thead>
            <tbody id="listaClientes"></tbody>
        </table>

        <table id="secLojistas" class="w-full hidden">
            <thead>
                <tr><th>Loja</th><th>WhatsApp</th><th>Senha</th><th>Status</th><th>Ações</th></tr>
            </thead>
            <tbody id="listaLojistas"></tbody>
        </table>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');

        function switchTab(t) {
            document.getElementById('secClientes').classList.toggle('hidden', t !== 'clientes');
            document.getElementById('secLojistas').classList.toggle('hidden', t !== 'lojistas');
            document.getElementById('tab1').className = t === 'clientes' ? 'tab-btn tab-active' : 'tab-btn tab-inactive';
            document.getElementById('tab2').className = t === 'lojistas' ? 'tab-btn tab-active' : 'tab-btn tab-inactive';
            t === 'clientes' ? carregarClientes() : carregarLojistas();
        }

        async function carregarClientes() {
            const { data } = await _s.from('clientes_buscador').select('*').order('criado_em', { ascending: false });
            document.getElementById('listaClientes').innerHTML = data.map(c => `
                <tr id="row-cli-${c.id}">
                    <td><input id="n-${c.id}" value="${c.nome}"></td>
                    <td>
                        <input id="e-${c.id}" value="${c.email}" class="mb-1 text-[11px]">
                        <input id="c-${c.id}" value="${c.cpf}" class="text-[11px] text-blue-400">
                    </td>
                    <td><input id="s-${c.id}" value="${c.senha}"></td>
                    <td class="${c.aprovado ? 'text-green-500' : 'text-red-500'} font-bold text-[10px]">${c.aprovado ? 'ATIVO' : 'PENDENTE'}</td>
                    <td>
                        <div class="flex flex-col gap-1">
                            <button onclick="salvarCli(${c.id})" class="btn-edit text-[9px]">SALVAR</button>
                            <button onclick="statusCli(${c.id}, ${!c.aprovado})" class="${c.aprovado ? 'btn-red' : 'btn-green'} text-[9px]">${c.aprovado ? 'BLOQUEAR' : 'APROVAR'}</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        async function carregarLojistas() {
            const { data } = await _s.from('fornecedores').select('*').order('nome');
            document.getElementById('listaLojistas').innerHTML = data.map(l => `
                <tr>
                    <td><input id="ln-${l.id}" value="${l.nome}"></td>
                    <td><input id="lw-${l.id}" value="${l.whatsapp}"></td>
                    <td><input id="ls-${l.id}" value="${l.senha}"></td>
                    <td class="${l.ativo ? 'text-green-500' : 'text-red-500'} font-bold text-[10px]">${l.ativo ? 'PAGO' : 'ATRASADO'}</td>
                    <td>
                        <div class="flex flex-col gap-1">
                            <button onclick="salvarLoj(${l.id})" class="btn-edit text-[9px]">SALVAR</button>
                            <button onclick="statusLoj(${l.id}, ${!l.ativo})" class="${l.ativo ? 'btn-red' : 'btn-green'} text-[9px]">${l.ativo ? 'SUSPENDER' : 'ATIVAR'}</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        async function salvarCli(id) {
            await _s.from('clientes_buscador').update({ 
                nome: document.getElementById('n-'+id).value,
                email: document.getElementById('e-'+id).value,
                cpf: document.getElementById('c-'+id).value,
                senha: document.getElementById('s-'+id).value
            }).eq('id', id);
            alert("Cliente atualizado!"); carregarClientes();
        }

        async function salvarLoj(id) {
            await _s.from('fornecedores').update({ 
                nome: document.getElementById('ln-'+id).value,
                whatsapp: document.getElementById('lw-'+id).value,
                senha: document.getElementById('ls-'+id).value
            }).eq('id', id);
            alert("Lojista atualizado!"); carregarLojistas();
        }

        async function statusCli(id, val) { await _s.from('clientes_buscador').update({ aprovado: val }).eq('id', id); carregarClientes(); }
        async function statusLoj(id, val) { await _s.from('fornecedores').update({ ativo: val }).eq('id', id); carregarLojistas(); }

        carregarClientes();
    </script>
</body>
</html>
