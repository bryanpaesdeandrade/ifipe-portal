<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Painel Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background:#0b0b0c; color:#fff; font-family:-apple-system, sans-serif; padding:2rem; }
        .login-box { background:#1c1c1e; border:1px solid #38383a; border-radius:24px; padding:3rem; max-width:400px; margin:10vh auto; text-align:center; }
        .admin-card { background:#1c1c1e; border:1px solid #38383a; border-radius:24px; padding:2rem; margin-bottom:2rem; }
        .apple-input { background:#2c2c2e; border:1px solid #38383a; border-radius:12px; padding:15px; width:100%; color:white; outline:none; margin-bottom:1rem; font-size:14px; }
        .apple-button { background:#fff; color:#000; font-weight:900; border-radius:50px; padding:15px; width:100%; cursor:pointer; text-transform:uppercase; font-size:12px; border:none; transition:0.3s; }
        .apple-button:hover { background:#0071e3; color:#fff; }
        .status-badge { padding:4px 10px; border-radius:20px; font-size:10px; font-weight:900; text-transform:uppercase; }
        .bg-green { background:#32d74b; color:#000; }
        .bg-red { background:#ff3b30; color:#fff; }
        table { width:100%; border-collapse:collapse; margin-top:1rem; }
        th { font-size:10px; color:#86868b; text-transform:uppercase; padding:10px; border-bottom:1px solid #38383a; text-align:left; }
        td { padding:15px 10px; border-bottom:1px solid #2c2c2e; font-size:13px; }
        .btn-action { padding:6px 12px; border-radius:8px; font-size:10px; font-weight:bold; cursor:pointer; text-transform:uppercase; border:none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loginSection" class="login-box">
        <h1 class="text-4xl font-black italic mb-2">iFipe <span class="text-blue-500">MASTER</span></h1>
        <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-8">Acesso Restrito</p>
        <input type="email" id="admEmail" class="apple-input" placeholder="E-mail Corporativo">
        <input type="password" id="admPass" class="apple-input" placeholder="Senha">
        <button onclick="fazerLoginAdmin()" class="apple-button">Acessar Sistema</button>
        <p id="loginMsg" class="mt-4 text-[10px] font-bold text-red-500 uppercase"></p>
    </div>

    <div id="dashSection" class="hidden max-w-6xl mx-auto">
        <header class="mb-10 flex justify-between items-center bg-[#1c1c1e] p-6 rounded-3xl border border-[#38383a]">
            <div>
                <h1 class="text-3xl font-black italic">iFipe <span class="text-blue-500">MASTER</span></h1>
                <p id="userLogged" class="text-gray-400 text-[11px] font-bold uppercase tracking-widest mt-1"></p>
            </div>
            <div class="flex gap-4">
                <button onclick="carregarTudo()" class="bg-blue-600 text-white px-6 py-2 rounded-full font-black text-[10px] uppercase">Atualizar Dados</button>
                <button onclick="sair()" class="bg-red-500 text-white px-6 py-2 rounded-full font-black text-[10px] uppercase">Sair</button>
            </div>
        </header>

        <div id="secEquipe" class="admin-card hidden">
            <h2 class="text-xl font-black italic mb-4 text-blue-500">Gestão de Equipe (Acessos)</h2>
            <div class="grid grid-cols-4 gap-4 mb-6">
                <input type="text" id="eqNome" class="apple-input m-0" placeholder="Nome">
                <input type="email" id="eqEmail" class="apple-input m-0" placeholder="E-mail">
                <input type="text" id="eqSenha" class="apple-input m-0" placeholder="Senha">
                <select id="eqCargo" class="apple-input m-0">
                    <option value="FINANCEIRO">Financeiro</option>
                    <option value="SUPORTE">Suporte</option>
                    <option value="MASTER">Master (Sócio)</option>
                </select>
            </div>
            <button onclick="addEquipe()" class="apple-button w-auto px-8 mb-6">Cadastrar Funcionário</button>
            <table>
                <thead><tr><th>Nome</th><th>E-mail</th><th>Senha</th><th>Cargo</th><th>Status</th><th>Ação</th></tr></thead>
                <tbody id="listaEquipe"></tbody>
            </table>
        </div>

        <div id="secLojistas" class="admin-card hidden">
            <h2 class="text-xl font-black italic mb-4">Lojistas Anunciantes (Financeiro)</h2>
            <table>
                <thead><tr><th>Loja</th><th>WhatsApp</th><th>Senha</th><th>Status Financeiro</th><th>Ação</th></tr></thead>
                <tbody id="listaLojistas"></tbody>
            </table>
        </div>

        <div id="secClientes" class="admin-card hidden">
            <h2 class="text-xl font-black italic mb-4">Clientes do Buscador (Aprovações)</h2>
            <table>
                <thead><tr><th>Nome</th><th>CPF</th><th>E-mail</th><th>Senha</th><th>Status</th><th>Ação</th></tr></thead>
                <tbody id="listaClientes"></tbody>
            </table>
        </div>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let adminLogado = null;

        async function fazerLoginAdmin() {
            const email = document.getElementById('admEmail').value;
            const pass = document.getElementById('admPass').value;
            const { data } = await _s.from('admin_users').select('*').eq('email', email).eq('senha', pass).maybeSingle();
            
            if (data && data.ativo) {
                adminLogado = data;
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('dashSection').classList.remove('hidden');
                document.getElementById('userLogged').innerText = `${data.nome} | Permissão: ${data.cargo}`;
                
                // CONTROLE DE NÍVEIS DE ACESSO
                if(data.cargo === 'MASTER') {
                    document.getElementById('secEquipe').classList.remove('hidden');
                    document.getElementById('secLojistas').classList.remove('hidden');
                    document.getElementById('secClientes').classList.remove('hidden');
                } else if(data.cargo === 'FINANCEIRO') {
                    document.getElementById('secLojistas').classList.remove('hidden');
                    document.getElementById('secClientes').classList.remove('hidden');
                } else if(data.cargo === 'SUPORTE') {
                    document.getElementById('secClientes').classList.remove('hidden');
                }
                carregarTudo();
            } else { document.getElementById('loginMsg').innerText = "ACESSO NEGADO OU INATIVO."; }
        }

        function sair() {
            adminLogado = null;
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('dashSection').classList.add('hidden');
            document.getElementById('admEmail').value = "";
            document.getElementById('admPass').value = "";
        }

        async function carregarTudo() {
            if(!adminLogado) return;
            
            if(adminLogado.cargo === 'MASTER') {
                const {data} = await _s.from('admin_users').select('*').order('id');
                renderEquipe(data || []);
            }
            if(adminLogado.cargo === 'MASTER' || adminLogado.cargo === 'FINANCEIRO') {
                const {data} = await _s.from('fornecedores').select('*').order('nome');
                renderLojistas(data || []);
            }
            if(adminLogado.cargo === 'MASTER' || adminLogado.cargo === 'FINANCEIRO' || adminLogado.cargo === 'SUPORTE') {
                const {data} = await _s.from('clientes_buscador').select('*').order('criado_em', {ascending:false});
                renderClientes(data || []);
            }
        }

        function renderEquipe(data) {
            document.getElementById('listaEquipe').innerHTML = data.map(e => `
                <tr>
                    <td class="font-bold">${e.nome}</td><td>${e.email}</td><td class="font-mono text-blue-400">${e.senha}</td>
                    <td class="font-bold text-gray-400">${e.cargo}</td>
                    <td><span class="status-badge ${e.ativo ? 'bg-green' : 'bg-red'}">${e.ativo ? 'Ativo' : 'Bloqueado'}</span></td>
                    <td><button onclick="toggleUser('admin_users', ${e.id}, ${e.ativo})" class="btn-action ${e.ativo ? 'bg-red' : 'bg-green'} text-black">${e.ativo ? 'Bloquear' : 'Ativar'}</button></td>
                </tr>`).join('');
        }

        function renderLojistas(data) {
            document.getElementById('listaLojistas').innerHTML = data.map(l => `
                <tr>
                    <td class="font-bold text-blue-500">${l.nome}</td><td>${l.whatsapp}</td><td class="font-mono text-blue-400">${l.senha}</td>
                    <td><span class="status-badge ${l.ativo ? 'bg-green' : 'bg-red'}">${l.ativo ? 'Liberado' : 'Bloqueado'}</span></td>
                    <td><button onclick="toggleUser('fornecedores', ${l.id}, ${l.ativo})" class="btn-action ${l.ativo ? 'bg-red' : 'bg-green'} text-black">${l.ativo ? 'Bloquear' : 'Liberar'}</button></td>
                </tr>`).join('');
        }

        function renderClientes(data) {
            document.getElementById('listaClientes').innerHTML = data.map(c => `
                <tr>
                    <td class="font-bold">${c.nome}</td><td class="font-mono text-gray-500">${c.cpf}</td><td>${c.email}</td><td class="font-mono text-blue-400">${c.senha}</td>
                    <td><span class="status-badge ${c.aprovado ? 'bg-green' : 'bg-red'}">${c.aprovado ? 'Liberado' : 'Pendente/Bloqueado'}</span></td>
                    <td><button onclick="toggleCliente(${c.id}, ${c.aprovado})" class="btn-action ${c.aprovado ? 'bg-red' : 'bg-green'} text-black">${c.aprovado ? 'Bloquear' : 'Aprovar'}</button></td>
                </tr>`).join('');
        }

        async function addEquipe() {
            const nome = document.getElementById('eqNome').value;
            const email = document.getElementById('eqEmail').value;
            const senha = document.getElementById('eqSenha').value;
            const cargo = document.getElementById('eqCargo').value;
            if(nome && email && senha) {
                await _s.from('admin_users').insert([{nome, email, senha, cargo}]);
                document.getElementById('eqNome').value = ""; document.getElementById('eqEmail').value = ""; document.getElementById('eqSenha').value = "";
                carregarTudo();
            }
        }

        async function toggleUser(tabela, id, status) {
            await _s.from(tabela).update({ ativo: !status }).eq('id', id);
            carregarTudo();
        }

        async function toggleCliente(id, status) {
            await _s.from('clientes_buscador').update({ aprovado: !status }).eq('id', id);
            carregarTudo();
        }
    </script>
</body>
</html>
