<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Painel Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background:#0b0b0c; color:#fff; font-family:-apple-system, sans-serif; padding:2rem; }
        .login-box { background:#1c1c1e; border:1px solid #38383a; border-radius:24px; padding:3rem; max-width:400px; margin:10vh auto; text-align:center; }
        .admin-card { background:#1c1c1e; border:1px solid #38383a; border-radius:24px; padding:2rem; margin-bottom:2rem; }
        .apple-input { background:#2c2c2e; border:1px solid #38383a; border-radius:12px; padding:15px; width:100%; color:white; outline:none; margin-bottom:1rem; font-size:14px; }
        .apple-button { background:#fff; color:#000; font-weight:900; border-radius:50px; padding:15px; width:100%; cursor:pointer; text-transform:uppercase; font-size:12px; border:none; transition:0.3s; }
        .apple-button:hover { background:#0071e3; color:#fff; }
        .status-badge { padding:4px 10px; border-radius:20px; font-size:10px; font-weight:900; text-transform:uppercase; }
        .bg-green { background:#32d74b; color:#000; }
        .bg-red { background:#ff3b30; color:#fff; }
        .bg-yellow { background:#ffcc00; color:#000; }
        table { width:100%; border-collapse:collapse; margin-top:1rem; }
        th { font-size:10px; color:#86868b; text-transform:uppercase; padding:10px; border-bottom:1px solid #38383a; text-align:left; }
        td { padding:15px 10px; border-bottom:1px solid #2c2c2e; font-size:13px; }
        .btn-action { padding:6px 12px; border-radius:8px; font-size:10px; font-weight:bold; cursor:pointer; text-transform:uppercase; border:none; margin-right:4px; transition:0.2s; }
        .btn-action:hover { opacity:0.8; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loginSection" class="login-box">
        <h1 class="text-4xl font-black italic mb-2">iFipe <span class="text-blue-500">MASTER</span></h1>
        <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-8">Acesso Restrito</p>
        <input type="email" id="admEmail" class="apple-input" placeholder="E-mail Corporativo">
        <input type="password" id="admPass" class="apple-input" placeholder="Senha">
        <button onclick="fazerLoginAdmin()" class="apple-button">Acessar Sistema</button>
        <p id="loginMsg" class="mt-4 text-[10px] font-bold text-red-500 uppercase"></p>
    </div>

    <div id="dashSection" class="hidden max-w-7xl mx-auto">
        <header class="mb-10 flex justify-between items-center bg-[#1c1c1e] p-6 rounded-3xl border border-[#38383a]">
            <div>
                <h1 class="text-3xl font-black italic">iFipe <span class="text-blue-500">MASTER</span></h1>
                <p id="userLogged" class="text-gray-400 text-[11px] font-bold uppercase tracking-widest mt-1"></p>
            </div>
            <div class="flex gap-4">
                <button onclick="carregarTudo()" class="bg-blue-600 text-white px-6 py-2 rounded-full font-black text-[10px] uppercase">Atualizar Dados</button>
                <button onclick="sair()" class="bg-red text-white px-6 py-2 rounded-full font-black text-[10px] uppercase">Sair</button>
            </div>
        </header>

        <div id="secEquipe" class="admin-card hidden">
            <h2 class="text-xl font-black italic mb-4 text-blue-500">Sua Equipe (Controle de Funcionários)</h2>
            <div class="grid grid-cols-4 gap-4 mb-6">
                <input type="text" id="eqNome" class="apple-input m-0" placeholder="Nome">
                <input type="email" id="eqEmail" class="apple-input m-0" placeholder="E-mail">
                <input type="text" id="eqSenha" class="apple-input m-0" placeholder="Senha de Acesso">
                <input type="text" id="eqCargo" class="apple-input m-0" placeholder="Cargo (Ex: Atendente)">
            </div>
            <button onclick="addEquipe()" class="apple-button w-auto px-8 mb-6">Cadastrar Funcionário</button>
            <div class="overflow-x-auto">
                <table>
                    <thead><tr><th>Nome</th><th>E-mail</th><th>Senha</th><th>Cargo</th><th>Status</th><th>Ações</th></tr></thead>
                    <tbody id="listaEquipe"></tbody>
                </table>
            </div>
        </div>

        <div id="secLojistas" class="admin-card hidden">
            <h2 class="text-xl font-black italic mb-4">Gestão de Lojistas Anunciantes</h2>
            <div class="grid grid-cols-3 gap-4 mb-4">
                <input type="text" id="lojNome" class="apple-input m-0" placeholder="Nome da Loja">
                <input type="text" id="lojWhats" class="apple-input m-0" placeholder="WhatsApp (Apenas Números)">
                <input type="text" id="lojSenha" class="apple-input m-0" placeholder="Criar Senha">
            </div>
            <button onclick="addLojista()" class="apple-button w-auto px-8 mb-8 bg-blue-500 text-white">Cadastrar Lojista Pronto</button>
            <div class="overflow-x-auto">
                <table>
                    <thead><tr><th>Loja</th><th>WhatsApp</th><th>Senha</th><th>Status</th><th>Ações</th></tr></thead>
                    <tbody id="listaLojistas"></tbody>
                </table>
            </div>
        </div>

        <div id="secClientes" class="admin-card hidden">
            <h2 class="text-xl font-black italic mb-4">Gestão de Clientes VIP (Buscador)</h2>
            <div class="grid grid-cols-5 gap-4 mb-4">
                <input type="text" id="cliNome" class="apple-input m-0" placeholder="Nome">
                <input type="text" id="cliCpf" class="apple-input m-0" placeholder="CPF Válido">
                <input type="email" id="cliEmail" class="apple-input m-0" placeholder="E-mail">
                <input type="text" id="cliWhats" class="apple-input m-0" placeholder="WhatsApp">
                <input type="text" id="cliSenha" class="apple-input m-0" placeholder="Criar Senha">
            </div>
            <button onclick="addCliente()" class="apple-button w-auto px-8 mb-8 bg-blue-500 text-white">Cadastrar Cliente Pronto</button>
            <div class="overflow-x-auto">
                <table>
                    <thead><tr><th>Nome</th><th>CPF</th><th>E-mail</th><th>Senha</th><th>Status</th><th>Ações</th></tr></thead>
                    <tbody id="listaClientes"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let adminLogado = null;

        async function fazerLoginAdmin() {
            const email = document.getElementById('admEmail').value;
            const pass = document.getElementById('admPass').value;
            const { data } = await _s.from('admin_users').select('*').eq('email', email).eq('senha', pass).maybeSingle();
            
            if (data && data.ativo) {
                adminLogado = data;
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('dashSection').classList.remove('hidden');
                document.getElementById('userLogged').innerText = `${data.nome} | Função: ${data.cargo}`;
                
                document.getElementById('secLojistas').classList.remove('hidden');
                document.getElementById('secClientes').classList.remove('hidden');
                
                if(data.email === 'admin@ifipe.com') {
                    document.getElementById('secEquipe').classList.remove('hidden');
                }
                carregarTudo();
            } else { document.getElementById('loginMsg').innerText = "ACESSO NEGADO OU INATIVO."; }
        }

        function sair() {
            adminLogado = null;
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('dashSection').classList.add('hidden');
            document.getElementById('admEmail').value = "";
            document.getElementById('admPass').value = "";
        }

        async function carregarTudo() {
            if(!adminLogado) return;
            if(adminLogado.email === 'admin@ifipe.com') {
                const {data} = await _s.from('admin_users').select('*').order('id');
                renderEquipe(data || []);
            }
            const {data: loj} = await _s.from('fornecedores').select('*').order('nome');
            renderLojistas(loj || []);
            const {data: cli} = await _s.from('clientes_buscador').select('*').order('criado_em', {ascending:false});
            renderClientes(cli || []);
        }

        function renderEquipe(data) {
            document.getElementById('listaEquipe').innerHTML = data.map(e => `
                <tr>
                    <td class="font-bold">${e.nome}</td><td>${e.email}</td><td class="font-mono text-blue-400">${e.senha}</td>
                    <td class="font-bold text-gray-400">${e.cargo}</td>
                    <td><span class="status-badge ${e.ativo ? 'bg-green' : 'bg-yellow'}">${e.ativo ? 'Ativo' : 'Bloqueado'}</span></td>
                    <td style="min-width: 150px;">
                        ${e.email !== 'admin@ifipe.com' ? `<button onclick="toggleUser('admin_users', ${e.id}, ${e.ativo})" class="btn-action ${e.ativo ? 'bg-yellow' : 'bg-green'}">${e.ativo ? 'Bloquear' : 'Ativar'}</button>
                        <button onclick="deletarEquipe(${e.id})" class="btn-action bg-red">Excluir</button>` : '<span class="text-[10px] text-gray-600 font-bold uppercase">Acesso Mestre</span>'}
                    </td>
                </tr>`).join('');
        }

        function renderLojistas(data) {
            document.getElementById('listaLojistas').innerHTML = data.map(l => `
                <tr>
                    <td class="font-bold text-blue-500">${l.nome}</td><td>${l.whatsapp}</td><td class="font-mono text-blue-400">${l.senha}</td>
                    <td><span class="status-badge ${l.ativo ? 'bg-green' : 'bg-yellow'}">${l.ativo ? 'Liberado' : 'Bloqueado'}</span></td>
                    <td style="min-width: 150px;">
                        <button onclick="toggleUser('fornecedores', ${l.id}, ${l.ativo})" class="btn-action ${l.ativo ? 'bg-yellow' : 'bg-green'}">${l.ativo ? 'Bloquear' : 'Liberar'}</button>
                        <button onclick="deletarLojista(${l.id})" class="btn-action bg-red">Excluir</button>
                    </td>
                </tr>`).join('');
        }

        function renderClientes(data) {
            document.getElementById('listaClientes').innerHTML = data.map(c => `
                <tr>
                    <td class="font-bold">${c.nome}</td><td class="font-mono text-gray-500">${c.cpf}</td><td>${c.email}</td><td class="font-mono text-blue-400">${c.senha}</td>
                    <td><span class="status-badge ${c.aprovado ? 'bg-green' : 'bg-yellow'}">${c.aprovado ? 'Liberado' : 'Pendente'}</span></td>
                    <td style="min-width: 150px;">
                        <button onclick="toggleCliente(${c.id}, ${c.aprovado})" class="btn-action ${c.aprovado ? 'bg-yellow' : 'bg-green'}">${c.aprovado ? 'Bloquear' : 'Aprovar'}</button>
                        <button onclick="deletarCliente(${c.id})" class="btn-action bg-red">Excluir</button>
                    </td>
                </tr>`).join('');
        }

        // --- FUNÇÕES DE EXCLUSÃO ---
        async function deletarEquipe(id) {
            if(confirm("Tem certeza que deseja EXCLUIR DEFINITIVAMENTE este funcionário?")) {
                await _s.from('admin_users').delete().eq('id', id);
                carregarTudo();
            }
        }

        async function deletarLojista(id) {
            if(confirm("ATENÇÃO: Excluir a loja apagará TAMBÉM todas as ofertas dela do ranking. Confirmar exclusão?")) {
                await _s.from('ofertas').delete().eq('fornecedor_id', id); // Limpa as ofertas primeiro
                await _s.from('fornecedores').delete().eq('id', id);       // Depois apaga o lojista
                carregarTudo();
            }
        }

        async function deletarCliente(id) {
            if(confirm("Tem certeza que deseja EXCLUIR DEFINITIVAMENTE este cliente?")) {
                await _s.from('clientes_buscador').delete().eq('id', id);
                carregarTudo();
            }
        }

        // --- FUNÇÕES DE CADASTRO E TOGGLE (MANTIDAS INTACTAS) ---
        async function addEquipe() {
            const nome = document.getElementById('eqNome').value; const email = document.getElementById('eqEmail').value; const senha = document.getElementById('eqSenha').value; const cargo = document.getElementById('eqCargo').value;
            if(nome && email && senha && cargo) {
                await _s.from('admin_users').insert([{nome, email, senha, cargo}]);
                document.getElementById('eqNome').value = ""; document.getElementById('eqEmail').value = ""; document.getElementById('eqSenha').value = ""; document.getElementById('eqCargo').value = ""; carregarTudo();
            } else { alert("Preencha todos os campos da equipe."); }
        }

        async function addLojista() {
            const nome = document.getElementById('lojNome').value; const whatsapp = document.getElementById('lojWhats').value.replace(/\D/g, ''); const senha = document.getElementById('lojSenha').value;
            if(nome && whatsapp && senha) {
                await _s.from('fornecedores').insert([{nome, whatsapp, senha, ativo: true}]);
                document.getElementById('lojNome').value = ""; document.getElementById('lojWhats').value = ""; document.getElementById('lojSenha').value = ""; carregarTudo();
            } else { alert("Preencha todos os campos do lojista."); }
        }

        async function addCliente() {
            const nome = document.getElementById('cliNome').value; const cpf = document.getElementById('cliCpf').value.replace(/\D/g, ''); const email = document.getElementById('cliEmail').value; const whatsapp = document.getElementById('cliWhats').value.replace(/\D/g, ''); const senha = document.getElementById('cliSenha').value;
            if(nome && cpf && email && senha) {
                const { error } = await _s.from('clientes_buscador').insert([{nome, cpf, email, whatsapp, senha, aprovado: true}]);
                if (error) { alert("Erro! Verifique se o CPF é real e se CPF/E-mail já não estão cadastrados."); } else {
                    document.getElementById('cliNome').value = ""; document.getElementById('cliCpf').value = ""; document.getElementById('cliEmail').value = ""; document.getElementById('cliWhats').value = ""; document.getElementById('cliSenha').value = ""; carregarTudo();
                }
            } else { alert("Preencha os campos obrigatórios do cliente."); }
        }

        async function toggleUser(tabela, id, status) { await _s.from(tabela).update({ ativo: !status }).eq('id', id); carregarTudo(); }
        async function toggleCliente(id, status) { await _s.from('clientes_buscador').update({ aprovado: !status }).eq('id', id); carregarTudo(); }
    </script>
</body>
</html>
