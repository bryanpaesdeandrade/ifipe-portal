<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Master Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background:#0b0b0c; color:#fff; font-family:sans-serif; padding:2rem; }
        .admin-card { background:#1c1c1e; border:1px solid #38383a; border-radius:24px; padding:2rem; margin-bottom:2rem; }
        .status-badge { padding:4px 10px; border-radius:20px; font-size:10px; font-weight:900; text-transform:uppercase; }
        .bg-green { background:#32d74b; color:#000; }
        .bg-red { background:#ff3b30; color:#fff; }
        .bg-yellow { background:#ffcc00; color:#000; }
        table { width:100%; border-collapse:collapse; margin-top:1rem; }
        th { font-size:10px; color:#86868b; text-transform:uppercase; padding:10px; border-bottom:1px solid #38383a; text-align:left; }
        td { padding:15px 10px; border-bottom:1px solid #2c2c2e; font-size:13px; }
        .btn-action { padding:6px 12px; border-radius:8px; font-size:10px; font-weight:bold; cursor:pointer; text-transform:uppercase; border:none; transition: 0.2s; }
        .btn-action:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <header class="mb-10 flex justify-between items-center">
        <div>
            <h1 class="text-4xl font-black italic">iFipe <span class="text-blue-500">MASTER</span></h1>
            <p class="text-gray-500 text-[10px] font-bold uppercase tracking-widest">Gestão de Acessos e Inadimplência</p>
        </div>
        <button onclick="carregarTudo()" class="bg-white text-black px-6 py-2 rounded-full font-black text-[10px] uppercase">Atualizar Listas</button>
    </header>

    <div class="admin-card">
        <h2 class="text-xl font-black italic mb-4">Clientes do Buscador (VIP)</h2>
        <table>
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>E-mail</th>
                    <th>Senha</th>
                    <th>Financeiro</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody id="listaClientes"></tbody>
        </table>
    </div>

    <div class="admin-card">
        <h2 class="text-xl font-black italic mb-4">Lojistas Anunciantes (Painel)</h2>
        <table>
            <thead>
                <tr>
                    <th>Nome da Loja</th>
                    <th>WhatsApp</th>
                    <th>Senha</th>
                    <th>Financeiro</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody id="listaLojistas"></tbody>
        </table>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');

        async function carregarTudo() {
            const [clientes, lojistas] = await Promise.all([
                _s.from('clientes_buscador').select('*').order('nome'),
                _s.from('fornecedores').select('*').order('nome')
            ]);
            renderClientes(clientes.data || []);
            renderLojistas(lojistas.data || []);
        }

        function renderClientes(data) {
            document.getElementById('listaClientes').innerHTML = data.map(c => `
                <tr>
                    <td class="font-bold">${c.nome}</td>
                    <td>${c.email}</td>
                    <td class="font-mono text-blue-400 font-bold">${c.senha}</td>
                    <td><span class="status-badge ${c.aprovado ? 'bg-green' : 'bg-red'}">${c.aprovado ? 'Pago/Liberado' : 'Bloqueado'}</span></td>
                    <td>
                        <button onclick="toggleCliente(${c.id}, ${c.aprovado})" class="btn-action ${c.aprovado ? 'bg-red' : 'bg-green'} text-black">
                            ${c.aprovado ? 'Bloquear' : 'Liberar'}
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        function renderLojistas(data) {
            document.getElementById('listaLojistas').innerHTML = data.map(l => `
                <tr>
                    <td class="font-bold text-blue-500">${l.nome}</td>
                    <td>${l.whatsapp}</td>
                    <td class="font-mono text-blue-400 font-bold">${l.senha}</td>
                    <td><span class="status-badge ${l.ativo ? 'bg-green' : 'bg-red'}">${l.ativo ? 'Pago/Liberado' : 'Bloqueado'}</span></td>
                    <td>
                        <button onclick="toggleLojista(${l.id}, ${l.ativo})" class="btn-action ${l.ativo ? 'bg-red' : 'bg-green'} text-black">
                            ${l.ativo ? 'Bloquear' : 'Liberar'}
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        async function toggleCliente(id, status) {
            await _s.from('clientes_buscador').update({ aprovado: !status }).eq('id', id);
            carregarTudo();
        }

        async function toggleLojista(id, status) {
            await _s.from('fornecedores').update({ ativo: !status }).eq('id', id);
            carregarTudo();
        }

        carregarTudo();
    </script>
</body>
</html>
