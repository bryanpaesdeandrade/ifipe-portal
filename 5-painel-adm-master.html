<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Admin Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background:#0b0b0c; color:#fff; font-family:sans-serif; padding:2rem; }
        .admin-card { background:#1c1c1e; border:1px solid #38383a; border-radius:20px; padding:1.5rem; }
        th { text-align:left; font-size:10px; color:#86868b; text-transform:uppercase; padding:12px; border-bottom:1px solid #38383a; }
        td { padding:12px; font-size:13px; border-bottom:1px solid #1c1c1e; }
        .btn-green { background:#32d74b; color:#000; padding:8px 15px; border-radius:10px; font-size:10px; font-weight:900; cursor:pointer; }
        .btn-red { background:#ff3b30; color:#fff; padding:8px 15px; border-radius:10px; font-size:10px; font-weight:900; cursor:pointer; }
        .data-cell { font-family: monospace; font-weight: bold; color: #0071e3; }
    </style>
</head>
<body>
    <header class="max-w-7xl mx-auto flex justify-between items-center mb-10">
        <div>
            <h1 class="text-4xl font-black italic tracking-tighter">iFipe <span class="text-blue-500 text-2xl">MASTER</span></h1>
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-[0.3em]">Gestão de Usuários e Segurança</p>
        </div>
        <button onclick="carregar()" class="bg-white text-black px-6 py-2 rounded-full font-black text-xs uppercase hover:bg-blue-500 hover:text-white transition">Sincronizar</button>
    </header>

    <div class="max-w-7xl mx-auto admin-card overflow-x-auto">
        <table class="w-full">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>CPF</th>
                    <th>E-mail</th>
                    <th>Senha</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody id="lista"></tbody>
        </table>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');

        async function carregar() {
            const { data } = await _s.from('clientes_buscador').select('*').order('criado_em', { ascending: false });
            if (data) {
                document.getElementById('lista').innerHTML = data.map(c => `
                    <tr>
                        <td class="font-black">${c.nome}</td>
                        <td class="data-cell">${c.cpf}</td>
                        <td class="text-gray-400 text-xs">${c.email}</td>
                        <td class="data-cell text-yellow-500">${c.senha}</td>
                        <td class="${c.aprovado ? 'text-green-500' : 'text-red-500'} font-bold text-[10px]">${c.aprovado ? 'ATIVO' : 'BLOQUEADO'}</td>
                        <td class="flex gap-2">
                            ${!c.aprovado ? `<button onclick="status(${c.id}, true)" class="btn-green">APROVAR</button>` : `<button onclick="status(${c.id}, false)" class="btn-red">BLOQUEAR</button>`}
                            <button onclick="derrubar(${c.id})" class="bg-gray-700 p-2 rounded text-[9px] font-bold">DERRUBAR</button>
                        </td>
                    </tr>
                `).join('');
            }
        }

        async function status(id, val) {
            await _s.from('clientes_buscador').update({ aprovado: val }).eq('id', id);
            carregar();
        }

        async function derrubar(id) {
            await _s.from('clientes_buscador').update({ last_session_id: null }).eq('id', id);
            alert("Usuário desconectado!");
            carregar();
        }
        carregar();
    </script>
</body>
</html>
