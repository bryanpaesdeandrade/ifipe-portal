<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GESTOR SETH 7️⃣ - ANUNCIAR EM MASSA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .card { background: #1c1c1e; border: 1px solid #38383a; border-radius: 24px; padding: 2rem; }
        .btn-large { background: #0071e3; color: white; font-weight: 800; padding: 1.5rem; border-radius: 20px; font-size: 1.2rem; transition: 0.3s; border: none; cursor: pointer; width: 100%; }
        .btn-large:hover { background: #005bb5; transform: scale(1.02); }
        .btn-outline { background: transparent; border: 2px solid #38383a; color: white; font-weight: 700; padding: 0.75rem 1.5rem; border-radius: 50px; transition: 0.3s; cursor: pointer; }
        .btn-outline:hover { border-color: #0071e3; color: #0071e3; }
        .metric-card { background: #2c2c2e; border-radius: 16px; padding: 1.5rem; text-align: center; }
        .metric-value { font-size: 2rem; font-weight: 800; color: #0071e3; }
        .log-area { background: #111; border: 1px solid #2c2c2e; border-radius: 12px; padding: 1rem; font-family: monospace; font-size: 0.8rem; height: 200px; overflow-y: auto; white-space: pre-wrap; }
        .progress-bar { height: 8px; background: #2c2c2e; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: #0071e3; width: 0%; transition: width 0.2s; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">

        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl md:text-4xl font-black italic">GESTOR SETH <span class="text-blue-500">7️⃣</span></h1>
            <button onclick="window.close()" class="btn-outline text-sm px-4 py-2">
                <i class="fas fa-times mr-2"></i>FECHAR
            </button>
        </div>

        <!-- Área de login (verificação silenciosa) -->
        <div id="auth-warning" class="hidden card !p-4 mb-6 text-red-500 border-red-500/30">
            <i class="fas fa-exclamation-triangle mr-2"></i> Você não está logado como anunciante. Redirecionando...
        </div>

        <!-- Botões principais -->
        <div class="grid md:grid-cols-2 gap-6 mb-10">
            <button onclick="baixarPlanilha()" class="btn-large flex items-center justify-center gap-3">
                <i class="fas fa-download text-2xl"></i> BAIXAR PLANILHA PADRÃO
            </button>
            <label class="btn-large flex items-center justify-center gap-3 cursor-pointer bg-white text-black hover:bg-gray-200">
                <i class="fas fa-upload text-2xl"></i> SUBIR PLANILHA PREENCHIDA
                <input type="file" id="fileInput" class="hidden" accept=".xlsx,.xls" onchange="processarUpload(event)">
            </label>
        </div>

        <!-- Dashboard (invisível até upload válido) -->
        <div id="dashboard" class="hidden space-y-6">
            <!-- Métricas -->
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div class="metric-card">
                    <div class="text-sm text-gray-400 mb-1">INVESTIMENTO TOTAL</div>
                    <div class="metric-value" id="investTotal">R$ 0,00</div>
                </div>
                <div class="metric-card">
                    <div class="text-sm text-gray-400 mb-1">LUCRO BRUTO ESTIMADO</div>
                    <div class="metric-value" id="lucroTotal">R$ 0,00</div>
                </div>
                <div class="metric-card">
                    <div class="text-sm text-gray-400 mb-1">MARKUP MÉDIO</div>
                    <div class="metric-value" id="markupMedio">0%</div>
                </div>
            </div>

            <!-- Tabela de revisão -->
            <div class="card overflow-x-auto">
                <h2 class="text-xl font-bold mb-4">📋 Revisão dos Itens</h2>
                <table class="w-full text-xs">
                    <thead class="text-gray-400 border-b border-[#38383a]">
                        <tr>
                            <th class="text-left py-2">Modelo</th>
                            <th class="text-left">Capacidade</th>
                            <th class="text-left">Cor</th>
                            <th class="text-left">Condição</th>
                            <th class="text-left">Origem</th>
                            <th class="text-right">Custo (R$)</th>
                            <th class="text-right">Preço (R$)</th>
                            <th class="text-right">Estoque</th>
                            <th class="text-right">Lucro (R$)</th>
                            <th class="text-right">Markup</th>
                        </tr>
                    </thead>
                    <tbody id="previewTable"></tbody>
                </table>
            </div>

            <!-- Botão de sincronização -->
            <div class="flex justify-end">
                <button onclick="sincronizar()" class="bg-green-600 hover:bg-green-700 text-white font-bold py-4 px-8 rounded-full text-sm flex items-center gap-2">
                    <i class="fas fa-cloud-upload-alt"></i> APLICAR PREÇOS NO iFipe
                </button>
            </div>

            <!-- Log de processamento -->
            <div class="card">
                <h3 class="text-sm font-bold mb-2 flex items-center gap-2"><i class="fas fa-terminal text-green-500"></i> LOG DE PROCESSAMENTO</h3>
                <div id="logArea" class="log-area"></div>
                <div class="progress-bar mt-4">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Configuração Supabase
        const SUPABASE_URL = 'https://zmgosywpwidypxyhxkry.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M';
        const _s = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Variáveis globais
        let fornecedorId = null;
        let dadosPlanilha = []; // array de objetos com os dados da planilha (já mapeados)
        let variacoes = [];
        let regioes = [];

        // Verificação de login
        (async function() {
            const token = localStorage.getItem('iFipe_Anunciante');
            const masterAuth = localStorage.getItem('iFipe_Master_Auth');
            if (!token && masterAuth !== 'gov_absoluto') {
                document.getElementById('auth-warning').classList.remove('hidden');
                setTimeout(() => window.location.href = 'index.html', 2000);
                return;
            }
            fornecedorId = token || (masterAuth === 'gov_absoluto' ? 1 : null);
            // Carregar dados auxiliares
            await carregarDados();
        })();

        async function carregarDados() {
            const [v, r] = await Promise.all([
                _s.from('variacoes').select('id, capacidade, cor, produtos_mestre(nome)'),
                _s.from('regioes').select('id, nome')
            ]);
            variacoes = v.data || [];
            regioes = r.data || [];
        }

        // Gerar planilha modelo
        function baixarPlanilha() {
            const headers = [
                'Modelo', 'Capacidade', 'Cor', 'Condição', 'Origem',
                'Custo (R$)', 'PREÇO DO ANÚNCIO (R$)', 'Estoque', 'Bateria', 'Garantia'
            ];
            const example = [
                'iPhone 15', '128GB', 'Preto', 'Novo', 'BRASIL ANATEL',
                '4500,00', '5299,00', '10', '', '1 ANO APPLE'
            ];
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet([headers, example]);
            XLSX.utils.book_append_sheet(wb, ws, 'Modelo');
            XLSX.writeFile(wb, 'planilha_padrao_ifipe.xlsx');
        }

        // Processar upload
        async function processarUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = new Uint8Array(e.target.result);
                    const workbook = XLSX.read(data, { type: 'array' });
                    const sheetName = workbook.SheetNames[0];
                    const sheet = workbook.Sheets[sheetName];
                    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

                    if (rows.length < 2) throw new Error('Planilha vazia');

                    const headers = rows[0].map(h => String(h).trim());
                    const required = ['Modelo', 'Capacidade', 'Cor', 'Condição', 'Origem', 'PREÇO DO ANÚNCIO (R$)'];
                    const missing = required.filter(r => !headers.includes(r));
                    if (missing.length > 0) {
                        alert('ARQUIVO INVÁLIDO: Use apenas a planilha padrão do iFipe.\nCampos faltando: ' + missing.join(', '));
                        document.getElementById('fileInput').value = '';
                        return;
                    }

                    // Extrair dados das linhas (pular cabeçalho)
                    const dataRows = rows.slice(1).filter(row => row.length > 0 && row.some(cell => cell !== null && cell !== ''));
                    
                    // Converter para objetos
                    dadosPlanilha = dataRows.map(row => {
                        let obj = {};
                        headers.forEach((h, idx) => { obj[h] = row[idx]; });
                        return obj;
                    });

                    // Validar e mapear IDs
                    await mapearEValidar();

                    // Calcular métricas e mostrar dashboard
                    calcularMetricas();
                    renderPreview();
                    document.getElementById('dashboard').classList.remove('hidden');
                } catch (err) {
                    alert('Erro ao ler planilha: ' + err.message);
                }
            };
            reader.readAsArrayBuffer(file);
        }

        // Função para mapear Modelo+Capacidade+Cor para variacao_id e Origem para regiao_id
        async function mapearEValidar() {
            // Garantir que variacoes e regioes estão carregadas
            if (variacoes.length === 0 || regioes.length === 0) await carregarDados();

            dadosPlanilha = dadosPlanilha.map(item => {
                const modelo = String(item['Modelo'] || '').trim().toUpperCase();
                const capacidade = String(item['Capacidade'] || '').trim().toUpperCase();
                const cor = String(item['Cor'] || '').trim().toUpperCase();
                const origem = String(item['Origem'] || '').trim().toUpperCase();

                // Encontrar variação
                const variacao = variacoes.find(v => 
                    v.produtos_mestre?.nome?.toUpperCase() === modelo &&
                    v.capacidade?.toUpperCase() === capacidade &&
                    v.cor?.toUpperCase() === cor
                );

                // Encontrar região
                const regiao = regioes.find(r => r.nome?.toUpperCase() === origem);

                item._variacao_id = variacao ? variacao.id : null;
                item._regiao_id = regiao ? regiao.id : null;

                // Converter valores numéricos
                const parseBrl = (val) => {
                    if (!val) return 0;
                    let str = String(val).replace(/\./g, '').replace(',', '.');
                    return parseFloat(str) || 0;
                };

                item._custo = parseBrl(item['Custo (R$)']);
                item._preco = parseBrl(item['PREÇO DO ANÚNCIO (R$)']);
                item._estoque = parseInt(item['Estoque']) || 0;

                return item;
            });

            // Alertar sobre linhas com variação ou região não encontrada
            const erros = dadosPlanilha.filter(d => !d._variacao_id || !d._regiao_id);
            if (erros.length > 0) {
                console.warn('Linhas com problemas:', erros);
                // Podemos exibir um alerta, mas não bloqueamos
            }
        }

        function calcularMetricas() {
            let investTotal = 0, lucroTotal = 0, markupSum = 0, count = 0;
            dadosPlanilha.forEach(d => {
                const custo = d._custo || 0;
                const preco = d._preco || 0;
                const qtd = d._estoque || 0;
                investTotal += custo * qtd;
                const lucro = (preco - custo) * qtd;
                lucroTotal += lucro;
                if (custo > 0) {
                    markupSum += (preco / custo - 1) * 100;
                    count++;
                }
            });
            document.getElementById('investTotal').innerText = `R$ ${investTotal.toFixed(2)}`;
            document.getElementById('lucroTotal').innerText = `R$ ${lucroTotal.toFixed(2)}`;
            const markupMedio = count > 0 ? (markupSum / count).toFixed(1) : '0';
            document.getElementById('markupMedio').innerText = markupMedio + '%';
        }

        function renderPreview() {
            const tbody = document.getElementById('previewTable');
            tbody.innerHTML = '';
            dadosPlanilha.forEach(d => {
                const custo = d._custo || 0;
                const preco = d._preco || 0;
                const qtd = d._estoque || 0;
                const lucro = (preco - custo) * qtd;
                const markup = custo > 0 ? ((preco / custo - 1) * 100).toFixed(1) : '-';
                tbody.innerHTML += `<tr class="border-b border-[#2c2c2e]">
                    <td class="py-2">${d.Modelo}</td>
                    <td>${d.Capacidade}</td>
                    <td>${d.Cor}</td>
                    <td>${d.Condição}</td>
                    <td>${d.Origem}</td>
                    <td class="text-right">R$ ${custo.toFixed(2)}</td>
                    <td class="text-right">R$ ${preco.toFixed(2)}</td>
                    <td class="text-right">${qtd}</td>
                    <td class="text-right">R$ ${lucro.toFixed(2)}</td>
                    <td class="text-right">${markup}%</td>
                </tr>`;
            });
        }

        // Função de log
        function log(msg, type = 'info') {
            const area = document.getElementById('logArea');
            const color = type === 'error' ? 'text-red-400' : (type === 'success' ? 'text-green-400' : 'text-blue-400');
            area.innerHTML += `<div class="${color}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            area.scrollTop = area.scrollHeight;
        }

        function updateProgress(percent) {
            document.getElementById('progressFill').style.width = percent + '%';
        }

        // Sincronização com Supabase
        async function sincronizar() {
            if (!fornecedorId) {
                alert('Você precisa estar logado como anunciante.');
                return;
            }

            // Limpar logs
            document.getElementById('logArea').innerHTML = '';
            updateProgress(0);

            log('Iniciando sincronização...', 'info');

            let sucessos = 0, erros = 0;
            const total = dadosPlanilha.length;

            for (let i = 0; i < total; i++) {
                const item = dadosPlanilha[i];
                const variacao_id = item._variacao_id;
                const regiao_id = item._regiao_id;

                if (!variacao_id || !regiao_id) {
                    log(`Linha ${i+2}: Modelo/Origem não reconhecido. Pulando.`, 'error');
                    erros++;
                    updateProgress(((i+1)/total)*100);
                    continue;
                }

                const payload = {
                    fornecedor_id: fornecedorId,
                    variacao_id,
                    regiao_id,
                    condicao: item.Condição,
                    preco: item._preco,
                    moeda: 'BRL',
                    quantidade: item._estoque || 0,
                    saude_bateria: item.Bateria || null,
                    garantia: item.Garantia || '1 ANO APPLE',
                    status_aprovacao: 'aprovado',
                    atualizado_em: new Date().toISOString()
                };

                try {
                    const { error } = await _s.from('ofertas').upsert(payload, {
                        onConflict: 'fornecedor_id, variacao_id, regiao_id, condicao'
                    });
                    if (error) throw error;
                    sucessos++;
                    log(`OK: ${item.Modelo} ${item.Capacidade} (${item.Cor})`, 'success');
                } catch (err) {
                    erros++;
                    log(`ERRO: ${item.Modelo} - ${err.message}`, 'error');
                }
                updateProgress(((i+1)/total)*100);
            }

            log(`Finalizado! ${sucessos} sucessos, ${erros} falhas.`, sucessos > 0 ? 'success' : 'error');
        }
    </script>
</body>
</html>
