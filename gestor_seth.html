<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>iFipe - Seth Gestão (Produtos)</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Fonte Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #000; color: #fff; }
        .card-seth {
            background: #1c1c1e;
            border: 1px solid #38383a;
            border-radius: 24px;
            padding: 1.5rem;
        }
        .input-seth {
            background: #2c2c2e;
            border: 1px solid #38383a;
            border-radius: 12px;
            padding: 0.75rem 1rem;
            color: #fff;
            width: 100%;
            outline: none;
        }
        .input-seth:focus {
            border-color: #3b82f6;
        }
        .btn-seth-primary {
            background: #2563eb;
            color: white;
            font-weight: 600;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-seth-primary:hover {
            background: #1d4ed8;
        }
        .btn-seth-secondary {
            background: transparent;
            border: 1px solid #38383a;
            color: #fff;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn-seth-secondary:hover {
            background: #2c2c2e;
        }
        .table-seth {
            width: 100%;
            border-collapse: collapse;
        }
        .table-seth th {
            text-align: left;
            padding: 0.75rem 0.5rem;
            color: #9ca3af;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            border-bottom: 1px solid #2c2c2e;
        }
        .table-seth td {
            padding: 0.75rem 0.5rem;
            border-bottom: 1px solid #2c2c2e;
            font-size: 0.9rem;
        }
        .badge-success {
            background: #05966920;
            color: #10b981;
            border: 1px solid #10b981;
            padding: 0.25rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
        }
        .badge-warning {
            background: #d9770620;
            color: #f59e0b;
            border: 1px solid #f59e0b;
            padding: 0.25rem 0.5rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
        }
    </style>
</head>
<body class="antialiased">

    <!-- Header -->
    <header class="fixed top-0 w-full bg-black/80 backdrop-blur-lg border-b border-[#38383a] px-6 py-4 flex justify-between items-center z-50">
        <div class="flex items-center gap-3">
            <h1 class="text-2xl font-black italic text-white">iFipe <span class="text-blue-500">SETH</span></h1>
            <span class="text-xs text-gray-400">Gestão de Produtos</span>
        </div>
        <div class="flex items-center gap-4">
            <a href="atacadista.html" class="border border-[#38383a] hover:border-blue-500 px-4 py-2 rounded-full text-sm font-bold transition">
                <i class="fas fa-arrow-left mr-2"></i>Voltar
            </a>
        </div>
    </header>

    <main class="pt-24 pb-10 px-4 max-w-7xl mx-auto">

        <!-- Botão Novo Produto -->
        <div class="mb-6 flex justify-end">
            <button onclick="abrirModalProduto()" class="btn-seth-primary flex items-center gap-2">
                <i class="fas fa-plus"></i> Novo Produto
            </button>
        </div>

        <!-- Lista de Produtos -->
        <div class="card-seth">
            <h2 class="text-lg font-bold mb-4">📦 Produtos em Estoque</h2>
            <div class="overflow-x-auto">
                <table class="table-seth">
                    <thead>
                        <tr>
                            <th>Código</th>
                            <th>Descrição</th>
                            <th>Estoque</th>
                            <th>Mínimo</th>
                            <th>Custo (R$)</th>
                            <th>Venda (R$)</th>
                            <th>Status</th>
                            <th class="text-right">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaProdutos">
                        <tr>
                            <td colspan="8" class="text-center py-8 text-gray-500">Carregando produtos...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal de Produto (CRUD) -->
    <div id="modalProduto" class="hidden fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center z-[9999]">
        <div class="bg-[#1c1c1e] border border-[#38383a] rounded-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xl font-bold" id="modalTitulo">Novo Produto</h3>
                <button onclick="fecharModalProduto()" class="text-gray-400 hover:text-white text-2xl">&times;</button>
            </div>

            <form id="formProduto" onsubmit="salvarProduto(event)">
                <input type="hidden" id="produtoId">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="text-xs text-gray-400 font-bold mb-1 block">Código</label>
                        <input type="text" id="codigo" class="input-seth bg-[#1c1c1e] border-dashed" readonly placeholder="Gerado automático">
                    </div>
                    <div>
                        <label class="text-xs text-gray-400 font-bold mb-1 block">Descrição *</label>
                        <input type="text" id="descricao" class="input-seth" required placeholder="Ex: iPhone 13 128GB Azul">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                    <div>
                        <label class="text-xs text-gray-400 font-bold mb-1 block">Estoque Inicial</label>
                        <input type="number" id="estoque_inicial" class="input-seth" value="0" min="0">
                    </div>
                    <div>
                        <label class="text-xs text-gray-400 font-bold mb-1 block">Estoque Mínimo</label>
                        <input type="number" id="estoque_minimo" class="input-seth" value="0" min="0">
                    </div>
                    <div>
                        <label class="text-xs text-gray-400 font-bold mb-1 block">Custo (R$) *</label>
                        <input type="number" id="custo" class="input-seth" step="0.01" min="0" required placeholder="0,00">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="text-xs text-gray-400 font-bold mb-1 block">Preço de Venda (R$) *</label>
                        <input type="number" id="preco_venda" class="input-seth" step="0.01" min="0" required placeholder="0,00">
                    </div>
                    <div>
                        <label class="text-xs text-gray-400 font-bold mb-1 block">Variação iFipe (opcional)</label>
                        <select id="variacao_id" class="input-seth">
                            <option value="">Nenhuma</option>
                        </select>
                    </div>
                </div>

                <!-- Seção de precificação completa (Seth) -->
                <div class="border-t border-[#38383a] pt-4 mt-2">
                    <h4 class="text-sm font-bold text-blue-400 mb-3">📊 Dados para Lançador Inteligente (opcional)</h4>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="text-xs text-gray-400 font-bold mb-1 block">Custo (USD)</label>
                            <input type="number" id="custo_usd" class="input-seth" step="0.01" min="0" placeholder="0,00">
                        </div>
                        <div>
                            <label class="text-xs text-gray-400 font-bold mb-1 block">Câmbio pago</label>
                            <input type="number" id="cambio_pago" class="input-seth" step="0.0001" min="0" placeholder="5,20">
                        </div>
                        <div>
                            <label class="text-xs text-gray-400 font-bold mb-1 block">% Frete</label>
                            <input type="number" id="percentual_frete" class="input-seth" step="0.1" min="0" max="20" placeholder="0">
                        </div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-3">
                        <div>
                            <label class="text-xs text-gray-400 font-bold mb-1 block">Arredondamento padrão</label>
                            <select id="tipo_arredondamento" class="input-seth">
                                <option value="cima">Para cima (ex: 5.773 → 5.780)</option>
                                <option value="baixo">Para baixo (ex: 5.773 → 5.770)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <div class="flex justify-end gap-3 mt-6">
                    <button type="button" onclick="fecharModalProduto()" class="btn-seth-secondary">Cancelar</button>
                    <button type="submit" class="btn-seth-primary">Salvar Produto</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Configuração Supabase
        const SUPABASE_URL = 'https://zmgosywpwidypxyhxkry.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M';
        const _s = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let fornecedorId = null;
        let produtos = [];
        let variacoes = [];

        // Inicialização
        window.onload = async () => {
            const tokenAta = localStorage.getItem('iFipe_Anunciante');
            const masterAuth = localStorage.getItem('iFipe_Master_Auth');
            
            if (!tokenAta && masterAuth !== 'gov_absoluto') {
                window.location.replace('index.html');
                return;
            }

            fornecedorId = tokenAta || (masterAuth === 'gov_absoluto' ? 1 : null);
            if (!fornecedorId) {
                alert('Erro: fornecedor não identificado.');
                return;
            }

            await carregarVariacoes();
            await carregarProdutos();
        };

        async function carregarVariacoes() {
            const { data, error } = await _s
                .from('variacoes')
                .select('id, produtos_mestre!inner(nome), capacidade, cor');
            if (error) {
                console.error('Erro ao carregar variações:', error);
                return;
            }
            variacoes = data || [];
            popularSelectVariacoes();
        }

        function popularSelectVariacoes() {
            const select = document.getElementById('variacao_id');
            select.innerHTML = '<option value="">Nenhuma</option>';
            variacoes.forEach(v => {
                const nome = v.produtos_mestre?.nome || 'Desconhecido';
                select.innerHTML += `<option value="${v.id}">${nome} ${v.capacidade} ${v.cor}</option>`;
            });
        }

        async function carregarProdutos() {
            const { data, error } = await _s
                .from('produtos')
                .select('*')
                .eq('fornecedor_id', fornecedorId)
                .order('codigo', { ascending: true });

            if (error) {
                console.error('Erro ao carregar produtos:', error);
                return;
            }

            produtos = data || [];
            renderizarTabela();
        }

        function renderizarTabela() {
            const tbody = document.getElementById('tabelaProdutos');
            if (produtos.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center py-8 text-gray-500">Nenhum produto cadastrado.</td></tr>';
                return;
            }

            tbody.innerHTML = produtos.map(p => {
                const status = p.estoque_atual <= p.estoque_minimo 
                    ? '<span class="badge-warning">Repor</span>' 
                    : '<span class="badge-success">OK</span>';
                return `
                <tr>
                    <td class="font-mono">${p.codigo}</td>
                    <td>${p.descricao}</td>
                    <td>${p.estoque_atual}</td>
                    <td>${p.estoque_minimo}</td>
                    <td>R$ ${Number(p.custo).toFixed(2)}</td>
                    <td>R$ ${Number(p.preco_venda).toFixed(2)}</td>
                    <td>${status}</td>
                    <td class="text-right">
                        <button onclick="editarProduto(${p.id})" class="text-blue-400 hover:text-blue-300 mr-2" title="Editar">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button onclick="excluirProduto(${p.id})" class="text-red-400 hover:text-red-300" title="Excluir">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `}).join('');
        }

        function abrirModalProduto() {
            document.getElementById('modalTitulo').innerText = 'Novo Produto';
            document.getElementById('formProduto').reset();
            document.getElementById('produtoId').value = '';
            document.getElementById('codigo').value = ''; // será gerado pelo banco
            document.getElementById('modalProduto').classList.remove('hidden');
        }

        function fecharModalProduto() {
            document.getElementById('modalProduto').classList.add('hidden');
        }

        async function salvarProduto(event) {
            event.preventDefault();

            const id = document.getElementById('produtoId').value;
            const descricao = document.getElementById('descricao').value.trim();
            const custo = parseFloat(document.getElementById('custo').value) || 0;
            const preco_venda = parseFloat(document.getElementById('preco_venda').value) || 0;
            const estoque_minimo = parseInt(document.getElementById('estoque_minimo').value) || 0;
            const estoque_inicial = parseInt(document.getElementById('estoque_inicial').value) || 0;
            const custo_usd = parseFloat(document.getElementById('custo_usd').value) || null;
            const cambio_pago = parseFloat(document.getElementById('cambio_pago').value) || null;
            const percentual_frete = parseFloat(document.getElementById('percentual_frete').value) || null;
            const tipo_arredondamento = document.getElementById('tipo_arredondamento').value;
            const variacao_id = document.getElementById('variacao_id').value || null;

            if (!descricao) {
                alert('Descrição é obrigatória.');
                return;
            }

            const produtoData = {
                fornecedor_id: fornecedorId,
                descricao,
                custo,
                preco_venda,
                estoque_minimo,
                estoque_atual: estoque_inicial, // se for novo, estoque atual = estoque inicial
                custo_usd,
                cambio_pago,
                percentual_frete,
                tipo_arredondamento,
                variacao_id
            };

            if (id) {
                // Atualizar (não alteramos estoque aqui, apenas dados cadastrais)
                const { error } = await _s
                    .from('produtos')
                    .update(produtoData)
                    .eq('id', id);

                if (error) {
                    alert('Erro ao atualizar: ' + error.message);
                } else {
                    fecharModalProduto();
                    await carregarProdutos();
                }
            } else {
                // Inserir novo produto
                const { data, error } = await _s
                    .from('produtos')
                    .insert([produtoData])
                    .select();

                if (error) {
                    alert('Erro ao inserir: ' + error.message);
                } else {
                    // Se estoque_inicial > 0, criar movimento de entrada
                    if (estoque_inicial > 0 && data && data[0]) {
                        await _s.from('movimentos_estoque').insert([{
                            fornecedor_id: fornecedorId,
                            produto_id: data[0].id,
                            tipo: 'ENTRADA',
                            quantidade: estoque_inicial,
                            motivo: 'CADASTRO INICIAL',
                            custo_unitario: custo
                        }]);
                    }
                    fecharModalProduto();
                    await carregarProdutos();
                }
            }
        }

        async function editarProduto(id) {
            const produto = produtos.find(p => p.id == id);
            if (!produto) return;

            document.getElementById('modalTitulo').innerText = 'Editar Produto';
            document.getElementById('produtoId').value = produto.id;
            document.getElementById('codigo').value = produto.codigo;
            document.getElementById('descricao').value = produto.descricao;
            document.getElementById('custo').value = produto.custo;
            document.getElementById('preco_venda').value = produto.preco_venda;
            document.getElementById('estoque_minimo').value = produto.estoque_minimo;
            document.getElementById('estoque_inicial').value = 0; // não alteramos estoque aqui
            document.getElementById('custo_usd').value = produto.custo_usd || '';
            document.getElementById('cambio_pago').value = produto.cambio_pago || '';
            document.getElementById('percentual_frete').value = produto.percentual_frete || '';
            document.getElementById('tipo_arredondamento').value = produto.tipo_arredondamento || 'cima';
            document.getElementById('variacao_id').value = produto.variacao_id || '';

            document.getElementById('modalProduto').classList.remove('hidden');
        }

        async function excluirProduto(id) {
            if (!confirm('Tem certeza que deseja excluir este produto? Todas as movimentações associadas também serão removidas.')) return;

            const { error } = await _s
                .from('produtos')
                .delete()
                .eq('id', id);

            if (error) {
                alert('Erro ao excluir: ' + error.message);
            } else {
                await carregarProdutos();
            }
        }

        // Expor funções globais
        window.abrirModalProduto = abrirModalProduto;
        window.fecharModalProduto = fecharModalProduto;
        window.salvarProduto = salvarProduto;
        window.editarProduto = editarProduto;
        window.excluirProduto = excluirProduto;
    </script>
</body>
</html>
