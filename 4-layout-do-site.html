<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Ranking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background:#000; color:#fff; font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin:0; }
        
        /* TICKER BINANCE REALTIME */
        .ticker-bar { background:rgba(28, 28, 30, 0.8); backdrop-filter:blur(15px); border-bottom:1px solid #38383a; padding:12px; position:sticky; top:0; z-index:100; display:flex; justify-content:center; align-items:center; gap:12px; }
        .ticker-val { color:#32d74b; font-family:monospace; font-size:18px; font-weight:900; }

        /* PATROCINADORES */
        .sponsor-box { background:#1c1c1e; border:1px solid #38383a; border-radius:12px; padding:10px 20px; font-size:10px; font-weight:bold; text-transform:uppercase; color:#86868b; transition:0.3s; cursor:pointer; }
        .sponsor-box:hover { border-color:#0071e3; color:#fff; }

        /* FILTROS PREMIUM */
        .filter-section { background:#000; padding:10px 20px 30px; border-bottom:1px solid #1c1c1e; }
        .filter { background:#1c1c1e; border:1px solid #38383a; border-radius:14px; padding:14px; color:#fff; width:100%; font-size:11px; font-weight:900; text-transform:uppercase; outline:none; transition:0.3s; }
        .filter:focus { border-color:#0071e3; }

        /* CARDS ESTILO APPLE */
        .card { background:#1c1c1e; border:1px solid #38383a; border-radius:28px; padding:28px; transition:0.3s; position:relative; overflow:hidden; }
        .card:hover { border-color:#0071e3; transform:translateY(-5px); }
        .price { color:#32d74b; font-size:38px; font-weight:900; letter-spacing:-2px; line-height:1; }
        .stock-badge { background:rgba(50, 215, 75, 0.1); color:#32d74b; padding:5px 12px; border-radius:10px; font-size:10px; font-weight:900; text-transform:uppercase; }
        .btn-wa { background:#fff; color:#000; padding:18px; border-radius:50px; font-weight:900; text-align:center; display:block; text-decoration:none; text-transform:uppercase; font-size:12px; transition:0.3s; margin-top:20px; }
        .btn-wa:hover { background:#0071e3; color:#fff; }

        .hidden { display: none !important; }
    </style>
</head>
<body id="main" class="hidden">
    
    <div class="ticker-bar">
        <span class="text-[10px] text-gray-500 font-black uppercase tracking-widest">USDT/BRL BINANCE:</span>
        <span class="ticker-val" id="usdt_val">CONECTANDO...</span>
    </div>

    <div class="max-w-6xl mx-auto px-6">
        <header class="mt-16 mb-10 text-center">
            <h1 class="text-7xl font-black italic tracking-tighter leading-none">iFipe</h1>
        </header>

        <div class="text-center mb-12">
            <p class="text-[9px] text-gray-600 uppercase font-black tracking-widest mb-4">Patrocinadores Oficiais</p>
            <div class="flex justify-center flex-wrap gap-4">
                <div class="sponsor-box">Sua Marca Aqui</div>
                <div class="sponsor-box">Fábrica de Marcas</div>
                <div class="sponsor-box">Loja Parceira</div>
            </div>
        </div>
    </div>

    <div class="filter-section">
        <div class="max-w-6xl mx-auto grid grid-cols-2 md:grid-cols-4 gap-4">
            <select id="fMod" class="filter" onchange="atualizarMemorias()"><option value="">Modelo</option></select>
            <select id="fCap" class="filter" onchange="atualizarCores()" disabled><option value="">Memória</option></select>
            <select id="fCor" class="filter" onchange="filtrar()" disabled><option value="">Cor</option></select>
            <select id="fReg" class="filter" onchange="filtrar()"><option value="">Região</option></select>
        </div>
    </div>

    <div class="max-w-6xl mx-auto p-6">
        <div id="vitrine" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let cacheOfertas = [];
        let gradeVariacoes = [];

        function iniciarCambio() {
            const socket = new WebSocket('wss://stream.binance.com:9443/ws/usdtbrl@ticker');
            socket.onmessage = (event) => {
                const data = JSON.parse(event.data);
                document.getElementById('usdt_val').innerText = `R$ ${parseFloat(data.c).toFixed(4).replace('.',',')}`;
            };
        }

        async function validarSessao() {
            if(!localStorage.getItem('iFipe_Token')) { location.href='3-pagina-login.html'; return; }
            document.getElementById('main').classList.remove('hidden');
            iniciarCambio();
            init();
        }

        async function init() {
            const [m, r, v] = await Promise.all([
                _s.from('produtos_mestre').select('*').order('id'),
                _s.from('regioes').select('*').order('id'),
                _s.from('variacoes').select('*, produtos_mestre(nome)')
            ]);
            gradeVariacoes = v.data || [];
            document.getElementById('fMod').innerHTML = '<option value="">Escolha o Modelo</option>' + m.data.map(x=>`<option value="${x.nome}">${x.nome}</option>`).join('');
            document.getElementById('fReg').innerHTML = '<option value="">Região de Origem</option>' + r.data.map(x=>`<option value="${x.nome}">${x.bandeira} ${x.nome}</option>`).join('');
            buscarOfertas();
        }

        async function buscarOfertas() {
            const { data } = await _s.from('ofertas').select('preco, quantidade, regioes(nome, bandeira), fornecedores(nome, whatsapp, ativo), variacoes(capacidade, cor, produtos_mestre(nome))').eq('fornecedores.ativo', true).gt('quantidade', 0).order('preco', {ascending:true});
            cacheOfertas = data || [];
            renderizar(cacheOfertas);
        }

        function atualizarMemorias() {
            const modNome = document.getElementById('fMod').value;
            const selCap = document.getElementById('fCap');
            const selCor = document.getElementById('fCor');
            if(!modNome) { selCap.disabled = selCor.disabled = true; filtrar(); return; }
            const filtradas = gradeVariacoes.filter(x => x.produtos_mestre.nome === modNome);
            const caps = [...new Set(filtradas.map(x=>x.capacidade))].sort((a,b) => parseInt(a) - parseInt(b));
            selCap.innerHTML = '<option value="">Capacidade</option>' + caps.map(x=>`<option value="${x}">${x}</option>`).join('');
            selCap.disabled = false;
            selCor.disabled = true;
            selCor.innerHTML = '<option value="">Cor</option>';
            filtrar();
        }

        function atualizarCores() {
            const modNome = document.getElementById('fMod').value;
            const cap = document.getElementById('fCap').value;
            const selCor = document.getElementById('fCor');
            if(!cap) { selCor.disabled = true; filtrar(); return; }
            const filtradas = gradeVariacoes.filter(x => x.produtos_mestre.nome === modNome && x.capacidade === cap);
            selCor.innerHTML = '<option value="">Cor</option>' + filtradas.map(x=>`<option value="${x.cor}">${x.cor}</option>`).join('');
            selCor.disabled = false;
            filtrar();
        }

        function filtrar() {
            const mod = document.getElementById('fMod').value;
            const cap = document.getElementById('fCap').value;
            const cor = document.getElementById('fCor').value;
            const reg = document.getElementById('fReg').value;
            let res = cacheOfertas;
            if(mod) res = res.filter(x => x.variacoes.produtos_mestre.nome === mod);
            if(cap) res = res.filter(x => x.variacoes.capacidade === cap);
            if(cor) res = res.filter(x => x.variacoes.cor === cor);
            if(reg) res = res.filter(x => x.regioes.nome === reg);
            renderizar(res);
        }

        function renderizar(lista) {
            const vitrine = document.getElementById('vitrine');
            if(lista.length === 0) {
                vitrine.innerHTML = '<p class="text-center col-span-full text-gray-500 font-bold text-xs uppercase tracking-widest">Nenhum iPhone disponível com esses filtros.</p>';
                return;
            }
            vitrine.innerHTML = lista.map(o => `
                <div class="card">
                    <div class="flex justify-between items-start mb-8">
                        <span class="text-[10px] font-black uppercase text-gray-500 tracking-tighter">${o.regioes.bandeira} ${o.regioes.nome}</span>
                        <span class="stock-badge">${o.quantidade} em estoque</span>
                    </div>
                    <p class="text-[10px] font-black text-blue-500 uppercase tracking-[0.2em] mb-2">${o.fornecedores.nome}</p>
                    <h2 class="text-3xl font-black italic leading-none mb-1">${o.variacoes.produtos_mestre.nome}</h2>
                    <p class="text-gray-500 text-[11px] font-bold uppercase mb-8">${o.variacoes.capacidade} • ${o.variacoes.cor}</p>
                    <div class="price">R$ ${o.preco.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div>
                    <a href="https://wa.me/${o.fornecedores.whatsapp.replace(/\D/g,'')}" target="_blank" class="btn-wa">Negociar Direto</a>
                </div>
            `).join('');
        }
        validarSessao();
    </script>
</body>
</html>
