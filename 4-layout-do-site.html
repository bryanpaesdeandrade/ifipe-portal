<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Busca Precision</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background:#000; color:#fff; font-family:-apple-system, sans-serif; }
        .filter-select { background:#1c1c1e; border:1px solid #38383a; border-radius:12px; padding:12px; font-size:11px; font-weight:900; text-transform:uppercase; outline:none; width:100%; }
        .card { background:#1c1c1e; border:1px solid #38383a; border-radius:24px; padding:2rem; transition:0.3s; }
        .price { color:#32d74b; font-size:32px; font-weight:800; }
        .btn-wa { background:#25d366; color:#fff; padding:14px; border-radius:50px; font-weight:900; text-align:center; display:block; text-decoration:none; text-transform:uppercase; font-size:11px; }
    </style>
</head>
<body id="main" class="hidden">
    <div class="max-w-6xl mx-auto p-6">
        <header class="my-10 text-center">
            <h1 class="text-5xl font-black italic tracking-tighter">iFipe</h1>
            <p class="text-gray-500 text-[9px] font-bold uppercase tracking-[0.4em] mt-2">Realtime Precision Ranking</p>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12">
            <select id="fModelo" onchange="filtrar()" class="filter-select"><option value="">Modelo</option></select>
            <select id="fCap" onchange="filtrar()" class="filter-select"><option value="">Capacidade</option></select>
            <select id="fCor" onchange="filtrar()" class="filter-select"><option value="">Cor</option></select>
            <select id="fReg" onchange="filtrar()" class="filter-select"><option value="">Região</option></select>
        </div>

        <div id="vitrine" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let cache = [];

        async function validar() {
            const t = localStorage.getItem('iFipe_Token');
            const e = localStorage.getItem('iFipe_User');
            if(!t || !e) { window.location.href='3-pagina-login.html'; return; }
            document.getElementById('main').classList.remove('hidden');
            init();
        }

        async function init() {
            const { data: m } = await _s.from('produtos_mestre').select('nome');
            const { data: v } = await _s.from('variacoes').select('capacidade, cor');
            const { data: r } = await _s.from('regioes').select('nome, bandeira');

            // Preencher filtros com nomes e bandeiras
            document.getElementById('fModelo').innerHTML += [...new Set(m.map(x=>x.nome))].map(x=>`<option value="${x}">${x}</option>`).join('');
            document.getElementById('fCap').innerHTML += [...new Set(v.map(x=>x.capacidade))].map(x=>`<option value="${x}">${x}</option>`).join('');
            document.getElementById('fCor').innerHTML += [...new Set(v.map(x=>x.cor))].map(x=>`<option value="${x}">${x}</option>`).join('');
            document.getElementById('fReg').innerHTML += r.map(x=>`<option value="${x.nome}">${x.bandeira} ${x.nome}</option>`).join('');

            buscar();
        }

        async function buscar() {
            const { data } = await _s.from('ofertas').select('preco, regioes(nome, bandeira), fornecedores(nome, whatsapp, ativo), variacoes(capacidade, cor, produtos_mestre(nome))').eq('fornecedores.ativo', true).order('preco', {ascending:true});
            cache = data;
            renderizar(data);
        }

        function filtrar() {
            const mod = document.getElementById('fModelo').value;
            const cap = document.getElementById('fCap').value;
            const cor = document.getElementById('fCor').value;
            const reg = document.getElementById('fReg').value;

            let f = cache;
            if(mod) f = f.filter(x => x.variacoes.produtos_mestre.nome === mod);
            if(cap) f = f.filter(x => x.variacoes.capacidade === cap);
            if(cor) f = f.filter(x => x.variacoes.cor === cor);
            if(reg) f = f.filter(x => x.regioes.nome === reg);
            renderizar(f);
        }

        function renderizar(l) {
            document.getElementById('vitrine').innerHTML = l.map((o, i) => `
                <div class="card">
                    <div class="mb-4 flex justify-between">
                        <span class="bg-[#38383a] px-2 py-1 rounded text-[9px] font-black uppercase">${o.regioes.bandeira} ${o.fornecedores.nome}</span>
                        ${i===0 ? '<span class="text-[#32d74b] text-[9px] font-black italic">MENOR PREÇO</span>' : ''}
                    </div>
                    <h2 class="text-xl font-bold italic">${o.variacoes.produtos_mestre.nome}</h2>
                    <p class="text-gray-500 text-[10px] font-black uppercase mb-6">${o.variacoes.capacidade} • ${o.variacoes.cor}</p>
                    <div class="price mb-6">R$ ${o.preco.toLocaleString('pt-BR', {minimumFractionDigits:2})}</div>
                    <a href="https://wa.me/${o.fornecedores.whatsapp.replace(/\D/g,'')}" class="btn-wa">WhatsApp</a>
                </div>
            `).join('');
        }
        validar();
    </script>
</body>
</html>
