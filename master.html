<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - MASTER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #141415; --text: #fff; --border: #2c2c2e; --blue-master: #0071e3; }
        body { background: var(--bg); color: var(--text); font-family:-apple-system, sans-serif; margin:0; text-transform: uppercase; }
        
        .master-nav { background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); border-bottom: 2px solid var(--blue-master); padding: 15px 40px; position: sticky; top:0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; }
        .apple-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 1.5rem; }
        
        .module-btn { background: var(--border); padding: 15px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.3s; border: 1px solid transparent; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .module-btn:hover { border-color: var(--blue-master); background: rgba(0, 113, 227, 0.1); }
        .module-title { font-size: 8px; font-weight: 900; color: #a1a1aa; }

        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { padding: 12px; font-size: 9px; color: #52525b; text-align: left; }
        td { padding: 12px; background: #1c1c1e; font-size: 11px; vertical-align: middle; }
        td:first-child { border-radius: 12px 0 0 12px; }
        td:last-child { border-radius: 0 12px 12px 0; }

        .badge { padding: 4px 10px; border-radius: 50px; font-size: 8px; font-weight: 900; }
        .badge-active { background: rgba(34, 197, 94, 0.2); color: #22c55e; }
        .badge-inactive { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .badge-verified { background: rgba(0, 113, 227, 0.2); color: #0071e3; border: 1px solid #0071e3; }

        .apple-input { background: #000; border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: #fff; width: 100%; outline: none; font-size: 12px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <nav class="master-nav">
        <div class="flex items-center gap-6">
            <h1 class="text-2xl font-black italic">iFipe <span class="text-blue-500">MASTER</span></h1>
            <div class="flex gap-4 border-l border-zinc-800 pl-6">
                <div class="text-center">
                    <p class="text-[7px] text-zinc-500 font-black">BINANCE Real</p>
                    <p id="tBin" class="text-xs font-mono font-black text-white">R$ --</p>
                </div>
            </div>
        </div>
        <button onclick="logout()" class="text-[9px] text-red-500 font-black border border-red-500/20 px-4 py-2 rounded-full">SAIR DO MASTER</button>
    </nav>

    <main class="max-w-[1600px] mx-auto p-6">
        
        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3 mb-8">
            <div class="module-btn" onclick="location.reload()">🏢 <span class="module-title">ANUNCIANTES</span></div>
            <div class="module-btn" onclick="alert('Módulo de Clientes em breve')">👤 <span class="module-title">BUSCADORES</span></div>
            <div class="module-btn" onclick="alert('Módulo Global em breve')">📢 <span class="module-title">ANÚNCIOS</span></div>
            <div class="module-btn" onclick="alert('Módulo Staff em breve')">🛠️ <span class="module-title">FUNCIONÁRIOS</span></div>
            <div class="module-btn" onclick="alert('Módulo Concierge em breve')">🛎️ <span class="module-title">CONCIERGE</span></div>
            <div class="module-btn" onclick="window.open('buscar.html')">🔍 <span class="module-title">VER VITRINE</span></div>
        </div>

        <div class="apple-card">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-black italic">Gestão de Atacadistas</h2>
                <div class="flex gap-2">
                    <input type="text" id="buscaLojista" class="apple-input !w-64 !py-2" placeholder="BUSCAR LOJA..." oninput="renderLojistas()">
                </div>
            </div>

            <div class="overflow-x-auto">
                <table>
                    <thead>
                        <tr>
                            <th>NOME / LOCAL</th>
                            <th>CONTATO</th>
                            <th>STATUS</th>
                            <th>SELO</th>
                            <th class="text-right">AÇÃO</th>
                        </tr>
                    </thead>
                    <tbody id="listaLojistas">
                        <tr><td colspan="5" class="text-center py-10">CARREGANDO BASE DE DADOS...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <div id="modalEdit" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[2000] p-4">
        <div class="apple-card max-w-[500px] w-full border-blue-500">
            <h3 class="text-lg font-black mb-6 border-b border-zinc-800 pb-4">INTERVENÇÃO MASTER: <span id="edTitulo" class="text-blue-500"></span></h3>
            <form onsubmit="salvarIntervencao(event)" class="space-y-4">
                <input type="hidden" id="edId">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[8px] text-zinc-500 font-black mb-1 block">NOME DA LOJA</label>
                        <input type="text" id="edNome" class="apple-input" required>
                    </div>
                    <div>
                        <label class="text-[8px] text-zinc-500 font-black mb-1 block">WHATSAPP</label>
                        <input type="text" id="edWhats" class="apple-input" required>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[8px] text-zinc-500 font-black mb-1 block">CIDADE</label>
                        <input type="text" id="edCid" class="apple-input" required>
                    </div>
                    <div>
                        <label class="text-[8px] text-zinc-500 font-black mb-1 block">ALTERAR SENHA</label>
                        <input type="text" id="edSenha" class="apple-input" placeholder="MANTER ATUAL...">
                    </div>
                </div>
                <div class="flex gap-4 items-center bg-zinc-900 p-4 rounded-2xl border border-zinc-800">
                    <label class="flex items-center gap-2 text-[10px] font-black cursor-pointer">
                        <input type="checkbox" id="edAtivo"> CONTA ATIVA
                    </label>
                    <label class="flex items-center gap-2 text-[10px] font-black cursor-pointer text-blue-400">
                        <input type="checkbox" id="edVerificado"> SELO VERIFICADO ✅
                    </label>
                </div>
                <div class="flex gap-2">
                    <button type="button" onclick="fecharModal()" class="w-1/3 apple-button !bg-zinc-800 !text-white !p-3">CANCELAR</button>
                    <button type="submit" class="w-2/3 apple-button !bg-blue-600 !text-white !p-3">APLICAR PODER MASTER</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let lojistas = [];

        window.onload = async () => {
            initBinance();
            await loadLojistas();
        };

        function initBinance() {
            const ws = new WebSocket('wss://stream.binance.com:9443/ws/usdtbrl@ticker');
            ws.onmessage = e => {
                const r = parseFloat(JSON.parse(e.data).c);
                document.getElementById('tBin').innerText = `R$ ${r.toFixed(4)}`;
            };
        }

        async function loadLojistas() {
            const { data, error } = await _s.from('fornecedores').select('*').order('nome');
            if(!error) {
                lojistas = data;
                renderLojistas();
            }
        }

        function renderLojistas() {
            const termo = document.getElementById('buscaLojista').value.toUpperCase();
            const container = document.getElementById('listaLojistas');
            
            const filtrados = lojistas.filter(l => l.nome.toUpperCase().includes(termo));
            
            container.innerHTML = filtrados.map(l => `
                <tr class="hover:bg-zinc-900/50 transition">
                    <td>
                        <p class="font-black text-white">${l.nome}</p>
                        <p class="text-[9px] text-zinc-500">${l.cidade} - ${l.estado}</p>
                    </td>
                    <td><span class="font-mono text-zinc-400">${l.whatsapp}</span></td>
                    <td><span class="badge ${l.ativo ? 'badge-active' : 'badge-inactive'}">${l.ativo ? 'ATIVO' : 'INATIVO'}</span></td>
                    <td>${l.verificado ? '<span class="badge badge-verified">VERIFICADO ✅</span>' : '<span class="text-zinc-700 text-[8px] font-bold">SEM SELO</span>'}</td>
                    <td class="text-right">
                        <button onclick="abrirEdicao(${l.id})" class="text-[9px] font-black bg-white text-black px-4 py-1.5 rounded-lg hover:bg-blue-500 hover:text-white transition">INTERVIR</button>
                    </td>
                </tr>
            `).join('') || '<tr><td colspan="5" class="text-center py-10 text-zinc-500">NENHUM LOJISTA ENCONTRADO.</td></tr>';
        }

        function abrirEdicao(id) {
            const l = lojistas.find(x => x.id === id);
            document.getElementById('edId').value = l.id;
            document.getElementById('edTitulo').innerText = l.nome;
            document.getElementById('edNome').value = l.nome;
            document.getElementById('edWhats').value = l.whatsapp;
            document.getElementById('edCid').value = l.cidade;
            document.getElementById('edAtivo').checked = l.ativo;
            document.getElementById('edVerificado').checked = l.verificado;
            document.getElementById('edSenha').value = '';
            document.getElementById('modalEdit').classList.remove('hidden');
        }

        async function salvarIntervencao(e) {
            e.preventDefault();
            const id = document.getElementById('edId').value;
            const updates = {
                nome: document.getElementById('edNome').value,
                whatsapp: document.getElementById('edWhats').value,
                cidade: document.getElementById('edCid').value,
                ativo: document.getElementById('edAtivo').checked,
                verificado: document.getElementById('edVerificado').checked
            };
            
            const senha = document.getElementById('edSenha').value;
            if(senha.trim() !== '') updates.senha = senha;

            const { error } = await _s.from('fornecedores').update(updates).eq('id', id);
            if(!error) {
                alert("SOBERANIA MASTER APLICADA: DADOS ATUALIZADOS.");
                fecharModal();
                loadLojistas();
            }
        }

        function fecharModal() { document.getElementById('modalEdit').classList.add('hidden'); }
        function logout() { localStorage.clear(); window.location.replace('index.html'); }
    </script>
</body>
</html>
