<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Gestão Master Global</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #38383a; --input: #2c2c2e; }
        body { background: var(--bg); color: var(--text); font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin:0; padding-bottom: 50px; scroll-behavior: smooth; }
        .user-bar { background:rgba(28, 28, 30, 0.9); backdrop-filter:blur(15px); border-bottom:1px solid var(--border); padding:15px 20px; position:sticky; top:0; z-index:100; display:flex; justify-content:space-between; align-items:center; }
        .apple-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 1.5rem; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .apple-input { background: var(--input); border: 1px solid var(--border); border-radius: 10px; padding: 10px; width: 100%; color: var(--text); outline: none; font-size: 11px; transition: 0.3s; font-weight: bold; }
        .apple-input:focus { border-color: #ff3b30; }
        .apple-button { background: #ff3b30; color: #fff; font-weight: 900; border-radius: 50px; padding: 12px 20px; cursor: pointer; text-transform: uppercase; border: none; font-size: 11px; transition: 0.3s; display:inline-block; text-align:center; }
        .apple-button:hover { background: #d63026; }
        
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { font-size: 9px; color: #86868b; text-transform: uppercase; padding: 10px; text-align: left; border-bottom: 1px solid var(--border); letter-spacing: 1px; }
        td { padding: 10px; border-bottom: 1px solid var(--input); font-size: 11px; vertical-align: middle; }
        .btn-acao { font-weight: 900; cursor: pointer; font-size: 8px; text-transform: uppercase; padding: 5px 10px; border-radius: 6px; display: inline-block; transition: 0.3s; border: 1px solid transparent;}
        .btn-edit { background: rgba(0, 113, 227, 0.2); color: #0071e3; border-color: rgba(0, 113, 227, 0.5); }
        .btn-del { background: rgba(255, 59, 48, 0.2); color: #ff3b30; border-color: rgba(255, 59, 48, 0.5); }
        
        .insignia-tag { display: inline-flex; align-items: center; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; font-size: 8px; font-weight: 900; padding: 3px 8px; border-radius: 6px; margin-right: 5px; margin-bottom: 5px; text-transform: uppercase; }
        .insignia-tag .remove-selo { margin-left: 6px; cursor: pointer; color: #ff3b30; font-size: 11px; }
        .btn-add-selo { background: #2c2c2e; color: #86868b; font-size: 8px; font-weight: 900; padding: 3px 8px; border-radius: 6px; border: 1px dashed #38383a; cursor: pointer; }

        #btnScrollTop { position: fixed; bottom: 30px; right: 30px; background: #ff3b30; color: #fff; width: 45px; height: 45px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; z-index: 1000; border: none; box-shadow: 0 5px 15px rgba(255,59,48,0.4); }

        details { background: var(--input); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
        summary { background: #232325; padding: 15px 20px; font-weight: 900; cursor: pointer; display: flex; justify-content: space-between; align-items: center; outline: none; font-size: 12px; }
        .tab-btn { background: #1c1c1e; border: 1px solid #38383a; color: #86868b; padding: 12px 10px; font-weight: 900; text-transform: uppercase; font-size: 10px; cursor: pointer; flex: 1; text-align: center; border-radius: 10px; }
        .tab-btn.active { background: rgba(255, 59, 48, 0.1); border-color: #ff3b30; color: #ff3b30; }
        .btn-tipo { background: #2c2c2e; border: 2px solid #38383a; color: #fff; padding: 10px; border-radius: 12px; font-weight: 900; font-size: 10px; cursor: pointer; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 5px; }
        .btn-tipo.active { background: rgba(255, 59, 48, 0.1); border-color: #ff3b30; color: #ff3b30; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #ff3b30; border-radius: 10px; }
    </style>
</head>
<body id="appBody">

    <button id="btnScrollTop" onclick="window.scrollTo(0,0)">↑</button>

    <div id="authSection" class="flex items-center justify-center min-h-screen px-4">
        <div class="apple-card max-w-[400px] text-center w-full border-red-500 border-2 shadow-2xl">
            <h1 class="text-4xl font-black italic mb-2 text-red-500">iFipe MASTER</h1>
            <p class="text-[9px] font-bold uppercase text-gray-500 mb-8 tracking-[0.3em]">God Mode Dashboard</p>
            <form onsubmit="realizarLoginMaster(event)">
                <input type="email" id="logEmailMaster" class="apple-input mb-3 text-center" placeholder="E-mail Administrativo" required>
                <input type="password" id="logPassMaster" class="apple-input mb-4 text-center" placeholder="Senha" required>
                <button type="submit" class="apple-button w-full">Acessar Sistema</button>
            </form>
        </div>
    </div>

    <div id="dashboardSection" class="hidden">
        <div class="user-bar">
            <div class="flex items-center gap-4">
                <h1 class="text-xl font-black italic text-red-500 m-0">iFipe MASTER</h1>
                <button id="btnManutencaoToggle" onclick="toggleManutencao()" class="px-4 py-1.5 rounded-full text-[10px] font-black uppercase transition-colors shadow-lg">Carregando...</button>
            </div>
            <button onclick="sairMaster()" class="text-[10px] text-red-500 font-black uppercase border border-red-900 rounded px-3 py-1.5">Sair</button>
        </div>

        <div class="max-w-[1400px] mx-auto p-4 md:p-8">
            <div class="flex flex-wrap md:flex-nowrap gap-2 mb-8">
                <button class="tab-btn active" id="btnTabAnuncios" onclick="mudarAba('anuncios')">📦 Anúncios</button>
                <button class="tab-btn" id="btnTabPostar" onclick="mudarAba('postar')">➕ Concierge</button>
                <button class="tab-btn" id="btnTabLojistas" onclick="mudarAba('lojistas')">🏪 Atacadistas</button>
                <button class="tab-btn" id="btnTabClientes" onclick="mudarAba('clientes')">👤 Buscadores</button>
                <button class="tab-btn" id="btnTabStaff" onclick="mudarAba('staff')">👑 Equipe Master</button>
            </div>

            <div id="abaAnuncios">
                <div class="apple-card mb-8 flex flex-col md:flex-row gap-4 items-center justify-between">
                    <div class="flex gap-3">
                        <select id="filtro_master_loja" class="apple-input w-[250px]" onchange="renderizarAnuncios()"><option value="TODOS">Todos Atacadistas</option></select>
                        <select id="filtro_master_status" class="apple-input w-[200px]" onchange="renderizarAnuncios()"><option value="TODOS">Todas Situações</option><option value="APROVADOS">Aprovados</option><option value="PENDENTES">⚠️ Pendentes</option></select>
                    </div>
                    <div class="flex flex-col items-end">
                        <span class="text-[9px] font-black text-white uppercase mb-1"><span id="masterBulkCount" class="text-red-500">0</span> Selecionados</span>
                        <div class="flex gap-2">
                            <button onclick="abrirMasterBulkEdit()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-[9px] font-black uppercase">Edição em Massa</button>
                            <button onclick="masterBulkDelete()" class="bg-red-900 text-white px-4 py-2 rounded-lg text-[9px] font-black uppercase">Apagar</button>
                        </div>
                    </div>
                </div>
                <div id="listaMasterGlobal"></div>
            </div>

            <div id="abaPostar" class="hidden">
                <div class="apple-card max-w-2xl mx-auto border-red-500/50">
                    <h2 class="text-lg font-black uppercase text-red-500 mb-6 text-center">Concierge Master</h2>
                    <form onsubmit="masterSalvarOferta(event)">
                        <label class="step-label">Dono do Anúncio (Atacadista)</label>
                        <select id="master_dono_id" class="apple-input mb-6" required></select>
                        <div class="grid grid-cols-2 gap-3 mb-6">
                            <button type="button" id="btnMasterTipoNovo" class="btn-tipo" onclick="masterSelecionarTipo('Novo')"><span>📦</span> NOVO</button>
                            <button type="button" id="btnMasterTipoSemi" class="btn-tipo" onclick="masterSelecionarTipo('Seminovo')"><span>♻️</span> SEMINOVO</button>
                        </div>
                        <input type="hidden" id="master_tipo_selecionado">
                        <div class="grid grid-cols-2 gap-3 mb-4">
                            <select id="m_filtro_grupo" class="apple-input" onchange="masterLiberarModelos()" disabled><option value="1">IPHONE</option></select>
                            <select id="m_produto_id" class="apple-input" onchange="masterLiberarMemorias()" disabled><option value="">Modelo...</option></select>
                        </div>
                        <div class="grid grid-cols-2 gap-3 mb-6">
                            <select id="m_cap" class="apple-input" onchange="masterLiberarCores()" disabled><option value="">Memória...</option></select>
                            <select id="m_cor" class="apple-input" onchange="masterLiberarDetalhes()" disabled><option value="">Cor...</option></select>
                        </div>
                        <div id="m_zona_detalhes" class="hidden border-t border-[#38383a] pt-6">
                            <div id="m_zona_seminovo" class="hidden mb-4 p-4 bg-[#2c2c2e] rounded-2xl">
                                <div class="grid grid-cols-2 gap-3 mb-3">
                                    <select id="m_condicao_semi" class="apple-input"><option value="Seminovo">Seminovo Padrão</option><option value="CPO">CPO</option><option value="GRADE A">GRADE A</option><option value="REPASSE DE CLIENTE">Repasse</option></select>
                                    <select id="m_bateria" class="apple-input"><option value="BATERIA EM 100%">100%</option><option value="ACIMA DE 90%">+90%</option><option value="ACIMA DE 85%">+85%</option></select>
                                </div>
                                <select id="m_garantia_semi" class="apple-input"><option value="3 MESES">3 Meses</option><option value="6 MESES">6 Meses</option><option value="1 ANO">1 Ano</option><option value="GARANTIA APPLE">Garantia Apple</option></select>
                            </div>
                            <div class="grid grid-cols-2 gap-3 mb-4">
                                <input type="number" id="m_qtd" class="apple-input" placeholder="Qtd" required>
                                <select id="m_regiao" class="apple-input" required></select>
                            </div>
                            <div class="grid grid-cols-2 gap-3 mb-6">
                                <input type="text" id="m_preco_brl" class="apple-input text-green-400" placeholder="R$" oninput="mascararMoeda(this)">
                                <input type="text" id="m_preco_usd" class="apple-input text-blue-400" placeholder="US$" oninput="mascararMoeda(this)">
                            </div>
                            <button type="submit" class="apple-button w-full">Publicar Agora</button>
                        </div>
                    </form>
                </div>
            </div>

            <div id="abaLojistas" class="hidden">
                <div class="flex justify-between mb-4"><h2 class="text-lg font-black uppercase">Atacadistas</h2><button onclick="abrirCriarUsuario('lojista')" class="apple-button bg-green-600">+ Atacadista</button></div>
                <div class="apple-card overflow-x-auto"><table><thead><tr><th>Loja</th><th>Local</th><th>Selos Apple</th><th class="text-right">Ação</th></tr></thead><tbody id="tabelaLojistas"></tbody></table></div>
            </div>

            <div id="abaClientes" class="hidden">
                <div class="flex justify-between mb-4"><h2 class="text-lg font-black uppercase">Buscadores (Clientes)</h2><button onclick="abrirCriarUsuario('cliente')" class="apple-button bg-blue-600">+ Buscador</button></div>
                <div class="apple-card overflow-x-auto"><table><thead><tr><th>Nome</th><th>Jornada</th><th>Selos Apple</th><th class="text-right">Ação</th></tr></thead><tbody id="tabelaClientes"></tbody></table></div>
            </div>

            <div id="abaStaff" class="hidden">
                <div class="flex justify-between mb-4"><h2 class="text-lg font-black uppercase text-red-500">Equipe Master</h2><button onclick="abrirCriarUsuario('staff')" class="apple-button bg-red-600">+ Funcionário</button></div>
                <div class="apple-card overflow-x-auto"><table><thead><tr><th>Administrador</th><th>E-mail</th><th>Status</th><th class="text-right">Ação</th></tr></thead><tbody id="tabelaStaff"></tbody></table></div>
            </div>
        </div>
    </div>

    <div id="masterBulkEditModal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[1100] p-4">
        <div class="apple-card max-w-[700px] w-full border-red-500 shadow-2xl max-h-[90vh] overflow-y-auto custom-scroll">
            <h3 class="text-lg font-black uppercase mb-4 text-red-500 text-center">Edição em Massa Global</h3>
            <form onsubmit="salvarMasterBulkChanges(event)">
                <div class="grid grid-cols-3 gap-3 mb-4">
                    <div><label class="text-[8px] text-gray-500 font-bold uppercase">Novo Preço</label><input type="text" id="mb_preco" class="apple-input" oninput="mascararMoeda(this)"></div>
                    <div><label class="text-[8px] text-gray-500 font-bold uppercase">Quantidade</label><input type="number" id="mb_qtd" class="apple-input"></div>
                    <div><label class="text-[8px] text-gray-500 font-bold uppercase">Origem</label><select id="mb_regiao" class="apple-input"></select></div>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div><label class="text-[8px] text-gray-500 font-bold uppercase">Aprovação</label><select id="mb_aprov" class="apple-input text-yellow-500"><option value="">Manter...</option><option value="aprovado">Aprovar</option><option value="pendente">Suspender</option></select></div>
                    <div><label class="text-[8px] text-gray-500 font-bold uppercase">Condição</label><select id="mb_cond" class="apple-input"><option value="">Manter...</option><option value="Novo">Novo</option><option value="Seminovo">Seminovo</option></select></div>
                </div>
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div><label class="text-[8px] text-gray-500 font-bold uppercase">Bateria</label><select id="mb_bat" class="apple-input"><option value="">Manter...</option><option value="BATERIA EM 100%">100%</option><option value="ACIMA DE 90%">+90%</option></select></div>
                    <div><label class="text-[8px] text-gray-500 font-bold uppercase">Garantia</label><select id="mb_gar" class="apple-input"><option value="">Manter...</option><option value="3 MESES">3 Meses</option><option value="1 ANO">1 Ano</option></select></div>
                </div>
                <div class="grid grid-cols-4 gap-2 mb-6 p-4 bg-[#151516] rounded-xl border border-[#2c2c2e]">
                    <label class="text-[8px] flex items-center gap-1 font-black"><input type="checkbox" id="mb_pix_v"> PIX</label>
                    <label class="text-[8px] flex items-center gap-1 font-black"><input type="checkbox" id="mb_usdt_v"> USDT</label>
                    <label class="text-[8px] flex items-center gap-1 font-black"><input type="checkbox" id="mb_nota_v"> NF</label>
                    <label class="text-[8px] flex items-center gap-1 font-black"><input type="checkbox" id="mb_prop_v"> LOTE</label>
                </div>
                <div class="flex gap-3"><button type="button" onclick="fecharMasterBulkEdit()" class="apple-button bg-gray-600 w-1/3">Sair</button><button type="submit" class="apple-button w-2/3">Aplicar a Todos</button></div>
            </form>
        </div>
    </div>

    <div id="modalSelo" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[3000] p-4">
        <div class="apple-card max-w-[350px] border-blue-500 text-center">
            <h3 class="text-xs font-black uppercase mb-4 text-blue-500">Insígnia Apple</h3>
            <div class="grid grid-cols-1 gap-2" id="listaBotoesSelos"></div>
            <button onclick="document.getElementById('modalSelo').classList.add('hidden')" class="text-[9px] text-gray-500 mt-6 uppercase">Fechar</button>
        </div>
    </div>

    <div id="modalCriarUser" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[2000] p-4">
        <div class="apple-card max-w-[400px] w-full border-green-500">
            <h3 id="tituloModalUser" class="text-sm font-black uppercase mb-4">Novo Usuário</h3>
            <form onsubmit="salvarNovoUsuario(event)">
                <input type="hidden" id="c_tipo_user">
                <input type="text" id="c_nome_user" class="apple-input mb-2" placeholder="Nome / Loja" required>
                <div id="zona_cliente_staff" class="hidden"><input type="email" id="c_email_user" class="apple-input mb-2" placeholder="E-mail"></div>
                <div id="zona_lojista" class="hidden">
                    <select id="c_pais_user" class="apple-input mb-2">
                        <option value="BRASIL 🇧🇷">BRASIL 🇧🇷</option>
                        <option value="EUA 🇺🇸">EUA 🇺🇸</option>
                        <option value="DUBAI 🇦🇪">DUBAI 🇦🇪</option>
                    </select>
                    <input type="text" id="c_cidade_user" class="apple-input mb-2" placeholder="Cidade">
                </div>
                <input type="text" id="c_senha_user" class="apple-input mb-4" placeholder="Senha" required>
                <div class="flex gap-2"><button type="button" onclick="fecharCriarUsuario()" class="apple-button bg-gray-600 w-1/3">Sair</button><button type="submit" class="apple-button bg-green-600 w-2/3">Salvar</button></div>
            </form>
        </div>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let seloAlvoId = null, seloAlvoTabela = '', produtosMestre = [], gradeVariacoes = [], ofertasGlobais = [], modoManutencao = false;

        const SELOS_LOJISTA = ["CALIFA APPLE", "SHEIKH APPLE", "SULTÃO APPLE", "IMPERADOR APPLE", "REI APPLE", "MAGNATA APPLE"];
        const SELOS_BUSCADOR = ["LOJISTA CURIOSO APPLE", "LOJISTA EXPERTO APPLE", "LOJISTA AGUIA APPLE", "LOJISTA BUSCADOR APPLE", "LOJISTA SO COMPRA MATANDO APPLE", "MANIACO POR PREÇO APPLE", "BUSCADOR PROFISSIONAL APPLE"];

        window.onscroll = () => { document.getElementById('btnScrollTop').style.display = window.scrollY > 300 ? 'flex' : 'none'; };

        async function realizarLoginMaster(e) {
            e.preventDefault();
            const { data } = await _s.from('clientes_buscador').select('*').eq('email', document.getElementById('logEmailMaster').value).eq('senha', document.getElementById('logPassMaster').value).maybeSingle();
            if (data?.is_master) { localStorage.setItem('iFipe_Master_Auth', 'true'); liberarDashboard(); } else alert("Acesso Negado.");
        }

        function sairMaster() { localStorage.removeItem('iFipe_Master_Auth'); window.location.reload(); }

        function mudarAba(abaId) {
            ['abaAnuncios', 'abaLojistas', 'abaClientes', 'abaPostar', 'abaStaff'].forEach(id => document.getElementById(id).classList.add('hidden'));
            ['btnTabAnuncios', 'btnTabLojistas', 'btnTabClientes', 'btnTabPostar', 'btnTabStaff'].forEach(id => document.getElementById(id).classList.remove('active'));
            document.getElementById(`aba${abaId.charAt(0).toUpperCase() + abaId.slice(1)}`).classList.remove('hidden');
            document.getElementById(`btnTab${abaId.charAt(0).toUpperCase() + abaId.slice(1)}`).classList.add('active');
            if(abaId === 'anuncios') carregarAnunciosGlobais();
            if(abaId === 'lojistas') carregarLojistas();
            if(abaId === 'clientes') carregarClientes();
            if(abaId === 'staff') carregarStaff();
        }

        async function checkManutencao() {
            const {data} = await _s.from('configuracoes').select('manutencao').eq('id', 1).single();
            if(data) { modoManutencao = data.manutencao; atualizarBotaoManutencao(); }
        }
        function atualizarBotaoManutencao() {
            const btn = document.getElementById('btnManutencaoToggle');
            btn.className = `px-4 py-1.5 rounded-full text-[10px] font-black uppercase ${modoManutencao ? 'bg-red-600 text-white' : 'bg-green-600 text-white'}`;
            btn.innerText = modoManutencao ? '🚧 FECHADO' : '🌍 ONLINE';
        }
        async function toggleManutencao() {
            const n = !modoManutencao; await _s.from('configuracoes').update({manutencao: n}).eq('id', 1);
            modoManutencao = n; atualizarBotaoManutencao();
        }

        function liberarDashboard() { document.getElementById('authSection').classList.add('hidden'); document.getElementById('dashboardSection').classList.remove('hidden'); checkManutencao(); carregarBasePostagem(); mudarAba('anuncios'); }

        // MULTISELOS
        function abrirModalSelo(id, tabela) {
            seloAlvoId = id; seloAlvoTabela = tabela;
            const div = document.getElementById('listaBotoesSelos');
            const lista = (tabela === 'fornecedores') ? SELOS_LOJISTA : SELOS_BUSCADOR;
            div.innerHTML = lista.map(s => `<button onclick="adicionarSelo('${s}')" class="apple-input hover:bg-red-500 py-3 text-[10px] font-black">${s}</button>`).join('');
            document.getElementById('modalSelo').classList.remove('hidden');
        }
        async function adicionarSelo(nomeSelo) {
            const { data } = await _s.from(seloAlvoTabela).select('insignia_manual').eq('id', seloAlvoId).single();
            let lista = data.insignia_manual || [];
            if(!lista.includes(nomeSelo)) { lista.push(nomeSelo); await _s.from(seloAlvoTabela).update({ insignia_manual: lista }).eq('id', seloAlvoId); }
            document.getElementById('modalSelo').classList.add('hidden');
            seloAlvoTabela === 'fornecedores' ? carregarLojistas() : carregarClientes();
        }
        async function removerSelo(id, tabela, nomeSelo) {
            const { data } = await _s.from(tabela).select('insignia_manual').eq('id', id).single();
            let lista = (data.insignia_manual || []).filter(s => s !== nomeSelo);
            await _s.from(tabela).update({ insignia_manual: lista }).eq('id', id);
            tabela === 'fornecedores' ? carregarLojistas() : carregarClientes();
        }
        function renderTags(id, tabela, lista) {
            if(!lista || lista.length === 0) return `<button onclick="abrirModalSelo(${id}, '${tabela}')" class="btn-add-selo">+ SELO APPLE</button>`;
            return `<div class="flex flex-wrap">${lista.map(s => `<span class="insignia-tag">${s}<b class="remove-selo" onclick="removerSelo(${id}, '${tabela}', '${s}')">×</b></span>`).join('')}<button onclick="abrirModalSelo(${id}, '${tabela}')" class="btn-add-selo">+</button></div>`;
        }

        // TABELAS
        async function carregarLojistas() { const { data } = await _s.from('fornecedores').select('*').order('nome'); document.getElementById('tabelaLojistas').innerHTML = data.map(l => `<tr><td><span class="font-black text-white uppercase">${l.nome}</span></td><td>${l.cidade} (${l.pais})</td><td>${renderTags(l.id, 'fornecedores', l.insignia_manual)}</td><td class="text-right flex justify-end gap-1"><button onclick="apagarLojista(${l.id})" class="btn-acao btn-del">X</button></td></tr>`).join(''); }
        async function carregarClientes() { const { data } = await _s.from('clientes_buscador').select('*').eq('is_master', false).order('nome'); document.getElementById('tabelaClientes').innerHTML = data.map(c => `<tr><td><span class="font-black text-white uppercase">${c.nome}</span></td><td>${c.logins_count || 0} LOGINS</td><td>${renderTags(c.id, 'clientes_buscador', c.insignia_manual)}</td><td class="text-right flex justify-end gap-1"><button onclick="apagarCliente(${c.id})" class="btn-acao btn-del">X</button></td></tr>`).join(''); }
        async function carregarStaff() { const { data } = await _s.from('clientes_buscador').select('*').eq('is_master', true); document.getElementById('tabelaStaff').innerHTML = data.map(s => `<tr><td><span class="font-black text-red-500 uppercase">${s.nome}</span></td><td>${s.email}</td><td>ADMIN MASTER</td><td class="text-right flex justify-end gap-1"><button onclick="apagarCliente(${s.id})" class="btn-acao btn-del">X</button></td></tr>`).join(''); }

        // CONCIERGE
        function masterSelecionarTipo(t) { document.getElementById('master_tipo_selecionado').value = t; document.getElementById('btnMasterTipoNovo').classList.toggle('active', t==='Novo'); document.getElementById('btnMasterTipoSemi').classList.toggle('active', t==='Seminovo'); document.getElementById('m_zona_seminovo').classList.toggle('hidden', t==='Novo'); document.getElementById('m_filtro_grupo').disabled = false; document.getElementById('m_filtro_grupo').value = "1"; masterLiberarModelos(); }
        function masterLiberarModelos() { const f = produtosMestre.filter(x => x.grupo_id == document.getElementById('m_filtro_grupo').value); document.getElementById('m_produto_id').innerHTML = '<option value="" selected disabled>Modelo...</option>' + f.map(x => `<option value="${x.id}">${x.nome}</option>`).join(''); document.getElementById('m_produto_id').disabled = false; }
        function masterLiberarMemorias() { const pid = document.getElementById('m_produto_id').value; const v = gradeVariacoes.filter(x => x.produto_id == pid); const caps = [...new Set(v.map(x => x.capacidade))]; document.getElementById('m_cap').innerHTML = '<option value="" selected disabled>Memória...</option>' + caps.map(c => `<option value="${c}">${c}</option>`).join(''); document.getElementById('m_cap').disabled = false; }
        function masterLiberarCores() { const pid = document.getElementById('m_produto_id').value; const cap = document.getElementById('m_cap').value; const v = gradeVariacoes.filter(x => x.produto_id == pid && x.capacidade == cap); document.getElementById('m_cor').innerHTML = '<option value="" selected disabled>Cor...</option>' + v.map(x => `<option value="${x.cor}">${x.cor}</option>`).join(''); document.getElementById('m_cor').disabled = false; }
        function masterLiberarDetalhes() { document.getElementById('m_zona_detalhes').classList.remove('hidden'); }
        async function masterSalvarOferta(e) {
            e.preventDefault(); const t = document.getElementById('master_tipo_selecionado').value; const pBrl = parsePreco(document.getElementById('m_preco_brl').value); const pUsd = parsePreco(document.getElementById('m_preco_usd').value); const pid = document.getElementById('m_produto_id').value; const cap = document.getElementById('m_cap').value; const cor = document.getElementById('m_cor').value; let v = gradeVariacoes.find(x => x.produto_id == pid && x.capacidade == cap && x.cor == cor);
            await _s.from('ofertas').insert([{ fornecedor_id: document.getElementById('master_dono_id').value, variacao_id: v.id, regiao_id: document.getElementById('m_regiao').value, preco: pBrl || pUsd, moeda: pBrl > 0 ? 'BRL' : 'USD', quantidade: parseInt(document.getElementById('m_qtd').value), condicao: t==='Novo'?'Novo':document.getElementById('m_condicao_semi').value, garantia: t==='Novo'?'1 ANO':'3 MESES', status_aprovacao: 'aprovado', data_alteracao_preco: new Date().toISOString() }]);
            alert("Lançado!"); mudarAba('anuncios');
        }

        // ANÚNCIOS E MASSA
        async function carregarAnunciosGlobais() { const { data } = await _s.from('ofertas').select('*, fornecedores(nome), variacoes(*, produtos_mestre(*)), regioes(nome)').order('criado_em', {ascending: false}); ofertasGlobais = data || []; renderizarAnuncios(); }
        function renderizarAnuncios() {
            const container = document.getElementById('listaMasterGlobal'); container.innerHTML = '';
            const grupos = {}; ofertasGlobais.forEach(o => { const n = o.fornecedores?.nome || 'Sem Loja'; if(!grupos[n]) grupos[n] = []; grupos[n].push(o); });
            const lojistas = [...new Set(ofertasGlobais.map(o => o.fornecedores?.nome))].sort();
            document.getElementById('filtro_master_loja').innerHTML = '<option value="TODOS">Todos Atacadistas</option>' + lojistas.map(n => `<option value="${n}">${n}</option>`).join('');
            for (let loja in grupos) {
                let linhas = grupos[loja].map(o => `<tr><td><input type="checkbox" class="master-offer-check" value="${o.id}" onchange="updateMasterBulkCount()"></td><td><span class="font-black text-white">${o.variacoes?.produtos_mestre?.nome}</span></td><td class="text-center font-bold text-green-400">${o.moeda==='USD'?'$':'R$'} ${o.preco.toLocaleString('pt-BR')}</td><td class="text-right"><button onclick="masterDeleteIndividual(${o.id})" class="btn-acao btn-del">X</button></td></tr>`).join('');
                container.innerHTML += `<details><summary>${loja.toUpperCase()} (${grupos[loja].length} PROD)</summary><div class="details-content"><table><tbody>${linhas}</tbody></table></div></details>`;
            }
        }
        function abrirMasterBulkEdit() { if(!document.querySelectorAll('.master-offer-check:checked').length) return alert("Selecione os anúncios!"); document.getElementById('masterBulkEditModal').classList.remove('hidden'); }
        function fecharMasterBulkEdit() { document.getElementById('masterBulkEditModal').classList.add('hidden'); }
        async function salvarMasterBulkChanges(e) {
            e.preventDefault(); const ids = Array.from(document.querySelectorAll('.master-offer-check:checked')).map(c => parseInt(c.value));
            const p = parsePreco(document.getElementById('mb_preco').value); const q = document.getElementById('mb_qtd').value; const r = document.getElementById('mb_regiao').value;
            let up = {}; if(p > 0) up.preco = p; if(q) up.quantidade = parseInt(q); if(r) up.regiao_id = r;
            if(Object.keys(up).length > 0) { up.data_alteracao_preco = new Date().toISOString(); await _s.from('ofertas').update(up).in('id', ids); }
            fecharMasterBulkEdit(); carregarAnunciosGlobais(); alert("Atualizado!");
        }
        async function masterBulkDelete() { const ids = Array.from(document.querySelectorAll('.master-offer-check:checked')).map(c => parseInt(c.value)); if(!ids.length || !confirm("Apagar?")) return; await _s.from('ofertas').delete().in('id', ids); carregarAnunciosGlobais(); }
        async function masterDeleteIndividual(id) { if(confirm("Apagar?")) { await _s.from('ofertas').delete().eq(id); carregarAnunciosGlobais(); } }

        async function carregarBasePostagem() {
            const [p, r, v, f] = await Promise.all([ _s.from('produtos_mestre').select('*').order('nome'), _s.from('regioes').select('*').order('nome'), _s.from('variacoes').select('*'), _s.from('fornecedores').select('id, nome').order('nome') ]);
            produtosMestre = p.data; gradeVariacoes = v.data;
            const regioesLimpas = r.data.filter(reg => !reg.nome.includes('PARAGUAI'));
            const html = regioesLimpas.map(x => `<option value="${x.id}">${x.nome.toUpperCase()}</option>`).join('');
            document.getElementById('m_regiao').innerHTML = '<option value="" disabled selected>Origem...</option>' + html;
            document.getElementById('mb_regiao').innerHTML = '<option value="">Manter...</option>' + html;
            document.getElementById('master_dono_id').innerHTML = '<option value="" disabled selected>Escolher Atacadista...</option>' + f.data.map(loja => `<option value="${loja.id}">${loja.nome.toUpperCase()}</option>`).join('');
        }

        function parsePreco(v) { return v ? parseFloat(v.toString().replace(/\./g, '').replace(',', '.')) : 0; }
        function mascararMoeda(input) { let v = input.value.replace(/\D/g, ''); if (!v) { input.value = ''; return; } v = (parseFloat(v) / 100).toFixed(2).replace('.', ','); input.value = v.replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
        function abrirCriarUsuario(t) { document.getElementById('c_tipo_user').value = t; document.getElementById('zona_lojista').classList.toggle('hidden', t!=='lojista'); document.getElementById('zona_cliente_staff').classList.toggle('hidden', t==='lojista'); document.getElementById('modalCriarUser').classList.remove('hidden'); }
        function fecharCriarUsuario() { document.getElementById('modalCriarUser').classList.add('hidden'); }
        async function salvarNovoUsuario(e) { e.preventDefault(); const t = document.getElementById('c_tipo_user').value; const base = { nome: document.getElementById('c_nome_user').value, senha: document.getElementById('c_senha_user').value }; if(t==='lojista') await _s.from('fornecedores').insert([{...base, pais: document.getElementById('c_pais_user').value, cidade: document.getElementById('c_cidade_user').value, ativo:true}]); else await _s.from('clientes_buscador').insert([{...base, email: document.getElementById('c_email_user').value, is_master: t==='staff', aprovado: true, logins_count: 0}]); fecharCriarUsuario(); carregarLojistas(); carregarClientes(); carregarStaff(); }
        async function apagarLojista(id) { if(confirm("Apagar?")) { await _s.from('fornecedores').delete().eq('id', id); carregarLojistas(); } }
        async function apagarCliente(id) { if(confirm("Apagar?")) { await _s.from('clientes_buscador').delete().eq('id', id); carregarClientes(); carregarStaff(); } }
        function updateMasterBulkCount() { document.getElementById('masterBulkCount').innerText = document.querySelectorAll('.master-offer-check:checked').length; }
    </script>
</body>
</html>
