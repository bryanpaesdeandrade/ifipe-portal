<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Painel Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background:#000; color:#fff; font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin:0; scroll-behavior: smooth; }
        .nav-bar { background:rgba(28,28,30,0.8); backdrop-filter:blur(15px); border-bottom:1px solid #38383a; padding:15px 30px; position:sticky; top:0; z-index:100; }
        .apple-card { background: #1c1c1e; border: 1px solid #38383a; border-radius: 24px; padding: 2rem; box-shadow: 0 20px 40px rgba(0,0,0,0.4); position: relative; }
        .apple-input { background: #2c2c2e; border: 1px solid #38383a; border-radius: 12px; padding: 14px; width: 100%; color: white; outline: none; margin-bottom: 1rem; font-size: 13px; }
        .apple-button { background: #fff; color: #000; font-weight: 900; border-radius: 50px; padding: 16px; width: 100%; cursor: pointer; text-transform: uppercase; border: none; font-size: 12px; transition: 0.3s; }
        .apple-button:hover { background: #0071e3; color: #fff; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th { font-size: 10px; color: #86868b; text-transform: uppercase; padding: 12px; text-align: left; border-bottom: 1px solid #38383a; letter-spacing: 0.1em; }
        td { padding: 14px 12px; border-bottom: 1px solid #2c2c2e; font-size: 13px; }
        
        .btn-acao { font-size: 10px; font-weight: bold; text-transform: uppercase; padding: 6px 12px; border-radius: 8px; cursor: pointer; transition: 0.3s; display: inline-block; margin-right: 5px; margin-bottom: 5px; border: none; }
        .btn-verde { background: rgba(50, 215, 75, 0.2); color: #32d74b; }
        .btn-amarelo { background: rgba(255, 204, 0, 0.2); color: #ffcc00; }
        .btn-azul { background: rgba(0, 113, 227, 0.2); color: #0071e3; }
        .btn-vermelho { background: rgba(255, 59, 48, 0.2); color: #ff3b30; }
        
        .mini-edit { background: transparent; border: 1px solid transparent; color: #32d74b; font-weight: 800; width: 80px; text-align: center; border-radius: 6px; padding: 4px; transition: 0.2s; }
        .mini-edit:focus { border-color: #0071e3; background: #2c2c2e; outline: none; }

        .tab-btn { background: #2c2c2e; color: #86868b; padding: 8px 16px; border-radius: 50px; font-size: 10px; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.3s; border: 1px solid #38383a; }
        .tab-btn.active { background: #0071e3; color: #fff; border-color: #0071e3; }

        label { display: block; text-transform: uppercase; font-size: 9px; color: #86868b; margin-bottom: 6px; font-weight: 900; letter-spacing: 0.1em; }
        .hidden { display: none !important; }
        .check-box { accent-color: #0071e3; width: 16px; height: 16px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="bulkOfertasModal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[1100] p-4">
        <div class="apple-card max-w-[600px] w-full border-yellow-500">
            <h3 class="text-lg font-black uppercase mb-4 text-yellow-500 text-center">Edição em Massa de Anúncios</h3>
            <form onsubmit="salvarBulkOfertasMaster(event)">
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div><label>Novo Preço</label><input type="text" id="bm_o_preco" class="apple-input" placeholder="R$ 0,00" oninput="mascararMoeda(this)"></div>
                    <div><label>Nova Qtd</label><input type="number" id="bm_o_qtd" class="apple-input" placeholder="Estoque"></div>
                    <div><label>Condição</label><select id="bm_o_cond" class="apple-input"><option value="">Manter...</option><option value="Novo">Novo</option><option value="Seminovo">Seminovo</option><option value="CPO">CPO</option></select></div>
                    <div><label>Saúde Bateria</label><select id="bm_o_bat" class="apple-input"><option value="">Manter...</option><option value="ACIMA DE 85%">ACIMA DE 85%</option><option value="BATERIA EM 100%">100%</option></select></div>
                </div>
                <div class="grid grid-cols-4 gap-2 mb-4 p-3 bg-[#2c2c2e] rounded-xl border border-[#38383a]">
                    <div class="text-center"><label>PIX</label><select id="bm_o_pix" class="apple-input py-1"><option value="">-</option><option value="1">Sim</option><option value="0">Não</option></select></div>
                    <div class="text-center"><label>USDT</label><select id="bm_o_usdt" class="apple-input py-1"><option value="">-</option><option value="1">Sim</option><option value="0">Não</option></select></div>
                    <div class="text-center"><label>NF</label><select id="bm_o_nota" class="apple-input py-1"><option value="">-</option><option value="1">Sim</option><option value="0">Não</option></select></div>
                    <div class="text-center"><label>ENVIO</label><select id="bm_o_envio" class="apple-input py-1"><option value="">-</option><option value="1">Sim</option><option value="0">Não</option></select></div>
                </div>
                <div class="flex gap-2 mt-4"><button type="button" onclick="fecharBulkOfertasMaster()" class="apple-button bg-gray-600 text-white w-1/3">Sair</button><button type="submit" class="apple-button bg-yellow-600 text-black w-2/3">Aplicar em todos</button></div>
            </form>
        </div>
    </div>

    <div id="loginSection" class="flex items-center justify-center min-h-screen px-4">
        <div class="apple-card max-w-[400px] text-center w-full">
            <h1 class="text-5xl font-black italic mb-2">iFipe</h1>
            <p class="text-[10px] font-bold uppercase text-red-500 mb-8 tracking-[0.4em]">Painel Master</p>
            <form onsubmit="fazerLoginAdmin(event)">
                <input type="text" id="adminEmail" class="apple-input" placeholder="Usuário Master" required>
                <input type="password" id="adminPass" class="apple-input" placeholder="Senha" required>
                <button type="submit" class="apple-button w-full">Entrar</button>
            </form>
            <p id="loginMsg" class="mt-4 text-[10px] font-bold text-red-500 uppercase"></p>
        </div>
    </div>

    <div id="dashboardSection" class="hidden">
        <nav class="nav-bar">
            <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
                <h1 class="text-2xl font-black italic">iFipe <span class="text-red-500 text-sm">MASTER</span></h1>
                <div class="flex gap-2">
                    <button onclick="irPara('sec-ofertas')" class="tab-btn active">⚙️ Ofertas</button>
                    <button onclick="irPara('sec-cadastros')" class="tab-btn">➕ Novos</button>
                    <button onclick="irPara('sec-banco')" class="tab-btn">🗄️ Banco de Dados</button>
                </div>
                <button onclick="sairPainel()" class="text-[10px] text-red-500 font-black uppercase border-0 bg-transparent cursor-pointer">Sair</button>
            </div>
        </nav>

        <div class="max-w-7xl mx-auto p-4 md:p-8">
            
            <div id="sec-ofertas" class="pt-20 -mt-20">
                <h2 class="text-2xl font-black italic mb-6 text-yellow-500">Gestão Global de Ofertas (Concierge)</h2>
                <div class="grid grid-cols-1 lg:grid-cols-4 gap-8 mb-12">
                    <div class="lg:col-span-1">
                        <div class="apple-card p-6 border-yellow-600/30 bg-yellow-600/5">
                            <label class="text-yellow-500">Postar em nome de:</label>
                            <select id="master_fornecedor_id" class="apple-input border-yellow-600/50 text-yellow-500 font-black uppercase"><option value="">Carregando lojas...</option></select>
                            <form onsubmit="postarOfertaMaster(event)">
                                <select id="m_cat" class="apple-input mb-2" onchange="popularProdutosMaster()" required><option value="">Categoria...</option><option value="1">IPHONE</option><option value="2">APPLE WATCH</option><option value="4">MACBOOK</option><option value="3">IPAD</option></select>
                                <select id="m_prod" class="apple-input mb-2" onchange="aoMudarProdutoMaster()" required><option value="">Modelo...</option></select>
                                <div id="m_grade"></div>
                                <select id="m_cond" class="apple-input mt-2" required><option value="">Condição...</option><option value="Novo">Novo</option><option value="Seminovo">Seminovo</option></select>
                                <input type="number" id="m_qtd" class="apple-input mt-2" placeholder="Qtd" required>
                                <select id="m_reg" class="apple-input mt-2" required><option value="">Origem...</option></select>
                                <div class="grid grid-cols-2 gap-2 mt-2">
                                    <input type="text" id="m_brl" class="apple-input" placeholder="R$" oninput="mascararMoeda(this); limparPrecoMaster('brl')">
                                    <input type="text" id="m_usd" class="apple-input" placeholder="$" oninput="mascararMoeda(this); limparPrecoMaster('usd')">
                                </div>
                                <button type="submit" class="apple-button w-full bg-yellow-600 text-black mt-4">Publicar</button>
                            </form>
                        </div>
                    </div>

                    <div class="lg:col-span-3">
                        <div class="bg-yellow-600 p-4 rounded-2xl flex flex-wrap items-center justify-between shadow-lg gap-4 mb-4">
                            <span class="text-xs font-black text-black uppercase"><span id="bulkMasterOfferCount">0</span> Selecionados</span>
                            <div class="flex gap-2">
                                <button onclick="abrirBulkOfertasMaster()" class="bg-black text-yellow-500 px-4 py-2 rounded-full text-[9px] font-black uppercase">Editar Massa</button>
                                <button onclick="bulkDuplicateMaster()" class="bg-white text-black px-4 py-2 rounded-full text-[9px] font-black uppercase">Duplicar</button>
                                <button onclick="bulkDeleteMaster()" class="bg-red-600 text-white px-4 py-2 rounded-full text-[9px] font-black uppercase">Apagar</button>
                            </div>
                        </div>
                        <div class="apple-card overflow-x-auto">
                            <input type="text" onkeyup="filtrarTabela('listaOfertasMaster', this.value)" class="apple-input py-2 text-[11px]" placeholder="🔍 Filtrar anúncios...">
                            <table>
                                <thead><tr><th width="30"><input type="checkbox" onclick="toggleAllOfertas(this)"></th><th>Loja</th><th>Produto</th><th class="text-center">Qtd</th><th class="text-center">Preço</th><th class="text-right">Ação</th></tr></thead>
                                <tbody id="listaOfertasMaster"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div id="sec-cadastros" class="pt-20 -mt-20">
                <hr class="border-[#38383a] my-20">
                <h2 class="text-2xl font-black italic mb-6">Criar Novos Cadastros</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                    <div class="apple-card p-6"><h3 class="font-bold text-[11px] text-blue-500 mb-4 uppercase">Novo Lojista</h3><form onsubmit="addLojista(event)"><input type="text" id="nl_nome" class="apple-input py-2" placeholder="Nome da Loja" required><select id="nl_pais" class="apple-input py-2" required><option value="Brasil">Brasil</option><option value="Paraguai">Paraguai</option></select><div class="grid grid-cols-2 gap-2"><input type="text" id="nl_estado" class="apple-input py-2" placeholder="Estado"><input type="text" id="nl_cidade" class="apple-input py-2" placeholder="Cidade"></div><input type="text" id="nl_whats" class="apple-input py-2" placeholder="WhatsApp"><input type="text" id="nl_senha" class="apple-input py-2" placeholder="Senha"><button type="submit" class="apple-button bg-blue-600 text-white">Cadastrar</button></form></div>
                    <div class="apple-card p-6"><h3 class="font-bold text-[11px] text-green-500 mb-4 uppercase">Novo Cliente VIP</h3><form onsubmit="addCliente(event)"><input type="text" id="nc_nome" class="apple-input py-2" placeholder="Nome" required><input type="email" id="nc_email" class="apple-input py-2" placeholder="E-mail" required><input type="text" id="nc_senha" class="apple-input py-2" placeholder="Senha"><button type="submit" class="apple-button bg-green-600 text-white">Cadastrar</button></form></div>
                    <div class="apple-card p-6"><h3 class="font-bold text-[11px] text-red-500 mb-4 uppercase">Novo Admin</h3><form onsubmit="addAdmin(event)"><input type="text" id="na_nome" class="apple-input py-2" placeholder="Nome" required><input type="text" id="na_user" class="apple-input py-2" placeholder="Usuário"><button type="submit" class="apple-button bg-red-600 text-white">Cadastrar</button></form></div>
                </div>
            </div>

            <div id="sec-banco" class="pt-20 -mt-20 pb-40">
                <hr class="border-[#38383a] my-20">
                <h2 class="text-2xl font-black italic mb-6">Gestão do Banco de Dados</h2>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="apple-card overflow-x-auto"><h3 class="font-bold text-[14px] text-blue-500 uppercase m-0 mb-4">Lojistas</h3><tbody id="listaFornecedores"></tbody></table></div>
                    <div class="apple-card overflow-x-auto"><h3 class="font-bold text-[14px] text-green-500 uppercase m-0 mb-4">Clientes</h3><tbody id="listaClientes"></tbody></table></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let produtosMestre = [], gradeVariacoes = [];

        function irPara(id) { document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); event.target.classList.add('active'); document.getElementById(id).scrollIntoView({ behavior: 'smooth' }); }

        window.onload = async () => {
            const t = localStorage.getItem('iFipe_MasterToken');
            if (t) { const { data } = await _s.from('admin_users').select('id').eq('id', t).maybeSingle(); if(data) liberarAcesso(); }
        };

        async function fazerLoginAdmin(e) { e.preventDefault(); const { data } = await _s.from('admin_users').select('*').ilike('email', document.getElementById('adminEmail').value).eq('senha', document.getElementById('adminPass').value).maybeSingle(); if(data?.ativo) { localStorage.setItem('iFipe_MasterToken', data.id); liberarAcesso(); } else alert("Erro!"); }

        function liberarAcesso() { document.getElementById('loginSection').classList.add('hidden'); document.getElementById('dashboardSection').classList.remove('hidden'); carregarTabelas(); initMasterAnuncios(); }

        // --- MASTER CONCIERGE LOGIC ---
        async function initMasterAnuncios() {
            const [p, r, v, f] = await Promise.all([ _s.from('produtos_mestre').select('*').order('nome'), _s.from('regioes').select('*').order('nome'), _s.from('variacoes').select('*'), _s.from('fornecedores').select('id, nome').eq('ativo', true).order('nome') ]);
            produtosMestre = p.data; gradeVariacoes = v.data;
            document.getElementById('m_reg').innerHTML = '<option value="">Origem...</option>' + r.data.map(x => `<option value="${x.id}">${x.bandeira} ${x.nome}</option>`).join('');
            document.getElementById('master_fornecedor_id').innerHTML = '<option value="">Selecione a Loja Alvo...</option>' + f.data.map(x => `<option value="${x.id}">${x.nome.toUpperCase()}</option>`).join('');
            carregarOfertasMaster();
        }

        async function carregarOfertasMaster() {
            const { data } = await _s.from('ofertas').select('*, fornecedores(nome), variacoes(capacidade, cor, produtos_mestre(nome))').order('criado_em', {ascending: false});
            document.getElementById('listaOfertasMaster').innerHTML = data.map(o => `
                <tr>
                    <td><input type="checkbox" class="offer-master-check check-box" value="${o.id}" onclick="updateBulkCountMaster()"></td>
                    <td class="text-yellow-500 font-black uppercase text-[10px]">${o.fornecedores.nome}</td>
                    <td><span class="font-bold">${o.variacoes.produtos_mestre.nome}</span><br><span class="text-[9px] text-gray-500 uppercase">${o.variacoes.capacidade} | ${o.variacoes.cor}</span></td>
                    <td class="text-center"><input type="number" class="mini-edit w-[50px]" value="${o.quantidade}" onblur="salvarRapidoMaster(${o.id}, 'quantidade', this.value)"></td>
                    <td class="text-center"><input type="text" class="mini-edit" value="${o.preco.toLocaleString('pt-BR',{minimumFractionDigits:2})}" oninput="mascararMoeda(this)" onblur="salvarRapidoMaster(${o.id}, 'preco', this.value)"><span class="text-[8px] block opacity-40">${o.moeda}</span></td>
                    <td class="text-right"><span class="btn-acao btn-vermelho" onclick="excluirOfertaMaster(${o.id})">X</span></td>
                </tr>`).join('');
            updateBulkCountMaster();
        }

        // --- INJEÇÃO: FUNÇÕES EM MASSA DO MASTER ---
        function toggleAllOfertas(master) { document.querySelectorAll('.offer-master-check').forEach(c => c.checked = master.checked); updateBulkCountMaster(); }
        function updateBulkCountMaster() { document.getElementById('bulkMasterOfferCount').innerText = document.querySelectorAll('.offer-master-check:checked').length; }
        function abrirBulkOfertasMaster() { if(!document.querySelectorAll('.offer-master-check:checked').length) return alert("Selecione!"); document.getElementById('bulkOfertasModal').classList.remove('hidden'); }
        function fecharBulkOfertasMaster() { document.getElementById('bulkOfertasModal').classList.add('hidden'); }

        async function salvarBulkOfertasMaster(e) {
            e.preventDefault();
            const ids = Array.from(document.querySelectorAll('.offer-master-check:checked')).map(c => parseInt(c.value));
            let up = {};
            const p = parsePreco(document.getElementById('bm_o_preco').value); if(p > 0) up.preco = p;
            const q = document.getElementById('bm_o_qtd').value; if(q) up.quantidade = parseInt(q);
            const c = document.getElementById('bm_o_cond').value; if(c) up.condicao = c;
            const b = document.getElementById('bm_o_bat').value; if(b) up.saude_bateria = b;
            const pix = document.getElementById('bm_o_pix').value; if(pix) up.aceita_pix = pix === "1";
            const usd = document.getElementById('bm_o_usdt').value; if(usd) up.aceita_usdt = usd === "1";

            await _s.from('ofertas').update(up).in('id', ids);
            fecharBulkOfertasMaster(); carregarOfertasMaster(); alert("Atualizado!");
        }

        async function bulkDuplicateMaster() {
            const ids = Array.from(document.querySelectorAll('.offer-master-check:checked')).map(c => parseInt(c.value));
            if(!ids.length) return alert("Selecione!");
            const { data: originais } = await _s.from('ofertas').select('*').in('id', ids);
            await _s.from('ofertas').insert(originais.map(o => { const { id, criado_em, ...resto } = o; return resto; }));
            carregarOfertasMaster(); alert("Duplicado!");
        }

        async function bulkDeleteMaster() {
            const ids = Array.from(document.querySelectorAll('.offer-master-check:checked')).map(c => parseInt(c.value));
            if(!ids.length || !confirm("Apagar tudo selecionado?")) return;
            await _s.from('ofertas').delete().in('id', ids);
            carregarOfertasMaster();
        }

        // --- HELPERS E RESTANTE DO CÓDIGO (ORIGINAL PRESERVADO) ---
        function parsePreco(v) { return v ? parseFloat(v.toString().replace(/\./g, '').replace(',', '.')) : 0; }
        function mascararMoeda(input) { let v = input.value.replace(/\D/g, ''); if (!v) { input.value = ''; return; } v = (parseFloat(v) / 100).toFixed(2).replace('.', ','); input.value = v.replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
        function filtrarTabela(id, t) { const rows = document.getElementById(id).getElementsByTagName('tr'); for (let i = 0; i < rows.length; i++) { rows[i].style.display = rows[i].innerText.toLowerCase().includes(t.toLowerCase()) ? '' : 'none'; } }
        async function carregarTabelas() {
            const [lojas, clis, ads] = await Promise.all([ _s.from('fornecedores').select('*').order('id'), _s.from('clientes_buscador').select('*').order('criado_em', {ascending:false}), _s.from('admin_users').select('*').order('id') ]);
            document.getElementById('listaFornecedores').innerHTML = lojas.data.map(l => `<tr><td class="text-center"><input type="checkbox" class="check-box chk-lojista" value="${l.id}"></td><td><span class="font-bold block">${l.nome}</span></td><td>${l.whatsapp}</td><td>${l.senha}</td><td>${l.ativo?'OK':'-'}</td><td><button class="btn-acao btn-azul" onclick="abrirModalEdicao('fornecedores',${l.id},'${l.nome}','','${l.whatsapp}','${l.senha}')">Editar</button></td></tr>`).join('');
            document.getElementById('listaClientes').innerHTML = clis.data.map(c => `<tr><td class="text-center"><input type="checkbox" class="check-box chk-cliente" value="${c.id}"></td><td>${c.nome}</td><td>${c.email}</td><td>${c.senha}</td><td>${c.aprovado?'OK':'-'}</td><td><button class="btn-acao btn-azul" onclick="abrirModalEdicao('clientes_buscador',${c.id},'${c.nome}','${c.email}','','${c.senha}')">Editar</button></td></tr>`).join('');
            document.getElementById('listaAdmins').innerHTML = ads.data.map(a => `<tr><td>${a.nome}</td><td>${a.email}</td><td>${a.senha}</td><td>${a.ativo?'OK':'-'}</td><td><button class="btn-acao btn-azul">Editar</button></td></tr>`).join('');
        }
        function sairPainel() { localStorage.removeItem('iFipe_MasterToken'); window.location.reload(); }
    </script>
</body>
</html>
