<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Painel Master</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background:#000; color:#fff; font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin:0; }
        .nav-bar { background:rgba(28,28,30,0.8); backdrop-filter:blur(15px); border-bottom:1px solid #38383a; padding:15px 30px; position:sticky; top:0; z-index:100; }
        .apple-card { background: #1c1c1e; border: 1px solid #38383a; border-radius: 24px; padding: 2rem; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .apple-input { background: #2c2c2e; border: 1px solid #38383a; border-radius: 12px; padding: 14px; width: 100%; color: white; outline: none; margin-bottom: 1rem; font-size: 14px; }
        .apple-button { background: #fff; color: #000; font-weight: 900; border-radius: 50px; padding: 16px; width: 100%; cursor: pointer; text-transform: uppercase; border: none; font-size: 13px; transition: 0.3s; }
        .apple-button:hover { background: #0071e3; color: #fff; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th { font-size: 10px; color: #86868b; text-transform: uppercase; padding: 12px; text-align: left; border-bottom: 1px solid #38383a; letter-spacing: 0.1em; }
        td { padding: 14px 12px; border-bottom: 1px solid #2c2c2e; font-size: 13px; }
        
        .btn-acao { font-size: 10px; font-weight: bold; text-transform: uppercase; padding: 6px 12px; border-radius: 8px; cursor: pointer; transition: 0.3s; display: inline-block; margin-right: 5px; }
        .btn-verde { background: rgba(50, 215, 75, 0.2); color: #32d74b; }
        .btn-verde:hover { background: #32d74b; color: #000; }
        .btn-vermelho { background: rgba(255, 59, 48, 0.2); color: #ff3b30; }
        .btn-vermelho:hover { background: #ff3b30; color: #fff; }
        
        label { display: block; text-transform: uppercase; font-size: 10px; color: #86868b; margin-bottom: 6px; font-weight: 900; letter-spacing: 0.1em; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loginSection" class="flex items-center justify-center min-h-screen px-4">
        <div class="apple-card max-w-[400px] text-center w-full">
            <h1 class="text-5xl font-black italic mb-2">iFipe</h1>
            <p class="text-[10px] font-bold uppercase text-red-500 mb-8 tracking-[0.4em]">Painel Master</p>
            
            <form onsubmit="fazerLoginAdmin(event)">
                <label>E-mail Admin</label>
                <input type="email" id="adminEmail" class="apple-input" placeholder="admin@ifipe.com" required>
                <label>Senha Master</label>
                <input type="password" id="adminPass" class="apple-input" placeholder="••••••••" required>
                <button type="submit" class="apple-button w-full">Entrar no Comando</button>
            </form>
            <p id="loginMsg" class="mt-4 text-[10px] font-bold text-red-500 uppercase"></p>
        </div>
    </div>

    <div id="dashboardSection" class="hidden">
        <nav class="nav-bar flex justify-between items-center">
            <h1 class="text-2xl font-black italic">iFipe <span class="text-red-500 text-sm">MASTER</span></h1>
            <button onclick="sairPainel()" class="text-[10px] text-red-500 font-black uppercase tracking-widest">Sair</button>
        </nav>

        <div class="max-w-7xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <div class="apple-card overflow-x-auto">
                <h2 class="text-xl font-black italic mb-6">Aprovações de Clientes VIP</h2>
                <table>
                    <thead><tr><th>Nome</th><th>WhatsApp</th><th>Status</th><th>Ação</th></tr></thead>
                    <tbody id="listaClientes"></tbody>
                </table>
            </div>

            <div class="apple-card overflow-x-auto">
                <h2 class="text-xl font-black italic mb-6">Atacadistas / Lojistas</h2>
                <table>
                    <thead><tr><th>Loja</th><th>WhatsApp</th><th>Status</th><th>Ação</th></tr></thead>
                    <tbody id="listaFornecedores"></tbody>
                </table>
            </div>

        </div>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');

        window.onload = async () => {
            const token = localStorage.getItem('iFipe_MasterToken');
            if (token) {
                const { data } = await _s.from('admin_users').select('id').eq('id', token).maybeSingle();
                if(data) { liberarAcesso(); } else { localStorage.removeItem('iFipe_MasterToken'); }
            }
        };

        async function fazerLoginAdmin(event) {
            event.preventDefault(); // Trava contra loop de atualização
            
            // O .trim() mata espaços em branco invisíveis
            const e = document.getElementById('adminEmail').value.trim();
            const p = document.getElementById('adminPass').value.trim();
            const m = document.getElementById('loginMsg');
            
            m.innerText = "VERIFICANDO...";
            m.style.color = "#fff";
            
            // O .ilike ignora diferenças de maiúsculas e minúsculas
            const { data } = await _s.from('admin_users').select('*').ilike('email', e).eq('senha', p).maybeSingle();
            
            if(data && data.ativo) { 
                localStorage.setItem('iFipe_MasterToken', data.id); 
                liberarAcesso(); 
            } else { 
                m.innerText = "ACESSO NEGADO. VERIFIQUE OS DADOS."; 
                m.style.color = "#ff3b30";
            }
        }

        function liberarAcesso() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');
            carregarTabelas();
        }

        function sairPainel() { 
            localStorage.removeItem('iFipe_MasterToken'); 
            window.location.reload(); 
        }

        async function carregarTabelas() {
            const { data: clientes } = await _s.from('clientes_buscador').select('*').order('criado_em', {ascending: false});
            document.getElementById('listaClientes').innerHTML = clientes.map(c => `
                <tr>
                    <td><span class="font-bold">${c.nome}</span><br><span class="text-[10px] text-gray-500">${c.email}</span></td>
                    <td>${c.whatsapp}</td>
                    <td>${c.aprovado ? '<span class="text-green-500 font-bold">Aprovado</span>' : '<span class="text-yellow-500 font-bold">Pendente</span>'}</td>
                    <td>
                        ${!c.aprovado ? `<span class="btn-acao btn-verde" onclick="alterarStatusCliente(${c.id}, true)">Aprovar</span>` : `<span class="btn-acao btn-vermelho" onclick="alterarStatusCliente(${c.id}, false)">Bloquear</span>`}
                    </td>
                </tr>
            `).join('');

            const { data: lojas } = await _s.from('fornecedores').select('*').order('id', {ascending: true});
            document.getElementById('listaFornecedores').innerHTML = lojas.map(l => `
                <tr>
                    <td><span class="font-bold">${l.nome}</span></td>
                    <td>${l.whatsapp}</td>
                    <td>${l.ativo ? '<span class="text-green-500 font-bold">Ativo</span>' : '<span class="text-red-500 font-bold">Inativo</span>'}</td>
                    <td>
                        ${!l.ativo ? `<span class="btn-acao btn-verde" onclick="alterarStatusLojista(${l.id}, true)">Ativar</span>` : `<span class="btn-acao btn-vermelho" onclick="alterarStatusLojista(${l.id}, false)">Inativar</span>`}
                    </td>
                </tr>
            `).join('');
        }

        async function alterarStatusCliente(id, status) {
            await _s.from('clientes_buscador').update({ aprovado: status }).eq('id', id);
            carregarTabelas();
        }

        async function alterarStatusLojista(id, status) {
            await _s.from('fornecedores').update({ ativo: status }).eq('id', id);
            carregarTabelas();
        }
    </script>
</body>
</html>
