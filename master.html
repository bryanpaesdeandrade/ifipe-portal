<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe Master - Comando Central</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #38383a; --blue: #0071e3; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; }
        .tab-btn { padding: 10px 20px; font-weight: 800; border-bottom: 2px solid transparent; transition: 0.3s; font-size: 12px; text-transform: uppercase; }
        .tab-btn.active { border-color: var(--blue); color: var(--blue); }
        .master-table { width: 100%; border-collapse: collapse; font-size: 12px; }
        .master-table th { text-align: left; padding: 12px; border-bottom: 1px solid var(--border); color: #888; text-transform: uppercase; }
        .master-table td { padding: 12px; border-bottom: 1px solid #2c2c2e; }
        .action-btn { padding: 4px 8px; border-radius: 6px; font-weight: bold; font-size: 10px; }
    </style>
</head>
<body class="p-6">

    <header class="flex justify-between items-center mb-10">
        <h1 class="text-3xl font-black italic">iFipe <span class="text-blue-500">MASTER</span></h1>
        <div class="flex gap-4">
            <button onclick="tab('ofertas')" class="tab-btn active" id="btn-ofertas">Ofertas</button>
            <button onclick="tab('lojistas')" class="tab-btn" id="btn-lojistas">Lojistas</button>
            <button onclick="tab('clientes')" class="tab-btn" id="btn-clientes">Clientes</button>
            <button onclick="logout()" class="text-red-500 font-bold text-xs ml-8">SAIR</button>
        </div>
    </header>

    <div id="tab-ofertas" class="content-tab">
        <div class="bg-[#1c1c1e] rounded-2xl p-6 border border-[#38383a]">
            <table class="master-table">
                <thead>
                    <tr>
                        <th>Produto</th>
                        <th>Lojista</th>
                        <th>Preço</th>
                        <th>Data</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="lista-ofertas"></tbody>
            </table>
        </div>
    </div>

    <div id="tab-lojistas" class="content-tab hidden">
        <div class="bg-[#1c1c1e] rounded-2xl p-6 border border-[#38383a]">
            <table class="master-table">
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>WhatsApp</th>
                        <th>Status</th>
                        <th>Verificado</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="lista-lojistas"></tbody>
            </table>
        </div>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');

        async function init() {
            if(localStorage.getItem('iFipe_Role') !== 'master') window.location.href = 'index.html';
            loadOfertas();
            loadLojistas();
        }

        function tab(t) {
            document.querySelectorAll('.content-tab').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + t).classList.remove('hidden');
            document.getElementById('btn-' + t).classList.add('active');
        }

        async function loadOfertas() {
            const { data } = await _s.from('ofertas').select('*, fornecedores(nome), variacoes(produtos_mestre(nome), capacidade, cor)').order('created_at', {ascending:false});
            document.getElementById('lista-ofertas').innerHTML = data.map(o => `
                <tr>
                    <td><b>${o.variacoes.produtos_mestre.nome}</b><br><span class="text-gray-500">${o.variacoes.capacidade} | ${o.variacoes.cor}</span></td>
                    <td>${o.fornecedores.nome}</td>
                    <td class="font-mono text-green-400">${o.moeda} ${o.preco}</td>
                    <td>${new Date(o.criado_em).toLocaleDateString()}</td>
                    <td><button onclick="deleteOferta(${o.id})" class="text-red-500 hover:underline">Apagar</button></td>
                </tr>
            `).join('');
        }

        async function loadLojistas() {
            const { data } = await _s.from('fornecedores').select('*').order('nome');
            document.getElementById('lista-lojistas').innerHTML = data.map(l => `
                <tr>
                    <td>${l.nome}</td>
                    <td>${l.whatsapp}</td>
                    <td><span class="${l.ativo ? 'text-green-500' : 'text-red-500'}">${l.ativo ? 'ATIVO' : 'BLOQUEADO'}</span></td>
                    <td>${l.verificado ? '✅' : '❌'}</td>
                    <td class="flex gap-2">
                        <button onclick="toggleForn(${l.id}, 'ativo', ${l.ativo})" class="bg-gray-800 action-btn">${l.ativo ? 'Bloquear' : 'Ativar'}</button>
                        <button onclick="toggleForn(${l.id}, 'verificado', ${l.verificado})" class="bg-blue-900 action-btn">Selo ✅</button>
                    </td>
                </tr>
            `).join('');
        }

        async function deleteOferta(id) { if(confirm("Apagar?")) { await _s.from('ofertas').delete().eq('id', id); loadOfertas(); } }
        
        async function toggleForn(id, campo, valor) {
            let obj = {}; obj[campo] = !valor;
            await _s.from('fornecedores').update(obj).eq('id', id);
            loadLojistas();
        }

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
        window.onload = init;
    </script>
</body>
</html>
