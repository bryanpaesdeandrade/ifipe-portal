<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #38383a; --input: #2c2c2e; --red: #ff3b30; }
        body { background: var(--bg); color: var(--text); font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin:0; padding-bottom: 50px; scroll-behavior: smooth; }
        .user-bar { background:rgba(28, 28, 30, 0.9); backdrop-filter:blur(15px); border-bottom:1px solid var(--border); padding:15px 20px; position:sticky; top:0; z-index:100; display:flex; justify-content:space-between; align-items:center; }
        .apple-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 1.5rem; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .apple-input { background: var(--input); border: 1px solid var(--border); border-radius: 10px; padding: 10px; width: 100%; color: var(--text); outline: none; font-size: 11px; transition: 0.3s; font-weight: bold; }
        .apple-input:focus { border-color: var(--red); }
        .apple-button { background: var(--red); color: #fff; font-weight: 900; border-radius: 50px; padding: 12px 20px; cursor: pointer; text-transform: uppercase; border: none; font-size: 11px; transition: 0.3s; display:inline-block; text-align:center; }
        
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { font-size: 9px; color: #86868b; text-transform: uppercase; padding: 10px; text-align: left; border-bottom: 1px solid var(--border); }
        td { padding: 12px 10px; border-bottom: 1px solid var(--input); font-size: 11px; vertical-align: middle; }
        
        /* MOLDURAS COMPLETAS */
        .m-badge { font-size: 7px; font-weight: 900; padding: 2px 5px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.05); color: #444; margin-right: 3px; display: inline-block; }
        .m-badge.on { color: #32d74b; border-color: #32d74b; background: rgba(50,215,75,0.1); }

        .btn-acao { font-weight: 900; cursor: pointer; font-size: 8px; text-transform: uppercase; padding: 5px 10px; border-radius: 6px; display: inline-block; transition: 0.2s; }
        .btn-edit { background: rgba(0, 113, 227, 0.2); color: #0071e3; border: 1px solid rgba(0, 113, 227, 0.5); }
        .btn-del { background: rgba(255, 59, 48, 0.2); color: var(--red); border: 1px solid rgba(255, 59, 48, 0.5); }

        .insignia-tag { display: inline-flex; align-items: center; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; font-size: 8px; font-weight: 900; padding: 3px 8px; border-radius: 6px; margin-right: 5px; margin-bottom: 5px; }
        .remove-selo { margin-left: 6px; cursor: pointer; color: var(--red); font-size: 11px; }

        #btnScrollTop { position: fixed; bottom: 30px; right: 30px; background: var(--red); color: #fff; width: 45px; height: 45px; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; z-index: 1000; box-shadow: 0 5px 15px rgba(255,59,48,0.4); }

        details { background: var(--input); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; overflow: hidden; }
        summary { background: #232325; padding: 15px 20px; font-weight: 900; cursor: pointer; display: flex; justify-content: space-between; align-items: center; outline: none; }
        
        .tab-btn { background: #1c1c1e; border: 1px solid #38383a; color: #86868b; padding: 12px 10px; font-weight: 900; text-transform: uppercase; font-size: 10px; cursor: pointer; flex: 1; text-align: center; border-radius: 10px; }
        .tab-btn.active { background: rgba(255, 59, 48, 0.1); border-color: var(--red); color: var(--red); }
        
        /* BOTOES NOVO / SEMINOVO */
        .btn-tipo { background: #2c2c2e; border: 2px solid #38383a; color: #fff; padding: 12px; border-radius: 15px; font-weight: 900; font-size: 11px; cursor: pointer; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 8px; margin: 5px; }
        .btn-tipo.active { background: rgba(255, 59, 48, 0.1); border-color: var(--red); color: var(--red); }
        
        .mini-edit { background: transparent; border: 1px solid transparent; color: #32d74b; font-weight: 800; width: 90px; border-radius: 6px; padding: 4px; text-align: center; }
        .mini-edit:focus { border-color: #0071e3; background: #2c2c2e; outline: none; }
        
        .hidden { display: none !important; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--red); border-radius: 10px; }
    </style>
</head>

        window.onscroll = () => { document.getElementById('btnScrollTop').style.display = window.scrollY > 300 ? 'flex' : 'none'; };
        window.onload = () => { if(localStorage.getItem('iFipe_Master_Auth') === 'true') liberarDashboard(); };

        async function realizarLoginMaster(e) { e.preventDefault(); const { data } = await _s.from('clientes_buscador').select('*').eq('email', document.getElementById('logEmailMaster').value).eq('senha', document.getElementById('logPassMaster').value).maybeSingle(); if (data?.is_master) { localStorage.setItem('iFipe_Master_Auth', 'true'); liberarDashboard(); } else alert("Acesso Negado."); }
        function sairMaster() { localStorage.removeItem('iFipe_Master_Auth'); window.location.reload(); }

        function mudarAba(abaId) {
            ['abaAnuncios', 'abaLojistas', 'abaClientes', 'abaPostar', 'abaStaff'].forEach(id => document.getElementById(id).classList.add('hidden'));
            ['btnTabAnuncios', 'btnTabLojistas', 'btnTabClientes', 'btnTabPostar', 'btnTabStaff'].forEach(id => document.getElementById(id).classList.remove('active'));
            document.getElementById(`aba${abaId.charAt(0).toUpperCase() + abaId.slice(1)}`).classList.remove('hidden');
            document.getElementById(`btnTab${abaId.charAt(0).toUpperCase() + abaId.slice(1)}`).classList.add('active');
            if(abaId === 'anuncios') carregarAnunciosGlobais();
            if(abaId === 'lojistas') carregarLojistas();
            if(abaId === 'clientes') carregarClientes();
            if(abaId === 'staff') carregarStaff();
        }

        async function checkManutencao() { const {data} = await _s.from('configuracoes').select('manutencao').eq('id', 1).single(); if(data) { modoManutencao = data.manutencao; atualizarBotaoManutencao(); } }
        function atualizarBotaoManutencao() { const btn = document.getElementById('btnManutencaoToggle'); btn.className = `px-4 py-1.5 rounded-full text-[10px] font-black uppercase ${modoManutencao ? 'bg-red-600 text-white' : 'bg-green-600 text-white'}`; btn.innerText = modoManutencao ? '🚧 FECHADO' : '🌍 ONLINE'; }
        async function toggleManutencao() { const n = !modoManutencao; await _s.from('configuracoes').update({manutencao: n}).eq('id', 1); modoManutencao = n; atualizarBotaoManutencao(); }

        function liberarDashboard() { document.getElementById('authSection').classList.add('hidden'); document.getElementById('dashboardSection').classList.remove('hidden'); checkManutencao(); carregarBasePostagem(); mudarAba('anuncios'); }

        // SELOS
        function renderTags(id, tabela, lista) {
            if(!lista || lista.length === 0) return `<button onclick="abrirModalSelo(${id}, '${tabela}')" class="btn-add-selo">+ SELO APPLE</button>`;
            return `<div class="flex flex-wrap">${lista.map(s => `<span class="insignia-tag">${s}<b class="remove-selo" onclick="removerSelo(${id}, '${tabela}', '${s}')">×</b></span>`).join('')}<button onclick="abrirModalSelo(${id}, '${tabela}')" class="btn-add-selo">+</button></div>`;
        }
        function abrirModalSelo(id, tabela) {
            seloAlvoId = id; seloAlvoTabela = tabela;
            const div = document.getElementById('listaBotoesSelos');
            const lista = (tabela === 'fornecedores') ? SELOS_LOJISTA : SELOS_BUSCADOR;
            div.innerHTML = lista.map(s => `<button onclick="adicionarSelo('${s}')" class="apple-input hover:bg-red-500 py-3 text-[10px] font-black">${s}</button>`).join('');
            document.getElementById('modalSelo').classList.remove('hidden');
        }
        async function adicionarSelo(nomeSelo) {
            const { data } = await _s.from(seloAlvoTabela).select('insignia_manual').eq('id', seloAlvoId).single();
            let lista = data.insignia_manual || [];
            if(!lista.includes(nomeSelo)) { lista.push(nomeSelo); await _s.from(seloAlvoTabela).update({ insignia_manual: lista }).eq('id', seloAlvoId); }
            document.getElementById('modalSelo').classList.add('hidden');
            seloAlvoTabela === 'fornecedores' ? carregarLojistas() : carregarClientes();
        }
        async function removerSelo(id, tabela, nomeSelo) {
            const { data } = await _s.from(tabela).select('insignia_manual').eq('id', id).single();
            let lista = (data.insignia_manual || []).filter(s => s !== nomeSelo);
            await _s.from(tabela).update({ insignia_manual: lista }).eq('id', id);
            tabela === 'fornecedores' ? carregarLojistas() : carregarClientes();
        }

        // TABELAS
        async function carregarLojistas() {
            const { data } = await _s.from('fornecedores').select('*').order('nome');
            document.getElementById('tabelaLojistas').innerHTML = data.map(l => `
                <tr class="loja-row" data-name="${l.nome.toUpperCase()}">
                    <td><input type="checkbox" class="loja-check" value="${l.id}"></td>
                    <td><span class="font-black text-white uppercase">${l.nome} ${l.verificado?'✔️':''}</span></td>
                    <td class="font-mono text-yellow-400 text-[9px]">${l.senha}</td>
                    <td>${l.cidade}</td>
                    <td>${renderTags(l.id, 'fornecedores', l.insignia_manual)}</td>
                    <td class="text-right flex justify-end gap-1">
                        <button onclick="toggleUser('fornecedores', ${l.id}, ${!l.ativo}, 'ativo')" class="btn-acao ${l.ativo?'btn-del':'btn-approve'}">${l.ativo?'Bloq':'Ativ'}</button>
                        <button onclick="masterDeleteUser('fornecedores', ${l.id})" class="btn-acao btn-del">X</button>
                    </td>
                </tr>`).join('');
        }
        async function carregarClientes() {
            const { data } = await _s.from('clientes_buscador').select('*').eq('is_master', false).order('nome');
            document.getElementById('tabelaClientes').innerHTML = data.map(c => `
                <tr class="cliente-row" data-name="${c.nome.toUpperCase()}">
                    <td><input type="checkbox" class="cliente-check" value="${c.id}"></td>
                    <td><span class="font-black text-white uppercase">${c.nome}</span></td>
                    <td class="font-mono text-yellow-400 text-[9px]">${c.senha}</td>
                    <td>${c.logins_count} L</td>
                    <td>${renderTags(c.id, 'clientes_buscador', c.insignia_manual)}</td>
                    <td class="text-right flex justify-end gap-1">
                        <button onclick="toggleUser('clientes_buscador', ${c.id}, ${!c.aprovado}, 'aprovado')" class="btn-acao ${c.aprovado?'btn-del':'btn-approve'}">${c.aprovado?'Bloq':'Ativ'}</button>
                        <button onclick="masterDeleteUser('clientes_buscador', ${c.id})" class="btn-acao btn-del">X</button>
                    </td>
                </tr>`).join('');
        }
        function filtrarUsuarios(t) {
            const s = document.getElementById(t==='lojista'?'searchLojista':'searchCliente').value.toUpperCase();
            document.querySelectorAll(t==='lojista'?'.loja-row':'.cliente-row').forEach(r => r.style.display = r.getAttribute('data-name').includes(s) ? '' : 'none');
        }
        async function toggleUser(tab, id, v, c) { await _s.from(tab).update({ [c]: v }).eq('id', id); tab==='fornecedores'?carregarLojistas():carregarClientes(); }
        async function masterDeleteUser(tab, id) { if(confirm("Apagar permanente?")) { await _s.from(tab).delete().eq('id', id); tab==='fornecedores'?carregarLojistas():carregarClientes(); } }

        // MASSA USUÁRIO
        function abrirMasterBulkEditUsers(tab) {
            const sel = document.querySelectorAll(tab==='fornecedores'?'.loja-check:checked':'.cliente-check:checked');
            if(!sel.length) return alert("Selecione os usuários!");
            document.getElementById('ub_tabela').value = tab;
            document.getElementById('userBulkEditModal').classList.remove('hidden');
        }
        async function salvarUserBulkChanges(e) {
            e.preventDefault(); const tab = document.getElementById('ub_tabela').value;
            const ids = Array.from(document.querySelectorAll(tab==='fornecedores'?'.loja-check:checked':'.cliente-check:checked')).map(c => parseInt(c.value));
            let up = {}; if(document.getElementById('ub_senha').value) up.senha = document.getElementById('ub_senha').value;
            if(document.getElementById('ub_status').value) up[tab==='fornecedores'?'ativo':'aprovado'] = document.getElementById('ub_status').value === "true";
            if(Object.keys(up).length) await _s.from(tab).update(up).in('id', ids);
            document.getElementById('userBulkEditModal').classList.add('hidden');
            tab==='fornecedores'?carregarLojistas():carregarClientes();
        }
        function toggleAllUsers(cName, v) { document.querySelectorAll('.'+cName).forEach(c => c.checked = v); }

        // ANÚNCIOS
        async function carregarAnunciosGlobais() { const { data } = await _s.from('ofertas').select('*, fornecedores(nome), variacoes(*, produtos_mestre(*)), regioes(nome)').order('criado_em', {ascending: false}); ofertasGlobais = data || []; renderizarAnuncios(); }
        function renderizarAnuncios() {
            const container = document.getElementById('listaMasterGlobal'); container.innerHTML = '';
            const grupos = {}; ofertasGlobais.forEach(o => { const n = o.fornecedores?.nome || 'Sem Loja'; if(!grupos[n]) grupos[n] = []; grupos[n].push(o); });
            for (let loja in grupos) {
                let linhas = grupos[loja].map(o => {
                    let m = `<span class="m-badge ${o.aceita_pix?'on':''}">PIX</span><span class="m-badge ${o.aceita_usdt?'on':''}">USDT</span><span class="m-badge ${o.emite_nota?'on':''}">NF</span><span class="m-badge ${o.aceita_proposta?'on':''}">LOTE</span><span class="m-badge ${o.faz_envio?'on':''}">ENVIO</span><span class="m-badge ${o.aceita_coleta?'on':''}">COLETA</span><span class="m-badge ${o.tem_boy?'on':''}">MOTO</span>`;
                    return `<tr><td><input type="checkbox" class="master-offer-check" value="${o.id}" onchange="updateMasterBulkCount()"></td><td><span class="font-black text-white">${o.variacoes?.produtos_mestre?.nome}</span><br><span class="text-[9px] text-gray-500">${o.variacoes?.capacidade} | ${o.variacoes?.cor} | ${o.condicao}</span><br>${m}</td><td class="text-center"><input type="number" class="mini-edit" value="${o.quantidade}" onblur="salvarRapido(${o.id}, 'quantidade', this.value)"></td><td class="text-center"><input type="text" class="mini-edit" value="${o.preco.toLocaleString('pt-BR')}" onblur="salvarRapido(${o.id}, 'preco', this.value)"></td><td class="text-right flex justify-end gap-1"><button onclick="abrirEdicaoIndividual(${o.id})" class="btn-edit btn-acao">Editar</button><button onclick="masterDeleteIndividual(${o.id})" class="btn-del btn-acao">X</button></td></tr>`;
                }).join('');
                container.innerHTML += `<details><summary>${loja.toUpperCase()} (${grupos[loja].length} PROD)</summary><div class="details-content"><table><tbody>${linhas}</tbody></table></div></details>`;
            }
        }
        async function masterDeleteIndividual(id) { if(confirm("Apagar anúncio?")) { await _s.from('ofertas').delete().eq('id', id); carregarAnunciosGlobais(); } }
        async function salvarRapido(id, campo, valor) { let v = (campo==='preco')?parsePreco(valor):parseInt(valor); await _s.from('ofertas').update({[campo]: v, data_alteracao_preco: new Date().toISOString()}).eq('id', id); carregarAnunciosGlobais(); }

        // EDIÇÃO INDIVIDUAL COMPLETA
        async function abrirEdicaoIndividual(id) {
            const { data: o } = await _s.from('ofertas').select('*').eq('id', id).single();
            document.getElementById('e_id').value = o.id; document.getElementById('e_preco').value = o.preco.toLocaleString('pt-BR'); document.getElementById('e_moeda').value = o.moeda; document.getElementById('e_qtd').value = o.quantidade; document.getElementById('e_cond').value = o.condicao; document.getElementById('e_bat').value = o.saude_bateria; document.getElementById('e_gar').value = o.garantia; document.getElementById('e_aprov').value = o.status_aprovacao;
            document.getElementById('e_pix').checked = o.aceita_pix; document.getElementById('e_usdt').checked = o.aceita_usdt; document.getElementById('e_nota').checked = o.emite_nota; document.getElementById('e_prop').checked = o.aceita_proposta; document.getElementById('e_env').checked = o.faz_envio; document.getElementById('e_col').checked = o.aceita_coleta; document.getElementById('e_boy').checked = o.tem_boy;
            document.getElementById('masterEditModal').classList.remove('hidden');
        }
        async function salvarEdicaoCompleta(e) {
            e.preventDefault(); const id = document.getElementById('e_id').value;
            await _s.from('ofertas').update({ preco: parsePreco(document.getElementById('e_preco').value), moeda: document.getElementById('e_moeda').value, quantidade: parseInt(document.getElementById('e_qtd').value), condicao: document.getElementById('e_cond').value, saude_bateria: document.getElementById('e_bat').value, garantia: document.getElementById('e_gar').value, status_aprovacao: document.getElementById('e_aprov').value, aceita_pix: document.getElementById('e_pix').checked, aceita_usdt: document.getElementById('e_usdt').checked, emite_nota: document.getElementById('e_nota').checked, aceita_proposta: document.getElementById('e_prop').checked, faz_envio: document.getElementById('e_env').checked, aceita_coleta: document.getElementById('e_col').checked, tem_boy: document.getElementById('e_boy').checked, data_alteracao_preco: new Date().toISOString() }).eq('id', id);
            document.getElementById('masterEditModal').classList.add('hidden'); carregarAnunciosGlobais();
        }

        // CONCIERGE (WIZARD)
        async function carregarBasePostagem() {
            const [p, r, v, f] = await Promise.all([ _s.from('produtos_mestre').select('*').order('nome'), _s.from('regioes').select('*').order('id'), _s.from('variacoes').select('*'), _s.from('fornecedores').select('id, nome').order('nome') ]);
            produtosMestre = p.data; gradeVariacoes = v.data;
            document.getElementById('m_regiao').innerHTML = r.data.map(x => `<option value="${x.id}">${x.nome}</option>`).join('');
            document.getElementById('mb_regiao').innerHTML = '<option value="">Manter Origem...</option>' + r.data.map(x => `<option value="${x.id}">${x.nome}</option>`).join('');
            document.getElementById('master_dono_id').innerHTML = '<option value="" disabled selected>Selecionar Atacadista...</option>' + f.data.map(loja => `<option value="${loja.id}">${loja.nome.toUpperCase()}</option>`).join('');
        }
        function masterSelecionarTipo(t) { document.getElementById('master_tipo_selecionado').value = t; document.getElementById('btnMasterTipoNovo').classList.toggle('active', t==='Novo'); document.getElementById('btnMasterTipoSemi').classList.toggle('active', t==='Seminovo'); document.getElementById('m_zona_seminovo').classList.toggle('hidden', t==='Novo'); document.getElementById('m_filtro_grupo').disabled = false; document.getElementById('m_filtro_grupo').value = "1"; masterLiberarModelos(); }
        function masterLiberarModelos() { const f = produtosMestre.filter(x => x.grupo_id == document.getElementById('m_filtro_grupo').value); document.getElementById('m_produto_id').innerHTML = '<option value="" selected disabled>Modelo...</option>' + f.map(x => `<option value="${x.id}">${x.nome}</option>`).join(''); document.getElementById('m_produto_id').disabled = false; }
        function masterLiberarMemorias() { const pid = document.getElementById('m_produto_id').value; const v = gradeVariacoes.filter(x => x.produto_id == pid); const caps = [...new Set(v.map(x => x.capacidade))]; document.getElementById('m_cap').innerHTML = '<option value="" selected disabled>Memória...</option>' + caps.map(c => `<option value="${c}">${c}</option>`).join(''); document.getElementById('m_cap').disabled = false; }
        function masterLiberarCores() { const pid = document.getElementById('m_produto_id').value; const cap = document.getElementById('m_cap').value; const v = gradeVariacoes.filter(x => x.produto_id == pid && x.capacidade == cap); document.getElementById('m_cor').innerHTML = '<option value="" selected disabled>Cor...</option>' + v.map(x => `<option value="${x.cor}">${getEmojiForColor(x.cor)} ${x.cor}</option>`).join(''); document.getElementById('m_cor').disabled = false; }
        function masterLiberarDetalhes() { document.getElementById('m_zona_detalhes').classList.remove('hidden'); }
        async function masterSalvarOferta(e) {
            e.preventDefault(); const t = document.getElementById('master_tipo_selecionado').value; const pBrl = parsePreco(document.getElementById('m_preco_brl').value); const pUsd = parsePreco(document.getElementById('m_preco_usd').value); const pid = document.getElementById('m_produto_id').value; const cap = document.getElementById('m_cap').value; const cor = document.getElementById('m_cor').value; let v = gradeVariacoes.find(x => x.produto_id == pid && x.capacidade == cap && x.cor == cor);
            await _s.from('ofertas').insert([{ fornecedor_id: document.getElementById('master_dono_id').value, variacao_id: v.id, regiao_id: document.getElementById('m_regiao').value, preco: pBrl || pUsd, moeda: pBrl > 0 ? 'BRL' : 'USD', quantidade: parseInt(document.getElementById('m_qtd').value), condicao: t==='Novo'?'Novo':document.getElementById('m_condicao_semi').value, garantia: t==='Novo'?'1 ANO':document.getElementById('m_garantia_semi').value, status_aprovacao: 'aprovado', data_alteracao_preco: new Date().toISOString(), aceita_pix: document.getElementById('m_pix').checked, aceita_usdt: document.getElementById('m_usdt').checked, emite_nota: document.getElementById('m_nota').checked, aceita_proposta: document.getElementById('m_prop').checked, faz_envio: document.getElementById('m_env').checked, aceita_coleta: document.getElementById('m_col').checked, tem_boy: document.getElementById('m_boy').checked, saude_bateria: t==='Novo'?'BATERIA EM 100%':document.getElementById('m_bateria').value }]);
            alert("Sucesso!"); mudarAba('anuncios');
        }

        function parsePreco(v) { return v ? parseFloat(v.toString().replace(/\./g, '').replace(',', '.')) : 0; }
        function mascararMoeda(input) { let v = input.value.replace(/\D/g, ''); if (!v) { input.value = ''; return; } v = (parseFloat(v) / 100).toFixed(2).replace('.', ','); input.value = v.replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
        function abrirCriarUsuario(t) { document.getElementById('c_tipo_user').value = t; document.getElementById('zona_lojista').classList.toggle('hidden', t!=='lojista'); document.getElementById('zona_cliente_staff').classList.toggle('hidden', t==='lojista'); document.getElementById('modalCriarUser').classList.remove('hidden'); }
        function fecharCriarUsuario() { document.getElementById('modalCriarUser').classList.add('hidden'); }
        async function salvarNovoUsuario(e) { e.preventDefault(); const t = document.getElementById('c_tipo_user').value; const base = { nome: document.getElementById('c_nome_user').value, senha: document.getElementById('c_senha_user').value }; if(t==='lojista') await _s.from('fornecedores').insert([{...base, pais: document.getElementById('c_pais_user').value, ativo:true}]); else await _s.from('clientes_buscador').insert([{...base, email: document.getElementById('c_email_user').value, is_master: t==='staff', aprovado: true}]); fecharCriarUsuario(); mudarAba(t==='staff'?'staff':'lojistas'); }
        function updateMasterBulkCount() { document.getElementById('masterBulkCount').innerText = document.querySelectorAll('.master-offer-check:checked').length; }
        function fecharMasterBulkEdit() { document.getElementById('masterBulkEditModal').classList.add('hidden'); }
        async function abrirMasterBulkEdit() { if(!document.querySelectorAll('.master-offer-check:checked').length) return alert("Selecione!"); document.getElementById('masterBulkEditModal').classList.remove('hidden'); }
        async function salvarMasterBulkChanges(e) {
            e.preventDefault(); const ids = Array.from(document.querySelectorAll('.master-offer-check:checked')).map(c => parseInt(c.value)); let up = {};
            if(parsePreco(document.getElementById('mb_preco').value) > 0) up.preco = parsePreco(document.getElementById('mb_preco').value);
            if(document.getElementById('mb_qtd').value) up.quantidade = parseInt(document.getElementById('mb_qtd').value);
            if(document.getElementById('mb_regiao').value) up.regiao_id = document.getElementById('mb_regiao').value;
            if(document.getElementById('mb_aprov').value) up.status_aprovacao = document.getElementById('mb_aprov').value;
            if(document.getElementById('mb_cond').value) up.condicao = document.getElementById('mb_cond').value;
            if(document.getElementById('mb_pix_v').checked) up.aceita_pix=true; if(document.getElementById('mb_usdt_v').checked) up.aceita_usdt=true; if(document.getElementById('mb_nota_v').checked) up.emite_nota=true; if(document.getElementById('mb_prop_v').checked) up.aceita_proposta=true;
            if(Object.keys(up).length) await _s.from('ofertas').update(up).in('id', ids);
            fecharMasterBulkEdit(); carregarAnunciosGlobais(); alert("Atualizado!");
        }
        async function masterBulkDelete() { const ids = Array.from(document.querySelectorAll('.master-offer-check:checked')).map(c => parseInt(c.value)); if(ids.length && confirm("Apagar?")) { await _s.from('ofertas').delete().in('id', ids); carregarAnunciosGlobais(); } }
        function carregarStaff() { _s.from('clientes_buscador').select('*').eq('is_master', true).then(({data}) => document.getElementById('tabelaStaff').innerHTML = data.map(s => `<tr><td>${s.nome}</td><td>${s.email}</td><td>${s.senha}</td><td class="text-right"><button onclick="masterDeleteUser('clientes_buscador', ${s.id})" class="btn-acao btn-del">X</button></td></tr>`).join('')); }
    </script>
</body>
</html>
