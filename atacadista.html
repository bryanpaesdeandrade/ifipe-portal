<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Painel do Anunciante</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #38383a; --input: #2c2c2e; }
        body.light-mode { --bg: #f5f5f7; --card: #fff; --text: #1d1d1f; --border: #d2d2d7; --input: #e8e8ed; }
        body { background: var(--bg); color: var(--text); font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin:0; transition: 0.3s; }
        .user-bar { background:rgba(28, 28, 30, 0.8); backdrop-filter:blur(15px); border-bottom:1px solid var(--border); padding:15px 20px; position:sticky; top:0; z-index:100; }
        .apple-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 2rem; width: 100%; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .apple-input { background: var(--input); border: 1px solid var(--border); border-radius: 12px; padding: 14px; width: 100%; color: var(--text); outline: none; margin-bottom: 1rem; font-size: 14px; transition: 0.3s; }
        .apple-input:focus { border-color: #0071e3; }
        .apple-button { background: #fff; color: #000; font-weight: 900; border-radius: 50px; padding: 16px; width: 100%; cursor: pointer; text-transform: uppercase; border: none; font-size: 13px; transition: 0.3s; }
        .apple-button:hover { background: #0071e3; color: #fff; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th { font-size: 10px; color: #86868b; text-transform: uppercase; padding: 12px; text-align: left; border-bottom: 1px solid var(--border); letter-spacing: 0.1em; }
        td { padding: 14px 12px; border-bottom: 1px solid var(--input); font-size: 13px; }
        label { display: block; text-transform: uppercase; font-size: 10px; color: #86868b; margin-bottom: 6px; font-weight: 900; letter-spacing: 0.1em; }
        .battery-grid { display: grid; grid-template-cols: 1fr 1fr; gap: 8px; margin-bottom: 15px;}
        .battery-pill { padding: 10px; border-radius: 10px; background: var(--input); border: 1px solid var(--border); cursor: pointer; font-size: 9px; font-weight: 900; text-transform: uppercase; text-align: center; color: #86868b; transition: 0.2s; }
        .battery-pill.active { background: #32d74b !important; color: #000 !important; border-color: #32d74b !important; }
        .pill-full { grid-column: span 2; }
        .mini-input { background: var(--input); border: 1px solid var(--border); border-radius: 8px; padding: 6px; width: 85px; color: var(--text); text-align: center; font-weight: bold; font-family: 'JetBrains Mono', monospace; }
        .btn-acao { font-weight: bold; cursor: pointer; font-size: 10px; text-transform: uppercase; padding: 6px 10px; border-radius: 6px; display: inline-block; }
        .btn-edit { background: rgba(0, 113, 227, 0.2); color: #0071e3; }
        .hidden { display: none !important; }
        .check-box { accent-color: #0071e3; width: 18px; height: 18px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="formSection">
        <div class="user-bar">
            <div class="max-w-7xl mx-auto flex justify-between items-center w-full">
                <div class="text-[11px] font-black uppercase">Loja: <span id="nomeLoja" class="text-blue-500">...</span></div>
                <button onclick="sairPainel()" class="text-[10px] text-red-500 font-black">SAIR</button>
            </div>
        </div>

        <div class="max-w-7xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="apple-card">
                    <h2 class="text-xl font-black italic mb-6">Novo Registro</h2>
                    <form id="priceForm" onsubmit="salvarOferta(event)">
                        <label>Categoria</label>
                        <select id="filtro_grupo" class="apple-input" onchange="popularProdutos()">
                            <option value="">Selecione...</option>
                            <option value="1">IPHONE</option><option value="2">APPLE WATCH</option><option value="3">IPAD</option>
                            <option value="4">MACBOOK</option><option value="5">IMAC</option><option value="6">ACESSÓRIOS APPLE</option>
                            <option value="7">XIAOMI</option><option value="8">REALME</option>
                        </select>

                        <label>Modelo</label>
                        <select id="produto_id" class="apple-input" onchange="aoMudarProduto()" required>
                            <option value="">Aguardando categoria...</option>
                        </select>
                        <div id="gradeOpcoes" class="mb-4"></div>

                        <div class="grid grid-cols-2 gap-4">
                            <div><label>Condição</label><select id="condicao" class="apple-input" onchange="checarCondicao()"><option value="Novo">Novo</option><option value="Seminovo">Seminovo</option></select></div>
                            <div><label>Estoque Inicial</label><input type="number" id="quantidade" class="apple-input" value="1" min="0" required></div>
                        </div>

                        <div id="boxBateria" class="hidden mb-4">
                            <label class="text-green-500 font-black">Saúde da Bateria</label>
                            <div class="battery-grid">
                                <div class="battery-pill b-new" data-val="BATERIA ABAIXO DE 85%" onclick="setBat('BATERIA ABAIXO DE 85%')">ABAIXO DE 85%</div>
                                <div class="battery-pill b-new" data-val="BATERIA ACIMA DE 85%" onclick="setBat('BATERIA ACIMA DE 85%')">ACIMA DE 85%</div>
                                <div class="battery-pill b-new" data-val="BATERIA ACIMA DE 90%" onclick="setBat('BATERIA ACIMA DE 90%')">ACIMA DE 90%</div>
                                <div class="battery-pill b-new" data-val="BATERIA ACIMA DE 95%" onclick="setBat('BATERIA ACIMA DE 95%')">ACIMA DE 95%</div>
                                <div class="battery-pill b-new pill-full" data-val="BATERIA EM 100%" onclick="setBat('BATERIA EM 100%')">BATERIA EM 100%</div>
                            </div>
                            <input type="hidden" id="saude_bateria">
                        </div>

                        <label>Origem</label><select id="regiao_id" class="apple-input" required></select>

                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="preco_brl" class="apple-input" placeholder="R$" oninput="limparPreco('brl')">
                            <input type="text" id="preco_usd" class="apple-input" placeholder="$" oninput="limparPreco('usd')">
                        </div>

                        <div class="mt-4 p-4 border border-[#38383a] rounded-xl bg-[#2c2c2e]">
                            <label class="text-blue-400">Molduras</label>
                            <div class="grid grid-cols-2 gap-2 text-[8px] font-black">
                                <label class="flex items-center gap-1"><input type="checkbox" id="obs_coleta" class="check-box"> COLETA</label>
                                <label class="flex items-center gap-1"><input type="checkbox" id="obs_boy" class="check-box"> MOTOBOY</label>
                                <label class="flex items-center gap-1"><input type="checkbox" id="obs_usdt" class="check-box"> USDT</label>
                                <label class="flex items-center gap-1"><input type="checkbox" id="obs_pix" class="check-box"> PIX</label>
                                <label class="flex items-center gap-1"><input type="checkbox" id="obs_nota" class="check-box"> NF</label>
                                <label class="flex items-center gap-1"><input type="checkbox" id="obs_proposta" class="check-box"> NEGOCIA QTD</label>
                            </div>
                        </div>
                        <button type="submit" class="apple-button w-full bg-blue-600 text-white mt-6">Adicionar à Minha Base</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="apple-card">
                    <h2 class="text-xl font-black italic mb-6">Minha Base de Estoque</h2>
                    <div class="overflow-x-auto">
                        <table>
                            <thead><tr><th>Produto / Variação</th><th>Qtd (Estoque)</th><th>Preço</th><th>Ações</th></tr></thead>
                            <tbody id="listaAtivos"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let loja = null; let produtosMestre = []; let gradeVariacoes = []; let anunciosDaLoja = [];

        window.onload = async () => {
            const token = localStorage.getItem('iFipe_Anunciante');
            if (token) {
                const { data } = await _s.from('fornecedores').select('*').eq('id', token).maybeSingle();
                if(data?.ativo) { loja = data; document.getElementById('nomeLoja').innerText = loja.nome; init(); }
            }
        };

        async function init() {
            const [p, r, v] = await Promise.all([ _s.from('produtos_mestre').select('*').order('nome'), _s.from('regioes').select('*').order('nome'), _s.from('variacoes').select('*') ]);
            produtosMestre = p.data; gradeVariacoes = v.data;
            document.getElementById('regiao_id').innerHTML = '<option value="">Origem...</option>' + r.data.map(x => `<option value="${x.id}">${x.bandeira} ${x.nome}</option>`).join('');
            atualizarLista();
        }

        function popularProdutos() {
            const grupoId = document.getElementById('filtro_grupo').value;
            const filtrados = produtosMestre.filter(x => x.grupo_id == grupoId);
            document.getElementById('produto_id').innerHTML = '<option value="">Selecione o Modelo...</option>' + filtrados.map(x => `<option value="${x.id}">${x.nome}</option>`).join('');
        }

        function aoMudarProduto() {
            const pid = document.getElementById('produto_id').value;
            const container = document.getElementById('gradeOpcoes');
            const vars = gradeVariacoes.filter(x => x.produto_id == pid);
            const tams = [...new Set(vars.map(x => x.tamanho).filter(Boolean))]; 
            const caps = [...new Set(vars.map(x => x.capacidade).filter(Boolean))]; 
            const cores = [...new Set(vars.map(x => x.cor).filter(Boolean))];
            let html = '<div class="grid grid-cols-1 gap-2 mt-4">';
            if(tams.length) html += `<label>Tamanho</label><select id="f_tam" class="apple-input" required>${tams.map(c => `<option value="${c}">${c}</option>`).join('')}</select>`;
            if(caps.length) html += `<label>GB</label><select id="f_cap" class="apple-input" required>${caps.map(c => `<option value="${c}">${c}</option>`).join('')}</select>`;
            if(cores.length) html += `<label>Cor</label><select id="f_cor" class="apple-input" required>${cores.map(c => `<option value="${c}">${c}</option>`).join('')}</select>`;
            container.innerHTML = html + '</div>';
        }

        async function atualizarLista() {
            const { data } = await _s.from('ofertas').select('*, variacoes(*, produtos_mestre(*))').eq('fornecedor_id', loja.id).order('criado_em', {ascending: false});
            anunciosDaLoja = data;
            document.getElementById('listaAtivos').innerHTML = data.map(o => `
                <tr>
                    <td><b>${o.variacoes.produtos_mestre.nome}</b><br><small class="text-gray-500">${[o.variacoes.tamanho, o.variacoes.capacidade, o.variacoes.cor].filter(Boolean).join(' | ')}</small></td>
                    <td><input type="number" class="mini-input" value="${o.quantidade}" onchange="salvarEdicaoRapida(${o.id}, this.value, null)"></td>
                    <td><input type="text" class="mini-input" value="${o.preco.toLocaleString('pt-BR')}" onchange="salvarEdicaoRapida(${o.id}, null, this.value)"></td>
                    <td><span class="btn-acao btn-edit" onclick="abrirModalEdicao(${o.id})">EDITAR</span></td>
                </tr>
            `).join('');
        }

        async function salvarEdicaoRapida(id, qtd, preco) {
            let updates = {};
            if(qtd !== null) updates.quantidade = qtd;
            if(preco !== null) updates.preco = parseFloat(preco.replace(/\./g, '').replace(',', '.'));
            await _s.from('ofertas').update(updates).eq('id', id);
            alert("Salvo!"); atualizarLista();
        }

        async function salvarOferta(e) {
            e.preventDefault();
            const pid = document.getElementById('produto_id').value;
            const tam = document.getElementById('f_tam')?.value || null; 
            const cap = document.getElementById('f_cap')?.value || null; 
            const cor = document.getElementById('f_cor')?.value || null;
            const v = gradeVariacoes.find(x => x.produto_id == pid && (x.tamanho === tam || !tam) && (x.capacidade === cap || !cap) && (x.cor === cor || !cor));
            
            const valBrl = document.getElementById('preco_brl').value.trim(); 
            const valUsd = document.getElementById('preco_usd').value.trim();
            let pNovo = valBrl ? parseFloat(valBrl.replace(/\./g, '').replace(',', '.')) : parseFloat(valUsd.replace(/\./g, '').replace(',', '.'));
            let moeda = valBrl ? 'BRL' : 'USD';

            await _s.from('ofertas').insert([{
                fornecedor_id: loja.id, variacao_id: v.id, regiao_id: document.getElementById('regiao_id').value,
                preco: pNovo, moeda: moeda, quantidade: document.getElementById('quantidade').value,
                condicao: document.getElementById('condicao').value, saude_bateria: document.getElementById('saude_bateria').value || null,
                aceita_coleta: document.getElementById('obs_coleta').checked, tem_boy: document.getElementById('obs_boy').checked, aceita_usdt: document.getElementById('obs_usdt').checked, emite_nota: document.getElementById('obs_nota').checked, aceita_proposta: document.getElementById('obs_proposta').checked, aceita_pix: document.getElementById('obs_pix').checked
            }]);
            alert("Adicionado!"); atualizarLista();
        }

        function setBat(v) { document.getElementById('saude_bateria').value = v; document.querySelectorAll('.b-new').forEach(p => p.classList.toggle('active', p.getAttribute('data-val') === v)); }
        function checarCondicao() { document.getElementById('boxBateria').classList.toggle('hidden', document.getElementById('condicao').value === 'Novo'); }
        function limparPreco(t) { if(t==='brl')document.getElementById('preco_usd').value=''; else document.getElementById('preco_brl').value=''; }
        function sairPainel() { localStorage.removeItem('iFipe_Anunciante'); window.location.reload(); }
    </script>
</body>
</html>
