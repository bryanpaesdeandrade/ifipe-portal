<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Painel do Anunciante</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #38383a; --input: #2c2c2e; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; }
        .apple-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 2rem; width: 100%; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .apple-input { background: var(--input); border: 1px solid var(--border); border-radius: 12px; padding: 14px; width: 100%; color: #fff; outline: none; margin-bottom: 1rem; }
        .apple-button { background: #fff; color: #000; font-weight: 900; border-radius: 50px; padding: 16px; width: 100%; cursor: pointer; text-transform: uppercase; border: none; }
        .user-bar { background: rgba(28, 28, 30, 0.8); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; }
        .hidden { display: none !important; }
        table { width: 100%; border-collapse: collapse; }
        td, th { padding: 12px; border-bottom: 1px solid var(--border); text-align: left; font-size: 13px; }
    </style>
</head>
<body>

    <div id="loginSection" class="flex items-center justify-center min-h-screen px-4">
        <div class="apple-card max-w-[400px] text-center">
            <h1 class="text-4xl font-black italic mb-6">iFipe Login</h1>
            <form onsubmit="fazerLogin(event)">
                <input type="text" id="loginId" class="apple-input" placeholder="Nome da Loja" required>
                <input type="password" id="loginPass" class="apple-input" placeholder="Sua Senha" required>
                <button type="submit" id="btnEntrar" class="apple-button">Entrar</button>
            </form>
            <p id="loginMsg" class="mt-4 text-red-500 font-bold uppercase text-[10px]"></p>
        </div>
    </div>

    <div id="panelSection" class="hidden">
        <div class="user-bar">
            <span class="font-black uppercase text-[11px]">Loja: <span id="nomeLoja" class="text-blue-500"></span></span>
            <button onclick="sair()" class="text-red-500 font-black uppercase text-[10px]">Sair</button>
        </div>
        <div class="max-w-7xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="apple-card">
                    <h2 class="text-xl font-black mb-4">Novo Anúncio</h2>
                    <form onsubmit="publicar(event)">
                        <select id="p_id" class="apple-input" onchange="carregarGrade()" required></select>
                        <div id="grade"></div>
                        <select id="cond" class="apple-input"><option value="Novo">Novo</option><option value="Seminovo">Seminovo</option></select>
                        <input type="number" id="qtd" class="apple-input" placeholder="Quantidade" required>
                        <input type="text" id="prc" class="apple-input" placeholder="Preço (Ex: 5500.00)" required>
                        <select id="reg" class="apple-input" required></select>
                        <button type="submit" class="apple-button bg-blue-600 text-white">Publicar</button>
                    </form>
                </div>
            </div>
            <div class="lg:col-span-2">
                <div class="apple-card">
                    <h2 class="text-xl font-black mb-4">Seus Ativos</h2>
                    <div class="overflow-x-auto">
                        <table>
                            <thead><tr><th>Produto</th><th>Qtd</th><th>Preço</th><th>Ação</th></tr></thead>
                            <tbody id="lista"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let lojaID = null; let vars = [];

        window.onload = async () => {
            const id = localStorage.getItem('iFipe_Anunciante');
            if(id) { 
                const { data } = await _s.from('fornecedores').select('id, nome').eq('id', id).single();
                if(data) { lojaID = data.id; document.getElementById('nomeLoja').innerText = data.nome; abrirPainel(); }
            }
        };

        async function fazerLogin(e) {
            e.preventDefault();
            const n = document.getElementById('loginId').value;
            const s = document.getElementById('loginPass').value;
            const { data } = await _s.from('fornecedores').select('*').ilike('nome', n).eq('senha', s).maybeSingle();
            if(data) { localStorage.setItem('iFipe_Anunciante', data.id); location.reload(); }
            else { document.getElementById('loginMsg').innerText = "Erro: Loja ou Senha incorretos."; }
        }

        async function abrirPainel() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('panelSection').classList.remove('hidden');
            const [p, r, v] = await Promise.all([_s.from('produtos_mestre').select('*').order('nome'), _s.from('regioes').select('*'), _s.from('variacoes').select('*')]);
            vars = v.data;
            document.getElementById('p_id').innerHTML = '<option value="">Aparelho...</option>' + p.data.map(x => `<option value="${x.id}">${x.nome}</option>`).join('');
            document.getElementById('reg').innerHTML = '<option value="">Região...</option>' + r.data.map(x => `<option value="${x.id}">${x.bandeira} ${x.nome}</option>`).join('');
            atualizarLista();
        }

        function carregarGrade() {
            const pid = document.getElementById('p_id').value;
            const f = vars.filter(x => x.produto_id == pid);
            const c = [...new Set(f.map(x => x.capacidade))];
            const cr = [...new Set(f.map(x => x.cor))];
            document.getElementById('grade').innerHTML = `
                <select id="v_cap" class="apple-input">${c.map(x => `<option value="${x}">${x}</option>`).join('')}</select>
                <select id="v_cor" class="apple-input">${cr.map(x => `<option value="${x}">${x}</option>`).join('')}</select>
            `;
        }

        async function atualizarLista() {
            const { data } = await _s.from('ofertas').select('*, variacoes(capacidade, cor, produtos_mestre(nome))').eq('fornecedor_id', lojaID).order('criado_em', {ascending:false});
            document.getElementById('lista').innerHTML = data.map(o => `<tr><td>${o.variacoes.produtos_mestre.nome} (${o.variacoes.capacidade})</td><td>${o.quantidade}</td><td>R$ ${o.preco}</td><td><button onclick="del(${o.id})" class="text-red-500">X</button></td></tr>`).join('');
        }

        async function publicar(e) {
            e.preventDefault();
            const v = vars.find(x => x.produto_id == document.getElementById('p_id').value && x.capacidade == document.getElementById('v_cap').value && x.cor == document.getElementById('v_cor').value);
            await _s.from('ofertas').insert([{ fornecedor_id: lojaID, variacao_id: v.id, regiao_id: document.getElementById('reg').value, preco: parseFloat(document.getElementById('prc').value), quantidade: document.getElementById('qtd').value, condicao: document.getElementById('cond').value }]);
            atualizarLista(); e.target.reset();
        }

        async function del(id) { if(confirm("Apagar?")) { await _s.from('ofertas').delete().eq('id', id); atualizarLista(); } }
        function sair() { localStorage.removeItem('iFipe_Anunciante'); location.reload(); }
    </script>
</body>
</html>
