<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Buscador VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #38383a; --blue: #0071e3; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; }
        .apple-input { background: #1c1c1e; border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: #fff; width: 100%; outline: none; text-align: center; }
        .btn-main { background: var(--blue); color: #fff; font-weight: 900; border-radius: 12px; padding: 14px; width: 100%; cursor: pointer; border: none; text-transform: uppercase; }
        .product-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="authSection" class="min-h-screen flex items-center justify-center p-4">
        <div class="w-full max-w-[350px] text-center">
            <h1 class="text-4xl font-black italic mb-2">iFipe</h1>
            <p class="text-[10px] text-zinc-500 mb-8 tracking-widest font-bold uppercase">Buscador VIP 1.0</p>
            
            <div class="space-y-3">
                <input type="text" id="user" class="apple-input" placeholder="WHATSAPP OU EMAIL">
                <input type="password" id="pass" class="apple-input" placeholder="SENHA">
                <button onclick="handleLogin()" class="btn-main">Entrar no Sistema</button>
                <p id="msg" class="text-[10px] font-bold text-red-500 mt-2 h-4"></p>
            </div>
        </div>
    </div>

    <div id="appSection" class="hidden">
        <nav class="p-6 border-b border-zinc-800 flex justify-between items-center">
            <h1 class="text-xl font-black italic">iFipe</h1>
            <button onclick="logout()" class="text-red-500 text-[10px] font-black uppercase">Sair</button>
        </nav>
        
        <main class="max-w-6xl mx-auto p-6">
            <div class="mb-8">
                <input type="text" id="search" class="apple-input !text-left px-6 py-4 text-lg" placeholder="Qual iPhone você busca?" oninput="renderData()">
            </div>
            <div id="grid" class="grid grid-cols-1 md:grid-cols-3 gap-4"></div>
        </main>
    </div>

<script>
    const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
    let dbOfertas = [];

    async function handleLogin() {
        const u = document.getElementById('user').value.trim().toLowerCase();
        const p = document.getElementById('pass').value;
        const msg = document.getElementById('msg');
        msg.innerText = "VERIFICANDO...";

        // 1. TENTA LOGIN ATACADISTA
        const { data: ata } = await _s.from('fornecedores').select('id, ativo').or(`email.eq.${u},whatsapp.eq.${u}`).eq('senha', p).maybeSingle();
        if (ata) {
            localStorage.setItem('iFipe_Anunciante', ata.id);
            window.location.replace('atacadista.html');
            return;
        }

        // 2. TENTA LOGIN CLIENTE
        const { data: cli } = await _s.from('clientes_buscador').select('id, ativo').or(`email.eq.${u},whatsapp.eq.${u}`).eq('senha', p).maybeSingle();
        if (cli) {
            localStorage.setItem('iFipe_Token', cli.id);
            startApp();
            return;
        }
        msg.innerText = "ACESSO NEGADO.";
    }

    async function startApp() {
        document.getElementById('authSection').classList.add('hidden');
        document.getElementById('appSection').classList.remove('hidden');
        const { data } = await _s.from('ofertas').select('*, fornecedores(nome), variacoes(capacidade, cor, produtos_mestre(nome))').gt('quantidade', 0);
        dbOfertas = data || [];
        renderData();
    }

    function renderData() {
        const term = document.getElementById('search').value.toLowerCase();
        const filtered = dbOfertas.filter(o => 
            o.variacoes.produtos_mestre.nome.toLowerCase().includes(term) || 
            o.fornecedores.nome.toLowerCase().includes(term)
        );

        document.getElementById('grid').innerHTML = filtered.map(o => `
            <div class="product-card">
                <h3 class="font-black">${o.variacoes.produtos_mestre.nome}</h3>
                <p class="text-[10px] text-zinc-400 uppercase">${o.variacoes.capacidade} | ${o.variacoes.cor}</p>
                <div class="mt-4 flex justify-between items-end">
                    <span class="text-zinc-500 text-[9px] font-bold">${o.fornecedores.nome}</span>
                    <span class="text-xl font-black text-blue-500">R$ ${o.preco.toLocaleString('pt-BR')}</span>
                </div>
            </div>
        `).join('');
    }

    function logout() { localStorage.clear(); window.location.reload(); }

    window.onload = () => { if(localStorage.getItem('iFipe_Token')) startApp(); };
</script>
</body>
</html>
