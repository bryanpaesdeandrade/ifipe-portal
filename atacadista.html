<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Painel do Anunciante</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #38383a; --input: #2c2c2e; }
        body.light-mode { --bg: #f5f5f7; --card: #fff; --text: #1d1d1f; --border: #d2d2d7; --input: #e8e8ed; }
        body { background: var(--bg); color: var(--text); font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin:0; transition: 0.3s; }
        
        .user-bar { background:rgba(28, 28, 30, 0.8); backdrop-filter:blur(15px); border-bottom:1px solid var(--border); padding:15px 20px; position:sticky; top:0; z-index:100; }
        .apple-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 2rem; width: 100%; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .apple-input { background: var(--input); border: 1px solid var(--border); border-radius: 12px; padding: 14px; width: 100%; color: var(--text); outline: none; margin-bottom: 1rem; font-size: 14px; transition: 0.3s; }
        .apple-input:focus { border-color: #0071e3; }
        .apple-button { background: #fff; color: #000; font-weight: 900; border-radius: 50px; padding: 16px; width: 100%; cursor: pointer; text-transform: uppercase; border: none; font-size: 13px; transition: 0.3s; }
        .apple-button:hover { background: #0071e3; color: #fff; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th { font-size: 10px; color: #86868b; text-transform: uppercase; padding: 12px; text-align: left; border-bottom: 1px solid var(--border); letter-spacing: 0.1em; }
        td { padding: 14px 12px; border-bottom: 1px solid var(--input); font-size: 13px; }
        
        .mini-input { background: var(--input); border: 1px solid var(--border); border-radius: 8px; padding: 6px; width: 80px; color: var(--text); text-align: center; font-weight: bold; }
        .btn-acao { font-weight: bold; cursor: pointer; font-size: 10px; text-transform: uppercase; padding: 6px 10px; border-radius: 6px; display: inline-block; margin-bottom: 4px; }
        .btn-edit { background: rgba(0, 113, 227, 0.2); color: #0071e3; }
        .btn-del { background: rgba(255, 59, 48, 0.2); color: #ff3b30; }
        
        label { display: block; text-transform: uppercase; font-size: 10px; color: #86868b; margin-bottom: 6px; font-weight: 900; letter-spacing: 0.1em; }
        .hidden { display: none !important; }
        
        .battery-grid { display: grid; grid-template-cols: 1fr 1fr; gap: 8px; margin-bottom: 15px;}
        .battery-pill { padding: 12px 10px; border-radius: 10px; background: var(--input); border: 1px solid var(--border); cursor: pointer; font-size: 10px; font-weight: 900; text-transform: uppercase; text-align: center; transition: 0.2s; color: #86868b; display: flex; align-items: center; justify-content: center; line-height: 1.2;}
        .battery-pill.active { background: #32d74b !important; color: #000 !important; border-color: #32d74b !important; box-shadow: 0 0 15px rgba(50, 215, 75, 0.3); }
        .pill-full { grid-column: span 2; }
        .check-box { accent-color: #0071e3; width: 18px; height: 18px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="bulkEditModal" class="hidden fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-[200] px-4">
        <div class="apple-card w-full max-w-[600px] max-h-[90vh] overflow-y-auto relative">
            <button onclick="fecharBulkModal()" class="absolute top-4 right-5 text-gray-500 hover:text-white font-bold text-2xl">×</button>
            <h3 class="font-bold text-[14px] text-blue-500 mb-2 uppercase tracking-widest">Ações em Massa</h3>
            <p class="text-[10px] text-gray-400 font-bold mb-6 uppercase">Alterando <span id="bulkCount" class="text-white">0</span> anúncios.</p>
            <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6">
                <div><label>💠 PIX</label><select id="bulk_pix" class="apple-input"><option value="">Não alterar</option><option value="true">Ativar</option><option value="false">Remover</option></select></div>
                <div><label>Coleta</label><select id="bulk_coleta" class="apple-input"><option value="">Não alterar</option><option value="true">Ativar</option><option value="false">Remover</option></select></div>
                <div><label>Motoboy</label><select id="bulk_boy" class="apple-input"><option value="">Não alterar</option><option value="true">Ativar</option><option value="false">Remover</option></select></div>
                <div><label class="text-[#32d74b]">USDT</label><select id="bulk_usdt" class="apple-input"><option value="">Não alterar</option><option value="true">Ativar</option><option value="false">Remover</option></select></div>
                <div><label>Nota Fiscal</label><select id="bulk_nota" class="apple-input"><option value="">Não alterar</option><option value="true">Ativar</option><option value="false">Remover</option></select></div>
                <div><label>🤝 Lote</label><select id="bulk_proposta" class="apple-input"><option value="">Não alterar</option><option value="true">Ativar</option><option value="false">Remover</option></select></div>
            </div>
            <button type="button" onclick="salvarBulkEdit()" class="apple-button w-full bg-blue-600 text-white">Aplicar Alterações</button>
        </div>
    </div>

    <div id="editModal" class="hidden fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-[200] px-4">
        <div class="apple-card w-full max-w-[500px]">
            <h3 class="font-bold text-[14px] text-blue-500 mb-2 uppercase tracking-widest">Editar Anúncio</h3>
            <p id="edit_titulo" class="text-[12px] text-gray-400 font-bold mb-6 uppercase"></p>
            <form onsubmit="salvarEdicaoCompleta(event)">
                <input type="hidden" id="edit_id">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label>Condição</label>
                        <select id="edit_condicao" class="apple-input" onchange="checarCondicaoEdicao()">
                            <option value="Novo">Novo</option><option value="Seminovo">Seminovo</option>
                        </select>
                    </div>
                    <div><label>Estoque</label><input type="number" id="edit_quantidade" class="apple-input" required></div>
                </div>
                <div id="edit_boxBateria" class="hidden">
                    <label class="text-green-500">Saúde da Bateria</label>
                    <div class="battery-grid">
                        <div class="battery-pill b-edit" data-val="BATERIA ABAIXO DE 85%" onclick="setBatEdicao('BATERIA ABAIXO DE 85%')">< 85%</div>
                        <div class="battery-pill b-edit" data-val="BATERIA ACIMA DE 85%" onclick="setBatEdicao('BATERIA ACIMA DE 85%')">> 85%</div>
                        <div class="battery-pill b-edit" data-val="BATERIA ACIMA DE 90%" onclick="setBatEdicao('BATERIA ACIMA DE 90%')">> 90%</div>
                        <div class="battery-pill b-edit" data-val="BATERIA ACIMA DE 95%" onclick="setBatEdicao('BATERIA ACIMA DE 95%')">> 95%</div>
                        <div class="battery-pill b-edit pill-full" data-val="BATERIA EM 100%" onclick="setBatEdicao('BATERIA EM 100%')">100%</div>
                    </div>
                    <input type="hidden" id="edit_saude_bateria">
                </div>
                <div class="grid grid-cols-2 gap-4 mt-2">
                    <input type="text" id="edit_preco_brl" class="apple-input" placeholder="Preço R$" oninput="limparPrecoEdit('brl')">
                    <input type="text" id="edit_preco_usd" class="apple-input" placeholder="Preço $" oninput="limparPrecoEdit('usd')">
                </div>
                <div class="flex gap-2">
                    <button type="button" onclick="fecharModalEdicao()" class="apple-button bg-gray-600 text-white w-1/3">Cancelar</button>
                    <button type="submit" class="apple-button bg-blue-600 text-white w-2/3">Salvar Alterações</button>
                </div>
            </form>
        </div>
    </div>

    <div id="loginSection" class="hidden flex items-center justify-center min-h-screen px-4">
        <div class="apple-card max-w-[400px] text-center w-full">
            <h1 class="text-5xl font-black italic mb-2">iFipe</h1>
            <p class="text-[10px] font-bold uppercase text-blue-500 mb-8 tracking-[0.4em]">Painel do Anunciante</p>
            <form id="loginForm" onsubmit="fazerLogin(event)">
                <input type="text" id="loginId" class="apple-input" placeholder="Nome da sua Loja" required>
                <input type="password" id="loginPass" class="apple-input" placeholder="Senha" required>
                <button type="submit" class="apple-button w-full">Entrar</button>
                <span class="block text-[#0071e3] cursor-pointer text-[10px] font-black uppercase mt-5" onclick="toggleForm()">Solicitar Cadastro</span>
            </form>
            <form id="registerForm" class="hidden" onsubmit="solicitarCadastro(event)">
                <input type="text" id="regNome" class="apple-input" placeholder="NOME DA LOJA" required>
                <input type="text" id="regWhats" class="apple-input" placeholder="WHATSAPP" required>
                <input type="password" id="regPass" class="apple-input" placeholder="CRIAR SENHA" required>
                <button type="submit" class="apple-button w-full bg-[#2c2c2e] text-white">Enviar Solicitação</button>
                <span class="block text-gray-500 cursor-pointer text-[10px] uppercase mt-5" onclick="toggleForm()">Voltar ao Login</span>
            </form>
        </div>
    </div>

    <div id="formSection" class="hidden">
        <div class="user-bar">
            <div class="max-w-7xl mx-auto flex justify-between items-center w-full">
                <div class="text-[11px] font-black uppercase tracking-widest">Loja: <span id="nomeLoja" class="text-blue-500">...</span></div>
                <button onclick="sairPainel()" class="text-[10px] text-red-500 font-black uppercase">Sair</button>
            </div>
        </div>

        <div class="max-w-7xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="apple-card">
                    <h2 class="text-xl font-black italic mb-6">Novo Anúncio</h2>
                    <form id="priceForm" onsubmit="salvarOferta(event)">
                        
                        <label>Categoria</label>
                        <select id="filtro_grupo" class="apple-input" onchange="popularProdutos()">
                            <option value="">Selecione...</option>
                            <option value="1">IPHONE</option>
                            <option value="2">APPLE WATCH</option>
                            <option value="3">IPAD</option>
                            <option value="4">MACBOOK</option>
                            <option value="5">IMAC</option>
                            <option value="6">ACESSÓRIOS APPLE</option>
                            <option value="7">XIAOMI</option>
                            <option value="8">REALME</option>
                        </select>

                        <label>Modelo do Aparelho</label>
                        <select id="produto_id" class="apple-input" onchange="aoMudarProduto()" required>
                            <option value="">Aguardando categoria...</option>
                        </select>
                        
                        <div id="gradeOpcoes" class="mb-4"></div>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label>Condição</label>
                                <select id="condicao" class="apple-input" onchange="checarCondicao()">
                                    <option value="Novo">Novo</option><option value="Seminovo">Seminovo</option>
                                </select>
                            </div>
                            <div><label>Estoque</label><input type="number" id="quantidade" class="apple-input" value="1" min="0" required></div>
                        </div>

                        <div id="boxBateria" class="hidden mb-4">
                            <label class="text-green-500 font-black">Saúde da Bateria</label>
                            <div class="battery-grid">
                                <div class="battery-pill b-new" data-val="BATERIA ABAIXO DE 85%" onclick="setBat('BATERIA ABAIXO DE 85%')">< 85%</div>
                                <div class="battery-pill b-new" data-val="BATERIA ACIMA DE 85%" onclick="setBat('BATERIA ACIMA DE 85%')">> 85%</div>
                                <div class="battery-pill b-new" data-val="BATERIA ACIMA DE 90%" onclick="setBat('BATERIA ACIMA DE 90%')">> 90%</div>
                                <div class="battery-pill b-new" data-val="BATERIA ACIMA DE 95%" onclick="setBat('BATERIA ACIMA DE 95%')">> 95%</div>
                                <div class="battery-pill b-new pill-full" data-val="BATERIA EM 100%" onclick="setBat('BATERIA EM 100%')">Bateria 100%</div>
                            </div>
                            <input type="hidden" id="saude_bateria">
                        </div>

                        <label>Região / Origem</label>
                        <select id="regiao_id" class="apple-input" required></select>

                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="preco_brl" class="apple-input" placeholder="Preço R$" oninput="limparPreco('brl')">
                            <input type="text" id="preco_usd" class="apple-input" placeholder="Preço $" oninput="limparPreco('usd')">
                        </div>

                        <div class="mt-4 p-4 border border-[#38383a] rounded-xl bg-[#2c2c2e]">
                            <label class="text-blue-400 font-black">Molduras e Tags de Serviço</label>
                            <div class="grid grid-cols-3 gap-2 text-[8px] font-black">
                                <label class="flex items-center gap-1 cursor-pointer"><input type="checkbox" id="obs_coleta" class="check-box"> COLETA</label>
                                <label class="flex items-center gap-1 cursor-pointer"><input type="checkbox" id="obs_boy" class="check-box"> MOTOBOY</label>
                                <label class="flex items-center gap-1 cursor-pointer"><input type="checkbox" id="obs_usdt" class="check-box"> USDT</label>
                                <label class="flex items-center gap-1 cursor-pointer"><input type="checkbox" id="obs_pix" class="check-box"> PIX</label>
                                <label class="flex items-center gap-1 cursor-pointer"><input type="checkbox" id="obs_nota" class="check-box"> NF</label>
                                <label class="flex items-center gap-1 cursor-pointer"><input type="checkbox" id="obs_proposta" class="check-box"> LOTE</label>
                            </div>
                        </div>

                        <button type="submit" class="apple-button w-full bg-blue-600 text-white mt-6">Publicar Anúncio</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="apple-card">
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-xl font-black italic">Meus Anúncios</h2>
                        <button onclick="abrirBulkModal()" class="text-[10px] bg-blue-600 px-5 py-2 rounded-full font-black hover:bg-blue-500 transition-all">🛠️ Ações em Massa</button>
                    </div>
                    <div class="overflow-x-auto">
                        <table>
                            <thead><tr><th>Sel</th><th>Produto</th><th>Condição</th><th>Estoque</th><th>Preço</th><th>Ações</th></tr></thead>
                            <tbody id="listaAtivos"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let loja = null; let produtosMestre = []; let gradeVariacoes = []; let anunciosDaLoja = [];

        window.onload = async () => {
            const token = localStorage.getItem('iFipe_Anunciante');
            if (token) {
                const { data } = await _s.from('fornecedores').select('*').eq('id', token).maybeSingle();
                if(data && data.ativo) { loja = data; liberarAcesso(); } 
                else { localStorage.removeItem('iFipe_Anunciante'); document.getElementById('loginSection').classList.remove('hidden'); }
            } else { document.getElementById('loginSection').classList.remove('hidden'); }
        };

        function liberarAcesso() { 
            document.getElementById('loginSection').classList.add('hidden'); 
            document.getElementById('formSection').classList.remove('hidden'); 
            document.getElementById('nomeLoja').innerText = loja.nome; 
            init(); 
        }

        async function init() {
            const [p, r, v] = await Promise.all([ 
                _s.from('produtos_mestre').select('*').order('nome'), 
                _s.from('regioes').select('*').order('nome'),
                _s.from('variacoes').select('*') 
            ]);
            produtosMestre = p.data;
            gradeVariacoes = v.data;
            document.getElementById('regiao_id').innerHTML = '<option value="">Origem...</option>' + r.data.map(x => `<option value="${x.id}">${x.bandeira} ${x.nome}</option>`).join('');
            atualizarLista();
        }

        function popularProdutos() {
            const grupoId = document.getElementById('filtro_grupo').value;
            const filtrados = produtosMestre.filter(x => x.grupo_id == grupoId);
            document.getElementById('produto_id').innerHTML = '<option value="">Selecione o Modelo...</option>' + filtrados.map(x => `<option value="${x.id}">${x.nome}</option>`).join('');
        }

        function aoMudarProduto() {
            const pid = document.getElementById('produto_id').value;
            const container = document.getElementById('gradeOpcoes');
            const vars = gradeVariacoes.filter(x => x.produto_id == pid);
            const tams = [...new Set(vars.map(x => x.tamanho).filter(Boolean))]; 
            const caps = [...new Set(vars.map(x => x.capacidade).filter(Boolean))]; 
            const cores = [...new Set(vars.map(x => x.cor).filter(Boolean))];
            let html = '<div class="grid grid-cols-1 gap-2 mt-4">';
            if(tams.length) html += `<label>Tamanho</label><select id="f_tam" class="apple-input" required>${tams.map(c => `<option value="${c}">${c}</option>`).join('')}</select>`;
            if(caps.length) html += `<label>Armazenamento</label><select id="f_cap" class="apple-input" required>${caps.map(c => `<option value="${c}">${c}</option>`).join('')}</select>`;
            if(cores.length) html += `<label>Cor</label><select id="f_cor" class="apple-input" required>${cores.map(c => `<option value="${c}">${c}</option>`).join('')}</select>`;
            container.innerHTML = html + '</div>';
        }

        async function salvarOferta(e) {
            e.preventDefault();
            const pid = document.getElementById('produto_id').value;
            const tam = document.getElementById('f_tam')?.value || null; 
            const cap = document.getElementById('f_cap')?.value || null; 
            const cor = document.getElementById('f_cor')?.value || null;
            const v = gradeVariacoes.find(x => x.produto_id == pid && (x.tamanho === tam || !tam) && (x.capacidade === cap || !cap) && (x.cor === cor || !cor));
            
            const valBrl = document.getElementById('preco_brl').value.trim(); 
            const valUsd = document.getElementById('preco_usd').value.trim();
            let pNovo = valBrl ? parseFloat(valBrl.replace(/\./g, '').replace(',', '.')) : parseFloat(valUsd.replace(/\./g, '').replace(',', '.'));
            let moeda = valBrl ? 'BRL' : 'USD';

            const { error } = await _s.from('ofertas').insert([{
                fornecedor_id: loja.id, variacao_id: v.id, regiao_id: document.getElementById('regiao_id').value,
                preco: pNovo, moeda: moeda, quantidade: document.getElementById('quantidade').value,
                condicao: document.getElementById('condicao').value, saude_bateria: document.getElementById('saude_bateria').value || null,
                aceita_coleta: document.getElementById('obs_coleta').checked, tem_boy: document.getElementById('obs_boy').checked, aceita_usdt: document.getElementById('obs_usdt').checked, emite_nota: document.getElementById('obs_nota').checked, aceita_proposta: document.getElementById('obs_proposta').checked, aceita_pix: document.getElementById('obs_pix').checked
            }]);
            if(!error) { alert("Publicado com sucesso!"); atualizarLista(); e.target.reset(); }
        }

        async function atualizarLista() {
            const { data } = await _s.from('ofertas').select('*, variacoes(*, produtos_mestre(*))').eq('fornecedor_id', loja.id).order('criado_em', {ascending: false});
            anunciosDaLoja = data;
            document.getElementById('listaAtivos').innerHTML = data.map(o => `
                <tr>
                    <td><input type="checkbox" class="chk-anuncio" value="${o.id}"></td>
                    <td><b>${o.variacoes.produtos_mestre.nome}</b><br><small class="text-gray-500">${[o.variacoes.tamanho, o.variacoes.capacidade, o.variacoes.cor].filter(Boolean).join(' | ')}</small></td>
                    <td>${o.condicao} ${o.saude_bateria ? '<br><small class="text-green-500">🔋'+o.saude_bateria.replace('BATERIA ','')+'</small>' : ''}</td>
                    <td>${o.quantidade}</td>
                    <td class="font-bold">${o.moeda === 'USD' ? '$' : 'R$'} ${o.preco.toLocaleString('pt-BR')}</td>
                    <td><span class="btn-acao btn-edit" onclick="abrirModalEdicao(${o.id})">Editar</span></td>
                </tr>
            `).join('');
        }

        // FUNÇÕES DE INTERFACE (RECUPERADAS)
        function setBat(val) { document.getElementById('saude_bateria').value = val; document.querySelectorAll('.b-new').forEach(p => p.classList.toggle('active', p.getAttribute('data-val') === val)); }
        function setBatEdicao(val) { document.getElementById('edit_saude_bateria').value = val; document.querySelectorAll('.b-edit').forEach(p => p.classList.toggle('active', p.getAttribute('data-val') === val)); }
        function checarCondicao() { const cond = document.getElementById('condicao').value; document.getElementById('boxBateria').classList.toggle('hidden', cond === 'Novo'); }
        function checarCondicaoEdicao() { const cond = document.getElementById('edit_condicao').value; document.getElementById('edit_boxBateria').classList.toggle('hidden', cond === 'Novo'); }
        function limparPreco(t) { if(t==='brl')document.getElementById('preco_usd').value=''; else document.getElementById('preco_brl').value=''; }
        function limparPrecoEdit(t) { if(t==='brl')document.getElementById('edit_preco_usd').value=''; else document.getElementById('edit_preco_brl').value=''; }

        function abrirBulkModal() {
            const ids = Array.from(document.querySelectorAll('.chk-anuncio:checked')).map(c => c.value);
            if(!ids.length) return alert("Selecione itens na tabela.");
            document.getElementById('bulkCount').innerText = ids.length;
            document.getElementById('bulkEditModal').classList.remove('hidden');
        }
        function fecharBulkModal() { document.getElementById('bulkEditModal').classList.add('hidden'); }
        async function salvarBulkEdit() {
            const ids = Array.from(document.querySelectorAll('.chk-anuncio:checked')).map(c => c.value);
            let up = {};
            const fields = [['pix','aceita_pix'],['coleta','aceita_coleta'],['boy','tem_boy'],['usdt','aceita_usdt'],['nota','emite_nota'],['proposta','aceita_proposta']];
            fields.forEach(f => { let v = document.getElementById('bulk_'+f[0]).value; if(v!=="") up[f[1]] = v === "true"; });
            await _s.from('ofertas').update(up).in('id', ids);
            fecharBulkModal(); atualizarLista(); alert("Atualizado com sucesso!");
        }

        function abrirModalEdicao(id) {
            const o = anunciosDaLoja.find(x => x.id == id);
            document.getElementById('edit_id').value = o.id;
            document.getElementById('edit_titulo').innerText = o.variacoes.produtos_mestre.nome;
            document.getElementById('edit_quantidade').value = o.quantidade;
            document.getElementById('edit_condicao').value = o.condicao;
            if(o.moeda==='BRL') document.getElementById('edit_preco_brl').value = o.preco.toLocaleString('pt-BR');
            else document.getElementById('edit_preco_usd').value = o.preco.toLocaleString('pt-BR');
            checarCondicaoEdicao(); setBatEdicao(o.saude_bateria || '');
            document.getElementById('editModal').classList.remove('hidden');
        }
        function fecharModalEdicao() { document.getElementById('editModal').classList.add('hidden'); }
        async function salvarEdicaoCompleta(e) {
            e.preventDefault();
            const id = document.getElementById('edit_id').value;
            const valBrl = document.getElementById('edit_preco_brl').value.trim();
            const valUsd = document.getElementById('edit_preco_usd').value.trim();
            let up = { 
                quantidade: document.getElementById('edit_quantidade').value, 
                condicao: document.getElementById('edit_condicao').value,
                saude_bateria: document.getElementById('edit_saude_bateria').value || null,
                preco: valBrl ? parseFloat(valBrl.replace(/\./g, '').replace(',', '.')) : parseFloat(valUsd.replace(/\./g, '').replace(',', '.')),
                moeda: valBrl ? 'BRL' : 'USD'
            };
            await _s.from('ofertas').update(up).eq('id', id);
            fecharModalEdicao(); atualizarLista();
        }

        function toggleForm() { document.getElementById('loginForm').classList.toggle('hidden'); document.getElementById('registerForm').classList.toggle('hidden'); }
        async function fazerLogin(e) {
            e.preventDefault();
            const { data } = await _s.from('fornecedores').select('*').ilike('nome', document.getElementById('loginId').value).eq('senha', document.getElementById('loginPass').value).maybeSingle();
            if(data?.ativo) { localStorage.setItem('iFipe_Anunciante', data.id); window.location.reload(); } else alert("Erro ou Pendente.");
        }
        async function solicitarCadastro(e) {
            e.preventDefault();
            await _s.from('fornecedores').insert([{ nome: document.getElementById('regNome').value, whatsapp: document.getElementById('regWhats').value, senha: document.getElementById('regPass').value, ativo: false }]);
            alert("Enviado!"); toggleForm();
        }
        function sairPainel() { localStorage.removeItem('iFipe_Anunciante'); window.location.reload(); }
    </script>
</body>
</html>
