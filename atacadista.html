<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Painel do Anunciante</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background:#000; color:#fff; font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin:0; }
        .user-bar { background:rgba(28, 28, 30, 0.8); backdrop-filter:blur(15px); border-bottom:1px solid #38383a; padding:15px 20px; position:sticky; top:0; z-index:100; }
        .apple-card { background: #1c1c1e; border: 1px solid #38383a; border-radius: 24px; padding: 2rem; width: 100%; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .apple-input { background: #2c2c2e; border: 1px solid #38383a; border-radius: 12px; padding: 14px; width: 100%; color: white; outline: none; margin-bottom: 1rem; font-size: 14px; }
        .apple-button { background: #fff; color: #000; font-weight: 900; border-radius: 50px; padding: 16px; width: 100%; cursor: pointer; text-transform: uppercase; border: none; font-size: 13px; transition: 0.3s; }
        .apple-button:hover { background: #0071e3; color: #fff; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th { font-size: 10px; color: #86868b; text-transform: uppercase; padding: 12px; text-align: left; border-bottom: 1px solid #38383a; letter-spacing: 0.1em; }
        td { padding: 14px 12px; border-bottom: 1px solid #2c2c2e; font-size: 13px; }
        
        .mini-input { background: #2c2c2e; border: 1px solid #38383a; border-radius: 8px; padding: 6px; width: 80px; color: #fff; text-align: center; font-weight: bold; }
        .btn-acao { font-weight: bold; cursor: pointer; font-size: 10px; text-transform: uppercase; padding: 6px 10px; border-radius: 6px; display: inline-block; margin-bottom: 4px; }
        .btn-edit { background: rgba(0, 113, 227, 0.2); color: #0071e3; }
        .btn-edit:hover { background: #0071e3; color: #fff; }
        .btn-del { background: rgba(255, 59, 48, 0.2); color: #ff3b30; }
        .btn-del:hover { background: #ff3b30; color: #fff; }
        
        label { display: block; text-transform: uppercase; font-size: 10px; color: #86868b; margin-bottom: 6px; font-weight: 900; letter-spacing: 0.1em; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="editModal" class="hidden fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-[200] px-4">
        <div class="apple-card w-full max-w-[500px]">
            <h3 class="font-bold text-[14px] text-blue-500 mb-2 uppercase tracking-widest">Editar Anúncio</h3>
            <p id="edit_titulo" class="text-[12px] text-gray-400 font-bold mb-6 uppercase"></p>
            
            <form onsubmit="salvarEdicaoCompleta(event)">
                <input type="hidden" id="edit_id">
                <input type="hidden" id="edit_condicao">
                
                <div class="grid grid-cols-2 gap-4">
                    <div><label>Estoque</label><input type="number" id="edit_quantidade" class="apple-input" min="1" required></div>
                    <div><label>Preço (R$)</label><input type="text" id="edit_preco" class="apple-input" required></div>
                </div>

                <div id="edit_boxGarantia" class="hidden mb-4">
                    <label class="text-yellow-500">Garantia (Meses)</label>
                    <input type="number" id="edit_garantia" class="apple-input" placeholder="Ex: 3" min="1">
                </div>

                <div class="p-4 border border-[#38383a] rounded-xl bg-[#2c2c2e] mb-4">
                    <h4 class="text-[9px] text-gray-400 font-bold uppercase tracking-widest mb-3">Informações Adicionais</h4>
                    <input type="text" id="edit_cidade" class="apple-input py-2 mb-3 bg-[#1c1c1e] text-[12px]" placeholder="Cidade (Ex: São Paulo - SP)">
                    
                    <div class="grid grid-cols-2 gap-3 text-[9px] text-gray-300 font-bold uppercase tracking-wider">
                        <label class="flex items-center gap-2 cursor-pointer hover:text-white"><input type="checkbox" id="edit_coleta" class="accent-[#0071e3] w-4 h-4"> Aceita Coleta</label>
                        <label class="flex items-center gap-2 cursor-pointer hover:text-white"><input type="checkbox" id="edit_boy" class="accent-[#0071e3] w-4 h-4"> Motoboy</label>
                        <label class="flex items-center gap-2 cursor-pointer hover:text-white"><input type="checkbox" id="edit_usdt" class="accent-[#0071e3] w-4 h-4"> Aceita USDT</label>
                        <label class="flex items-center gap-2 cursor-pointer hover:text-white"><input type="checkbox" id="edit_nota" class="accent-[#0071e3] w-4 h-4"> Emite Nota</label>
                        <label class="flex items-center gap-2 cursor-pointer col-span-2 hover:text-white"><input type="checkbox" id="edit_envio" class="accent-[#0071e3] w-4 h-4"> Faço Envio (Correios/Transp.)</label>
                    </div>
                </div>
                
                <div class="flex gap-2">
                    <button type="button" onclick="fecharModalEdicao()" class="apple-button bg-gray-600 text-white w-1/3 border-0">Cancelar</button>
                    <button type="submit" class="apple-button bg-blue-600 text-white w-2/3 border-0">Salvar Alterações</button>
                </div>
            </form>
        </div>
    </div>

    <div id="loginSection" class="flex items-center justify-center min-h-screen px-4">
        <div class="apple-card max-w-[400px] text-center">
            <h1 class="text-5xl font-black italic mb-2">iFipe</h1>
            <p class="text-[10px] font-bold uppercase text-blue-500 mb-8 tracking-[0.4em]">Painel do Anunciante</p>
            
            <form onsubmit="fazerLogin(event)">
                <label>Nome da Loja</label>
                <input type="text" id="loginId" class="apple-input" placeholder="Sua Loja" required>
                <label>Senha</label>
                <input type="password" id="loginPass" class="apple-input" placeholder="••••••••" required>
                <button type="submit" class="apple-button w-full">Acessar Painel</button>
            </form>
            <p id="loginMsg" class="mt-4 text-[10px] font-bold text-red-500 uppercase"></p>
        </div>
    </div>

    <div id="formSection" class="hidden">
        <div class="user-bar">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="text-[11px] font-black uppercase tracking-widest">
                    Loja: <span id="nomeLoja" class="text-blue-500">...</span>
                </div>
                <button onclick="sairPainel()" class="text-[10px] text-red-500 font-black uppercase tracking-widest hover:text-white">Sair</button>
            </div>
        </div>

        <div class="max-w-7xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1">
                <div class="apple-card">
                    <h2 class="text-xl font-black italic mb-6">Novo Anúncio</h2>
                    <form id="priceForm" onsubmit="salvarOferta(event)">
                        <label>Aparelho</label>
                        <select id="produto_id" class="apple-input" onchange="aoMudarProduto()" required></select>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div><label>Condição</label>
                                <select id="condicao" class="apple-input" onchange="checarCondicao()">
                                    <option value="Novo">Novo</option>
                                    <option value="Seminovo">Seminovo</option>
                                </select>
                            </div>
                            <div><label>Estoque</label><input type="number" id="quantidade" class="apple-input" value="1" min="1" required></div>
                        </div>

                        <div id="boxGarantia" class="hidden">
                            <label class="text-yellow-500">Garantia (Meses)</label>
                            <input type="number" id="garantia" class="apple-input" placeholder="Ex: 3" min="1">
                        </div>

                        <div id="gradeOpcoes" class="mb-4"></div>

                        <label>Região / Origem</label>
                        <select id="regiao_id" class="apple-input" required></select>

                        <div class="mt-4 mb-4 p-4 border border-[#38383a] rounded-xl bg-[#2c2c2e]">
                            <h4 class="text-[9px] text-gray-400 font-bold uppercase tracking-widest mb-3">Informações Adicionais (Opcional)</h4>
                            <input type="text" id="obs_cidade" class="apple-input py-2 mb-3 bg-[#1c1c1e] text-[12px]" placeholder="Cidade (Ex: São Paulo - SP)">
                            
                            <div class="grid grid-cols-2 gap-3 text-[9px] text-gray-300 font-bold uppercase tracking-wider">
                                <label class="flex items-center gap-2 cursor-pointer hover:text-white"><input type="checkbox" id="obs_coleta" class="accent-[#0071e3] w-4 h-4"> Aceita Coleta</label>
                                <label class="flex items-center gap-2 cursor-pointer hover:text-white"><input type="checkbox" id="obs_boy" class="accent-[#0071e3] w-4 h-4"> Motoboy</label>
                                <label class="flex items-center gap-2 cursor-pointer hover:text-white"><input type="checkbox" id="obs_usdt" class="accent-[#0071e3] w-4 h-4"> Aceita USDT</label>
                                <label class="flex items-center gap-2 cursor-pointer hover:text-white"><input type="checkbox" id="obs_nota" class="accent-[#0071e3] w-4 h-4"> Emite Nota</label>
                                <label class="flex items-center gap-2 cursor-pointer col-span-2 hover:text-white"><input type="checkbox" id="obs_envio" class="accent-[#0071e3] w-4 h-4"> Faço Envio (Correios/Transp.)</label>
                            </div>
                        </div>

                        <label>Preço Unitário (R$)</label>
                        <input type="text" id="preco" class="apple-input" placeholder="Ex: 5400,00" required>
                        
                        <button type="submit" class="apple-button w-full bg-blue-600 text-white hover:bg-blue-500 border-0 mt-4">Publicar Oferta</button>
                        <p id="formMsg" class="mt-4 text-[10px] font-bold text-red-500 uppercase text-center"></p>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="apple-card">
                    <h2 class="text-xl font-black italic mb-6">Meus Anúncios no Ranking</h2>
                    <div class="overflow-x-auto">
                        <table>
                            <thead>
                                <tr>
                                    <th>Produto</th>
                                    <th>Condição</th>
                                    <th>Estoque</th>
                                    <th>Preço (R$)</th>
                                    <th>Ações</th>
                                </tr>
                            </thead>
                            <tbody id="listaAtivos"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let loja = null;
        let gradeVariacoes = [];
        let anunciosDaLoja = []; // Guarda os anúncios para a edição rápida

        window.onload = async () => {
            const token = localStorage.getItem('iFipe_Anunciante');
            if (token) {
                const { data } = await _s.from('fornecedores').select('*').eq('id', token).maybeSingle();
                if(data && data.ativo) { loja = data; liberarAcesso(); } 
                else { localStorage.removeItem('iFipe_Anunciante'); }
            }
        };

        async function fazerLogin(event) {
            event.preventDefault(); 
            const u = document.getElementById('loginId').value.trim();
            const p = document.getElementById('loginPass').value.trim();
            const msg = document.getElementById('loginMsg');
            msg.innerText = "VERIFICANDO...";
            msg.style.color = "#fff";
            
            const { data } = await _s.from('fornecedores').select('*').ilike('nome', u).eq('senha', p).maybeSingle();
            
            if(data && data.ativo) { 
                loja = data; 
                localStorage.setItem('iFipe_Anunciante', data.id); 
                liberarAcesso(); 
            } else { 
                msg.innerText = "LOJA NÃO ENCONTRADA OU INATIVA."; 
                msg.style.color = "#ff3b30";
            }
        }

        function liberarAcesso() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('formSection').classList.remove('hidden');
            document.getElementById('nomeLoja').innerText = loja.nome;
            init();
        }

        function sairPainel() { localStorage.removeItem('iFipe_Anunciante'); window.location.reload(); }

        async function init() {
            const [p, r, v] = await Promise.all([
                _s.from('produtos_mestre').select('id, nome').order('nome'),
                _s.from('regioes').select('*').order('nome'),
                _s.from('variacoes').select('*')
            ]);
            gradeVariacoes = v.data;
            document.getElementById('produto_id').innerHTML = '<option value="">Selecione o Aparelho...</option>' + p.data.map(x => `<option value="${x.id}">${x.nome}</option>`).join('');
            document.getElementById('regiao_id').innerHTML = '<option value="">Selecione a Região...</option>' + r.data.map(x => `<option value="${x.id}">${x.bandeira} ${x.nome}</option>`).join('');
            atualizarLista();
        }

        function aoMudarProduto() {
            const pid = document.getElementById('produto_id').value;
            const container = document.getElementById('gradeOpcoes');
            container.innerHTML = "";
            if(!pid) return;

            const vars = gradeVariacoes.filter(x => x.produto_id == pid);
            const tams = [...new Set(vars.map(x => x.tamanho).filter(Boolean))]; 
            const caps = [...new Set(vars.map(x => x.capacidade).filter(Boolean))]; 
            const cores = [...new Set(vars.map(x => x.cor).filter(Boolean))];

            let html = '<div class="grid grid-cols-1 gap-4 mt-4">';
            if(tams.length) html += `<div><label>Tamanho / RAM</label><select id="f_tam" class="apple-input" required><option value="">Selecione...</option>${tams.map(c => `<option value="${c}">${c}</option>`).join('')}</select></div>`;
            if(caps.length) html += `<div><label>Armazenamento</label><select id="f_cap" class="apple-input" required><option value="">Selecione...</option>${caps.map(c => `<option value="${c}">${c}</option>`).join('')}</select></div>`;
            if(cores.length) html += `<div><label>Cor</label><select id="f_cor" class="apple-input" required><option value="">Selecione...</option>${cores.map(c => `<option value="${c}">${c}</option>`).join('')}</select></div>`;
            html += '</div>';
            container.innerHTML = html;
        }

        function checarCondicao() {
            const cond = document.getElementById('condicao').value;
            const box = document.getElementById('boxGarantia');
            if(cond === 'Seminovo') {
                box.classList.remove('hidden');
                document.getElementById('garantia').required = true;
            } else {
                box.classList.add('hidden');
                document.getElementById('garantia').required = false;
                document.getElementById('garantia').value = ""; 
            }
        }

        async function salvarOferta(event) {
            event.preventDefault(); 
            const msg = document.getElementById('formMsg');
            msg.innerText = "SALVANDO...";
            msg.style.color = "#fff";

            const pid = document.getElementById('produto_id').value;
            const tam = document.getElementById('f_tam')?.value || null;
            const cap = document.getElementById('f_cap')?.value || null;
            const cor = document.getElementById('f_cor')?.value || null;
            
            const v = gradeVariacoes.find(x => 
                x.produto_id == pid && 
                (x.tamanho === tam || (!x.tamanho && !tam)) &&
                (x.capacidade === cap || (!x.capacidade && !cap)) && 
                (x.cor === cor || (!x.cor && !cor))
            );

            if(!v) { 
                msg.innerText = "ESSA COMBINAÇÃO NÃO EXISTE NO CATÁLOGO."; 
                msg.style.color = "#ff3b30";
                return; 
            }

            const precoStr = document.getElementById('preco').value.replace(/\./g, '').replace(',', '.');
            const precoLimpo = parseFloat(precoStr);

            if(isNaN(precoLimpo)) { 
                msg.innerText = "PREÇO INVÁLIDO."; 
                msg.style.color = "#ff3b30";
                return; 
            }

            const cond = document.getElementById('condicao').value;
            const gar = cond === 'Seminovo' ? document.getElementById('garantia').value + ' Meses' : null;

            const { error } = await _s.from('ofertas').insert([{
                fornecedor_id: loja.id,
                variacao_id: v.id,
                regiao_id: document.getElementById('regiao_id').value,
                preco: precoLimpo,
                quantidade: document.getElementById('quantidade').value,
                condicao: cond,
                garantia: gar, 
                cidade: document.getElementById('obs_cidade').value.trim(),
                aceita_coleta: document.getElementById('obs_coleta').checked,
                tem_boy: document.getElementById('obs_boy').checked,
                aceita_usdt: document.getElementById('obs_usdt').checked,
                emite_nota: document.getElementById('obs_nota').checked,
                faz_envio: document.getElementById('obs_envio').checked
            }]);
            
            if(!error) {
                document.getElementById('preco').value = "";
                document.getElementById('quantidade').value = "1";
                document.getElementById('obs_cidade').value = "";
                document.getElementById('obs_coleta').checked = false;
                document.getElementById('obs_boy').checked = false;
                document.getElementById('obs_usdt').checked = false;
                document.getElementById('obs_nota').checked = false;
                document.getElementById('obs_envio').checked = false;
                
                document.getElementById('condicao').value = "Novo";
                checarCondicao(); 

                msg.innerText = "";
                atualizarLista();
            } else {
                msg.innerText = "ERRO AO SALVAR OFERTA.";
                msg.style.color = "#ff3b30";
            }
        }

        async function atualizarLista() {
            const { data } = await _s.from('ofertas').select('*, variacoes(capacidade, tamanho, cor, produtos_mestre(nome))').eq('fornecedor_id', loja.id).order('criado_em', {ascending: false});
            anunciosDaLoja = data || []; // Salva para a edição no modal

            document.getElementById('listaAtivos').innerHTML = anunciosDaLoja.map(o => {
                const detalhes = [o.variacoes.tamanho, o.variacoes.capacidade, o.variacoes.cor].filter(Boolean).join(' | ');
                
                const obs = [];
                if(o.cidade) obs.push(o.cidade);
                if(o.aceita_coleta) obs.push('Coleta');
                if(o.tem_boy) obs.push('Boy');
                if(o.aceita_usdt) obs.push('USDT');
                if(o.emite_nota) obs.push('Nota');
                if(o.faz_envio) obs.push('Envio');
                const obsStr = obs.length > 0 ? `<span class="block mt-1 text-[9px] text-blue-400 font-bold uppercase">${obs.join(' | ')}</span>` : '';

                const tagGarantia = o.condicao === 'Seminovo' && o.garantia ? `<br><span class="text-yellow-500">Garantia: ${o.garantia}</span>` : '';

                return `
                <tr>
                    <td><span class="block font-bold">${o.variacoes.produtos_mestre.nome}</span><span class="text-[10px] text-gray-400">${detalhes}</span>${obsStr}</td>
                    <td><span class="text-[10px] bg-gray-800 px-2 py-1 rounded border border-gray-600">${o.condicao}</span>${tagGarantia}</td>
                    <td><input type="number" id="q-${o.id}" class="mini-input" value="${o.quantidade}" onchange="salvarEdicaoRapida(${o.id})"></td>
                    <td><input type="text" id="p-${o.id}" class="mini-input w-24" value="${o.preco.toLocaleString('pt-BR')}" onchange="salvarEdicaoRapida(${o.id})"></td>
                    <td>
                        <div class="flex flex-col gap-1 items-start">
                            <span class="btn-acao btn-edit" onclick="abrirModalEdicao(${o.id})">Editar</span>
                            <span class="btn-acao btn-del" onclick="deletar(${o.id})">Excluir</span>
                        </div>
                    </td>
                </tr>
            `}).join('');
        }

        async function salvarEdicaoRapida(id) {
            const q = document.getElementById(`q-${id}`).value;
            const p = document.getElementById(`p-${id}`).value.replace(/\./g, '').replace(',', '.');
            await _s.from('ofertas').update({ quantidade: q, preco: p }).eq('id', id);
        }

        // ==========================================
        // LÓGICA DO MODAL DE EDIÇÃO AVANÇADA
        // ==========================================
        function abrirModalEdicao(id) {
            const o = anunciosDaLoja.find(x => x.id === id);
            if (!o) return;

            document.getElementById('edit_id').value = o.id;
            document.getElementById('edit_condicao').value = o.condicao;
            
            const titulo = `${o.variacoes.produtos_mestre.nome} - ${[o.variacoes.tamanho, o.variacoes.capacidade, o.variacoes.cor].filter(Boolean).join(' | ')}`;
            document.getElementById('edit_titulo').innerText = titulo;

            document.getElementById('edit_quantidade').value = o.quantidade;
            document.getElementById('edit_preco').value = o.preco.toLocaleString('pt-BR');
            
            const boxGar = document.getElementById('edit_boxGarantia');
            const inpGar = document.getElementById('edit_garantia');
            if (o.condicao === 'Seminovo') {
                boxGar.classList.remove('hidden');
                inpGar.value = o.garantia ? o.garantia.replace(/\D/g, '') : '';
            } else {
                boxGar.classList.add('hidden');
                inpGar.value = '';
            }

            document.getElementById('edit_cidade').value = o.cidade || '';
            document.getElementById('edit_coleta').checked = o.aceita_coleta;
            document.getElementById('edit_boy').checked = o.tem_boy;
            document.getElementById('edit_usdt').checked = o.aceita_usdt;
            document.getElementById('edit_nota').checked = o.emite_nota;
            document.getElementById('edit_envio').checked = o.faz_envio;

            document.getElementById('editModal').classList.remove('hidden');
        }

        function fecharModalEdicao() {
            document.getElementById('editModal').classList.add('hidden');
        }

        async function salvarEdicaoCompleta(e) {
            e.preventDefault();
            const id = document.getElementById('edit_id').value;
            const condicao = document.getElementById('edit_condicao').value;
            
            const pStr = document.getElementById('edit_preco').value.replace(/\./g, '').replace(',', '.');
            const precoLimpo = parseFloat(pStr);

            if(isNaN(precoLimpo)) { alert("Preço Inválido!"); return; }

            const garVal = document.getElementById('edit_garantia').value;
            const garantiaFinal = (condicao === 'Seminovo' && garVal) ? garVal + ' Meses' : null;

            await _s.from('ofertas').update({
                quantidade: document.getElementById('edit_quantidade').value,
                preco: precoLimpo,
                garantia: garantiaFinal,
                cidade: document.getElementById('edit_cidade').value.trim(),
                aceita_coleta: document.getElementById('edit_coleta').checked,
                tem_boy: document.getElementById('edit_boy').checked,
                aceita_usdt: document.getElementById('edit_usdt').checked,
                emite_nota: document.getElementById('edit_nota').checked,
                faz_envio: document.getElementById('edit_envio').checked
            }).eq('id', id);

            fecharModalEdicao();
            atualizarLista();
        }

        async function deletar(id) { 
            if(confirm("Remover anúncio definitivamente?")) { 
                await _s.from('ofertas').delete().eq('id', id); 
                atualizarLista(); 
            } 
        }
    </script>
</body>
</html>
