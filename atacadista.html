<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Painel do Atacadista</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0b0b0c; --card: #1c1c1e; --text: #fff; --border: #38383a; --blue: #0071e3; }
        body { background: var(--bg); color: var(--text); font-family:-apple-system, sans-serif; }
        .apple-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; }
        .apple-input { background: #2c2c2e; border: 1px solid var(--border); border-radius: 10px; padding: 12px; width: 100%; color: #fff; outline: none; }
        .btn-primary { background: var(--blue); color: #fff; font-weight: 800; border-radius: 12px; padding: 14px; width: 100%; transition: 0.3s; }
        .btn-primary:hover { opacity: 0.8; }
        .status-badge { font-size: 10px; font-weight: 900; padding: 4px 10px; border-radius: 50px; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-black italic">iFipe <span class="text-blue-500">Business</span></h1>
                <p id="nomeLoja" class="text-gray-500 font-bold uppercase text-[10px]">Carregando loja...</p>
            </div>
            <button onclick="logout()" class="text-red-500 font-bold text-xs uppercase">Sair</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-1">
                <div class="apple-card">
                    <h2 class="font-black mb-4 uppercase italic">Novo Anúncio</h2>
                    <div class="space-y-4">
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase">Modelo</label>
                            <select id="selProduto" class="apple-input" onchange="carregarVariacoes(this.value)">
                                <option value="">Selecione o iPhone...</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase">Variação (GB/Cor)</label>
                            <select id="selVariacao" class="apple-input">
                                <option value="">Aguardando modelo...</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase">Preço</label>
                                <input type="number" id="inpPreco" class="apple-input" placeholder="0.00">
                            </div>
                            <div>
                                <label class="text-[10px] font-bold text-gray-400 uppercase">Moeda</label>
                                <select id="selMoeda" class="apple-input">
                                    <option value="BRL">R$ (BRL)</option>
                                    <option value="USD">$ (USD)</option>
                                </select>
                            </div>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-gray-400 uppercase">Quantidade</label>
                            <input type="number" id="inpQtd" class="apple-input" value="1">
                        </div>
                        
                        <div class="grid grid-cols-2 gap-4 py-2">
                            <label class="flex items-center gap-2 text-xs font-bold cursor-pointer">
                                <input type="checkbox" id="checkPix"> ACEITA PIX
                            </label>
                            <label class="flex items-center gap-2 text-xs font-bold cursor-pointer">
                                <input type="checkbox" id="checkUsdt"> ACEITA USDT
                            </label>
                        </div>

                        <button onclick="postarAnuncio()" class="btn-primary">PUBLICAR NO BUSCADOR</button>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="apple-card min-h-[400px]">
                    <h2 class="font-black mb-4 uppercase italic">Meus Anúncios Ativos</h2>
                    <div id="listaAnuncios" class="space-y-3">
                        </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let userLogado = null;

        async function init() {
            const id = localStorage.getItem('iFipe_Atacadista_ID');
            if(!id) return window.location.href = 'index.html';

            const { data } = await _s.from('fornecedores').select('*').eq('id', id).single();
            userLogado = data;
            document.getElementById('nomeLoja').innerText = data.nome;

            carregarModelos();
            meusAnuncios();
        }

        async function carregarModelos() {
            const { data } = await _s.from('produtos_mestre').select('*').order('nome');
            document.getElementById('selProduto').innerHTML += data.map(p => `<option value="${p.id}">${p.nome}</option>`).join('');
        }

        async function carregarVariacoes(pId) {
            const { data } = await _s.from('variacoes').select('*').eq('produto_id', pId);
            document.getElementById('selVariacao').innerHTML = data.map(v => `<option value="${v.id}">${v.capacidade} - ${v.cor}</option>`).join('');
        }

        async function postarAnuncio() {
            const vId = document.getElementById('selVariacao').value;
            const preco = document.getElementById('inpPreco').value;
            if(!vId || !preco) return alert("Preencha tudo!");

            await _s.from('ofertas').insert({
                fornecedor_id: userLogado.id,
                variacao_id: vId,
                preco: preco,
                moeda: document.getElementById('selMoeda').value,
                quantidade: document.getElementById('inpQtd').value,
                aceita_pix: document.getElementById('checkPix').checked,
                aceita_usdt: document.getElementById('checkUsdt').checked
            });

            alert("Anúncio publicado!");
            meusAnuncios();
        }

        async function meusAnuncios() {
            const { data } = await _s.from('ofertas').select('*, variacoes(capacidade, cor, produtos_mestre(nome))').eq('fornecedor_id', userLogado.id).order('criado_em', {ascending: false});
            
            document.getElementById('listaAnuncios').innerHTML = data.map(o => `
                <div class="bg-[#2c2c2e] p-4 rounded-xl flex justify-between items-center border border-gray-800">
                    <div>
                        <p class="font-black text-sm">${o.variacoes.produtos_mestre.nome}</p>
                        <p class="text-[10px] text-gray-500 font-bold uppercase">${o.variacoes.capacidade} | ${o.variacoes.cor}</p>
                    </div>
                    <div class="text-right">
                        <p class="font-mono font-black text-[#32d74b]">${o.moeda} ${o.preco}</p>
                        <button onclick="deletarAnuncio(${o.id})" class="text-[8px] text-red-500 font-bold uppercase mt-1">Excluir</button>
                    </div>
                </div>
            `).join('');
        }

        async function deletarAnuncio(id) {
            if(confirm("Remover anúncio?")) {
                await _s.from('ofertas').delete().eq('id', id);
                meusAnuncios();
            }
        }

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
        window.onload = init;
    </script>
</body>
</html>
