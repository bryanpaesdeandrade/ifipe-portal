<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Painel do Anunciante</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #38383a; --input: #2c2c2e; }
        body { background: var(--bg); color: var(--text); font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin:0; }
        .user-bar { background:rgba(28, 28, 30, 0.8); backdrop-filter:blur(15px); border-bottom:1px solid var(--border); padding:15px 20px; position:sticky; top:0; z-index:100; }
        .apple-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 2rem; width: 100%; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .apple-input { background: var(--input); border: 1px solid var(--border); border-radius: 12px; padding: 14px; width: 100%; color: var(--text); outline: none; margin-bottom: 1rem; font-size: 14px; }
        .apple-button { background: #fff; color: #000; font-weight: 900; border-radius: 50px; padding: 16px; width: 100%; cursor: pointer; text-transform: uppercase; border: none; font-size: 13px; transition: 0.3s; }
        .apple-button:hover { background: #0071e3; color: #fff; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th { font-size: 10px; color: #86868b; text-transform: uppercase; padding: 12px; text-align: left; border-bottom: 1px solid var(--border); letter-spacing: 0.1em; }
        td { padding: 14px 12px; border-bottom: 1px solid var(--input); font-size: 13px; }
        .mini-input { background: var(--input); border: 1px solid var(--border); border-radius: 8px; padding: 6px; width: 80px; color: var(--text); text-align: center; font-weight: bold; }
        .battery-pill { padding: 10px; border-radius: 10px; background: var(--input); border: 1px solid var(--border); cursor: pointer; font-size: 9px; font-weight: 900; text-transform: uppercase; text-align: center; color: #86868b; transition: 0.2s; }
        .battery-pill.active { background: #32d74b !important; color: #000 !important; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="loginSection" class="flex items-center justify-center min-h-screen px-4">
        <div class="apple-card max-w-[400px] text-center">
            <h1 class="text-5xl font-black italic mb-8">iFipe</h1>
            <form onsubmit="fazerLogin(event)">
                <input type="text" id="loginId" class="apple-input" placeholder="Nome da Loja" required>
                <input type="password" id="loginPass" class="apple-input" placeholder="Senha" required>
                <button type="submit" class="apple-button w-full">Entrar</button>
            </form>
            <p id="loginMsg" class="mt-4 text-[10px] font-bold text-red-500 uppercase"></p>
        </div>
    </div>

    <div id="formSection" class="hidden">
        <div class="user-bar"><div class="max-w-7xl mx-auto flex justify-between items-center"><div class="text-[11px] font-black uppercase tracking-widest">Loja: <span id="nomeLoja" class="text-blue-500">...</span></div><button onclick="sairPainel()" class="text-[10px] text-red-500 font-black uppercase">Sair</button></div></div>
        <div class="max-w-7xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="apple-card">
                    <h2 class="text-xl font-black italic mb-6">Novo Anúncio</h2>
                    <form id="priceForm" onsubmit="salvarOferta(event)">
                        <label class="text-[9px] uppercase font-bold text-gray-500">Aparelho</label>
                        <select id="produto_id" class="apple-input" onchange="aoMudarProduto()" required></select>
                        <div id="gradeOpcoes"></div>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label class="text-[9px] uppercase font-bold text-gray-500">Condição</label><select id="condicao" class="apple-input" onchange="checarCondicao()"><option value="Novo">Novo</option><option value="Seminovo">Seminovo</option></select></div>
                            <div><label class="text-[9px] uppercase font-bold text-gray-500">Estoque</label><input type="number" id="quantidade" class="apple-input" value="1" min="1" required></div>
                        </div>
                        <div id="boxBateria" class="hidden mb-4"><label class="text-green-500 text-[9px] font-black uppercase">Saúde da Bateria</label><div class="grid grid-cols-2 gap-2 mt-1"><div class="battery-pill" onclick="setBat('ABAIXO DE 85%')">Abaixo 85%</div><div class="battery-pill" onclick="setBat('ACIMA DE 90%')">Acima 90%</div><div class="battery-pill col-span-2" onclick="setBat('EM 100%')">100%</div></div><input type="hidden" id="saude_bateria"></div>
                        <label id="label_preco" class="text-[9px] uppercase font-bold text-gray-500">Preço</label><input type="text" id="preco" class="apple-input" required>
                        <label class="text-[9px] uppercase font-bold text-gray-500">Região</label><select id="regiao_id" class="apple-input" required></select>
                        <button type="submit" class="apple-button w-full bg-blue-600 text-white border-0">Publicar</button>
                    </form>
                </div>
            </div>
            <div class="lg:col-span-2"><div class="apple-card"><h2 class="text-xl font-black italic mb-6 text-blue-500">Meus Anúncios Ativos</h2><div class="overflow-x-auto"><table><thead><tr><th>Produto</th><th>Condição</th><th>Estoque</th><th>Preço</th><th>Ação</th></tr></thead><tbody id="listaAtivos"></tbody></table></div></div></div>
        </div>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let loja = null; let gradeVariacoes = [];

        window.onload = async () => {
            const t = localStorage.getItem('iFipe_Anunciante');
            if (t) { const { data } = await _s.from('fornecedores').select('*, regioes(moeda)').eq('id', t).maybeSingle(); if(data) { loja = data; liberarAcesso(); } }
            else { document.getElementById('loginSection').classList.remove('hidden'); }
        };

        async function fazerLogin(e) {
            e.preventDefault();
            const { data } = await _s.from('fornecedores').select('*').ilike('nome', document.getElementById('loginId').value).eq('senha', document.getElementById('loginPass').value).maybeSingle();
            if(data && data.ativo) { localStorage.setItem('iFipe_Anunciante', data.id); window.location.reload(); }
            else { document.getElementById('loginMsg').innerText = "ERRO DE LOGIN."; }
        }

        function liberarAcesso() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('formSection').classList.remove('hidden');
            document.getElementById('nomeLoja').innerText = loja.nome;
            document.getElementById('label_preco').innerText = `Preço em ${loja.regioes?.moeda === 'USD' ? '$' : 'R$'}`;
            init();
        }

        async function init() {
            const [p, r, v] = await Promise.all([_s.from('produtos_mestre').select('id, nome').order('nome'), _s.from('regioes').select('*').order('nome'), _s.from('variacoes').select('*')]);
            gradeVariacoes = v.data;
            document.getElementById('produto_id').innerHTML = '<option value="">Escolha...</option>' + p.data.map(x => `<option value="${x.id}">${x.nome}</option>`).join('');
            document.getElementById('regiao_id').innerHTML = '<option value="">Escolha...</option>' + r.data.map(x => `<option value="${x.id}">${x.bandeira} ${x.nome}</option>`).join('');
            atualizarLista();
        }

        function aoMudarProduto() {
            const pid = document.getElementById('produto_id').value;
            const container = document.getElementById('gradeOpcoes');
            container.innerHTML = ""; if(!pid) return;
            const vars = gradeVariacoes.filter(x => x.produto_id == pid);
            const caps = [...new Set(vars.map(x => x.capacidade).filter(Boolean))]; 
            const cores = [...new Set(vars.map(x => x.cor).filter(Boolean))];
            let html = '<div class="grid grid-cols-2 gap-2 mb-4">';
            if(caps.length) html += `<div><label class="text-[8px] uppercase font-bold text-gray-500">Memória</label><select id="f_cap" class="apple-input" required><option value="">Escolha...</option>${caps.map(c => `<option value="${c}">${c}</option>`).join('')}</select></div>`;
            if(cores.length) html += `<div><label class="text-[8px] uppercase font-bold text-gray-500">Cor</label><select id="f_cor" class="apple-input" required><option value="">Escolha...</option>${cores.map(c => `<option value="${c}">${c}</option>`).join('')}</select></div>`;
            container.innerHTML = html + '</div>';
        }

        function setBat(v) { document.getElementById('saude_bateria').value = v; document.querySelectorAll('.battery-pill').forEach(p => { if(p.innerText.includes(v.replace('ACIMA DE ', '').replace('ABAIXO DE ', ''))) p.classList.add('active'); else p.classList.remove('active'); }); }
        function checarCondicao() { document.getElementById('boxBateria').classList.toggle('hidden', document.getElementById('condicao').value === 'Novo'); }

        async function atualizarLista() {
            const { data } = await _s.from('ofertas').select('*, variacoes(capacidade, cor, produtos_mestre(nome)), regioes(moeda)').eq('fornecedor_id', loja.id).order('criado_em', {ascending: false});
            const prefixo = (loja.regioes?.moeda === 'USD') ? '$' : 'R$';
            document.getElementById('listaAtivos').innerHTML = data.map(o => `<tr><td><span class="font-bold">${o.variacoes.produtos_mestre.nome}</span><br><span class="text-[10px] text-gray-500">${o.variacoes.capacidade} | ${o.variacoes.cor}</span></td><td>${o.condicao}</td><td>${o.quantidade} UN</td><td>${prefixo} ${o.preco.toLocaleString('pt-BR')}</td><td><button onclick="deletar(${o.id})" class="text-red-500 text-[10px] font-black">X</button></td></tr>`).join('');
        }

        async function salvarOferta(e) {
            e.preventDefault();
            const v = gradeVariacoes.find(x => x.produto_id == document.getElementById('produto_id').value && x.capacidade === document.getElementById('f_cap')?.value && x.cor === document.getElementById('f_cor')?.value);
            if(!v) return alert("Erro na combinação.");
            await _s.from('ofertas').insert([{ fornecedor_id: loja.id, variacao_id: v.id, regiao_id: document.getElementById('regiao_id').value, preco: parseFloat(document.getElementById('preco').value.replace(',','.')), quantidade: document.getElementById('quantidade').value, condicao: document.getElementById('condicao').value, saude_bateria: document.getElementById('saude_bateria').value }]);
            atualizarLista(); e.target.reset();
        }

        async function deletar(id) { if(confirm("Excluir?")) { await _s.from('ofertas').delete().eq('id', id); atualizarLista(); } }
        function sairPainel() { localStorage.removeItem('iFipe_Anunciante'); window.location.reload(); }
    </script>
</body>
</html>
