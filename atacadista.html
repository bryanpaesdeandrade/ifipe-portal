<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Painel do Anunciante</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #38383a; --input: #2c2c2e; --blue-sober: #3b82f6; }
        body { background: var(--bg); color: var(--text); font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin:0; text-transform: uppercase; transition: 0.3s; }
        
        .nav-bar { background:rgba(28, 28, 30, 0.8); backdrop-filter:blur(15px); border-bottom:1px solid var(--border); padding:15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:100; flex-wrap: wrap; gap: 10px;}
        .apple-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 1.5rem; }
        .apple-input { background: var(--input); border: 1px solid var(--border); border-radius: 10px; padding: 10px; width: 100%; color: var(--text); outline: none; font-size: 11px; text-transform: uppercase; }
        
        .btn-header { display: flex; align-items: center; justify-content: center; border-radius: 12px; height: 38px; padding: 0 12px; transition: 0.3s; border: 1px solid var(--border); text-decoration: none; gap: 6px; cursor: pointer; position: relative; }
        .btn-header span { font-size: 10px; font-weight: 900; text-transform: uppercase; }
        
        .btn-lancar { background: #fff; color: #000; font-weight: 900; border-radius: 50px; padding: 14px; cursor: pointer; border: none; font-size: 11px; width: 100%; transition: 0.3s; text-transform: uppercase; margin-top: 16px; }
        .btn-lancar:hover { background: var(--blue-sober); color: #fff; }

        .tag-chapada { font-size: 9px; font-weight: 900; padding: 4px 8px; border-radius: 6px; display: inline-flex; align-items: center; color: #fff; margin-right: 4px; margin-bottom: 4px; border: none; }
        .tag-novo { background: #16a34a; } 
        .tag-semi { background: #ca8a04; } 
        .tag-cinza { background: #4b5563; }
        
        .moldura-sobria { font-size: 9px; font-weight: 900; padding: 3px 6px; border-radius: 6px; display: inline-flex; align-items: center; border: 1px solid #3b82f6; color: #60a5fa; background: rgba(59, 130, 246, 0.1); margin-right: 4px; margin-bottom: 4px; }

        .mini-edit { background: transparent; border: 1px solid transparent; color: #fff; font-weight: 800; width: 60px; text-align: center; font-family: 'JetBrains Mono'; border-radius: 6px; transition: 0.3s; border-bottom: 1px dashed rgba(255,255,255,0.3); }
        .mini-edit:focus { border-color: var(--blue-sober); background: rgba(59, 130, 246, 0.1); outline: none; border-bottom: 1px solid var(--blue-sober); }
        .mini-edit-preco { width: 80px; }
        
        .step-block { margin-bottom: 12px; border-left: 2px solid #38383a; padding-left: 15px; opacity: 0.3; pointer-events: none; transition: 0.3s; }
        .step-block.active { border-left-color: var(--blue-sober); opacity: 1; pointer-events: auto; }
        
        .btn-tipo { background: var(--input); border: 2px solid var(--border); color: var(--text); padding: 12px; border-radius: 12px; font-weight: 900; font-size: 10px; cursor: pointer; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .btn-tipo.active { border-color: var(--blue-sober); color: var(--blue-sober); background: rgba(59, 130, 246, 0.1); }
        
        .insignia-badge { display: inline-flex; padding: 4px 8px; border-radius: 8px; font-size: 9px; font-weight: 900; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.4); margin-bottom: 4px; }
        .califa { color: #f43f5e; border-color: #f43f5e; }
        .rei { color: #3b82f6; border-color: #3b82f6; }
        .magnata { color: #f59e0b; border-color: #f59e0b; }

        .color-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 6px; vertical-align: middle; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 0 5px rgba(0,0,0,0.5); }

        table { width: 100%; border-collapse: collapse; }
        td, th { padding: 12px 10px; border-bottom: 1px solid var(--input); font-size: 10px; text-align: center; vertical-align: middle; }
        td:nth-child(2), th:nth-child(2) { text-align: left; }
        
        .btn-scroll-top { position: fixed; bottom: 30px; right: 30px; background-color: var(--card); border: 1px solid var(--border); color: var(--text); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 999; transition: 0.3s; opacity: 0; pointer-events: none; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .btn-scroll-top.show { opacity: 1; pointer-events: auto; }
        .btn-scroll-top:hover { background-color: var(--blue-sober); border-color: var(--blue-sober); color: #fff; }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: var(--input); border-radius: 10px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #blue-sober; border-radius: 10px; }
        .hidden { display: none !important; }
    </style>
</head>
<body id="appBody">

    <button id="scrollTopBtn" class="btn-scroll-top" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M18 15l-6-6-6 6"/></svg>
    </button>

    <div id="mainContent" class="hidden">
        <nav class="nav-bar">
            <div class="flex items-center gap-4">
                <h1 class="text-2xl font-black italic m-0">iFipe</h1>
                <span class="text-[10px] text-gray-400 font-bold border-l border-[#38383a] pl-3 ml-1 uppercase" id="dashNome">CARREGANDO...</span>
            </div>

            <div class="flex gap-2 sm:gap-4 items-center flex-wrap justify-end">
                <button onclick="abrirCalc()" class="btn-header" style="color: #60a5fa; border-color: #60a5fa; background: rgba(59, 130, 246, 0.1);">
                    <span>Calculadora de iPhone</span>
                </button>
                
                <a href="https://wa.me/556896003049?text=Ol%C3%A1%20venho%20do%20iFipe%20e%20preciso%20de%20suporte" target="_blank" class="btn-header" style="background: rgba(37, 211, 102, 0.1); color: #25d366; border-color: #25d366;">
                    <span>Suporte</span>
                </a>
                
                <a href="https://wa.me/15616760652?text=QUERO%20COMPRAR%20USDT" target="_blank" class="btn-header" style="background: rgba(255, 204, 0, 0.1); color: #ffcc00; border-color: #ffcc00;">
                    <span>COMPRAR USDT C/ ORÁCULO <strong id="tOra" class="ml-1 text-white">R$ --</strong></span>
                </a>
                
                <div class="bg-[#1c1c1e] border border-[#38383a] rounded-lg px-4 py-1 ml-2 text-center">
                    <span class="text-[8px] text-yellow-400 font-black block leading-tight">BINANCE USDT/BRL</span>
                    <span id="tBin" class="text-[13px] font-mono font-black text-white">R$ --</span>
                </div>

                <button onclick="abrirSino()" class="btn-header border-none !bg-transparent text-xl px-2 ml-2 hover:text-yellow-500">
                    🔔<span id="badgeSino" class="hidden absolute top-0 right-1 bg-red-600 text-white text-[8px] w-4 h-4 rounded-full flex items-center justify-center shadow-lg font-black">0</span>
                </button>
                <button onclick="abrirConta()" class="btn-header" style="background: var(--input); color: #fff; border-color: #38383a;">
                    <span>⚙️ MINHA CONTA</span>
                </button>

                <button onclick="logout()" class="text-red-500 font-black text-[10px] uppercase ml-2 hover:underline">Sair</button>
            </div>
        </nav>

        <main class="max-w-[1400px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6 pt-6 px-4 pb-20">
            <div class="lg:col-span-4 space-y-6">
                <div class="apple-card">
                    <h3 class="text-[10px] font-black uppercase text-gray-400 mb-3">STATUS NO IFIPE 🏆</h3>
                    <div id="blocoInsignias" class="flex flex-wrap gap-2"></div>
                </div>

                <div class="apple-card">
                    <h2 class="text-xs font-black text-white mb-4">PUBLICAR OFERTA</h2>
                    <div class="grid grid-cols-2 gap-2 mb-4">
                        <button type="button" id="btN" class="btn-tipo" onclick="selTipo('Novo')">📦 NOVO</button>
                        <button type="button" id="btS" class="btn-tipo" onclick="selTipo('Seminovo')">♻️ SEMINOVO</button>
                    </div>
                    <form onsubmit="doPost(event)">
                        <input type="hidden" id="f_tipo">
                        <div class="step-block" id="s1"><span class="text-[9px] font-bold text-gray-400">1. MODELO</span><select id="f_mod" class="apple-input mt-1" onchange="libMem()" required disabled></select></div>
                        <div class="step-block" id="s2"><span class="text-[9px] font-bold text-gray-400">2. MEMÓRIA</span><select id="f_cap" class="apple-input mt-1" onchange="libCor()" required disabled></select></div>
                        <div class="step-block" id="s3"><span class="text-[9px] font-bold text-gray-400">3. COR</span><select id="f_cor" class="apple-input mt-1" onchange="libDet()" required disabled></select></div>
                        <div class="step-block" id="s4">
                            <span class="text-[9px] font-bold text-gray-400">4. DETALHES</span>
                            <div id="z_semi" class="hidden space-y-2 mt-2 mb-2">
                                <select id="f_cond" class="apple-input">
                                    <option value="Seminovo">SEMINOVO</option>
                                    <option value="CPO">CPO</option>
                                    <option value="Grade A">GRADE A</option>
                                    <option value="Grade B">GRADE B</option>
                                    <option value="Grade C">GRADE C</option>
                                </select>
                                <select id="f_bat" class="apple-input">
                                    <option value="">BATERIA...</option>
                                    <option value="Abaixo de 85%">Abaixo de 85%</option>
                                    <option value="Acima de 85%">Acima de 85%</option>
                                    <option value="Acima de 90%">Acima de 90%</option>
                                    <option value="Acima de 95%">Acima de 95%</option>
                                    <option value="Bateria em 100%">Bateria em 100%</option>
                                </select>
                            </div>
                            <div class="mb-2 mt-2">
                                <select id="f_gar" class="apple-input hidden">
                                    <option value="">GARANTIA...</option>
                                    <option value="Sem garantia">Sem garantia</option>
                                    <option value="1 Mês">1 Mês</option>
                                    <option value="2 Meses">2 Meses</option>
                                    <option value="3 Meses">3 Meses</option>
                                    <option value="6 Meses">6 Meses</option>
                                    <option value="12 Meses">12 Meses</option>
                                </select>
                            </div>
                            <div class="grid grid-cols-2 gap-2 mb-2">
                                <input type="number" id="f_qtd" class="apple-input" placeholder="QTD" min="0" required>
                                <select id="f_orig" class="apple-input" required></select>
                            </div>
                            <div class="grid grid-cols-2 gap-2 mb-2">
                                <input type="text" id="f_usd" class="apple-input" placeholder="$ USD" oninput="mascara(this); document.getElementById('f_brl').value=''">
                                <input type="text" id="f_brl" class="apple-input" placeholder="R$ BRL" oninput="mascara(this); document.getElementById('f_usd').value=''">
                            </div>
                            <div class="grid grid-cols-2 gap-2 mt-3 bg-[#1c1c1e] p-3 rounded-lg border border-[#38383a]">
                                <label class="text-[8px] flex items-center gap-1.5 font-black text-gray-300"><input type="checkbox" id="m_pix"> PIX</label>
                                <label class="text-[8px] flex items-center gap-1.5 font-black text-gray-300"><input type="checkbox" id="m_usdt"> USDT</label>
                                <label class="text-[8px] flex items-center gap-1.5 font-black text-gray-300"><input type="checkbox" id="m_neg"> NEGOCIA QTD</label>
                                <label class="text-[8px] flex items-center gap-1.5 font-black text-gray-300"><input type="checkbox" id="m_envi"> FAZ ENVIO</label>
                                <label class="text-[8px] flex items-center gap-1.5 font-black text-gray-300"><input type="checkbox" id="m_cole"> ACEITA COLETA</label>
                                <label class="text-[8px] flex items-center gap-1.5 font-black text-gray-300"><input type="checkbox" id="m_nota"> EMITE NF</label>
                            </div>
                            <button type="submit" id="btnS" class="btn-lancar hidden">LANÇAR PRODUTO</button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-8">
                <div class="apple-card min-h-[600px] flex flex-col">
                    <div class="flex justify-between items-center mb-4 bg-[#2c2c2e] p-3 rounded-xl border border-[#38383a]">
                        <div class="flex items-center gap-3">
                            <span class="text-[9px] font-black uppercase text-gray-300"><span id="bulkCount">0</span> Selecionados</span>
                            <select id="filtroTipoLista" class="apple-input !w-auto !py-1 !text-[8px] !bg-[#1c1c1e]" onchange="upTab()">
                                <option value="">TODAS AS CONDIÇÕES</option>
                                <option value="Novo">SOMENTE NOVOS</option>
                                <option value="Seminovo">SOMENTE SEMINOVOS</option>
                            </select>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="copiarListaWhatsApp()" class="bg-[#25d366] text-white px-3 py-1.5 rounded-full text-[8px] font-black uppercase flex items-center gap-1">Copiar Lista</button>
                            <button onclick="abrirBulk()" class="bg-white text-black px-3 py-1.5 rounded-full text-[8px] font-black uppercase">Editar Lote</button>
                            <button onclick="bulkDup()" class="bg-[#3b82f6] text-white px-3 py-1.5 rounded-full text-[8px] font-black uppercase">Duplicar</button>
                            <button onclick="bulkDel()" class="bg-red-600 text-white px-3 py-1.5 rounded-full text-[8px] font-black uppercase">Apagar</button>
                        </div>
                    </div>
                    <div class="overflow-x-auto custom-scroll mt-2">
                        <table>
                            <thead><tr><th width="30"><input type="checkbox" onclick="selAll(this)"></th><th>MODELO / DETALHES</th><th class="text-center">EDITAR QTD</th><th class="text-center">EDITAR PREÇO</th></tr></thead>
                            <tbody id="lista"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="contaModal" class="hidden fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center z-[2000] p-4">
        <div class="apple-card max-w-[400px] w-full border-[#38383a]">
            <h3 class="text-xs font-black uppercase text-white mb-4 text-center">⚙️ MINHA CONTA</h3>
            <form onsubmit="salvarConta(event)" class="space-y-4">
                <div><label class="text-[8px] text-gray-400 font-bold mb-1 block">NOME DA LOJA</label><input type="text" id="c_nome" class="apple-input w-full" required></div>
                <div><label class="text-[8px] text-gray-400 font-bold mb-1 block">WHATSAPP</label><input type="text" id="c_whats" class="apple-input w-full" required></div>
                <div><label class="text-[8px] text-gray-400 font-bold mb-1 block">NOVA SENHA</label><input type="password" id="c_senha" class="apple-input w-full"></div>
                <div class="flex gap-2 pt-2"><button type="button" onclick="fecharConta()" class="btn-lancar !bg-gray-600 !text-white !mt-0 w-1/3">CANCELAR</button><button type="submit" class="btn-lancar !bg-[#3b82f6] !text-white !mt-0 w-2/3">SALVAR</button></div>
            </form>
        </div>
    </div>

    <div id="bulkModal" class="hidden fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center z-[2000] p-4">
        <div class="apple-card max-w-[500px] w-full border-[#3b82f6]">
            <h3 class="text-xs font-black uppercase text-white mb-4 text-center">EDIÇÃO EM MASSA</h3>
            <form onsubmit="doBulk(event)" class="space-y-4">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="b_preco" class="apple-input" placeholder="NOVO PREÇO" oninput="mascara(this)">
                    <input type="number" id="b_qtd" class="apple-input" placeholder="NOVA QTD">
                    <select id="b_cond" class="apple-input"><option value="">MANTER CONDIÇÃO...</option><option value="Novo">NOVO</option><option value="Seminovo">SEMINOVO</option></select>
                </div>
                <div class="flex gap-2 pt-2"><button type="button" onclick="fecharBulk()" class="btn-lancar !bg-gray-600 !text-white !mt-0 w-1/3">CANCELAR</button><button type="submit" class="btn-lancar !bg-[#3b82f6] !text-white !mt-0 w-2/3">APLICAR</button></div>
            </form>
        </div>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let loja = null, produtos = [], vars = [], ofertas = [], rate = 0;

        window.onload = async () => {
            const token = localStorage.getItem('iFipe_Anunciante');
            const masterOverride = localStorage.getItem('iFipe_Status_Override') === 'true';

            if(!token) return window.location.replace('index.html');

            // BYPASS FÍSICO PARA MASTER OU ID 9999
            if(token === '9999' || masterOverride) {
                loja = { id: 9999, nome: 'MASTER BYPASS', insignia_manual: ['MASTER'] };
            } else {
                const { data: l, error } = await _s.from('fornecedores').select('*').eq('id', token).single();
                if(error || !l) {
                    localStorage.removeItem('iFipe_Anunciante');
                    return window.location.replace('index.html');
                }
                loja = l;
            }

            document.getElementById('dashNome').innerText = loja.nome;
            document.getElementById('mainContent').classList.remove('hidden');

            new WebSocket('wss://stream.binance.com:9443/ws/usdtbrl@ticker').onmessage = e => {
                rate = parseFloat(JSON.parse(e.data).c);
                document.getElementById('tBin').innerText = `R$ ${rate.toFixed(4)}`;
                document.getElementById('tOra').innerText = `R$ ${(rate+0.06).toFixed(4)}`;
            };

            const [p, v, r] = await Promise.all([ 
                _s.from('produtos_mestre').select('*').order('id'), 
                _s.from('variacoes').select('*'), 
                _s.from('regioes').select('*') 
            ]);
            produtos = p.data; vars = v.data;
            
            let htmlOrigem = '<option value="">ORIGEM...</option>';
            r.data.forEach(reg => { htmlOrigem += `<option value="${reg.id}">${reg.bandeira || ''} ${reg.nome}</option>`; });
            document.getElementById('f_orig').innerHTML = htmlOrigem;
            
            upTab();
        };

        const rndUp = v => Math.ceil(v / 10) * 10;
        const mascara = i => { let v=i.value.replace(/\D/g, ''); if(!v){i.value='';return;} i.value=(parseFloat(v)/100).toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, "."); };
        const parseP = v => v ? parseFloat(v.toString().replace(/\./g, '').replace(',', '.')) : 0;
        const getAppleColorHex = c => { let s=(c||'').toUpperCase(); if(s.includes('PRETO')||s.includes('BLACK')) return '#191919'; if(s.includes('BRANCO')||s.includes('WHITE')) return '#f5f5f7'; return '#808080'; };

        function selTipo(t) {
            document.getElementById('f_tipo').value = t;
            document.getElementById('btN').classList.toggle('active', t==='Novo'); 
            document.getElementById('btS').classList.toggle('active', t==='Seminovo');
            document.getElementById('z_semi').classList.toggle('hidden', t==='Novo');
            document.getElementById('f_mod').innerHTML = '<option value="">MODELO...</option>' + produtos.map(x=>`<option value="${x.id}">${x.nome}</option>`).join('');
            document.getElementById('f_mod').disabled = false; document.getElementById('s1').classList.add('active');
        }
        function libMem() {
            let p = document.getElementById('f_mod').value;
            let caps = [...new Set(vars.filter(v => v.produto_id == p).map(v => v.capacidade))];
            document.getElementById('f_cap').innerHTML = '<option value="">MEMÓRIA...</option>' + caps.map(c=>`<option value="${c}">${c}</option>`).join('');
            document.getElementById('f_cap').disabled = false; document.getElementById('s2').classList.add('active');
        }
        function libCor() {
            let p = document.getElementById('f_mod').value, c = document.getElementById('f_cap').value;
            let cores = vars.filter(v => v.produto_id == p && v.capacidade == c).map(v => v.cor);
            document.getElementById('f_cor').innerHTML = '<option value="">COR...</option>' + cores.map(co=>`<option value="${co}">${co.toUpperCase()}</option>`).join('');
            document.getElementById('f_cor').disabled = false; document.getElementById('s3').classList.add('active');
        }
        function libDet() { document.getElementById('s4').classList.add('active'); document.getElementById('btnS').classList.remove('hidden'); }

        async function doPost(e) {
            e.preventDefault();
            let tipo = document.getElementById('f_tipo').value;
            let v = vars.find(x => x.produto_id == document.getElementById('f_mod').value && x.capacidade == document.getElementById('f_cap').value && x.cor == document.getElementById('f_cor').value);
            let isBrl = document.getElementById('f_brl').value.length > 0;
            let pFinal = isBrl ? parseP(document.getElementById('f_brl').value) : parseP(document.getElementById('f_usd').value);
            await _s.from('ofertas').insert([{
                fornecedor_id: loja.id, variacao_id: v.id, regiao_id: document.getElementById('f_orig').value,
                preco: pFinal, moeda: isBrl ? 'BRL' : 'USD', quantidade: parseInt(document.getElementById('f_qtd').value),
                condicao: tipo==='Novo'?'NOVO':document.getElementById('f_cond').value.toUpperCase(),
                saude_bateria: document.getElementById('f_bat').value, status_aprovacao: 'aprovado'
            }]);
            window.location.reload();
        }

        async function upTab() {
            const { data } = await _s.from('ofertas').select('*, variacoes(capacidade, cor, produtos_mestre(nome)), regioes(nome, bandeira)').eq('fornecedor_id', loja.id).order('criado_em', {ascending:false});
            ofertas = data || [];
            document.getElementById('lista').innerHTML = ofertas.map(o => `
                <tr class="hover:bg-white/5 border-b border-[#2c2c2e]">
                    <td><input type="checkbox" class="chk" value="${o.id}" onclick="upBulkCount()"></td>
                    <td>
                        <div class="flex items-center mb-1"><span class="color-dot" style="background:${getAppleColorHex(o.variacoes.cor)}"></span><p class="font-black text-[#fff] text-[12px]">${o.variacoes.produtos_mestre.nome} ${o.variacoes.capacidade}</p></div>
                        <p class="text-[9px] text-gray-400 mb-1 ml-5">${o.variacoes.cor} | ${o.condicao}</p>
                        <button onclick="del(${o.id})" class="text-red-500 font-bold text-[9px] ml-5">Apagar</button>
                    </td>
                    <td class="text-center"><input type="number" class="mini-edit" value="${o.quantidade}" onblur="edit(${o.id}, 'quantidade', this.value)"></td>
                    <td class="text-center font-mono font-black text-white">${o.moeda==='BRL'?'R$':'$'} <input type="text" class="mini-edit mini-edit-preco" value="${o.preco.toLocaleString('pt-BR')}" oninput="mascara(this)" onblur="edit(${o.id}, 'preco', this.value)"></td>
                </tr>`).join('');
            
            let t = ofertas.reduce((a, b) => a + (b.quantidade || 0), 0), tg = [];
            if(t>=1000) tg.push('<span class="insignia-badge califa">👑 CALIFA</span>');
            else if(t>=200) tg.push('<span class="insignia-badge rei">🛡️ REI</span>');
            else if(t>=50) tg.push('<span class="insignia-badge magnata">💰 MAGNATA</span>');
            document.getElementById('blocoInsignias').innerHTML = tg.join('');
        }

        async function edit(id, c, v) { let val = (c === 'preco') ? parseP(v) : parseInt(v); await _s.from('ofertas').update({[c]:val}).eq('id',id); upTab(); }
        function selAll(m) { document.querySelectorAll('.chk').forEach(c=>c.checked=m.checked); upBulkCount(); }
        function upBulkCount() { document.getElementById('bulkCount').innerText = document.querySelectorAll('.chk:checked').length; }
        async function del(id) { if(confirm("Apagar?")) { await _s.from('ofertas').delete().eq('id',id); upTab(); } }
        async function bulkDel() { let ids = Array.from(document.querySelectorAll('.chk:checked')).map(c=>parseInt(c.value)); if(ids.length && confirm("Apagar lote?")) { await _s.from('ofertas').delete().in('id',ids); upTab(); } }
        function abrirBulk() { document.getElementById('bulkModal').classList.remove('hidden'); }
        function fecharBulk() { document.getElementById('bulkModal').classList.add('hidden'); }
        async function doBulk(e) { e.preventDefault(); let ids = Array.from(document.querySelectorAll('.chk:checked')).map(c=>parseInt(c.value)); let p = parseP(document.getElementById('b_preco').value), q = document.getElementById('b_qtd').value; let u = {}; if(p) u.preco = p; if(q!=='') u.quantidade = parseInt(q); await _s.from('ofertas').update(u).in('id', ids); fecharBulk(); upTab(); }
        
        function logout() { localStorage.clear(); window.location.replace('index.html'); }
    </script>
</body>
</html>
