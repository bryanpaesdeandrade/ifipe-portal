<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Painel do Anunciante</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #38383a; --input: #2c2c2e; }
        body { background: var(--bg); color: var(--text); font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin:0; }
        .user-bar { background:rgba(28, 28, 30, 0.8); backdrop-filter:blur(15px); border-bottom:1px solid var(--border); padding:10px 20px; position:sticky; top:0; z-index:100; }
        .apple-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 1.5rem; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .apple-input { background: var(--input); border: 1px solid var(--border); border-radius: 10px; padding: 10px; width: 100%; color: var(--text); outline: none; font-size: 13px; transition: 0.3s; }
        .apple-input:focus { border-color: #0071e3; }
        .apple-button { background: #fff; color: #000; font-weight: 900; border-radius: 50px; padding: 12px; width: 100%; cursor: pointer; text-transform: uppercase; border: none; font-size: 11px; transition: 0.3s; }
        .apple-button:hover { background: #0071e3; color: #fff; }
        table { width: 100%; border-collapse: collapse; }
        th { font-size: 10px; color: #86868b; text-transform: uppercase; padding: 10px; text-align: left; border-bottom: 1px solid var(--border); }
        td { padding: 10px; border-bottom: 1px solid var(--input); font-size: 12px; }
        .mini-edit { background: transparent; border: 1px solid transparent; color: #32d74b; font-weight: bold; width: 85px; text-align: center; border-radius: 4px; padding: 4px; }
        .mini-edit:focus { border-color: #0071e3; background: #2c2c2e; outline: none; }
        .btn-acao { font-weight: bold; cursor: pointer; font-size: 9px; text-transform: uppercase; padding: 4px 8px; border-radius: 4px; display: inline-block; }
        .btn-del { background: rgba(255, 59, 48, 0.2); color: #ff3b30; }
        .taxa-widget { background: #1c1c1e; border: 1px solid #38383a; border-radius: 12px; padding: 8px 20px; display: flex; flex-direction: column; align-items: flex-start; }
        .btn-wpp { background: #25d366; color: #000; font-weight: 900; border-radius: 50px; padding: 12px; width: 100%; cursor: pointer; text-transform: uppercase; border: none; font-size: 10px; transition: 0.3s; display: block; text-align: center; text-decoration: none; }
        .selo-verificado { background: #ffcc00; color: #000; padding: 2px 8px; border-radius: 4px; font-size: 9px; font-weight: 900; margin-left: 5px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="authSection" class="flex items-center justify-center min-h-screen px-4">
        <div class="apple-card max-w-[400px] text-center w-full">
            <h1 class="text-5xl font-black italic mb-2">iFipe</h1>
            <div id="loginForm">
                <p class="text-[10px] font-bold uppercase text-blue-500 mb-8 tracking-[0.4em]">Painel Anunciante</p>
                <form onsubmit="realizarLoginAnunciante(event)">
                    <input type="text" id="logLoja" class="apple-input mb-3" placeholder="Nome da Loja" required>
                    <input type="password" id="logPass" class="apple-input mb-4" placeholder="Senha" required>
                    <button type="submit" class="apple-button w-full">Entrar</button>
                    <button type="button" onclick="toggleAuth()" class="text-[10px] text-gray-500 mt-6 block w-full">Quero me cadastrar</button>
                </form>
            </div>
            <div id="registerForm" class="hidden">
                <p class="text-[10px] font-bold uppercase text-green-500 mb-8 tracking-[0.4em]">Solicitar Cadastro</p>
                <form onsubmit="registrarLojista(event)">
                    <input type="text" id="regNome" class="apple-input mb-2" placeholder="Nome da Loja" required>
                    <input type="text" id="regWhats" class="apple-input mb-2" placeholder="WhatsApp" required>
                    <input type="password" id="regSenha" class="apple-input mb-4" placeholder="Crie uma Senha" required>
                    <button type="submit" class="apple-button w-full bg-green-600 text-white">Solicitar</button>
                    <button type="button" onclick="toggleAuth()" class="text-[10px] text-gray-500 mt-6 block w-full">Voltar</button>
                </form>
            </div>
            <p id="authMsg" class="mt-4 text-[10px] font-bold text-red-500 uppercase"></p>
        </div>
    </div>

    <div id="dashboardSection" class="hidden">
        <div class="user-bar">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-4">
                    <div class="text-[10px] font-black uppercase">LOJA: <span id="nomeLoja" class="text-blue-500">...</span> <span id="seloLoja" class="hidden selo-verificado">✔️ VERIFICADO</span></div>
                    <div class="taxa-widget">
                        <span class="text-[8px] text-gray-500 font-black uppercase">Binance Real</span>
                        <span id="tickerBinance" class="text-[11px] font-mono text-white">R$ 0,00</span>
                    </div>
                    <div class="taxa-widget border-[#32d74b]">
                        <span class="text-[8px] text-[#32d74b] font-black uppercase">Taxa VIP</span>
                        <span id="suaTaxaUsdt" class="text-[12px] font-mono font-black text-[#32d74b]">R$ --</span>
                    </div>
                </div>
                <button onclick="sairPainel()" class="text-[10px] text-red-500 font-black">SAIR</button>
            </div>
        </div>

        <div class="max-w-7xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <div class="apple-card border-[#32d74b]">
                    <h3 class="text-xs font-black uppercase mb-4 text-[#32d74b]">Simulador USDT</h3>
                    <input type="text" id="compraUsd" class="apple-input mb-4" placeholder="$ 0,00" oninput="mascararMoeda(this); calcularCompraUsdt()">
                    <div class="p-4 bg-black rounded-xl border border-gray-800 mb-4">
                        <span id="resultadoCompraBrl" class="text-xl font-black text-[#32d74b]">R$ 0,00</span>
                    </div>
                    <a href="https://wa.me/15616760652?text=Olá%20Oráculo%20venho%20através%20do%20iFipe%20e%20preciso%20comprar%20USDT" target="_blank" class="btn-wpp">comprar agora no WhatsApp</a>
                </div>

                <div class="apple-card">
                    <h2 class="text-sm font-black italic mb-4 uppercase">Novo Anúncio</h2>
                    <form id="priceForm" onsubmit="salvarOferta(event)">
                        <select id="filtro_grupo" class="apple-input mb-2" onchange="popularProdutos()" required><option value="">Categoria...</option><option value="1">IPHONE</option><option value="2">APPLE WATCH</option><option value="4">MACBOOK</option></select>
                        <select id="produto_id" class="apple-input mb-2" onchange="aoMudarProduto()" required></select>
                        <div id="gradeOpcoes"></div>
                        <select id="condicao" class="apple-input mt-2" onchange="checarGarantia()"><option value="Novo">Novo</option><option value="Seminovo">Seminovo</option><option value="CPO">CPO</option><option value="AS IS +">AS IS +</option><option value="GRADE A LEILAO">GRADE A LEILÃO</option><option value="REPASSE DE CLIENTE">REPASSE DE CLIENTE</option></select>
                        <input type="number" id="quantidade" class="apple-input mt-2" placeholder="Qtd" min="0" required>
                        <input type="text" id="garantia" class="apple-input mt-2" placeholder="Garantia">
                        <select id="regiao_id" class="apple-input mt-2" required></select>
                        <div class="grid grid-cols-2 gap-2 mt-2">
                            <input type="text" id="preco_brl" class="apple-input" placeholder="R$" oninput="mascararMoeda(this); limparPreco('brl')">
                            <input type="text" id="preco_usd" class="apple-input" placeholder="$" oninput="mascararMoeda(this); limparPreco('usd')">
                        </div>
                        <div class="mt-4 p-4 bg-[#2c2c2e] rounded-xl grid grid-cols-2 gap-2">
                            <label class="text-[10px] flex items-center gap-2"><input type="checkbox" id="add_pix"> PIX</label>
                            <label class="text-[10px] flex items-center gap-2"><input type="checkbox" id="add_usdt"> USDT</label>
                            <label class="text-[10px] flex items-center gap-2"><input type="checkbox" id="add_boy"> MOTOBOY</label>
                            <label class="text-[10px] flex items-center gap-2"><input type="checkbox" id="add_nota"> NF</label>
                        </div>
                        <button type="submit" class="apple-button w-full bg-blue-600 text-white mt-4">Publicar</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-3 space-y-4">
                <div id="bulkBar" class="bg-blue-600 p-4 rounded-2xl flex justify-between items-center">
                    <span class="text-xs font-black text-white"><span id="bulkCount">0</span> Selecionados</span>
                    <div class="flex gap-2">
                        <button onclick="abrirBulkEdit()" class="bg-white text-blue-600 px-4 py-2 rounded-full text-[9px] font-black uppercase">Editar Massa</button>
                        <button onclick="bulkDelete()" class="bg-red-500 text-white px-4 py-2 rounded-full text-[9px] font-black uppercase">Apagar</button>
                    </div>
                </div>

                <div class="apple-card">
                    <h2 class="text-sm font-black italic uppercase mb-4">Base de Dados</h2>
                    <div class="overflow-x-auto">
                        <table>
                            <thead><tr><th width="30"><input type="checkbox" onclick="toggleAll(this)"></th><th>Produto</th><th class="text-center">Qtd</th><th class="text-center">Preço</th><th class="text-right">Ação</th></tr></thead>
                            <tbody id="listaAtivos"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="bulkEditModal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[1100] p-4 overflow-y-auto">
        <div class="apple-card max-w-[650px] w-full border-green-500 my-8">
            <h3 class="text-lg font-black uppercase mb-4 text-green-500">Super Edição em Massa</h3>
            <form onsubmit="salvarBulkChanges(event)">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div><label class="text-[9px] uppercase font-black text-gray-500">Condição</label><select id="bulk_condicao" class="apple-input"><option value="">-- Não Alterar --</option><option value="Novo">Novo</option><option value="Seminovo">Seminovo</option><option value="CPO">CPO</option><option value="GRADE A LEILAO">GRADE A LEILÃO</option></select></div>
                    <div><label class="text-[9px] uppercase font-black text-gray-500">Preço Único</label><input type="text" id="bulk_preco" class="apple-input" oninput="mascararMoeda(this)"></div>
                    <div><label class="text-[9px] uppercase font-black text-gray-500">Garantia</label><input type="text" id="bulk_garantia" class="apple-input"></div>
                    <div><label class="text-[9px] uppercase font-black text-gray-500">Origem</label><select id="bulk_regiao" class="apple-input"></select></div>
                </div>
                <div class="mt-6 p-4 bg-[#2c2c2e] rounded-xl grid grid-cols-2 md:grid-cols-3 gap-4">
                    <div class="flex flex-col gap-1"><span class="text-[8px] text-gray-400 font-black">PIX</span><select id="b_pix" class="apple-input text-[10px]"><option value="keep">MANTER</option><option value="true">ATIVAR</option><option value="false">DESATIVAR</option></select></div>
                    <div class="flex flex-col gap-1"><span class="text-[8px] text-gray-400 font-black">USDT</span><select id="b_usdt" class="apple-input text-[10px]"><option value="keep">MANTER</option><option value="true">ATIVAR</option><option value="false">DESATIVAR</option></select></div>
                    <div class="flex flex-col gap-1"><span class="text-[8px] text-gray-400 font-black">NF</span><select id="b_nota" class="apple-input text-[10px]"><option value="keep">MANTER</option><option value="true">ATIVAR</option><option value="false">DESATIVAR</option></select></div>
                </div>
                <div class="flex gap-2 mt-8">
                    <button type="button" onclick="fecharBulkEdit()" class="apple-button bg-gray-600 text-white w-1/3">Sair</button>
                    <button type="submit" id="btnSalvarBulk" class="apple-button bg-green-600 text-white w-2/3">Aplicar em Massa</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let loja = null, produtosMestre = [], gradeVariacoes = [], suaTaxaFinal = 0;

        window.onload = async () => {
            const token = localStorage.getItem('iFipe_Anunciante');
            if (token) {
                const { data } = await _s.from('fornecedores').select('*').eq('id', token).maybeSingle();
                if(data?.ativo) { loja = data; liberarDashboard(); } 
                else { localStorage.removeItem('iFipe_Anunciante'); }
            }
        };

        function toggleAuth() { document.getElementById('loginForm').classList.toggle('hidden'); document.getElementById('registerForm').classList.toggle('hidden'); }

        async function realizarLoginAnunciante(e) {
            e.preventDefault();
            const { data } = await _s.from('fornecedores').select('*').ilike('nome', document.getElementById('logLoja').value.trim()).eq('senha', document.getElementById('logPass').value).maybeSingle();
            if (data && data.ativo) { localStorage.setItem('iFipe_Anunciante', data.id); loja = data; liberarDashboard(); } 
            else { document.getElementById('authMsg').innerText = "ERRO DE ACESSO OU PENDENTE."; }
        }

        async function registrarLojista(e) {
            e.preventDefault();
            await _s.from('fornecedores').insert([{ nome: document.getElementById('regNome').value.trim(), whatsapp: document.getElementById('regWhats').value, senha: document.getElementById('regSenha').value, ativo: false }]);
            alert("SOLICITADO! AGUARDE APROVAÇÃO."); toggleAuth();
        }

        function liberarDashboard() {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');
            document.getElementById('nomeLoja').innerText = loja.nome;
            if(loja.verificado) document.getElementById('seloLoja').classList.remove('hidden');
            init();
        }

        async function init() {
            iniciarTicker();
            const [p, r, v] = await Promise.all([ _s.from('produtos_mestre').select('*').order('nome'), _s.from('regioes').select('*').order('nome'), _s.from('variacoes').select('*') ]);
            produtosMestre = p.data; gradeVariacoes = v.data;
            const regOptions = r.data.map(x => `<option value="${x.id}">${x.bandeira} ${x.nome}</option>`).join('');
            document.getElementById('regiao_id').innerHTML = '<option value="">Origem...</option>' + regOptions;
            document.getElementById('bulk_regiao').innerHTML = '<option value="">-- Manter --</option>' + regOptions;
            atualizarLista();
        }

        function iniciarTicker() {
            const socket = new WebSocket('wss://stream.binance.com:9443/ws/usdtbrl@ticker');
            socket.onmessage = (e) => {
                const real = parseFloat(JSON.parse(e.data).c);
                suaTaxaFinal = real + 0.07;
                document.getElementById('tickerBinance').innerText = `R$ ${real.toFixed(4).replace('.',',')}`;
                document.getElementById('suaTaxaUsdt').innerText = `R$ ${suaTaxaFinal.toFixed(4).replace('.',',')}`;
            };
        }

        function mascararMoeda(input) {
            let v = input.value.replace(/\D/g, ''); 
            if (v === '') { input.value = ''; return; }
            v = (parseFloat(v) / 100).toFixed(2).replace('.', ',');
            input.value = v.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        }

        function parsePreco(v) { return v ? parseFloat(v.toString().replace(/\./g, '').replace(',', '.')) : 0; }
        function popularProdutos() {
            const g = document.getElementById('filtro_grupo').value;
            const filtrados = produtosMestre.filter(x => x.grupo_id == g);
            document.getElementById('produto_id').innerHTML = '<option value="">Modelo...</option>' + filtrados.map(x => `<option value="${x.id}">${x.nome}</option>`).join('');
        }

        function aoMudarProduto() {
            const pid = document.getElementById('produto_id').value;
            const vars = gradeVariacoes.filter(x => x.produto_id == pid);
            let html = '<div class="grid grid-cols-1 gap-2 mt-2">';
            const caps = [...new Set(vars.map(x => x.capacidade).filter(Boolean))];
            if(caps.length) html += `<select id="f_cap" class="apple-input">${caps.map(c => `<option value="${c}">${c}</option>`).join('')}</select>`;
            html += '<select id="f_cor" class="apple-input"><option value="MIXER COLORS">MIXER COLORS</option></select></div>';
            document.getElementById('gradeOpcoes').innerHTML = html;
        }

        function checarGarantia() {
            const cond = document.getElementById('condicao').value, g = document.getElementById('garantia');
            if(cond === 'Novo') { g.value = "1 ANO APPLE"; g.readOnly = true; } else { g.value = ""; g.readOnly = false; }
        }

        async function salvarOferta(e) {
            e.preventDefault();
            const pid = document.getElementById('produto_id').value;
            const v = gradeVariacoes.find(x => x.produto_id == pid);
            const pBrl = parsePreco(document.getElementById('preco_brl').value), pUsd = parsePreco(document.getElementById('preco_usd').value);
            
            await _s.from('ofertas').insert([{
                fornecedor_id: loja.id, variacao_id: v.id, regiao_id: document.getElementById('regiao_id').value,
                preco: pBrl || pUsd, moeda: pBrl > 0 ? 'BRL' : 'USD', 
                quantidade: parseInt(document.getElementById('quantidade').value), 
                condicao: document.getElementById('condicao').value, garantia: document.getElementById('garantia').value,
                aceita_pix: document.getElementById('add_pix').checked, aceita_usdt: document.getElementById('add_usdt').checked,
                tem_boy: document.getElementById('add_boy').checked, emite_nota: document.getElementById('add_nota').checked,
                data_alteracao_preco: new Date().toISOString()
            }]);
            alert("Publicado!"); atualizarLista(); e.target.reset();
        }

        async function atualizarLista() {
            const { data } = await _s.from('ofertas').select('*, variacoes(*, produtos_mestre(*))').eq('fornecedor_id', loja.id).order('criado_em', {ascending: false});
            document.getElementById('listaAtivos').innerHTML = (data || []).map(o => `
                <tr><td><input type="checkbox" class="offer-check" value="${o.id}" onchange="updateBulkCount()"></td>
                <td><b>${o.variacoes.produtos_mestre.nome}</b><br><small>${o.variacoes.capacidade || ''}</small></td>
                <td class="text-center"><input type="number" class="mini-edit" value="${o.quantidade}" onblur="salvarRapido(${o.id}, 'quantidade', this.value)"></td>
                <td class="text-center"><input type="text" class="mini-edit" value="${o.preco.toLocaleString('pt-BR',{minimumFractionDigits:2})}" oninput="mascararMoeda(this)" onblur="salvarRapido(${o.id}, 'preco', this.value)"></td>
                <td class="text-right"><span class="btn-acao btn-del" onclick="excluirAnuncio(${o.id})">X</span></td></tr>
            `).join('');
        }

        async function salvarRapido(id, campo, valor) {
            let vFinal = (campo === 'preco') ? parsePreco(valor) : parseInt(valor);
            if (campo === 'preco') {
                const { data: antiga } = await _s.from('ofertas').select('preco').eq('id', id).single();
                let tag = (antiga && vFinal < antiga.preco) ? 'OPORTUNIDADE DE COMPRA' : (antiga && vFinal > antiga.preco ? 'PREÇO ATUALIZADO' : null);
                await _s.from('ofertas').update({ preco: vFinal, preco_anterior: antiga.preco, obs_preco: tag, data_alteracao_preco: new Date().toISOString() }).eq('id', id);
            } else { await _s.from('ofertas').update({ [campo]: vFinal }).eq('id', id); }
        }

        function updateBulkCount() { document.getElementById('bulkCount').innerText = document.querySelectorAll('.offer-check:checked').length; }
        function toggleAll(master) { document.querySelectorAll('.offer-check').forEach(c => c.checked = master.checked); updateBulkCount(); }
        function abrirBulkEdit() { document.getElementById('bulkEditCountLabel').innerText = document.querySelectorAll('.offer-check:checked').length; document.getElementById('bulkEditModal').classList.remove('hidden'); }
        function fecharBulkEdit() { document.getElementById('bulkEditModal').classList.add('hidden'); }

        async function salvarBulkChanges(e) {
            e.preventDefault();
            const ids = Array.from(document.querySelectorAll('.offer-check:checked')).map(c => parseInt(c.value));
            const newPreco = parsePreco(document.getElementById('bulk_preco').value);
            const { data: atuais } = await _s.from('ofertas').select('id, preco').in('id', ids);

            for (let item of atuais) {
                let up = {};
                if(newPreco > 0) {
                    up.preco = newPreco;
                    up.preco_anterior = item.preco;
                    up.data_alteracao_preco = new Date().toISOString();
                    up.obs_preco = newPreco < item.preco ? 'OPORTUNIDADE DE COMPRA' : 'PREÇO ATUALIZADO';
                }
                if(document.getElementById('bulk_condicao').value) up.condicao = document.getElementById('bulk_condicao').value;
                if(document.getElementById('bulk_garantia').value) up.garantia = document.getElementById('bulk_garantia').value;
                
                const molduras = { aceita_pix: 'b_pix', aceita_usdt: 'b_usdt', emite_nota: 'b_nota' };
                for (let [key, id] of Object.entries(molduras)) {
                    const val = document.getElementById(id).value;
                    if(val !== 'keep') up[key] = (val === 'true');
                }
                await _s.from('ofertas').update(up).eq('id', item.id);
            }
            alert("Massa atualizada!"); fecharBulkEdit(); atualizarLista();
        }

        async function excluirAnuncio(id) { if(confirm("Excluir?")) { await _s.from('ofertas').delete().eq('id', id); atualizarLista(); } }
        function sairPainel() { localStorage.removeItem('iFipe_Anunciante'); window.location.reload(); }
    </script>
</body>
</html>
