<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe BUSINESS - PAINEL DO ANUNCIANTE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #38383a; --blue: #0071e3; }
        body { background: var(--bg); color: var(--text); font-family:-apple-system, sans-serif; margin:0; text-transform: uppercase; }
        .apple-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 1.5rem; }
        .apple-input { background: #2c2c2e; border: 1px solid var(--border); border-radius: 10px; padding: 10px; width: 100%; color: #fff; outline: none; font-size: 11px; text-transform: uppercase; }
        .apple-button { background: #fff; color: #000; font-weight: 900; border-radius: 50px; padding: 12px; cursor: pointer; border: none; font-size: 10px; transition: 0.3s; }
        .apple-button:hover { background: var(--blue); color: #fff; }
        .mini-edit { background: transparent; border: 1px solid transparent; color: #32d74b; font-weight: 800; width: 70px; text-align: center; font-family: 'JetBrains Mono'; }
        .mini-edit:focus { border-color: var(--blue); background: #2c2c2e; outline: none; }
        .step-block { margin-bottom: 12px; border-left: 2px solid #38383a; padding-left: 15px; opacity: 0.3; pointer-events: none; transition: 0.3s; }
        .step-block.active { border-left-color: var(--blue); opacity: 1; pointer-events: auto; }
        .btn-tipo { background: #2c2c2e; border: 2px solid #38383a; color: #fff; padding: 12px; border-radius: 12px; font-weight: 900; font-size: 10px; cursor: pointer; width: 100%; display: flex; flex-direction: column; align-items: center; }
        .btn-tipo.active { border-color: var(--blue); color: var(--blue); background: rgba(0,113,227,0.1); }
        table { width: 100%; border-collapse: collapse; }
        td, th { padding: 10px; border-bottom: 1px solid #2c2c2e; font-size: 10px; text-align: left; }
        #btnSubir { position: fixed; bottom: 20px; right: 20px; background: var(--blue); color: #fff; font-weight: 900; font-size: 10px; padding: 12px 18px; border-radius: 50px; cursor: pointer; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 1000; border: none; }
        #btnSubir.show { opacity: 1; pointer-events: auto; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-4 md:p-6">

    <button id="btnSubir" onclick="window.scrollTo({top:0, behavior:'smooth'})">⬆️ SUBIR</button>

    <header class="max-w-[1400px] mx-auto bg-black border-b border-[#38383a] p-4 mb-6 flex flex-col md:flex-row justify-between items-center gap-4 rounded-2xl">
        <div class="flex items-center gap-4">
            <h1 class="text-2xl font-black italic">iFipe</h1>
            <p id="dashNome" class="font-bold text-xs text-blue-400 border-l border-[#38383a] pl-4">ANUNCIANTE</p>
        </div>
        <div class="flex flex-wrap items-center gap-4">
            <div class="text-right">
                <p class="text-[7px] text-gray-500 font-black">ÍNDICE BINANCE REAL</p>
                <p id="tBin" class="text-xs font-mono font-black text-yellow-400">R$ --</p>
            </div>
            <button onclick="logout()" class="text-[10px] text-red-500 font-black border border-red-500/20 px-4 py-2 rounded-full">SAIR DO PAINEL</button>
        </div>
    </header>

    <main class="max-w-[1400px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        <div class="lg:col-span-4">
            <div class="apple-card sticky top-24">
                <h2 class="text-xs font-black text-blue-500 mb-4 italic">PUBLICAR OFERTA</h2>
                <div class="grid grid-cols-2 gap-2 mb-4">
                    <button id="btN" class="btn-tipo" onclick="selTipo('Novo')">📦 NOVO</button>
                    <button id="btS" class="btn-tipo" onclick="selTipo('Seminovo')">♻️ SEMINOVO</button>
                </div>
                <form onsubmit="doPost(event)" class="space-y-4">
                    <input type="hidden" id="f_tipo">
                    <div class="step-block" id="s1"><span class="step-label">1. Modelo</span><select id="f_mod" class="apple-input" onchange="libMem()" required disabled></select></div>
                    <div class="step-block" id="s2"><span class="step-label">2. Memória</span><select id="f_cap" class="apple-input" onchange="libCor()" required disabled></select></div>
                    <div class="step-block" id="s3"><span class="step-label">3. Cor</span><select id="f_cor" class="apple-input" onchange="libDet()" required disabled></select></div>
                    <div class="step-block" id="s4">
                        <span class="step-label">4. Detalhes (Mínimo 1)</span>
                        <div id="z_semi" class="hidden space-y-2 mb-2">
                            <select id="f_cond" class="apple-input"><option value="Seminovo">Seminovo Padrão</option><option value="CPO">CPO Apple</option><option value="Grade A">Grade A</option></select>
                            <input type="text" id="f_bat" class="apple-input" placeholder="Bateria %">
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="number" id="f_qtd" class="apple-input" placeholder="Qtd" min="1" oninput="if(this.value<1)this.value=1" required>
                            <select id="f_orig" class="apple-input" required></select>
                        </div>
                        <div class="grid grid-cols-2 gap-2 mt-2">
                            <input type="text" id="f_brl" class="apple-input text-green-400 font-bold" placeholder="R$ BRL" oninput="mascara(this); if(this.value<0)this.value=0; document.getElementById('f_usd').value=''">
                            <input type="text" id="f_usd" class="apple-input text-blue-400 font-bold" placeholder="$ USD" oninput="mascara(this); if(this.value<0)this.value=0; document.getElementById('f_brl').value=''">
                        </div>
                        <div class="grid grid-cols-2 gap-1 mt-2 bg-black p-2 rounded-lg border border-[#38383a]">
                            <label class="text-[8px] flex items-center gap-1 font-black"><input type="checkbox" id="m_pix"> PIX</label>
                            <label class="text-[8px] flex items-center gap-1 font-black"><input type="checkbox" id="m_usdt"> USDT</label>
                            <label class="text-[8px] flex items-center gap-1 font-black"><input type="checkbox" id="m_neg"> NEGOCIA QTD</label>
                            <label class="text-[8px] flex items-center gap-1 font-black"><input type="checkbox" id="m_envi"> ENVIO</label>
                            <label class="text-[8px] flex items-center gap-1 font-black"><input type="checkbox" id="m_cole"> COLETA</label>
                            <label class="text-[8px] flex items-center gap-1 font-black"><input type="checkbox" id="m_nota"> EMITE NF</label>
                        </div>
                        <button type="submit" id="btnS" class="apple-button bg-blue-600 text-white w-full mt-4 hidden">PUBLICAR AGORA</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="lg:col-span-8">
            <div class="apple-card min-h-[600px] flex flex-col">
                <div class="flex justify-between items-center mb-4 bg-blue-900/20 p-3 rounded-xl border border-blue-500/30">
                    <span class="text-[9px] font-black uppercase"><span id="bulkCount">0</span> Selecionados</span>
                    <div class="flex gap-2">
                        <button onclick="abrirBulk()" class="bg-white text-blue-600 px-3 py-1.5 rounded-full text-[8px] font-black uppercase">Editar Massa</button>
                        <button onclick="bulkDel()" class="bg-red-600 text-white px-3 py-1.5 rounded-full text-[8px] font-black uppercase">Apagar</button>
                    </div>
                </div>
                <div class="overflow-x-auto">
                    <table>
                        <thead><tr><th width="30"><input type="checkbox" onclick="selAll(this)"></th><th>Modelo / Grade</th><th class="text-center">Qtd</th><th class="text-center">Preço (Arredondado)</th><th class="text-right">Ação</th></tr></thead>
                        <tbody id="lista"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <div id="bulkModal" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[2000] p-4">
        <div class="apple-card max-w-[450px] w-full border-blue-500">
            <h3 class="text-xs font-black uppercase text-blue-500 mb-4">EDIÇÃO EM MASSA</h3>
            <form onsubmit="doBulk(event)" class="space-y-4">
                <div class="grid grid-cols-2 gap-2">
                    <input type="text" id="b_preco" class="apple-input" placeholder="NOVO PREÇO" oninput="mascara(this)">
                    <input type="number" id="b_qtd" class="apple-input" placeholder="NOVA QTD" min="1">
                </div>
                <div class="grid grid-cols-3 gap-2 bg-black p-3 rounded-xl border border-[#38383a]">
                    <label class="text-[8px] font-black"><input type="checkbox" id="bk_pix"> PIX</label>
                    <label class="text-[8px] font-black"><input type="checkbox" id="bk_usdt"> USDT</label>
                    <label class="text-[8px] font-black"><input type="checkbox" id="bk_neg"> NEGOCIA</label>
                    <label class="text-[8px] font-black"><input type="checkbox" id="bk_envi"> ENVIOS</label>
                    <label class="text-[8px] font-black"><input type="checkbox" id="bk_cole"> COLETA</label>
                    <label class="text-[8px] font-black"><input type="checkbox" id="bk_nota"> NOTA</label>
                </div>
                <div class="flex gap-2">
                    <button type="button" onclick="fecharBulk()" class="apple-button bg-gray-600 text-white w-1/3">CANCELAR</button>
                    <button type="submit" class="apple-button bg-blue-600 text-white w-2/3">APLICAR</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let loja = null, produtos = [], vars = [], rate = 0;

        const rnd10 = v => Math.round(v / 10) * 10;
        const mascara = i => { let v=i.value.replace(/\D/g, ''); if(!v){i.value='';return;} i.value=(parseFloat(v)/100).toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, "."); };
        const parseP = v => v ? parseFloat(v.toString().replace(/\./g, '').replace(',', '.')) : 0;

        async function init() {
            const token = localStorage.getItem('iFipe_Anunciante');
            if(!token) return window.location.href = 'index.html';
            const { data: l } = await _s.from('fornecedores').select('*').eq('id', token).single();
            loja = l; document.getElementById('dashNome').innerText = l.nome;

            new WebSocket('wss://stream.binance.com:9443/ws/usdtbrl@ticker').onmessage = e => {
                rate = parseFloat(JSON.parse(e.data).c);
                document.getElementById('tBin').innerText = `R$ ${rate.toFixed(4)}`;
            };

            const [p, v, r] = await Promise.all([ _s.from('produtos_mestre').select('*').order('id'), _s.from('variacoes').select('*'), _s.from('regioes').select('*').order('id') ]);
            produtos = p.data; vars = v.data;
            document.getElementById('f_orig').innerHTML = '<option value="">ORIGEM...</option>' + r.data.map(x=>`<option value="${x.id}">${x.bandeira} ${x.nome}</option>`).join('');
            upTab();
        }

        function selTipo(t) {
            document.getElementById('f_tipo').value = t;
            document.getElementById('btN').classList.toggle('active', t==='Novo'); document.getElementById('btS').classList.toggle('active', t==='Seminovo');
            document.getElementById('z_semi').classList.toggle('hidden', t==='Novo');
            document.getElementById('f_mod').innerHTML = '<option value="">MODELO...</option>' + produtos.map(x=>`<option value="${x.id}">${x.nome}</option>`).join('');
            document.getElementById('f_mod').disabled = false; document.getElementById('s1').classList.add('active');
        }
        function libMem() {
            let p = document.getElementById('f_mod').value;
            let caps = [...new Set(vars.filter(v => v.produto_id == p).map(v => v.capacidade))];
            document.getElementById('f_cap').innerHTML = '<option value="">MEMÓRIA...</option>' + caps.map(c=>`<option value="${c}">${c}</option>`).join('');
            document.getElementById('f_cap').disabled = false; document.getElementById('s2').classList.add('active');
        }
        function libCor() {
            let p = document.getElementById('f_mod').value, c = document.getElementById('f_cap').value;
            let cores = vars.filter(v => v.produto_id == p && v.capacidade == c).map(v => v.cor);
            document.getElementById('f_cor').innerHTML = '<option value="">COR...</option>' + cores.map(co=>`<option value="${co}">${co.toUpperCase()}</option>`).join('');
            document.getElementById('f_cor').disabled = false; document.getElementById('s3').classList.add('active');
        }
        function libDet() { document.getElementById('s4').classList.add('active'); document.getElementById('btnS').classList.remove('hidden'); }

        async function doPost(e) {
            e.preventDefault();
            let v = vars.find(x => x.produto_id == document.getElementById('f_mod').value && x.capacidade == document.getElementById('f_cap').value && x.cor == document.getElementById('f_cor').value);
            let pb = parseP(document.getElementById('f_brl').value), pu = parseP(document.getElementById('f_usd').value);
            await _s.from('ofertas').insert([{
                fornecedor_id: loja.id, variacao_id: v.id, regiao_id: document.getElementById('f_orig').value,
                preco: rnd10(pb||pu), moeda: pb?'BRL':'USD', quantidade: Math.max(1, parseInt(document.getElementById('f_qtd').value)),
                condicao: document.getElementById('f_tipo').value==='Novo'?'Novo':document.getElementById('f_cond').value,
                saude_bateria: document.getElementById('f_bat').value || '100%',
                aceita_pix: document.getElementById('m_pix').checked, aceita_usdt: document.getElementById('m_usdt').checked, emite_nota: document.getElementById('m_nota').checked, faz_envio: document.getElementById('m_envi').checked, aceita_coleta: document.getElementById('m_cole').checked, aceita_proposta: document.getElementById('m_neg').checked, status_aprovacao: 'aprovado'
            }]);
            window.location.reload();
        }

        async function upTab() {
            const { data } = await _s.from('ofertas').select('*, variacoes(capacidade, cor, produtos_mestre(nome))').eq('fornecedor_id', loja.id).order('criado_em', {ascending:false});
            document.getElementById('lista').innerHTML = (data||[]).map(o => `
                <tr class="hover:bg-white/5">
                    <td><input type="checkbox" class="chk" value="${o.id}" onclick="upBulkCount()"></td>
                    <td><p class="font-black text-blue-400 text-[10px]">${o.variacoes.produtos_mestre.nome}</p><p class="text-[8px] text-gray-500">${o.variacoes.capacidade} | ${o.variacoes.cor} | ${o.condicao}</p></td>
                    <td class="text-center"><input type="number" class="mini-edit" value="${o.quantidade}" onblur="edit(${o.id}, 'quantidade', this.value)"></td>
                    <td class="text-center">${o.moeda==='BRL'?'R$':'$'} ${rnd10(o.preco).toLocaleString('pt-BR')}</td>
                    <td class="text-right"><button onclick="del(${o.id})" class="text-red-500 font-black text-[9px]">DEL</button></td>
                </tr>`).join('');
        }

        async function edit(id, c, v) { let val = c==='preco'?rnd10(parseP(v)):Math.max(1, parseInt(v)); await _s.from('ofertas').update({[c]:val}).eq('id',id); upTab(); }
        async function del(id) { if(confirm("APAGAR?")) { await _s.from('ofertas').delete().eq('id',id); upTab(); } }
        function selAll(m) { document.querySelectorAll('.chk').forEach(c=>c.checked=m.checked); upBulkCount(); }
        function upBulkCount() { document.getElementById('bulkCount').innerText = document.querySelectorAll('.chk:checked').length; }
        
        function abrirBulk() { if(!document.querySelectorAll('.chk:checked').length) return alert("SELECIONE!"); document.getElementById('bulkModal').classList.remove('hidden'); }
        function fecharBulk() { document.getElementById('bulkModal').classList.add('hidden'); }
        async function doBulk(e) {
            e.preventDefault();
            let ids = Array.from(document.querySelectorAll('.chk:checked')).map(c=>parseInt(c.value));
            let p=parseP(document.getElementById('b_preco').value), q=document.getElementById('b_qtd').value;
            let u = {}; if(p) u.preco = rnd10(p); if(q) u.quantidade = Math.max(1, parseInt(q));
            u.aceita_pix = document.getElementById('bk_pix').checked; u.aceita_usdt = document.getElementById('bk_usdt').checked; u.aceita_coleta = document.getElementById('bk_cole').checked; u.faz_envio = document.getElementById('bk_envi').checked; u.emite_nota = document.getElementById('bk_nota').checked; u.aceita_proposta = document.getElementById('bk_neg').checked;
            await _s.from('ofertas').update(u).in('id', ids); fecharBulk(); upTab();
        }
        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
        window.onscroll = () => document.getElementById('btnSubir').classList.toggle('show', window.scrollY > 300);
        window.onload = init;
    </script>
</body>
</html>
