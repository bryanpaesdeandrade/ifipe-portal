<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Painel do Anunciante</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background:#000; color:#fff; font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin:0; }
        .user-bar { background:rgba(28, 28, 30, 0.8); backdrop-filter:blur(15px); border-bottom:1px solid #38383a; padding:15px 20px; position:sticky; top:0; z-index:100; }
        .apple-card { background: #1c1c1e; border: 1px solid #38383a; border-radius: 24px; padding: 2rem; width: 100%; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .apple-input { background: #2c2c2e; border: 1px solid #38383a; border-radius: 12px; padding: 14px; width: 100%; color: white; outline: none; margin-bottom: 1rem; font-size: 14px; }
        .apple-button { background: #fff; color: #000; font-weight: 900; border-radius: 50px; padding: 16px; width: 100%; cursor: pointer; text-transform: uppercase; border: none; font-size: 13px; transition: 0.3s; }
        .apple-button:hover { background: #0071e3; color: #fff; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th { font-size: 10px; color: #86868b; text-transform: uppercase; padding: 12px; text-align: left; border-bottom: 1px solid #38383a; letter-spacing: 0.1em; }
        td { padding: 14px 12px; border-bottom: 1px solid #2c2c2e; font-size: 13px; }
        
        .mini-input { background: #2c2c2e; border: 1px solid #38383a; border-radius: 8px; padding: 6px; width: 80px; color: #fff; text-align: center; font-weight: bold; }
        .btn-acao { font-weight: bold; cursor: pointer; font-size: 10px; text-transform: uppercase; padding: 6px 10px; border-radius: 6px; display: inline-block; margin-bottom: 4px; }
        .btn-edit { background: rgba(0, 113, 227, 0.2); color: #0071e3; }
        .btn-edit:hover { background: #0071e3; color: #fff; }
        .btn-del { background: rgba(255, 59, 48, 0.2); color: #ff3b30; }
        .btn-del:hover { background: #ff3b30; color: #fff; }
        
        label { display: block; text-transform: uppercase; font-size: 10px; color: #86868b; margin-bottom: 6px; font-weight: 900; letter-spacing: 0.1em; }
        .hidden { display: none !important; }
        
        /* Layout Grade de Bateria */
        .battery-grid { display: grid; grid-template-cols: 1fr 1fr; gap: 8px; margin-bottom: 15px;}
        .battery-pill { padding: 12px 10px; border-radius: 10px; background: #2c2c2e; border: 1px solid #38383a; cursor: pointer; font-size: 10px; font-weight: 900; text-transform: uppercase; text-align: center; transition: 0.2s; color: #86868b; display: flex; align-items: center; justify-content: center; line-height: 1.2;}
        .battery-pill.active { background: #32d74b !important; color: #000 !important; border-color: #32d74b !important; box-shadow: 0 0 15px rgba(50, 215, 75, 0.3); }
        .pill-full { grid-column: span 2; }
    </style>
</head>
<body>

    <div id="editModal" class="hidden fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-[200] px-4">
        <div class="apple-card w-full max-w-[500px]">
            <h3 class="font-bold text-[14px] text-blue-500 mb-2 uppercase tracking-widest">Editar Anúncio</h3>
            <p id="edit_titulo" class="text-[12px] text-gray-400 font-bold mb-6 uppercase"></p>
            
            <form onsubmit="salvarEdicaoCompleta(event)">
                <input type="hidden" id="edit_id">
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label>Condição</label>
                        <select id="edit_condicao" class="apple-input" onchange="checarCondicaoEdicao()">
                            <option value="Novo">Novo</option>
                            <option value="Seminovo">Seminovo</option>
                            <option value="CPO">CPO</option>
                            <option value="Apple As Is">Apple As Is</option>
                            <option value="Apple As Is+">Apple As Is+</option>
                            <option value="GRADE A">GRADE A</option>
                            <option value="GRADE B">GRADE B</option>
                            <option value="GRADE C">GRADE C</option>
                        </select>
                    </div>
                    <div><label>Estoque</label><input type="number" id="edit_quantidade" class="apple-input" min="0" required></div>
                </div>

                <div id="edit_boxBateria" class="hidden">
                    <label class="text-green-500">Saúde da Bateria</label>
                    <div class="battery-grid">
                        <div class="battery-pill b-edit" data-val="ABAIXO DE 85%" onclick="setBatEdicao(this)">Abaixo 85%</div>
                        <div class="battery-pill b-edit" data-val="ACIMA DE 85%" onclick="setBatEdicao(this)">Acima 85%</div>
                        <div class="battery-pill b-edit" data-val="ACIMA DE 90%" onclick="setBatEdicao(this)">Acima 90%</div>
                        <div class="battery-pill b-edit" data-val="ACIMA DE 95%" onclick="setBatEdicao(this)">Acima 95%</div>
                        <div class="battery-pill b-edit pill-full" data-val="EM 100%" onclick="setBatEdicao(this)">Bateria em 100%</div>
                    </div>
                    <input type="hidden" id="edit_saude_bateria">
                </div>

                <div class="grid grid-cols-2 gap-4 mt-2">
                    <div><label>Preço (R$)</label><input type="text" id="edit_preco" class="apple-input" required></div>
                    <div id="edit_boxGarantia" class="hidden">
                        <label class="text-yellow-500">Garantia (Meses)</label>
                        <input type="number" id="edit_garantia" class="apple-input" placeholder="Ex: 3">
                    </div>
                </div>

                <div class="p-4 border border-[#38383a] rounded-xl bg-[#2c2c2e] mb-4">
                    <input type="text" id="edit_cidade" class="apple-input py-2 mb-3 bg-[#1c1c1e] text-[12px]" placeholder="Cidade da Retirada (Opcional)">
                    <div class="grid grid-cols-2 gap-3 text-[9px] text-gray-300 font-bold uppercase tracking-wider">
                        <label class="flex items-center gap-2 cursor-pointer hover:text-white"><input type="checkbox" id="edit_coleta" class="accent-[#0071e3] w-4 h-4"> Coleta</label>
                        <label class="flex items-center gap-2 cursor-pointer hover:text-white"><input type="checkbox" id="edit_boy" class="accent-[#0071e3] w-4 h-4"> Motoboy</label>
                        <label class="flex items-center gap-2 cursor-pointer hover:text-white"><input type="checkbox" id="edit_usdt" class="accent-[#0071e3] w-4 h-4"> USDT</label>
                        <label class="flex items-center gap-2 cursor-pointer hover:text-white"><input type="checkbox" id="edit_nota" class="accent-[#0071e3] w-4 h-4"> Nota</label>
                        <label class="flex items-center gap-2 cursor-pointer col-span-2 hover:text-white"><input type="checkbox" id="edit_envio" class="accent-[#0071e3] w-4 h-4"> Faço Envio</label>
                    </div>
                </div>
                
                <div class="flex gap-2">
                    <button type="button" onclick="fecharModalEdicao()" class="apple-button bg-gray-600 text-white w-1/3 border-0">Sair</button>
                    <button type="submit" class="apple-button bg-blue-600 text-white w-2/3 border-0">Salvar Alteração</button>
                </div>
            </form>
        </div>
    </div>

    <div id="loginSection" class="flex items-center justify-center min-h-screen px-4">
        <div class="apple-card max-w-[400px] text-center">
            <h1 class="text-5xl font-black italic mb-2">iFipe</h1>
            <p class="text-[10px] font-bold uppercase text-blue-500 mb-8 tracking-[0.4em]">Painel do Anunciante</p>
            <form onsubmit="fazerLogin(event)">
                <input type="text" id="loginId" class="apple-input" placeholder="Sua Loja" required>
                <input type="password" id="loginPass" class="apple-input" placeholder="Senha" required>
                <button type="submit" class="apple-button w-full">Entrar</button>
            </form>
            <p id="loginMsg" class="mt-4 text-[10px] font-bold text-red-500 uppercase"></p>
        </div>
    </div>

    <div id="formSection" class="hidden">
        <div class="user-bar">
            <div class="max-w-7xl mx-auto flex justify-between items-center gap-4">
                <div class="text-[11px] font-black uppercase tracking-widest whitespace-nowrap">Loja: <span id="nomeLoja" class="text-blue-500">...</span></div>
                
                <div class="text-[9px] md:text-[11px] font-black text-[#32d74b] bg-[#1c1c1e] px-3 py-1.5 rounded-full border border-[#38383a] flex items-center gap-2 whitespace-nowrap">
                    <span class="animate-pulse">🟢</span> <span id="onlineCount">--</span> PESSOAS ONLINE
                </div>

                <button onclick="sairPainel()" class="text-[10px] text-red-500 font-black uppercase hover:text-white transition-colors">Sair</button>
            </div>
        </div>

        <div class="max-w-7xl mx-auto p-4 md:p-8">
            
            <div id="top3Container"></div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="lg:col-span-1">
                    <div class="apple-card">
                        <h2 class="text-xl font-black italic mb-6">Novo Anúncio</h2>
                        <form id="priceForm" onsubmit="salvarOferta(event)">
                            <label>Aparelho</label>
                            <select id="produto_id" class="apple-input" onchange="aoMudarProduto()" required></select>
                            
                            <div class="grid grid-cols-2 gap-4">
                                <div><label>Condição</label>
                                    <select id="condicao" class="apple-input" onchange="checarCondicao()">
                                        <option value="Novo">Novo</option>
                                        <option value="Seminovo">Seminovo</option>
                                        <option value="CPO">CPO</option>
                                        <option value="Apple As Is">Apple As Is</option>
                                        <option value="Apple As Is+">Apple As Is+</option>
                                        <option value="GRADE A">GRADE A</option>
                                        <option value="GRADE B">GRADE B</option>
                                        <option value="GRADE C">GRADE C</option>
                                    </select>
                                </div>
                                <div><label>Estoque</label><input type="number" id="quantidade" class="apple-input" value="1" min="0" required></div>
                            </div>

                            <div id="boxBateria" class="hidden mb-4">
                                <label class="text-green-500">Saúde da Bateria</label>
                                <div class="battery-grid">
                                    <div class="battery-pill b-new" data-val="ABAIXO DE 85%" onclick="setBat(this)">Abaixo 85%</div>
                                    <div class="battery-pill b-new" data-val="ACIMA DE 85%" onclick="setBat(this)">Acima 85%</div>
                                    <div class="battery-pill b-new" data-val="ACIMA DE 90%" onclick="setBat(this)">Acima 90%</div>
                                    <div class="battery-pill b-new" data-val="ACIMA DE 95%" onclick="setBat(this)">Acima 95%</div>
                                    <div class="battery-pill b-new pill-full" data-val="EM 100%" onclick="setBat(this)">Bateria em 100%</div>
                                </div>
                                <input type="hidden" id="saude_bateria">
                            </div>

                            <div id="boxGarantia" class="hidden"><label class="text-yellow-500">Garantia (Meses)</label><input type="number" id="garantia" class="apple-input" placeholder="Ex: 3"></div>

                            <div id="gradeOpcoes" class="mb-4"></div>

                            <label>Região / Origem</label>
                            <select id="regiao_id" class="apple-input" required></select>

                            <div class="mt-4 mb-4 p-4 border border-[#38383a] rounded-xl bg-[#2c2c2e]">
                                <input type="text" id="obs_cidade" class="apple-input py-2 mb-3 bg-[#1c1c1e] text-[12px]" placeholder="Cidade da Retirada (Opcional)">
                                <div class="grid grid-cols-2 gap-3 text-[9px] text-gray-300 font-bold uppercase tracking-wider">
                                    <label class="flex items-center gap-2 cursor-pointer hover:text-white"><input type="checkbox" id="obs_coleta" class="accent-[#0071e3] w-4 h-4"> Coleta</label>
                                    <label class="flex items-center gap-2 cursor-pointer hover:text-white"><input type="checkbox" id="obs_boy" class="accent-[#0071e3] w-4 h-4"> Motoboy</label>
                                    <label class="flex items-center gap-2 cursor-pointer hover:text-white"><input type="checkbox" id="obs_usdt" class="accent-[#0071e3] w-4 h-4"> USDT</label>
                                    <label class="flex items-center gap-2 cursor-pointer hover:text-white"><input type="checkbox" id="obs_nota" class="accent-[#0071e3] w-4 h-4"> Nota</label>
                                    <label class="flex items-center gap-2 cursor-pointer col-span-2 hover:text-white"><input type="checkbox" id="obs_envio" class="accent-[#0071e3] w-4 h-4"> Faço Envio</label>
                                </div>
                            </div>

                            <label>Preço Unitário (R$)</label>
                            <input type="text" id="preco" class="apple-input" placeholder="Ex: 5400,00" required>
                            <button type="submit" class="apple-button w-full bg-blue-600 text-white border-0 mt-4">Publicar</button>
                            <p id="formMsg" class="mt-4 text-[10px] font-bold text-red-500 text-center uppercase tracking-widest"></p>
                        </form>
                    </div>
                </div>

                <div class="lg:col-span-2">
                    <div class="apple-card">
                        <h2 class="text-xl font-black italic mb-6">Meus Anúncios Ativos</h2>
                        <div class="overflow-x-auto">
                            <table>
                                <thead><tr><th>Produto</th><th>Condição</th><th>Estoque</th><th>Preço</th><th>Ações</th></tr></thead>
                                <tbody id="listaAtivos"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let loja = null;
        let gradeVariacoes = [];
        let anunciosDaLoja = [];

        // SIMULADOR CARDÍACO DE PESSOAS ONLINE (Inteligência CRO)
        function iniciarSimuladorOnline() {
            const el = document.getElementById('onlineCount');
            if(!el) return;
            
            let atual = Math.floor(Math.random() * (45 - 25 + 1)) + 25; 
            el.innerText = atual;
            
            function atualizarContador() {
                let variacao = Math.floor(Math.random() * 18) - 6; 
                atual += variacao;
                
                if(atual < 20) atual = 20 + Math.floor(Math.random() * 5); 
                if(atual > 120) atual = 120 - Math.floor(Math.random() * 10); 
                
                el.innerText = atual;
                
                let tempoProximoTick = Math.floor(Math.random() * (8000 - 2000 + 1)) + 2000;
                setTimeout(atualizarContador, tempoProximoTick);
            }
            
            setTimeout(atualizarContador, 3000);
        }

        window.onload = async () => {
            iniciarSimuladorOnline();
            const token = localStorage.getItem('iFipe_Anunciante');
            if (token) {
                const { data } = await _s.from('fornecedores').select('*').eq('id', token).maybeSingle();
                if(data && data.ativo) { loja = data; liberarAcesso(); } 
                else { localStorage.removeItem('iFipe_Anunciante'); }
            }
        };

        async function fazerLogin(event) {
            event.preventDefault(); 
            const u = document.getElementById('loginId').value.trim();
            const p = document.getElementById('loginPass').value.trim();
            const { data } = await _s.from('fornecedores').select('*').ilike('nome', u).eq('senha', p).maybeSingle();
            if(data && data.ativo) { loja = data; localStorage.setItem('iFipe_Anunciante', data.id); liberarAcesso(); }
            else { document.getElementById('loginMsg').innerText = "ERRO NO LOGIN. TENTE NOVAMENTE."; }
        }

        function liberarAcesso() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('formSection').classList.remove('hidden');
            document.getElementById('nomeLoja').innerText = loja.nome;
            init();
        }

        function sairPainel() { localStorage.removeItem('iFipe_Anunciante'); window.location.reload(); }

        // MUDANÇA NO TÍTULO DOS PRODUTOS MAIS PROCURADOS
        async function carregarTop3() {
            const { data } = await _s.from('ofertas').select('variacoes(produtos_mestre(nome))');
            if(!data || data.length === 0) return;
            
            let contagem = {};
            data.forEach(o => {
                let nome = o.variacoes?.produtos_mestre?.nome;
                if(nome) contagem[nome] = (contagem[nome] || 0) + 1;
            });
            
            let ordenado = Object.entries(contagem).sort((a, b) => b[1] - a[1]).slice(0, 3);
            if(ordenado.length === 0) return;
            
            const medalhas = ['🥇 1º LUGAR', '🥈 2º LUGAR', '🥉 3º LUGAR'];
            const cores = ['#ffcc00', '#c0c0c0', '#cd7f32'];
            
            let html = '<h2 class="text-[11px] text-gray-400 font-black uppercase tracking-[0.2em] mb-4">🔥 Produtos Mais Procurados</h2>';
            html += '<div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">';
            ordenado.forEach((item, index) => {
                html += `
                <div class="apple-card flex items-center justify-between" style="padding: 1.5rem; border-color: ${cores[index]}40; background: linear-gradient(145deg, #1c1c1e 0%, #2c2c2e 100%);">
                    <div>
                        <p style="color: ${cores[index]}" class="text-[9px] font-black uppercase tracking-widest mb-1">${medalhas[index]}</p>
                        <h4 class="text-[14px] font-black text-white leading-tight">${item[0]}</h4>
                    </div>
                    <div class="text-[20px]">🔥</div>
                </div>`;
            });
            html += '</div>';
            
            document.getElementById('top3Container').innerHTML = html;
        }

        async function init() {
            carregarTop3();
            const [p, r, v] = await Promise.all([
                _s.from('produtos_mestre').select('id, nome').order('nome'),
                _s.from('regioes').select('*').order('nome'),
                _s.from('variacoes').select('*')
            ]);
            gradeVariacoes = v.data;
            document.getElementById('produto_id').innerHTML = '<option value="">Selecione o Aparelho...</option>' + p.data.map(x => `<option value="${x.id}">${x.nome}</option>`).join('');
            document.getElementById('regiao_id').innerHTML = '<option value="">Origem/Região...</option>' + r.data.map(x => `<option value="${x.id}">${x.bandeira} ${x.nome}</option>`).join('');
            atualizarLista();
        }

        function aoMudarProduto() {
            const pid = document.getElementById('produto_id').value;
            const container = document.getElementById('gradeOpcoes');
            container.innerHTML = ""; if(!pid) return;
            const vars = gradeVariacoes.filter(x => x.produto_id == pid);
            const tams = [...new Set(vars.map(x => x.tamanho).filter(Boolean))]; 
            const caps = [...new Set(vars.map(x => x.capacidade).filter(Boolean))]; 
            const cores = [...new Set(vars.map(x => x.cor).filter(Boolean))];
            let html = '<div class="grid grid-cols-1 gap-4 mt-4">';
            if(tams.length) html += `<div><label>Tamanho</label><select id="f_tam" class="apple-input" required><option value="">Selecione...</option>${tams.map(c => `<option value="${c}">${c}</option>`).join('')}</select></div>`;
            if(caps.length) html += `<div><label>Armazenamento</label><select id="f_cap" class="apple-input" required><option value="">Selecione...</option>${caps.map(c => `<option value="${c}">${c}</option>`).join('')}</select></div>`;
            if(cores.length) html += `<div><label>Cor</label><select id="f_cor" class="apple-input" required><option value="">Selecione...</option>${cores.map(c => `<option value="${c}">${c}</option>`).join('')}</select></div>`;
            container.innerHTML = html + '</div>';
        }

        function setBat(elemento) {
            const val = elemento.getAttribute('data-val');
            document.getElementById('saude_bateria').value = val;
            document.querySelectorAll('.b-new').forEach(p => p.classList.remove('active'));
            elemento.classList.add('active');
        }

        function setBatEdicao(elemento_ou_string) {
            let val;
            if(typeof elemento_ou_string === 'string') {
                val = elemento_ou_string;
                document.querySelectorAll('.b-edit').forEach(p => {
                    if(p.getAttribute('data-val') === val) p.classList.add('active');
                    else p.classList.remove('active');
                });
            } else {
                val = elemento_ou_string.getAttribute('data-val');
                document.querySelectorAll('.b-edit').forEach(p => p.classList.remove('active'));
                elemento_ou_string.classList.add('active');
            }
            document.getElementById('edit_saude_bateria').value = val;
        }

        function checarCondicao() {
            const cond = document.getElementById('condicao').value;
            const boxG = document.getElementById('boxGarantia');
            const boxB = document.getElementById('boxBateria');
            if(cond !== 'Novo') { boxG.classList.remove('hidden'); boxB.classList.remove('hidden'); }
            else { boxG.classList.add('hidden'); boxB.classList.add('hidden'); document.getElementById('saude_bateria').value = ""; document.querySelectorAll('.b-new').forEach(p => p.classList.remove('active'));}
        }

        function checarCondicaoEdicao() {
            const cond = document.getElementById('edit_condicao').value;
            const boxG = document.getElementById('edit_boxGarantia');
            const boxB = document.getElementById('edit_boxBateria');
            if(cond !== 'Novo') { boxG.classList.remove('hidden'); boxB.classList.remove('hidden'); }
            else { boxG.classList.add('hidden'); boxB.classList.add('hidden'); document.getElementById('edit_saude_bateria').value = ""; document.querySelectorAll('.b-edit').forEach(p => p.classList.remove('active'));}
        }

        async function salvarOferta(event) {
            event.preventDefault(); 
            const msg = document.getElementById('formMsg');
            msg.innerText = "SALVANDO...";
            msg.style.color = "#fff";

            const pid = document.getElementById('produto_id').value;
            const tam = document.getElementById('f_tam')?.value || null;
            const cap = document.getElementById('f_cap')?.value || null;
            const cor = document.getElementById('f_cor')?.value || null;
            const v = gradeVariacoes.find(x => x.produto_id == pid && (x.tamanho === tam || (!x.tamanho && !tam)) && (x.capacidade === cap || (!x.capacidade && !cap)) && (x.cor === cor || (!x.cor && !cor)));
            
            if(!v) { msg.innerText = "COMBINAÇÃO INVÁLIDA."; msg.style.color = "#ff3b30"; return; }
            
            const pStr = document.getElementById('preco').value.replace(/\./g, '').replace(',', '.');
            const cond = document.getElementById('condicao').value;
            const bat = document.getElementById('saude_bateria').value;

            if(cond !== 'Novo' && !bat) {
                msg.innerText = "SELECIONE A SAÚDE DA BATERIA.";
                msg.style.color = "#ff3b30";
                return;
            }

            const { error } = await _s.from('ofertas').insert([{
                fornecedor_id: loja.id, variacao_id: v.id, regiao_id: document.getElementById('regiao_id').value,
                preco: parseFloat(pStr), quantidade: document.getElementById('quantidade').value,
                condicao: cond, garantia: cond !== 'Novo' && document.getElementById('garantia').value ? document.getElementById('garantia').value + ' Meses' : null,
                saude_bateria: bat || null,
                cidade: document.getElementById('obs_cidade').value.trim(),
                aceita_coleta: document.getElementById('obs_coleta').checked, tem_boy: document.getElementById('obs_boy').checked,
                aceita_usdt: document.getElementById('obs_usdt').checked, emite_nota: document.getElementById('obs_nota').checked,
                faz_envio: document.getElementById('obs_envio').checked
            }]);
            
            if(!error) {
                event.target.reset(); document.getElementById('condicao').value = "Novo"; checarCondicao(); 
                atualizarLista();
                carregarTop3();
                msg.innerText = "ANÚNCIO PUBLICADO COM SUCESSO!";
                msg.style.color = "#32d74b";
                setTimeout(() => { msg.innerText = ""; }, 3000);
            } else {
                msg.innerText = "ERRO AO SALVAR OFERTA.";
                msg.style.color = "#ff3b30";
            }
        }

        async function atualizarLista() {
            const { data } = await _s.from('ofertas').select('*, variacoes(capacidade, tamanho, cor, produtos_mestre(nome))').eq('fornecedor_id', loja.id).order('criado_em', {ascending: false});
            anunciosDaLoja = data || [];
            
            document.getElementById('listaAtivos').innerHTML = anunciosDaLoja.map(o => {
                const det = [o.variacoes.tamanho, o.variacoes.capacidade, o.variacoes.cor].filter(Boolean).join(' | ');
                const tagB = o.saude_bateria ? `<br><span class="text-green-500 font-bold text-[9px]">🔋 ${o.saude_bateria}</span>` : '';
                const tagG = o.garantia ? `<br><span class="text-yellow-500 font-bold text-[9px]">🛡️ ${o.garantia}</span>` : '';
                return `<tr><td><span class="block font-bold">${o.variacoes.produtos_mestre.nome}</span><span class="text-[10px] text-gray-400">${det}</span></td>
                <td><span class="text-[10px] bg-gray-800 px-2 py-1 rounded border border-gray-600">${o.condicao}</span>${tagB}${tagG}</td>
                <td><input type="number" id="q-${o.id}" class="mini-input" value="${o.quantidade}" min="0" onchange="salvarEdicaoRapida(${o.id})"></td>
                <td><input type="text" id="p-${o.id}" class="mini-input w-24" value="${o.preco.toLocaleString('pt-BR')}" onchange="salvarEdicaoRapida(${o.id})"></td>
                <td><span class="btn-acao btn-edit" onclick="abrirModalEdicao(${o.id})">Editar</span><span class="btn-acao btn-del" onclick="deletar(${o.id})">Excluir</span></td></tr>`}).join('');
        }

        async function salvarEdicaoRapida(id) {
            const q = document.getElementById(`q-${id}`).value;
            const p = document.getElementById(`p-${id}`).value.replace(/\./g, '').replace(',', '.');
            await _s.from('ofertas').update({ quantidade: q, preco: p }).eq('id', id);
            atualizarLista();
            carregarTop3();
        }

        function abrirModalEdicao(id) {
            const o = anunciosDaLoja.find(x => x.id === id); if (!o) return;
            document.getElementById('edit_id').value = o.id;
            
            const condicaoSelect = document.getElementById('edit_condicao');
            condicaoSelect.value = o.condicao;
            if(condicaoSelect.selectedIndex === -1) condicaoSelect.value = 'Seminovo';

            document.getElementById('edit_quantidade').value = o.quantidade;
            document.getElementById('edit_preco').value = o.preco.toLocaleString('pt-BR');
            document.getElementById('edit_titulo').innerText = `${o.variacoes.produtos_mestre.nome}`;
            
            checarCondicaoEdicao();
            if (o.condicao !== 'Novo') {
                document.getElementById('edit_garantia').value = o.garantia ? o.garantia.replace(/\D/g, '') : '';
                if(o.saude_bateria) setBatEdicao(o.saude_bateria);
            }
            
            document.getElementById('edit_cidade').value = o.cidade || '';
            document.getElementById('edit_coleta').checked = o.aceita_coleta;
            document.getElementById('edit_boy').checked = o.tem_boy;
            document.getElementById('edit_usdt').checked = o.aceita_usdt;
            document.getElementById('edit_nota').checked = o.emite_nota;
            document.getElementById('editModal').classList.remove('hidden');
        }

        function fecharModalEdicao() { document.getElementById('editModal').classList.add('hidden'); }

        async function salvarEdicaoCompleta(e) {
            e.preventDefault();
            const cond = document.getElementById('edit_condicao').value;
            const bat = document.getElementById('edit_saude_bateria').value;
            
            if(cond !== 'Novo' && !bat) {
                alert("Selecione a Saúde da Bateria antes de salvar!");
                return;
            }

            const pStr = document.getElementById('edit_preco').value.replace(/\./g, '').replace(',', '.');
            
            await _s.from('ofertas').update({
                condicao: cond, quantidade: document.getElementById('edit_quantidade').value, preco: parseFloat(pStr),
                garantia: cond !== 'Novo' && document.getElementById('edit_garantia').value ? document.getElementById('edit_garantia').value + ' Meses' : null,
                saude_bateria: cond !== 'Novo' ? bat : null,
                cidade: document.getElementById('edit_cidade').value.trim(),
                aceita_coleta: document.getElementById('edit_coleta').checked, tem_boy: document.getElementById('edit_boy').checked,
                aceita_usdt: document.getElementById('edit_usdt').checked, emite_nota: document.getElementById('edit_nota').checked
            }).eq('id', document.getElementById('edit_id').value);
            
            fecharModalEdicao(); atualizarLista(); carregarTop3();
        }

        async function deletar(id) { if(confirm("Excluir definitivamente?")) { await _s.from('ofertas').delete().eq('id', id); atualizarLista(); carregarTop3(); } }
    </script>
</body>
</html>
