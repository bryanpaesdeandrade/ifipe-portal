<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Painel do Anunciante</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #38383a; --input: #2c2c2e; }
        body { background: var(--bg); color: var(--text); font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin:0; }
        .user-bar { background:rgba(28, 28, 30, 0.8); backdrop-filter:blur(15px); border-bottom:1px solid var(--border); padding:10px 20px; position:sticky; top:0; z-index:100; }
        .apple-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 1.5rem; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .apple-input { background: var(--input); border: 1px solid var(--border); border-radius: 10px; padding: 10px; width: 100%; color: var(--text); outline: none; font-size: 13px; transition: 0.3s; }
        .apple-input:focus { border-color: #0071e3; }
        .apple-button { background: #fff; color: #000; font-weight: 900; border-radius: 50px; padding: 12px; width: 100%; cursor: pointer; text-transform: uppercase; border: none; font-size: 11px; transition: 0.3s; }
        .apple-button:hover { background: #0071e3; color: #fff; }
        table { width: 100%; border-collapse: collapse; }
        th { font-size: 10px; color: #86868b; text-transform: uppercase; padding: 10px; text-align: left; border-bottom: 1px solid var(--border); }
        td { padding: 10px; border-bottom: 1px solid var(--input); font-size: 12px; }
        .mini-edit { background: transparent; border: 1px solid transparent; color: #32d74b; font-weight: bold; width: 85px; text-align: center; border-radius: 4px; padding: 4px; }
        .mini-edit:focus { border-color: #0071e3; background: #2c2c2e; outline: none; }
        .btn-acao { font-weight: bold; cursor: pointer; font-size: 9px; text-transform: uppercase; padding: 4px 8px; border-radius: 4px; display: inline-block; }
        .btn-edit { background: rgba(0, 113, 227, 0.2); color: #0071e3; }
        .btn-del { background: rgba(255, 59, 48, 0.2); color: #ff3b30; }
        .hidden { display: none !important; }
        .taxa-widget { background: #1c1c1e; border: 1px solid #38383a; border-radius: 12px; padding: 8px 20px; display: flex; flex-direction: column; align-items: flex-start; }
    </style>
</head>
<body>

    <div id="loginSection" class="flex items-center justify-center min-h-screen px-4">
        <div class="apple-card max-w-[400px] text-center w-full">
            <h1 class="text-4xl font-black italic mb-2">iFipe</h1>
            <p class="text-[10px] font-bold uppercase text-blue-500 mb-8 tracking-[0.4em]">Acesso Anunciante</p>
            <form onsubmit="realizarLoginAnunciante(event)">
                <label class="block text-left text-[9px] uppercase text-gray-500 mb-1 font-black">WhatsApp da Loja</label>
                <input type="text" id="logWhats" class="apple-input" placeholder="Somente números" required>
                <label class="block text-left text-[9px] uppercase text-gray-500 mb-1 font-black">Senha</label>
                <input type="password" id="logPass" class="apple-input" placeholder="••••••••" required>
                <button type="submit" class="apple-button w-full mt-4">Entrar no Painel</button>
            </form>
            <p id="loginMsg" class="mt-4 text-[10px] font-bold text-red-500 uppercase"></p>
        </div>
    </div>

    <div id="dashboardSection" class="hidden">
        <div class="user-bar">
            <div class="max-w-7xl mx-auto flex flex-wrap justify-between items-center gap-4">
                <div class="flex items-center gap-4">
                    <div class="text-[10px] font-black uppercase">LOJA: <span id="nomeLoja" class="text-blue-500">...</span></div>
                    <div class="taxa-widget">
                        <div class="flex flex-col border-r border-gray-700 pr-4">
                            <span class="text-[8px] uppercase text-gray-500 font-black">Binance USDT/BRL</span>
                            <span id="tickerBinance" class="text-[11px] font-mono text-white">R$ 0,00</span>
                        </div>
                        <div class="flex flex-col pl-4">
                            <span class="text-[8px] uppercase text-[#32d74b] font-black tracking-widest">Sua Taxa VIP</span>
                            <span id="suaTaxaUsdt" class="text-[13px] font-mono font-black text-[#32d74b]">R$ --</span>
                        </div>
                    </div>
                </div>
                <div class="flex gap-4">
                    <button onclick="abrirConta()" class="text-[10px] text-blue-400 font-black uppercase">Minha Conta</button>
                    <button onclick="sairPainel()" class="text-[10px] text-red-500 font-black uppercase">Sair</button>
                </div>
            </div>
        </div>

        <div class="max-w-7xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <div class="apple-card border-[#32d74b]">
                    <h3 class="text-xs font-black uppercase mb-4 text-[#32d74b]">Simulador USDT</h3>
                    <label class="text-[9px] uppercase text-gray-500">Valor em Dólar (USD)</label>
                    <input type="text" id="compraUsd" class="apple-input mb-4" placeholder="$ 0,00" oninput="mascararMoeda(this); calcularCompraUsdt()">
                    <div class="p-4 bg-black rounded-xl border border-gray-800">
                        <span class="block text-[8px] text-gray-500 uppercase">Total em Reais:</span>
                        <span id="resultadoCompraBrl" class="text-xl font-black text-[#32d74b]">R$ 0,00</span>
                    </div>
                    <button class="apple-button mt-4 bg-[#32d74b] text-black">Pedir via WhatsApp</button>
                </div>

                <div class="apple-card">
                    <h2 class="text-sm font-black italic mb-4 uppercase">Novo Registro</h2>
                    <form id="priceForm" onsubmit="salvarOferta(event)">
                        <select id="filtro_grupo" class="apple-input mb-2" onchange="popularProdutos()" required>
                            <option value="">Categoria...</option>
                            <option value="1">IPHONE</option><option value="2">APPLE WATCH</option><option value="4">MACBOOK</option><option value="5">IMAC</option>
                            <option value="3">IPAD</option><option value="6">ACESSÓRIOS</option><option value="7">XIAOMI</option><option value="8">REALME</option>
                        </select>
                        <select id="produto_id" class="apple-input mb-2" onchange="aoMudarProduto()" required></select>
                        <div id="gradeOpcoes"></div>
                        <div class="grid grid-cols-2 gap-2 mt-2">
                            <select id="condicao" class="apple-input" onchange="checarGarantia()"><option value="Novo">Novo</option><option value="Seminovo">Seminovo</option></select>
                            <input type="number" id="quantidade" class="apple-input" placeholder="Qtd" min="0">
                        </div>
                        <input type="text" id="garantia" class="apple-input mt-2" placeholder="Garantia">
                        <select id="regiao_id" class="apple-input mb-2" required></select>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="preco_brl" class="apple-input" placeholder="R$" oninput="mascararMoeda(this); limparPreco('brl')">
                            <input type="text" id="preco_usd" class="apple-input" placeholder="$" oninput="mascararMoeda(this); limparPreco('usd')">
                        </div>
                        <button type="submit" class="apple-button w-full bg-blue-600 text-white mt-4">Anunciar</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-3 space-y-4">
                <div id="bulkBar" class="hidden bg-blue-600 p-4 rounded-2xl flex items-center justify-between shadow-lg">
                    <span class="text-xs font-black text-white uppercase"><span id="bulkCount">0</span> Selecionados</span>
                    <div class="flex gap-2">
                        <button onclick="bulkEditModal()" class="bg-white text-blue-600 px-4 py-2 rounded-full text-[9px] font-black uppercase">Editar Todos</button>
                        <button onclick="bulkDelete()" class="bg-red-500 text-white px-4 py-2 rounded-full text-[9px] font-black uppercase">Apagar</button>
                    </div>
                </div>

                <div class="apple-card">
                    <h2 class="text-sm font-black italic uppercase mb-4">Base de Dados Única</h2>
                    <div class="overflow-x-auto">
                        <table>
                            <thead>
                                <tr>
                                    <th width="30"><input type="checkbox" onclick="toggleAll(this)"></th>
                                    <th>Produto</th>
                                    <th class="text-center">Qtd</th>
                                    <th class="text-center">Preço</th>
                                    <th class="text-right">Ação</th>
                                </tr>
                            </thead>
                            <tbody id="listaAtivos"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="editModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-[1000] p-4">
        <div class="apple-card max-w-[500px] w-full border-blue-500">
            <h3 class="text-sm font-black uppercase mb-4">Ajustes da Oferta</h3>
            <form id="editForm" onsubmit="atualizarOfertaCompleta(event)">
                <input type="hidden" id="edit_id">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[9px] uppercase text-gray-500">Garantia</label><input type="text" id="edit_garantia" class="apple-input"></div>
                    <div><label class="text-[9px] uppercase text-gray-500">Origem</label><select id="edit_regiao" class="apple-input"></select></div>
                </div>
                <div class="mt-4 p-4 bg-[#2c2c2e] rounded-xl">
                    <label class="text-blue-400 text-[9px] font-black uppercase">Molduras</label>
                    <div class="grid grid-cols-2 gap-3 mt-2">
                        <label class="text-[10px] flex items-center gap-2"><input type="checkbox" id="edit_pix"> ACEITA PIX</label>
                        <label class="text-[10px] flex items-center gap-2"><input type="checkbox" id="edit_usdt"> ACEITA USDT</label>
                        <label class="text-[10px] flex items-center gap-2"><input type="checkbox" id="edit_coleta"> ACEITA COLETA</label>
                        <label class="text-[10px] flex items-center gap-2"><input type="checkbox" id="edit_boy"> TEM MOTOBOY</label>
                    </div>
                </div>
                <div class="flex gap-2 mt-6">
                    <button type="button" onclick="fecharModalEdicao()" class="apple-button bg-gray-600 text-white">Sair</button>
                    <button type="submit" class="apple-button bg-blue-600 text-white">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let loja = null, produtosMestre = [], gradeVariacoes = [], suaTaxaFinal = 0;

        window.onload = async () => {
            const token = localStorage.getItem('iFipe_Anunciante');
            if (token) {
                const { data } = await _s.from('fornecedores').select('*').eq('id', token).maybeSingle();
                if(data?.ativo) { 
                    loja = data; 
                    liberarDashboard(); 
                } else { 
                    localStorage.removeItem('iFipe_Anunciante');
                }
            }
        };

        async function realizarLoginAnunciante(e) {
            e.preventDefault();
            const w = document.getElementById('logWhats').value.replace(/\D/g, '');
            const p = document.getElementById('logPass').value;
            const msg = document.getElementById('loginMsg');

            msg.innerText = "VERIFICANDO...";
            const { data, error } = await _s.from('fornecedores').select('*').eq('whatsapp', w).eq('senha', p).maybeSingle();

            if (data && data.ativo) {
                localStorage.setItem('iFipe_Anunciante', data.id);
                loja = data;
                liberarDashboard();
            } else {
                msg.innerText = "ACESSO NEGADO OU CONTA INATIVA.";
            }
        }

        function liberarDashboard() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');
            document.getElementById('nomeLoja').innerText = loja.nome;
            init();
        }

        async function init() {
            iniciarTicker();
            const [p, r, v] = await Promise.all([ 
                _s.from('produtos_mestre').select('*').order('nome'), 
                _s.from('regioes').select('*').order('nome'), 
                _s.from('variacoes').select('*') 
            ]);
            produtosMestre = p.data; 
            gradeVariacoes = v.data;
            const regOptions = '<option value="">Origem...</option>' + r.data.map(x => `<option value="${x.id}">${x.bandeira} ${x.nome}</option>`).join('');
            document.getElementById('regiao_id').innerHTML = regOptions;
            document.getElementById('edit_regiao').innerHTML = regOptions;
            atualizarLista();
        }

        function iniciarTicker() {
            const socket = new WebSocket('wss://stream.binance.com:9443/ws/usdtbrl@ticker');
            socket.onmessage = (e) => {
                const realBinance = parseFloat(JSON.parse(e.data).c);
                suaTaxaFinal = realBinance + 0.07;
                document.getElementById('tickerBinance').innerText = `R$ ${realBinance.toFixed(4).replace('.',',')}`;
                document.getElementById('suaTaxaUsdt').innerText = `R$ ${suaTaxaFinal.toFixed(4).replace('.',',')}`;
                calcularCompraUsdt();
            };
        }

        function calcularCompraUsdt() {
            const usd = parsePreco(document.getElementById('compraUsd').value);
            if(!usd || suaTaxaFinal === 0) { document.getElementById('resultadoCompraBrl').innerText = "R$ 0,00"; return; }
            document.getElementById('resultadoCompraBrl').innerText = (usd * suaTaxaFinal).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        function popularProdutos() {
            const g = document.getElementById('filtro_grupo').value;
            const filtrados = produtosMestre.filter(x => x.grupo_id == g);
            document.getElementById('produto_id').innerHTML = '<option value="">Modelo...</option>' + filtrados.map(x => `<option value="${x.id}">${x.nome}</option>`).join('');
            checarGarantia();
        }

        function aoMudarProduto() {
            const pid = document.getElementById('produto_id').value;
            const vars = gradeVariacoes.filter(x => x.produto_id == pid);
            const caps = [...new Set(vars.map(x => x.capacidade).filter(Boolean))];
            const cores = [...new Set(vars.map(x => x.cor).filter(Boolean))];
            let html = '<div class="grid grid-cols-1 gap-2 mt-2">';
            if(caps.length) html += `<select id="f_cap" class="apple-input">${caps.map(c => `<option value="${c}">${c}</option>`).join('')}</select>`;
            if(cores.length) html += `<select id="f_cor" class="apple-input"><option value="MIXER COLORS">MIXER COLORS</option>${cores.map(c => `<option value="${c}">${c}</option>`).join('')}</select>`;
            document.getElementById('gradeOpcoes').innerHTML = html + '</div>';
        }

        function checarGarantia() {
            const cat = document.getElementById('filtro_grupo').value, cond = document.getElementById('condicao').value, g = document.getElementById('garantia');
            if(['1','2','4','5'].includes(cat) && cond === 'Novo') { g.value = "1 ANO APPLE"; g.readOnly = true; } 
            else { g.value = ""; g.readOnly = false; }
        }

        function mascararMoeda(input) {
            let v = input.value.replace(/\D/g, ''); 
            if (v === '') { input.value = ''; return; }
            v = (parseFloat(v) / 100).toFixed(2).replace('.', ',');
            v = v.replace(/\B(?=(\d{3})+(?!\d))/g, "."); 
            input.value = v;
        }

        function parsePreco(v) { return v ? parseFloat(v.toString().replace(/\./g, '').replace(',', '.')) : 0; }
        function limparPreco(t) { if(t==='brl')document.getElementById('preco_usd').value=''; else document.getElementById('preco_brl').value=''; }

        async function salvarOferta(e) {
            e.preventDefault();
            const pid = document.getElementById('produto_id').value, corSel = document.getElementById('f_cor')?.value;
            let v = gradeVariacoes.find(x => x.produto_id == pid && (!corSel || corSel === 'MIXER COLORS' || x.cor === corSel));
            if (!v) v = gradeVariacoes.find(x => x.produto_id == pid);
            
            const pBrl = parsePreco(document.getElementById('preco_brl').value), pUsd = parsePreco(document.getElementById('preco_usd').value);
            const qtd = parseInt(document.getElementById('quantidade').value || 0);

            const { error } = await _s.from('ofertas').insert([{
                fornecedor_id: loja.id, variacao_id: v.id, regiao_id: document.getElementById('regiao_id').value,
                preco: pBrl > 0 ? pBrl : pUsd, moeda: pBrl > 0 ? 'BRL' : 'USD', quantidade: qtd, 
                condicao: document.getElementById('condicao').value, garantia: document.getElementById('garantia').value,
                cores_variadas: corSel === 'MIXER COLORS'
            }]);
            if(error) alert(error.message); else { alert("Publicado!"); atualizarLista(); e.target.reset(); }
        }

        async function atualizarLista() {
            const { data } = await _s.from('ofertas').select('*, variacoes(*, produtos_mestre(*))').eq('fornecedor_id', loja.id).order('criado_em', {ascending: false});
            document.getElementById('listaAtivos').innerHTML = (data || []).map(o => `
                <tr data-id="${o.id}">
                    <td><input type="checkbox" class="offer-check" value="${o.id}" onchange="updateBulkBar()"></td>
                    <td><b>${o.variacoes.produtos_mestre.nome}</b><br><small>${o.variacoes.capacidade || ''} | ${o.cores_variadas ? 'MIXER COLORS' : o.variacoes.cor}</small></td>
                    <td class="text-center"><input type="number" class="mini-edit" value="${o.quantidade}" onblur="salvarRapido(${o.id}, 'quantidade', this.value)"></td>
                    <td class="text-center"><input type="text" class="mini-edit" value="${o.preco.toLocaleString('pt-BR', {minimumFractionDigits:2})}" oninput="mascararMoeda(this)" onblur="salvarRapido(${o.id}, 'preco', this.value)"></td>
                    <td class="text-right">
                        <div class="flex justify-end gap-2">
                            <span class="btn-acao btn-edit" onclick="abrirEdicaoCompleta(${JSON.stringify(o).replace(/"/g, '&quot;')})">Editar</span>
                            <span class="btn-acao btn-del" onclick="excluirAnuncio(${o.id})">X</span>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        async function salvarRapido(id, campo, valor) {
            let vFinal = (campo === 'preco') ? parsePreco(valor) : parseInt(valor);
            if (campo === 'preco') {
                const { data: antiga } = await _s.from('ofertas').select('preco').eq('id', id).single();
                let statusTag = null;
                if (antiga && vFinal < antiga.preco) statusTag = 'BAIXOU DE PREÇO';
                await _s.from('ofertas').update({ preco: vFinal, obs_preco: statusTag }).eq('id', id);
            } else {
                await _s.from('ofertas').update({ [campo]: vFinal }).eq('id', id);
            }
        }

        function abrirEdicaoCompleta(o) {
            document.getElementById('edit_id').value = o.id;
            document.getElementById('edit_garantia').value = o.garantia || '';
            document.getElementById('edit_regiao').value = o.regiao_id;
            document.getElementById('edit_pix').checked = o.aceita_pix;
            document.getElementById('edit_usdt').checked = o.aceita_usdt;
            document.getElementById('edit_coleta').checked = o.aceita_coleta;
            document.getElementById('edit_boy').checked = o.tem_boy;
            document.getElementById('editModal').classList.remove('hidden');
        }

        function fecharModalEdicao() { document.getElementById('editModal').classList.add('hidden'); }

        async function atualizarOfertaCompleta(e) {
            e.preventDefault();
            const id = document.getElementById('edit_id').value;
            await _s.from('ofertas').update({
                garantia: document.getElementById('edit_garantia').value,
                regiao_id: document.getElementById('edit_regiao').value,
                aceita_pix: document.getElementById('edit_pix').checked,
                aceita_usdt: document.getElementById('edit_usdt').checked,
                aceita_coleta: document.getElementById('edit_coleta').checked,
                tem_boy: document.getElementById('edit_boy').checked
            }).eq('id', id);
            fecharModalEdicao(); atualizarLista();
        }

        function updateBulkBar() {
            const selected = document.querySelectorAll('.offer-check:checked').length;
            document.getElementById('bulkCount').innerText = selected;
            document.getElementById('bulkBar').classList.toggle('hidden', selected === 0);
        }

        function toggleAll(master) {
            document.querySelectorAll('.offer-check').forEach(c => c.checked = master.checked);
            updateBulkBar();
        }

        async function bulkDelete() {
            if(!confirm("Excluir selecionados permanentemente?")) return;
            const ids = Array.from(document.querySelectorAll('.offer-check:checked')).map(c => c.value);
            await _s.from('ofertas').delete().in('id', ids);
            atualizarLista(); updateBulkBar();
        }

        function sairPainel() { localStorage.removeItem('iFipe_Anunciante'); window.location.reload(); }
    </script>
</body>
</html>
