<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Painel do Anunciante</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #38383a; --input: #2c2c2e; }
        body { background: var(--bg); color: var(--text); font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin:0; }
        .user-bar { background:rgba(28, 28, 30, 0.8); backdrop-filter:blur(15px); border-bottom:1px solid var(--border); padding:10px 20px; position:sticky; top:0; z-index:100; }
        .apple-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 1.5rem; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .apple-input { background: var(--input); border: 1px solid var(--border); border-radius: 10px; padding: 10px; width: 100%; color: var(--text); outline: none; font-size: 13px; transition: 0.3s; }
        .apple-input:focus { border-color: #0071e3; }
        .apple-button { background: #fff; color: #000; font-weight: 900; border-radius: 50px; padding: 12px; width: 100%; cursor: pointer; text-transform: uppercase; border: none; font-size: 11px; transition: 0.3s; }
        .apple-button:hover { background: #0071e3; color: #fff; }
        table { width: 100%; border-collapse: collapse; }
        th { font-size: 10px; color: #86868b; text-transform: uppercase; padding: 10px; text-align: left; border-bottom: 1px solid var(--border); }
        td { padding: 10px; border-bottom: 1px solid var(--input); font-size: 12px; }
        .mini-edit { background: transparent; border: 1px solid transparent; color: #32d74b; font-weight: bold; width: 85px; text-align: center; border-radius: 4px; padding: 4px; }
        .mini-edit:focus { border-color: #0071e3; background: #2c2c2e; outline: none; }
        .btn-acao { font-weight: bold; cursor: pointer; font-size: 9px; text-transform: uppercase; padding: 4px 8px; border-radius: 4px; display: inline-block; }
        .btn-edit { background: rgba(0, 113, 227, 0.2); color: #0071e3; }
        .btn-del { background: rgba(255, 59, 48, 0.2); color: #ff3b30; }
        .taxa-widget { background: #1c1c1e; border: 1px solid #38383a; border-radius: 12px; padding: 8px 20px; display: flex; flex-direction: column; align-items: flex-start; }
        .btn-wpp { background: #25d366; color: #000; font-weight: 900; border-radius: 50px; padding: 12px; width: 100%; cursor: pointer; text-transform: uppercase; border: none; font-size: 10px; transition: 0.3s; display: block; text-align: center; text-decoration: none; }
        .btn-wpp:hover { background: #1eb954; color: #fff; }
        .hidden { display: none !important; }
        .selo-verificado { background: #ffcc00; color: #000; padding: 2px 8px; border-radius: 4px; font-size: 9px; font-weight: 900; margin-left: 5px; }
    </style>
</head>
<body>

    <div id="loginSection" class="flex items-center justify-center min-h-screen px-4">
        <div class="apple-card max-w-[400px] text-center w-full">
            <h1 class="text-5xl font-black italic mb-2">iFipe</h1>
            <p class="text-[10px] font-bold uppercase text-blue-500 mb-8 tracking-[0.4em]">Acesso Anunciante</p>
            <form onsubmit="realizarLoginAnunciante(event)">
                <label class="block text-left text-[9px] uppercase text-gray-500 mb-1 font-black">Login (Nome da Loja)</label>
                <input type="text" id="logLoja" class="apple-input" required>
                <label class="block text-left text-[9px] uppercase text-gray-500 mb-1 font-black">Senha</label>
                <input type="password" id="logPass" class="apple-input" required>
                <button type="submit" class="apple-button w-full mt-4">Entrar Agora</button>
            </form>
            <p id="loginMsg" class="mt-4 text-[10px] font-bold text-red-500 uppercase"></p>
        </div>
    </div>

    <div id="dashboardSection" class="hidden">
        <div class="user-bar">
            <div class="max-w-7xl mx-auto flex flex-wrap justify-between items-center gap-4">
                <div class="flex items-center gap-4">
                    <div class="text-[10px] font-black uppercase flex items-center">
                        LOJA: <span id="nomeLoja" class="text-blue-500 ml-1">...</span>
                        <span id="seloLoja" class="hidden selo-verificado">✔️ VERIFICADO</span>
                    </div>
                    <div class="taxa-widget">
                        <div class="flex flex-col border-r border-gray-700 pr-4">
                            <span class="text-[8px] uppercase text-gray-500 font-black">Binance Real</span>
                            <span id="tickerBinance" class="text-[11px] font-mono text-white">R$ 0,00</span>
                        </div>
                        <div class="flex flex-col pl-4">
                            <span class="text-[8px] uppercase text-[#32d74b] font-black tracking-widest">Sua Taxa VIP</span>
                            <span id="suaTaxaUsdt" class="text-[12px] font-mono font-black text-[#32d74b]">R$ --</span>
                        </div>
                    </div>
                </div>
                <button onclick="sairPainel()" class="text-[10px] text-red-500 font-black uppercase">Sair</button>
            </div>
        </div>

        <div class="max-w-7xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-4 gap-8">
            <div class="lg:col-span-1 space-y-6">
                <div class="apple-card border-[#32d74b]">
                    <h3 class="text-xs font-black uppercase mb-4 text-[#32d74b]">Simulador USDT</h3>
                    <input type="text" id="compraUsd" class="apple-input mb-4" placeholder="$ 0,00" oninput="mascararMoeda(this); calcularCompraUsdt()">
                    <div class="p-4 bg-black rounded-xl border border-gray-800 mb-4">
                        <span class="block text-[8px] text-gray-500 uppercase">Total em Reais:</span>
                        <span id="resultadoCompraBrl" class="text-xl font-black text-[#32d74b]">R$ 0,00</span>
                    </div>
                    <a href="https://wa.me/15616760652?text=Olá%20Oráculo%20venho%20através%20do%20iFipe%20e%20preciso%20comprar%20USDT" target="_blank" class="btn-wpp">comprar agora no WhatsApp</a>
                </div>

                <div class="apple-card">
                    <h2 class="text-sm font-black italic mb-4 uppercase">Novo Anúncio</h2>
                    <form id="priceForm" onsubmit="salvarOferta(event)">
                        <select id="filtro_grupo" class="apple-input mb-2" onchange="popularProdutos()" required>
                            <option value="">Categoria...</option>
                            <option value="1">IPHONE</option><option value="2">APPLE WATCH</option><option value="4">MACBOOK</option><option value="5">IMAC</option>
                            <option value="3">IPAD</option><option value="6">ACESSÓRIOS</option><option value="7">XIAOMI</option><option value="8">REALME</option>
                        </select>
                        <select id="produto_id" class="apple-input mb-2" onchange="aoMudarProduto()" required></select>
                        <div id="gradeOpcoes"></div>
                        
                        <div class="grid grid-cols-1 gap-2 mt-2">
                            <label class="text-[8px] uppercase text-gray-500 font-black">Condição do Aparelho</label>
                            <select id="condicao" class="apple-input" onchange="checarGarantia()" required>
                                <option value="Novo">Novo</option>
                                <option value="Seminovo">Seminovo</option>
                                <option value="CPO">CPO (Apple Certified)</option>
                                <option value="AS IS +">AS IS +</option>
                                <option value="AS IS">AS IS</option>
                                <option value="GRADE A LEILAO">GRADE A LEILÃO</option>
                                <option value="GRADE B LEILAO">GRADE B LEILÃO</option>
                                <option value="GRADE C LEILAO">GRADE C LEILÃO</option>
                                <option value="REPASSE DE CLIENTE">REPASSE DE CLIENTE</option>
                            </select>
                            <input type="number" id="quantidade" class="apple-input" placeholder="Qtd" min="0">
                        </div>

                        <input type="text" id="garantia" class="apple-input mt-2" placeholder="Garantia">
                        <select id="regiao_id" class="apple-input mb-2" required></select>
                        <div class="grid grid-cols-2 gap-2">
                            <input type="text" id="preco_brl" class="apple-input" placeholder="R$" oninput="mascararMoeda(this); limparPreco('brl')">
                            <input type="text" id="preco_usd" class="apple-input" placeholder="$" oninput="mascararMoeda(this); limparPreco('usd')">
                        </div>

                        <div class="mt-4 p-4 bg-[#2c2c2e] rounded-xl border border-[#38383a]">
                            <label class="text-blue-400 text-[9px] font-black uppercase mb-3 block">Molduras de Negócio</label>
                            <div class="grid grid-cols-2 gap-2">
                                <label class="text-[10px] flex items-center gap-2"><input type="checkbox" id="add_pix"> PIX</label>
                                <label class="text-[10px] flex items-center gap-2"><input type="checkbox" id="add_usdt"> USDT</label>
                                <label class="text-[10px] flex items-center gap-2"><input type="checkbox" id="add_coleta"> COLETA</label>
                                <label class="text-[10px] flex items-center gap-2"><input type="checkbox" id="add_boy"> MOTOBOY</label>
                                <label class="text-[10px] flex items-center gap-2"><input type="checkbox" id="add_nota"> NF</label>
                                <label class="text-[10px] flex items-center gap-2"><input type="checkbox" id="add_proposta"> NEGOCIA QTD</label>
                            </div>
                        </div>

                        <button type="submit" class="apple-button w-full bg-blue-600 text-white mt-4">Publicar Anúncio</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-3 space-y-4">
                <div id="bulkBar" class="bg-blue-600 p-4 rounded-2xl flex flex-wrap items-center justify-between shadow-lg gap-4">
                    <span class="text-xs font-black text-white uppercase"><span id="bulkCount">0</span> Selecionados</span>
                    <div class="flex gap-2">
                        <button onclick="abrirBulkEdit()" class="bg-white text-blue-600 px-4 py-2 rounded-full text-[9px] font-black uppercase">Editar Todos</button>
                        <button onclick="bulkDuplicate()" class="bg-green-500 text-white px-4 py-2 rounded-full text-[9px] font-black uppercase">Duplicar</button>
                        <button onclick="bulkDelete()" class="bg-red-500 text-white px-4 py-2 rounded-full text-[9px] font-black uppercase">Apagar</button>
                    </div>
                </div>

                <div class="apple-card">
                    <h2 class="text-sm font-black italic uppercase mb-4">Minha Base de Dados</h2>
                    <div class="overflow-x-auto">
                        <table>
                            <thead>
                                <tr>
                                    <th width="30"><input type="checkbox" id="masterCheck" onclick="toggleAll(this)"></th>
                                    <th>Produto</th>
                                    <th class="text-center">Qtd</th>
                                    <th class="text-center">Preço</th>
                                    <th class="text-right">Ação</th>
                                </tr>
                            </thead>
                            <tbody id="listaAtivos"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let loja = null, produtosMestre = [], gradeVariacoes = [], suaTaxaFinal = 0;

        // ... (resto das funções de login e ticker permanecem iguais) ...
        // INJETANDO A MUDANÇA NA CHECAGEM DE GARANTIA
        function checarGarantia() {
            const cat = document.getElementById('filtro_grupo').value, 
                  cond = document.getElementById('condicao').value, 
                  g = document.getElementById('garantia');
            
            // SOMENTE NOVO EM CATEGORIAS APPLE GERA GARANTIA AUTOMATICA
            if(['1','2','4','5'].includes(cat) && cond === 'Novo') { 
                g.value = "1 ANO APPLE"; 
                g.readOnly = true; 
            } else { 
                g.value = ""; 
                g.readOnly = false; 
            }
        }

        // ... (outras funções mantidas, apenas atualize a parte do login para exibir o selo) ...

        function liberarDashboard() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');
            document.getElementById('nomeLoja').innerText = loja.nome;
            if(loja.verificado) document.getElementById('seloLoja').classList.remove('hidden');
            init();
        }

        // (restante das funções do trator de edição em massa, publicar, etc permanecem as mesmas das versões anteriores)
    </script>
</body>
</html>
