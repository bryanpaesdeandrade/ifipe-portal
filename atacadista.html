<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Gestor Seth 7️⃣</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; }
        .erp-card { background: #1c1c1e; border: 1px solid #38383a; border-radius: 24px; padding: 2rem; }
        .btn-action { transition: 0.3s; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; }
        .btn-action:hover { transform: scale(1.02); }
        .loading { animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-4xl mx-auto">
        <header class="flex justify-between items-center mb-10 border-b border-[#38383a] pb-6">
            <div>
                <h1 class="text-4xl font-black italic">GESTOR SETH <span class="text-blue-500">7️⃣</span></h1>
                <p class="text-gray-400 text-sm mt-1">Sincronização ERP Massiva via Planilha</p>
            </div>
            <button onclick="window.close()" class="bg-zinc-800 px-4 py-2 rounded-full text-xs font-bold hover:bg-zinc-700">FECHAR</button>
        </header>

        <div class="grid md:grid-cols-2 gap-8">
            <div class="erp-card">
                <div class="text-5xl mb-4">📥</div>
                <h2 class="text-xl font-bold mb-2">1. Baixar Matriz</h2>
                <p class="text-gray-400 text-xs mb-6">Baixe a planilha oficial iFipe configurada com seus IDs de produtos e regiões.</p>
                <button onclick="baixarPlanilha()" class="btn-action w-full bg-blue-600 text-white p-4 rounded-xl hover:bg-blue-500">Baixar Planilha ERP</button>
            </div>

            <div class="erp-card">
                <div class="text-5xl mb-4">🚀</div>
                <h2 class="text-xl font-bold mb-2">2. Injetar Dados</h2>
                <p class="text-gray-400 text-xs mb-6">Selecione a planilha preenchida para atualizar preços e estoques globalmente.</p>
                <input type="file" id="inputPlanilha" class="hidden" accept=".xlsx, .xls" onchange="processarPlanilha(event)">
                <button onclick="document.getElementById('inputPlanilha').click()" class="btn-action w-full bg-white text-black p-4 rounded-xl hover:bg-gray-200">Subir Planilha (Upload)</button>
            </div>
        </div>

        <div id="statusBox" class="mt-10 erp-card hidden">
            <h3 class="text-sm font-bold text-blue-400 mb-4 uppercase tracking-widest">Processamento em Tempo Real</h3>
            <div id="logArea" class="bg-black rounded-lg p-4 font-mono text-[10px] h-48 overflow-y-auto space-y-1">
                </div>
            <div id="progressBarContainer" class="w-full bg-zinc-800 h-2 mt-4 rounded-full overflow-hidden">
                <div id="progressBar" class="bg-blue-500 h-full w-0 transition-all duration-300"></div>
            </div>
        </div>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');

        let fornecedorId = localStorage.getItem('iFipe_Anunciante');

        async function baixarPlanilha() {
            alert("Gerando planilha matriz baseada no estoque atual... Aguarde.");
            // Link para a planilha modelo (pode ser alterado)
            window.open('https://docs.google.com/spreadsheets/d/1Xy_SEUaVq19z9W-M1_U5M0FjDEx9oG9x6-pBq3Nl44M/export?format=xlsx'); 
        }

        async function processarPlanilha(event) {
            const file = event.target.files[0];
            const reader = new FileReader();

            document.getElementById('statusBox').classList.remove('hidden');
            log("Iniciando leitura do arquivo: " + file.name, "info");

            reader.onload = async (e) => {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const sheetName = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[sheetName];
                const rows = XLSX.utils.sheet_to_json(worksheet);

                log(`Detectadas ${rows.length} linhas de produtos.`, "info");
                
                // Puxar Variacoes e Regiões para Cruzamento de Dados
                const [{data: v}, {data: r}] = await Promise.all([
                    _s.from('variacoes').select('id, capacidade, cor, produtos_mestre(nome)'),
                    _s.from('regioes').select('id, nome')
                ]);

                let processados = 0;
                let erros = 0;

                for (let i = 0; i < rows.length; i++) {
                    const row = rows[i];
                    try {
                        // Achar a Variação (Nome + Cap + Cor)
                        const varEncontrada = v.find(item => 
                            item.produtos_mestre.nome.toUpperCase() === String(row.Modelo).toUpperCase() &&
                            item.capacidade.toUpperCase() === String(row.Capacidade).toUpperCase() &&
                            item.cor.toUpperCase() === String(row.Cor).toUpperCase()
                        );

                        const regEncontrada = r.find(item => 
                            item.nome.toUpperCase() === String(row.Origem).toUpperCase()
                        );

                        if (!varEncontrada || !regEncontrada) {
                            log(`Linha ${i+2}: Modelo ou Origem não reconhecidos. Pulando.`, "error");
                            erros++;
                            continue;
                        }

                        // Payload ERP
                        const payload = {
                            fornecedor_id: fornecedorId,
                            variacao_id: varEncontrada.id,
                            regiao_id: regEncontrada.id,
                            condicao: row.Condição,
                            preco: parseFloat(row["PREÇO DO ANÚNCIO (R$)"]),
                            moeda: "BRL",
                            quantidade: parseInt(row.Estoque) || 0,
                            saude_bateria: row.Bateria || null,
                            garantia: row.Garantia || "1 ANO APPLE",
                            status_aprovacao: 'aprovado',
                            atualizado_em: new Date().toISOString()
                        };

                        // Upsert (se já existir a mesma variação/região/condicao para esse lojista, ele atualiza, senão cria)
                        const { error } = await _s.from('ofertas').upsert(payload, { 
                            onConflict: 'fornecedor_id, variacao_id, regiao_id, condicao' 
                        });

                        if (error) throw error;
                        
                        processados++;
                        atualizarProgresso(processados, rows.length);
                        log(`OK: ${row.Modelo} ${row.Capacidade} atualizado.`, "success");

                    } catch (err) {
                        log(`Erro na linha ${i+2}: ${err.message}`, "error");
                        erros++;
                    }
                }

                log(`PROCESSO FINALIZADO. ${processados} sucessos, ${erros} falhas.`, "info");
                alert("Sincronização Seth concluída!");
            };
            reader.readAsArrayBuffer(file);
        }

        function log(msg, type) {
            const area = document.getElementById('logArea');
            const color = type === 'error' ? 'text-red-500' : (type === 'success' ? 'text-green-500' : 'text-blue-400');
            area.innerHTML += `<div class="${color}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            area.scrollTop = area.scrollHeight;
        }

        function atualizarProgresso(atual, total) {
            const pct = (atual / total) * 100;
            document.getElementById('progressBar').style.width = pct + "%";
        }
    </script>
</body>
</html>
