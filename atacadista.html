<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Painel do Atacadista</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #38383a; --input: #2c2c2e; --blue: #0a84ff; }
        body { background: var(--bg); color: var(--text); font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin:0; padding-bottom: 50px; }
        .user-bar { background:rgba(28, 28, 30, 0.9); backdrop-filter:blur(15px); border-bottom:1px solid var(--border); padding:15px 20px; position:sticky; top:0; z-index:100; display:flex; justify-content:space-between; align-items:center; }
        .apple-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 1.5rem; width: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .apple-input { background: var(--input); border: 1px solid var(--border); border-radius: 10px; padding: 12px; width: 100%; color: var(--text); outline: none; font-size: 12px; transition: 0.3s; font-weight: bold; }
        .apple-input:focus { border-color: var(--blue); }
        .apple-button { background: var(--blue); color: #fff; font-weight: 900; border-radius: 50px; padding: 12px 20px; cursor: pointer; text-transform: uppercase; border: none; font-size: 11px; transition: 0.3s; }
        
        table { width: 100%; border-collapse: collapse; min-width: 800px; }
        th { font-size: 9px; color: #86868b; text-transform: uppercase; padding: 10px; text-align: left; border-bottom: 1px solid var(--border); }
        td { padding: 12px 10px; border-bottom: 1px solid var(--input); font-size: 12px; vertical-align: middle; }

        .tab-btn { background: #1c1c1e; border: 1px solid #38383a; color: #86868b; padding: 12px 10px; font-weight: 900; text-transform: uppercase; font-size: 10px; cursor: pointer; flex: 1; text-align: center; border-radius: 10px; }
        .tab-btn.active { background: rgba(10, 132, 255, 0.1); border-color: var(--blue); color: var(--blue); }
        
        /* MODAL CALCULADORA */
        #calcModal { background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); }
        .calc-res { background: #2c2c2e; border-radius: 12px; padding: 10px; margin-top: 5px; }

        .hidden { display: none !important; }
    </style>
</head>
<body id="appBody">

    <div id="authSection" class="flex items-center justify-center min-h-screen px-4">
        <div class="apple-card max-w-[400px] text-center border-blue-500 border-2 shadow-2xl">
            <h1 class="text-3xl font-black italic mb-2 text-blue-500">ATACADISTA</h1>
            <p class="text-[10px] font-bold uppercase text-gray-500 mb-8 tracking-[0.2em]">iFipe Dashboard</p>
            <form onsubmit="loginLojista(event)">
                <input type="text" id="logNomeLoja" class="apple-input mb-3 text-center" placeholder="Nome da Loja" required>
                <input type="password" id="logSenhaLoja" class="apple-input mb-6 text-center" placeholder="Senha" required>
                <button type="submit" class="apple-button w-full">Acessar Loja</button>
            </form>
        </div>
    </div>

    <div id="dashboardSection" class="hidden">
        <div class="user-bar">
            <h1 class="text-lg font-black italic text-blue-500 m-0">Olá, <span id="nomeLojaLogada" class="text-white">Loja</span></h1>
            <div class="flex gap-2">
                <button onclick="abrirCalc()" class="text-[9px] font-black uppercase bg-gray-800 px-3 py-1.5 rounded text-gray-400 border border-gray-700">🧮 Calculadora VIP</button>
                <button onclick="sairLojista()" class="text-[9px] text-red-500 font-black uppercase border border-red-900 rounded px-3 py-1.5">Sair</button>
            </div>
        </div>

        <div class="max-w-[1200px] mx-auto p-4 md:p-8">
            <div class="flex gap-2 mb-8">
                <button class="tab-btn active" id="btnTabMeus" onclick="mudarAba('meus')">📦 Meus Anúncios</button>
                <button class="tab-btn" id="btnTabPostar" onclick="mudarAba('postar')">➕ Novo Lote</button>
                <button onclick="copiarEstoqueZap()" class="tab-btn bg-green-900/20 text-green-400 border-green-900/50">🟢 ENVIAR LISTA NO ZAP</button>
            </div>

            <div id="abaMeus">
                <div class="apple-card overflow-x-auto">
                    <table>
                        <thead>
                            <tr><th>Produto</th><th>Estoque</th><th>Preço</th><th class="text-right">Ação</th></tr>
                        </thead>
                        <tbody id="listaMinhasOfertas"></tbody>
                    </table>
                </div>
            </div>

            <div id="abaPostar" class="hidden">
                <div class="apple-card max-w-xl mx-auto">
                    <form onsubmit="salvarOfertaLojista(event)">
                        <div class="grid grid-cols-2 gap-3 mb-4">
                            <select id="f_produto_id" class="apple-input" onchange="carregarCaps()"></select>
                            <select id="f_cap" class="apple-input" onchange="carregarCores()"></select>
                        </div>
                        <div class="grid grid-cols-2 gap-3 mb-6">
                            <select id="f_cor" class="apple-input" onchange="liberarDetalhes()"></select>
                            <select id="f_regiao" class="apple-input"></select>
                        </div>
                        <div id="f_detalhes" class="hidden">
                            <div class="grid grid-cols-2 gap-3 mb-4">
                                <input type="number" id="f_qtd" class="apple-input" placeholder="Quantidade">
                                <input type="text" id="f_preco" class="apple-input text-green-400" placeholder="R$ Preço" oninput="mascararMoeda(this)">
                            </div>
                            <button type="submit" class="apple-button w-full">Publicar Agora</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <div id="calcModal" class="hidden fixed inset-0 z-[1000] flex items-center justify-center p-4">
        <div class="apple-card max-w-[400px] w-full border-blue-500 border-2">
            <h3 class="text-xl font-black text-blue-500 mb-6 uppercase italic text-center">Calculadora VIP</h3>
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div><label class="text-[9px] font-bold text-gray-500 uppercase">Binance (USD)</label><input type="number" id="c_binance" class="apple-input" value="5.15" step="0.01"></div>
                <div><label class="text-[9px] font-bold text-gray-500 uppercase">VIP Rate (+0.07)</label><input type="text" id="c_vip" class="apple-input bg-blue-900/20" disabled></div>
            </div>
            <div class="mb-6"><label class="text-[10px] font-black uppercase">Custo Unitário (Dólar)</label><input type="number" id="c_usd_unit" class="apple-input text-lg border-blue-500" placeholder="0.00" oninput="executarCalc()"></div>
            
            <div class="space-y-3">
                <div class="calc-res"><p class="text-[9px] text-gray-400 uppercase font-bold">Custo SP (Unitário)</p><h4 id="res_custo_sp" class="text-white font-black text-xl">R$ 0,00</h4></div>
                <div class="calc-res border-l-4 border-green-500"><p class="text-[9px] text-green-500 uppercase font-bold">Sugestão Atacado (+5%)</p><h4 id="res_atacado" class="text-green-400 font-black text-xl">R$ 0,00</h4></div>
                <div class="calc-res border-l-4 border-yellow-500"><p class="text-[9px] text-yellow-500 uppercase font-bold">Sugestão Atacrejo (+12%)</p><h4 id="res_atacrejo" class="text-yellow-400 font-black text-xl">R$ 0,00</h4></div>
                <div class="calc-res border-l-4 border-red-500"><p class="text-[9px] text-red-500 uppercase font-bold">Sugestão Varejo (+25%)</p><h4 id="res_varejo" class="text-red-400 font-black text-xl">R$ 0,00</h4></div>
            </div>
            <button onclick="document.getElementById('calcModal').classList.add('hidden')" class="apple-button w-full mt-6 bg-gray-800">Fechar</button>
        </div>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let fornecedorId = null, produtosMestre = [], gradeVariacoes = [];

        window.onload = () => {
            if(localStorage.getItem('iFipe_Atacadista_ID')) {
                fornecedorId = parseInt(localStorage.getItem('iFipe_Atacadista_ID'));
                document.getElementById('nomeLojaLogada').innerText = localStorage.getItem('iFipe_Atacadista_Nome');
                liberarPainel();
            }
        };

        async function loginLojista(e) {
            e.preventDefault();
            const loja = document.getElementById('logNomeLoja').value.trim();
            const senha = document.getElementById('logSenhaLoja').value.trim();

            // BYPASS BRYAN
            if(loja === 'bryan' && senha === '96197577') {
                fornecedorId = 1; // ID genérico para teste
                localStorage.setItem('iFipe_Atacadista_ID', '1');
                localStorage.setItem('iFipe_Atacadista_Nome', 'Bryan God Mode');
                liberarPainel(); return;
            }

            const { data } = await _s.from('fornecedores').select('*').ilike('nome', loja).eq('senha', senha).maybeSingle();
            if(data && data.ativo) {
                fornecedorId = data.id;
                localStorage.setItem('iFipe_Atacadista_ID', data.id);
                localStorage.setItem('iFipe_Atacadista_Nome', data.nome);
                liberarPainel();
            } else alert("Loja bloqueada ou dados incorretos.");
        }

        function liberarPainel() {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');
            carregarBase(); carregarMinhasOfertas();
        }

        function abrirCalc() {
            document.getElementById('calcModal').classList.remove('hidden');
            executarCalc();
        }

        function executarCalc() {
            const binance = parseFloat(document.getElementById('c_binance').value);
            const vip = binance + 0.07;
            document.getElementById('c_vip').value = vip.toFixed(2);
            
            const usdUnit = parseFloat(document.getElementById('c_usd_unit').value) || 0;
            const custoBase = (usdUnit * vip) * 1.06; // Taxa de importação padrão 6%

            document.getElementById('res_custo_sp').innerText = custoBase.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
            document.getElementById('res_atacado').innerText = (custoBase * 1.05).toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
            document.getElementById('res_atacrejo').innerText = (custoBase * 1.12).toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
            document.getElementById('res_varejo').innerText = (custoBase * 1.25).toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
        }

        async function carregarBase() {
            const [p, r, v] = await Promise.all([
                _s.from('produtos_mestre').select('*').order('nome'),
                _s.from('regioes').select('*').order('nome'),
                _s.from('variacoes').select('*')
            ]);
            produtosMestre = p.data; gradeVariacoes = v.data;
            document.getElementById('f_produto_id').innerHTML = '<option value="" disabled selected>Escolher Modelo...</option>' + p.data.map(x => `<option value="${x.id}">${x.nome}</option>`).join('');
            document.getElementById('f_regiao').innerHTML = r.data.map(x => `<option value="${x.id}">${x.nome}</option>`).join('');
        }

        function carregarCaps() {
            const pid = document.getElementById('f_produto_id').value;
            const caps = [...new Set(gradeVariacoes.filter(x => x.produto_id == pid).map(x => x.capacidade))];
            document.getElementById('f_cap').innerHTML = caps.map(c => `<option value="${c}">${c}</option>`).join('');
            carregarCores();
        }

        function carregarCores() {
            const pid = document.getElementById('f_produto_id').value;
            const cap = document.getElementById('f_cap').value;
            const cores = gradeVariacoes.filter(x => x.produto_id == pid && x.capacidade == cap);
            document.getElementById('f_cor').innerHTML = cores.map(x => `<option value="${x.id}">${x.cor}</option>`).join('');
            document.getElementById('f_detalhes').classList.remove('hidden');
        }

        async function carregarMinhasOfertas() {
            const { data } = await _s.from('ofertas').select('*, variacoes(*, produtos_mestre(*))').eq('fornecedor_id', fornecedorId).order('criado_em', {ascending: false});
            document.getElementById('listaMinhasOfertas').innerHTML = data.map(o => `
                <tr>
                    <td><span class="font-black text-white">${o.variacoes.produtos_mestre.nome}</span><br><span class="text-[10px] text-gray-500">${o.variacoes.capacidade} | ${o.variacoes.cor}</span></td>
                    <td class="text-lg font-bold">${o.quantidade}</td>
                    <td class="text-green-400 font-bold">R$ ${o.preco.toLocaleString('pt-BR')}</td>
                    <td class="text-right"><button onclick="apagarOferta(${o.id})" class="text-red-500 font-bold text-[10px]">X APAGAR</button></td>
                </tr>
            `).join('');
        }

        function mascararMoeda(i) { let v = i.value.replace(/\D/g, ''); v = (v/100).toFixed(2).replace('.', ','); i.value = v.replace(/\B(?=(\d{3})+(?!\d))/g, "."); }
        function sairLojista() { localStorage.clear(); window.location.reload(); }
        function mudarAba(aba) { document.getElementById('abaMeus').classList.toggle('hidden', aba!=='meus'); document.getElementById('abaPostar').classList.toggle('hidden', aba!=='postar'); document.getElementById('btnTabMeus').classList.toggle('active', aba==='meus'); document.getElementById('btnTabPostar').classList.toggle('active', aba==='postar'); }
        async function apagarOferta(id) { if(confirm("Apagar?")) { await _s.from('ofertas').delete().eq('id', id); carregarMinhasOfertas(); } }
    </script>
</body>
</html>
