<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Painel do Anunciante</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #38383a; --input: #2c2c2e; }
        body.light-mode { --bg: #f5f5f7; --card: #fff; --text: #1d1d1f; --border: #d2d2d7; --input: #e8e8ed; }
        
        body { background: var(--bg); color: var(--text); font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin:0; transition: 0.3s; }
        .user-bar { background:rgba(28, 28, 30, 0.8); backdrop-filter:blur(15px); border-bottom:1px solid var(--border); padding:15px 20px; position:sticky; top:0; z-index:100; }
        body.light-mode .user-bar { background: rgba(255,255,255,0.8); }

        .apple-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 2rem; width: 100%; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .apple-input { background: var(--input); border: 1px solid var(--border); border-radius: 12px; padding: 14px; width: 100%; color: var(--text); outline: none; margin-bottom: 1rem; font-size: 14px; }
        .apple-button { background: #fff; color: #000; font-weight: 900; border-radius: 50px; padding: 16px; width: 100%; cursor: pointer; text-transform: uppercase; border: none; font-size: 13px; transition: 0.3s; }
        .apple-button:hover { background: #0071e3; color: #fff; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th { font-size: 10px; color: #86868b; text-transform: uppercase; padding: 12px; text-align: left; border-bottom: 1px solid var(--border); letter-spacing: 0.1em; }
        td { padding: 14px 12px; border-bottom: 1px solid var(--input); font-size: 13px; }
        
        .mini-input { background: var(--input); border: 1px solid var(--border); border-radius: 8px; padding: 6px; width: 80px; color: var(--text); text-align: center; font-weight: bold; }
        .btn-acao { font-weight: bold; cursor: pointer; font-size: 10px; text-transform: uppercase; padding: 6px 10px; border-radius: 6px; display: inline-block; margin-bottom: 4px; }
        .btn-edit { background: rgba(0, 113, 227, 0.2); color: #0071e3; }
        .btn-del { background: rgba(255, 59, 48, 0.2); color: #ff3b30; }
        
        .theme-toggle { background: var(--input); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 50px; cursor: pointer; font-size: 12px; font-weight: 700; transition: 0.3s; }

        .btn-wpp-float { position: fixed; bottom: 20px; right: 20px; background-color: #25d366; color: #fff; width: 50px; height: 50px; border-radius: 50px; display: flex; align-items: center; justify-content: center; text-decoration: none; box-shadow: 0 4px 15px rgba(0,0,0,0.4); z-index: 1000; transition: 0.3s; overflow: hidden; white-space: nowrap; }
        .btn-wpp-float:hover { width: 170px; padding-left: 15px; justify-content: flex-start; }
        .wpp-text { font-size: 11px; font-weight: 900; text-transform: uppercase; margin-left: 10px; opacity: 0; transition: 0.3s; }
        .btn-wpp-float:hover .wpp-text { opacity: 1; }
        .hidden { display: none !important; }

        .battery-grid { display: grid; grid-template-cols: 1fr 1fr; gap: 8px; margin-bottom: 15px;}
        .battery-pill { padding: 12px 10px; border-radius: 10px; background: var(--input); border: 1px solid var(--border); cursor: pointer; font-size: 10px; font-weight: 900; text-transform: uppercase; text-align: center; transition: 0.2s; color: #86868b; display: flex; align-items: center; justify-content: center; }
        .battery-pill.active { background: #32d74b !important; color: #000 !important; }
    </style>
</head>
<body>

    <div id="editModal" class="hidden fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-[200] px-4">
        <div class="apple-card w-full max-w-[500px]">
            <h3 class="font-bold text-[14px] text-blue-500 mb-2 uppercase tracking-widest">Editar Anúncio</h3>
            <form onsubmit="salvarEdicaoCompleta(event)">
                <input type="hidden" id="edit_id">
                <div class="grid grid-cols-2 gap-4">
                    <div><label>Condição</label><select id="edit_condicao" class="apple-input"><option value="Novo">Novo</option><option value="Seminovo">Seminovo</option></select></div>
                    <div><label>Estoque</label><input type="number" id="edit_quantidade" class="apple-input" min="0" required></div>
                </div>
                <div><label id="label_edit_preco">Preço</label><input type="text" id="edit_preco" class="apple-input" required></div>
                <div class="flex gap-2">
                    <button type="button" onclick="fecharModalEdicao()" class="apple-button bg-gray-600 text-white w-1/3 border-0">Sair</button>
                    <button type="submit" class="apple-button bg-blue-600 text-white w-2/3 border-0">Salvar Alteração</button>
                </div>
            </form>
        </div>
    </div>

    <div id="loginSection" class="hidden flex items-center justify-center min-h-screen px-4">
        <div class="apple-card max-w-[400px] text-center">
            <h1 class="text-5xl font-black italic mb-2">iFipe</h1>
            <form onsubmit="fazerLogin(event)">
                <input type="text" id="loginId" class="apple-input" placeholder="Sua Loja" required>
                <input type="password" id="loginPass" class="apple-input" placeholder="Senha" required>
                <button type="submit" class="apple-button w-full">Entrar</button>
            </form>
            <p id="loginMsg" class="mt-4 text-[10px] font-bold text-red-500 uppercase"></p>
        </div>
    </div>

    <div id="formSection" class="hidden">
        <div class="user-bar">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="text-[11px] font-black uppercase">Loja: <span id="nomeLoja" class="text-blue-500">...</span></div>
                <div class="flex items-center gap-4">
                    <button onclick="toggleTheme()" id="themeBtn" class="theme-toggle">🌙 Modo</button>
                    <button onclick="sairPainel()" class="text-[10px] text-red-500 font-black uppercase">Sair</button>
                </div>
            </div>
        </div>

        <div class="max-w-7xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="apple-card">
                    <h2 class="text-xl font-black italic mb-6">Novo Anúncio</h2>
                    <form id="priceForm" onsubmit="salvarOferta(event)">
                        <label>Aparelho</label><select id="produto_id" class="apple-input" onchange="aoMudarProduto()" required></select>
                        <div class="grid grid-cols-2 gap-4">
                            <div><label>Condição</label><select id="condicao" class="apple-input"><option value="Novo">Novo</option><option value="Seminovo">Seminovo</option></select></div>
                            <div><label>Estoque</label><input type="number" id="quantidade" class="apple-input" value="1" min="0" required></div>
                        </div>
                        <label id="label_preco">Preço Unitário</label><input type="text" id="preco" class="apple-input" placeholder="Valor" required>
                        <label>Região / Origem</label><select id="regiao_id" class="apple-input" required></select>
                        <button type="submit" class="apple-button w-full bg-blue-600 text-white border-0 mt-4">Publicar Oferta</button>
                    </form>
                </div>
            </div>
            <div class="lg:col-span-2">
                <div class="apple-card">
                    <h2 class="text-xl font-black italic mb-6">Meus Anúncios Ativos</h2>
                    <div class="overflow-x-auto">
                        <table>
                            <thead><tr><th>Produto</th><th>Condição</th><th>Estoque</th><th>Preço</th><th>Ações</th></tr></thead>
                            <tbody id="listaAtivos"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <a href="https://wa.me/556896003049" target="_blank" class="btn-wpp-float">
        <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" width="24" height="24" viewBox="0 0 16 16"><path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326z"/></svg>
        <span class="wpp-text">Suporte iFipe</span>
    </a>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let loja = null; let gradeVariacoes = [];

        function toggleTheme() {
            const b = document.body; b.classList.toggle('light-mode');
            document.getElementById('themeBtn').innerText = b.classList.contains('light-mode') ? "☀️ Modo" : "🌙 Modo";
            localStorage.setItem('iFipe_Theme', b.classList.contains('light-mode') ? 'light' : 'dark');
        }

        window.onload = async () => {
            if(localStorage.getItem('iFipe_Theme') === 'light') toggleTheme();
            const token = localStorage.getItem('iFipe_Anunciante');
            if (token) {
                const { data } = await _s.from('fornecedores').select('*, regioes(nome, moeda)').eq('id', token).maybeSingle();
                if(data && data.ativo) { 
                    loja = data; 
                    const moeda = loja.regioes?.moeda === 'USD' ? '$ (DÓLAR)' : 'R$ (REAL)';
                    document.getElementById('label_preco').innerText = `Preço Unitário em ${moeda}`;
                    document.getElementById('label_edit_preco').innerText = `Preço em ${moeda}`;
                    liberarAcesso(); 
                }
            } else { document.getElementById('loginSection').classList.remove('hidden'); }
        };

        async function atualizarLista() {
            const { data } = await _s.from('ofertas').select('*, variacoes(tamanho, capacidade, cor, produtos_mestre(nome)), regioes(moeda)').eq('fornecedor_id', loja.id).order('criado_em', {ascending: false});
            const prefixo = (loja.regioes?.moeda === 'USD') ? '$' : 'R$';
            document.getElementById('listaAtivos').innerHTML = data.map(o => `
                <tr>
                    <td><span class="font-bold">${o.variacoes.produtos_mestre.nome}</span></td>
                    <td>${o.condicao}</td>
                    <td><input type="number" id="q-${o.id}" class="mini-input" value="${o.quantidade}" onchange="update(${o.id})"></td>
                    <td>${prefixo} ${o.preco.toLocaleString('pt-BR')}</td>
                    <td><span class="btn-edit" onclick="abrirModalEdicao(${o.id})">Editar</span></td>
                </tr>`).join('');
        }

        function fazerLogin(event) { /* ... lógica de login ... */ }
        function liberarAcesso() { document.getElementById('loginSection').classList.add('hidden'); document.getElementById('formSection').classList.remove('hidden'); document.getElementById('nomeLoja').innerText = loja.nome; init(); }
        async function init() { /* ... inicializa selects ... */ atualizarLista(); }
        function sairPainel() { localStorage.removeItem('iFipe_Anunciante'); window.location.reload(); }
    </script>
</body>
</html>
