<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Painel do Anunciante</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #38383a; --input: #2c2c2e; }
        body.light-mode { --bg: #f5f5f7; --card: #fff; --text: #1d1d1f; --border: #d2d2d7; --input: #e8e8ed; }
        body { background: var(--bg); color: var(--text); font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin:0; transition: 0.3s; }
        .user-bar { background:rgba(28, 28, 30, 0.8); backdrop-filter:blur(15px); border-bottom:1px solid var(--border); padding:15px 20px; position:sticky; top:0; z-index:100; }
        .apple-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 2rem; width: 100%; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .apple-input { background: var(--input); border: 1px solid var(--border); border-radius: 12px; padding: 14px; width: 100%; color: var(--text); outline: none; margin-bottom: 1rem; font-size: 14px; transition: 0.3s; }
        .apple-input:focus { border-color: #0071e3; }
        .apple-button { background: #fff; color: #000; font-weight: 900; border-radius: 50px; padding: 16px; width: 100%; cursor: pointer; text-transform: uppercase; border: none; font-size: 13px; transition: 0.3s; }
        .apple-button:hover { background: #0071e3; color: #fff; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th { font-size: 10px; color: #86868b; text-transform: uppercase; padding: 12px; text-align: left; border-bottom: 1px solid var(--border); letter-spacing: 0.1em; }
        td { padding: 14px 12px; border-bottom: 1px solid var(--input); font-size: 13px; }
        label { display: block; text-transform: uppercase; font-size: 10px; color: #86868b; margin-bottom: 6px; font-weight: 900; letter-spacing: 0.1em; }
        .hidden { display: none !important; }
        .mini-input { background: var(--input); border: 1px solid var(--border); border-radius: 8px; padding: 6px; width: 80px; color: var(--text); text-align: center; font-weight: bold; }
        .btn-acao { font-weight: bold; cursor: pointer; font-size: 10px; text-transform: uppercase; padding: 6px 10px; border-radius: 6px; display: inline-block; margin-bottom: 4px; }
        .btn-edit { background: rgba(0, 113, 227, 0.2); color: #0071e3; }
        .btn-del { background: rgba(255, 59, 48, 0.2); color: #ff3b30; }
        .theme-toggle { background: var(--input); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 50px; cursor: pointer; font-size: 12px; font-weight: 700; }
    </style>
</head>
<body>

    <div id="loginSection" class="hidden flex items-center justify-center min-h-screen px-4">
        <div class="apple-card max-w-[400px] text-center w-full">
            <h1 class="text-5xl font-black italic mb-2">iFipe</h1>
            <p class="text-[10px] font-bold uppercase text-blue-500 mb-8 tracking-[0.4em]">Painel do Anunciante</p>
            <form id="loginForm" onsubmit="fazerLogin(event)">
                <input type="text" id="loginId" class="apple-input" placeholder="Nome da sua Loja" required>
                <input type="password" id="loginPass" class="apple-input" placeholder="Senha" required>
                <button type="submit" class="apple-button w-full" id="btnEntrar">Entrar no Painel</button>
                <span class="block text-[#0071e3] cursor-pointer text-[10px] font-black uppercase mt-5 text-center tracking-widest" onclick="toggleForm()">QUERO SER UM FORNECEDOR</span>
            </form>
            <form id="registerForm" class="hidden" onsubmit="solicitarCadastro(event)">
                <input type="text" id="regNome" class="apple-input" placeholder="NOME DA LOJA" required>
                <input type="text" id="regWhats" class="apple-input" placeholder="WHATSAPP DA LOJA" required>
                <input type="password" id="regPass" class="apple-input" placeholder="CRIAR SENHA" required>
                <button type="submit" class="apple-button w-full mt-2 border border-[#38383a] bg-[#2c2c2e] text-white hover:bg-[#0071e3]" id="btnCadastrar">Enviar Solicitação</button>
                <span class="block text-gray-500 cursor-pointer text-[10px] font-black uppercase mt-5 text-center tracking-widest hover:text-white" onclick="toggleForm()">VOLTAR AO LOGIN</span>
            </form>
            <p id="loginMsg" class="mt-4 text-[10px] font-bold text-red-500 uppercase"></p>
        </div>
    </div>

    <div id="formSection" class="hidden">
        <div class="user-bar">
            <div class="max-w-7xl mx-auto flex justify-between items-center w-full">
                <div class="text-[11px] font-black uppercase tracking-widest">Loja: <span id="nomeLoja" class="text-blue-500">...</span></div>
                <div class="flex items-center gap-4">
                    <button onclick="toggleTheme()" id="themeBtn" class="theme-toggle">🌙 Modo</button>
                    <button onclick="sairPainel()" class="text-[10px] text-red-500 font-black uppercase">Sair</button>
                </div>
            </div>
        </div>

        <div class="max-w-7xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="apple-card">
                    <h2 class="text-xl font-black italic mb-6">Novo Anúncio</h2>
                    <form onsubmit="salvarOferta(event)">
                        
                        <label>Categoria</label>
                        <select id="filtro_grupo" class="apple-input" onchange="popularProdutos()">
                            <option value="">Selecione a Categoria...</option>
                            <option value="1">IPHONE</option>
                            <option value="2">APPLE WATCH</option>
                            <option value="3">IPAD</option>
                            <option value="4">MACBOOK</option>
                            <option value="5">IMAC</option>
                            <option value="6">ACESSÓRIOS APPLE</option>
                            <option value="7">XIAOMI</option>
                            <option value="8">REALME</option>
                        </select>

                        <label>Aparelho / Modelo</label>
                        <select id="produto_id" class="apple-input" onchange="aoMudarProduto()" required>
                            <option value="">Selecione a categoria primeiro...</option>
                        </select>
                        
                        <div id="gradeOpcoes" class="mb-4"></div>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label>Condição</label>
                                <select id="condicao" class="apple-input">
                                    <option value="Novo">Novo</option>
                                    <option value="Seminovo">Seminovo</option>
                                </select>
                            </div>
                            <div><label>Estoque</label><input type="number" id="quantidade" class="apple-input" value="1" min="0" required></div>
                        </div>

                        <div class="grid grid-cols-2 gap-4 mt-2">
                            <div><label>Preço (R$)</label><input type="text" id="preco_brl" class="apple-input" placeholder="0,00"></div>
                            <div><label>Preço ($)</label><input type="text" id="preco_usd" class="apple-input" placeholder="0,00"></div>
                        </div>

                        <button type="submit" class="apple-button w-full bg-blue-600 text-white border-0 mt-4">Publicar Oferta</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2">
                <div class="apple-card">
                    <h2 class="text-xl font-black italic mb-6">Meus Anúncios</h2>
                    <div class="overflow-x-auto">
                        <table>
                            <thead><tr><th>Produto</th><th>Estoque</th><th>Preço</th><th>Ações</th></tr></thead>
                            <tbody id="listaAtivos"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let loja = null; 
        let produtosMestre = []; 
        let gradeVariacoes = [];

        window.onload = async () => {
            const token = localStorage.getItem('iFipe_Anunciante');
            if (token) {
                const { data } = await _s.from('fornecedores').select('*').eq('id', token).maybeSingle();
                if(data && data.ativo) { loja = data; liberarAcesso(); } 
                else { localStorage.removeItem('iFipe_Anunciante'); document.getElementById('loginSection').classList.remove('hidden'); }
            } else { document.getElementById('loginSection').classList.remove('hidden'); }
        };

        function liberarAcesso() { 
            document.getElementById('loginSection').classList.add('hidden'); 
            document.getElementById('formSection').classList.remove('hidden'); 
            document.getElementById('nomeLoja').innerText = loja.nome; 
            init(); 
        }

        async function init() {
            const [p, v] = await Promise.all([ 
                _s.from('produtos_mestre').select('*').order('nome'), 
                _s.from('variacoes').select('*') 
            ]);
            produtosMestre = p.data;
            gradeVariacoes = v.data;
            atualizarLista();
        }

        function popularProdutos() {
            const grupoId = document.getElementById('filtro_grupo').value;
            const select = document.getElementById('produto_id');
            const filtrados = produtosMestre.filter(x => x.grupo_id == grupoId);
            select.innerHTML = '<option value="">Selecione o Modelo...</option>' + filtrados.map(x => `<option value="${x.id}">${x.nome}</option>`).join('');
        }

        function aoMudarProduto() {
            const pid = document.getElementById('produto_id').value;
            const container = document.getElementById('gradeOpcoes');
            const vars = gradeVariacoes.filter(x => x.produto_id == pid);
            const tams = [...new Set(vars.map(x => x.tamanho).filter(Boolean))]; 
            const caps = [...new Set(vars.map(x => x.capacidade).filter(Boolean))]; 
            const cores = [...new Set(vars.map(x => x.cor).filter(Boolean))];
            
            let html = '<div class="grid grid-cols-1 gap-2 mt-4">';
            if(tams.length) html += `<label>Tamanho</label><select id="f_tam" class="apple-input">${tams.map(c => `<option value="${c}">${c}</option>`).join('')}</select>`;
            if(caps.length) html += `<label>GB</label><select id="f_cap" class="apple-input">${caps.map(c => `<option value="${c}">${c}</option>`).join('')}</select>`;
            if(cores.length) html += `<label>Cor</label><select id="f_cor" class="apple-input">${cores.map(c => `<option value="${c}">${c}</option>`).join('')}</select>`;
            container.innerHTML = html + '</div>';
        }

        async function salvarOferta(e) {
            e.preventDefault();
            // Lógica de insert aqui (conforme já temos rodando)
            alert("Anúncio Enviado!");
        }

        async function atualizarLista() {
            const { data } = await _s.from('ofertas').select('*, variacoes(*, produtos_mestre(*))').eq('fornecedor_id', loja.id);
            document.getElementById('listaAtivos').innerHTML = data.map(o => `<tr><td>${o.variacoes.produtos_mestre.nome}</td><td>${o.quantidade}</td><td>${o.preco}</td><td>Excluir</td></tr>`).join('');
        }

        function toggleForm() { 
            document.getElementById('loginForm').classList.toggle('hidden'); 
            document.getElementById('registerForm').classList.toggle('hidden'); 
        }

        async function fazerLogin(e) {
            e.preventDefault();
            const u = document.getElementById('loginId').value;
            const p = document.getElementById('loginPass').value;
            const { data } = await _s.from('fornecedores').select('*').ilike('nome', u).eq('senha', p).maybeSingle();
            if(data && data.ativo) { localStorage.setItem('iFipe_Anunciante', data.id); window.location.reload(); }
            else { alert("Acesso Negado ou Pendente."); }
        }

        async function solicitarCadastro(e) {
            e.preventDefault();
            await _s.from('fornecedores').insert([{ nome: document.getElementById('regNome').value, whatsapp: document.getElementById('regWhats').value, senha: document.getElementById('regPass').value, ativo: false }]);
            alert("Solicitação enviada!"); toggleForm();
        }

        function sairPainel() { localStorage.removeItem('iFipe_Anunciante'); window.location.reload(); }
    </script>
</body>
</html>
