<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Painel do Anunciante</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #38383a; --input: #2c2c2e; }
        body { background: var(--bg); color: var(--text); font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin:0; }
        .apple-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 2.5rem; width: 100%; max-width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .apple-input { background: var(--input); border: 1px solid var(--border); border-radius: 14px; padding: 16px; width: 100%; color: var(--text); outline: none; margin-bottom: 1.2rem; font-size: 14px; }
        .apple-button { background: #fff; color: #000; font-weight: 900; border-radius: 50px; padding: 18px; width: 100%; cursor: pointer; text-transform: uppercase; border: none; font-size: 14px; transition: 0.3s; }
        .apple-button:hover { background: #0071e3; color: #fff; }
        .hidden { display: none !important; }
        .user-bar { background:rgba(28, 28, 30, 0.8); backdrop-filter:blur(15px); border-bottom:1px solid var(--border); padding:15px 20px; position:sticky; top:0; z-index:100; }
    </style>
</head>
<body>

    <div id="loginSection" class="flex items-center justify-center min-h-screen px-4">
        <div class="apple-card text-center">
            <h1 class="text-5xl font-black italic mb-2">iFipe</h1>
            <p class="text-[10px] font-bold uppercase text-blue-500 mb-8 tracking-[0.4em]">Acesso do Anunciante</p>
            
            <form onsubmit="fazerLogin(event)">
                <input type="text" id="loginId" class="apple-input" placeholder="Nome da sua Loja" required>
                <input type="password" id="loginPass" class="apple-input" placeholder="Sua Senha" required>
                <button type="submit" id="btnEntrar" class="apple-button">Entrar no Painel</button>
            </form>
            <p id="loginMsg" class="mt-4 text-[10px] font-bold text-red-500 uppercase"></p>
        </div>
    </div>

    <div id="panelSection" class="hidden">
        <div class="user-bar">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <div class="text-[11px] font-black uppercase">Loja: <span id="nomeLoja" class="text-blue-500">...</span></div>
                <button onclick="sair()" class="text-[10px] text-red-500 font-black uppercase">Sair</button>
            </div>
        </div>
        
        <div class="max-w-7xl mx-auto p-8">
            <div class="bg-[#1c1c1e] p-10 rounded-3xl border border-[#38383a] text-center">
                <h2 class="text-2xl font-black italic">Bem-vindo ao Novo Painel</h2>
                <p class="text-gray-400 mt-4">Login realizado com sucesso. Estamos carregando suas ferramentas internacionais...</p>
                <div class="mt-8 p-4 bg-blue-900/20 border border-blue-500/30 rounded-xl text-blue-400 text-sm">
                    ⚠️ Bryan, se você está vendo esta tela, o **Login Funcionou**! 
                    <br>Agora me confirme para eu injetar o formulário de anúncios e as tabelas aqui dentro.
                </div>
            </div>
        </div>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');

        // Checa se já está logado ao abrir a página
        window.onload = async () => {
            const token = localStorage.getItem('iFipe_Anunciante');
            if (token) {
                const { data } = await _s.from('fornecedores').select('nome').eq('id', token).maybeSingle();
                if (data) {
                    mostrarPainel(data.nome);
                }
            }
        };

        async function fazerLogin(e) {
            e.preventDefault();
            const btn = document.getElementById('btnEntrar');
            const msg = document.getElementById('loginMsg');
            const lojaNome = document.getElementById('loginId').value.trim();
            const senha = document.getElementById('loginPass').value.trim();

            btn.innerText = "VERIFICANDO...";
            btn.disabled = true;

            // Busca na tabela fornecedores ignorando maiúsculas/minúsculas (ilike)
            const { data, error } = await _s.from('fornecedores')
                .select('id, nome, ativo')
                .ilike('nome', lojaNome)
                .eq('senha', senha)
                .maybeSingle();

            if (error) {
                msg.innerText = "ERRO DE CONEXÃO.";
                btn.innerText = "ENTRAR NO PAINEL";
                btn.disabled = false;
                return;
            }

            if (data) {
                if (!data.ativo) {
                    msg.innerText = "LOJA INATIVA. CONTATE O MASTER.";
                } else {
                    localStorage.setItem('iFipe_Anunciante', data.id);
                    mostrarPainel(data.nome);
                }
            } else {
                msg.innerText = "NOME DA LOJA OU SENHA INCORRETOS.";
            }

            btn.innerText = "ENTRAR NO PAINEL";
            btn.disabled = false;
        }

        function mostrarPainel(nome) {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('panelSection').classList.remove('hidden');
            document.getElementById('nomeLoja').innerText = nome;
        }

        function sair() {
            localStorage.removeItem('iFipe_Anunciante');
            window.location.reload();
        }
    </script>
</body>
</html>
