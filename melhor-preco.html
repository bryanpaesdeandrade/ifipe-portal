<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Acesso Lojista</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #000000; color: #ffffff; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .login-card { background: #1c1c1e; border: 1px solid #38383a; border-radius: 24px; padding: 2.5rem; width: 100%; max-width: 400px; text-align: center; }
        input, select { background: #2c2c2e; border: 1px solid #38383a; border-radius: 12px; padding: 15px; color: white; width: 100%; margin-bottom: 15px; outline: none; font-size: 14px; }
        input:focus { border-color: #0071e3; }
        button { background: #ffffff; color: #000000; font-weight: 800; padding: 15px; border-radius: 12px; width: 100%; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        button:hover { background: #0071e3; color: white; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="telaLogin" class="login-card">
        <h1 class="text-3xl font-black italic mb-10 tracking-tighter text-white">iFipe</h1>
        <p class="text-[10px] font-bold uppercase text-gray-500 mb-6 tracking-widest">Acesso Lojista</p>
        <input type="text" id="loginId" placeholder="Nome do Fornecedor ou ID">
        <input type="password" id="loginSenha" placeholder="Sua senha">
        <button onclick="fazerLogin()">Entrar</button>
    </div>

    <div id="painel" class="login-card hidden">
        <h2 class="text-xl font-bold mb-6">Publicar Oferta</h2>
        <select id="produtoSelect"></select>
        <select id="variacaoSelect"></select>
        <select id="regiaoSelect"></select>
        <input type="number" id="precoInput" placeholder="Preço (ex: 3900.88)" step="0.01">
        <button onclick="publicarOferta()">Publicar Agora</button>
        <p id="msg" class="mt-4 text-xs font-bold"></p>
    </div>

    <script>
        const _supabase = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');

        let fornecedorLogado = null;

        async function fazerLogin() {
            const login = document.getElementById('loginId').value;
            const senha = document.getElementById('loginSenha').value;

            // Busca por ID ou por Nome (Texto) conforme o novo SQL
            const { data, error } = await _supabase
                .from('fornecedores')
                .select('*')
                .or(`id.eq.${isNaN(login) ? -1 : login},nome.eq.${login}`)
                .eq('senha', senha)
                .single();

            if (data) {
                fornecedorLogado = data;
                document.getElementById('telaLogin').classList.add('hidden');
                document.getElementById('painel').classList.remove('hidden');
                carregarOpcoes();
            } else {
                alert("Acesso negado. Verifique o Nome/ID e a Senha.");
            }
        }

        async function carregarOpcoes() {
            const { data: p } = await _supabase.from('produtos_mestre').select('*');
            const { data: v } = await _supabase.from('variacoes').select('*');
            const { data: r } = await _supabase.from('regioes').select('*');

            const pSelect = document.getElementById('produtoSelect');
            pSelect.innerHTML = p.map(i => `<option value="${i.id}">${i.nome}</option>`).join('');

            const rSelect = document.getElementById('regiaoSelect');
            rSelect.innerHTML = r.map(i => `<option value="${i.id}">${i.bandeira} ${i.nome}</option>`).join('');

            // Atualiza variações conforme o produto
            pSelect.onchange = () => {
                const filtradas = v.filter(item => item.produto_id == pSelect.value);
                document.getElementById('variacaoSelect').innerHTML = filtradas.map(i => `<option value="${i.id}">${i.capacidade} - ${i.cor}</option>`).join('');
            };
            pSelect.onchange();
        }

        async function publicarOferta() {
            const varId = document.getElementById('variacaoSelect').value;
            const regId = document.getElementById('regiaoSelect').value;
            const preco = document.getElementById('precoInput').value;

            if (!preco || preco <= 0) {
                alert("Insira um preço válido!");
                return;
            }

            const { error } = await _supabase.from('ofertas').insert({
                variacao_id: varId,
                fornecedor_id: fornecedorLogado.id,
                regiao_id: regId,
                preco: preco
            });

            const msg = document.getElementById('msg');
            if (!error) {
                msg.innerText = "Oferta publicada com sucesso!";
                msg.className = "mt-4 text-xs font-bold text-green-500";
            } else {
                msg.innerText = "Erro ao publicar.";
                msg.className = "mt-4 text-xs font-bold text-red-500";
            }
        }
    </script>
</body>
</html>
