<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Melhor Preço</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #000000; color: #ffffff; font-family: -apple-system, sans-serif; margin: 0; }
        .ticker-bar { background: #1c1c1e; border-bottom: 1px solid #38383a; padding: 12px; font-size: 10px; font-weight: 800; color: #86868b; display: flex; justify-content: center; gap: 25px; }
        .ticker-val { color: #32d74b; }
        .price-card { background: #1c1c1e; border: 1px solid #38383a; border-radius: 24px; padding: 1.8rem; transition: 0.3s; position: relative; }
        .price-card:hover { border-color: #0071e3; transform: scale(1.02); }
        .top-deal { position: absolute; top: 0; right: 0; background: #32d74b; color: black; font-size: 9px; font-weight: 900; padding: 6px 16px; border-bottom-left-radius: 14px; text-transform: uppercase; }
        .price-value { color: #32d74b; font-size: 32px; font-weight: 800; letter-spacing: -1.5px; }
        .filter-select { background: #1c1c1e; border: 1px solid #38383a; border-radius: 14px; padding: 12px 20px; color: white; font-size: 10px; font-weight: 700; text-transform: uppercase; cursor: pointer; }
        .btn-whatsapp { background: #25d366; color: white; font-size: 11px; font-weight: 900; padding: 14px; border-radius: 50px; text-transform: uppercase; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; }
        .btn-whatsapp:hover { background: #128c7e; transform: scale(1.03); }
    </style>
</head>
<body>
    <div class="ticker-bar uppercase tracking-widest">
        <span><i class="fa-solid fa-chart-line mr-2"></i>USD/BRL (Yahoo): <span id="usdVal" class="ticker-val">R$ 5,12</span></span>
        <span><i class="fa-brands fa-bitcoin mr-2"></i>USDT/BRL (Binance): <span id="usdtVal" class="ticker-val">R$ 5,14</span></span>
    </div>

    <div class="max-w-6xl mx-auto p-6">
        <header class="flex flex-col md:flex-row justify-between items-center my-14 gap-8">
            <div>
                <h1 class="text-6xl font-black italic tracking-tighter">iFipe</h1>
                <p class="text-gray-500 text-[10px] font-bold uppercase tracking-[0.3em] mt-3">O Ranking Oficial do Menor Preço</p>
            </div>
            
            <div class="flex flex-wrap gap-4">
                <select id="filtroModelo" onchange="filtrar()" class="filter-select">
                    <option value="">Todos os iPhones</option>
                </select>
                <select id="filtroRegiao" onchange="filtrar()" class="filter-select">
                    <option value="">Todas as Regiões</option>
                </select>
            </div>
        </header>

        <div id="vitrine" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10">
            </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');

        let ofertasCache = [];

        async function init() {
            const { data: m } = await _supabase.from('produtos_mestre').select('nome').order('id');
            const { data: r } = await _supabase.from('regioes').select('nome');
            m.forEach(i => document.getElementById('filtroModelo').innerHTML += `<option value="${i.nome}">${i.nome}</option>`);
            r.forEach(i => document.getElementById('filtroRegiao').innerHTML += `<option value="${i.nome}">${i.nome}</option>`);
            await buscarOfertas();
        }

        async function buscarOfertas() {
            const { data, error } = await _supabase.from('ofertas').select(`
                preco,
                regioes (nome, bandeira),
                fornecedores (nome, whatsapp),
                variacoes (capacidade, cor, produtos_mestre (nome))
            `).order('preco', { ascending: true });

            if (!error) {
                ofertasCache = data;
                renderizar(data);
            }
        }

        function filtrar() {
            const mod = document.getElementById('filtroModelo').value;
            const reg = document.getElementById('filtroRegiao').value;
            let res = ofertasCache;
            if (mod) res = res.filter(o => o.variacoes.produtos_mestre.nome === mod);
            if (reg) res = res.filter(o => o.regioes.nome === reg);
            renderizar(res);
        }

        function renderizar(lista) {
            const container = document.getElementById('vitrine');
            container.innerHTML = lista.map((o, index) => {
                // LÓGICA DO WHATSAPP: Remove tudo que não é número e monta wa.me
                const foneLimpo = o.fornecedores.whatsapp ? o.fornecedores.whatsapp.replace(/\D/g, '') : '5566999999999';
                const mensagem = encodeURIComponent(`Olá! Vi o ${o.variacoes.produtos_mestre.nome} (${o.variacoes.capacidade}) por R$ ${o.preco.toLocaleString('pt-BR')} no iFipe. Ainda está disponível?`);
                const linkWA = `https://wa.me/${foneLimpo}?text=${mensagem}`;

                return `
                <div class="price-card">
                    ${index === 0 ? '<div class="top-deal">Menor Preço Encontrado</div>' : ''}
                    <div class="flex justify-between items-center mb-8">
                        <span class="text-[9px] font-black bg-blue-600 text-white px-3 py-1 rounded-md italic uppercase tracking-widest">${o.regioes.bandeira} ${o.regioes.nome}</span>
                        <span class="text-[10px] text-gray-500 font-bold uppercase tracking-tighter">${o.fornecedores.nome}</span>
                    </div>
                    <h2 class="text-2xl font-bold tracking-tight">${o.variacoes.produtos_mestre.nome}</h2>
                    <p class="text-gray-500 text-[11px] mb-10 uppercase font-bold tracking-tighter">${o.variacoes.capacidade} • ${o.variacoes.cor}</p>
                    <div class="flex flex-col gap-6">
                        <div>
                            <span class="block text-[10px] text-gray-600 font-black uppercase mb-1">Preço iFipe à Vista</span>
                            <span class="price-value">R$ ${o.preco.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</span>
                        </div>
                        <a href="${linkWA}" target="_blank" class="btn-whatsapp">
                            <i class="fa-brands fa-whatsapp text-lg"></i>
                            Comprar pelo WhatsApp
                        </a>
                    </div>
                </div>
            `}).join('');
        }
        init();
    </script>
</body>
</html>
