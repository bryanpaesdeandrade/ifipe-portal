<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Ranking Realtime Precision</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #000000; color: #ffffff; font-family: -apple-system, sans-serif; margin: 0; }
        .ticker-bar { background: #1c1c1e; border-bottom: 1px solid #38383a; padding: 15px; position: sticky; top: 0; z-index: 50; display: flex; justify-content: center; align-items: center; }
        .ticker-val { color: #32d74b; font-family: 'Courier New', monospace; font-size: 24px; font-weight: 900; }
        .trend-icon { font-size: 22px; margin-left: 15px; transition: 0.3s; }
        .trend-up { color: #0071e3; transform: rotate(180deg); }
        .trend-down { color: #ff3b30; }
        .trend-stable { color: #32d74b; }
        .price-card { background: #1c1c1e; border: 1px solid #38383a; border-radius: 24px; padding: 1.8rem; transition: 0.3s; position: relative; }
        .price-card:hover { border-color: #0071e3; transform: translateY(-5px); }
        .top-deal { position: absolute; top: 0; right: 0; background: #32d74b; color: black; font-size: 9px; font-weight: 900; padding: 6px 16px; border-bottom-left-radius: 14px; text-transform: uppercase; }
        .price-value { color: #32d74b; font-size: 32px; font-weight: 800; letter-spacing: -1.5px; }
        .btn-whatsapp { background: #25d366; color: white; font-size: 11px; font-weight: 900; padding: 14px; border-radius: 50px; width: 100%; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; text-decoration: none; text-transform: uppercase; }
        .hidden { display: none !important; }
    </style>
</head>
<body id="mainContent" class="hidden">

    <div class="ticker-bar">
        <span class="mr-4 text-[10px] font-black text-gray-500 uppercase tracking-widest">USDT/BRL BINANCE:</span>
        <span class="ticker-val">R$ <span id="usdtVal">0,0000</span></span>
        <span id="trendIcon" class="trend-icon"><i class="fa-solid fa-minus trend-stable"></i></span>
        <button onclick="logout()" class="ml-auto text-[10px] text-gray-500 font-black uppercase underline">Sair do Buscador</button>
    </div>

    <div class="max-w-6xl mx-auto p-6">
        <header class="my-14 text-center">
            <h1 class="text-6xl font-black italic tracking-tighter">iFipe</h1>
            <p class="text-gray-500 text-[10px] font-bold uppercase tracking-[0.4em] mt-3">Ranking Realtime Precision</p>
        </header>

        <div class="mb-10 flex justify-center">
            <select id="filtroModelo" onchange="filtrar()" class="bg-[#1c1c1e] border border-[#38383a] rounded-xl p-4 text-[10px] font-black uppercase cursor-pointer outline-none focus:border-blue-500">
                <option value="">Todos os iPhones</option>
            </select>
        </div>

        <div id="vitrine" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');

        let lastPrice = 0;
        let ofertasCache = [];

        // SISTEMA DE SEGURANÇA: LOGIN ÚNICO
        async function validarAcesso() {
            const token = localStorage.getItem('iFipe_Token');
            const email = localStorage.getItem('iFipe_User');

            if (!token || !email) {
                window.location.href = 'acesso-cliente.html';
                return;
            }

            const { data } = await _supabase
                .from('clientes_buscador')
                .select('last_session_id')
                .eq('email', email)
                .maybeSingle();

            if (!data || data.last_session_id !== token) {
                alert("Sessão expirada. Sua conta foi acessada em outro dispositivo.");
                logout();
            } else {
                document.getElementById('mainContent').classList.remove('hidden');
                init();
            }
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'acesso-cliente.html';
        }

        async function carregarIndicador() {
            try {
                const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=USDTBRL');
                const data = await res.json();
                const currentPrice = parseFloat(data.price);
                const valEl = document.getElementById('usdtVal');
                const iconContainer = document.getElementById('trendIcon');

                if (lastPrice > 0) {
                    const diff = currentPrice - lastPrice;
                    if (diff > 0.0003) iconContainer.innerHTML = '<i class="fa-solid fa-caret-down trend-up"></i>';
                    else if (diff < -0.0003) iconContainer.innerHTML = '<i class="fa-solid fa-caret-down trend-down"></i>';
                    else iconContainer.innerHTML = '<i class="fa-solid fa-minus trend-stable"></i>';
                }
                valEl.innerText = currentPrice.toFixed(4).replace('.', ',');
                lastPrice = currentPrice;
            } catch (e) { console.error("Erro Binance API"); }
        }

        async function init() {
            carregarIndicador();
            setInterval(carregarIndicador, 5000);
            
            const { data: modelos } = await _supabase.from('produtos_mestre').select('nome').order('id');
            const select = document.getElementById('filtroModelo');
            if (modelos) modelos.forEach(m => select.innerHTML += `<option value="${m.nome}">${m.nome}</option>`);
            
            buscarOfertas();
        }

        async function buscarOfertas() {
            const { data } = await _supabase
                .from('ofertas')
                .select(`preco, regioes(bandeira, nome), fornecedores(nome, whatsapp), variacoes(capacidade, cor, produtos_mestre(nome))`)
                .order('preco', { ascending: true });
            
            if (data) {
                ofertasCache = data;
                renderizar(data);
            }
        }

        function filtrar() {
            const val = document.getElementById('filtroModelo').value;
            renderizar(val ? ofertasCache.filter(o => o.variacoes.produtos_mestre.nome === val) : ofertasCache);
        }

        function renderizar(lista) {
            const container = document.getElementById('vitrine');
            if (!lista.length) {
                container.innerHTML = '<p class="col-span-full text-center text-gray-500 uppercase font-black py-20 tracking-widest">Nenhuma oferta publicada no momento.</p>';
                return;
            }
            
            container.innerHTML = lista.map((o, index) => {
                const fone = o.fornecedores?.whatsapp ? o.fornecedores.whatsapp.replace(/\D/g, '') : '';
                const linkWA = `https://wa.me/${fone}?text=Vi no iFipe o ${o.variacoes.produtos_mestre.nome} por R$ ${o.preco.toLocaleString('pt-BR')}`;
                
                return `
                <div class="price-card">
                    ${index === 0 ? '<div class="top-deal">Menor Preço</div>' : ''}
                    <div class="flex justify-between items-center mb-6">
                        <span class="bg-[#38383a] px-3 py-1 rounded text-[9px] font-black uppercase tracking-widest">
                            ${o.regioes?.bandeira || ''} ${o.fornecedores?.nome || 'Lojista'}
                        </span>
                    </div>
                    <h2 class="text-xl font-bold italic">${o.variacoes.produtos_mestre.nome}</h2>
                    <p class="text-gray-500 text-[10px] mb-8 font-black uppercase tracking-tighter">
                        ${o.variacoes.capacidade} • ${o.variacoes.cor}
                    </p>
                    <div class="mb-6">
                        <span class="block text-[9px] text-gray-600 font-black uppercase mb-1">À Vista iFipe</span>
                        <span class="price-value">R$ ${o.preco.toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</span>
                    </div>
                    <a href="${linkWA}" target="_blank" class="btn-whatsapp">WhatsApp do Lojista</a>
                </div>`;
            }).join('');
        }

        validarAcesso();
    </script>
</body>
</html>
