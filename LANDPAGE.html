<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - A Fipe do iPhone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #38383a; --input: #2c2c2e; }
        body.light-mode { --bg: #f5f5f7; --card: #fff; --text: #1d1d1f; --border: #d2d2d7; --input: #e8e8ed; }
        body { background: var(--bg); color: var(--text); font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin:0; overflow-x: hidden; transition: 0.3s; }
        .ticker-bar { background:rgba(28, 28, 30, 0.9); backdrop-filter:blur(15px); border-bottom:1px solid var(--border); padding:8px 15px; position:sticky; top:0; z-index:100; display:flex; justify-content: space-between; align-items:center; }
        .ticker-val { color:#32d74b; font-family:monospace; font-size: 16px; font-weight:900; }
        .main-wrapper { width: 100%; max-width: 1200px; margin: 0 auto; padding: 15px; display: flex; flex-direction: column; align-items: center; min-height: calc(100vh - 50px); }
        .brand-header { display: flex; flex-direction: column; align-items: center; text-align: center; margin: 25px 0; gap: 5px; }
        .apple-logo { font-size: 3.2rem; font-weight: 900; font-style: italic; letter-spacing: -0.05em; line-height: 1; }
        .slogan-text { font-size: 1.1rem; font-weight: 900; font-style: italic; color: #0071e3; text-transform: uppercase; }
        .responsive-grid { display: flex; flex-direction: column; align-items: center; gap: 25px; width: 100%; }
        @media (min-width: 1024px) { .responsive-grid { flex-direction: row; justify-content: center; align-items: stretch; gap: 30px; } }
        .apple-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 1.8rem; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        .apple-input { background: var(--input); border: 1px solid var(--border); border-radius: 12px; padding: 14px; width: 100%; color: var(--text); outline: none; margin-bottom: 0.8rem; }
        .apple-button { background: var(--text); color: var(--bg); font-weight: 900; border-radius: 50px; padding: 16px; width: 100%; cursor: pointer; text-transform: uppercase; border: none; transition: 0.3s; }
        .apple-button:hover { background: #0071e3; color: #fff; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="ticker-bar">
        <div class="flex items-center gap-1.5"><span class="ticker-val" id="usdt_val">$ --</span></div>
        <button onclick="toggleTheme()" id="themeBtn" class="bg-gray-800 px-3 py-1 rounded-full text-[10px] font-bold">🌙 Modo</button>
    </div>

    <div class="main-wrapper">
        <header class="brand-header">
            <h1 class="apple-logo">iFipe</h1>
            <p class="slogan-text">A Fipe do iPhone</p>
        </header>

        <div class="responsive-grid">
            <div class="apple-card w-full max-w-[360px]">
                <div class="text-center mb-6"><h2 class="text-lg font-black italic">Acesso ao Buscador</h2></div>
                <form onsubmit="realizarLogin(event)">
                    <label class="text-[8px] font-black uppercase text-gray-500">Usuário de Acesso</label>
                    <input type="text" id="logEmail" class="apple-input" placeholder="seu login" required>
                    <label class="text-[8px] font-black uppercase text-gray-500">Senha</label>
                    <input type="password" id="logPass" class="apple-input" placeholder="••••••••" required>
                    <button type="submit" class="apple-button">ENTRAR NO iFIPE</button>
                </form>
            </div>
            
            <div class="apple-card w-full max-w-[360px]">
                <h2 class="text-center font-black italic uppercase mb-4">Calculadora VIP</h2>
                <div class="bg-black p-4 rounded-xl text-right mb-4 border border-gray-800">
                    <div id="calcResultIndex" class="text-2xl font-black text-[#0071e3]">R$ 0,00</div>
                </div>
                <input type="number" id="calcUsdIndex" class="apple-input text-center text-xl" placeholder="Custo PY (USD)" oninput="calcularImportacaoIndex()">
            </div>
        </div>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let currentUsdt = 0;

        function iniciarCambio() {
            const socket = new WebSocket('wss://stream.binance.com:9443/ws/usdtbrl@ticker');
            socket.onmessage = (e) => {
                currentUsdt = parseFloat(JSON.parse(e.data).c);
                document.getElementById('usdt_val').innerText = `$ ${currentUsdt.toFixed(4)}`;
                calcularImportacaoIndex();
            };
        }

        function calcularImportacaoIndex() {
            const usd = parseFloat(document.getElementById('calcUsdIndex').value) || 0;
            const res = (usd * (currentUsdt + 0.07)) * 1.06;
            document.getElementById('calcResultIndex').innerText = res.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
        }

        async function realizarLogin(e) {
            e.preventDefault();
            const { data, error } = await _s.from('clientes_buscador').select('*').eq('email', document.getElementById('logEmail').value).eq('senha', document.getElementById('logPass').value).maybeSingle();
            if(data && data.aprovado) {
                localStorage.setItem('iFipe_Token', data.id);
                window.location.href = 'buscar.html';
            } else alert("ACESSO PENDENTE OU DADOS INCORRETOS.");
        }

        function toggleTheme() { document.body.classList.toggle('light-mode'); }
        window.onload = iniciarCambio;
    </script>
</body>
</html>
