<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Buscador VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #38383a; --input: #2c2c2e; }
        body.light-mode { --bg: #f5f5f7; --card: #fff; --text: #1d1d1f; --border: #d2d2d7; --input: #e8e8ed; }
        body { background: var(--bg); color: var(--text); font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin:0; transition: 0.3s; }
        .nav-bar { background:rgba(28, 28, 30, 0.8); backdrop-filter:blur(15px); border-bottom:1px solid var(--border); padding:15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:100; flex-wrap: wrap; gap: 10px;}
        .filter-bar { background: var(--card); padding:15px; border-radius:16px; margin-top:20px; border:1px solid var(--border); }
        .apple-input { background: var(--input); border: 1px solid var(--border); border-radius: 10px; padding: 10px; width: 100%; color: var(--text); outline: none; font-size: 12px; text-align: center; }
        .product-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 15px; transition: 0.3s; position: relative; display: flex; flex-direction: column; }
        .product-card:hover { border-color: #0071e3; transform: translateY(-4px); }
        .tag-status { font-size: 8px; font-weight: 900; text-transform: uppercase; padding: 4px 8px; border-radius: 50px; letter-spacing: 0.05em; display: inline-block; margin-bottom: 3px; }
        .tag-menor { background: #ff3b30; color: #fff; }
        .tag-poucas { background: #ffcc00; color: #000; }
        .tag-muitas { background: #0071e3; color: #fff; }
        .tag-estoque-alto { background: #32d74b; color: #000; }
        .mini-tag { font-size: 8px; font-weight: 900; text-transform: uppercase; padding: 4px 6px; border-radius: 6px; background: var(--input); color: #86868b; border: 1px solid var(--border); display: inline-flex; align-items: center; justify-content: center; }
        .mini-tag.active { color: #fff; border-color: #0071e3; background: rgba(0, 113, 227, 0.2); }
        .mini-tag.usdt { color: #32d74b; border-color: #32d74b; background: rgba(50, 215, 75, 0.1); }
        .mini-tag.lote { color: #5e5ce6; border-color: #5e5ce6; background: rgba(94, 92, 230, 0.1); }
        .mini-tag.bat { color: #32d74b; border-color: #32d74b; background: rgba(50, 215, 75, 0.1); }
        .mini-tag.gar { color: #ffcc00; border-color: #ffcc00; background: rgba(255, 204, 0, 0.1); }
        .mini-tag.fab { color: #d2d2d7; border-color: #86868b; background: rgba(134, 134, 139, 0.1); }
        .mini-tag.pix { color: #32bcad; border-color: #32bcad; background: rgba(50, 188, 173, 0.1); }
        .price-text { font-size: 26px; font-weight: 900; color: var(--text); letter-spacing: -0.05em; }
        .buy-button { background: #0071e3; color: #fff; font-weight: 900; border-radius: 50px; padding: 12px; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 11px; text-align: center; display: block; text-decoration: none; margin-top: 12px; transition: 0.3s; letter-spacing: 0.05em; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <h1 class="text-2xl font-black italic m-0">iFipe</h1>
        <div class="flex gap-4 items-center">
            <button onclick="logout()" class="text-red-500 font-black text-[10px] uppercase font-bold">Sair</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 pb-20">
        <div class="filter-bar grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-3 mb-6">
            <div>
                <label class="block text-[8px] uppercase font-black text-blue-500 mb-1 text-center">1. Categoria</label>
                <select id="f_cat" class="apple-input" onchange="popularModelos()">
                    <option value="">Todas</option>
                    <option value="1">IPHONE</option><option value="2">WATCH</option><option value="3">IPAD</option>
                    <option value="4">MACBOOK</option><option value="5">IMAC</option><option value="6">ACESSÓRIOS</option>
                    <option value="7">XIAOMI</option><option value="8">REALME</option>
                </select>
            </div>
            <div><label class="block text-[8px] uppercase font-black text-gray-500 mb-1 text-center">2. Modelo</label><select id="f_prod" class="apple-input" onchange="atualizarFiltrosCascata()"><option value="">Todos</option></select></div>
            <div><label class="block text-[8px] uppercase font-black text-gray-500 mb-1 text-center">Condição</label><select id="f_cond" class="apple-input" onchange="renderizarRanking()"><option value="">Todas</option><option value="Novo">Novo</option><option value="Seminovo">Seminovo</option></select></div>
            <div><label class="block text-[8px] uppercase font-black text-gray-500 mb-1 text-center">Memória</label><select id="f_cap" class="apple-input" onchange="renderizarRanking()"><option value="">Todas</option></select></div>
            <div><label class="block text-[8px] uppercase font-black text-gray-500 mb-1 text-center">Cor</label><select id="f_cor" class="apple-input" onchange="renderizarRanking()"><option value="">Todas</option></select></div>
            <div><label class="block text-[8px] uppercase font-black text-gray-500 mb-1 text-center">Origem</label><select id="f_reg" class="apple-input" onchange="renderizarRanking()"><option value="">Todas</option></select></div>
            <div><label class="block text-[8px] uppercase font-black text-gray-500 mb-1 text-center">Atacadista</label><select id="f_lojista" class="apple-input" onchange="renderizarRanking()"><option value="">Todos</option></select></div>
            <div><label class="block text-[8px] uppercase font-black text-gray-500 mb-1 text-center">Cidade</label><select id="f_cid" class="apple-input" onchange="renderizarRanking()"><option value="">Todas</option></select></div>
        </div>

        <div id="gridGeral" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
    </main>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let ofertasAtuais = []; let produtosMestre = []; let gradeVariacoes = [];

        window.onload = async () => {
            const [p, r, v, f] = await Promise.all([ 
                _s.from('produtos_mestre').select('*').order('nome'), 
                _s.from('regioes').select('*'), 
                _s.from('variacoes').select('*'), 
                _s.from('fornecedores').select('id, nome, cidade, verificado').eq('ativo', true) 
            ]);
            produtosMestre = p.data; gradeVariacoes = v.data;
            document.getElementById('f_reg').innerHTML += r.data.map(x => `<option value="${x.id}">${x.bandeira} ${x.nome}</option>`).join('');
            document.getElementById('f_lojista').innerHTML += f.data.map(x => `<option value="${x.id}">${x.nome}</option>`).join('');
            const cidades = [...new Set(f.data.map(x => x.cidade).filter(Boolean))].sort();
            document.getElementById('f_cid').innerHTML += cidades.map(c => `<option value="${c}">${c}</option>`).join('');
            carregarDados(); setInterval(carregarDados, 5000);
        };

        function popularModelos() {
            const catId = document.getElementById('f_cat').value;
            const filtrados = catId ? produtosMestre.filter(x => x.grupo_id == catId) : produtosMestre;
            document.getElementById('f_prod').innerHTML = '<option value="">Todos</option>' + filtrados.map(x => `<option value="${x.id}">${x.nome}</option>`).join('');
            atualizarFiltrosCascata();
        }

        async function carregarDados() {
            const { data } = await _s.from('ofertas').select('*, fornecedores(*), variacoes(*, produtos_mestre(*)), regioes(*)').gt('quantidade', 0);
            ofertasAtuais = data || []; renderizarRanking();
        }

        function renderizarRanking() {
            const fP = document.getElementById('f_prod').value; 
            const fC = document.getElementById('f_cond').value; 
            const fCap = document.getElementById('f_cap').value; 
            const fCor = document.getElementById('f_cor').value; 
            const fReg = document.getElementById('f_reg').value; 
            const fLoj = document.getElementById('f_lojista').value; 
            const fCid = document.getElementById('f_cid').value;

            let filtrados = ofertasAtuais.filter(o => 
                (!fP || o.variacoes.produtos_mestre.id == fP) && 
                (!fC || o.condicao == fC) && 
                (!fCap || o.variacoes.capacidade == fCap) && 
                (!fCor || o.variacoes.cor == fCor) && 
                (!fReg || o.regiao_id == fReg) && 
                (!fLoj || o.fornecedor_id == fLoj) && 
                (!fCid || o.fornecedores.cidade == fCid) 
            );

            let menores = {}; filtrados.forEach(o => { let k = `${o.variacao_id}_${o.condicao}_${o.moeda}`; if(!menores[k] || o.preco < menores[k]) menores[k] = o.preco; });

            document.getElementById('gridGeral').innerHTML = filtrados.map(o => {
                let moeda = o.moeda === 'USD' ? '$' : 'R$';
                let tagMenor = o.preco === menores[`${o.variacao_id}_${o.condicao}_${o.moeda}`] ? '<span class="tag-status tag-menor">🔥 MENOR PREÇO</span>' : '';
                let tagEstoque = o.quantidade <= 3 ? `<span class="tag-status tag-poucas">APENAS ${o.quantidade} UN</span>` : (o.quantidade <= 10 ? `<span class="tag-status tag-muitas">ESTOQUE ${o.quantidade} UN</span>` : `<span class="tag-status tag-estoque-alto">ALTO ESTOQUE ${o.quantidade} UN</span>`);
                
                // MOLDURAS (TAGS) - AJUSTADO PARA TEXTO CLARO E "NEGOCIA QTD"
                let t_bat = o.saude_bateria ? `<span class="mini-tag bat">🔋 ${o.saude_bateria.replace('BATERIA ','')}</span>` : '';
                let t_usd = o.aceita_usdt ? `<span class="mini-tag usdt">USDT</span>` : '';
                let t_pix = o.aceita_pix ? `<span class="mini-tag pix">💠 PIX</span>` : '';
                let t_pro = o.aceita_proposta ? `<span class="mini-tag lote">🤝 NEGOCIA QTD</span>` : '';
                let t_not = o.emite_nota ? `<span class="mini-tag active">NF</span>` : '';
                let tagsStr = [t_bat, t_usd, t_pix, t_pro, t_not].filter(Boolean).join(' ');

                let det = [o.variacoes.capacidade, o.variacoes.cor, o.condicao].filter(Boolean).join(' | ');

                return `<div class="product-card">
                    <div class="flex flex-wrap gap-1 mb-2">${tagEstoque} ${tagMenor}</div>
                    <h2 class="text-lg font-black">${o.variacoes.produtos_mestre.nome}</h2>
                    <p class="text-[10px] text-gray-400 uppercase font-bold mb-3">${det}</p>
                    <div class="flex flex-wrap gap-1.5 mb-3">${tagsStr}</div>
                    <div class="mt-auto pt-3 border-t border-[#38383a]">
                        <p class="text-[9px] text-blue-400 font-black uppercase">LOJA: ${o.fornecedores.nome} ${o.fornecedores.verificado ? '✔️' : ''}</p>
                        <p class="text-[8px] text-gray-500 uppercase">Local: ${o.fornecedores.cidade || 'Não informada'}</p>
                        <div class="price-text mt-1">${moeda} ${o.preco.toLocaleString('pt-BR')}</div>
                        <a href="https://wa.me/${o.fornecedores.whatsapp.replace(/\D/g,'')}" target="_blank" class="buy-button">Chamar no WhatsApp</a>
                    </div>
                </div>`;
            }).join('');
        }

        function atualizarFiltrosCascata() {
            const pid = document.getElementById('f_prod').value;
            const vars = pid ? gradeVariacoes.filter(x => x.produto_id == pid) : gradeVariacoes;
            const caps = [...new Set(vars.map(x => x.capacidade).filter(Boolean))]; 
            const cores = [...new Set(vars.map(x => x.cor).filter(Boolean))];
            document.getElementById('f_cap').innerHTML = '<option value="">Todas</option>' + caps.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('f_cor').innerHTML = '<option value="">Todas</option>' + cores.map(c => `<option value="${c}">${c}</option>`).join('');
            renderizarRanking();
        }
        function logout() { localStorage.removeItem('iFipe_Token'); window.location.replace('index.html'); }
    </script>
</body>
</html>
