<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - O Oráculo das Ofertas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #38383a; --input: #2c2c2e; --blue: #0071e3; }
        body { background: var(--bg); color: var(--text); font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin:0; }
        .nav-bar { background:rgba(28, 28, 30, 0.8); backdrop-filter:blur(15px); border-bottom:1px solid var(--border); padding:15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:100; }
        .apple-input { background: var(--input); border: 1px solid var(--border); border-radius: 10px; padding: 10px; width: 100%; color: var(--text); outline: none; font-size: 12px; }
        .product-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 16px; transition: 0.3s; position: relative; height: 100%; display: flex; flex-direction: column; }
        .product-card:hover { border-color: var(--blue); transform: translateY(-4px); }
        .tag-status { font-size: 8px; font-weight: 900; text-transform: uppercase; padding: 4px 8px; border-radius: 50px; margin-bottom: 5px; display: inline-block; }
        .price-text { font-size: 24px; font-weight: 800; color: #32d74b; font-family: 'JetBrains Mono', monospace; }
        .color-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; border: 1px solid rgba(255,255,255,0.2); }
        .buy-button { background: var(--blue); color: #fff; font-weight: 900; border-radius: 50px; padding: 12px; width: 100%; text-align: center; text-transform: uppercase; font-size: 11px; margin-top: auto; display: block; text-decoration: none; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <div class="flex items-center gap-4">
            <h1 class="text-2xl font-black italic text-red-500">iFipe</h1>
            <div class="hidden md:flex flex-col">
                <span class="text-[8px] text-gray-500 font-bold uppercase">USDT/BRL VIP</span>
                <span id="tickerVip" class="text-sm font-black text-[#32d74b] font-mono">R$ --</span>
            </div>
        </div>
        <div class="flex-1 max-w-xl mx-8">
            <input type="text" id="buscaGeral" class="apple-input w-full" placeholder="Buscar modelo, cor ou loja..." oninput="filtrarGrid()">
        </div>
        <div class="flex items-center gap-4">
            <button onclick="logout()" class="text-red-500 font-black text-[10px] uppercase">Sair</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3 mb-8">
            <select id="f_cond" class="apple-input" onchange="filtrarGrid()">
                <option value="">Condição...</option>
                <option value="Novo">Novo</option>
                <option value="Seminovo">Seminovo</option>
            </select>
            <select id="f_reg" class="apple-input" onchange="filtrarGrid()">
                <option value="">Origem...</option>
            </select>
            <select id="f_lojista" class="apple-input" onchange="filtrarGrid()">
                <option value="">Atacadista...</option>
            </select>
        </div>

        <div id="gridOfertas" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            </div>
    </main>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let ofertasAtuais = [];
        let currentTaxaVip = 0;

        async function init() {
            if(!localStorage.getItem('iFipe_Token')) return window.location.href = 'index.html';
            
            // Iniciar Ticker Binance
            const socket = new WebSocket('wss://stream.binance.com:9443/ws/usdtbrl@ticker');
            socket.onmessage = (e) => {
                currentTaxaVip = parseFloat(JSON.parse(e.data).c) + 0.07;
                document.getElementById('tickerVip').innerText = `R$ ${currentTaxaVip.toFixed(4)}`;
            };

            await carregarFiltros();
            await carregarOfertas();
        }

        async function carregarFiltros() {
            const [r, f] = await Promise.all([
                _s.from('regioes').select('*').order('nome'),
                _s.from('fornecedores').select('id, nome').eq('ativo', true).order('nome')
            ]);
            document.getElementById('f_reg').innerHTML += r.data.map(x => `<option value="${x.id}">${x.nome}</option>`).join('');
            document.getElementById('f_lojista').innerHTML += f.data.map(x => `<option value="${x.id}">${x.nome}</option>`).join('');
        }

        async function carregarOfertas() {
            const { data } = await _s.from('ofertas').select(`
                *,
                fornecedores(nome, whatsapp, verificado),
                variacoes(capacidade, cor, hex_cor, produtos_mestre(nome)),
                regioes(nome, bandeira)
            `)
            .eq('status_aprovacao', 'aprovado')
            .gt('quantidade', 0)
            .order('preco', { ascending: true });

            ofertasAtuais = data || [];
            renderizar(ofertasAtuais);
        }

        function renderizar(lista) {
            const grid = document.getElementById('gridOfertas');
            grid.innerHTML = lista.map(o => {
                const det = o.variacoes;
                const m = det.produtos_mestre;
                const f = o.fornecedores;

                return `
                    <div class="product-card">
                        <div class="flex justify-between items-start mb-2">
                            <span class="tag-status bg-blue-600/20 text-blue-400 border border-blue-500/30">${o.regioes?.nome || 'BR'}</span>
                            ${o.preco_anterior > o.preco ? '<span class="tag-status bg-green-600 text-white">📉 OPORTUNIDADE</span>' : ''}
                        </div>
                        <h2 class="text-lg font-black leading-tight">
                            <span class="color-dot" style="background:${det.hex_cor || '#555'}"></span>
                            ${m.nome}
                        </h2>
                        <p class="text-[10px] text-gray-500 font-bold uppercase mt-1">${det.capacidade} | ${det.cor} | ${o.condicao}</p>
                        
                        <div class="my-4 flex items-baseline gap-2">
                            <span class="price-text">${o.moeda === 'USD' ? '$' : 'R$'} ${o.preco.toLocaleString('pt-BR')}</span>
                        </div>

                        <div class="border-t border-[#38383a] pt-3 mb-4">
                            <p class="text-[11px] text-[#25d366] font-black uppercase tracking-widest flex items-center gap-1">
                                ${f.nome} ${f.verificado ? '✅' : ''}
                            </p>
                            <p class="text-[9px] text-gray-500 mt-1">Estoque: ${o.quantidade} unidades</p>
                        </div>

                        <a href="https://wa.me/${f.whatsapp?.replace(/\D/g,'')}?text=Olá, vi no iFipe seu ${m.nome} por ${o.preco}" target="_blank" class="buy-button">
                            Chamar no WhatsApp
                        </a>
                    </div>
                `;
            }).join('');
        }

        function filtrarGrid() {
            const busca = document.getElementById('buscaGeral').value.toLowerCase();
            const cond = document.getElementById('f_cond').value;
            const reg = document.getElementById('f_reg').value;
            const loj = document.getElementById('f_lojista').value;

            const filtrados = ofertasAtuais.filter(o => {
                const matchBusca = o.variacoes.produtos_mestre.nome.toLowerCase().includes(busca) || 
                                   o.fornecedores.nome.toLowerCase().includes(busca);
                const matchCond = !cond || o.condicao === cond;
                const matchReg = !reg || o.regiao_id == reg;
                const matchLoj = !loj || o.fornecedor_id == loj;
                return matchBusca && matchCond && matchReg && matchLoj;
            });
            renderizar(filtrados);
        }

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
        window.onload = init;
    </script>
</body>
</html>
