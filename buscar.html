<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - O Oráculo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #38383a; --red: #ff3b30; }
        body { background: var(--bg); color: var(--text); font-family:-apple-system, sans-serif; margin:0; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 20px; }
        .produto-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; }
    </style>
</head>
<body>
    <div class="p-6 flex justify-between items-center border-b border-[#38383a]">
        <h1 class="text-2xl font-black italic text-red-500">iFipe</h1>
        <button onclick="localStorage.clear(); window.location.href='index.html'" class="text-xs font-bold uppercase">Sair</button>
    </div>
    <div id="listaOfertas" class="grid-container max-w-7xl mx-auto"></div>
    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        async function carregar() {
            const { data } = await _s.from('ofertas').select('*, fornecedores(nome), variacoes(*, produtos_mestre(*))').eq('status_aprovacao', 'aprovado');
            document.getElementById('listaOfertas').innerHTML = data.map(o => `
                <div class="produto-card">
                    <h3 class="font-black text-lg">${o.variacoes.produtos_mestre.nome}</h3>
                    <p class="text-gray-500 text-xs">${o.variacoes.capacidade} | ${o.variacoes.cor}</p>
                    <p class="text-green-400 font-black text-xl mt-4">R$ ${o.preco.toLocaleString('pt-BR')}</p>
                    <p class="text-[10px] mt-4 text-gray-400 uppercase font-bold">${o.fornecedores.nome}</p>
                </div>
            `).join('');
        }
        window.onload = carregar;
    </script>
</body>
</html>
