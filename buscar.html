<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - A Fipe do iPhone</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #0a0a0a; --text: #fff; --border: #2c2c2e; --blue-apple: #0071e3; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; text-transform: uppercase; }
        
        #loginOverlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; }
        .auth-box { border: 1px solid var(--border); padding: 40px; border-radius: 24px; background: #0a0a0a; text-align: center; width: 350px; }
        
        .apple-input { background: #141415; border: 1px solid var(--border); border-radius: 12px; padding: 14px; color: #fff; width: 100%; outline: none; font-size: 12px; transition: 0.3s; margin-bottom: 12px; }
        .apple-input:focus { border-color: var(--blue-apple); }
        
        .btn-apple { background: var(--blue-apple); color: #fff; font-weight: 900; border-radius: 12px; padding: 14px; cursor: pointer; border: none; font-size: 11px; transition: 0.3s; width: 100%; }
        .btn-apple:hover { opacity: 0.9; transform: scale(1.02); }

        .nav-fipe { background: rgba(5,5,5,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); padding: 15px 40px; position: sticky; top: 0; z-index: 1000; display: flex; justify-content: space-between; align-items: center; }
        
        .card-anuncio { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 20px; transition: 0.3s; display: flex; flex-direction: column; justify-content: space-between; }
        .card-anuncio:hover { border-color: #444; transform: translateY(-2px); }

        .badge-insignia { background: rgba(147, 51, 234, 0.15); color: #d8b4fe; border: 1px solid #9333ea; font-size: 8px; font-weight: 900; padding: 4px 8px; border-radius: 6px; display: inline-block; margin-right: 4px; margin-top: 6px; letter-spacing: 0.5px; }
        
        .hidden { display: none !important; }
        .text-mono { font-family: 'JetBrains Mono', monospace; }
        
        .oracle-tag { background: rgba(34, 197, 94, 0.1); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.2); padding: 6px 12px; border-radius: 8px; font-size: 10px; font-weight: 900; }
    </style>
</head>
<body>

    <div id="loginOverlay">
        <div class="auth-box">
            <h1 class="text-4xl font-black italic mb-2">iFipe</h1>
            <p class="text-[10px] text-zinc-500 mb-8 tracking-widest font-bold">O BUSCADOR DO ATACADO</p>
            
            <div id="statusCheck" class="mb-6 hidden">
                <span class="text-red-500 text-[10px] font-black bg-red-500/10 p-4 rounded-lg block border border-red-500/20">
                    SISTEMA EM ATUALIZAÇÃO.<br>POR FAVOR, AGUARDE.
                </span>
            </div>

            <div id="loginForm">
                <input type="text" id="user" class="apple-input text-center" placeholder="WHATSAPP OU EMAIL">
                <input type="password" id="pass" class="apple-input text-center" placeholder="SUA SENHA" onkeypress="if(event.key==='Enter') handleLogin()">
                <button onclick="handleLogin()" class="btn-apple mt-2">ENTRAR</button>
                <p id="msg" class="text-[10px] font-black text-zinc-500 mt-4 h-4"></p>
            </div>
        </div>
    </div>

    <div id="app" class="hidden">
        <nav class="nav-fipe">
            <div class="flex items-center gap-6">
                <h1 class="text-2xl font-black italic">iFipe</h1>
                <div class="oracle-tag flex items-center gap-2">
                    <span class="text-[8px] text-zinc-500">USDT ORÁCULO (+0.06):</span>
                    <span id="oracleVal" class="text-mono text-green-400">R$ --</span>
                </div>
            </div>
            <div class="flex items-center gap-6 border-l border-zinc-800 pl-6">
                <span id="userNameDisplay" class="text-[10px] font-black text-zinc-400"></span>
                <button onclick="logout()" class="text-red-500 font-black text-[10px] hover:underline">SAIR</button>
            </div>
        </nav>

        <main class="p-8 max-w-[1600px] mx-auto">
            <div class="mb-10">
                <input type="text" id="mainSearch" class="apple-input !py-5 !text-sm !rounded-xl !bg-[#050505]" placeholder="🔍 BUSCAR MODELO, LOJA OU COR..." onkeyup="renderAds()">
            </div>

            <div id="adsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                </div>
        </main>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        
        let dbAds = [];
        let oracleRate = 0;

        async function checkSystemStatus() {
            const status = localStorage.getItem('iFipe_Status');
            if(status === 'off') {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('statusCheck').classList.remove('hidden');
                return false;
            }
            return true;
        }

        function normalizeString(str) {
            return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
        }

        async function handleLogin() {
            if(!await checkSystemStatus()) return;

            const uRaw = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            const msg = document.getElementById('msg');
            
            if(!uRaw || !p) { msg.innerText = "PREENCHA TODOS OS CAMPOS."; return; }

            const u = normalizeString(uRaw);
            msg.className = "text-[10px] font-black text-zinc-500 mt-4";
            msg.innerText = "VERIFICANDO...";

            const { data, error } = await _s.from('clientes_buscador').select('*');
            
            if (data) {
                const userMatch = data.find(client => {
                    const clientEmail = client.email ? normalizeString(client.email) : '';
                    const clientWhats = client.whatsapp ? normalizeString(client.whatsapp) : '';
                    return (clientEmail === u || clientWhats === u) && client.senha === p;
                });

                if (userMatch) {
                    if (userMatch.ativo === false) {
                        msg.className = "text-[10px] font-black text-red-500 mt-4";
                        msg.innerText = "CONTA BLOQUEADA PELA GOVERNANÇA.";
                        return;
                    }

                    await _s.from('clientes_buscador').update({ logins_count: (userMatch.logins_count || 0) + 1 }).eq('id', userMatch.id);
                    localStorage.setItem('iFipe_User_Auth', userMatch.id);
                    localStorage.setItem('iFipe_User_Name', userMatch.nome || userMatch.email || userMatch.whatsapp);
                    initApp();
                } else {
                    msg.className = "text-[10px] font-black text-red-500 mt-4";
                    msg.innerText = "CREDENCIAIS INVÁLIDAS.";
                }
            } else {
                msg.className = "text-[10px] font-black text-red-500 mt-4";
                msg.innerText = "ERRO DE CONEXÃO.";
            }
        }

        function logout() { localStorage.removeItem('iFipe_User_Auth'); window.location.reload(); }

        function initOracle() {
            new WebSocket('wss://stream.binance.com:9443/ws/usdtbrl@ticker').onmessage = e => {
                let bin = parseFloat(JSON.parse(e.data).c);
                oracleRate = bin + 0.06; 
                document.getElementById('oracleVal').innerText = `R$ ${oracleRate.toFixed(4)}`;
                renderAds(); 
            };
        }

        async function initApp() {
            if(!await checkSystemStatus()) return;
            
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            document.getElementById('userNameDisplay').innerText = `BEM-VINDO, ${localStorage.getItem('iFipe_User_Name')}`;
            
            initOracle();
            await loadData();
        }

        async function loadData() {
            const { data } = await _s
                .from('ofertas')
                .select('*, fornecedores(nome, insignia_manual, ativo), variacoes(produtos_mestre(nome), capacidade, cor)')
                .gt('quantidade', 0)
                .order('criado_em', { ascending: false });
            
            // Filtra anúncios de lojas inativas para não aparecerem
            dbAds = (data || []).filter(a => a.fornecedores && a.fornecedores.ativo !== false);
            renderAds();
        }

        function renderAds() {
            const query = normalizeString(document.getElementById('mainSearch').value);
            const grid = document.getElementById('adsGrid');
            
            if (!dbAds.length) { grid.innerHTML = '<p class="text-zinc-500 font-black text-xs col-span-full">NENHUM ANÚNCIO DISPONÍVEL NO MOMENTO.</p>'; return; }

            const filtered = dbAds.filter(a => {
                const searchStr = normalizeString(`${a.fornecedores?.nome} ${a.variacoes?.produtos_mestre?.nome} ${a.variacoes?.capacidade} ${a.variacoes?.cor} ${a.condicao}`);
                return searchStr.includes(query);
            });

            grid.innerHTML = filtered.map(a => {
                let precoFinal = a.moeda === 'USD' ? (a.preco * oracleRate) : a.preco;
                let insigniasLojista = (a.fornecedores?.insignia_manual || []).map(insig => `<span class="badge-insignia">${insig}</span>`).join('');

                return `
                    <div class="card-anuncio">
                        <div>
                            <div class="flex justify-between items-start mb-4">
                                <div class="w-full">
                                    <h3 class="text-[11px] font-black text-zinc-400">🏢 ${a.fornecedores?.nome || 'LOJA'}</h3>
                                    <div class="flex flex-wrap w-full mt-1">${insigniasLojista}</div>
                                </div>
                            </div>

                            <div class="mb-6">
                                <div class="flex items-center gap-2 mb-2">
                                    <h2 class="text-sm font-black text-white">${a.variacoes?.produtos_mestre?.nome}</h2>
                                    <span class="text-[8px] font-black ${a.condicao === 'NOVO' ? 'bg-blue-900/30 text-blue-400 border border-blue-500' : 'bg-yellow-900/30 text-yellow-500 border border-yellow-600'} px-2 py-1 rounded tracking-widest">${a.condicao || 'NOVO'}</span>
                                </div>
                                <p class="text-[11px] text-zinc-500 font-mono font-bold">${a.variacoes?.capacidade} | ${a.variacoes?.cor}</p>
                            </div>
                        </div>

                        <div class="flex justify-between items-end border-t border-zinc-900 pt-4 mt-2">
                            <div>
                                <span class="text-[8px] text-zinc-600 block font-black mb-1">PREÇO CONVERTIDO (BRL)</span>
                                <span class="text-xl font-black text-white font-mono tracking-tighter">R$ ${parseFloat(precoFinal).toLocaleString('pt-BR', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>
                            </div>
                            <button class="bg-white text-black text-[9px] font-black px-5 py-3 rounded-lg hover:bg-blue-600 hover:text-white transition shadow-lg">
                                CHAMAR NO WHATS
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        if(localStorage.getItem('iFipe_User_Auth')) {
            initApp();
        } else {
            checkSystemStatus();
        }
    </script>
</body>
</html>
