<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Buscador VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #38383a; --input: #2c2c2e; }
        body.light-mode { --bg: #f5f5f7; --card: #fff; --text: #1d1d1f; --border: #d2d2d7; --input: #e8e8ed; }
        body { background: var(--bg); color: var(--text); font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin:0; transition: 0.3s; }
        .nav-bar { background:rgba(28, 28, 30, 0.8); backdrop-filter:blur(15px); border-bottom:1px solid var(--border); padding:15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:100; flex-wrap: wrap; gap: 10px;}
        .filter-bar { background: var(--card); padding:15px; border-radius:16px; margin-top:20px; border:1px solid var(--border); }
        .apple-input { background: var(--input); border: 1px solid var(--border); border-radius: 10px; padding: 10px; width: 100%; color: var(--text); outline: none; font-size: 12px; text-align: center; }
        .product-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 15px; transition: 0.3s; position: relative; display: flex; flex-direction: column; height: 100%; }
        .product-card:hover { border-color: #0071e3; transform: translateY(-4px); }
        .tag-status { font-size: 8px; font-weight: 900; text-transform: uppercase; padding: 4px 8px; border-radius: 50px; letter-spacing: 0.05em; display: inline-block; margin-bottom: 3px; }
        .tag-menor { background: #ff3b30; color: #fff; }
        .tag-poucas { background: #ffcc00; color: #000; }
        .mini-tag { font-size: 8px; font-weight: 900; text-transform: uppercase; padding: 4px 6px; border-radius: 6px; background: var(--input); color: #86868b; border: 1px solid var(--border); display: inline-flex; align-items: center; justify-content: center; }
        .mini-tag.active { color: #fff; border-color: #0071e3; background: rgba(0, 113, 227, 0.2); }
        .mini-tag.usdt { color: #32d74b; border-color: #32d74b; background: rgba(50, 215, 75, 0.1); }
        .mini-tag.lote { color: #5e5ce6; border-color: #5e5ce6; background: rgba(94, 92, 230, 0.1); }
        .mini-tag.bat { color: #32d74b; border-color: #32d74b; background: rgba(50, 215, 75, 0.1); }
        .mini-tag.gar { color: #ffcc00; border-color: #ffcc00; background: rgba(255, 204, 0, 0.1); }
        .price-text { font-size: 26px; font-weight: 900; color: var(--text); letter-spacing: -0.05em; }
        .buy-button { background: #0071e3; color: #fff; font-weight: 900; border-radius: 50px; padding: 12px; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 11px; text-align: center; display: block; text-decoration: none; margin-top: auto; transition: 0.3s; letter-spacing: 0.05em; }
        .buy-button:hover { background: #005bb5; }
        .hidden { display: none !important; }
        .theme-toggle { background: var(--input); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 50px; cursor: pointer; font-size: 14px; font-weight: 700; }
        .btn-wpp-float { position: fixed; bottom: 20px; right: 20px; background-color: #25d366; color: #fff; width: 60px; height: 60px; border-radius: 50px; display: flex; align-items: center; justify-content: center; text-decoration: none; box-shadow: 0 5px 20px rgba(37,211,102,0.4); z-index: 1000; transition: width 0.3s ease; overflow: hidden; white-space: nowrap; }
        .btn-calc-float { position: fixed; bottom: 20px; left: 20px; background-color: #0071e3; color: #fff; width: 60px; height: 60px; border-radius: 50px; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 20px rgba(0,113,227,0.4); z-index: 1000; border: none; cursor: pointer;}
        .section-title { text-align: center; font-weight: 900; font-style: italic; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 20px; font-size: 13px; padding: 10px; border-radius: 12px; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div id="calcModal" class="hidden fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-[2000] px-4">
        <div class="w-full max-w-[380px] bg-[#1c1c1e] border-2 border-[#38383a] rounded-3xl p-6 shadow-2xl relative">
            <button onclick="fecharCalc()" class="absolute top-4 right-5 text-gray-500 hover:text-white font-bold text-2xl">×</button>
            <div class="text-center mb-5 mt-2">
                <h2 class="text-lg font-black italic text-white uppercase">Calculadora VIP</h2>
                <p class="text-[9px] text-blue-500 font-black uppercase mt-2">Saiba o custo final SP</p>
            </div>
            <div class="bg-[#0a0a0a] border-2 border-[#2c2c2e] rounded-2xl p-4 text-right mb-4">
                <span class="text-[9px] text-gray-500 font-black uppercase">Custo SP (R$)</span>
                <div id="calcResult" class="font-mono text-3xl font-black text-[#0071e3] mt-2">R$ 0,00</div>
            </div>
            <input type="number" id="calcUsd" class="w-full bg-[#151516] border-2 border-[#38383a] rounded-xl py-4 text-xl font-black text-white outline-none text-center" placeholder="Dólar no PY" oninput="calcularImportacao()">
        </div>
    </div>

    <div id="contaModal" class="hidden fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-[2000] px-4">
        <div class="bg-[#1c1c1e] border border-[#38383a] rounded-2xl w-full max-w-[400px] p-8">
            <h3 class="font-bold text-blue-500 mb-4 uppercase">Minha Conta</h3>
            <form onsubmit="salvarConta(event)">
                <input type="text" id="conta_whats" class="apple-input mb-3" placeholder="WhatsApp">
                <input type="text" id="conta_senha" class="apple-input mb-4" placeholder="Nova Senha">
                <div class="flex gap-2">
                    <button type="button" onclick="fecharConta()" class="bg-gray-600 text-white rounded-full py-3 w-1/3">Voltar</button>
                    <button type="submit" class="bg-blue-600 text-white rounded-full py-3 w-2/3">Atualizar</button>
                </div>
            </form>
        </div>
    </div>

    <nav class="nav-bar">
        <h1 class="text-2xl font-black italic m-0">iFipe</h1>
        <div class="flex items-center gap-2 bg-[#1c1c1e] p-2 px-4 rounded-xl border border-[#38383a]">
            <span class="text-[9px] text-gray-500 font-bold uppercase hidden md:inline">Taxa VIP Oráculo:</span>
            <span class="text-[14px] font-black text-[#32d74b] font-mono" id="ticker">R$ --</span>
        </div>
        <div class="flex gap-4 items-center">
            <button onclick="abrirConta()" class="text-[10px] text-blue-400 font-black uppercase">Conta</button>
            <button onclick="logout()" class="text-red-500 font-black text-[10px] uppercase">Sair</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 pb-20">
        <div class="filter-bar grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-3 mb-6">
            <select id="f_cat" class="apple-input" onchange="popularAparelhos()"><option value="">Categorias...</option><option value="1">IPHONE</option><option value="2">APPLE WATCH</option><option value="4">MACBOOK</option></select>
            <select id="f_prod" class="apple-input" onchange="atualizarFiltrosCascata()"><option value="">Modelos...</option></select>
            <select id="f_cond" class="apple-input" onchange="renderizarRanking()"><option value="">Condição...</option><option value="Novo">Novo</option><option value="Seminovo">Seminovo</option><option value="CPO">CPO</option><option value="GRADE A LEILAO">GRADE A LEILÃO</option></select>
            <select id="f_cap" class="apple-input" onchange="renderizarRanking()"><option value="">Memória...</option></select>
            <select id="f_lojista" class="apple-input" onchange="renderizarRanking()"><option value="">Lojista...</option></select>
            <select id="f_cid" class="apple-input" onchange="renderizarRanking()"><option value="">Cidade...</option></select>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            <div id="colBrl">
                <div class="section-title text-[#0071e3] bg-[#0071e3]/10">Ranking em Real (Brasil)</div>
                <div id="gridBrl" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
            <div id="colUsd">
                <div class="section-title text-[#32d74b] bg-[#32d74b]/10">Ranking em Dólar (Paraguai)</div>
                <div id="gridUsd" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </div>
    </main>

    <button onclick="abrirCalc()" class="btn-calc-float"><svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" fill="white" viewBox="0 0 16 16"><path d="M12 1a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1h8zM4 0a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2H4z"/></svg></button>
    <a href="https://wa.me/556896003049" target="_blank" class="btn-wpp-float"><svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="white" viewBox="0 0 16 16"><path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326z"/></svg></a>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let ofertasAtuais = [], gradeVariacoes = [], todosProdutosMestre = [], clienteLogado = null, currentUsdtRate = 0;

        window.onload = async () => {
            const token = localStorage.getItem('iFipe_Token');
            if(!token) window.location.replace('index.html');
            else {
                const { data } = await _s.from('clientes_buscador').select('*').eq('id', token).single();
                if(data) { clienteLogado = data; init(); }
            }
        };

        function iniciarTicker() {
            const socket = new WebSocket('wss://stream.binance.com:9443/ws/usdtbrl@ticker');
            socket.onmessage = (e) => {
                currentUsdtRate = parseFloat(JSON.parse(e.data).c);
                document.getElementById('ticker').innerText = `R$ ${(currentUsdtRate + 0.07).toFixed(4)}`;
                calcularImportacao();
            };
        }

        async function init() {
            iniciarTicker();
            const [p, r, v, f] = await Promise.all([ _s.from('produtos_mestre').select('*').order('nome'), _s.from('regioes').select('*').order('nome'), _s.from('variacoes').select('*'), _s.from('fornecedores').select('*').eq('ativo', true) ]);
            todosProdutosMestre = p.data; gradeVariacoes = v.data;
            document.getElementById('f_prod').innerHTML = '<option value="">Modelos...</option>' + p.data.map(x => `<option value="${x.id}">${x.nome}</option>`).join('');
            document.getElementById('f_lojista').innerHTML = '<option value="">Lojista...</option>' + f.data.map(x => `<option value="${x.id}">${x.nome}</option>`).join('');
            carregarDados(); setInterval(carregarDados, 10000);
        }

        function getModelWeight(name) {
            let n = (name || "").toLowerCase();
            let weight = 0;
            let match = n.match(/(\d+)/);
            if(match) weight += parseInt(match[1]) * 10000;
            if(n.includes("pro max")) weight += 500; else if(n.includes("pro")) weight += 400; else if(n.includes("plus")) weight += 300;
            return weight;
        }

        function sortOffers(a, b) {
            const condA = a.condicao === 'Novo' ? 1 : 0;
            const condB = b.condicao === 'Novo' ? 1 : 0;
            if (condA !== condB) return condB - condA;
            let wA = getModelWeight(a.variacoes?.produtos_mestre?.nome), wB = getModelWeight(b.variacoes?.produtos_mestre?.nome);
            if (wA !== wB) return wB - wA;
            return a.preco - b.preco;
        }

        async function carregarDados() {
            const { data } = await _s.from('ofertas').select('*, fornecedores(*), variacoes(*, produtos_mestre(*)), regioes(*)');
            ofertasAtuais = data || []; renderizarRanking();
        }

        function renderizarRanking() {
            const fCat = document.getElementById('f_cat').value, fP = document.getElementById('f_prod').value, fC = document.getElementById('f_cond').value, fLoj = document.getElementById('f_lojista').value;
            let filtrados = ofertasAtuais.filter(o => o.quantidade > 0 && o.variacoes && (!fCat || o.variacoes.produtos_mestre?.grupo_id == fCat) && (!fP || o.variacoes.produtos_mestre?.id == fP) && (!fC || o.condicao == fC) && (!fLoj || o.fornecedor_id == fLoj));

            let menores = {}; filtrados.forEach(o => { let k = `${o.variacao_id}_${o.condicao}_${o.moeda}`; if(!menores[k] || o.preco < menores[k]) menores[k] = o.preco; });

            const buildGrid = (lista) => lista.sort(sortOffers).map(o => {
                const k = `${o.variacao_id}_${o.condicao}_${o.moeda}`;
                let tagAlteracao = '';
                if(o.data_alteracao_preco && o.preco_anterior) {
                    let diff = (new Date() - new Date(o.data_alteracao_preco)) / 60000;
                    if(o.preco < o.preco_anterior && diff <= 30) tagAlteracao = `<span class="tag-status" style="background:#32d74b; color:#000;">OPORTUNIDADE 🔻</span>`;
                    else if (o.preco > o.preco_anterior && diff <= 15) tagAlteracao = `<span class="tag-status" style="background:#ff3b30; color:#fff;">SUBIU ⤴️</span>`;
                }
                
                let tagMenor = o.preco === menores[k] ? '<span class="tag-status tag-menor">🔥 MENOR PREÇO</span>' : '';
                let details = [o.variacoes?.capacidade, o.cores_variadas ? 'CORES VARIADAS' : o.variacoes?.cor, o.condicao].filter(Boolean).join(' | ');
                
                let t_bat = o.saude_bateria ? `<span class="mini-tag bat">${o.saude_bateria}</span>` : '';
                let t_gar = o.garantia ? `<span class="mini-tag gar">🛡️ ${o.garantia}</span>` : '';
                let t_pro = o.aceita_proposta ? `<span class="mini-tag lote">🤝 Negocia Qtd</span>` : '';
                let t_pix = o.aceita_pix ? `<span class="mini-tag active">PIX</span>` : '';
                let t_usd = o.aceita_usdt ? `<span class="mini-tag usdt">USDT</span>` : '';

                return `<div class="product-card">
                    <div class="flex flex-wrap gap-1 mb-2">${tagAlteracao} ${tagMenor}</div>
                    <h2 class="text-lg font-black leading-tight">${o.variacoes?.produtos_mestre?.nome}</h2>
                    <p class="text-[10px] text-gray-400 uppercase font-bold mb-3">${details}</p>
                    <div class="flex flex-wrap gap-1.5 mb-3">${t_bat} ${t_gar} ${t_pro} ${t_pix} ${t_usd}</div>
                    <div class="mt-auto border-t border-[#38383a] pt-3">
                        <p class="text-[9px] text-blue-400 font-black uppercase">LOJA: ${o.fornecedores?.nome} ${o.fornecedores?.verificado ? '✔️' : ''}</p>
                        <div class="price-text">${o.moeda === 'USD' ? '$' : 'R$'} ${o.preco.toLocaleString('pt-BR')}</div>
                    </div>
                    <a href="https://wa.me/${o.fornecedores?.whatsapp}" target="_blank" class="buy-button">WhatsApp</a>
                </div>`;
            }).join('');

            document.getElementById('gridBrl').innerHTML = buildGrid(filtrados.filter(o => o.moeda === 'BRL'));
            document.getElementById('gridUsd').innerHTML = buildGrid(filtrados.filter(o => o.moeda === 'USD'));
        }

        function popularAparelhos() { let c = document.getElementById('f_cat').value; let f = c ? todosProdutosMestre.filter(x => x.grupo_id == c) : todosProdutosMestre; document.getElementById('f_prod').innerHTML = '<option value="">Modelos...</option>' + f.map(x => `<option value="${x.id}">${x.nome}</option>`).join(''); renderizarRanking(); }
        function atualizarFiltrosCascata() { renderizarRanking(); }
        function abrirCalc() { document.getElementById('calcModal').classList.remove('hidden'); }
        function fecharCalc() { document.getElementById('calcModal').classList.add('hidden'); }
        function abrirConta() { document.getElementById('contaModal').classList.remove('hidden'); }
        function fecharConta() { document.getElementById('contaModal').classList.add('hidden'); }
        function calcularImportacao() { let usd = parseFloat(document.getElementById('calcUsd').value); if(!usd || !currentUsdtRate) return; let res = (usd * (currentUsdtRate + 0.07)) * 1.06; document.getElementById('calcResult').innerText = res.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
        function logout() { localStorage.removeItem('iFipe_Token'); window.location.replace('index.html'); }
    </script>
</body>
</html>
