<!DOCTYPE html>
<html lang="pt-br">
<head>
    <script>
        // ESCUDO DE CONTENÇÃO (NÃO TOCAR)
        const b_tok = localStorage.getItem('iFipe_Token');
        if (b_tok !== 'admin_bypass') {
            document.documentElement.innerHTML = '<body style="background:#050505;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh;font-family:system-ui,sans-serif;text-align:center;padding:20px;margin:0;"><div><h1 style="color:#0071e3;margin-bottom:15px;font-style:italic;font-weight:900;font-size:2.5rem;text-transform:uppercase;letter-spacing:-2px;">iFipe</h1><p style="color:#888;font-weight:bold;letter-spacing:1px;font-size:12px;line-height:1.6;text-transform:uppercase;">Estamos em atualização para trazer melhorias para você.<br><br>Até logo, time iFipe.</p><button onclick="window.location.replace(\'index.html\')" style="margin-top:30px;background:#1a1a1a;color:#fff;border:1px solid #333;padding:12px 24px;border-radius:50px;font-weight:900;cursor:pointer;font-size:10px;text-transform:uppercase;">Voltar ao Início</button></div></body>';
            window.stop();
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Buscador VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #38383a; --input: #2c2c2e; --blue-apple: #0071e3; }
        body.light-mode { --bg: #f5f5f7; --card: #fff; --text: #1d1d1f; --border: #d2d2d7; --input: #e8e8ed; }
        body { background: var(--bg); color: var(--text); font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin:0; transition: 0.3s; }
        .nav-bar { background:rgba(28, 28, 30, 0.8); backdrop-filter:blur(15px); border-bottom:1px solid var(--border); padding:15px 30_px; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:100; flex-wrap: wrap; gap: 10px;}
        .filter-bar { background: var(--card); padding:15px; border-radius:16px; margin-top:20px; border:1px solid var(--border); }
        .apple-input { background: var(--input); border: 1px solid var(--border); border-radius: 10px; padding: 10px; width: 100%; color: var(--text); outline: none; font-size: 12px; text-align: center; }
        .product-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 12px; transition: 0.3s; position: relative; }
        .product-card:hover { border-color: #0071e3; transform: translateY(-4px); }
        .tag-status { font-size: 8px; font-weight: 900; text-transform: uppercase; padding: 4px 8px; border-radius: 50px; letter-spacing: 0.05em; display: inline-block; margin-bottom: 3px; }
        .tag-menor { background: #ff3b30; color: #fff; }
        .tag-poucas { background: #ffcc00; color: #000; }
        .tag-muitas { background: #0071e3; color: #fff; }
        .price-text { font-size: 22px; font-weight: 900; color: var(--text); letter-spacing: -0.05em; text-align: right; }
        .buy-button { background: #0071e3; color: #fff; font-weight: 900; border-radius: 50px; padding: 12px; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 11px; text-align: center; display: block; text-decoration: none; margin-top: 16px; transition: 0.3s; letter-spacing: 0.05em; }
        .btn-header { display: flex; align-items: center; justify-content: center; border-radius: 12px; height: 38px; padding: 0 12px; transition: 0.3s; border: 1px solid var(--border); text-decoration: none; gap: 6px; }
        .btn-header span { font-size: 10px; font-weight: 900; text-transform: uppercase; }
        .color-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; vertical-align: middle; border: 1px solid rgba(255,255,255,0.2); }
        .hidden { display: none !important; }
        .badge-insignia { display: inline-flex; align-items: center; background: rgba(147, 51, 234, 0.15); color: #d8b4fe; border: 1px solid #9333ea; font-size: 8px; font-weight: 900; padding: 3px 6px; border-radius: 6px; margin-right: 4px; margin-bottom: 4px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="mainContent">
        <div id="calcModal" class="hidden fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-[2000] px-4">
            <div class="w-full max-w-[380px] bg-[#1c1c1e] border-2 border-[#38383a] rounded-3xl p-6 shadow-2xl relative">
                <button onclick="fecharCalc()" class="absolute top-4 right-5 text-gray-500 hover:text-white font-bold text-2xl leading-none">×</button>
                <div class="text-center mb-5 mt-2"><h2 class="text-lg font-black italic text-white">Calculadora VIP 2.0</h2></div>
                <div class="bg-[#0a0a0a] border-2 border-[#2c2c2e] rounded-2xl p-4 text-right mb-4">
                    <div id="calcResult" class="font-mono text-3xl font-black text-[#0071e3]">R$ 0,00</div>
                </div>
                <input type="number" id="calcUsd" class="apple-input mb-4" placeholder="Custo no PY (USD)" oninput="calcularImportacao()">
            </div>
        </div>

        <nav class="nav-bar">
            <div class="flex items-center gap-3">
                <h1 class="text-2xl font-black italic">iFipe</h1>
                <button onclick="abrirCalc()" class="btn-header border-[#0071e3] text-[#0071e3]"><span>Calculadora VIP</span></button>
            </div>
            <div class="flex gap-4 items-center">
                <span class="text-[14px] font-black text-[#32d74b] font-mono" id="ticker">$ --</span>
                <button onclick="logout()" class="text-red-500 font-black text-[10px] uppercase">Sair</button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-4 pb-20 pt-8">
            <div class="relative w-full max-w-3xl mx-auto mb-10">
                <input type="text" id="buscaTexto" class="w-full bg-white text-black px-8 py-5 rounded-full outline-none font-black uppercase text-sm shadow-2xl" placeholder="ENCONTRE O MELHOR PREÇO" oninput="renderizarRanking()">
            </div>

            <div class="filter-bar grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-3 mb-8">
                <div><label class="block text-[8px] uppercase font-black text-blue-500 mb-1 text-center">Categoria</label><select id="f_cat" class="apple-input" onchange="renderizarRanking()"><option value="">Todas</option><option value="1">IPHONE</option></select></div>
                <div><label class="block text-[8px] uppercase font-black text-gray-500 mb-1 text-center">Condição</label><select id="f_cond" class="apple-input" onchange="renderizarRanking()"><option value="">Todas</option><option value="NOVO">NOVO</option><option value="SEMINOVO">SEMINOVO</option></select></div>
                <div><label class="block text-[8px] uppercase font-black text-gray-500 mb-1 text-center">Memória</label><select id="f_cap" class="apple-input" onchange="renderizarRanking()"><option value="">Todas</option></select></div>
                <div><label class="block text-[8px] uppercase font-black text-gray-500 mb-1 text-center">Atacadista</label><select id="f_lojista" class="apple-input" onchange="renderizarRanking()"><option value="">Todos</option></select></div>
            </div>

            <div id="gridGeral" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
        </main>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let ofertasAtuais = [], currentUsdtRate = 0;

        window.onload = async () => {
            iniciarTicker();
            carregarDados();
            setInterval(carregarDados, 5000);
        };

        function iniciarTicker() {
            const socket = new WebSocket('wss://stream.binance.com:9443/ws/usdtbrl@ticker');
            socket.onmessage = (e) => {
                let bin = parseFloat(JSON.parse(e.data).c);
                currentUsdtRate = bin + 0.06;
                document.getElementById('ticker').innerText = `R$ ${bin.toFixed(4)}`;
            };
        }

        async function carregarDados() {
            const { data } = await _s.from('ofertas').select('*, fornecedores(*), variacoes(*, produtos_mestre(*))').gt('quantidade', 0);
            ofertasAtuais = data || [];
            renderizarRanking();
        }

        function renderizarRanking() {
            const grid = document.getElementById('gridGeral');
            const txt = (document.getElementById('buscaTexto').value || "").toLowerCase();
            const fCond = document.getElementById('f_cond').value;

            const filtrados = ofertasAtuais.filter(o => 
                (o.variacoes.produtos_mestre.nome.toLowerCase().includes(txt)) &&
                (!fCond || o.condicao === fCond)
            );

            grid.innerHTML = filtrados.map(o => `
                <div class="product-card flex flex-col pt-6">
                    <h2 class="text-lg font-black">${o.variacoes.produtos_mestre.nome}</h2>
                    <p class="text-[9px] font-black uppercase text-zinc-400 mb-2">${o.variacoes.capacidade} | ${o.variacoes.cor} | ${o.condicao}</p>
                    <div class="mt-auto border-t border-[#38383a] pt-2 flex justify-between items-end">
                        <div class="flex-1">
                            <span class="text-[11px] text-[#25d366] font-black uppercase">${o.fornecedores.nome}</span>
                        </div>
                        <div class="price-text">R$ ${(o.moeda === 'USD' ? o.preco * currentUsdtRate : o.preco).toLocaleString('pt-BR', {minimumFractionDigits: 2})}</div>
                    </div>
                    <a href="https://wa.me/${o.fornecedores.whatsapp}" class="buy-button mt-4">Comprar no WhatsApp</a>
                </div>
            `).join('');
        }

        function abrirCalc() { document.getElementById('calcModal').classList.remove('hidden'); }
        function fecharCalc() { document.getElementById('calcModal').classList.add('hidden'); }
        function calcularImportacao() {
            const v = parseFloat(document.getElementById('calcUsd').value);
            if(v > 0) document.getElementById('calcResult').innerText = (v * currentUsdtRate * 1.06).toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
        }
        function logout() { localStorage.clear(); window.location.replace('index.html'); }
    </script>
</body>
</html>
