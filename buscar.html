    async function carregarDados() {
        try {
            const [p, v, f, o] = await Promise.all([

    function processarMenorPrecoGlobal() {
        DADOS_PROCESSADOS.menorPrecoPorProdutoGrupo = {};
        ofertas.forEach(o => {
            const pId = o.variacoes?.produto_id;
            if (!pId) return;
            const moeda = o.moeda || 'BRL';
            const grupo = moeda; // 'BRL' ou 'USD'
            const key = `${pId}_${grupo}`;
            const preco = o.preco;
            if (!DADOS_PROCESSADOS.menorPrecoPorProdutoGrupo[key] || preco < DADOS_PROCESSADOS.menorPrecoPorProdutoGrupo[key]) {
                DADOS_PROCESSADOS.menorPrecoPorProdutoGrupo[key] = preco;
            }
        });
    }

    function ordenarOfertas(lista) {
        return lista.sort((a, b) => {
            const idA = a.variacoes?.produto_id || 0;
            const idB = b.variacoes?.produto_id || 0;
            if (idA !== idB) return idB - idA; // modelos mais novos primeiro

            const pA = a.preco;
            const pB = b.preco;
            if (pA !== pB) return pA - pB; // menor preço

            const tA = a.atualizado_em ? new Date(a.atualizado_em).getTime() : new Date(a.criado_em).getTime();
            const tB = b.atualizado_em ? new Date(b.atualizado_em).getTime() : new Date(b.criado_em).getTime();
            return tB - tA; // mais recente primeiro
        });
    }

    function renderizarCards() {
        console.log('renderizarCards() chamado');

        }

        const fCor = document.getElementById('filtroCor').value;

            if (busca) {

            if (fCond && o.condicao !== fCond) return false;
            if (fCap && o.variacoes?.capacidade !== fCap) return false;
            if (fCor && o.variacoes?.cor !== fCor) return false;
            if (fCid && o.fornecedores?.cidade !== fCid) return false;
            if (fLoj && o.fornecedor_id != fLoj) return false;
            return true;
        });

        console.log('Ofertas após filtro:', filtradas.length);

        ofertasBRL.sort((a, b) => a.preco - b.preco);
        ofertasUSD.sort((a, b) => a.preco - b.preco);

        // Função para criar card
        const criarCard = (o) => {
            const p = o.variacoes?.produtos_mestre;
            const f = o.fornecedores;
            const v = o.variacoes;

            const moeda = o.moeda || 'BRL';
            const preco = o.preco;

            const menorPreco = DADOS_PROCESSADOS.menorPrecoPorProdutoGrupo[keyMenor] || Infinity;

            // Molduras comerciais

            if (f.aceita_usdt || o.aceita_usdt) comerciais += '<span class="commercial-badge"><i class="fas fa-coins text-green-500"></i> USDT</span>';
            if (f.aceita_coleta || o.aceita_coleta) comerciais += '<span class="commercial-badge"><i class="fas fa-box"></i> Coleta</span>';
            if (f.faz_envio || o.faz_envio) comerciais += '<span class="commercial-badge"><i class="fas fa-truck"></i> Envio</span>';
            if (f.motoboy || o.motoboy) comerciais += '<span class="commercial-badge"><i class="fas fa-motorcycle"></i> Motoboy</span>';
            if (f.aceita_proposta || o.aceita_proposta) comerciais += '<span class="commercial-badge"><i class="fas fa-handshake"></i> Negocia Qtd</span>';

            // Insígnias do anunciante
            let insigniasAnunciante = '';
            if (f.insignia_manual && f.insignia_manual.length > 0) {
                insigniasAnunciante = f.insignia_manual.map(ins => `<span class="badge badge-purple">${ins}</span>`).join(' ');
            }

            const saudacao = (() => {
                const h = new Date().getHours();
                if (h < 12) return 'Bom dia';
                if (h < 18) return 'Boa tarde';
                return 'Boa noite';
            })();
            const msgZap = encodeURIComponent(
                `${saudacao}! Encontrei seu anúncio no www.ifipe.com.br\n` +
                `${p.nome} ${v?.capacidade || ''} ${v?.cor || ''}\n` +
                `Preço: ${simbolo} ${preco.toFixed(2)}\n` +
                `Está disponível?`
            );

            const curtido = minhasCurtidas.has(o.id);
            const btnRecomendar = `<button class="action-button ${curtido ? 'text-blue-500' : ''}" onclick="toggleRecomendar(${o.id}, this)"><i class="fa${curtido ? 's' : 'r'} fa-fire text-orange-500 text-sm"></i> <span>${curtido ? 'Recomendado' : 'Recomendar'}</span></button>`;

            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <div class="flex justify-between items-start mb-1">
                    <div class="flex items-center">
                        <span class="color-dot" style="background: ${corHexValue};"></span>
                        <h3 class="font-bold text-sm">${p.nome}</h3>
                    </div>
                    <span class="badge ${o.quantidade <= 3 ? 'badge-red' : 'badge-blue'}">${o.quantidade} UN</span>
                </div>

                <div class="flex items-center gap-1 mb-1 flex-wrap">
                    <span class="badge badge-purple">${o.condicao}</span>
                    ${isMenor ? '<span class="badge badge-green">🔥 MENOR PREÇO</span>' : ''}
                    ${insigniasAnunciante}
                </div>
                <div class="flex flex-wrap gap-1 mb-2 mt-1">${comerciais}</div>
                <div class="flex items-center gap-1 mb-1">
                    <span class="text-xs font-medium">🏢 ${f.nome}</span>
                    ${f.verificado ? '<span class="verified-badge">✓</span>' : ''}
                </div>
                <p class="text-xs text-gray-400 mb-1">📍 ${f.cidade || ''} - ${f.pais || 'BR'}</p>
                <div class="flex justify-between items-center mb-2">
                    <span class="price text-blue-500">${simbolo} ${preco.toFixed(2)}</span>
                    <span class="text-[9px] text-gray-500">${new Date(o.criado_em).toLocaleTimeString('pt-BR', {hour:'2-digit',minute:'2-digit'})}</span>

                    ${btnRecomendar}
                    <button class="action-button hover:text-blue-500" onclick="abrirPerguntas(${o.id}, '${p.nome}')">
                        <i class="far fa-question-circle"></i> <span>Perguntar</span>
                    </button>
                    <button class="action-button hover:text-blue-500" onclick="compartilhar('${p.nome}', '${v?.capacidade || ''}', '${v?.cor || ''}', ${preco}, '${simbolo}', ${o.quantidade})">
                        <i class="far fa-share-square"></i> <span>Compartilhar</span>
                    </button>
                </div>
                <a href="https://wa.me/${f.whatsapp?.replace(/\D/g,'')}?text=${msgZap}" target="_blank" class="btn-apple w-full text-center text-xs py-2 flex items-center justify-center gap-2">
                    <i class="fab fa-whatsapp"></i> Comprar no WhatsApp
                </a>
            `;
            return card;
        };

        // Decidir layout
        if (ofertasUSD.length > 0) {
            container.innerHTML = `
                <div class="grid-moedas">
                    <div id="coluna-brl" class="coluna-moeda"></div>
                    <div id="coluna-usd" class="coluna-moeda"></div>

            const colunaBRL = document.getElementById('coluna-brl');
            const colunaUSD = document.getElementById('coluna-usd');
            ofertasBRL.forEach(o => {
                const card = criarCard(o);
                if (card) colunaBRL.appendChild(card);
            });
            ofertasUSD.forEach(o => {
                const card = criarCard(o);
                if (card) colunaUSD.appendChild(card);
            });
        } else {
            container.innerHTML = `<div id="grid-unico" class="grid-cards"></div>`;
            const grid = document.getElementById('grid-unico');
            ofertasBRL.forEach(o => {
                const card = criarCard(o);
                if (card) grid.appendChild(card);
            });
        }

        if (filtradas.length === 0) {
            container.innerHTML = '<p class="text-center text-gray-400 col-span-full py-10">Nenhum aparelho encontrado com estes filtros.</p>';
        }
    }

    // Funções de Interação
    async function toggleRecomendar(ofertaId, btn) {
        if (!currentUser || currentUser.id === 0) return alert('Faça login para recomendar.');
        const temCurtida = minhasCurtidas.has(ofertaId);
        if (temCurtida) {
            await _s.from('curtidas').delete().eq('cliente_id', currentUser.id).eq('oferta_id', ofertaId);
            minhasCurtidas.delete(ofertaId);
            btn.classList.remove('text-blue-500');
            btn.innerHTML = '<i class="far fa-fire text-orange-500 text-sm"></i> <span>Recomendar</span>';
        } else {
            await _s.from('curtidas').insert({ cliente_id: currentUser.id, oferta_id: ofertaId });
            minhasCurtidas.add(ofertaId);
            btn.classList.add('text-blue-500');
            btn.innerHTML = '<i class="fas fa-fire text-orange-500 text-sm"></i> <span>Recomendado</span>';
        }
    }

    function compartilhar(nome, capacidade, cor, preco, simbolo, qtd) {
        const saudacao = (() => {
            const h = new Date().getHours();
            if (h < 12) return 'Bom dia';
            if (h < 18) return 'Boa tarde';
            return 'Boa noite';
        })();
        const texto = `${saudacao}! Se liga nessa oferta especial 🔥📲 que encontrei no iFipe:\n` +
            `${nome} ${capacidade} ${cor}\n` +
            `Preço: ${simbolo} ${preco.toFixed(2)}\n` +
            `Quantidade disponível: ${qtd}`;
        
        if (navigator.share) {
            navigator.share({ title: 'Oferta iFipe', text: texto });
        } else {
            navigator.clipboard.writeText(texto);
            alert('Texto copiado! Você pode colar no WhatsApp ou Instagram.');
        }
    }

    async function abrirPerguntas(ofertaId, titulo) {
        document.getElementById('perguntaOfertaId').value = ofertaId;
        document.getElementById('perguntaTitulo').innerText = `Perguntas: ${titulo}`;
        await carregarPerguntas(ofertaId);
        document.getElementById('perguntasModal').classList.remove('hidden');
    }
    function fecharPerguntas() { document.getElementById('perguntasModal').classList.add('hidden'); }
    async function carregarPerguntas(ofertaId) {
        const { data } = await _s.from('comentarios').select('*').eq('oferta_id', ofertaId).order('criado_em', { ascending: false });
        const lista = document.getElementById('listaPerguntas');
        if (!data || data.length === 0) {
            lista.innerHTML = '<p class="text-gray-400 text-center">Nenhuma dúvida ainda.</p>';
            return;
        }
        lista.innerHTML = data.map(p => `
            <div class="border-b border-[#38383a] pb-2">
                <div class="flex justify-between items-start">
                    <span class="font-bold text-xs">${p.autor_nome}</span>
                    <span class="text-[8px] text-gray-500">${new Date(p.criado_em).toLocaleString()}</span>
                </div>
                <p class="text-sm mt-1">${p.texto}</p>
                ${p.resposta ? `<p class="text-xs text-green-400 mt-1">📢 Lojista: ${p.resposta}</p>` : ''}
            </div>
        `).join('');
    }
    async function enviarPergunta(e) {
        e.preventDefault();
        const ofertaId = document.getElementById('perguntaOfertaId').value;
        const texto = document.getElementById('perguntaTexto').value.trim();
        if (!texto || !currentUser) return alert('Faça login para perguntar.');
        await _s.from('comentarios').insert({
            oferta_id: ofertaId,
            autor_nome: currentUser.nome || 'Buscador',
            autor_id: currentUser.id,
            texto: texto
        });
        document.getElementById('perguntaTexto').value = '';
        await carregarPerguntas(ofertaId);
    }

    // FUNÇÕES DA MINHA CONTA (CORRIGIDAS)
    function abrirConta() {
        console.log('Abrindo conta... currentUser =', currentUser);
        if (!currentUser) {
            alert('Usuário não carregado. Tente recarregar a página.');
            return;
        }
        if (currentUser.id === 0) {
            // Master pode abrir, mas com campos em branco
            document.getElementById('contaNome').value = '';
            document.getElementById('contaWhats').value = '';
            document.getElementById('contaSenha').value = '';
        } else {
            document.getElementById('contaNome').value = currentUser.nome || '';
            document.getElementById('contaWhats').value = currentUser.whatsapp || '';
            document.getElementById('contaSenha').value = '';
        }
        const modal = document.getElementById('contaModal');
        if (modal) {
            modal.classList.remove('hidden');
        } else {
            console.error('Modal de conta não encontrado!');
        }
    }

    function fecharConta() {
        const modal = document.getElementById('contaModal');
        if (modal) modal.classList.add('hidden');
    }

    async function salvarConta(e) {
        e.preventDefault();
        if (!currentUser || currentUser.id === 0) {
            alert('Você não tem permissão para alterar dados.');
            return;
        }
        const nome = document.getElementById('contaNome').value.trim();
        const whats = document.getElementById('contaWhats').value.trim();
        const senha = document.getElementById('contaSenha').value.trim();
        const updates = { nome, whatsapp: whats };
        if (senha) updates.senha = senha;
        
        try {
            const { error } = await _s.from('clientes_buscador').update(updates).eq('id', currentUser.id);
            if (error) throw error;
            currentUser = { ...currentUser, ...updates };
            alert('Conta atualizada com sucesso!');
            fecharConta();
        } catch (err) {
            alert('Erro ao atualizar: ' + err.message);
        }
    }

    async function abrirHistoricoGeral() {
        document.getElementById('historicoGeralModal').classList.remove('hidden');
        const lista = document.getElementById('listaHistorico');
        lista.innerHTML = '<p class="text-center text-gray-400">Calculando mercado...</p>';

        const dezDiasAtras = new Date();
        dezDiasAtras.setDate(dezDiasAtras.getDate() - 10);
        const historico = {};

        ofertas.forEach(o => {
            const pId = o.variacoes?.produto_id;
            if (!pId) return;
            const cidade = o.fornecedores?.cidade || 'GERAL';
            const key = `${pId}_${cidade}`;
            if (new Date(o.criado_em) < dezDiasAtras) return;
            const preco = o.moeda === 'USD' ? o.preco : o.preco; // mantém original
            if (!historico[key]) {
                historico[key] = {
                    nome: o.variacoes?.produtos_mestre?.nome || 'Produto',
                    capacidade: o.variacoes?.capacidade || '',
                    cidade, precos: []
                };
            }
            historico[key].precos.push(preco);
        });

        if (Object.keys(historico).length === 0) {
            lista.innerHTML = '<p class="text-center text-gray-400">Sem dados suficientes.</p>';
        } else {
            let html = '';
            for (const key in historico) {
                const item = historico[key];
                if (item.precos.length === 0) continue;
                const media = item.precos.reduce((a, b) => a + b, 0) / item.precos.length;
                html += `
                    <div class="border-b border-[#38383a] pb-2 mb-2">
                        <div class="flex justify-between items-center">
                            <span class="font-medium">${item.nome} ${item.capacidade}</span>
                            <span class="font-bold text-blue-500">R$ ${media.toFixed(2)}</span>
                        </div>
                        <div class="flex justify-between text-xs text-gray-400 mt-1">
                            <span>📍 ${item.cidade}</span>
                            <span>📊 ${item.precos.length} ofertas avaliadas</span>
                        </div>
                    </div>
                `;
            }
            lista.innerHTML = html;
        }
    }
    function fecharHistoricoGeral() { document.getElementById('historicoGeralModal').classList.add('hidden'); }

    // Calculadoras
    function atualizarCalculadora() {
        const usd = parseFloat(document.getElementById('calcUsd').value) || 0;
        const custoBase = (usd * rateOraculo) * 1.06;
        document.getElementById('custoFinal').innerText = custoBase > 0 ? `R$ ${custoBase.toFixed(2)}` : 'R$ 0,00';
        let a = 0, b = 0, c = 0;
        if (usd > 0) {
            if (usd <= 750) { a = custoBase * 1.20; b = custoBase * 1.40; c = custoBase * 1.55; } 
            else { a = custoBase + 350; b = custoBase + 550; c = custoBase + 1000; }
        }
        document.getElementById('precoAtacado').innerText = `R$ ${a.toFixed(2)}`;
        document.getElementById('precoAtacarejo').innerText = `R$ ${b.toFixed(2)}`;
        document.getElementById('precoVarejo').innerText = `R$ ${c.toFixed(2)}`;
    }

    function atualizarCalculadoraMobile() {
        const usdInput = document.getElementById('calcUsdMobile');
        if(!usdInput) return;
        const usd = parseFloat(usdInput.value) || 0;
        const custoBase = (usd * rateOraculo) * 1.06;
        document.getElementById('custoFinalMobile').innerText = custoBase > 0 ? `R$ ${custoBase.toFixed(2)}` : 'R$ 0,00';
        let a = 0, b = 0, c = 0;
        if (usd > 0) {
            if (usd <= 750) { a = custoBase * 1.20; b = custoBase * 1.40; c = custoBase * 1.55; } 
            else { a = custoBase + 350; b = custoBase + 550; c = custoBase + 1000; }
        }
        document.getElementById('precoAtacadoMobile').innerText = `R$ ${a.toFixed(2)}`;
        document.getElementById('precoAtacarejoMobile').innerText = `R$ ${b.toFixed(2)}`;
        document.getElementById('precoVarejoMobile').innerText = `R$ ${c.toFixed(2)}`;
    }

    // Filtros
    function popularFiltros() {
        const pop = (id, arr, prop) => {
            const el = document.getElementById(id);
            if(el.options.length <= 1) {
                const unicos = [...new Set(arr.map(x => prop(x)).filter(Boolean))];
                unicos.forEach(x => {
                    if (typeof x === 'object') el.innerHTML += `<option value="${x.id}">${x.nome}</option>`;
                    else el.innerHTML += `<option value="${x}">${x}</option>`;
                });
            }
        };
        pop('filtroCategoria', produtos, p => p);
        pop('filtroCapacidade', variacoes, v => v.capacidade);
        pop('filtroCor', variacoes, v => v.cor);
        pop('filtroCidade', fornecedores, f => f.cidade);
        pop('filtroLojista', fornecedores, f => f);
    }

    function atualizarStatusUsuario() {
        const container = document.getElementById('userInsignias');
        let insignias = currentUser.insignia_manual || [];
        if (insignias.length > 0) {
            container.innerHTML = insignias.map(i => `<span class="status-badge">${i}</span>`).join('');
        } else {
            container.innerHTML = ''; 
        }
    }

    function fecharDrawer() { document.getElementById('drawer').classList.remove('open'); document.getElementById('drawerOverlay').classList.remove('open'); }
