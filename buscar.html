<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IFIPE - BUSCADOR VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #38383a; --blue: #0071e3; }
        body { background: var(--bg); color: var(--text); font-family:-apple-system, sans-serif; margin:0; text-transform: uppercase; }
        .apple-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 1.5rem; transition: 0.3s; position: relative; }
        .apple-card:hover { border-color: var(--blue); transform: translateY(-4px); }
        .apple-input { background: #2c2c2e; border: 1px solid var(--border); border-radius: 12px; padding: 12px; width: 100%; color: var(--text); outline: none; font-size: 12px; text-transform: uppercase; text-align: center; }
        .color-dot { width: 16px; height: 16px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.4); display: inline-block; vertical-align: middle; box-shadow: 0 0 5px #000; }
        .price-tag { font-family: 'JetBrains Mono'; font-weight: 800; color: #32d74b; font-size: 1.4rem; }
        .tag-status { font-size: 8px; font-weight: 900; padding: 4px 8px; border-radius: 50px; display: inline-block; margin-bottom: 5px; }
        .mini-tag { font-size: 8px; font-weight: 900; padding: 4px 8px; border-radius: 6px; background: #2c2c2e; color: #86868b; border: 1px solid var(--border); }
        .mini-tag.active { color: #fff; border-color: var(--blue); background: rgba(0, 113, 227, 0.2); }
        #btnSubir { position: fixed; bottom: 20px; right: 20px; background: var(--blue); color: #fff; font-weight: 900; font-size: 10px; padding: 12px 18px; border-radius: 50px; cursor: pointer; z-index: 1000; opacity: 0; pointer-events: none; transition: 0.3s; border: none; }
        #btnSubir.show { opacity: 1; pointer-events: auto; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 10px; }
        .hidden { display: none !important; }
        .suggestion-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #38383a; font-weight: 900; }
        .suggestion-item:hover { background: #2c2c2e; color: var(--blue); }
    </style>
</head>
<body class="p-4 md:p-6">

    <button id="btnSubir" onclick="window.scrollTo({top:0, behavior:'smooth'})">⬆️ SUBIR</button>

    <nav class="max-w-[1400px] mx-auto bg-black border-b border-[#38383a] p-4 mb-8 flex flex-col lg:flex-row justify-between items-center gap-6 rounded-2xl">
        <div class="flex items-center gap-4">
            <h1 class="text-3xl font-black italic">IFIPE <span class="text-blue-500">VIP</span></h1>
            <div class="hidden md:flex gap-4 border-l border-[#38383a] pl-4">
                <button onclick="abrirFipe()" class="text-[9px] font-black text-blue-400">📊 PREÇO MÉDIO</button>
                <button onclick="abrirSininho()" class="text-[9px] font-black text-yellow-500">🔔 ALERTAS</button>
            </div>
        </div>
        
        <div class="flex flex-wrap gap-4 items-center justify-center">
            <div class="text-right">
                <p class="text-[7px] text-gray-500 font-black">ÍNDICE BINANCE REAL</p>
                <p id="tBin" class="text-sm font-mono font-black text-yellow-400">R$ --</p>
            </div>
            <a href="https://wa.me/15616760652?text=Oráculo%20venho%20através%20do%20iFipe%20e%20quero%20comprar%20USDT" target="_blank" class="bg-green-900/30 text-green-400 px-5 py-2.5 rounded-xl border border-green-500/50 font-black text-[10px] hover:bg-green-900/50 transition flex items-center gap-3">
                COMPRAR USDT COM ORÁCULO <span id="tOra" class="text-sm font-mono">R$ --</span>
            </a>
            <button onclick="logout()" class="text-[10px] text-red-500 font-black px-4 py-2 rounded-full border border-red-500/20">SAIR</button>
        </div>
    </nav>

    <main class="max-w-[1400px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <aside class="lg:col-span-3 space-y-6">
            
            <div class="apple-card">
                <h3 class="text-xs font-black text-blue-500 mb-6 italic">FILTRAR ORÁCULO</h3>
                <div class="relative">
                    <input type="text" id="q" class="apple-input mb-4" placeholder="QUAL IPHONE BUSCA?" oninput="sugger(this.value)">
                    <div id="sugBox" class="hidden absolute top-full left-0 w-full bg-[#1c1c1e] border border-[#38383a] rounded-xl z-[100] max-h-48 overflow-y-auto custom-scroll shadow-2xl"></div>
                </div>
                <div class="space-y-4">
                    <select id="fMod" class="apple-input" onchange="render()"><option value="">TODOS OS MODELOS</option></select>
                    <div class="grid grid-cols-2 gap-2">
                        <select id="fCap" class="apple-input" onchange="render()"><option value="">MEMÓRIA</option><option value="64GB">64GB</option><option value="128GB">128GB</option><option value="256GB">256GB</option><option value="512GB">512GB</option><option value="1TB">1TB</option></select>
                        <select id="fCond" class="apple-input" onchange="render()"><option value="">CONDIÇÃO</option><option value="Novo">NOVO</option><option value="Seminovo">SEMINOVO</option></select>
                    </div>
                    <button onclick="abrirAlertaModal()" class="w-full bg-yellow-500 text-black font-black py-3 rounded-xl text-[10px] uppercase">➕ CRIAR ALERTA DE PREÇO</button>
                </div>
            </div>

            <div class="apple-card border-green-600/30 bg-green-600/5">
                <h3 class="text-[10px] font-black text-green-500 italic mb-4 text-center">CALCULADORA VIP PARA IPHONE</h3>
                <input type="number" id="cUsd" class="apple-input font-mono text-center font-bold !bg-black" placeholder="VALOR EM DÓLAR $" oninput="execCalc()">
                <div class="bg-black p-3 rounded-xl border border-[#38383a] text-center mt-3">
                    <span class="text-[8px] text-gray-400 block font-black">CUSTO ENTREGUE NO BRASIL</span>
                    <span id="res_custo" class="text-xl font-mono font-black text-[#32d74b]">R$ 0,00</span>
                </div>
                <div class="bg-[#1c1c1e] p-3 rounded-xl border border-[#38383a] space-y-2 mt-2 text-[10px] font-black">
                    <div class="flex justify-between"><span>ALTO ATACADO</span><span id="res_alto" class="text-white">R$ 0,00</span></div>
                    <div class="flex justify-between"><span>ATACADO</span><span id="res_ata" class="text-yellow-400">R$ 0,00</span></div>
                    <div class="flex justify-between"><span>ATACAREJO</span><span id="res_atcrj" class="text-orange-400">R$ 0,00</span></div>
                    <div class="flex justify-between"><span>VAREJO</span><span id="res_var" class="text-blue-400">R$ 0,00</span></div>
                </div>
            </div>
        </aside>

        <div class="lg:col-span-9">
            <div id="grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5"></div>
        </div>

    </main>

    <div id="modalFipe" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[2000] p-4">
        <div class="apple-card max-w-[450px] w-full border-blue-500 flex flex-col max-h-[80vh]">
            <h3 class="text-sm font-black text-blue-400 mb-4 text-center italic tracking-widest">📊 PREÇO MÉDIO DE MERCADO (7 DIAS)</h3>
            <div id="fipeContent" class="flex-1 overflow-y-auto custom-scroll space-y-2 pr-2"></div>
            <button onclick="document.getElementById('modalFipe').classList.add('hidden')" class="apple-button bg-gray-600 text-white w-full mt-4">FECHAR JANELA</button>
        </div>
    </div>

    <div id="modalSininho" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[2000] p-4">
        <div class="apple-card max-w-[400px] w-full border-yellow-500 flex flex-col max-h-[80vh]">
            <h3 class="text-sm font-black text-yellow-500 mb-4 text-center italic tracking-widest">🔔 MEUS ALERTAS ATIVOS</h3>
            <div id="sininhoContent" class="flex-1 overflow-y-auto custom-scroll space-y-3 pr-2"></div>
            <button onclick="document.getElementById('modalSininho').classList.add('hidden')" class="apple-button bg-gray-600 text-white w-full mt-4">FECHAR</button>
        </div>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let todas = [], prods = [], rate = 0, user = null;

        const rnd10 = v => Math.round(v / 10) * 10;
        const rndUp = v => Math.ceil(v / 10) * 10;
        const getHex = c => { let s=(c||'').toUpperCase(); if(s.includes('PRETO')||s.includes('BLACK')||s.includes('MEIA-NOITE')||s.includes('GRAFITE')) return '#191919'; if(s.includes('BRANCO')||s.includes('WHITE')||s.includes('ESTELAR')) return '#f5f5f7'; if(s.includes('AZUL')) return '#215e7c'; if(s.includes('VERDE')) return '#505c4c'; if(s.includes('NATURAL')) return '#8c8c88'; if(s.includes('DESERTO')||s.includes('DOURADO')||s.includes('GOLD')) return '#ccb390'; if(s.includes('ROSA')||s.includes('PINK')) return '#e6c7c2'; if(s.includes('ROXO')) return '#5c5b57'; if(s.includes('PRATEADO')) return '#e3e4e5'; return '#808080'; };

        async function init() {
            const token = localStorage.getItem('iFipe_Token');
            if(!token) return window.location.href = 'index.html';
            const {data:cl} = await _s.from('clientes_buscador').select('*').eq('id', token).single();
            user = cl;

            new WebSocket('wss://stream.binance.com:9443/ws/usdtbrl@ticker').onmessage = e => {
                let b = parseFloat(JSON.parse(e.data).c); rate = b;
                document.getElementById('tBin').innerText = `R$ ${b.toFixed(4)}`;
                document.getElementById('tOra').innerText = `R$ ${(b+0.06).toFixed(4)}`;
                execCalc();
            };

            const [pData, oData] = await Promise.all([ _s.from('produtos_mestre').select('*').order('nome'), _s.from('ofertas').select('*, variacoes(capacidade, cor, produtos_mestre(nome)), fornecedores(nome, verificado, whatsapp), regioes(bandeira, nome)').eq('status_aprovacao', 'aprovado').order('preco', {ascending: true}) ]);
            prods = pData.data; todas = oData.data || [];
            document.getElementById('fMod').innerHTML += prods.map(x=>`<option value="${x.nome}">${x.nome}</option>`).join('');
            render();
        }

        function execCalc() {
            let u = parseFloat(document.getElementById('cUsd').value);
            if(!u || !rate) return;
            let c = (u * (rate + 0.07)) * 1.06;
            document.getElementById('res_custo').innerText = c.toLocaleString('pt-BR',{style:'currency', currency:'BRL'});
            document.getElementById('res_alto').innerText = rndUp(c + 200).toLocaleString('pt-BR',{style:'currency', currency:'BRL'});
            document.getElementById('res_ata').innerText = rndUp(c + 350).toLocaleString('pt-BR',{style:'currency', currency:'BRL'});
            document.getElementById('res_atcrj').innerText = rndUp(c + 500).toLocaleString('pt-BR',{style:'currency', currency:'BRL'});
            document.getElementById('res_var').innerText = rndUp(c + 1000).toLocaleString('pt-BR',{style:'currency', currency:'BRL'});
        }

        function sugger(t) {
            const box = document.getElementById('sugBox');
            if(!t || t.length < 2) { box.classList.add('hidden'); render(); return; }
            const matches = prods.filter(p => p.nome.includes(t.toUpperCase())).slice(0, 5);
            box.innerHTML = matches.map(m => `<div class="suggestion-item" onclick="selSug('${m.nome}')">${m.nome}</div>`).join('');
            box.classList.remove('hidden');
            render();
        }

        function selSug(n) { document.getElementById('q').value = n; document.getElementById('sugBox').classList.add('hidden'); render(); }

        function render() {
            const q = document.getElementById('q').value.toUpperCase(), m = document.getElementById('fMod').value, cp = document.getElementById('fCap').value, cn = document.getElementById('fCond').value;
            const res = todas.filter(o => {
                const matchQ = !q || o.variacoes.produtos_mestre.nome.includes(q) || o.variacoes.cor.includes(q);
                return matchQ && (!m || o.variacoes.produtos_mestre.nome === m) && (!cp || o.variacoes.capacidade === cp) && (!cn || (cn === 'Novo' ? o.condicao === 'Novo' : o.condicao !== 'Novo'));
            });

            document.getElementById('grid').innerHTML = res.map(o => {
                const p = o.moeda === 'BRL' ? o.preco : (o.preco * (rate + 0.07) * 1.06);
                const final = rnd10(p);
                return `
                <div class="apple-card flex flex-col">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="tag-status ${o.condicao==='Novo'?'bg-green-500':'bg-yellow-500'} text-black uppercase">${o.condicao}</span>
                            <h2 class="font-black text-sm mt-1 italic">${o.variacoes.produtos_mestre.nome}</h2>
                            <p class="text-[9px] text-gray-500 font-black">${o.regioes.bandeira} ${o.variacoes.capacidade}</p>
                        </div>
                        <div class="text-right">
                            <div class="color-dot" style="background:${getHex(o.variacoes.cor)}"></div>
                            <p class="text-[7px] text-gray-500 font-bold mt-1">${o.variacoes.cor}</p>
                        </div>
                    </div>
                    <div class="bg-black/40 p-3 rounded-xl mb-4 border border-white/5">
                        <p class="text-[8px] text-gray-500 font-black uppercase">PREÇO ATACADO VIP</p>
                        <p class="price-tag">R$ ${final.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p>
                        <p class="text-[7px] text-gray-600 font-bold uppercase">${o.moeda==='USD' ? '* CONVERSÃO TAXA VIP + ENVIO' : 'VALOR FINAL EM BRL'}</p>
                    </div>
                    <div class="flex flex-wrap gap-1 mb-4">
                        ${o.aceita_pix?'<span class="mini-tag active">PIX</span>':''}
                        ${o.aceita_usdt?'<span class="mini-tag active">USDT</span>':''}
                        ${o.emite_nota?'<span class="mini-tag active">NF</span>':''}
                        ${o.faz_envio?'<span class="mini-tag active">ENVIO</span>':''}
                        ${o.aceita_coleta?'<span class="mini-tag active">COLETA</span>':''}
                    </div>
                    <div class="mt-auto flex justify-between items-center border-t border-white/5 pt-3">
                        <div>
                            <p class="text-[7px] text-gray-500 font-black uppercase">LOJISTA</p>
                            <p class="text-[9px] font-black truncate max-w-[110px]">${o.fornecedores.nome} ${o.fornecedores.verificado?'✅':''}</p>
                        </div>
                        <a href="https://wa.me/${o.fornecedores.whatsapp.replace(/\D/g,'')}?text=VIM%20PELO%20IFIPE%20TENHO%20INTERESSE%20NO%20${o.variacoes.produtos_mestre.nome.toUpperCase()}" target="_blank" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-[9px] font-black">CHAMAR</a>
                    </div>
                </div>`;
            }).join('');
        }

        async function abrirFipe() {
            document.getElementById('modalFipe').classList.remove('hidden');
            const div = document.getElementById('fipeContent'); div.innerHTML = '<p class="text-center py-6 text-[10px]">CALCULANDO MÉDIAS...</p>';
            const mods = [...new Set(todas.map(o => o.variacoes.produtos_mestre.nome))];
            div.innerHTML = mods.map(m => {
                const ofs = todas.filter(o => o.variacoes.produtos_mestre.nome === m);
                const media = ofs.reduce((a, b) => a + (b.moeda === 'BRL' ? b.preco : b.preco * (rate+0.07) * 1.06), 0) / ofs.length;
                return `<div class="bg-white/5 p-3 rounded-xl flex justify-between items-center"><span class="text-[10px] font-black">${m}</span><span class="text-blue-400 font-mono font-bold">R$ ${rnd10(media).toLocaleString('pt-BR')}</span></div>`;
            }).join('');
        }

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
        window.onscroll = () => document.getElementById('btnSubir').classList.toggle('show', window.scrollY > 300);
        window.onload = init;
    </script>
</body>
</html>
