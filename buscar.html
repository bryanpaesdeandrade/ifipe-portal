<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Buscar Ofertas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #000; color: #fff; font-family: system-ui; margin: 0; }
        .error-box { background: #330000; border: 1px solid #ff0000; color: #ff8888; padding: 20px; margin: 20px; border-radius: 10px; }
        .loading { text-align: center; padding: 50px; color: #0071e3; }
    </style>
</head>
<body>
    <div id="loading" class="loading">
        <h2 class="text-2xl">Carregando iFipe...</h2>
    </div>

    <div id="error" class="error-box hidden">
        <h3 class="text-xl mb-2">❌ Erro ao carregar</h3>
        <p id="errorMessage"></p>
    </div>

    <div id="mainContent" class="hidden">
        <!-- Seu conteúdo aparecerá aqui -->
        <nav class="bg-[#1c1c1e] p-4">Navbar teste</nav>
        <main class="p-4">Conteúdo principal</main>
    </div>

    <script>
        // === CONFIGURAÇÃO ===
        const SUPABASE_URL = 'https://zmgosywpwidypxyhxkry.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M';
        
        const _s = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // === FUNÇÃO PARA MOSTRAR ERRO ===
        function showError(msg) {
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('error').classList.remove('hidden');
            document.getElementById('errorMessage').innerText = msg;
        }

        // === INICIALIZAÇÃO ===
        window.onload = async () => {
            try {
                // 1. Verifica login
                const token = localStorage.getItem('iFipe_Token');
                const masterAuth = localStorage.getItem('iFipe_Master_Auth');

                if (!token && masterAuth !== 'gov_absoluto') {
                    window.location.replace('index.html');
                    return;
                }

                // 2. Carrega dados básicos (teste de conexão)
                const { error } = await _s.from('clientes_buscador').select('count', { count: 'exact', head: true });
                if (error) throw new Error('Erro ao conectar com Supabase: ' + error.message);

                // 3. Se tudo OK, mostra o conteúdo
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('mainContent').classList.remove('hidden');

                // Aqui você pode inserir o conteúdo completo do BUSCAR
                // Por enquanto, apenas um placeholder
                document.getElementById('mainContent').innerHTML = `
                    <div class="text-center p-10">
                        <h1 class="text-3xl text-[#0071e3]">BUSCAR funcionando!</h1>
                        <p class="mt-4">Agora podemos colocar o layout completo.</p>
                    </div>
                `;

            } catch (err) {
                console.error(err);
                showError(err.toString());
            }
        };
    </script>
</body>
</html>
