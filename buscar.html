<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IFIPE - O BUSCADOR VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000000; --card: #1c1c1e; --text: #ffffff; --border: #38383a; --blue: #0071e3; }
        body { background: var(--bg); color: var(--text); font-family:-apple-system, sans-serif; margin:0; text-transform: uppercase; }
        .apple-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 1.5rem; transition: 0.3s; }
        .apple-input { background: #2c2c2e; border: 1px solid var(--border); border-radius: 12px; padding: 12px; width: 100%; color: var(--text); outline: none; font-size: 12px; text-transform: uppercase; }
        .apple-input:focus { border-color: var(--blue); }
        
        /* Bolinhas de Cores Reais */
        .color-dot { width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.4); display: inline-block; box-shadow: 0 0 8px rgba(0,0,0,0.8); }
        
        .price-tag { font-family: 'JetBrains Mono', monospace; font-weight: 800; color: #32d74b; font-size: 1.3rem; }
        .badge { font-size: 9px; font-weight: 900; padding: 4px 10px; border-radius: 6px; }
        .badge-novo { background: #32d74b; color: #000; }
        .badge-semi { background: #f59e0b; color: #000; }

        #btnSubir { position: fixed; bottom: 20px; right: 20px; background: var(--blue); color: #fff; font-weight: 900; font-size: 10px; padding: 12px 18px; border-radius: 50px; cursor: pointer; z-index: 1000; opacity: 0; pointer-events: none; transition: 0.3s; border: none; }
        #btnSubir.show { opacity: 1; pointer-events: auto; }
        
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 10px; }
        .hidden { display: none !important; }
    </style>
</head>
<body class="p-4 md:p-6">

    <button id="btnSubir" onclick="window.scrollTo({top:0, behavior:'smooth'})">⬆️ SUBIR</button>

    <header class="max-w-[1400px] mx-auto bg-black border-b border-[#38383a] p-4 mb-8 flex flex-col lg:row justify-between items-center gap-6 rounded-2xl">
        <div class="flex items-center gap-4">
            <h1 class="text-3xl font-black italic">IFIPE <span class="text-blue-500">VIP</span></h1>
            <p class="text-[10px] text-gray-500 font-black tracking-widest hidden sm:block">O ORÁCULO DAS IMPORTAÇÕES</p>
        </div>

        <div class="flex flex-wrap items-center justify-center gap-4">
            <div class="text-right">
                <p class="text-[7px] text-gray-500 font-black">ÍNDICE BINANCE REAL</p>
                <p id="tickerBinance" class="text-sm font-mono font-black text-yellow-400">R$ --</p>
            </div>
            <a href="https://wa.me/15616760652?text=Oráculo%20venho%20através%20do%20iFipe%20e%20quero%20comprar%20USDT" target="_blank" class="bg-green-900/30 text-green-400 px-5 py-2.5 rounded-xl border border-green-500/50 font-black text-[10px] hover:bg-green-900/50 transition flex items-center gap-3">
                COMPRAR USDT COM ORÁCULO <span id="tVip" class="text-sm font-mono">R$ --</span>
            </a>
            <button onclick="logout()" class="text-[10px] text-red-500 font-black border border-red-500/20 px-4 py-2 rounded-full hover:bg-red-500/10 transition">Sair</button>
        </div>
    </header>

    <main class="max-w-[1400px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-3 space-y-6">
            
            <div class="apple-card">
                <h3 class="text-xs font-black text-blue-500 mb-6 italic">FILTRAR BUSCADOR</h3>
                <div class="space-y-4">
                    <div>
                        <label class="text-[9px] font-black text-gray-500 ml-1">MODELO IPHONE</label>
                        <select id="fMod" class="apple-input" onchange="filtrar()">
                            <option value="">TODOS OS MODELOS</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <div>
                            <label class="text-[9px] font-black text-gray-500 ml-1">MEMÓRIA</label>
                            <select id="fCap" class="apple-input" onchange="filtrar()">
                                <option value="">TODAS</option>
                                <option value="64GB">64GB</option><option value="128GB">128GB</option><option value="256GB">256GB</option><option value="512GB">512GB</option><option value="1TB">1TB</option>
                            </select>
                        </div>
                        <div>
                            <label class="text-[9px] font-black text-gray-500 ml-1">CONDIÇÃO</label>
                            <select id="fCond" class="apple-input" onchange="filtrar()">
                                <option value="">TODAS</option><option value="Novo">NOVO</option><option value="Seminovo">SEMINOVO</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="apple-card border-green-600/30 bg-green-600/5">
                <h3 class="text-[10px] font-black text-green-500 italic mb-4">CALCULADORA VIP PARA IPHONE</h3>
                <div class="space-y-3">
                    <input type="number" id="calc_usd" class="apple-input font-mono text-center font-bold !bg-black" placeholder="CUSTO NO PY (US$)" oninput="execCalc()">
                    <div class="bg-black p-3 rounded-xl border border-[#38383a] text-center">
                        <span class="text-[8px] text-gray-400 block mb-1 font-bold">CUSTO ENTREGUE NO BRASIL</span>
                        <span id="res_custo" class="text-xl font-mono font-black text-[#32d74b]">R$ 0,00</span>
                    </div>
                    <div class="bg-[#1c1c1e] p-3 rounded-xl border border-[#38383a] space-y-2">
                        <span class="text-[8px] font-black text-gray-500 block text-center mb-1 border-b border-[#38383a] pb-1">SUGESTÃO DE VENDA</span>
                        <div class="flex justify-between items-center"><span class="text-[8px] text-gray-400 font-bold">ALTO ATACADO</span><span id="res_alto" class="text-[11px] font-mono font-black text-white">R$ 0,00</span></div>
                        <div class="flex justify-between items-center"><span class="text-[8px] text-gray-400 font-bold">ATACADO</span><span id="res_atacado" class="text-[11px] font-mono font-black text-yellow-400">R$ 0,00</span></div>
                        <div class="flex justify-between items-center"><span class="text-[8px] text-gray-400 font-bold">ATACAREJO</span><span id="res_atacarejo" class="text-[11px] font-mono font-black text-orange-400">R$ 0,00</span></div>
                        <div class="flex justify-between items-center"><span class="text-[8px] text-gray-400 font-bold">VAREJO</span><span id="res_varejo" class="text-[11px] font-mono font-black text-blue-400">R$ 0,00</span></div>
                    </div>
                </div>
            </div>

        </div>

        <div class="lg:col-span-9">
            <div id="gridResultados" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">
                </div>
        </div>

    </main>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let todasOfertas = [], taxaVip = 0;

        const getHex = c => {
            let s = (c||'').toUpperCase();
            if(s.includes('PRETO')||s.includes('BLACK')||s.includes('MEIA-NOITE')||s.includes('GRAFITE')) return '#191919';
            if(s.includes('BRANCO')||s.includes('WHITE')||s.includes('ESTELAR')||s.includes('TITÂNIO BRANCO')) return '#f5f5f7';
            if(s.includes('AZUL')||s.includes('SIERRA')||s.includes('PACÍFICO')) return '#215e7c';
            if(s.includes('VERDE')||s.includes('ALPINO')) return '#505c4c';
            if(s.includes('NATURAL')||s.includes('TITÂNIO NATURAL')) return '#8c8c88';
            if(s.includes('DESERTO')||s.includes('DOURADO')||s.includes('GOLD')) return '#ccb390';
            if(s.includes('ROSA')||s.includes('PINK')) return '#e6c7c2';
            if(s.includes('ROXO')||s.includes('PURPLE')) return '#5c5b57';
            if(s.includes('PRATEADO')||s.includes('SILVER')) return '#e3e4e5';
            return '#808080';
        };

        async function init() {
            if(!localStorage.getItem('iFipe_Role')) return window.location.href = 'index.html';

            new WebSocket('wss://stream.binance.com:9443/ws/usdtbrl@ticker').onmessage = e => {
                let b = parseFloat(JSON.parse(e.data).c); taxaVip = b + 0.06;
                document.getElementById('tickerBinance').innerText = `R$ ${b.toFixed(4)}`;
                document.getElementById('tVip').innerText = `R$ ${taxaVip.toFixed(4)}`;
                execCalc();
            };

            const [p, o] = await Promise.all([
                _s.from('produtos_mestre').select('*').order('nome'),
                _s.from('ofertas').select('*, variacoes(capacidade, cor, produtos_mestre(nome)), fornecedores(nome, verificado, whatsapp), regioes(bandeira)').eq('status_aprovacao', 'aprovado').order('preco', {ascending: true})
            ]);

            document.getElementById('fMod').innerHTML += p.data.map(x=>`<option value="${x.nome}">${x.nome}</option>`).join('');
            todasOfertas = o.data || [];
            filtrar();
        }

        function filtrar() {
            const m = document.getElementById('fMod').value, cp = document.getElementById('fCap').value, cn = document.getElementById('fCond').value;
            const res = todasOfertas.filter(o => {
                return (!m || o.variacoes.produtos_mestre.nome === m) && 
                       (!cp || o.variacoes.capacidade === cp) &&
                       (!cn || (cn === 'Novo' ? o.condicao === 'Novo' : o.condicao !== 'Novo'));
            });

            document.getElementById('gridResultados').innerHTML = res.map(o => {
                const finalP = o.moeda === 'BRL' ? o.preco : (o.preco * taxaVip * 1.06);
                const rndP = Math.round(finalP / 10) * 10;
                
                return `
                <div class="apple-card hover:border-blue-500/50 transition cursor-default">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="badge ${o.condicao === 'Novo' ? 'badge-novo' : 'badge-semi'}">${o.condicao}</span>
                            <h2 class="font-black text-sm mt-2 italic">${o.variacoes.produtos_mestre.nome}</h2>
                            <p class="text-[10px] text-gray-500 font-bold">${o.regioes.bandeira} ${o.variacoes.capacidade}</p>
                        </div>
                        <div class="text-right">
                            <div class="color-dot" style="background:${getHex(o.variacoes.cor)}"></div>
                            <p class="text-[7px] text-gray-500 font-bold mt-1">${o.variacoes.cor}</p>
                        </div>
                    </div>

                    <div class="bg-black p-3 rounded-xl mb-4 border border-white/5">
                        <p class="text-[8px] text-gray-500 font-bold">PREÇO ATACADO</p>
                        <p class="price-tag">R$ ${rndP.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p>
                        <p class="text-[7px] text-gray-600 font-bold">${o.moeda === 'USD' ? '* CONVERSÃO TAXA VIP + ENVIO' : 'VALOR FINAL EM BRL'}</p>
                    </div>

                    <div class="flex justify-between items-center">
                        <div class="max-w-[120px]">
                            <p class="text-[7px] text-gray-500 font-bold">LOJISTA</p>
                            <p class="text-[10px] font-black truncate">${o.fornecedores.nome} ${o.fornecedores.verificado ? '✅' : ''}</p>
                        </div>
                        <a href="https://wa.me/${o.fornecedores.whatsapp.replace(/\D/g,'')}?text=VIM%20PELO%20IFIPE%20E%20TENHO%20INTERESSE%20NO%20${o.variacoes.produtos_mestre.nome}%20${o.variacoes.capacidade}" target="_blank" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-[9px] font-black hover:bg-blue-500 transition">CHAMAR</a>
                    </div>
                    
                    ${o.condicao !== 'Novo' ? `
                    <div class="mt-3 pt-3 border-t border-white/5 flex gap-4">
                         <div><p class="text-[7px] text-gray-600 font-bold uppercase">BATERIA</p><p class="text-[9px] font-black text-blue-400">${o.saude_bateria || '--'}</p></div>
                         <div><p class="text-[7px] text-gray-600 font-bold uppercase">GARANTIA</p><p class="text-[9px] font-black text-blue-400">${o.garantia || '--'}</p></div>
                    </div>` : ''}
                </div>`;
            }).join('');
        }

        function execCalc() {
            const u = parseFloat(document.getElementById('calc_usd').value);
            if(!u || !taxaVip) return;
            const custo = (u * taxaVip) * 1.06;
            const rnd = v => Math.round(v / 10) * 10;
            const rndUp = v => Math.ceil(v / 10) * 10;

            document.getElementById('res_custo').innerText = custo.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
            document.getElementById('res_alto').innerText = rndUp(custo + 200).toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
            document.getElementById('res_atacado').innerText = rndUp(custo + 350).toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
            document.getElementById('res_atacarejo').innerText = rndUp(custo + 500).toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
            document.getElementById('res_varejo').innerText = rndUp(custo + 1000).toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
        }

        window.onscroll = () => document.getElementById('btnSubir').classList.toggle('show', window.scrollY > 300);
        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
        window.onload = init;
    </script>
</body>
</html>
