<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Buscador VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #38383a; --input: #2c2c2e; }
        body.light-mode { --bg: #f5f5f7; --card: #fff; --text: #1d1d1f; --border: #d2d2d7; --input: #e8e8ed; }
        body { background: var(--bg); color: var(--text); font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin:0; transition: 0.3s; }
        
        .nav-bar { background:rgba(28, 28, 30, 0.8); backdrop-filter:blur(15px); border-bottom:1px solid var(--border); padding:15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:100; }
        .filter-bar { background: var(--card); padding:15px; border-radius:16px; margin-top:20px; border:1px solid var(--border); }
        .apple-input { background: var(--input); border: 1px solid var(--border); border-radius: 10px; padding: 10px; width: 100%; color: var(--text); outline: none; font-size: 12px; text-align: center; }
        
        .product-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 15px; transition: 0.3s; position: relative; display: flex; flex-direction: column; }
        .product-card:hover { border-color: #0071e3; transform: translateY(-4px); }
        
        .tag-status { font-size: 8px; font-weight: 900; text-transform: uppercase; padding: 4px 8px; border-radius: 50px; letter-spacing: 0.05em; display: inline-block; margin-bottom: 3px; }
        .tag-menor { background: #ff3b30; color: #fff; }
        .tag-estoque { background: #ffcc00; color: #000; }
        
        .mini-tag { font-size: 8px; font-weight: 900; text-transform: uppercase; padding: 4px 6px; border-radius: 6px; background: var(--input); color: #86868b; border: 1px solid var(--border); display: inline-flex; align-items: center; justify-content: center; }
        .mini-tag.active { color: #32d74b; border-color: #32d74b; }
        .mini-tag.bat { color: #32d74b; border-color: #32d74b; background: rgba(50, 215, 75, 0.1); }
        .mini-tag.negocia { color: #5e5ce6; border-color: #5e5ce6; background: rgba(94, 92, 230, 0.1); }
        
        .price-text { font-size: 26px; font-weight: 900; color: var(--text); letter-spacing: -0.05em; }
        .buy-button { background: #0071e3; color: #fff; font-weight: 900; border-radius: 50px; padding: 12px; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 11px; text-align: center; display: block; text-decoration: none; margin-top: 12px; transition: 0.3s; }
        .buy-button:hover { background: #005bb5; }

        /* BOTOES FLUTUANTES */
        .btn-wpp-float { position: fixed; bottom: 20px; right: 20px; background-color: #25d366; color: #fff; width: 60px; height: 60px; border-radius: 50px; display: flex; align-items: center; justify-content: center; text-decoration: none; box-shadow: 0 5px 20px rgba(37,211,102,0.4); z-index: 1000; transition: width 0.3s ease; overflow: hidden; white-space: nowrap; }
        .wpp-text { font-size: 12px; font-weight: 900; text-transform: uppercase; margin-left: 10px; opacity: 0; transition: 0.3s; }
        .btn-wpp-float:hover { width: 170px; padding-left: 18px; justify-content: flex-start; }
        .btn-wpp-float:hover .wpp-text { opacity: 1; }

        .btn-calc-float { position: fixed; bottom: 20px; left: 20px; background-color: #0071e3; color: #fff; width: 60px; height: 60px; border-radius: 50px; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 20px rgba(0,113,227,0.4); z-index: 1000; transition: width 0.3s ease; overflow: hidden; white-space: nowrap; border: none; cursor: pointer; }
        .calc-text { font-size: 12px; font-weight: 900; text-transform: uppercase; margin-left: 10px; opacity: 0; transition: 0.3s; }
        .btn-calc-float:hover { width: 170px; padding-left: 18px; justify-content: flex-start; }
        .btn-calc-float:hover .calc-text { opacity: 1; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="contaModal" class="hidden fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-[500] px-4">
        <div class="bg-[#1c1c1e] border border-[#38383a] rounded-2xl w-full max-w-[400px] p-8">
            <h3 class="font-bold text-[14px] text-blue-500 mb-4 uppercase tracking-widest">Minha Conta VIP</h3>
            <form onsubmit="salvarConta(event)">
                <label class="block text-[10px] text-gray-400 uppercase font-black mb-1">WhatsApp</label>
                <input type="text" id="conta_whats" class="apple-input" required>
                <label class="block text-[10px] text-gray-400 uppercase font-black mb-1 mt-3">Nova Senha</label>
                <input type="password" id="conta_senha" class="apple-input">
                <div class="flex gap-2 mt-6">
                    <button type="button" onclick="fecharConta()" class="bg-gray-600 text-white font-black uppercase text-[11px] rounded-full py-3 w-1/3">Voltar</button>
                    <button type="submit" class="bg-blue-600 text-white font-black uppercase text-[11px] rounded-full py-3 w-2/3">Atualizar</button>
                </div>
            </form>
        </div>
    </div>

    <div id="calcModal" class="hidden fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-[2000] px-4">
        <div class="w-full max-w-[380px] bg-[#1c1c1e] border-2 border-[#38383a] rounded-3xl p-6 text-white text-center">
            <button onclick="fecharCalc()" class="absolute top-4 right-5 text-gray-500 text-2xl font-bold">×</button>
            <h2 class="text-lg font-black italic mb-4 uppercase">Calculadora VIP</h2>
            <div id="calcResult" class="font-mono text-3xl font-black text-[#0071e3] mb-4">R$ 0,00</div>
            <input type="number" id="calcUsd" class="w-full bg-[#151516] border-2 border-[#38383a] rounded-xl py-4 text-center font-mono text-xl" placeholder="VALOR EM $" oninput="calcularImportacao()">
        </div>
    </div>

    <nav class="nav-bar">
        <h1 class="text-2xl font-black italic">iFipe</h1>
        <div class="flex gap-4">
            <button onclick="abrirConta()" class="text-blue-400 font-black text-[10px] uppercase">Conta</button>
            <button onclick="logout()" class="text-red-500 font-black text-[10px] uppercase">Sair</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 pb-20">
        <div class="filter-bar grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-3 mb-6">
            <div><label class="text-[8px] font-black text-blue-500">CATEGORIA</label>
                <select id="f_cat" class="apple-input" onchange="popularModelos()">
                    <option value="">Todas</option>
                    <option value="1">IPHONE</option><option value="2">WATCH</option><option value="3">IPAD</option>
                    <option value="4">MACBOOK</option><option value="7">XIAOMI</option>
                </select>
            </div>
            <div><label class="text-[8px] font-black">MODELO</label><select id="f_prod" class="apple-input" onchange="carregarDados()"><option value="">Todos</option></select></div>
        </div>

        <div id="gridGeral" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
    </main>

    <button onclick="abrirCalc()" class="btn-calc-float"><span class="calc-text">CALCULADORA VIP</span></button>
    <a href="https://wa.me/556896003049?text=Suporte" target="_blank" class="btn-wpp-float"><span class="wpp-text">SUPORTE IFIPE</span></a>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let ofertasAtuais = []; let produtosMestre = []; let clienteLogado = null;

        window.onload = async () => {
            const token = localStorage.getItem('iFipe_Token');
            if(token) {
                const { data } = await _s.from('clientes_buscador').select('*').eq('id', token).single();
                if(data) { 
                    clienteLogado = data; 
                    const resP = await _s.from('produtos_mestre').select('*').order('nome');
                    produtosMestre = resP.data;
                    carregarDados(); 
                }
            } else { window.location.replace('index.html'); }
        };

        function popularModelos() {
            const cat = document.getElementById('f_cat').value;
            const filtrados = cat ? produtosMestre.filter(x => x.grupo_id == cat) : produtosMestre;
            document.getElementById('f_prod').innerHTML = '<option value="">Todos</option>' + filtrados.map(x => `<option value="${x.id}">${x.nome}</option>`).join('');
            carregarDados();
        }

        async function carregarDados() {
            const pid = document.getElementById('f_prod').value;
            let query = _s.from('ofertas').select('*, fornecedores(*), variacoes(*, produtos_mestre(*))').gt('quantidade', 0);
            if(pid) query = query.eq('variacoes.produto_id', pid);
            const { data } = await query;
            ofertasAtuais = data || [];
            renderizarRanking();
        }

        function renderizarRanking() {
            document.getElementById('gridGeral').innerHTML = ofertasAtuais.map(o => {
                const moeda = o.moeda === 'USD' ? '$' : 'R$';
                const batTag = o.saude_bateria ? `<span class="mini-tag bat">🔋 ${o.saude_bateria}</span>` : '';
                const proTag = o.aceita_proposta ? `<span class="mini-tag negocia">🤝 NEGOCIA QTD</span>` : '';
                const det = [o.variacoes.capacidade, o.variacoes.cor, o.condicao].filter(Boolean).join(' | ');

                return `
                <div class="product-card">
                    <h2 class="text-lg font-black">${o.variacoes.produtos_mestre.nome}</h2>
                    <p class="text-[10px] text-gray-400 uppercase font-bold mb-2">${det}</p>
                    <div class="flex flex-wrap gap-1.5 mb-4">${batTag} ${proTag}</div>
                    <div class="mt-auto pt-3 border-t border-[#38383a]">
                        <p class="text-[9px] text-blue-400 font-black uppercase">LOJA: ${o.fornecedores.nome} ${o.fornecedores.verificado ? '✔️' : ''}</p>
                        <div class="price-text mt-1">${moeda} ${o.preco.toLocaleString('pt-BR')}</div>
                        <a href="https://wa.me/${o.fornecedores.whatsapp.replace(/\D/g,'')}" target="_blank" class="buy-button">WhatsApp</a>
                    </div>
                </div>`;
            }).join('');
        }

        async function salvarConta(e) {
            e.preventDefault();
            let up = { whatsapp: document.getElementById('conta_whats').value };
            if(document.getElementById('conta_senha').value) up.senha = document.getElementById('conta_senha').value;
            const { error } = await _s.from('clientes_buscador').update(up).eq('id', clienteLogado.id);
            if(!error) { alert("Dados Atualizados!"); fecharConta(); }
        }

        function abrirConta() { document.getElementById('contaModal').classList.remove('hidden'); document.getElementById('conta_whats').value = clienteLogado.whatsapp; }
        function fecharConta() { document.getElementById('contaModal').classList.add('hidden'); }
        function abrirCalc() { document.getElementById('calcModal').classList.remove('hidden'); }
        function fecharCalc() { document.getElementById('calcModal').classList.add('hidden'); }
        function logout() { localStorage.removeItem('iFipe_Token'); window.location.replace('index.html'); }
    </script>
</body>
</html>
