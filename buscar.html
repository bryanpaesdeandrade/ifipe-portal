<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Buscador VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background:#000; color:#fff; font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin:0; }
        
        /* ALINHAMENTO SIMÉTRICO DA BARRA DO TOPO */
        .nav-bar { background:rgba(28,28,30,0.8); backdrop-filter:blur(15px); border-bottom:1px solid #38383a; padding:15px 30px; position:sticky; top:0; z-index:100; display: flex; flex-direction: column; gap: 10px; align-items: center; text-align: center; }
        @media (min-width: 768px) {
            .nav-bar { flex-direction: row; justify-content: space-between; text-align: left; }
            .nav-left, .nav-right { width: 30%; }
            .nav-center { width: 40%; display: flex; justify-content: center; }
            .nav-right { display: flex; justify-content: flex-end; }
        }

        .filter-bar { background:#1c1c1e; padding:15px; border-radius:16px; margin-top:20px; border:1px solid #38383a; }
        
        /* ALINHAMENTO DOS FILTROS (ESQUADRO) */
        .filter-item { display: flex; flex-direction: column; justify-content: flex-end; }
        label { display:block; text-transform:uppercase; font-size:8px; color:#86868b; margin-bottom:6px; font-weight:900; text-align:center; letter-spacing: 0.1em;}
        .apple-input { background:#2c2c2e; border:1px solid #38383a; border-radius:10px; padding:10px; width:100%; color:white; outline:none; font-size:12px; text-align:center; text-align-last:center; }
        
        .product-card { background:#1c1c1e; border:1px solid #38383a; border-radius:16px; padding:15px; transition:0.3s; position:relative; overflow:hidden; }
        .product-card:hover { border-color:#0071e3; transform:translateY(-4px); }
        .tag-status { font-size:8px; font-weight:900; text-transform:uppercase; padding:4px 8px; border-radius:50px; letter-spacing:0.05em; display:inline-block; margin-bottom: 3px; }
        .tag-menor { background:#ff3b30; color:#fff; }
        .tag-poucas { background:#ffcc00; color:#000; }
        .tag-muitas { background:#0071e3; color:#fff; }
        .tag-disponivel { background:#38383a; color:#fff; }
        .tag-garantia { background:rgba(255, 204, 0, 0.2); color:#ffcc00; border: 1px solid #ffcc00; }
        .tag-bateria { background:rgba(50, 215, 75, 0.2); color:#32d74b; border: 1px solid #32d74b; }
        .price-text { font-size:26px; font-weight:900; color:#fff; letter-spacing:-0.05em; }
        .buy-button { background:#0071e3; color:#fff; font-weight:900; border-radius:50px; padding:10px; width:100%; cursor:pointer; text-transform:uppercase; font-size:11px; transition:0.3s; margin-top:12px; display:block; text-align:center; text-decoration:none; }
        .buy-button:hover { background:#32d74b; color:#000; }
        .ticker-link { color:#ffcc00; font-size:11px; font-weight:900; text-transform:uppercase; text-decoration:none; letter-spacing:0.1em; transition: 0.3s; display: block; margin-bottom: 4px; text-align: center;}
        @media (min-width: 768px) { .ticker-link { display: inline; margin-bottom: 0; margin-right: 10px;} }
        .ticker-link:hover { color: #fff; }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <div class="nav-left">
            <h1 class="text-2xl font-black italic m-0">iFipe</h1>
        </div>
        
        <div class="nav-center">
            <div class="bg-[#1c1c1e] p-2 rounded-lg text-center w-full md:w-auto">
                <a href="https://wa.me/+15616760652" target="_blank" class="ticker-link">COMPRAR USDT COM ORÁCULO</a>
                <span class="text-[12px] md:text-[14px] font-black text-[#32d74b] monospace" id="ticker">$ --</span>
            </div>
        </div>

        <div class="nav-right">
            <button onclick="logout()" class="text-red-500 font-black uppercase text-[10px] tracking-widest hover:text-white transition-colors mt-2 md:mt-0">Sair do Buscador</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 pb-20">
        <div class="filter-bar grid grid-cols-2 md:grid-cols-7 gap-3">
            <div class="filter-item"><label>Aparelho</label><select id="f_produto" class="apple-input" onchange="atualizarFiltrosCascata()"><option value="">Todos</option></select></div>
            <div class="filter-item">
                <label>Condição</label>
                <select id="f_condicao" class="apple-input" onchange="renderizarRanking()">
                    <option value="">Todas</option>
                    <option value="Novo">Novo</option>
                    <option value="Seminovo">Seminovo</option>
                    <option value="CPO">CPO</option>
                    <option value="Apple As Is">Apple As Is</option>
                    <option value="Apple As Is+">Apple As Is+</option>
                    <option value="GRADE A">GRADE A</option>
                    <option value="GRADE B">GRADE B</option>
                    <option value="GRADE C">GRADE C</option>
                </select>
            </div>
            <div class="filter-item"><label>Memória/Tam</label><select id="f_capacidade" class="apple-input" onchange="renderizarRanking()"><option value="">Todas</option></select></div>
            <div class="filter-item"><label>Cor</label><select id="f_cor" class="apple-input" onchange="renderizarRanking()"><option value="">Todas</option></select></div>
            <div class="filter-item"><label>Região</label><select id="f_regiao" class="apple-input" onchange="renderizarRanking()"><option value="">Todas</option></select></div>
            <div class="filter-item"><label>Atacadista</label><select id="f_lojista" class="apple-input" onchange="renderizarRanking()"><option value="">Todos</option></select></div>
            <div class="filter-item"><label>Cidade</label><select id="f_cidade_lojista" class="apple-input" onchange="renderizarRanking()"><option value="">Todas</option></select></div>
        </div>
        <div id="rankingGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 mt-8"></div>
    </main>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let ofertasAtuais = [];
        let gradeVariacoes = [];

        async function init() {
            const socket = new WebSocket('wss://stream.binance.com:9443/ws/usdtbrl@ticker');
            socket.onmessage = (e) => { document.getElementById('ticker').innerText = `$ ${parseFloat(JSON.parse(e.data).c).toFixed(4).replace('.',',')}`; };
            const [p, v, r, f] = await Promise.all([
                _s.from('produtos_mestre').select('id, nome').order('nome'),
                _s.from('variacoes').select('*'), 
                _s.from('regioes').select('id, nome, bandeira'),
                _s.from('fornecedores').select('id, nome, verificado, cidade').eq('ativo', true).order('nome')
            ]);
            gradeVariacoes = v.data;
            document.getElementById('f_produto').innerHTML += p.data.map(x => `<option value="${x.id}">${x.nome}</option>`).join('');
            document.getElementById('f_regiao').innerHTML += r.data.map(x => `<option value="${x.id}">${x.bandeira} ${x.nome}</option>`).join('');
            document.getElementById('f_lojista').innerHTML += f.data.map(x => `<option value="${x.id}">${x.nome} ${x.verificado ? '[✔️ VERIFICADO]' : ''}</option>`).join('');
            const cidades = [...new Set(f.data.map(x => x.cidade).filter(Boolean))].sort();
            document.getElementById('f_cidade_lojista').innerHTML += cidades.map(c => `<option value="${c}">${c}</option>`).join('');
            carregarDados(); setInterval(carregarDados, 5000);
        }

        async function carregarDados() {
            const { data } = await _s.from('ofertas').select('*, fornecedores(id, nome, whatsapp, verificado, cidade), variacoes(tamanho, capacidade, cor, produtos_mestre(id, nome)), regioes(nome, bandeira)');
            ofertasAtuais = data || []; renderizarRanking();
        }

        function atualizarFiltrosCascata() {
            const pid = document.getElementById('f_produto').value;
            let vars = pid ? gradeVariacoes.filter(x => x.produto_id == pid) : gradeVariacoes;
            const caps = [...new Set(vars.map(x => x.capacidade || x.tamanho).filter(Boolean))];
            const cores = [...new Set(vars.map(x => x.cor).filter(Boolean))];
            document.getElementById('f_capacidade').innerHTML = '<option value="">Todas</option>' + caps.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('f_cor').innerHTML = '<option value="">Todas</option>' + cores.map(c => `<option value="${c}">${c}</option>`).join('');
            renderizarRanking();
        }

        function renderizarRanking() {
            const fP = document.getElementById('f_produto').value;
            const fC = document.getElementById('f_condicao').value;
            const fCap = document.getElementById('f_capacidade').value;
            const fCor = document.getElementById('f_cor').value;
            const fR = document.getElementById('f_regiao').value;
            const fL = document.getElementById('f_lojista').value;
            const fCid = document.getElementById('f_cidade_lojista').value;

            let filtrados = ofertasAtuais.filter(o => (o.quantidade > 0) && (!fP || o.variacoes.produtos_mestre.id == fP) && (!fC || o.condicao == fC) && (!fCap || o.variacoes.capacidade == fCap || o.variacoes.tamanho == fCap) && (!fCor || o.variacoes.cor == fCor) && (!fR || o.regiao_id == fR) && (!fL || o.fornecedores.id == fL) && (!fCid || o.fornecedores.cidade == fCid));

            filtrados.sort((a, b) => {
                if (a.condicao === 'Novo' && b.condicao !== 'Novo') return -1;
                if (b.variacoes.produtos_mestre.id !== a.variacoes.produtos_mestre.id) return b.variacoes.produtos_mestre.id - a.variacoes.produtos_mestre.id;
                return a.preco - b.preco;
            });

            document.getElementById('rankingGrid').innerHTML = filtrados.map(o => {
                const tagB = (o.condicao !== 'Novo' && o.saude_bateria) ? `<span class="tag-status tag-bateria">🔋 BATERIA: ${o.saude_bateria}</span>` : '';
                const tagG = (o.condicao !== 'Novo' && o.garantia) ? `<span class="tag-status tag-garantia">🛡️ GARANTIA: ${o.garantia}</span>` : '';
                const selo = o.fornecedores.verificado ? `<span class="bg-blue-500 text-white rounded px-1 py-0.5 text-[7px] font-black uppercase ml-1">✔️ Verificado</span>` : '';

                return `<div class="product-card">
                    <div class="flex flex-col gap-1 items-start mb-3">
                        <span class="tag-status ${o.quantidade < 5 ? 'tag-poucas' : 'tag-muitas'}">ESTOQUE: ${o.quantidade}</span>
                        ${tagB} ${tagG}
                    </div>
                    <h2 class="text-lg font-black leading-tight">${o.variacoes.produtos_mestre.nome}</h2>
                    <p class="text-[9px] text-gray-400 uppercase font-bold mt-1">${[o.variacoes.tamanho, o.variacoes.capacidade, o.variacoes.cor, o.condicao].filter(Boolean).join(' | ')}</p>
                    <div class="mt-4"><p class="text-[9px] text-blue-500 font-bold flex items-center">ATACADISTA: ${o.fornecedores.nome} ${selo}</p>
                    <div class="price-text">R$ ${o.preco.toLocaleString('pt-BR')}</div></div>
                    <a href="https://wa.me/${o.fornecedores.whatsapp.replace(/\D/g,'')}" target="_blank" class="buy-button">Comprar Agora</a>
                </div>`;
            }).join('');
        }

        function logout() { localStorage.removeItem('iFipe_Token'); window.location.replace('index.html'); }
        init();
    </script>
</body>
</html>
