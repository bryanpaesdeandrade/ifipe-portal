<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Buscador VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #38383a; --input: #2c2c2e; }
        body { background: var(--bg); color: var(--text); font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin:0; transition: 0.3s; }
        .nav-bar { background:rgba(28,28,30,0.8); backdrop-filter:blur(15px); border-bottom:1px solid var(--border); padding:15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:100; }
        .filter-bar { background: var(--card); padding:15px; border-radius:16px; margin-top:20px; border:1px solid var(--border); }
        .apple-input { background: var(--input); border: 1px solid var(--border); border-radius: 10px; padding: 10px; width: 100%; color: var(--text); outline: none; font-size: 12px; text-align: center; }
        .product-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 15px; transition: 0.3s; position: relative; overflow: hidden; }
        .tag-menor { background: #ff3b30; color: #fff; font-size: 8px; font-weight: 900; padding: 4px 8px; border-radius: 50px; text-transform: uppercase; }
        .tag-intl { background: #0071e3; color: #fff; font-size: 8px; font-weight: 900; padding: 4px 8px; border-radius: 50px; text-transform: uppercase; }
        .price-text { font-size: 26px; font-weight: 900; color: var(--text); letter-spacing: -0.05em; }
        .buy-button { background: #0071e3; color: #fff; font-weight: 900; border-radius: 50px; padding: 10px; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 11px; text-align: center; display: block; text-decoration: none; margin-top: 12px; }
        .section-title { font-size: 11px; font-weight: 900; text-transform: uppercase; color: #86868b; margin: 40px 0 15px 5px; display: flex; align-items: center; gap: 10px; }
        .section-title::after { content: ""; height: 1px; background: var(--border); flex-grow: 1; }
    </style>
</head>
<body>
    <nav class="nav-bar">
        <h1 class="text-2xl font-black italic m-0">iFipe</h1>
        <div id="ticker" class="text-[#32d74b] font-black font-mono text-xl">$ --</div>
        <button onclick="logout()" class="text-red-500 font-black uppercase text-[10px]">Sair</button>
    </nav>

    <main class="max-w-7xl mx-auto px-4 pb-20">
        <div class="filter-bar grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-3">
            <select id="f_prod" class="apple-input" onchange="atualizarFiltrosCascata()"><option value="">Aparelho</option></select>
            <select id="f_cond" class="apple-input" onchange="renderizarRanking()"><option value="">Condição</option><option value="Novo">Novo</option><option value="Seminovo">Seminovo</option><option value="CPO">CPO</option></select>
            <select id="f_cap" class="apple-input" onchange="renderizarRanking()"><option value="">Memória</option></select>
            <select id="f_cor" class="apple-input" onchange="renderizarRanking()"><option value="">Cor</option></select>
            <select id="f_reg" class="apple-input" onchange="renderizarRanking()"><option value="">Região</option></select>
            <select id="f_cid" class="apple-input" onchange="renderizarRanking()"><option value="">Cidade</option></select>
        </div>

        <div id="sectionBR" class="hidden"><h3 class="section-title">🇧🇷 RANKING BRASIL (R$)</h3><div id="gridBR" class="grid grid-cols-1 md:grid-cols-3 xl:grid-cols-4 gap-4"></div></div>
        <div id="sectionPY" class="hidden"><h3 class="section-title">🇵🇾 RANKING PARAGUAI ($)</h3><div id="gridPY" class="grid grid-cols-1 md:grid-cols-3 xl:grid-cols-4 gap-4"></div></div>
        <div id="sectionUS" class="hidden"><h3 class="section-title">🇺🇸 RANKING MIAMI ($)</h3><div id="gridUS" class="grid grid-cols-1 md:grid-cols-3 xl:grid-cols-4 gap-4"></div></div>
    </main>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let ofertasAtuais = []; let gradeVariacoes = [];

        async function init() {
            const socket = new WebSocket('wss://stream.binance.com:9443/ws/usdtbrl@ticker');
            socket.onmessage = (e) => { document.getElementById('ticker').innerText = `$ ${parseFloat(JSON.parse(e.data).c).toFixed(4).replace('.',',')}`; };
            const [p, r, v, f] = await Promise.all([_s.from('produtos_mestre').select('*').order('nome'), _s.from('regioes').select('*').order('nome'), _s.from('variacoes').select('*'), _s.from('fornecedores').select('cidade').eq('ativo', true)]);
            gradeVariacoes = v.data;
            document.getElementById('f_prod').innerHTML += p.data.map(x => `<option value="${x.id}">${x.nome}</option>`).join('');
            document.getElementById('f_reg').innerHTML += r.data.map(x => `<option value="${x.id}">${x.bandeira} ${x.nome}</option>`).join('');
            const cidades = [...new Set(f.data.map(x => x.cidade).filter(Boolean))].sort();
            document.getElementById('f_cid').innerHTML += cidades.map(c => `<option value="${c}">${c}</option>`).join('');
            carregarDados(); setInterval(carregarDados, 5000);
        }

        function atualizarFiltrosCascata() {
            const pid = document.getElementById('f_prod').value;
            const vars = pid ? gradeVariacoes.filter(x => x.produto_id == pid) : gradeVariacoes;
            const caps = [...new Set(vars.map(x => x.capacidade).filter(Boolean))];
            const cores = [...new Set(vars.map(x => x.cor).filter(Boolean))];
            document.getElementById('f_cap').innerHTML = '<option value="">Memória</option>' + caps.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('f_cor').innerHTML = '<option value="">Cor</option>' + cores.map(c => `<option value="${c}">${c}</option>`).join('');
            renderizarRanking();
        }

        async function carregarDados() {
            const { data } = await _s.from('ofertas').select('*, fornecedores(*), variacoes(*, produtos_mestre(*)), regioes(*)');
            ofertasAtuais = data || []; renderizarRanking();
        }

        function renderizarRanking() {
            const fP = document.getElementById('f_prod').value;
            const fC = document.getElementById('f_cond').value;
            const fCap = document.getElementById('f_cap').value;
            const fCor = document.getElementById('f_cor').value;
            const fCid = document.getElementById('f_cid').value;

            let filtrados = ofertasAtuais.filter(o => o.quantidade > 0 && (!fP || o.variacoes.produto_id == fP) && (!fC || o.condicao == fC) && (!fCap || o.variacoes.capacidade == fCap) && (!fCor || o.variacoes.cor == fCor) && (!fCid || o.fornecedores.cidade == fCid));

            const criarCard = (o, menor) => {
                let moeda = o.regioes.moeda === 'USD' ? '$' : 'R$';
                let tagMenor = o.preco === menor ? '<span class="tag-status tag-menor">🔥 MENOR PREÇO</span>' : '';
                let tagLoc = o.regioes.moeda === 'USD' ? `<span class="tag-status tag-intl">LOJA EM ${o.regioes.nome.toUpperCase()} ${o.regioes.bandeira}</span>` : '';
                return `<div class="product-card"><div class="flex flex-wrap gap-1 mb-3">${tagMenor} ${tagLoc}</div><h2 class="text-lg font-black">${o.variacoes.produtos_mestre.nome}</h2><p class="text-[9px] text-gray-400 font-bold mt-1">${o.variacoes.capacidade} | ${o.variacoes.cor} | ${o.condicao}</p><div class="mt-4"><p class="text-[9px] text-blue-500 font-bold uppercase">ATACADISTA: ${o.fornecedores.nome}</p><div class="price-text">${moeda} ${o.preco.toLocaleString('pt-BR')}</div></div><a href="https://wa.me/${o.fornecedores.whatsapp.replace(/\D/g,'')}" target="_blank" class="buy-button">Chamar no Whats</a></div>`;
            };

            const processar = (lista, gId, sId) => {
                const sec = document.getElementById(sId); if(lista.length === 0) { sec.classList.add('hidden'); return; } sec.classList.remove('hidden');
                let menores = {}; lista.forEach(o => { let k = `${o.variacao_id}_${o.condicao}`; if(!menores[k] || o.preco < menores[k]) menores[k] = o.preco; });
                lista.sort((a,b) => (a.condicao === 'Novo' ? -1 : 1) || a.preco - b.preco);
                document.getElementById(gId).innerHTML = lista.map(o => criarCard(o, menores[`${o.variacao_id}_${o.condicao}`])).join('');
            };

            processar(filtrados.filter(o => o.regioes.moeda === 'BRL'), 'gridBR', 'sectionBR');
            processar(filtrados.filter(o => o.regioes.nome === 'Ciudad del Este'), 'gridPY', 'sectionPY');
            processar(filtrados.filter(o => o.regioes.nome === 'Miami'), 'gridUS', 'sectionUS');
        }
        function logout() { localStorage.removeItem('iFipe_Token'); window.location.replace('index.html'); }
        init();
    </script>
</body>
</html>
