<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Buscador VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #38383a; --input: #2c2c2e; }
        body.light-mode { --bg: #f5f5f7; --card: #fff; --text: #1d1d1f; --border: #d2d2d7; --input: #e8e8ed; }
        body { background: var(--bg); color: var(--text); font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin:0; transition: 0.3s; }
        .nav-bar { background:rgba(28, 28, 30, 0.8); backdrop-filter:blur(15px); border-bottom:1px solid var(--border); padding:15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:100; flex-wrap: wrap; gap: 10px;}
        .filter-bar { background: var(--card); padding:15px; border-radius:16px; margin-top:20px; border:1px solid var(--border); }
        .apple-input { background: var(--input); border: 1px solid var(--border); border-radius: 10px; padding: 10px; width: 100%; color: var(--text); outline: none; font-size: 12px; text-align: center; }
        .product-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 15px; transition: 0.3s; position: relative; display: flex; flex-direction: column; height: 100%; }
        .product-card:hover { border-color: #0071e3; transform: translateY(-4px); }
        .tag-status { font-size: 8px; font-weight: 900; text-transform: uppercase; padding: 4px 8px; border-radius: 50px; letter-spacing: 0.05em; display: inline-block; margin-bottom: 3px; }
        .tag-menor { background: #ff3b30; color: #fff; }
        .tag-poucas { background: #ffcc00; color: #000; }
        .tag-muitas { background: #0071e3; color: #fff; }
        .tag-estoque-alto { background: #32d74b; color: #000; }
        .mini-tag { font-size: 8px; font-weight: 900; text-transform: uppercase; padding: 4px 6px; border-radius: 6px; background: var(--input); color: #86868b; border: 1px solid var(--border); display: inline-flex; align-items: center; justify-content: center; }
        .mini-tag.active { color: #fff; border-color: #0071e3; background: rgba(0, 113, 227, 0.2); }
        .mini-tag.usdt { color: #32d74b; border-color: #32d74b; background: rgba(50, 215, 75, 0.1); }
        .mini-tag.lote { color: #5e5ce6; border-color: #5e5ce6; background: rgba(94, 92, 230, 0.1); }
        .mini-tag.bat { color: #32d74b; border-color: #32d74b; background: rgba(50, 215, 75, 0.1); }
        .mini-tag.pix { color: #32bcad; border-color: #32bcad; background: rgba(50, 188, 173, 0.1); }
        .price-text { font-size: 26px; font-weight: 900; color: var(--text); letter-spacing: -0.05em; }
        .buy-button { background: #0071e3; color: #fff; font-weight: 900; border-radius: 50px; padding: 12px; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 11px; text-align: center; display: block; text-decoration: none; margin-top: auto; transition: 0.3s; letter-spacing: 0.05em; }
        .buy-button:hover { background: #005bb5; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <h1 class="text-2xl font-black italic m-0">iFipe</h1>
        <div class="flex items-center gap-2 bg-[#1c1c1e] p-2 px-4 rounded-xl border border-[#38383a]">
            <span class="text-[14px] font-black text-[#32d74b] font-mono" id="ticker">R$ --</span>
        </div>
        <div class="flex gap-4 items-center">
            <button onclick="logout()" class="text-red-500 font-black text-[10px] uppercase">Sair</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 pb-20">
        <div class="filter-bar grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-3 mb-6">
            <select id="f_cat" class="apple-input" onchange="popularAparelhos()"><option value="">Categoria...</option><option value="1">IPHONE</option><option value="2">APPLE WATCH</option><option value="4">MACBOOK</option></select>
            <select id="f_prod" class="apple-input" onchange="atualizarFiltrosCascata()"><option value="">Aparelho...</option></select>
            <select id="f_cond" class="apple-input" onchange="renderizarRanking()"><option value="">Condição...</option><option value="Novo">Novo</option><option value="Seminovo">Seminovo</option><option value="CPO">CPO</option><option value="GRADE A LEILAO">GRADE A LEILÃO</option></select>
            <select id="f_cap" class="apple-input" onchange="renderizarRanking()"><option value="">Memória...</option></select>
            <select id="f_lojista" class="apple-input" onchange="renderizarRanking()"><option value="">Atacadista...</option></select>
            <select id="f_cid" class="apple-input" onchange="renderizarRanking()"><option value="">Cidade...</option></select>
        </div>

        <div id="gridGeral" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
    </main>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let ofertasAtuais = [], gradeVariacoes = [], todosProdutosMestre = [], currentUsdtRate = 0;

        window.onload = async () => { if(!localStorage.getItem('iFipe_Token')) window.location.replace('index.html'); else init(); };

        function iniciarTicker() {
            const socket = new WebSocket('wss://stream.binance.com:9443/ws/usdtbrl@ticker');
            socket.onmessage = (e) => {
                currentUsdtRate = parseFloat(JSON.parse(e.data).c);
                document.getElementById('ticker').innerText = `R$ ${currentUsdtRate.toFixed(4).replace('.',',')}`;
            };
        }

        async function init() {
            iniciarTicker();
            const [p, r, v, f] = await Promise.all([ _s.from('produtos_mestre').select('*').order('nome'), _s.from('regioes').select('*').order('nome'), _s.from('variacoes').select('*'), _s.from('fornecedores').select('*').eq('ativo', true) ]);
            todosProdutosMestre = p.data; gradeVariacoes = v.data;
            document.getElementById('f_prod').innerHTML += p.data.map(x => `<option value="${x.id}">${x.nome}</option>`).join('');
            document.getElementById('f_lojista').innerHTML += f.data.map(x => `<option value="${x.id}">${x.nome}</option>`).join('');
            document.getElementById('f_cid').innerHTML += [...new Set(f.data.map(x => x.cidade).filter(Boolean))].sort().map(c => `<option value="${c}">${c}</option>`).join('');
            carregarDados(); setInterval(carregarDados, 5000);
        }

        // MOTOR DE RANKING (CADEIRAS)
        function getModelWeight(name) {
            let n = (name || "").toLowerCase();
            let weight = 0;
            let match = n.match(/(\d+)/);
            if(match) weight += parseInt(match[1]) * 10000;
            if(n.includes("pro max")) weight += 500; else if(n.includes("pro")) weight += 400; else if(n.includes("plus")) weight += 300;
            return weight;
        }

        function getCapWeight(cap) {
            if(!cap) return 0;
            if(cap.includes('2TB')) return 5000; if(cap.includes('1TB')) return 4000;
            if(cap.includes('512')) return 3000; if(cap.includes('256')) return 2000;
            return 1000;
        }

        function sortOffers(a, b) {
            const condA = a.condicao === 'Novo' ? 1 : 0;
            const condB = b.condicao === 'Novo' ? 1 : 0;
            if (condA !== condB) return condB - condA;
            let wA = getModelWeight(a.variacoes?.produtos_mestre?.nome), wB = getModelWeight(b.variacoes?.produtos_mestre?.nome);
            if (wA !== wB) return wB - wA;
            let cA = getCapWeight(a.variacoes?.capacidade), cB = getCapWeight(b.variacoes?.capacidade);
            if (cA !== cB) return cB - cA;
            return a.preco - b.preco;
        }

        async function carregarDados() {
            const { data } = await _s.from('ofertas').select('*, fornecedores(*), variacoes(*, produtos_mestre(*)), regioes(*)');
            ofertasAtuais = data || []; renderizarRanking();
        }

        function renderizarRanking() {
            const fCat = document.getElementById('f_cat').value, fP = document.getElementById('f_prod').value, fC = document.getElementById('f_cond').value, fCap = document.getElementById('f_cap').value, fLoj = document.getElementById('f_lojista').value, fCid = document.getElementById('f_cid').value;
            let filtrados = ofertasAtuais.filter(o => o.quantidade > 0 && o.variacoes && (!fCat || o.variacoes.produtos_mestre?.grupo_id == fCat) && (!fP || o.variacoes.produtos_mestre?.id == fP) && (!fC || o.condicao == fC) && (!fCap || o.variacoes.capacidade == fCap) && (!fLoj || o.fornecedor_id == fLoj) && (!fCid || o.fornecedores?.cidade == fCid));
            
            const grid = document.getElementById('gridGeral');
            if(!filtrados.length) { grid.innerHTML = '<p class="text-center col-span-full py-20 opacity-30 uppercase font-black">Nenhuma oferta ativa</p>'; return; }

            let menores = {}; filtrados.forEach(o => { let k = `${o.variacao_id}_${o.condicao}_${o.moeda}`; if(!menores[k] || o.preco < menores[k]) menores[k] = o.preco; });

            // GRADE ÚNICA (SEM SEPARAÇÃO)
            grid.innerHTML = filtrados.sort(sortOffers).map(o => {
                const k = `${o.variacao_id}_${o.condicao}_${o.moeda}`;
                
                // LÓGICA DE TAGS DE TEMPO 15/30 MIN
                let tagAlteracao = '';
                if(o.data_alteracao_preco && o.preco_anterior) {
                    let diff = (new Date() - new Date(o.data_alteracao_preco)) / 60000;
                    if(o.preco < o.preco_anterior && diff <= 30) tagAlteracao = `<span class="tag-status" style="background:#32d74b; color:#000;">OPORTUNIDADE 🔻</span>`;
                    else if (o.preco > o.preco_anterior && diff <= 15) tagAlteracao = `<span class="tag-status" style="background:#ff3b30; color:#fff;">SUBIU ⤴️</span>`;
                }

                let tagMenor = o.preco === menores[k] ? '<span class="tag-status tag-menor">🔥 MENOR PREÇO</span>' : '';
                let tagEstoque = o.quantidade <= 3 ? `<span class="tag-status tag-poucas">ÚLTIMAS ${o.quantidade} UN</span>` : (o.quantidade <= 10 ? `<span class="tag-status tag-muitas">ESTOQUE ${o.quantidade} UN</span>` : `<span class="tag-status tag-estoque-alto">ALTO ESTOQUE</span>`);
                
                let details = [o.variacoes?.capacidade, o.cores_variadas ? 'CORES VARIADAS' : o.variacoes?.cor, o.condicao].filter(Boolean).join(' | ');
                
                // BATERIA E MOLDURAS
                let t_bat = o.saude_bateria ? `<span class="mini-tag bat">${o.saude_bateria}</span>` : '';
                let t_gar = o.garantia ? `<span class="mini-tag gar">🛡️ ${o.garantia}</span>` : '';
                let t_pro = o.aceita_proposta ? `<span class="mini-tag lote">🤝 Negocia Qtd</span>` : '';
                let tagsStr = [t_bat, t_gar, t_pro, o.aceita_pix ? '<span class="mini-tag pix">PIX</span>' : '', o.aceita_usdt ? '<span class="mini-tag usdt">USDT</span>' : ''].filter(Boolean).join(' ');

                return `<div class="product-card">
                    <div class="flex flex-wrap gap-1 mb-2">${tagAlteracao} ${tagEstoque} ${tagMenor}</div>
                    <h2 class="text-lg font-black leading-tight">${o.variacoes?.produtos_mestre?.nome || 'Aparelho'}</h2>
                    <p class="text-[10px] text-gray-400 uppercase font-bold mb-3">${details}</p>
                    <div class="flex flex-wrap gap-1.5 mb-3">${tagsStr}</div>
                    <div class="mt-auto border-t border-[#38383a] pt-3">
                        <p class="text-[9px] text-blue-400 font-black uppercase">LOJA: ${o.fornecedores?.nome || '...'} ${o.fornecedores?.verificado ? '✔️' : ''}</p>
                        <div class="price-text">${o.moeda === 'USD' ? '$' : 'R$'} ${o.preco.toLocaleString('pt-BR')}</div>
                    </div>
                    <a href="https://wa.me/${o.fornecedores?.whatsapp?.replace(/\D/g,'')}" target="_blank" class="buy-button">WhatsApp</a>
                </div>`;
            }).join('');
        }

        function popularAparelhos() { let c = document.getElementById('f_cat').value; let f = c ? todosProdutosMestre.filter(x => x.grupo_id == c) : todosProdutosMestre; document.getElementById('f_prod').innerHTML = '<option value="">Todos</option>' + f.map(x => `<option value="${x.id}">${x.nome}</option>`).join(''); atualizarFiltrosCascata(); }
        function atualizarFiltrosCascata() { let pid = document.getElementById('f_prod').value; let vars = pid ? gradeVariacoes.filter(x => x.produto_id == pid) : gradeVariacoes; document.getElementById('f_cap').innerHTML = '<option value="">Todas</option>' + [...new Set(vars.map(x => x.capacidade))].map(c => `<option value="${c}">${c}</option>`).join(''); renderizarRanking(); }
        function logout() { localStorage.removeItem('iFipe_Token'); window.location.replace('index.html'); }
    </script>
</body>
</html>
