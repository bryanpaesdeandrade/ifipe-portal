<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Encontre o melhor preço</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background:#000; color:#fff; font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin:0; }
        
        /* TICKER BINANCE */
        .ticker-bar { background:rgba(28, 28, 30, 0.8); backdrop-filter:blur(15px); border-bottom:1px solid #38383a; padding:12px; position:sticky; top:0; z-index:100; display:flex; justify-content:center; align-items:center; gap:12px; }
        .ticker-val { color:#32d74b; font-family:monospace; font-size:18px; font-weight:900; }

        /* BARRA DO USUÁRIO */
        .user-bar { background:#0b0b0c; border-bottom:1px solid #1c1c1e; padding:15px 20px; display:flex; justify-content:space-between; align-items:center; }

        /* FILTROS */
        .filter-section { background:#000; padding:30px 20px; border-bottom:1px solid #1c1c1e; }
        .filter { background:#1c1c1e; border:1px solid #38383a; border-radius:14px; padding:14px; color:#fff; width:100%; font-size:11px; font-weight:900; text-transform:uppercase; outline:none; transition:0.3s; }
        .filter:focus { border-color:#0071e3; }

        /* CARDS DA VITRINE */
        .card { background:#1c1c1e; border:1px solid #38383a; border-radius:28px; padding:28px; transition:0.3s; position:relative; overflow:hidden; }
        .card:hover { border-color:#0071e3; transform:translateY(-5px); }
        .price { color:#32d74b; font-size:38px; font-weight:900; letter-spacing:-2px; line-height:1; }
        .stock-badge { background:rgba(50, 215, 75, 0.1); color:#32d74b; padding:5px 12px; border-radius:10px; font-size:10px; font-weight:900; text-transform:uppercase; }
        
        .badge-novo { background:#32d74b; color:#000; padding:3px 8px; border-radius:6px; font-size:9px; font-weight:900; text-transform:uppercase; }
        .badge-semi { background:#ffcc00; color:#000; padding:3px 8px; border-radius:6px; font-size:9px; font-weight:900; text-transform:uppercase; }

        .btn-wa { background:#fff; color:#000; padding:18px; border-radius:50px; font-weight:900; text-align:center; display:block; text-decoration:none; text-transform:uppercase; font-size:12px; transition:0.3s; margin-top:20px; }
        .btn-wa:hover { background:#0071e3; color:#fff; }

        /* MODAIS */
        .modal-bg { background:rgba(0,0,0,0.85); backdrop-filter:blur(10px); }
        .apple-input { background:#2c2c2e; border:1px solid #38383a; border-radius:12px; padding:15px; width:100%; color:white; outline:none; margin-bottom:1rem; font-size:14px; }
        .btn-save { background:#0071e3; color:#fff; font-weight:900; border-radius:50px; padding:15px; width:100%; text-transform:uppercase; font-size:12px; transition:0.3s; }

        .hidden { display: none !important; }
    </style>
</head>
<body id="main" class="hidden">
    
    <div class="ticker-bar">
        <span class="text-[10px] text-gray-500 font-black uppercase tracking-widest">USDT/BRL BINANCE:</span>
        <span class="ticker-val" id="usdt_val">CARREGANDO...</span>
    </div>

    <div class="user-bar">
        <div class="max-w-7xl mx-auto w-full flex justify-between items-center">
            <div class="text-[11px] font-black uppercase tracking-widest text-gray-500">
                Olá, <span id="nomeUsuario" class="text-white">...</span>
            </div>
            <div class="flex gap-6">
                <button onclick="abrirPerfil()" class="text-[10px] text-gray-400 hover:text-white font-black uppercase tracking-widest transition">Meus Dados</button>
                <button onclick="sairBuscador()" class="text-[10px] text-red-500 hover:text-red-400 font-black uppercase tracking-widest transition">Sair</button>
            </div>
        </div>
    </div>

    <div class="max-w-7xl mx-auto px-6">
        <header class="mt-12 mb-8 text-center">
            <h1 class="text-7xl font-black italic tracking-tighter leading-none">iFipe</h1>
            <p class="text-[10px] text-blue-500 font-black uppercase tracking-[0.4em] mt-2">Encontre o melhor preço</p>
        </header>
    </div>

    <div class="filter-section">
        <div class="max-w-7xl mx-auto grid grid-cols-2 md:grid-cols-5 gap-4">
            <select id="fMod" class="filter" onchange="atualizarDetalhes()"><option value="">Aparelho</option></select>
            <select id="fCond" class="filter" onchange="filtrar()"><option value="">Condição (Todas)</option><option value="Novo">Novos</option><option value="Seminovo">Seminovos</option></select>
            <select id="fDet" class="filter" onchange="atualizarCores()" disabled><option value="">Memória/Tamanho</option></select>
            <select id="fCor" class="filter" onchange="filtrar()" disabled><option value="">Cor</option></select>
            <select id="fReg" class="filter" onchange="filtrar()"><option value="">Região de Origem</option></select>
        </div>
    </div>

    <div class="max-w-7xl mx-auto p-6">
        <div id="vitrine" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>
    </div>

    <div id="modalPerfil" class="hidden fixed inset-0 modal-bg z-50 flex justify-center items-center p-4">
        <div class="bg-[#1c1c1e] p-8 rounded-3xl border border-[#38383a] w-full max-w-sm">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-black italic">Meus Dados</h2>
                <button onclick="fecharPerfil()" class="text-gray-500 text-xl font-bold">&times;</button>
            </div>
            <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest block mb-2">Nome Completo</label>
            <input type="text" id="editNome" class="apple-input">
            <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest block mb-2">WhatsApp</label>
            <input type="text" id="editWhats" class="apple-input">
            <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest block mb-2">Nova Senha</label>
            <input type="password" id="editSenha" class="apple-input" placeholder="••••••••">
            <button onclick="salvarPerfil()" class="btn-save mt-4">Salvar Alterações</button>
            <p id="msgPerfil" class="text-[10px] font-black uppercase text-center mt-4 tracking-widest"></p>
        </div>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let cacheOfertas = [];
        let gradeVariacoes = [];
        let usuarioLogado = null;

        // BINANCE TICKER
        function iniciarCambio() {
            const socket = new WebSocket('wss://stream.binance.com:9443/ws/usdtbrl@ticker');
            socket.onmessage = (event) => { 
                const data = JSON.parse(event.data);
                document.getElementById('usdt_val').innerText = `R$ ${parseFloat(data.c).toFixed(4).replace('.',',')}`; 
            };
        }

        // VALIDAÇÃO DE SESSÃO
        async function validarSessao() {
            const token = localStorage.getItem('iFipe_Token');
            if(!token) { location.href='3-pagina-login.html'; return; }
            const { data } = await _s.from('clientes_buscador').select('*').eq('id', token).maybeSingle();
            if(!data || !data.aprovado) { sairBuscador(); return; }
            
            usuarioLogado = data;
            document.getElementById('nomeUsuario').innerText = data.nome.split(' ')[0];
            document.getElementById('main').classList.remove('hidden');
            iniciarCambio(); init();
        }

        function sairBuscador() { localStorage.removeItem('iFipe_Token'); window.location.href = '3-pagina-login.html'; }
        function abrirPerfil() { document.getElementById('modalPerfil').classList.remove('hidden'); document.getElementById('editNome').value = usuarioLogado.nome; document.getElementById('editWhats').value = usuarioLogado.whatsapp || ''; document.getElementById('editSenha').value = usuarioLogado.senha; document.getElementById('msgPerfil').innerText = ''; }
        function fecharPerfil() { document.getElementById('modalPerfil').classList.add('hidden'); }

        async function salvarPerfil() {
            const nNome = document.getElementById('editNome').value; const nWhats = document.getElementById('editWhats').value.replace(/\D/g, ''); const nSenha = document.getElementById('editSenha').value; const msg = document.getElementById('msgPerfil');
            if(!nNome || !nSenha) { msg.innerText = "NOME E SENHA SÃO OBRIGATÓRIOS."; msg.style.color = "#ff3b30"; return; }
            const { error } = await _s.from('clientes_buscador').update({ nome: nNome, whatsapp: nWhats, senha: nSenha }).eq('id', usuarioLogado.id);
            if(!error) { msg.innerText = "DADOS ATUALIZADOS!"; msg.style.color = "#32d74b"; document.getElementById('nomeUsuario').innerText = nNome.split(' ')[0]; usuarioLogado.nome = nNome; usuarioLogado.whatsapp = nWhats; usuarioLogado.senha = nSenha; setTimeout(fecharPerfil, 1500); }
        }

        // CARREGAMENTO INICIAL
        async function init() {
            const [m, r, v] = await Promise.all([
                _s.from('produtos_mestre').select('id, nome, grupos(nome)').order('id'),
                _s.from('regioes').select('*').order('id'),
                _s.from('variacoes').select('*, produtos_mestre(nome)')
            ]);
            gradeVariacoes = v.data || [];

            let optHTML = '<option value="">Todos Aparelhos</option>';
            const grupos = [...new Set(m.data.map(x => x.grupos.nome))];
            grupos.forEach(g => {
                optHTML += `<optgroup label="${g}">`;
                optHTML += m.data.filter(x => x.grupos.nome === g).map(x => `<option value="${x.nome}">${x.nome}</option>`).join('');
                optHTML += `</optgroup>`;
            });

            document.getElementById('fMod').innerHTML = optHTML;
            document.getElementById('fReg').innerHTML = '<option value="">Região de Origem</option>' + r.data.map(x=>`<option value="${x.nome}">${x.bandeira} ${x.nome}</option>`).join('');
            buscarOfertas();
        }

        async function buscarOfertas() {
            const { data } = await _s.from('ofertas').select('preco, quantidade, condicao, regioes(nome, bandeira), fornecedores(nome, whatsapp, ativo), variacoes(capacidade, tamanho, cor, produtos_mestre(nome))').eq('fornecedores.ativo', true).gt('quantidade', 0).order('preco', {ascending:true});
            cacheOfertas = data || []; renderizar(cacheOfertas);
        }

        // LÓGICA DE FILTROS CASCATA
        function atualizarDetalhes() {
            const modNome = document.getElementById('fMod').value;
            const selDet = document.getElementById('fDet'); const selCor = document.getElementById('fCor');
            if(!modNome) { selDet.disabled = selCor.disabled = true; selDet.innerHTML = '<option value="">Memória/Tamanho</option>'; selCor.innerHTML = '<option value="">Cor</option>'; filtrar(); return; }
            
            const filtradas = gradeVariacoes.filter(x => x.produtos_mestre.nome === modNome);
            const tamanhos = [...new Set(filtradas.map(x=>x.tamanho).filter(Boolean))];
            const capacidades = [...new Set(filtradas.map(x=>x.capacidade).filter(Boolean))].sort((a,b) => parseInt(a) - parseInt(b));
            
            selDet.innerHTML = '<option value="">Tamanho / Memória</option>';
            if(tamanhos.length > 0) selDet.innerHTML += tamanhos.map(x=>`<option value="${x}">${x}</option>`).join('');
            if(capacidades.length > 0) selDet.innerHTML += capacidades.map(x=>`<option value="${x}">${x}</option>`).join('');
            
            selDet.disabled = false; selCor.disabled = true; selCor.innerHTML = '<option value="">Cor</option>';
            filtrar();
        }

        function atualizarCores() {
            const modNome = document.getElementById('fMod').value; const detalhe = document.getElementById('fDet').value; const selCor = document.getElementById('fCor');
            if(!detalhe) { selCor.disabled = true; filtrar(); return; }
            
            const filtradas = gradeVariacoes.filter(x => x.produtos_mestre.nome === modNome && (x.capacidade === detalhe || x.tamanho === detalhe));
            const cores = [...new Set(filtradas.map(x=>x.cor).filter(Boolean))];
            selCor.innerHTML = '<option value="">Cor</option>' + cores.map(x=>`<option value="${x}">${x}</option>`).join('');
            selCor.disabled = false;
            filtrar();
        }

        function filtrar() {
            const mod = document.getElementById('fMod').value; const cond = document.getElementById('fCond').value; const det = document.getElementById('fDet').value; const cor = document.getElementById('fCor').value; const reg = document.getElementById('fReg').value;
            let res = cacheOfertas;
            if(mod) res = res.filter(x => x.variacoes.produtos_mestre.nome === mod);
            if(cond) res = res.filter(x => x.condicao === cond);
            if(det) res = res.filter(x => x.variacoes.capacidade === det || x.variacoes.tamanho === det);
            if(cor) res = res.filter(x => x.variacoes.cor === cor);
            if(reg) res = res.filter(x => x.regioes.nome === reg);
            renderizar(res);
        }

        // RENDERIZAÇÃO FINAL
        function renderizar(lista) {
            const vitrine = document.getElementById('vitrine');
            if(lista.length === 0) { vitrine.innerHTML = '<p class="text-center col-span-full text-gray-500 font-bold text-xs uppercase tracking-widest mt-10">Nenhum aparelho disponível com esses filtros.</p>'; return; }
            
            vitrine.innerHTML = lista.map(o => {
                const attrs = [o.variacoes.tamanho, o.variacoes.capacidade, o.variacoes.cor].filter(Boolean).join(' • ');
                const badgeCondicao = o.condicao === 'Novo' ? '<span class="badge-novo">Novo (Lacrado)</span>' : '<span class="badge-semi">Seminovo</span>';
                
                return `
                <div class="card">
                    <div class="flex justify-between items-start mb-6">
                        <span class="text-[10px] font-black uppercase text-gray-500 tracking-tighter">${o.regioes.bandeira} ${o.regioes.nome}</span>
                        <div class="flex flex-col items-end gap-2">
                            ${badgeCondicao}
                            <span class="stock-badge">${o.quantidade} em estoque</span>
                        </div>
                    </div>
                    <p class="text-[10px] font-black text-blue-500 uppercase tracking-[0.2em] mb-2">Atacadista: ${o.fornecedores.nome}</p>
                    <h2 class="text-3xl font-black italic leading-none mb-1">${o.variacoes.produtos_mestre.nome}</h2>
                    <p class="text-gray-500 text-[11px] font-bold uppercase mb-8">${attrs}</p>
                    <div class="price">R$ ${o.preco.toLocaleString('pt-BR',{minimumFractionDigits:2})}</div>
                    <a href="https://wa.me/${o.fornecedores.whatsapp.replace(/\D/g,'')}" target="_blank" class="btn-wa">Negociar Direto</a>
                </div>
            `}).join('');
        }
        validarSessao();
    </script>
</body>
</html>
