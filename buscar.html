<!DOCTYPE html>

<html lang="pt-br">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>iFipe - Buscador</title>



<script>

const status = localStorage.getItem('iFipe_Status');

const token = localStorage.getItem('iFipe_Token');



if (status === 'off' && token !== 'admin_bypass') {

  document.documentElement.innerHTML = `

  <body style="background:#000;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh;font-family:system-ui;">

    <div style="text-align:center">

      <h1 style="color:#ff3b30;font-style:italic;font-weight:900">iFipe</h1>

      <p style="font-size:12px;letter-spacing:1px">SISTEMA EM ATUALIZAÇÃO</p>

      <button onclick="location.href='index.html'"

        style="margin-top:20px;padding:12px 24px;border-radius:30px;border:none;background:#0071e3;color:#fff;font-weight:900">

        VOLTAR

      </button>

    </div>

  </body>`;

  window.stop();

}

</script>



<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body { background:#000; color:#fff; margin:0; font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif; }

.card { background:#1c1c1e; border:1px solid #38383a; border-radius:16px; padding:14px; }

.btn { background:#0071e3; color:#fff; padding:10px; border-radius:30px; font-weight:900; text-transform:uppercase; font-size:11px; }

.hidden { display:none }

</style>

</head>

<body>



<header class="p-4 border-b border-[#38383a] flex justify-between items-center">

  <strong class="italic text-xl">iFipe</strong>

  <button onclick="logout()" class="text-red-500 font-black text-xs">SAIR</button>

</header>



<main class="p-4">

<input id="busca" placeholder="BUSCAR PRODUTO"

  class="w-full p-3 rounded bg-white text-black font-black uppercase">

<div id="grid" class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-6"></div>

</main>

<script>

const sb = supabase.createClient(

  'https://zmgosywpwidypxyhxkry.supabase.co',

  'SUA_CHAVE_ANON_AQUI'

);



let ofertas = [];

window.onload = async () => {

  const token = localStorage.getItem('iFipe_Token');

  if (!token) return location.href = 'index.html';



  const { data } = await sb.from('clientes_buscador')

    .select('*').eq('id', token).single();



  if (!data || data.ativo === false) logout();

  carregar();

};



function logout() {

  localStorage.removeItem('iFipe_Token');

  location.href = 'index.html';

}

async function carregar() {

  const { data } = await sb.from('ofertas')

    .select('*, variacoes(produtos_mestre(nome)), fornecedores(nome, whatsapp)')

    .gt('quantidade', 0);



  ofertas = data || [];

  render();

}

function render() {

  const grid = document.getElementById('grid');

  const q = document.getElementById('busca').value.toLowerCase();



  grid.innerHTML = ofertas

    .filter(o => o.variacoes.produtos_mestre.nome.toLowerCase().includes(q))

    .map(o => `

      <div class="card">

        <strong>${o.variacoes.produtos_mestre.nome}</strong>

        <div class="text-xl font-black mt-2">R$ ${o.preco}</div>

        <a class="btn block text-center mt-3"

          target="_blank"

          href="https://wa.me/${o.fornecedores.whatsapp}">

          COMPRAR

        </a>

      </div>

    `).join('');

}

document.getElementById('busca').addEventListener('input', render);</script></body>

</html>
