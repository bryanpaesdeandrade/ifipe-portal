<!DOCTYPE html>

<html lang="pt-br">

<head>



<script>

const status = localStorage.getItem('iFipe_Status');

const isMaster = localStorage.getItem('iFipe_Token') === 'admin_bypass';



if (status === 'off' && !isMaster) {

  document.documentElement.innerHTML = `

  <body style="background:#050505;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh;font-family:system-ui,sans-serif;text-align:center;padding:20px;margin:0;">

    <div>

      <h1 style="color:#ff3b30;font-style:italic;font-weight:900;">iFipe</h1>

      <p style="color:#888;font-weight:bold;font-size:12px;text-transform:uppercase;">

        Sistema em atualização

      </p>

      <button onclick="location.href='index.html'"

        style="margin-top:20px;background:#0071e3;color:#fff;border:none;padding:12px 24px;border-radius:50px;font-weight:900;">

        Voltar

      </button>

    </div>

  </body>`;

  window.stop();

}

</script>



<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>iFipe - Buscador VIP</title>



<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">

<style>

:root { --bg:#000; --card:#1c1c1e; --text:#fff; --border:#38383a; --input:#2c2c2e; }

body { background:var(--bg); color:var(--text); margin:0; font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif; }

.hidden { display:none!important; }

.product-card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:12px; }

.buy-button { background:#0071e3;color:#fff;font-weight:900;border-radius:50px;padding:12px;text-align:center;display:block;margin-top:12px;text-transform:uppercase;font-size:11px; }

</style>

</head>

<body>



<div id="manutencaoOverlay" class="hidden"></div>



<div id="mainContent" class="hidden">

<nav class="p-4 border-b border-[#38383a] flex justify-between">

  <strong class="italic">iFipe</strong>

  <button onclick="logout()" class="text-red-500 font-black text-xs">SAIR</button>

</nav>



<main class="p-4">

  <input id="buscaTexto" class="w-full p-3 rounded bg-white text-black font-black uppercase" placeholder="Buscar produto">

  <div id="gridGeral" class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-6"></div>

</main>

</div>

<script>

const _s = supabase.createClient(

  'https://zmgosywpwidypxyhxkry.supabase.co',

  'SUA_CHAVE_ANON_AQUI'

);



let ofertasAtuais = [];

let clienteLogado = null;

window.onload = async () => {

  const token = localStorage.getItem('iFipe_Token');

  if (!token) return location.href = 'index.html';



  const { data } = await _s.from('clientes_buscador').select('*').eq('id', token).single();

  if (!data || data.ativo === false) return logout();



  clienteLogado = data;

  document.getElementById('mainContent').classList.remove('hidden');

  carregarDados();

};



function logout() {

  localStorage.removeItem('iFipe_Token');

  location.href = 'index.html';

}

async function carregarDados() {

  const { data } = await _s.from('ofertas')

    .select('*, variacoes(produtos_mestre(nome)), fornecedores(nome, whatsapp)')

    .gt('quantidade', 0);



  ofertasAtuais = data || [];

  renderizar();

}

function renderizar() {

  const grid = document.getElementById('gridGeral');

  grid.innerHTML = ofertasAtuais.map(o => `

    <div class="product-card">

      <strong>${o.variacoes.produtos_mestre.nome}</strong>

      <div class="text-xl font-black mt-2">R$ ${o.preco}</div>

      <a class="buy-button" target="_blank"

        href="https://wa.me/${o.fornecedores.whatsapp}">

        Comprar

      </a>

    </div>

  `).join('');

}

</script>

</body>

</html>
