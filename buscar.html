<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Buscador VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #38383a; --input: #2c2c2e; }
        body { background: var(--bg); color: var(--text); font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin:0; transition: 0.3s; }
        .nav-bar { background:rgba(28, 28, 30, 0.8); backdrop-filter:blur(15px); border-bottom:1px solid var(--border); padding:15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:100; gap: 15px;}
        .apple-input { background: var(--input); border: 1px solid var(--border); border-radius: 10px; padding: 10px; width: 100%; color: var(--text); outline: none; font-size: 12px; text-align: center; }
        .product-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 18px; transition: 0.3s; position: relative; display: flex; flex-direction: column; height: 100%; }
        .product-card:hover { border-color: #0071e3; transform: translateY(-4px); }
        .tag-status { font-size: 8px; font-weight: 900; text-transform: uppercase; padding: 4px 8px; border-radius: 50px; display: inline-block; margin-bottom: 3px; }
        .mini-tag { font-size: 8px; font-weight: 900; text-transform: uppercase; padding: 4px 6px; border-radius: 6px; background: var(--input); color: #86868b; border: 1px solid var(--border); display: inline-flex; align-items: center; justify-content: center; }
        .price-text { font-size: 28px; font-weight: 900; color: var(--text); letter-spacing: -0.05em; }
        .buy-button { background: #0071e3; color: #fff; font-weight: 900; border-radius: 50px; padding: 14px; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 11px; text-align: center; display: block; text-decoration: none; margin-top: auto; transition: 0.3s; }
        .selo-verificado { background: #ffcc00; color: #000; padding: 2px 6px; border-radius: 4px; font-size: 8px; font-weight: 900; text-transform: uppercase; }
        .section-title { text-align: center; font-weight: 900; font-style: italic; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 20px; font-size: 14px; padding: 12px; border-radius: 12px; border: 1px solid var(--border); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="calcModal" class="hidden fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center z-[2000] px-4">
        <div class="w-full max-w-[400px] bg-[#1c1c1e] border-2 border-[#38383a] rounded-3xl p-8 shadow-2xl relative">
            <button onclick="fecharCalc()" class="absolute top-4 right-5 text-gray-500 hover:text-white text-2xl">×</button>
            <div class="text-center mb-6">
                <h2 class="text-xl font-black italic text-white uppercase">Calculadora VIP de importação de iphone</h2>
                <p class="text-[10px] text-blue-500 font-black uppercase mt-2">saiba o preço final comprando no paraguai e recebendo no brasil</p>
            </div>
            <div class="bg-[#0a0a0a] border-2 border-[#2c2c2e] rounded-2xl p-5 text-right mb-5">
                <span class="text-[9px] text-gray-500 font-black uppercase">Preço Final Entregue (R$)</span>
                <div id="calcResult" class="font-mono text-4xl font-black text-[#0071e3] mt-2">R$ 0,00</div>
            </div>
            <input type="number" id="calcUsd" class="w-full bg-[#151516] border-2 border-[#38383a] rounded-xl py-5 text-2xl font-black text-white outline-none text-center" placeholder="Dólar no Paraguai" oninput="calcularImportacao()">
        </div>
    </div>

    <nav class="nav-bar">
        <h1 class="text-3xl font-black italic m-0">iFipe</h1>
        <div class="flex flex-col md:flex-row items-center gap-4">
            <div class="flex flex-col items-end">
                <span class="text-[7px] text-gray-500 font-black uppercase">Binance BRL/USDT Taxa Real Online</span>
                <span class="text-[14px] font-black text-white font-mono" id="tBinance">R$ --</span>
            </div>
            <div class="flex flex-col items-end border-l border-gray-800 pl-4">
                <span class="text-[7px] text-[#32d74b] font-black uppercase">Compre USDT com Taxa VIP com Oráculo</span>
                <span class="text-[14px] font-black text-[#32d74b] font-mono" id="tVip">R$ --</span>
            </div>
        </div>
        <button onclick="logout()" class="text-red-500 font-black text-[10px] uppercase">Sair</button>
    </nav>

    <main class="max-w-[1600px] mx-auto px-4 pb-20">
        <div class="bg-[#1c1c1e] p-4 rounded-2xl border border-[#38383a] grid grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-3 my-6">
            <select id="f_cat" class="apple-input" onchange="popularAparelhos()"><option value="">Categorias...</option><option value="1">IPHONE</option><option value="2">APPLE WATCH</option><option value="4">MACBOOK</option></select>
            <select id="f_prod" class="apple-input" onchange="renderizarRanking()"><option value="">Modelos...</option></select>
            <select id="f_cond" class="apple-input" onchange="renderizarRanking()"><option value="">Condição...</option><option value="Novo">Novo</option><option value="Seminovo">Seminovo</option><option value="CPO">CPO</option></select>
            <select id="f_cap" class="apple-input" onchange="renderizarRanking()"><option value="">Memória...</option></select>
            <select id="f_lojista" class="apple-input" onchange="renderizarRanking()"><option value="">Lojista...</option></select>
            <select id="f_cid" class="apple-input" onchange="renderizarRanking()"><option value="">Cidade...</option></select>
            <button onclick="abrirCalc()" class="bg-[#0071e3] text-white rounded-lg font-black text-[10px] uppercase">Calculadora VIP</button>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8" id="layoutPrincipal">
            <div id="colReal">
                <div class="section-title text-[#0071e3] bg-[#0071e3]/10 border-[#0071e3]/20">Ranking em Real</div>
                <div id="gridReal" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
            <div id="colDolar">
                <div class="section-title text-[#32d74b] bg-[#32d74b]/10 border-[#32d74b]/20">Ranking em Dólar</div>
                <div id="gridDolar" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
            </div>
        </div>
    </main>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let ofertasAtuais = [], gradeVariacoes = [], todosProdutosMestre = [], currentUsdtRate = 0;

        window.onload = async () => { if(!localStorage.getItem('iFipe_Token')) window.location.replace('index.html'); else init(); };

        function iniciarTicker() {
            const socket = new WebSocket('wss://stream.binance.com:9443/ws/usdtbrl@ticker');
            socket.onmessage = (e) => {
                currentUsdtRate = parseFloat(JSON.parse(e.data).c);
                document.getElementById('tBinance').innerText = `R$ ${currentUsdtRate.toFixed(4)}`;
                document.getElementById('tVip').innerText = `R$ ${(currentUsdtRate + 0.07).toFixed(4)}`;
            };
        }

        async function init() {
            iniciarTicker();
            const [p, r, v, f] = await Promise.all([ _s.from('produtos_mestre').select('*').order('nome'), _s.from('regioes').select('*').order('nome'), _s.from('variacoes').select('*'), _s.from('fornecedores').select('*').eq('ativo', true) ]);
            todosProdutosMestre = p.data; gradeVariacoes = v.data;
            document.getElementById('f_prod').innerHTML = '<option value="">Modelos...</option>' + p.data.map(x => `<option value="${x.id}">${x.nome}</option>`).join('');
            document.getElementById('f_lojista').innerHTML = '<option value="">Lojista...</option>' + f.data.map(x => `<option value="${x.id}">${x.nome}</option>`).join('');
            document.getElementById('f_cid').innerHTML = '<option value="">Cidade...</option>' + [...new Set(f.data.map(x => x.cidade).filter(Boolean))].sort().map(c => `<option value="${c}">${c}</option>`).join('');
            carregarDados(); setInterval(carregarDados, 10000);
        }

        function getModelWeight(name) {
            let n = (name || "").toLowerCase();
            let weight = 0;
            let match = n.match(/(\d+)/);
            if(match) weight += parseInt(match[1]) * 10000;
            if(n.includes("pro max")) weight += 500; else if(n.includes("pro")) weight += 400; else if(n.includes("plus")) weight += 300;
            return weight;
        }

        function sortOffers(a, b) {
            if (a.condicao === 'Novo' && b.condicao !== 'Novo') return -1;
            if (a.condicao !== 'Novo' && b.condicao === 'Novo') return 1;
            let wA = getModelWeight(a.variacoes?.produtos_mestre?.nome), wB = getModelWeight(b.variacoes?.produtos_mestre?.nome);
            if (wA !== wB) return wB - wA;
            return a.preco - b.preco;
        }

        async function carregarDados() {
            const { data } = await _s.from('ofertas').select('*, fornecedores(*), variacoes(*, produtos_mestre(*)), regioes(*)');
            ofertasAtuais = data || []; renderizarRanking();
        }

        function renderizarRanking() {
            const fCat = document.getElementById('f_cat').value, fP = document.getElementById('f_prod').value, fC = document.getElementById('f_cond').value;
            let filtrados = ofertasAtuais.filter(o => o.quantidade > 0 && o.variacoes && (!fCat || o.variacoes.produtos_mestre?.grupo_id == fCat) && (!fP || o.variacoes.produtos_mestre?.id == fP) && (!fC || o.condicao == fC));
            
            let menores = {}; filtrados.forEach(o => { let k = `${o.variacao_id}_${o.condicao}_${o.moeda}`; if(!menores[k] || o.preco < menores[k]) menores[k] = o.preco; });

            let listaBRL = filtrados.filter(o => o.moeda === 'BRL').sort(sortOffers);
            let listaUSD = filtrados.filter(o => o.moeda === 'USD').sort(sortOffers);

            // REGRA DE FLUXO: Se Dólar for pouco, o Real transborda
            let realParaDireita = [];
            if(listaUSD.length > 0 && listaUSD.length < 2 && listaBRL.length > 4) {
                realParaDireita = listaBRL.splice(Math.floor(listaBRL.length / 2));
            }

            const buildCard = (o) => {
                const k = `${o.variacao_id}_${o.condicao}_${o.moeda}`;
                let tagAlt = '';
                if(o.data_alteracao_preco && o.preco_anterior) {
                    let d = (new Date() - new Date(o.data_alteracao_preco)) / 60000;
                    if(o.preco < o.preco_anterior && d <= 30) tagAlt = `<span class="tag-status" style="background:#32d74b; color:#000;">OPORTUNIDADE 🔻</span>`;
                    else if (o.preco > o.preco_anterior && d <= 15) tagAlt = `<span class="tag-status" style="background:#ff3b30; color:#fff;">SUBIU ⤴️</span>`;
                }
                let tags = [
                    o.preco === menores[k] ? '<span class="tag-status" style="background:#ff3b30; color:#fff;">🔥 MENOR PREÇO</span>' : '',
                    o.saude_bateria ? `<span class="mini-tag" style="color:#32d74b; border-color:#32d74b;">${o.saude_bateria}</span>` : '',
                    o.aceita_proposta ? `<span class="mini-tag" style="color:#5e5ce6; border-color:#5e5ce6;">🤝 Negocia Qtd</span>` : '',
                    o.garantia ? `<span class="mini-tag" style="color:#ffcc00; border-color:#ffcc00;">🛡️ ${o.garantia}</span>` : ''
                ].filter(Boolean).join(' ');

                return `<div class="product-card">
                    <div class="flex flex-wrap gap-1 mb-2">${tagAlt} ${tags}</div>
                    <h2 class="text-lg font-black leading-tight">${o.variacoes?.produtos_mestre?.nome}</h2>
                    <p class="text-[10px] text-gray-400 uppercase font-bold mb-3">${o.variacoes?.capacidade} | ${o.cores_variadas ? 'CORES VARIADAS' : o.variacoes?.cor} | ${o.condicao}</p>
                    <div class="mt-auto pt-3 border-t border-gray-800">
                        <p class="text-[9px] text-blue-400 font-black uppercase mb-1">LOJA: ${o.fornecedores?.nome} ${o.fornecedores?.verificado ? '<span class="selo-verificado">✔️ VERIFICADO</span>' : ''}</p>
                        <div class="price-text">${o.moeda === 'USD' ? '$' : 'R$'} ${o.preco.toLocaleString('pt-BR')}</div>
                    </div>
                    <a href="https://wa.me/${o.fornecedores?.whatsapp?.replace(/\D/g,'')}" target="_blank" class="buy-button">Comprar no WhatsApp</a>
                </div>`;
            };

            document.getElementById('gridReal').innerHTML = listaBRL.map(buildCard).join('');
            document.getElementById('gridDolar').innerHTML = [...listaUSD, ...realParaDireita].map(buildCard).join('');
            
            // REGRA DE COLAPSO: Se não houver Dólar, Real ocupa tudo
            const colD = document.getElementById('colDolar');
            const layout = document.getElementById('layoutPrincipal');
            if(listaUSD.length === 0) {
                colD.classList.add('hidden');
                layout.classList.replace('lg:grid-cols-2', 'lg:grid-cols-1');
            } else {
                colD.classList.remove('hidden');
                layout.classList.replace('lg:grid-cols-1', 'lg:grid-cols-2');
            }
        }

        function popularAparelhos() { let c = document.getElementById('f_cat').value; let f = c ? todosProdutosMestre.filter(x => x.grupo_id == c) : todosProdutosMestre; document.getElementById('f_prod').innerHTML = '<option value="">Modelos...</option>' + f.map(x => `<option value="${x.id}">${x.nome}</option>`).join(''); renderizarRanking(); }
        function atualizarFiltrosCascata() { renderizarRanking(); }
        function abrirCalc() { document.getElementById('calcModal').classList.remove('hidden'); }
        function fecharCalc() { document.getElementById('calcModal').classList.add('hidden'); }
        function calcularImportacao() { let usd = parseFloat(document.getElementById('calcUsd').value); if(!usd || !currentUsdtRate) return; let res = (usd * (currentUsdtRate + 0.07)) * 1.06; document.getElementById('calcResult').innerText = res.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' }); }
        function logout() { localStorage.removeItem('iFipe_Token'); window.location.replace('index.html'); }
    </script>
</body>
</html>
