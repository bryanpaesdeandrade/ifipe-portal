<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Buscador VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #38383a; --input: #2c2c2e; }
        body.light-mode { --bg: #f5f5f7; --card: #fff; --text: #1d1d1f; --border: #d2d2d7; --input: #e8e8ed; }
        
        body { background: var(--bg); color: var(--text); font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin:0; transition: 0.3s; }
        .nav-bar { background:rgba(28,28,30,0.8); backdrop-filter:blur(15px); border-bottom:1px solid var(--border); padding:15px 30px; position:sticky; top:0; z-index:100; display: flex; flex-direction: column; gap: 10px; align-items: center; text-align: center; }
        body.light-mode .nav-bar { background: rgba(255,255,255,0.8); }
        
        @media (min-width: 768px) {
            .nav-bar { flex-direction: row; justify-content: space-between; text-align: left; }
            .nav-left, .nav-right { width: 30%; }
            .nav-center { width: 40%; display: flex; justify-content: center; }
            .nav-right { display: flex; justify-content: flex-end; align-items: center; gap: 15px; }
        }
        
        .filter-bar { background: var(--card); padding:15px; border-radius:16px; margin-top:20px; border:1px solid var(--border); }
        .apple-input { background: var(--input); border:1px solid var(--border); border-radius:10px; padding:10px; width:100%; color: var(--text); outline:none; font-size:12px; text-align:center; }
        .product-card { background: var(--card); border: 1px solid var(--border); border-radius:16px; padding:15px; transition:0.3s; position:relative; overflow:hidden; }
        .product-card:hover { border-color:#0071e3; transform:translateY(-4px); }
        .tag-status { font-size:8px; font-weight:900; text-transform:uppercase; padding:4px 8px; border-radius:50px; letter-spacing:0.05em; display:inline-block; margin-bottom: 3px; }
        .tag-menor { background:#ff3b30; color:#fff; }
        .tag-poucas { background:#ffcc00; color:#000; }
        .tag-muitas { background:#0071e3; color:#fff; }
        .tag-alto { background:#32d74b; color:#000; }
        .price-text { font-size:26px; font-weight:900; color: var(--text); letter-spacing:-0.05em; }
        .buy-button { background:#0071e3; color:#fff; font-weight:900; border-radius:50px; padding:10px; width:100%; cursor:pointer; text-transform:uppercase; font-size:11px; transition:0.3s; margin-top:12px; display:block; text-align:center; text-decoration:none; }
        
        .theme-toggle { background: var(--input); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 50px; cursor: pointer; font-size: 14px; display: flex; align-items: center; gap: 5px; font-weight: 700; transition: 0.3s; }
        
        .btn-wpp-float { position: fixed; bottom: 20px; right: 20px; background-color: #25d366; color: #fff; width: 50px; height: 50px; border-radius: 50px; display: flex; align-items: center; justify-content: center; text-decoration: none; box-shadow: 0 4px 15px rgba(0,0,0,0.4); z-index: 1000; transition: width 0.3s ease; overflow: hidden; white-space: nowrap; }
        .btn-wpp-float:hover { width: 170px; padding-left: 15px; justify-content: flex-start; }
        .wpp-text { font-size: 11px; font-weight: 900; text-transform: uppercase; margin-left: 10px; opacity: 0; transition: 0.3s; }
        .btn-wpp-float:hover .wpp-text { opacity: 1; }
    </style>
</head>
<body>

    <nav class="nav-bar">
        <div class="nav-left"><h1 class="text-2xl font-black italic m-0">iFipe</h1></div>
        <div class="nav-center">
            <div class="flex items-center gap-3 bg-[#1c1c1e] p-2 px-4 rounded-lg border border-[#38383a]">
                <a href="https://wa.me/+15616760652" target="_blank" class="text-[10px] font-black text-[#ffcc00] uppercase tracking-widest" style="text-decoration: none;">COMPRAR USDT COM ORÁCULO</a>
                <span class="text-[12px] md:text-[14px] font-black text-[#32d74b]" id="ticker">$ --</span>
            </div>
        </div>
        <div class="nav-right mt-2 md:mt-0">
            <button onclick="toggleTheme()" id="themeBtn" class="theme-toggle">🌙 Modo</button>
            <button onclick="logout()" class="text-red-500 font-black uppercase text-[10px] ml-4">Sair</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 pb-20">
        <div class="filter-bar grid grid-cols-2 md:grid-cols-7 gap-3">
            <div class="filter-item"><label class="block text-[8px] uppercase font-black text-gray-500 mb-1 text-center">Aparelho</label><select id="f_produto" class="apple-input" onchange="renderizarRanking()"><option value="">Todos</option></select></div>
            <div class="filter-item"><label class="block text-[8px] uppercase font-black text-gray-500 mb-1 text-center">Condição</label><select id="f_condicao" class="apple-input" onchange="renderizarRanking()"><option value="">Todas</option><option value="Novo">Novo</option><option value="Seminovo">Seminovo</option><option value="CPO">CPO</option></select></div>
            <div class="filter-item"><label class="block text-[8px] uppercase font-black text-gray-500 mb-1 text-center">Memória</label><select id="f_capacidade" class="apple-input" onchange="renderizarRanking()"><option value="">Todas</option></select></div>
            <div class="filter-item"><label class="block text-[8px] uppercase font-black text-gray-500 mb-1 text-center">Cor</label><select id="f_cor" class="apple-input" onchange="renderizarRanking()"><option value="">Todas</option></select></div>
            <div class="filter-item"><label class="block text-[8px] uppercase font-black text-gray-500 mb-1 text-center">Região</label><select id="f_regiao" class="apple-input" onchange="renderizarRanking()"><option value="">Todas</option></select></div>
            <div class="filter-item"><label class="block text-[8px] uppercase font-black text-gray-500 mb-1 text-center">Atacadista</label><select id="f_lojista" class="apple-input" onchange="renderizarRanking()"><option value="">Todos</option></select></div>
            <div class="filter-item"><label class="block text-[8px] uppercase font-black text-gray-500 mb-1 text-center">Cidade</label><select id="f_cidade_lojista" class="apple-input" onchange="renderizarRanking()"><option value="">Todas</option></select></div>
        </div>
        <div id="rankingGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 mt-8"></div>
    </main>

    <a href="https://wa.me/556896003049?text=Ol%C3%A1,%20preciso%20de%20suporte%20no%20Buscador%20iFipe!" target="_blank" class="btn-wpp-float">
        <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 16 16"><path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326z"/></svg>
        <span class="wpp-text">Suporte iFipe</span>
    </a>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let ofertasAtuais = []; let gradeVariacoes = [];

        function toggleTheme() {
            const b = document.body;
            b.classList.toggle('light-mode');
            const isLight = b.classList.contains('light-mode');
            document.getElementById('themeBtn').innerText = isLight ? "☀️ Modo" : "🌙 Modo";
            localStorage.setItem('iFipe_Theme', isLight ? 'light' : 'dark');
        }

        async function init() {
            if(localStorage.getItem('iFipe_Theme') === 'light') toggleTheme();
            const socket = new WebSocket('wss://stream.binance.com:9443/ws/usdtbrl@ticker');
            socket.onmessage = (e) => { document.getElementById('ticker').innerText = `$ ${parseFloat(JSON.parse(e.data).c).toFixed(4).replace('.',',')}`; };
            const [p, v, r, f] = await Promise.all([_s.from('produtos_mestre').select('id, nome').order('nome'), _s.from('variacoes').select('*'), _s.from('regioes').select('id, nome, bandeira'), _s.from('fornecedores').select('id, nome, verificado, cidade').eq('ativo', true).order('nome')]);
            gradeVariacoes = v.data;
            document.getElementById('f_produto').innerHTML += p.data.map(x => `<option value="${x.id}">${x.nome}</option>`).join('');
            document.getElementById('f_regiao').innerHTML += r.data.map(x => `<option value="${x.id}">${x.bandeira} ${x.nome}</option>`).join('');
            document.getElementById('f_lojista').innerHTML += f.data.map(x => `<option value="${x.id}">${x.nome}</option>`).join('');
            carregarDados(); setInterval(carregarDados, 5000);
        }

        async function carregarDados() { 
            const { data } = await _s.from('ofertas').select('*, fornecedores(id, nome, whatsapp, verificado, cidade), variacoes(tamanho, capacidade, cor, produtos_mestre(id, nome)), regioes(nome, bandeira)'); 
            ofertasAtuais = data || []; renderizarRanking(); 
        }

        function renderizarRanking() { 
            const fP = document.getElementById('f_produto').value; 
            let filtrados = ofertasAtuais.filter(o => o.quantidade > 0 && (!fP || o.variacoes.produtos_mestre.id == fP));
            let menoresPrecos = {};
            filtrados.forEach(o => {
                let chave = `${o.variacao_id}_${o.condicao}`;
                if (!menoresPrecos[chave] || o.preco < menoresPrecos[chave]) menoresPrecos[chave] = o.preco;
            });
            filtrados.sort((a,b) => a.preco - b.preco);
            document.getElementById('rankingGrid').innerHTML = filtrados.map(o => {
                let tagEstoque = o.quantidade <= 3 ? `<span class="tag-status tag-poucas">APENAS ${o.quantidade} UN</span>` : o.quantidade <= 10 ? `<span class="tag-status tag-muitas">EM ESTOQUE ${o.quantidade} UN</span>` : `<span class="tag-status tag-alto">ALTO ESTOQUE ${o.quantidade} UN</span>`;
                let tagMenor = o.preco === menoresPrecos[`${o.variacao_id}_${o.condicao}`] ? '<span class="tag-status tag-menor">🔥 MENOR PREÇO</span>' : '';
                const selo = o.fornecedores.verificado ? '<span style="background:#ffcc00; color:#000;" class="rounded px-1 py-0.5 text-[7px] font-black uppercase ml-1">✔️ VERIFICADO</span>' : '';
                const detalhes = [o.variacoes.tamanho, o.variacoes.capacidade, o.variacoes.cor, o.condicao].filter(Boolean).join(' | ');
                const msg = `Olá tudo bem! encontrei no *https://ifipe.com.br/* o produto ${o.variacoes.produtos_mestre.nome} (${detalhes}) pelo valor de R$ ${o.preco.toLocaleString('pt-BR')}`;
                return `<div class="product-card">
                    <div class="flex flex-wrap gap-1 mb-3">${tagEstoque} ${tagMenor}</div>
                    <h2 class="text-lg font-black leading-tight">${o.variacoes.produtos_mestre.nome}</h2>
                    <p class="text-[9px] text-gray-400 font-bold mt-1">${detalhes}</p>
                    <div class="mt-4"><p class="text-[9px] text-blue-500 font-bold">ATACADISTA: ${o.fornecedores.nome} ${selo}</p>
                    <div class="price-text">R$ ${o.preco.toLocaleString('pt-BR')}</div></div>
                    <a href="https://wa.me/${o.fornecedores.whatsapp.replace(/\D/g,'')}?text=${encodeURIComponent(msg)}" target="_blank" class="buy-button">Comprar Agora</a>
                </div>`;
            }).join(''); 
        }

        function logout() { localStorage.removeItem('iFipe_Token'); window.location.replace('index.html'); }
        init();
    </script>
</body>
</html>
