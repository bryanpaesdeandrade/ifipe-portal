<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Buscador VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #38383a; --input: #2c2c2e; }
        body.light-mode { --bg: #f5f5f7; --card: #fff; --text: #1d1d1f; --border: #d2d2d7; --input: #e8e8ed; }
        body { background: var(--bg); color: var(--text); font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin:0; transition: 0.3s; }
        
        .nav-bar { background:rgba(28, 28, 30, 0.8); backdrop-filter:blur(15px); border-bottom:1px solid var(--border); padding:15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:100; flex-wrap: wrap; gap: 10px;}
        .filter-bar { background: var(--card); padding:15px; border-radius:16px; margin-top:20px; border:1px solid var(--border); }
        .apple-input { background: var(--input); border: 1px solid var(--border); border-radius: 10px; padding: 10px; width: 100%; color: var(--text); outline: none; font-size: 12px; text-align: center; }
        
        .product-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 15px; transition: 0.3s; position: relative; }
        .product-card:hover { border-color: #0071e3; transform: translateY(-4px); }
        
        .tag-status { font-size: 8px; font-weight: 900; text-transform: uppercase; padding: 4px 8px; border-radius: 50px; letter-spacing: 0.05em; display: inline-block; margin-bottom: 3px; }
        .tag-menor { background: #ff3b30; color: #fff; }
        .tag-poucas { background: #ffcc00; color: #000; }
        .tag-muitas { background: #0071e3; color: #fff; }
        .tag-estoque-alto { background: #32d74b; color: #000; }
        
        /* MOLDURAS (MINI-TAGS) */
        .mini-tag { font-size: 8px; font-weight: 900; text-transform: uppercase; padding: 4px 6px; border-radius: 6px; background: var(--input); color: #86868b; border: 1px solid var(--border); display: inline-flex; align-items: center; justify-content: center; }
        .mini-tag.active { color: #fff; border-color: #0071e3; background: rgba(0, 113, 227, 0.2); }
        .mini-tag.usdt { color: #32d74b; border-color: #32d74b; background: rgba(50, 215, 75, 0.1); }
        .mini-tag.lote { color: #5e5ce6; border-color: #5e5ce6; background: rgba(94, 92, 230, 0.1); }
        .mini-tag.bat { color: #32d74b; border-color: #32d74b; background: rgba(50, 215, 75, 0.1); }
        .mini-tag.gar { color: #ffcc00; border-color: #ffcc00; background: rgba(255, 204, 0, 0.1); }
        .mini-tag.fab { color: #d2d2d7; border-color: #86868b; background: rgba(134, 134, 139, 0.1); }
        
        .price-text { font-size: 26px; font-weight: 900; color: var(--text); letter-spacing: -0.05em; }
        .buy-button { background: #0071e3; color: #fff; font-weight: 900; border-radius: 50px; padding: 12px; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 11px; text-align: center; display: block; text-decoration: none; margin-top: 12px; transition: 0.3s; letter-spacing: 0.05em; }
        .buy-button:hover { background: #005bb5; }
        
        .section-title { font-size: 11px; font-weight: 900; text-transform: uppercase; color: #86868b; margin: 40px 0 15px 5px; display: flex; align-items: center; gap: 10px; }
        .section-title::after { content: ""; height: 1px; background: var(--border); flex-grow: 1; }
        .hidden { display: none !important; }
        .theme-toggle { background: var(--input); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 50px; cursor: pointer; font-size: 14px; font-weight: 700; }

        /* BOTÃO WHATSAPP RETRÁTIL (SUPORTE) */
        .btn-wpp-float { position: fixed; bottom: 20px; right: 20px; background-color: #25d366; color: #fff; width: 50px; height: 50px; border-radius: 50px; display: flex; align-items: center; justify-content: center; text-decoration: none; box-shadow: 0 4px 15px rgba(0,0,0,0.4); z-index: 1000; transition: width 0.3s ease; overflow: hidden; white-space: nowrap; }
        .btn-wpp-float svg { flex-shrink: 0; width: 24px; height: 24px; }
        .wpp-text { font-size: 11px; font-weight: 900; text-transform: uppercase; margin-left: 10px; opacity: 0; transition: 0.3s; }
        .btn-wpp-float:hover { width: 150px; padding-left: 15px; justify-content: flex-start; }
        .btn-wpp-float:hover .wpp-text { opacity: 1; }
    </style>
</head>
<body>

            <div><label class="block text-[8px] uppercase font-black text-gray-500 mb-1 text-center">Aparelho</label><select id="f_prod" class="apple-input" onchange="atualizarFiltrosCascata()"><option value="">Todos</option></select></div>
            <div>
                <label class="block text-[8px] uppercase font-black text-gray-500 mb-1 text-center">Condição</label>
                <select id="f_cond" class="apple-input" onchange="renderizarRanking()">
                    <option value="">Todas</option><option value="Novo">Novo</option><option value="Seminovo">Seminovo</option>
                    <option value="CPO">CPO</option><option value="Apple As Is">Apple As Is</option>

                </select>
            </div>
            <div><label class="block text-[8px] uppercase font-black text-gray-500 mb-1 text-center">Memória</label><select id="f_cap" class="apple-input" onchange="renderizarRanking()"><option value="">Todas</option></select></div>
            <div><label class="block text-[8px] uppercase font-black text-gray-500 mb-1 text-center">Cor</label><select id="f_cor" class="apple-input" onchange="renderizarRanking()"><option value="">Todas</option></select></div>
            <div><label class="block text-[8px] uppercase font-black text-gray-500 mb-1 text-center">Origem</label><select id="f_reg" class="apple-input" onchange="renderizarRanking()"><option value="">Todas</option></select></div>
            <div><label class="block text-[8px] uppercase font-black text-gray-500 mb-1 text-center">Atacadista</label><select id="f_lojista" class="apple-input" onchange="renderizarRanking()"><option value="">Todos</option></select></div>

        </div>

        <div id="secUS" class="hidden"><h3 class="section-title">🇺🇸 RANKING MIAMI (DÓLAR $)</h3><div id="gridUS" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div></div>
    </main>

    <a href="https://wa.me/556896003049?text=Ol%C3%A1%20venho%20do%20iFipe%20e%20preciso%20de%20suporte" target="_blank" class="btn-wpp-float">
        <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 16 16"><path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/></svg>
        <span class="wpp-text">Suporte iFipe</span>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let ofertasAtuais = []; let gradeVariacoes = []; let clienteLogado = null;

        function toggleTheme() {
            const b = document.body; b.classList.toggle('light-mode');
            const isLight = b.classList.contains('light-mode');
            document.getElementById('themeBtn').innerText = isLight ? "☀️ Modo" : "🌙 Modo";
            localStorage.setItem('iFipe_Theme', isLight ? 'light' : 'dark');
        }

        window.onload = async () => {
            if(localStorage.getItem('iFipe_Theme') === 'light') toggleTheme();
            const token = localStorage.getItem('iFipe_Token');
            if(!token) {
                window.location.replace('index.html');
            } else {
                const { data } = await _s.from('clientes_buscador').select('*').eq('id', token).single();
                if(data) clienteLogado = data;
                init();
            }
        };

        // GESTÃO DA CONTA DO CLIENTE
        function abrirConta() {
            if(!clienteLogado) return;
            document.getElementById('conta_whats').value = clienteLogado.whatsapp || '';
            document.getElementById('conta_senha').value = clienteLogado.senha || '';
            document.getElementById('contaModal').classList.remove('hidden');
        }

        function fecharConta() { document.getElementById('contaModal').classList.add('hidden'); }

        async function salvarConta(e) {
            e.preventDefault();
            const w = document.getElementById('conta_whats').value;
            const s = document.getElementById('conta_senha').value;
            const { error } = await _s.from('clientes_buscador').update({ whatsapp: w, senha: s }).eq('id', clienteLogado.id);
            if(!error) { 
                clienteLogado.whatsapp = w; 
                clienteLogado.senha = s; 
                fecharConta(); 
                alert("Conta atualizada com sucesso!"); 
            } else { alert("Erro ao atualizar dados."); }
        }

        async function init() {
            const socket = new WebSocket('wss://stream.binance.com:9443/ws/usdtbrl@ticker');
            socket.onmessage = (e) => { document.getElementById('ticker').innerText = `R$ ${parseFloat(JSON.parse(e.data).c).toFixed(4).replace('.',',')}`; };
            
            const [p, r, v, f] = await Promise.all([
                _s.from('produtos_mestre').select('*').order('nome'),
                _s.from('regioes').select('*').order('nome'),
                _s.from('variacoes').select('*'),
                _s.from('fornecedores').select('id, nome, cidade, verificado').eq('ativo', true)
            ]);
            
            gradeVariacoes = v.data;
            document.getElementById('f_prod').innerHTML += p.data.map(x => `<option value="${x.id}">${x.nome}</option>`).join('');
            
            const regioesFiltradas = r.data.filter(x => x.nome !== 'Miami' && !x.nome.includes('Ciudad'));
            document.getElementById('f_reg').innerHTML += regioesFiltradas.map(x => `<option value="${x.id}">${x.bandeira} ${x.nome}</option>`).join('');
            
            document.getElementById('f_lojista').innerHTML += f.data.map(x => `<option value="${x.id}">${x.nome} ${x.verificado ? '✔️' : ''}</option>`).join('');
            const cidades = [...new Set(f.data.map(x => x.cidade).filter(Boolean))].sort();
            document.getElementById('f_cid').innerHTML += cidades.map(c => `<option value="${c}">${c}</option>`).join('');
            
            carregarDados(); setInterval(carregarDados, 5000); // RECARREGA A CADA 5s (JOGO DE CADEIRAS)
        }

        function atualizarFiltrosCascata() {
            const pid = document.getElementById('f_prod').value;
            const vars = pid ? gradeVariacoes.filter(x => x.produto_id == pid) : gradeVariacoes;
            const caps = [...new Set(vars.map(x => x.capacidade).filter(Boolean))];
            const cores = [...new Set(vars.map(x => x.cor).filter(Boolean))];
            
            document.getElementById('f_cap').innerHTML = '<option value="">Todas</option>' + caps.map(c => `<option value="${c}">${c}</option>`).join('');
            document.getElementById('f_cor').innerHTML = '<option value="">Todas</option>' + cores.map(c => `<option value="${c}">${c}</option>`).join('');
            renderizarRanking();
        }

        async function carregarDados() {
            const { data } = await _s.from('ofertas').select('*, fornecedores(id, nome, whatsapp, verificado, cidade), variacoes(tamanho, capacidade, cor, produtos_mestre(id, nome)), regioes(nome, bandeira)');
            ofertasAtuais = data || []; 
            renderizarRanking();
        }

        function renderizarRanking() {
            const fP = document.getElementById('f_prod').value;
            const fC = document.getElementById('f_cond').value;
            const fCap = document.getElementById('f_cap').value;
            const fCor = document.getElementById('f_cor').value;
            const fReg = document.getElementById('f_reg').value;
            const fLoj = document.getElementById('f_lojista').value;
            const fCid = document.getElementById('f_cid').value;

            let filtrados = ofertasAtuais.filter(o => 
                o.quantidade > 0 && 
                (!fP || o.variacoes.produtos_mestre.id == fP) && 
                (!fC || o.condicao == fC) && 
                (!fCap || o.variacoes.capacidade == fCap) && 
                (!fCor || o.variacoes.cor == fCor) &&
                (!fReg || o.regiao_id == fReg) &&
                (!fLoj || o.fornecedor_id == fLoj) &&
                (!fCid || o.fornecedores.cidade == fCid)
            );

            const criarCard = (o, menorPreco) => {
                let moeda = o.moeda === 'USD' ? '$' : 'R$';
                
                // --- REGRA: TAGS TEMPORÁRIAS (PREÇO CAIU / PREÇO SUBIU) - DURA 15 MINUTOS ---
                let tagAlteracao = '';
                if(o.data_alteracao_preco && o.preco_anterior) {
                    const diffMinutos = (new Date() - new Date(o.data_alteracao_preco)) / 60000;
                    if(diffMinutos <= 15) {
                        if(o.preco < o.preco_anterior) {
                            tagAlteracao = `<span class="tag-status" style="background:#32d74b; color:#000;">📉 PREÇO CAIU</span>`;
                        } else if (o.preco > o.preco_anterior) {
                            // Se ele tentou burlar subindo o preço, o sistema dedura ele de vermelho!
                            tagAlteracao = `<span class="tag-status" style="background:#ff3b30; color:#fff;">📈 PREÇO SUBIU</span>`;
                        }
                    }
                }

                // TAGS PRINCIPAIS (ESTOQUE E MENOR PREÇO GERAL)
                let tagMenor = o.preco === menorPreco ? '<span class="tag-status tag-menor">🔥 MENOR PREÇO</span>' : '';
                let tagEstoque = '';
                if(o.quantidade <= 3) tagEstoque = `<span class="tag-status tag-poucas">APENAS ${o.quantidade} UN</span>`;
                else if(o.quantidade >= 4 && o.quantidade <= 10) tagEstoque = `<span class="tag-status tag-muitas">ESTOQUE ${o.quantidade} UN</span>`;
                else tagEstoque = `<span class="tag-status tag-estoque-alto">ALTO ESTOQUE ${o.quantidade} UN</span>`;

                let detalhes = [o.variacoes.capacidade, o.variacoes.cor, o.condicao].filter(Boolean).join(' | ');
                
                // MOLDURAS (MINI-TAGS) PARA ATRIBUTOS EXTRAS
                let txtBat = o.saude_bateria ? o.saude_bateria.replace('BATERIA ', '').replace('BAT. ', '') : '';
                let t_bat = txtBat ? `<span class="mini-tag bat">🔋 BATERIA: ${txtBat}</span>` : '';
                let t_gar = o.garantia ? `<span class="mini-tag gar">🛡️ GAR: ${o.garantia}</span>` : '';
                let t_fab = o.regioes ? `<span class="mini-tag fab">🌎 FAB: ${o.regioes.bandeira} ${o.regioes.nome}</span>` : '';

                let selo = o.fornecedores.verificado ? '<span style="background:#ffcc00; color:#000;" class="rounded px-1 py-0.5 text-[7px] font-black uppercase ml-1">✔️ Verificado</span>' : '';
                
                let t_col = o.aceita_coleta ? `<span class="mini-tag active">Coleta</span>` : '';
                let t_boy = o.tem_boy ? `<span class="mini-tag active">Motoboy</span>` : '';
                let t_usd = o.aceita_usdt ? `<span class="mini-tag usdt">USDT</span>` : '';
                let t_not = o.emite_nota ? `<span class="mini-tag active">NF</span>` : '';
                let t_env = o.faz_envio ? `<span class="mini-tag active">Envio</span>` : '';
                let t_pro = o.aceita_proposta ? `<span class="mini-tag lote">🤝 Negocia Qtd</span>` : '';
                
                let tagsStr = [t_bat, t_gar, t_fab, t_col, t_boy, t_usd, t_not, t_env, t_pro].filter(Boolean).join(' ');

                // MENSAGEM WHATSAPP CUSTOMIZADA PARA O LOJISTA
                let precoFormatado = `${moeda} ${o.preco.toLocaleString('pt-BR')}`;
                let msgTexto = `Olá tudo bem! encontrei seu anuncio de um ${o.variacoes.produtos_mestre.nome} | ${detalhes} pelo valor de ${precoFormatado} \n\nVENHO PELO *https://ifipe.com.br/*`;
                let linkWpp = `https://wa.me/${o.fornecedores.whatsapp.replace(/\D/g,'')}?text=${encodeURIComponent(msgTexto)}`;

                return `<div class="product-card">
                    <div class="flex flex-wrap gap-1 mb-2">${tagAlteracao} ${tagEstoque} ${tagMenor}</div>
                    
                    <h2 class="text-lg font-black leading-tight">${o.variacoes.produtos_mestre.nome}</h2>
                    <p class="text-[10px] text-gray-300 font-bold mt-1 uppercase tracking-wide mb-3">${detalhes}</p>
                    
                    <div class="flex flex-wrap gap-1.5 mb-3">${tagsStr}</div>
                    
                    <div class="mt-2 border-t border-[#38383a] pt-3">
                        <p class="text-[9px] text-blue-400 font-black uppercase tracking-widest">LOJA: ${o.fornecedores.nome} ${selo}</p>
                        <p class="text-[8px] text-gray-500 font-bold uppercase mb-1">Local: ${o.cidade || o.fornecedores.cidade}</p>
                        <div class="price-text">${precoFormatado}</div>
                    </div>
                    
                    <a href="${linkWpp}" target="_blank" class="buy-button">Comprar agora no WhatsApp</a>
                </div>`;
            };

            const processar = (lista, gId, sId) => {
                const sec = document.getElementById(sId); 
                if(lista.length === 0) { sec.classList.add('hidden'); return; } 
                sec.classList.remove('hidden');
                
                let menores = {}; 
                lista.forEach(o => { 
                    let k = `${o.variacao_id}_${o.condicao}`; 
                    if(!menores[k] || o.preco < menores[k]) menores[k] = o.preco; 
                });
                
                // REGRA DE OURO (JOGO DE CADEIRAS): Novo primeiro, depois os menores preços
                lista.sort((a,b) => {
                    if (a.condicao === 'Novo' && b.condicao !== 'Novo') return -1;
                    if (a.condicao !== 'Novo' && b.condicao === 'Novo') return 1;
                    return a.preco - b.preco; // O menor preço puxa pra cima na hora!
                });
                
                document.getElementById(gId).innerHTML = lista.map(o => criarCard(o, menores[`${o.variacao_id}_${o.condicao}`])).join('');
            };

            // SEPARAÇÃO INTELIGENTE POR MOEDA E REGIÃO
            const listaBRL = filtrados.filter(o => o.moeda === 'BRL');
            const listaUSD = filtrados.filter(o => o.moeda === 'USD');
            
            const listaMiami = listaUSD.filter(o => {
                const c1 = o.cidade ? o.cidade.toLowerCase() : '';
                const c2 = o.fornecedores.cidade ? o.fornecedores.cidade.toLowerCase() : '';
                return c1.includes('miami') || c2.includes('miami');
            });

            const listaPY = listaUSD.filter(o => {
                const c1 = o.cidade ? o.cidade.toLowerCase() : '';
                const c2 = o.fornecedores.cidade ? o.fornecedores.cidade.toLowerCase() : '';
                return !c1.includes('miami') && !c2.includes('miami');
            });

            processar(listaBRL, 'gridBR', 'secBR');
            processar(listaPY, 'gridPY', 'secPY');
            processar(listaMiami, 'gridUS', 'secUS');
        }

        function logout() { localStorage.removeItem('iFipe_Token'); window.location.replace('index.html'); }
    </script>
</body>
</html>
