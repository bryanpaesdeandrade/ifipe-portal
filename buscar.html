<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - O Buscador VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000000; --card: #1c1c1e; --text: #ffffff; --border: #38383a; --blue: #0071e3; }
        body { background: var(--bg); color: var(--text); font-family:-apple-system, sans-serif; margin:0; overflow-x: hidden; }
        .apple-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 1.5rem; transition: 0.3s; }
        .apple-input { background: #2c2c2e; border: 1px solid var(--border); border-radius: 12px; padding: 12px; width: 100%; color: var(--text); outline: none; font-size: 13px; text-transform: uppercase; }
        .apple-input:focus { border-color: var(--blue); }
        
        /* Grid de Cores (Bolinhas HEX) */
        .color-dot { width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.3); display: inline-block; box-shadow: 0 0 5px rgba(0,0,0,0.5); }
        
        /* Badges de Condição */
        .badge { font-size: 9px; font-weight: 900; padding: 3px 8px; border-radius: 5px; text-transform: uppercase; }
        .badge-novo { background: #32d74b; color: #000; }
        .badge-semi { background: #f59e0b; color: #000; }
        
        .price-tag { font-family: 'JetBrains Mono', monospace; font-weight: 800; color: #32d74b; font-size: 1.2rem; }
        
        /* Scroll e Botão Subir */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 10px; }
        #btnSubir { position: fixed; bottom: 20px; right: 20px; background: var(--blue); color: #fff; font-weight: 900; font-size: 10px; padding: 12px 18px; border-radius: 50px; cursor: pointer; z-index: 1000; text-transform: uppercase; border: none; transition: 0.3s; opacity: 0; pointer-events: none; }
        #btnSubir.show { opacity: 1; pointer-events: auto; }

        .hidden { display: none !important; }
    </style>
</head>
<body class="p-4 md:p-8">

    <button id="btnSubir" onclick="window.scrollTo({top:0, behavior:'smooth'})">⬆️ SUBIR</button>

    <div class="max-w-7xl mx-auto">
        <header class="flex flex-col lg:flex-row justify-between items-center mb-10 gap-6">
            <div>
                <h1 class="text-3xl font-black italic">iFipe <span class="text-blue-500">VIP</span></h1>
                <p class="text-[10px] text-gray-500 font-black uppercase tracking-widest mt-1">Busca Avançada de Atacado</p>
            </div>

            <div class="flex flex-wrap items-center justify-center gap-4">
                <div class="text-center bg-[#1c1c1e] p-2 px-4 rounded-xl border border-[#38383a]">
                    <p class="text-[8px] text-gray-500 font-black uppercase">Índice Online Binance</p>
                    <p id="tickerBinance" class="text-xs font-mono font-black text-yellow-400">R$ --</p>
                </div>
                <a href="https://wa.me/15616760652?text=Oráculo%20venho%20através%20do%20iFipe%20e%20quero%20comprar%20USDT" target="_blank" class="bg-green-900/30 text-green-400 px-4 py-2 rounded-xl border border-green-500/50 font-black text-[10px] uppercase hover:bg-green-900/50 transition flex items-center gap-2">
                    COMPRAR USDT COM ORÁCULO <span id="tVip" class="font-mono text-xs">R$ --</span>
                </a>
                <button onclick="logout()" class="text-[10px] text-red-500 font-black uppercase border border-red-500/20 px-4 py-2 rounded-full">Sair</button>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            
            <div class="lg:col-span-1 space-y-6">
                
                <div class="apple-card">
                    <h3 class="text-xs font-black uppercase text-blue-500 mb-6 italic">Filtrar Oráculo</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="text-[9px] font-black text-gray-500 uppercase ml-1">Modelo de iPhone</label>
                            <select id="filtroModelo" class="apple-input" onchange="renderizarOfertas()">
                                <option value="">Todos os Modelos</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="text-[9px] font-black text-gray-500 uppercase ml-1">Memória</label>
                                <select id="filtroCapacidade" class="apple-input" onchange="renderizarOfertas()">
                                    <option value="">Todas</option>
                                    <option value="64GB">64GB</option><option value="128GB">128GB</option><option value="256GB">256GB</option><option value="512GB">512GB</option><option value="1TB">1TB</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-[9px] font-black text-gray-500 uppercase ml-1">Condição</label>
                                <select id="filtroCondicao" class="apple-input" onchange="renderizarOfertas()">
                                    <option value="">Todas</option><option value="Novo">Novos</option><option value="Seminovo">Seminovos</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="apple-card border-green-600/30 bg-green-600/5">
                    <h3 class="text-[10px] font-black uppercase text-green-500 italic mb-4">CALCULADORA VIP PARA IPHONE</h3>
                    <div class="space-y-3">
                        <input type="number" id="calc_usd" class="apple-input font-mono text-center font-bold !bg-black" placeholder="Custo PY (US$)" oninput="executarCalculadora()">
                        
                        <div class="bg-black p-3 rounded-xl border border-[#38383a] text-center">
                            <span class="text-[8px] text-gray-400 uppercase block mb-1 font-bold">CUSTO ENTREGUE NO BRASIL</span>
                            <span id="res_custo" class="text-xl font-mono font-black text-[#32d74b]">R$ 0,00</span>
                        </div>

                        <div class="space-y-2 pt-2">
                            <div class="flex justify-between items-center bg-white/5 p-2 rounded-lg"><span class="text-[9px] font-bold text-gray-400">ALTO ATACADO</span><span id="res_alto" class="text-xs font-mono font-black">R$ 0,00</span></div>
                            <div class="flex justify-between items-center bg-white/5 p-2 rounded-lg"><span class="text-[9px] font-bold text-gray-400">ATACADO</span><span id="res_atacado" class="text-xs font-mono font-black text-yellow-400">R$ 0,00</span></div>
                            <div class="flex justify-between items-center bg-white/5 p-2 rounded-lg"><span class="text-[9px] font-bold text-gray-400">ATACAREJO</span><span id="res_atacarejo" class="text-xs font-mono font-black text-orange-400">R$ 0,00</span></div>
                            <div class="flex justify-between items-center bg-white/5 p-2 rounded-lg"><span class="text-[9px] font-bold text-gray-400">VAREJO</span><span id="res_varejo" class="text-xs font-mono font-black text-blue-400">R$ 0,00</span></div>
                        </div>
                    </div>
                </div>

            </div>

            <div class="lg:col-span-3">
                <div id="gridOfertas" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    </div>
            </div>

        </div>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let todasOfertas = [], taxaVipGlobal = 0;

        // Mapeamento HEX oficial para as bolinhas
        const getHex = c => {
            let s = (c||'').toUpperCase();
            if(s.includes('PRETO')||s.includes('BLACK')||s.includes('MEIA-NOITE')||s.includes('GRAFITE')) return '#191919';
            if(s.includes('BRANCO')||s.includes('WHITE')||s.includes('ESTELAR')||s.includes('NUVEM')) return '#f5f5f7';
            if(s.includes('AZUL')||s.includes('BLUE')||s.includes('PACÍFICO')||s.includes('SIERRA')) return '#215e7c';
            if(s.includes('VERDE')||s.includes('GREEN')||s.includes('ALPINO')) return '#505c4c';
            if(s.includes('NATURAL')||s.includes('TITÂNIO NATURAL')) return '#8c8c88';
            if(s.includes('DOURADO')||s.includes('GOLD')||s.includes('DESERTO')) return '#ccb390';
            if(s.includes('ROSA')||s.includes('PINK')) return '#e6c7c2';
            if(s.includes('ROXO')||s.includes('PURPLE')||s.includes('PROFUNDO')) return '#5c5b57';
            if(s.includes('PRATEADO')||s.includes('SILVER')) return '#e3e4e5';
            return '#808080';
        };

        async function init() {
            const role = localStorage.getItem('iFipe_Role');
            if(!role) return window.location.href = 'index.html';

            // Binance Ticker
            new WebSocket('wss://stream.binance.com:9443/ws/usdtbrl@ticker').onmessage = e => {
                let b = parseFloat(JSON.parse(e.data).c);
                taxaVipGlobal = b + 0.06;
                document.getElementById('tickerBinance').innerText = `R$ ${b.toFixed(4)}`;
                document.getElementById('tVip').innerText = `R$ ${taxaVipGlobal.toFixed(4)}`;
                executarCalculadora();
            };

            const [pData, oData] = await Promise.all([
                _s.from('produtos_mestre').select('*').order('nome'),
                _s.from('ofertas').select('*, variacoes(capacidade, cor, produtos_mestre(nome)), fornecedores(nome, verificado, whatsapp), regioes(bandeira)').eq('status_aprovacao', 'aprovado').order('preco', {ascending: true})
            ]);

            document.getElementById('filtroModelo').innerHTML += pData.data.map(p => `<option value="${p.nome}">${p.nome}</option>`).join('');
            todasOfertas = oData.data || [];
            renderizarOfertas();
        }

        function renderizarOfertas() {
            const mod = document.getElementById('filtroModelo').value;
            const cap = document.getElementById('filtroCapacidade').value;
            const con = document.getElementById('filtroCondicao').value;

            const filtradas = todasOfertas.filter(o => {
                const matchMod = !mod || o.variacoes.produtos_mestre.nome === mod;
                const matchCap = !cap || o.variacoes.capacidade === cap;
                const matchCon = !con || (con === 'Novo' ? o.condicao === 'Novo' : o.condicao !== 'Novo');
                return matchMod && matchCap && matchCon;
            });

            document.getElementById('gridOfertas').innerHTML = filtradas.map(o => {
                const precoExibicao = o.moeda === 'BRL' ? o.preco : (o.preco * taxaVipGlobal * 1.06);
                const colorHex = getHex(o.variacoes.cor);
                
                return `
                <div class="apple-card hover:scale-[1.02] cursor-pointer">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="badge ${o.condicao === 'Novo' ? 'badge-novo' : 'badge-semi'}">${o.condicao}</span>
                            <h2 class="font-black text-sm mt-1 uppercase italic">${o.variacoes.produtos_mestre.nome}</h2>
                            <p class="text-[10px] text-gray-500 font-bold uppercase">${o.regioes.bandeira} ${o.variacoes.capacidade}</p>
                        </div>
                        <div class="text-right">
                            <div class="color-dot" style="background-color: ${colorHex}"></div>
                            <p class="text-[8px] text-gray-500 font-bold uppercase mt-1">${o.variacoes.cor}</p>
                        </div>
                    </div>

                    <div class="bg-black/40 p-3 rounded-xl mb-4 border border-white/5">
                        <p class="text-[9px] text-gray-500 font-black uppercase">Preço Atacado</p>
                        <p class="price-tag">R$ ${precoExibicao.toLocaleString('pt-BR', {minimumFractionDigits: 2})}</p>
                        <p class="text-[8px] text-gray-600 font-bold uppercase">${o.moeda === 'USD' ? '* Conversão Taxa VIP + Envio' : 'Preço Final em BRL'}</p>
                    </div>

                    <div class="flex justify-between items-center">
                        <div>
                            <p class="text-[8px] text-gray-500 font-black uppercase">Lojista</p>
                            <p class="text-[10px] font-bold">${o.fornecedores.nome} ${o.fornecedores.verificado ? '✅' : ''}</p>
                        </div>
                        <a href="https://wa.me/${o.fornecedores.whatsapp.replace(/\D/g,'')}" target="_blank" class="bg-blue-600 px-3 py-1.5 rounded-lg text-[9px] font-black uppercase hover:bg-blue-500">Chamar</a>
                    </div>
                    
                    ${o.condicao !== 'Novo' ? `
                    <div class="mt-3 pt-3 border-t border-white/5 flex gap-4">
                         <div><p class="text-[7px] text-gray-600 font-black uppercase">Bateria</p><p class="text-[9px] font-bold">${o.saude_bateria || '--'}</p></div>
                         <div><p class="text-[7px] text-gray-600 font-black uppercase">Garantia</p><p class="text-[9px] font-bold">${o.garantia || '--'}</p></div>
                    </div>` : ''}
                </div>
                `;
            }).join('');
        }

        function executarCalculadora() {
            const u = parseFloat(document.getElementById('calc_usd').value);
            if(!u || !taxaVipGlobal) return;

            const custoBase = (u * taxaVipGlobal) * 1.06;
            const round10 = val => Math.round(val / 10) * 10;

            document.getElementById('res_custo').innerText = custoBase.toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
            document.getElementById('res_alto').innerText = round10(custoBase + 200).toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
            document.getElementById('res_atacado').innerText = round10(custoBase + 350).toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
            document.getElementById('res_atacarejo').innerText = round10(custoBase + 500).toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
            document.getElementById('res_varejo').innerText = round10(custoBase + 1000).toLocaleString('pt-BR', {style: 'currency', currency: 'BRL'});
        }

        window.onscroll = function() {
            const btn = document.getElementById("btnSubir");
            if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) btn.classList.add("show");
            else btn.classList.remove("show");
        };

        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
        window.onload = init;
    </script>
</body>
</html>
