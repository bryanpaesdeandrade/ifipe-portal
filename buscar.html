<!DOCTYPE html>

<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>iFipe - Buscador VIP</title>



    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">



    <style>

        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #38383a; --input: #2c2c2e; --blue-apple: #0071e3; }

        body.light-mode { --bg: #f5f5f7; --card: #fff; --text: #1d1d1f; --border: #d2d2d7; --input: #e8e8ed; }

        body { background: var(--bg); color: var(--text); font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin:0; transition: 0.3s; }



        .nav-bar { background:rgba(28, 28, 30, 0.8); backdrop-filter:blur(15px); border-bottom:1px solid var(--border); padding:15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top:0; z-index:100; flex-wrap: wrap; gap: 10px;}

        .filter-bar { background: var(--card); padding:15px; border-radius:16px; margin-top:20px; border:1px solid var(--border); }

        .apple-input { background: var(--input); border: 1px solid var(--border); border-radius: 10px; padding: 10px; width: 100%; color: var(--text); outline: none; font-size: 12px; text-align: center; }



        .product-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 12px; transition: 0.3s; position: relative; }

        .product-card:hover { border-color: #0071e3; transform: translateY(-4px); }



        .tag-status { font-size: 8px; font-weight: 900; text-transform: uppercase; padding: 4px 8px; border-radius: 50px; letter-spacing: 0.05em; display: inline-block; margin-bottom: 3px; }

        .tag-menor { background: #ff3b30; color: #fff; }

        .tag-poucas { background: #ffcc00; color: #000; }

        .tag-muitas { background: #0071e3; color: #fff; }

        .tag-estoque-alto { background: #32d74b; color: #000; }



        .hidden { display: none !important; }

        .btn-header { display: flex; align-items: center; justify-content: center; border-radius: 12px; height: 38px; padding: 0 12px; transition: 0.3s; border: 1px solid var(--border); text-decoration: none; gap: 6px; }

        .btn-calc-top { background: rgba(0, 113, 227, 0.1); color: #0071e3; }

        .btn-calc-top:hover { background: #0071e3; color: #fff; }

        .btn-wpp-top { background: rgba(37, 211, 102, 0.1); color: #25d366; }

        .btn-wpp-top:hover { background: #25d366; color: #fff; }

        .btn-header span { font-size: 10px; font-weight: 900; text-transform: uppercase; }



        .custom-scroll::-webkit-scrollbar { width: 4px; }

        .custom-scroll::-webkit-scrollbar-track { background: var(--input); border-radius: 10px; }

        .custom-scroll::-webkit-scrollbar-thumb { background: #0071e3; border-radius: 10px; }



        @keyframes likePulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .like-anim { animation: likePulse 0.3s ease-in-out; }



        .btn-scroll-top { position: fixed; bottom: 80px; right: 20px; background-color: var(--card); border: 1px solid var(--border); color: var(--text); width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 999; transition: 0.3s; opacity: 0; pointer-events: none; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }

        .btn-scroll-top.show { opacity: 1; pointer-events: auto; }

        .btn-scroll-top:hover { background-color: #0071e3; border-color: #0071e3; color: #fff; }



        .btn-alerta-card { position: absolute; top: 12px; right: 12px; background: rgba(255, 204, 0, 0.1); border: 1px solid rgba(255, 204, 0, 0.3); border-radius: 50px; padding: 4px 8px; display: flex; align-items: center; gap: 4px; cursor: pointer; transition: 0.3s; }

        .btn-alerta-card:hover { background: rgba(255, 204, 0, 0.2); border-color: #ffcc00; }

        .btn-alerta-card svg { width: 12px; height: 12px; fill: #ffcc00; }



        .search-suggestion-item { padding: 12px 20px; border-bottom: 1px solid #f0f0f0; cursor: pointer; font-weight: 900; font-size: 13px; text-transform: uppercase; transition: 0.2s; color: #1d1d1f; }

        .search-suggestion-item:hover { background-color: #f5f5f7; color: #0071e3; }

        .search-suggestion-item:last-child { border-bottom: none; }



        .color-dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; vertical-align: middle; border: 1px solid rgba(255,255,255,0.2); box-shadow: 0 0 5px rgba(0,0,0,0.5); }



        .badge-insignia { display: inline-flex; align-items: center; background: rgba(147, 51, 234, 0.15); color: #d8b4fe; border: 1px solid #9333ea; font-size: 8px; font-weight: 900; padding: 3px 6px; border-radius: 6px; margin-right: 4px; margin-bottom: 4px; letter-spacing: 0.5px; text-transform: uppercase; }

    </style>

</head>



<body id="appBody">

<div id="mainContent" class="hidden">



<nav class="nav-bar">

    <div class="flex items-center gap-2 sm:gap-3">

        <h1 class="text-2xl font-black italic m-0 mr-2">iFipe</h1>

        <button onclick="abrirCalc()" class="btn-header btn-calc-top">

            <span>Calculadora VIP</span>

        </button>

        <a href="https://wa.me/556896003049" target="_blank" class="btn-header btn-wpp-top">

            <span>Suporte</span>

        </a>

    </div>



    <div class="flex gap-4 items-center">

        <button onclick="abrirSininho()" class="text-[10px] text-yellow-500 font-black uppercase">🔔 Alertas</button>

        <button onclick="toggleTheme()" id="themeBtn">🌙</button>

        <button onclick="abrirConta()" class="text-[10px] text-blue-400 font-black uppercase">Conta</button>

        <button onclick="logout()" class="text-red-500 font-black text-[10px] uppercase">Sair</button>

    </div>

</nav>



<main class="max-w-7xl mx-auto px-4 pb-20 pt-8">

<div class="relative w-full max-w-3xl mx-auto mb-6">

    <input type="text" id="buscaTexto"

        class="w-full bg-white text-black px-6 py-4 outline-none font-black uppercase text-sm"

        placeholder="ENCONTRE O MELHOR PREÇO"

        oninput="mostrarSugestoes(this.value)">

    <div id="sugestoesBusca" class="hidden"></div>

</div>



<div class="filter-bar grid grid-cols-2 md:grid-cols-4 lg:grid-cols-8 gap-3 mb-6">

    <select id="f_cat" class="apple-input" onchange="popularAparelhos()">

        <option value="">Todas</option>

        <option value="1">IPHONE</option>

        <option value="2">APPLE WATCH</option>

        <option value="3">IPAD</option>

        <option value="4">MACBOOK</option>

        <option value="5">IMAC</option>

        <option value="6">ACESSÓRIOS</option>

        <option value="7">XIAOMI</option>

        <option value="8">REALME</option>

    </select>



    <select id="f_prod" class="apple-input" onchange="atualizarFiltrosCascata()">

        <option value="">Todos</option>

    </select>



    <select id="f_cond" class="apple-input" onchange="renderizarRanking()">

        <option value="">Todas</option>

        <option value="NOVO">Novo</option>

        <option value="SEMINOVO">Seminovo</option>

        <option value="CPO">CPO</option>

    </select>



    <select id="f_cap" class="apple-input" onchange="renderizarRanking()">

        <option value="">Todas</option>

    </select>



    <select id="f_cor" class="apple-input" onchange="renderizarRanking()">

        <option value="">Todas</option>

    </select>

</div>



<div id="gridGeral" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>

</main>

<button id="scrollTopBtn" class="btn-scroll-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>



</div>



<script>

const _s = supabase.createClient(

 'https://zmgosywpwidypxyhxkry.supabase.co',

 'SUA_CHAVE_PUBLICA'

);



let ofertasAtuais = [];

let gradeVariacoes = [];

let clienteLogado = null;

let todosProdutosMestre = [];

let currentUsdtRate = 0;



function normalizeString(str){

 return str ? str.normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase() : '';

}

window.onload = async () => {

 const token = localStorage.getItem('iFipe_Token');

 if(!token){

   window.location.replace('index.html');

   return;

 }



 if(token === 'admin_bypass'){

   clienteLogado = { id:'admin_bypass', nome:'MASTER' };

   initApp();

   return;

 }



 const { data } = await _s.from('clientes_buscador').select('*').eq('id',token).single();

 if(data && data.ativo !== false){

   clienteLogado = data;

   initApp();

 } else {

   logout();

 }

};



function logout(){

 localStorage.removeItem('iFipe_Token');

 window.location.replace('index.html');

}

async function initApp(){

 document.getElementById('mainContent').classList.remove('hidden');



 const p = await _s.from('produtos_mestre').select('*').order('nome');

 const v = await _s.from('variacoes').select('*');



 todosProdutosMestre = p.data || [];

 gradeVariacoes = v.data || [];



 document.getElementById('f_prod').innerHTML += todosProdutosMestre.map(x =>

   `<option value="${x.id}">${x.nome}</option>`

 ).join('');



 carregarDados();

 setInterval(carregarDados,5000);

}

async function carregarDados(){

 const { data } = await _s.from('ofertas')

   .select('*, variacoes(*, produtos_mestre(*)), fornecedores(*)')

   .gt('quantidade',0);



 ofertasAtuais = data || [];

 renderizarRanking();

}



function renderizarRanking(){

 const grid = document.getElementById('gridGeral');

 if(ofertasAtuais.length === 0){

   grid.innerHTML = '<p>Nenhuma oferta encontrada</p>';

   return;

 }



 grid.innerHTML = ofertasAtuais.map(o => `

   <div class="product-card">

     <h2>${o.variacoes.produtos_mestre.nome}</h2>

     <p>${o.variacoes.capacidade || ''}</p>

     <strong>R$ ${o.preco}</strong>

   </div>

 `).join('');

}

function popularAparelhos(){

 const cat = document.getElementById('f_cat').value;

 const filtrados = cat ? todosProdutosMestre.filter(p=>p.grupo_id==cat) : todosProdutosMestre;

 document.getElementById('f_prod').innerHTML =

   '<option value="">Todos</option>' +

   filtrados.map(p=>`<option value="${p.id}">${p.nome}</option>`).join('');

}



function atualizarFiltrosCascata(){

 renderizarRanking();

}

function mostrarSugestoes(txt){

 if(!txt || txt.length < 2) return;

}



</script>

</body>

</html>
