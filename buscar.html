<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Buscador VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background:#000; color:#fff; font-family:-apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; margin:0; }
        
        .nav-bar { background:rgba(28,28,30,0.8); backdrop-filter:blur(15px); border-bottom:1px solid #38383a; padding:15px 30px; position:sticky; top:0; z-index:100; }
        .filter-bar { background:#1c1c1e; padding:20px; border-radius:20px; margin-top:20px; border:1px solid #38383a; }
        .apple-input { background:#2c2c2e; border:1px solid #38383a; border-radius:12px; padding:12px; width:100%; color:white; outline:none; font-size:13px; }
        
        .product-card { background:#1c1c1e; border:1px solid #38383a; border-radius:24px; padding:20px; transition:0.3s; position:relative; overflow:hidden; }
        .product-card:hover { border-color:#0071e3; transform:translateY(-5px); }
        .tag-status { font-size:9px; font-weight:900; text-transform:uppercase; padding:5px 10px; border-radius:50px; letter-spacing:0.1em; display:inline-block; margin-bottom: 4px; }
        
        .tag-menor { background:#ff3b30; color:#fff; }
        .tag-subiu { background:#ff3b30; color:#fff; }
        .tag-caiu { background:#32d74b; color:#000; }
        .tag-poucas { background:#ffcc00; color:#000; }
        .tag-muitas { background:#0071e3; color:#fff; }
        .tag-disponivel { background:#38383a; color:#fff; }

        .price-text { font-size:32px; font-weight:900; color:#fff; letter-spacing:-0.05em; }
        
        .buy-button { background:#0071e3; color:#fff; font-weight:900; border-radius:50px; padding:14px; width:100%; cursor:pointer; text-transform:uppercase; font-size:12px; transition:0.3s; margin-top:20px; display:block; text-align:center; text-decoration:none; }
        .buy-button:hover { background:#32d74b; color:#000; transform: translateY(-2px); box-shadow: 0 4px 15px rgba(50, 215, 75, 0.4); }

        .ticker-link { color:#ffcc00; font-size:11px; font-weight:900; text-transform:uppercase; text-decoration:none; letter-spacing:0.1em; transition: 0.3s; }
        .ticker-link:hover { color: #fff; }
        label { display:block; text-transform:uppercase; font-size:9px; color:#86868b; margin-bottom:5px; font-weight:900; letter-spacing:0.1em; }
    </style>
</head>
<body>

    <nav class="nav-bar flex flex-col md:flex-row justify-between items-center gap-4">
        <div class="w-full md:w-1/3 flex justify-between md:block items-center">
            <h1 class="text-2xl font-black italic">iFipe</h1>
            <button onclick="logout()" class="md:hidden text-[10px] text-red-500 font-black uppercase tracking-widest">Sair</button>
        </div>
        <div class="w-full md:w-1/3 flex justify-center items-center gap-3 whitespace-nowrap bg-[#1c1c1e] md:bg-transparent p-2 md:p-0 rounded-lg">
            <a href="https://wa.me/+15616760652" target="_blank" class="ticker-link text-[10px] md:text-[11px]">COMPRAR USDT COM ORÁCULO</a>
            <span class="text-[12px] md:text-[14px] font-black text-[#32d74b] monospace" id="ticker">$ --</span>
        </div>
        <div class="w-full md:w-1/3 text-right hidden md:block">
            <button onclick="logout()" class="text-[10px] text-red-500 font-black uppercase tracking-widest transition-colors hover:text-white">Sair</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 pb-20">
        <div class="filter-bar grid grid-cols-2 md:grid-cols-5 gap-4">
            <div><label>Aparelho</label><select id="f_produto" class="apple-input" onchange="atualizarFiltrosCascata()"><option value="">Todos</option></select></div>
            <div><label>Condição</label><select id="f_condicao" class="apple-input" onchange="renderizarRanking()"><option value="">Todas</option><option value="Novo">Novo</option><option value="Seminovo">Seminovo</option></select></div>
            <div><label>Memória/Tamanho</label><select id="f_capacidade" class="apple-input" onchange="renderizarRanking()"><option value="">Todas</option></select></div>
            <div><label>Cor</label><select id="f_cor" class="apple-input" onchange="renderizarRanking()"><option value="">Todas</option></select></div>
            <div><label>Região</label><select id="f_regiao" class="apple-input" onchange="renderizarRanking()"><option value="">Todas</option></select></div>
        </div>

        <div id="rankingGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-10"></div>
    </main>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let ofertasAtuais = [];
        let historicoPrecos = {};
        let gradeVariacoes = [];

        function initTicker() {
            const socket = new WebSocket('wss://stream.binance.com:9443/ws/usdtbrl@ticker');
            socket.onmessage = (e) => {
                const d = JSON.parse(e.data);
                document.getElementById('ticker').innerText = `$ ${parseFloat(d.c).toFixed(4).replace('.',',')}`;
            };
        }

        async function init() {
            initTicker();
            const [p, v, r] = await Promise.all([
                _s.from('produtos_mestre').select('id, nome').order('nome'),
                _s.from('variacoes').select('*'), // Carrega tudo para a mágica da cascata
                _s.from('regioes').select('id, nome, bandeira')
            ]);
            
            gradeVariacoes = v.data;

            document.getElementById('f_produto').innerHTML += p.data.map(x => `<option value="${x.id}">${x.nome}</option>`).join('');
            document.getElementById('f_regiao').innerHTML += r.data.map(x => `<option value="${x.id}">${x.bandeira} ${x.nome}</option>`).join('');
            
            atualizarFiltrosCascata(); // Ativa os filtros iniciais
            carregarDados();
            setInterval(carregarDados, 5000); 
        }

        // LÓGICA DE CASCATA: Filtra opções baseado no aparelho escolhido
        function atualizarFiltrosCascata() {
            const pid = document.getElementById('f_produto').value;
            const selectCap = document.getElementById('f_capacidade');
            const selectCor = document.getElementById('f_cor');
            
            const capAtual = selectCap.value;
            const corAtual = selectCor.value;

            let vars = gradeVariacoes;
            if (pid) { vars = vars.filter(x => x.produto_id == pid); }

            // Junta tamanho (Mac/Watch) e capacidade (iPhone) no mesmo filtro de forma inteligente
            const caps = [...new Set(vars.map(x => x.capacidade || x.tamanho).filter(Boolean))];
            const cores = [...new Set(vars.map(x => x.cor).filter(Boolean))];

            selectCap.innerHTML = '<option value="">Todas</option>' + caps.map(c => `<option value="${c}" ${c === capAtual ? 'selected' : ''}>${c}</option>`).join('');
            selectCor.innerHTML = '<option value="">Todas</option>' + cores.map(c => `<option value="${c}" ${c === corAtual ? 'selected' : ''}>${c}</option>`).join('');
            
            renderizarRanking();
        }

        async function carregarDados() {
            const { data } = await _s.from('ofertas').select('*, fornecedores(nome, whatsapp), variacoes(tamanho, capacidade, cor, produtos_mestre(id, nome)), regioes(nome, bandeira)').order('preco', {ascending: true});
            ofertasAtuais = data || [];
            renderizarRanking();
        }

        function renderizarRanking() {
            const grid = document.getElementById('rankingGrid');
            const fP = document.getElementById('f_produto').value;
            const fC = document.getElementById('f_condicao').value;
            const fCap = document.getElementById('f_capacidade').value;
            const fCor = document.getElementById('f_cor').value;
            const fR = document.getElementById('f_regiao').value;

            let filtrados = ofertasAtuais.filter(o => 
                (o.quantidade > 0) &&
                (!fP || o.variacoes.produtos_mestre.id == fP) &&
                (!fC || o.condicao == fC) &&
                (!fCap || o.variacoes.capacidade == fCap || o.variacoes.tamanho == fCap) &&
                (!fCor || o.variacoes.cor == fCor) &&
                (!fR || o.regiao_id == fR)
            );

            grid.innerHTML = filtrados.map((o, index) => {
                const isMenorPreco = index === 0;
                
                let tagEstoque = '';
                if (o.quantidade < 5) {
                    tagEstoque = `<span class="tag-status tag-poucas">POUCAS UNIDADES</span>`;
                } else if (o.quantidade >= 7) {
                    tagEstoque = `<span class="tag-status tag-muitas">ALTO ESTOQUE</span>`;
                } else {
                    tagEstoque = `<span class="tag-status tag-disponivel">ESTOQUE DISPONÍVEL</span>`;
                }

                const tagPreco = historicoPrecos[o.id] ? (o.preco > historicoPrecos[o.id] ? '<span class="tag-status tag-subiu">SUBIU</span>' : (o.preco < historicoPrecos[o.id] ? '<span class="tag-status tag-caiu">CAIU</span>' : '')) : '';
                historicoPrecos[o.id] = o.preco;

                const detalhes = [o.variacoes.tamanho, o.variacoes.capacidade, o.variacoes.cor, o.condicao.toUpperCase()].filter(Boolean).join(' | ');

                return `
                <div class="product-card">
                    <div class="flex justify-between items-start mb-4">
                        <div class="flex flex-col gap-1">
                            ${isMenorPreco ? '<span class="tag-status tag-menor">MENOR PREÇO</span>' : ''}
                            ${tagEstoque}
                            ${tagPreco}
                        </div>
                        <span class="text-[20px]">${o.regioes.bandeira}</span>
                    </div>
                    
                    <h2 class="text-xl font-black">${o.variacoes.produtos_mestre.nome}</h2>
                    <p class="text-[10px] text-gray-400 uppercase font-bold tracking-widest mb-4">${detalhes}</p>
                    
                    <p class="text-[10px] text-blue-500 font-bold uppercase mb-1">ATACADISTA: ${o.fornecedores.nome}</p>
                    <div class="price-text">R$ ${o.preco.toLocaleString('pt-BR')}</div>
                    
                    <a href="https://wa.me/${o.fornecedores.whatsapp.replace(/\D/g,'')}" target="_blank" class="buy-button">COMPRAR AGORA</a>
                </div>`;
            }).join('');
        }

        function logout() { localStorage.removeItem('iFipe_Token'); window.location.replace('index.html'); }
        
        window.onload = () => {
            if(!localStorage.getItem('iFipe_Token')) {
                window.location.replace('index.html');
                return;
            }
            init();
        };
    </script>
</body>
</html>
