<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - BUSCADOR DE ATACADO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #000; --card: #1c1c1e; --text: #fff; --border: #38383a; --blue: #0071e3; }
        body { background: var(--bg); color: var(--text); font-family:-apple-system, sans-serif; margin:0; text-transform: uppercase; }
        .apple-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 1.2rem; transition: 0.3s; position: relative; }
        .apple-card:hover { border-color: var(--blue); transform: translateY(-4px); }
        .apple-input { background: #2c2c2e; border: 1px solid var(--border); border-radius: 12px; padding: 10px; width: 100%; color: var(--text); outline: none; font-size: 11px; text-transform: uppercase; text-align: center; }
        .color-dot { width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.4); display: inline-block; vertical-align: middle; box-shadow: 0 0 5px #000; margin-right: 6px; }
        .price-tag { font-family: 'JetBrains Mono'; font-weight: 800; color: #32d74b; font-size: 1.3rem; }
        .tag-status { font-size: 7px; font-weight: 900; padding: 3px 8px; border-radius: 50px; display: inline-block; margin-bottom: 5px; }
        .mini-tag { font-size: 7px; font-weight: 900; padding: 3px 6px; border-radius: 4px; background: #2c2c2e; color: #86868b; border: 1px solid var(--border); }
        .mini-tag.active { color: #fff; border-color: var(--blue); background: rgba(0, 113, 227, 0.2); }
        .mini-tag.negocia { border-color: #f59e0b; color: #f59e0b; background: rgba(245, 158, 11, 0.1); }
        
        /* Badges Lojista */
        .badge-verificado { font-size: 7px; font-weight: 900; padding: 2px 6px; border-radius: 4px; background: rgba(50, 215, 75, 0.2); color: #32d74b; border: 1px solid #32d74b; margin-left: 4px; display: inline-flex; align-items: center; gap: 2px; }
        .insignia-badge { font-size: 7px; font-weight: 900; padding: 2px 6px; border-radius: 4px; margin-top: 4px; display: inline-block; border: 1px solid rgba(255,255,255,0.2); }
        .califa { color: #f43f5e; border-color: #f43f5e; background: rgba(244, 63, 94, 0.1); }
        .rei { color: #3b82f6; border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); }
        .magnata { color: #f59e0b; border-color: #f59e0b; background: rgba(245, 158, 11, 0.1); }
        
        #badgeSino { background: #ff3b30; color: #fff; font-size: 8px; width: 16px; height: 16px; border-radius: 50%; display: flex; align-items: center; justify-content: center; position: absolute; top: -5px; right: -5px; font-weight: 900; }
        .hidden { display: none !important; }
        
        #btnSubir { position: fixed; bottom: 20px; right: 20px; background: var(--blue); color: #fff; font-weight: 900; font-size: 10px; padding: 12px 18px; border-radius: 50px; cursor: pointer; z-index: 1000; opacity: 0; pointer-events: none; transition: 0.3s; border: none; }
        #btnSubir.show { opacity: 1; pointer-events: auto; }
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--blue); border-radius: 10px; }
    </style>
</head>
<body class="p-4 md:p-6">

    <button id="btnSubir" onclick="window.scrollTo({top:0, behavior:'smooth'})">⬆️ SUBIR</button>

    <nav class="max-w-[1400px] mx-auto bg-black border-b border-[#38383a] p-4 mb-8 flex flex-col md:flex-row justify-between items-center gap-6 rounded-2xl">
        <div class="flex items-center gap-6">
            <h1 class="text-3xl font-black italic">iFipe</h1>
            <div class="flex gap-4 border-l border-[#38383a] pl-4">
                <button onclick="abrirFipe()" class="text-[9px] font-black text-blue-400 uppercase">📊 PREÇO MÉDIO</button>
                <div class="relative">
                    <button onclick="abrirAlertas()" class="text-[9px] font-black text-yellow-500 uppercase">🔔 ALERTAS</button>
                    <span id="badgeSino" class="hidden">0</span>
                </div>
            </div>
        </div>
        <div class="flex flex-wrap gap-4 items-center">
            <a href="https://wa.me/15616760652?text=QUERO%20COMPRAR%20USDT" target="_blank" class="bg-green-900/30 text-green-400 px-4 py-2 rounded-xl border border-green-500/50 font-black text-[9px] hover:bg-green-900/50 transition">
                COMPRAR USDT COM ORÁCULO <span id="tOra" class="text-xs font-mono ml-2">R$ --</span>
            </a>
            <button onclick="logout()" class="text-[9px] text-red-500 font-black border border-red-500/20 px-4 py-2 rounded-full">SAIR</button>
        </div>
    </nav>

    <main class="max-w-[1400px] mx-auto grid grid-cols-1 lg:grid-cols-4 gap-8">
        <aside class="space-y-6">
            <div class="apple-card">
                <h3 class="text-xs font-black text-blue-500 mb-6 italic">BUSCA INTELIGENTE</h3>
                <input type="text" id="q" class="apple-input mb-4" placeholder="MODELO OU COR..." oninput="filtrar()">
                <div class="space-y-3">
                    <select id="fMod" class="apple-input" onchange="filtrar()"><option value="">TODOS OS MODELOS</option></select>
                    <select id="fCap" class="apple-input" onchange="filtrar()"><option value="">TODAS AS MEMÓRIAS</option></select>
                    <button onclick="abrirAlertaModal()" class="w-full bg-yellow-500 text-black font-black py-3 rounded-xl text-[9px]">➕ CRIAR MONITORAMENTO</button>
                </div>
            </div>
        </aside>

        <div class="lg:col-span-9">
            <div id="grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5"></div>
        </div>
    </main>

    <div id="modalAlerta" class="hidden fixed inset-0 bg-black/95 flex items-center justify-center z-[3000] p-4">
        <div class="apple-card max-w-[350px] w-full border-yellow-500 text-center">
            <h3 class="text-sm font-black text-yellow-500 mb-4">CRIAR ALERTA DE PREÇO</h3>
            <select id="aMod" class="apple-input mb-2"></select>
            <input type="number" id="aPreco" class="apple-input mb-4" placeholder="AVISE-ME SE CHEGAR EM R$..." min="1">
            <button onclick="salvarAlerta()" class="apple-button bg-yellow-500 w-full mb-2">ATIVAR MONITORAMENTO</button>
            <button onclick="document.getElementById('modalAlerta').classList.add('hidden')" class="text-[9px] text-gray-500 font-black">CANCELAR</button>
        </div>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let todas = [], rate = 0, user = null, alertas = [], ranks = {};

        const rnd10 = v => Math.round(v / 10) * 10;
        const getHex = c => { let s=(c||'').toUpperCase(); if(s.includes('PRETO')) return '#191919'; if(s.includes('BRANCO')) return '#f5f5f7'; if(s.includes('AZUL')) return '#215e7c'; if(s.includes('NATURAL')) return '#8c8c88'; if(s.includes('DESERTO')||s.includes('DOURADO')) return '#ccb390'; return '#808080'; };
        
        // Pega a bandeira baseada no país do fornecedor
        const getBandeira = pais => { let p = (pais||'').toUpperCase(); if(p.includes('BRASIL')) return '🇧🇷'; if(p.includes('EUA')) return '🇺🇸'; if(p.includes('PARAGUAI')) return '🇵🇾'; if(p.includes('DUBAI')) return '🇦🇪'; return '🌎'; };

        async function init() {
            const token = localStorage.getItem('iFipe_Token');
            const {data:cl} = await _s.from('clientes_buscador').select('*').eq('id', token).single();
            user = cl;

            new WebSocket('wss://stream.binance.com:9443/ws/usdtbrl@ticker').onmessage = e => {
                rate = parseFloat(JSON.parse(e.data).c);
                document.getElementById('tOra').innerText = `R$ ${(rate+0.06).toFixed(4)}`;
                render();
            };

            const [p, o, a, v] = await Promise.all([ 
                _s.from('produtos_mestre').select('*').order('nome'), 
                _s.from('ofertas').select('*, variacoes(capacidade, cor, produtos_mestre(nome)), fornecedores(*), regioes(*)').eq('status_aprovacao', 'aprovado'),
                _s.from('alertas_preco').select('*, produtos_mestre(nome)').eq('cliente_id', user.id),
                _s.from('variacoes').select('capacidade')
            ]);
            
            document.getElementById('fMod').innerHTML += p.data.map(x=>`<option value="${x.nome}">${x.nome}</option>`).join('');
            document.getElementById('aMod').innerHTML = p.data.map(x=>`<option value="${x.id}">${x.nome}</option>`).join('');
            document.getElementById('fCap').innerHTML += [...new Set(v.data.map(x=>x.capacidade))].sort().map(c=>`<option value="${c}">${c}</option>`).join('');
            
            todas = o.data || []; alertas = a.data || [];
            
            // Calculando o peso (Insignias) de cada Lojista
            todas.forEach(of => {
                let id = of.fornecedores.id;
                if(!ranks[id]) ranks[id] = 0;
                ranks[id] += of.quantidade;
            });

            updateSino(); render();
        }

        function render() {
            const txt = document.getElementById('q').value.toUpperCase(), m = document.getElementById('fMod').value, cp = document.getElementById('fCap').value;
            
            // JOGO DE CADEIRAS: Verificados (Peso 3) > Insignia (Peso 2) > Preço (Peso 1)
            const res = todas.filter(o => (o.variacoes.produtos_mestre.nome.includes(txt) || o.variacoes.cor.includes(txt)) && (!m || o.variacoes.produtos_mestre.nome === m) && (!cp || o.variacoes.capacidade === cp))
            .sort((a,b) => {
                // 1. Verificados primeiro
                if(a.fornecedores.verificado !== b.fornecedores.verificado) return b.fornecedores.verificado ? 1 : -1;
                // 2. Maior Estoque (Insignia)
                if(ranks[a.fornecedores.id] !== ranks[b.fornecedores.id]) return ranks[b.fornecedores.id] - ranks[a.fornecedores.id];
                // 3. Menor preço
                return a.preco - b.preco;
            });

            document.getElementById('grid').innerHTML = res.map(o => {
                const final = rnd10(o.moeda === 'BRL' ? o.preco : (o.preco * (rate + 0.06) * 1.06));
                
                // Insígnias
                let stock = ranks[o.fornecedores.id];
                let insignia = '';
                if(stock >= 1000) insignia = '<span class="insignia-badge califa">👑 CALIFA (+1K)</span>';
                else if(stock >= 200) insignia = '<span class="insignia-badge rei">🛡️ REI (+200)</span>';
                else if(stock >= 50) insignia = '<span class="insignia-badge magnata">💰 MAGNATA (+50)</span>';

                // Localização Real
                let loc = `${getBandeira(o.fornecedores.pais)} | ${o.fornecedores.cidade} - ${o.fornecedores.estado}`;

                return `
                <div class="apple-card flex flex-col">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <span class="text-[8px] font-black uppercase text-green-400 border border-green-400 px-2 rounded-full">${o.condicao}</span>
                            <h2 class="font-black text-sm mt-1 italic">${o.variacoes.produtos_mestre.nome}</h2>
                            <p class="text-[9px] text-gray-500 font-black">${o.regioes.bandeira} AP DO(A) ${o.regioes.nome}</p>
                        </div>
                        <div class="text-right">
                            <div class="color-dot" style="background:${getHex(o.variacoes.cor)}"></div>
                            <p class="text-[7px] text-gray-500 font-bold mt-1">${o.variacoes.capacidade}</p>
                        </div>
                    </div>
                    <div class="bg-black/40 p-3 rounded-xl mb-4 border border-white/5">
                        <p class="text-[8px] text-gray-500 font-black">ATACADO BRASIL</p>
                        <p class="price-tag">R$ ${final.toLocaleString('pt-BR')}</p>
                    </div>
                    <div class="flex flex-wrap gap-1 mb-4">
                        ${o.aceita_proposta?'<span class="badge-negocia">🤝 NEGOCIA QTD</span>':''}
                        <span class="mini-tag active font-mono">${loc}</span>
                    </div>
                    <div class="mt-auto border-t border-white/5 pt-3">
                        <div class="flex justify-between items-center">
                            <div>
                                <p class="text-[7px] text-[#25d366] font-black uppercase flex items-center">
                                    ${o.fornecedores.nome} 
                                    ${o.fornecedores.verificado?'<span class="badge-verificado"><span>✓</span> VERIFICADO</span>':''}
                                </p>
                                ${insignia}
                            </div>
                            <a href="https://wa.me/${o.fornecedores.whatsapp.replace(/\D/g,'')}?text=VIM%20PELO%20IFIPE" target="_blank" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-[9px] font-black">CHAMAR</a>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function abrirAlertaModal() { document.getElementById('modalAlerta').classList.remove('hidden'); }
        async function salvarAlerta() {
            await _s.from('alertas_preco').insert([{ cliente_id: user.id, produto_id: document.getElementById('aMod').value, preco_desejado: document.getElementById('aPreco').value, capacidade: 'TODAS' }]);
            alert("MONITORAMENTO ATIVADO!"); window.location.reload();
        }
        function updateSino() { const s = document.getElementById('badgeSino'); if(alertas.length > 0) { s.innerText = alertas.length; s.classList.remove('hidden'); } }
        function logout() { localStorage.clear(); window.location.href = 'index.html'; }
        window.onscroll = () => document.getElementById('btnSubir').classList.toggle('show', window.scrollY > 300);
        window.onload = init;
    </script>
</body>
</html>
