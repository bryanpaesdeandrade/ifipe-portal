<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anúncios em Massa - iFipe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- ExcelJS e FileSaver para geração de planilha inteligente -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .card { background: #1c1c1e; border: 1px solid #38383a; border-radius: 24px; padding: 2rem; }
        .btn-large { background: #0071e3; color: white; font-weight: 800; padding: 1.5rem; border-radius: 20px; font-size: 1.2rem; transition: 0.3s; border: none; cursor: pointer; width: 100%; }
        .btn-large:hover { background: #005bb5; transform: scale(1.02); }
        .btn-outline { background: transparent; border: 2px solid #38383a; color: white; font-weight: 700; padding: 0.75rem 1.5rem; border-radius: 50px; transition: 0.3s; cursor: pointer; }
        .btn-outline:hover { border-color: #0071e3; color: #0071e3; }
        .log-area { background: #111; border: 1px solid #2c2c2e; border-radius: 12px; padding: 1rem; font-family: monospace; font-size: 0.8rem; height: 200px; overflow-y: auto; white-space: pre-wrap; }
        .progress-bar { height: 8px; background: #2c2c2e; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: #0071e3; width: 0%; transition: width 0.2s; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-4xl mx-auto">

        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl md:text-4xl font-black italic">ANÚNCIOS EM MASSA <span class="text-blue-500">⚡</span></h1>
            <button onclick="window.close()" class="btn-outline text-sm px-4 py-2">
                <i class="fas fa-times mr-2"></i>FECHAR
            </button>
        </div>

        <!-- Verificação de login silenciosa -->
        <div id="auth-warning" class="hidden card !p-4 mb-6 text-red-500 border-red-500/30">
            <i class="fas fa-exclamation-triangle mr-2"></i> Você não está logado como anunciante. Redirecionando...
        </div>

        <!-- Botões principais -->
        <div class="grid md:grid-cols-2 gap-6 mb-10">
            <button onclick="baixarPlanilha()" class="btn-large flex items-center justify-center gap-3">
                <i class="fas fa-download text-2xl"></i> 1. BAIXAR PLANILHA DE ESTOQUE
            </button>
            <label class="btn-large flex items-center justify-center gap-3 cursor-pointer bg-white text-black hover:bg-gray-200">
                <i class="fas fa-upload text-2xl"></i> 2. SUBIR ESTOQUE PREENCHIDO
                <input type="file" id="fileInput" class="hidden" accept=".xlsx" onchange="processarUpload(event)">
            </label>
        </div>

        <!-- Área de log e progresso (inicialmente oculta) -->
        <div id="logContainer" class="hidden card space-y-4">
            <h3 class="text-sm font-bold flex items-center gap-2"><i class="fas fa-terminal text-green-500"></i> LOG DE PROCESSAMENTO</h3>
            <div id="logArea" class="log-area"></div>
            <div class="progress-bar">
                <div id="progressFill" class="progress-fill"></div>
            </div>
        </div>
    </div>

    <script>
        // Configuração Supabase
        const SUPABASE_URL = 'https://zmgosywpwidypxyhxkry.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M';
        const _s = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Variáveis globais
        let fornecedorId = null;
        let dadosMestre = { modelos: [], capacidades: [], cores: [], origens: [], condicoes: [], baterias: [], garantias: [] };
        let variacoes = [];
        let regioes = [];

        // Verificação de login
        (async function() {
            const token = localStorage.getItem('iFipe_Anunciante');
            const masterAuth = localStorage.getItem('iFipe_Master_Auth');
            if (!token && masterAuth !== 'gov_absoluto') {
                document.getElementById('auth-warning').classList.remove('hidden');
                setTimeout(() => window.location.href = 'index.html', 2000);
                return;
            }
            fornecedorId = token || (masterAuth === 'gov_absoluto' ? 1 : null);
            await carregarDados();
        })();

        async function carregarDados() {
            // Busca variações com produtos_mestre
            const { data: vars, error: errV } = await _s
                .from('variacoes')
                .select('id, capacidade, cor, produtos_mestre!inner(nome)');
            if (errV) console.error(errV);
            variacoes = vars || [];

            // Extrai listas únicas ordenadas
            const modelosSet = new Set();
            const capacidadesSet = new Set();
            const coresSet = new Set();
            variacoes.forEach(v => {
                if (v.produtos_mestre?.nome) modelosSet.add(v.produtos_mestre.nome);
                if (v.capacidade) capacidadesSet.add(v.capacidade);
                if (v.cor) coresSet.add(v.cor);
            });
            dadosMestre.modelos = Array.from(modelosSet).sort((a,b) => a.localeCompare(b));
            dadosMestre.capacidades = Array.from(capacidadesSet).sort((a,b) => a.localeCompare(b));
            dadosMestre.cores = Array.from(coresSet).sort((a,b) => a.localeCompare(b));

            // Busca regiões
            const { data: regs } = await _s.from('regioes').select('nome');
            regioes = regs || [];
            dadosMestre.origens = regioes.map(r => r.nome).sort((a,b) => a.localeCompare(b));

            // Listas fixas
            dadosMestre.condicoes = ['Novo', 'Seminovo', 'CPO', 'Grade A', 'Grade B', 'Grade C'];
            dadosMestre.baterias = ['Abaixo de 85%', 'Acima de 85%', 'Acima de 90%', 'Acima de 95%', 'Bateria em 100%'];
            dadosMestre.garantias = ['Sem garantia', '1 Mês', '2 Meses', '3 Meses', '6 Meses', '12 Meses'];
        }

        // Função para gerar planilha com validação de dados
        async function baixarPlanilha() {
            if (!dadosMestre.modelos.length) await carregarDados();

            const workbook = new ExcelJS.Workbook();
            
            // Aba BaseDB (oculta)
            const baseSheet = workbook.addWorksheet('BaseDB', { state: 'hidden' });
            baseSheet.columns = [
                { header: 'Modelos', key: 'modelos' },
                { header: 'Capacidades', key: 'capacidades' },
                { header: 'Cores', key: 'cores' },
                { header: 'Origens', key: 'origens' },
                { header: 'Condições', key: 'condicoes' },
                { header: 'Baterias', key: 'baterias' },
                { header: 'Garantias', key: 'garantias' }
            ];
            // Preencher com as listas (até 100 linhas)
            const maxLinhas = Math.max(
                dadosMestre.modelos.length,
                dadosMestre.capacidades.length,
                dadosMestre.cores.length,
                dadosMestre.origens.length,
                dadosMestre.condicoes.length,
                dadosMestre.baterias.length,
                dadosMestre.garantias.length
            );
            for (let i = 0; i < maxLinhas; i++) {
                baseSheet.addRow({
                    modelos: dadosMestre.modelos[i] || '',
                    capacidades: dadosMestre.capacidades[i] || '',
                    cores: dadosMestre.cores[i] || '',
                    origens: dadosMestre.origens[i] || '',
                    condicoes: dadosMestre.condicoes[i] || '',
                    baterias: dadosMestre.baterias[i] || '',
                    garantias: dadosMestre.garantias[i] || ''
                });
            }

            // Aba Estoque
            const estoqueSheet = workbook.addWorksheet('Estoque');
            estoqueSheet.columns = [
                { header: 'Modelo', key: 'modelo', width: 20 },
                { header: 'Capacidade', key: 'capacidade', width: 15 },
                { header: 'Cor', key: 'cor', width: 15 },
                { header: 'Condição', key: 'condicao', width: 15 },
                { header: 'Bateria', key: 'bateria', width: 20 },
                { header: 'Garantia', key: 'garantia', width: 15 },
                { header: 'Origem', key: 'origem', width: 20 },
                { header: 'Quantidade', key: 'quantidade', width: 12 },
                { header: 'Preço (BRL)', key: 'preco_brl', width: 15 },
                { header: 'Preço (USD)', key: 'preco_usd', width: 15 }
            ];

            // Aplicar data validation nas primeiras 100 linhas
            for (let i = 2; i <= 101; i++) { // linha 1 é cabeçalho
                // Modelo
                estoqueSheet.getCell(`A${i}`).dataValidation = {
                    type: 'list',
                    allowBlank: false,
                    formulae: [`=BaseDB!$A$2:$A$${dadosMestre.modelos.length+1}`]
                };
                // Capacidade
                estoqueSheet.getCell(`B${i}`).dataValidation = {
                    type: 'list',
                    allowBlank: false,
                    formulae: [`=BaseDB!$B$2:$B$${dadosMestre.capacidades.length+1}`]
                };
                // Cor
                estoqueSheet.getCell(`C${i}`).dataValidation = {
                    type: 'list',
                    allowBlank: false,
                    formulae: [`=BaseDB!$C$2:$C$${dadosMestre.cores.length+1}`]
                };
                // Condição
                estoqueSheet.getCell(`D${i}`).dataValidation = {
                    type: 'list',
                    allowBlank: false,
                    formulae: [`=BaseDB!$E$2:$E$${dadosMestre.condicoes.length+1}`]
                };
                // Bateria
                estoqueSheet.getCell(`E${i}`).dataValidation = {
                    type: 'list',
                    allowBlank: true,
                    formulae: [`=BaseDB!$F$2:$F$${dadosMestre.baterias.length+1}`]
                };
                // Garantia
                estoqueSheet.getCell(`F${i}`).dataValidation = {
                    type: 'list',
                    allowBlank: true,
                    formulae: [`=BaseDB!$G$2:$G$${dadosMestre.garantias.length+1}`]
                };
                // Origem
                estoqueSheet.getCell(`G${i}`).dataValidation = {
                    type: 'list',
                    allowBlank: false,
                    formulae: [`=BaseDB!$D$2:$D$${dadosMestre.origens.length+1}`]
                };
                // Quantidade (número inteiro)
                estoqueSheet.getCell(`H${i}`).dataValidation = {
                    type: 'whole',
                    allowBlank: false,
                    operator: 'greaterThan',
                    formulae: [0]
                };
                // Preço BRL (decimal)
                estoqueSheet.getCell(`I${i}`).dataValidation = {
                    type: 'decimal',
                    allowBlank: true,
                    operator: 'greaterThan',
                    formulae: [0]
                };
                // Preço USD (decimal)
                estoqueSheet.getCell(`J${i}`).dataValidation = {
                    type: 'decimal',
                    allowBlank: true,
                    operator: 'greaterThan',
                    formulae: [0]
                };
            }

            // Adicionar uma linha de exemplo (opcional)
            estoqueSheet.addRow({
                modelo: dadosMestre.modelos[0] || '',
                capacidade: dadosMestre.capacidades[0] || '',
                cor: dadosMestre.cores[0] || '',
                condicao: 'Novo',
                bateria: '',
                garantia: '1 ANO APPLE',
                origem: dadosMestre.origens[0] || '',
                quantidade: 10,
                preco_brl: 5299.00,
                preco_usd: ''
            });

            // Gerar arquivo
            const buffer = await workbook.xlsx.writeBuffer();
            const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
            saveAs(blob, 'estoque_ifipe.xlsx');
        }

        // Processar upload
        async function processarUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            // Mostrar container de log
            document.getElementById('logContainer').classList.remove('hidden');
            const logArea = document.getElementById('logArea');
            const progressFill = document.getElementById('progressFill');
            logArea.innerHTML = '';
            progressFill.style.width = '0%';

            function log(msg, tipo = 'info') {
                const cor = tipo === 'erro' ? 'text-red-400' : (tipo === 'ok' ? 'text-green-400' : 'text-blue-400');
                logArea.innerHTML += `<div class="${cor}">[${new Date().toLocaleTimeString()}] ${msg}</div>`;
                logArea.scrollTop = logArea.scrollHeight;
            }

            log('Lendo arquivo...');

            try {
                const workbook = new ExcelJS.Workbook();
                await workbook.xlsx.load(await file.arrayBuffer());
                const worksheet = workbook.getWorksheet('Estoque');
                if (!worksheet) {
                    log('Aba "Estoque" não encontrada.', 'erro');
                    return;
                }

                // Extrair linhas (pular cabeçalho)
                const rows = [];
                worksheet.eachRow({ includeEmpty: false }, (row, rowNumber) => {
                    if (rowNumber === 1) return; // cabeçalho
                    const values = row.values; // array com índice 1-based
                    rows.push({
                        modelo: values[1] || '',
                        capacidade: values[2] || '',
                        cor: values[3] || '',
                        condicao: values[4] || '',
                        bateria: values[5] || '',
                        garantia: values[6] || '',
                        origem: values[7] || '',
                        quantidade: values[8] || 0,
                        preco_brl: values[9] || 0,
                        preco_usd: values[10] || 0
                    });
                });

                log(`${rows.length} linhas encontradas. Iniciando processamento...`);

                // Buscar dados atualizados do banco (garantir que temos as listas)
                await carregarDados();

                let processados = 0;
                let sucessos = 0;
                let erros = 0;

                for (const [index, row] of rows.entries()) {
                    // Pular linhas totalmente vazias
                    if (!row.modelo && !row.capacidade && !row.cor && !row.condicao && !row.quantidade) {
                        continue;
                    }

                    // Encontrar variação
                    const variacao = variacoes.find(v => 
                        v.produtos_mestre?.nome?.toUpperCase() === String(row.modelo).toUpperCase().trim() &&
                        v.capacidade?.toUpperCase() === String(row.capacidade).toUpperCase().trim() &&
                        v.cor?.toUpperCase() === String(row.cor).toUpperCase().trim()
                    );

                    // Encontrar região
                    const regiao = regioes.find(r => 
                        r.nome?.toUpperCase() === String(row.origem).toUpperCase().trim()
                    );

                    if (!variacao || !regiao) {
                        log(`Linha ${index+2}: Modelo/Origem não reconhecido.`, 'erro');
                        erros++;
                        processados++;
                        progressFill.style.width = (processados / rows.length * 100) + '%';
                        continue;
                    }

                    // Validar condição
                    if (!row.condicao) {
                        log(`Linha ${index+2}: Condição não preenchida.`, 'erro');
                        erros++;
                        processados++;
                        progressFill.style.width = (processados / rows.length * 100) + '%';
                        continue;
                    }

                    // Determinar preço e moeda
                    let preco = 0, moeda = 'BRL';
                    if (parseFloat(row.preco_brl) > 0) {
                        preco = parseFloat(row.preco_brl);
                        moeda = 'BRL';
                    } else if (parseFloat(row.preco_usd) > 0) {
                        preco = parseFloat(row.preco_usd);
                        moeda = 'USD';
                    } else {
                        log(`Linha ${index+2}: Preço não informado.`, 'erro');
                        erros++;
                        processados++;
                        progressFill.style.width = (processados / rows.length * 100) + '%';
                        continue;
                    }

                    // Regras de negócio para Novo/CPO
                    let bateriaFinal = row.bateria || null;
                    let garantiaFinal = row.garantia || '1 ANO APPLE';
                    if (row.condicao === 'Novo' || row.condicao === 'CPO') {
                        bateriaFinal = null;
                        garantiaFinal = '1 ANO APPLE';
                    }

                    const payload = {
                        fornecedor_id: fornecedorId,
                        variacao_id: variacao.id,
                        regiao_id: regiao.id,
                        condicao: row.condicao,
                        preco: preco,
                        moeda: moeda,
                        quantidade: parseInt(row.quantidade) || 0,
                        saude_bateria: bateriaFinal,
                        garantia: garantiaFinal,
                        status_aprovacao: 'aprovado',
                        atualizado_em: new Date().toISOString()
                    };

                    try {
                        const { error } = await _s.from('ofertas').upsert(payload, {
                            onConflict: 'fornecedor_id, variacao_id, regiao_id, condicao'
                        });
                        if (error) throw error;
                        sucessos++;
                        log(`OK: ${row.modelo} ${row.capacidade} ${row.cor} - ${moeda} ${preco.toFixed(2)}`, 'ok');
                    } catch (err) {
                        erros++;
                        log(`ERRO: ${row.modelo} - ${err.message}`, 'erro');
                    }

                    processados++;
                    progressFill.style.width = (processados / rows.length * 100) + '%';
                }

                log(`Processamento concluído. Sucessos: ${sucessos}, Erros: ${erros}.`, sucessos > 0 ? 'ok' : 'erro');
                document.getElementById('fileInput').value = '';

            } catch (err) {
                log('Erro ao processar arquivo: ' + err.message, 'erro');
            }
        }
    </script>
</body>
</html>
