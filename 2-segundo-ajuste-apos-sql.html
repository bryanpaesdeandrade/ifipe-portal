<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Painel do Anunciante</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #000000; color: #ffffff; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .apple-card { background: #1c1c1e; border: 1px solid #38383a; border-radius: 28px; padding: 3rem; width: 95%; max-width: 550px; box-shadow: 0 25px 50px rgba(0,0,0,0.7); }
        .apple-input { background: #2c2c2e; border: 1px solid #38383a; border-radius: 14px; padding: 18px; width: 100%; color: white; outline: none; margin-bottom: 1.5rem; transition: 0.2s; font-size: 16px; }
        .apple-input:focus { border-color: #0071e3; background: #323235; }
        .apple-button { background: #ffffff; color: #000000; font-weight: 900; border-radius: 50px; padding: 20px; width: 100%; cursor: pointer; transition: 0.3s; margin-top: 1.5rem; text-transform: uppercase; letter-spacing: 1.5px; border: none; font-size: 14px; }
        .apple-button:hover { background: #0071e3; color: white; transform: translateY(-2px); }
        label { display: block; text-transform: uppercase; font-size: 11px; color: #86868b; margin-bottom: 8px; font-weight: 900; letter-spacing: 0.15em; margin-top: 1.5rem; }
        .hidden { display: none !important; }
        .status-msg { margin-top: 25px; text-align: center; font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="loginSection" class="apple-card text-center">
        <h1 class="text-5xl font-black italic mb-2 tracking-tighter italic">iFipe</h1>
        <p class="text-[10px] font-bold uppercase text-gray-400 mb-12 tracking-[0.4em]">Gestão do Anunciante Oficial</p>
        <div class="text-left">
            <label>Sua Loja (Nome ou ID)</label>
            <input type="text" id="loginId" class="apple-input" placeholder="Ex: JOGADOR">
            <label>Senha de Acesso</label>
            <input type="password" id="loginPass" class="apple-input" placeholder="••••••••">
        </div>
        <button onclick="fazerLogin()" class="apple-button">Acessar Painel</button>
        <p id="loginError" class="text-red-500 text-[10px] mt-6 font-bold uppercase tracking-widest"></p>
    </div>

    <div id="formSection" class="apple-card hidden">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h2 class="text-xl font-black italic">Painel do Anunciante</h2>
                <span id="welcomeMsg" class="text-blue-500 font-bold uppercase text-[9px] tracking-widest"></span>
            </div>
            <button onclick="location.reload()" class="text-[10px] text-gray-500 underline font-black uppercase hover:text-white transition">Sair</button>
        </div>

        <form id="priceForm">
            <label>Modelo do iPhone</label>
            <select id="produto_id" class="apple-input" required></select>

            <label>Capacidade e Cor (Filtrados)</label>
            <select id="variacao_id" class="apple-input" required disabled>
                <option value="">Escolha o modelo primeiro</option>
            </select>

            <label>Origem / Região</label>
            <select id="regiao_id" class="apple-input" required></select>

            <label>Valor de Venda (R$)</label>
            <input type="text" id="preco" class="apple-input" placeholder="Ex: 7.990,00" required>

            <button type="submit" class="apple-button">Publicar no Ranking</button>
        </form>
        <p id="status" class="status-msg"></p>
    </div>

    <script>
        const _supabase = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        let fornecedorLogado = null;

        async function fazerLogin() {
            const login = document.getElementById('loginId').value;
            const pass = document.getElementById('loginPass').value;
            const isNumeric = !isNaN(login) && login.trim() !== "";
            
            // BUSCA O FORNECEDOR E VERIFICA SE ESTÁ ATIVO
            const { data, error } = await _supabase.from('fornecedores').select('*').or(`id.eq.${isNumeric ? login : -1},nome.eq.${login}`).eq('senha', pass).maybeSingle();
            
            if (data) {
                if (!data.ativo) {
                    document.getElementById('loginError').innerText = "ACESSO SUSPENSO: FINANCEIRO PENDENTE.";
                    return;
                }
                fornecedorLogado = data;
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('formSection').classList.remove('hidden');
                document.getElementById('welcomeMsg').innerText = "Conectado: " + data.nome;
                carregarBases();
            } else { 
                document.getElementById('loginError').innerText = "Acesso Negado: Verifique seus dados."; 
            }
        }

        async function carregarBases() {
            const { data: m } = await _supabase.from('produtos_mestre').select('id, nome').order('id');
            const { data: r } = await _supabase.from('regioes').select('id, nome, bandeira').order('id');
            const { data: v } = await _supabase.from('variacoes').select('*').order('capacidade');
            
            const pS = document.getElementById('produto_id');
            const rS = document.getElementById('regiao_id');
            const vS = document.getElementById('variacao_id');

            pS.innerHTML = '<option value="">Escolha o Modelo</option>' + m.map(i => `<option value="${i.id}">${i.nome}</option>`).join('');
            rS.innerHTML = r.map(i => `<option value="${i.id}">${i.bandeira} ${i.nome}</option>`).join('');
            
            // INTELIGÊNCIA DE FILTRO CASADO: SÓ MOSTRA O QUE EXISTE NO SQL
            pS.onchange = (e) => {
                const filtradas = v.filter(item => item.produto_id == e.target.value);
                if (filtradas.length > 0) {
                    vS.innerHTML = '<option value="">Selecione Capacidade/Cor</option>' + 
                                  filtradas.map(item => `<option value="${item.id}">${item.capacidade} • ${item.cor}</option>`).join('');
                    vS.disabled = false;
                } else {
                    vS.innerHTML = '<option value="">Sem variações para este modelo</option>';
                    vS.disabled = true;
                }
            };
        }

        document.getElementById('priceForm').onsubmit = async (e) => {
            e.preventDefault();
            const status = document.getElementById('status');
            const precoLimpo = document.getElementById('preco').value.replace(/\./g, '').replace(',', '.'); 
            
            status.innerText = "Sincronizando com o Ranking...";
            status.style.color = "#86868b";

            // PUBLICAÇÃO COM SEGURANÇA
            const { error } = await _supabase.from('ofertas').insert([{
                fornecedor_id: fornecedorLogado.id,
                variacao_id: document.getElementById('variacao_id').value,
                regiao_id: document.getElementById('regiao_id').value,
                preco: parseFloat(precoLimpo)
            }]);

            if (error) { 
                status.innerText = "Falha na Publicação: Erro de conexão."; 
                status.style.color = "#ff3b30"; 
            } else { 
                status.innerText = "Preço Publicado com Sucesso! 🚀"; 
                status.style.color = "#32d74b"; 
                document.getElementById('preco').value = ""; // Limpa apenas o preço para nova inserção
            }
        };
    </script>
</body>
</html>
