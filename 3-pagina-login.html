<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Acesso VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #000000; color: #ffffff; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .apple-card { background: #1c1c1e; border: 1px solid #38383a; border-radius: 28px; padding: 3rem; width: 95%; max-width: 400px; text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.5); }
        input { background: #2c2c2e; border: 1px solid #38383a; border-radius: 14px; padding: 18px; color: white; width: 100%; margin-bottom: 12px; outline: none; font-size: 15px; transition: 0.3s; }
        input:focus { border-color: #0071e3; background: #323235; }
        button { background: #ffffff; color: #000000; font-weight: 900; padding: 18px; border-radius: 50px; width: 100%; transition: 0.3s; text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer; border: none; margin-top: 15px; font-size: 13px; }
        button:hover { background: #0071e3; color: white; transform: translateY(-2px); }
        .hidden { display: none !important; }
        label { display: block; text-transform: uppercase; font-size: 10px; color: #86868b; margin-bottom: 8px; font-weight: 900; text-align: left; margin-left: 8px; letter-spacing: 1px; }
        .link-action { color: #0071e3; font-weight: 700; font-size: 12px; cursor: pointer; text-decoration: none; }
        .link-action:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="apple-card">
        <h1 class="text-5xl font-black italic mb-2 tracking-tighter italic">iFipe</h1>
        
        <div id="loginForm">
            <p class="text-[10px] font-bold uppercase text-gray-500 mb-10 tracking-[0.3em]">Buscador de Preços VIP</p>
            <label>E-mail de Acesso</label>
            <input type="email" id="email" placeholder="seu@email.com">
            <label>Sua Senha</label>
            <input type="password" id="senha" placeholder="••••••••">
            <button onclick="fazerLogin()">Entrar no Sistema</button>
            <div class="mt-10 space-y-4">
                <p><a href="https://wa.me/5511998077677?text=Esqueci minha senha do iFipe" target="_blank" class="link-action text-[11px]">Esqueci minha senha</a></p>
                <p class="text-[11px] text-gray-500 font-medium">Ainda não tem conta? <span onclick="toggleForms()" class="link-action">Cadastre-se agora</span></p>
            </div>
        </div>

        <div id="cadastroForm" class="hidden">
            <p class="text-[10px] font-bold uppercase text-gray-500 mb-10 tracking-[0.3em]">Crie sua conta VIP</p>
            <input type="text" id="cadNome" placeholder="Nome Completo">
            <input type="text" id="cadCPF" placeholder="CPF (Somente números)">
            <input type="email" id="cadEmail" placeholder="Melhor E-mail">
            <input type="password" id="cadSenha" placeholder="Crie uma Senha">
            <button onclick="fazerCadastro()">Finalizar Cadastro</button>
            <p class="mt-8 text-[11px] text-gray-500 font-medium">Já é membro? <span onclick="toggleForms()" class="link-action">Voltar para Login</span></p>
        </div>
    </div>

    <script>
        const _supabase = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');
        
        function toggleForms() { 
            document.getElementById('loginForm').classList.toggle('hidden'); 
            document.getElementById('cadastroForm').classList.toggle('hidden'); 
        }

        async function fazerLogin() {
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const { data, error } = await _supabase.from('clientes_buscador').select('*').eq('email', email).eq('senha', senha).maybeSingle();

            if (data) {
                const novoToken = Math.random().toString(36).substring(2, 15);
                await _supabase.from('clientes_buscador').update({ last_session_id: novoToken }).eq('id', data.id);
                localStorage.setItem('iFipe_Token', novoToken);
                localStorage.setItem('iFipe_User', data.email);
                
                // REDIRECIONA PARA O PASSO 4 COM .HTML
                window.location.href = '4-layout-do-site.html'; 
            } else { 
                alert("Acesso Negado: Verifique seu e-mail e senha."); 
            }
        }

        async function fazerCadastro() {
            const { error } = await _supabase.from('clientes_buscador').insert([{
                nome: document.getElementById('cadNome').value,
                cpf: document.getElementById('cadCPF').value,
                email: document.getElementById('cadEmail').value,
                senha: document.getElementById('cadSenha').value
            }]);
            
            if (error) {
                alert("Erro ao cadastrar: Verifique se o CPF/E-mail já existem.");
            } else { 
                alert("Cadastro realizado com sucesso! Agora faça seu login."); 
                toggleForms(); 
            }
        }
    </script>
</body>
</html>
