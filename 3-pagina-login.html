<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iFipe - Acesso VIP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .apple-card { background: #1c1c1e; border: 1px solid #38383a; border-radius: 28px; padding: 3rem; width: 95%; max-width: 450px; }
        .apple-input { background: #2c2c2e; border: 1px solid #38383a; border-radius: 14px; padding: 18px; width: 100%; color: white; outline: none; margin-bottom: 1rem; font-size: 16px; }
        .apple-button { background: #fff; color: #000; font-weight: 900; border-radius: 50px; padding: 20px; width: 100%; cursor: pointer; text-transform: uppercase; border: none; font-size: 14px; transition: 0.3s; }
        .apple-button:hover { background: #0071e3; color: #fff; }
        .link-toggle { color: #0071e3; cursor: pointer; font-size: 12px; font-weight: bold; text-transform: uppercase; }
        label { display: block; text-transform: uppercase; font-size: 10px; color: #86868b; margin-bottom: 6px; font-weight: 900; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="apple-card">
        <div id="loginHeader" class="text-center mb-10">
            <h1 class="text-5xl font-black italic">iFipe</h1>
            <p class="text-[10px] font-bold uppercase text-gray-400 mt-2 tracking-[0.4em]">Acesso ao Ranking</p>
        </div>

        <div id="loginForm">
            <label>E-mail</label>
            <input type="email" id="logEmail" class="apple-input" placeholder="seu@email.com">
            <label>Senha</label>
            <input type="password" id="logPass" class="apple-input" placeholder="••••••••">
            <button onclick="realizarLogin()" class="apple-button">Entrar no iFipe</button>
            <p class="mt-6 text-center text-gray-500 text-[11px]">Não tem acesso? <span class="link-toggle" onclick="toggleForm()">Solicitar Cadastro</span></p>
        </div>

        <div id="registerForm" class="hidden">
            <label>Nome Completo</label>
            <input type="text" id="regNome" class="apple-input" placeholder="Seu Nome">
            <label>CPF (Apenas números)</label>
            <input type="text" id="regCpf" class="apple-input" placeholder="000.000.000-00">
            <label>E-mail Oficial</label>
            <input type="email" id="regEmail" class="apple-input" placeholder="seu@email.com">
            <label>WhatsApp</label>
            <input type="text" id="regWhats" class="apple-input" placeholder="DDD + Número">
            <label>Crie uma Senha</label>
            <input type="password" id="regPass" class="apple-input" placeholder="••••••••">
            <button onclick="solicitarCadastro()" class="apple-button">Enviar Solicitação</button>
            <p class="mt-6 text-center text-gray-500 text-[11px]">Já é cadastrado? <span class="link-toggle" onclick="toggleForm()">Voltar ao Login</span></p>
        </div>
        <p id="msg" class="mt-6 text-center text-[10px] font-black uppercase tracking-widest"></p>
    </div>

    <script>
        const _s = supabase.createClient('https://zmgosywpwidypxyhxkry.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InptZ29zeXdwd2lkeXB4eWh4a3J5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4MTg3MTYsImV4cCI6MjA4NzM5NDcxNn0.qE_JfgeSOF7VzsySjmnnAQkYngGJ_Lc5scOXLrhut-M');

        function toggleForm() {
            document.getElementById('loginForm').classList.toggle('hidden');
            document.getElementById('registerForm').classList.toggle('hidden');
            document.getElementById('msg').innerText = "";
        }

        async function solicitarCadastro() {
            const nome = document.getElementById('regNome').value;
            const cpf = document.getElementById('regCpf').value.replace(/\D/g, '');
            const email = document.getElementById('regEmail').value;
            const whats = document.getElementById('regWhats').value;
            const pass = document.getElementById('regPass').value;
            const msg = document.getElementById('msg');

            const { error } = await _s.from('clientes_buscador').insert([
                { nome, cpf, email, whatsapp: whats, senha: pass, aprovado: false }
            ]);

            if(!error) {
                msg.innerText = "🚀 SOLICITAÇÃO ENVIADA! AGUARDE APROVAÇÃO.";
                msg.style.color = "#32d74b";
                setTimeout(toggleForm, 3000);
            } else {
                msg.innerText = "ERRO: VERIFIQUE OS DADOS OU CPF JÁ CADASTRADO.";
                msg.style.color = "#ff3b30";
            }
        }

        async function realizarLogin() {
            const email = document.getElementById('logEmail').value;
            const pass = document.getElementById('logPass').value;
            const msg = document.getElementById('msg');

            const { data } = await _s.from('clientes_buscador')
                .select('*')
                .eq('email', email)
                .eq('senha', pass)
                .maybeSingle();

            if(data) {
                if(!data.aprovado) {
                    msg.innerText = "ACESSO PENDENTE DE APROVAÇÃO.";
                    msg.style.color = "#ffcc00";
                    return;
                }
                // AJUSTE CIRÚRGICO: SALVA E SÓ DEPOIS MUDA A PÁGINA
                localStorage.setItem('iFipe_Token', data.id);
                msg.innerText = "LOGANDO...";
                msg.style.color = "#32d74b";
                
                setTimeout(() => {
                    window.location.replace('4-layout-do-site.html');
                }, 800);
            } else {
                msg.innerText = "E-MAIL OU SENHA INCORRETOS.";
                msg.style.color = "#ff3b30";
            }
        }
    </script>
</body>
</html>
